body:
  text: 駱統表理張溫伏惟殿下天生明德神啓聖心招髦秀於四方置俊乂於宮朝多士既受普篤之恩張溫又蒙最隆之施而溫自招罪譴孤負榮遇念其如此誠可悲疚然臣周旋之間為國觀聽深知其狀故密陳其理溫實心無他情事無逆迹但年紀尚少鎮重尚淺而戴赫烈之寵體卓偉之才亢臧否之談效褒貶之議於是務勢者妬其寵爭名者嫉其才玄默者非其談瑕釁者諱其議此臣下所當詳辨明朝所當究察也昔賈誼至忠之臣也漢文大明之君也然而絳灌一言賈誼遠退何者疾之者深譖之者巧也然而誤聞於天下失彰於後世故孔子曰為君難為臣不易也溫雖智非從橫武非虓虎然其弘雅之素英秀之德文章之采論議之辨卓躒冠群煒曄曜世世人未有及之者也故論溫才即可惜言罪則可恕若忍威烈以赦盛德宥賢才以敦大業固明朝之休光四方之麗觀也國家之於暨豔不內之忌族猶等之平民是故先見用於朱治次見舉於衆人中見任於明朝亦見交於溫也君臣之義義之最重朋友之交交之最輕者也國家不嫌與豔為最重之義是以溫亦不嫌與豔為最輕之交也時世寵之於上溫竊親之於下也夫宿惡之民放逸山險則為徑寇將置平土則為健兵故溫念在欲取宿惡以除徑寇之害而增健兵之鋭也但自錯落功不副言然計其送兵以比許晏數之多少溫不減之用之強羸溫不下之至於遲速溫不後之故得及秋冬之月赴有警之期不敢忘恩而遺力也溫之到蜀共譽殷禮雖臣無境外之交亦有可原也境外之交謂無君命而私相從非國事而陰相聞者也若以命行既修君好因敘己情亦使臣之道也故孔子使鄰國則有私覿之禮季子騁諸夏亦有燕談之義也古人有言欲知其君觀其所使見其下之明明知其上之赫赫溫若譽禮能使彼歎之誠所以昭我臣之多良明使之得其人顯國美於異境揚君命於他邦是以晉趙文子之盟于宋也稱隨會於屈建楚王孫圉之使于晉也譽左史於趙鞅亦向他國之輔而歎本邦之臣經傳美之以光國而不譏之以外交也王靖內不憂時外不趨事溫彈之不私推之不假於是與靖遂為大怨此其盡節之明驗也靖兵衆之勢幹任之用皆勝於賈原蔣康溫尚不容私以安於靖豈敢賣恩以協原康邪又原在職不勤當事不堪溫數對以醜色彈以急聲若其誠欲賣恩作亂則亦不必貪原也凡此數者校之於事既不合參之於衆亦不驗臣竊念人君雖有聖哲之姿非常之智然以一人之身御兆民之衆從層宮之內瞰四國之外照群下之情求萬機之理猶未易周也固當聽察群下之言以廣聰明之烈今者人非溫既殷勤臣是溫又契闊辭則俱巧意則俱至各自言欲為國誰其言欲為私倉卒之間猶難即別然以殿下之聰睿察講論之曲直若潛神留思纖粗研核情何嫌而不宣事何昧而不昭哉溫非親臣臣非愛溫者也昔之君子皆抑私忿以增君明彼獨行之於前臣恥廢之於後故遂發宿懷於今日納愚言於聖聽實盡心於明朝非有念於溫身也吳志張溫傳民戶損耗上疏臣聞君國者以據疆土為強富制威福為尊貴曜德義為榮顯永世胤為豐祚然財須民生強賴民力威恃民勢福由民殖德俟民茂義以民行六者既備然後應天受祚保族宜邦書曰衆非后無能胥以寧后非衆無以辟四方推是言之則民以君安君以民濟不易之道也今強敵未殄海內未乂三軍有無已之役江境有不釋之備徵賦調數由來積紀加以殃疫死喪之災郡縣荒虛田疇蕪曠聽聞屬城民戶浸寡又多殘老少有丁夫聞此之日心若焚生則困苦無有溫飽死則委棄骸骨不反是以尤用戀本畏遠同之於死每有徵發羸謹居家重纍者先見輸送小有財貨傾居行賂不顧窮盡輕剽者則迸入險阻黨就群惡百姓虛竭嗷然愁擾愁擾則不營業不營業則致窮困致窮困則不樂生故口腹急則姦心動而攜叛多也又聞民間非居處小能自供生産兒子多不起養屯田貧兵亦多棄子天則生之而父母殺之既懼干逆和氣感動陰陽且惟殿下開基建國乃無窮之業也強鄰大敵非造次所滅疆埸常守非期月之戍而兵民減耗後生不育非所以歷遠年致成功也夫國之有民猶水之有舟停則以安擾則以危愚而不可欺弱而不可勝是以聖王重焉禍福由之故與民消息觀時制政方今長吏親民之職惟以辨具為能取過目前之急少復以恩惠為治副稱殿下天覆之仁勤恤之德者官民政俗日以雕敝漸以陵遲勢不可久夫治疾及其未篤除患貴其未深願殿下少以萬機餘間留神思省補復荒虛深圖遠計育殘餘之民阜人財之用參曜三光等崇天地臣統之大願足以死而不朽矣吳志駱統傳是時徵役繁數重以疫癘民戶損耗統上疏曰云云陳諸將舟船飾嚴箋諸將舟船轉相高上建立奇工文以丹漆雕鏤之巧好尚滋繁計其費耗所損不少北堂書鈔未刪改本一百三十七密表止太子登出征古來太子未嘗偏征也故從曰撫軍守曰監國今太子東出非古制也臣竊憂疑吳志全琮傳注引江表傳疏責子翥吾受國厚恩志報以命爾輩在都當念恭順親賢慕善何故與降虜交以糧餉之在遠聞此心震面熱惆悵纍旬疏到急就往使受杖一百促責所餉吳志潘濬傳注引吳書上疏安太子臣聞有國有家者必明嫡庶之端異尊卑之禮使高下有差陛級踰邈如此則骨肉之恩生覬覦之望絶昔賈誼陳治安之計論諸侯之勢以為勢重雖親必有逆節之纍勢輕雖疏必有保全之祚故淮南親弟不終饗國失之於勢重也吳芮疏臣傳祚長沙得之於勢輕也昔漢文帝使慎夫人與皇后同席袁盎退夫人之坐帝有怒色及盎辨上下之儀陳人彘之戒帝既悅懌夫人亦悟今臣所陳非有所偏誠欲以安太子而便魯王也吳志顧雍傳是時魯王霸有盛寵與太子和齊衡談上疏云云議奔喪奔喪立科輕則不足以禁孝子之情重則本非應死之罪雖嚴刑益設違奪必少若偶有犯者加其刑則恩所不忍有減則法廢不行愚以為長吏在遠苟不告語勢不得知比選代之間若有傳者必加大辟則長吏無廢職之負孝子無犯重之刑吳志大帝傳嘉禾六年春顧談議黃龍太牙賦乾坤肇立三才是生狼弧垂象實惟兵精聖人觀法是效是營始作器械爰求厥成黃農創代拓定皇基上順天心下息民災高辛誅共舜征有苗啓有甘師湯有鳴條周之牧野漢之垓下靡不由兵克定厥緒明明大吳實天生德神武是經惟皇之極乃自在昔黃虞是祖越歷五代經世在下應期受命發迹南土將恢大繇革我區夏乃律天時制為神軍取象太一五將三門疾則如電遲則如雲進止有度約而不煩四靈既布黃龍處中周制日月實曰太常桀然特立六軍所望仙人在上鑒觀四方神實使之為國休祥軍欲轉向黃龍先移金鼓不鳴寂然變施暗謨若神可謂祕奇在昔周室赤烏銜書今也大吳黃龍吐符合契河洛動與道俱天贊人和僉曰惟休吳志胡綜傳黃武八年夏黃龍見口於是權稱尊號因瑞改元又作黃龍大牙常在中軍諸軍進退視其所向命綜作賦曰云云藝文類聚六十以黃武八年一段為賦之本文蓋即此賦之序也然不應直稱權名疑史家改竄又見初學記二十二中分天下盟文天降喪亂皇綱失敘逆臣乘釁劫奪國柄始於董卓終於曹操窮凶極惡以覆四海至令九州幅裂普天無統民神痛怨靡所戾止及操子丕桀逆遺醜薦作姦回偷取天位而睿么麼尋丕凶迹阻兵盜土未伏厥誅昔共工亂象而高辛行師三苗干度而虞舜征焉今日滅睿禽其徒黨非漢與吳將復誰任夫討罪翦暴必聲其罪宜先分裂奪其土地使士民之心各知所歸是以春秋晉侯伐衛先分其田以畀宋人斯其義也且古建大事必先盟誓故周禮有司盟之官尚書有告誓之文漢之與吳雖信由中然分土裂境宜有盟約諸葛丞相德威遠者翼戴本國典戎在外信感陰陽誠動天地重復結盟廣誠約誓使東西士民咸共聞知故立壇殺牲昭告神明再歃加書副之天府天高聽下靈威棐諶司慎司盟群臣群祀莫不臨之自今日漢吳既盟之後勠力一心同討魏賊救危恤患分災共慶好惡齊之無或攜二若有害漢則吳伐之若有害吳則漢伐之各守分土無相侵犯傳之後葉克終若始凡百之約皆如載書信言不豔實居於好有渝此盟創禍先亂違二不協慆慢天命明神上帝是討是督山川百神是糾是殛俾墜其師無克祚國于爾大神其明鑒之吳志大帝傳蜀遣衛尉陳震慶權踐位三分天下豫青徐幽屬吳兗冀并涼屬蜀其司州之士以函谷關為界造為盟曰云云胡綜傳曰綜為盟文文義甚美又見藝文類聚三十三請立諸王表受命之主繫天而王建化垂統為一代制雖禮有損益事有質文至於崇建懿親列土封爵內蕃國朝外鎮天下古今同契其揆一也周室之興寵秩子弟姬姓之國五十有五諸王子受國者漸多光武中興四海擾攘衆諸制度未遍而九子受國明章即位男則封王女為公主故詩曰既受帝祉施於孫子陛下踐阼以來十有二載皇后無號公主無邑臣下歎息遠近失望是以屢獻愚懷依據典禮庶請具陳足寤聖心深辭固拒不蒙進納恐天下有識之士將謂吳臣暗於禮制不知陛下謙以失之也加今仰夏盛德在上大吳之慶於是乎始開國建號吉莫大焉唯陛下割謙謙之德副兆民之望留神祐許天下幸甚藝文類聚五十一議奔喪喪紀之禮雖有典制苟無其時所不得行方今戎事軍國異容而長吏遭喪知有科禁公敢干突苟念聞憂不奔之恥不計為臣犯禁之罪此由科防本輕所致忠節在國孝道立家出身為臣焉得兼之故為忠臣不得為孝子宜定科文示以大辟若故違犯有罪無赦以殺止殺行之一人其後必絶吳志大帝傳偽為吳質作降文三條其一曰天綱弛絶四海分崩群生憔悴士人播越兵寇所加邑無居民風塵煙火往往而處自三代以來大亂之極未有若今時者也臣質志薄處時無方繫於土壤不能翻飛遂為曹氏執事戎役遠處河朔天衢隔絶雖望風慕義思託大命愧無因緣得展其志每往來者竊聽風化伏知陛下齊德乾坤同明日月神武之姿受之自然敷演皇極流化萬里自江以南戶受覆燾英雄俊傑上達之士莫不心歌腹詠樂在歸附者也今年六月末奉聞吉日龍興踐阼恢弘大繇整理天綱將使遺民覩見定主昔武王伐殷殷民倒戈高祖誅項四面楚歌方之今日未足以喻臣質不勝昊天至願謹遣所親同郡黃定恭行奉表及託降叛間關求達其欲所陳載列于左其二曰昔伊尹去夏入商陳平委楚歸漢書功竹帛遺名後世世主不謂之背誕者以為知天命也臣昔為曹氏所見交接外託君臣內如骨肉恩義綢繆有合無離遂受偏方之任總河北之軍當此之時志望高大永與曹氏同死俱生惟恐功之不建事之不成耳及曹氏之亡後嗣繼立幼沖統政讒言彌興同懠者以勢相害異趣者得間其言而臣受性簡略素不下人視彼數子意實迫之此亦臣之過也遂為邪議所見搆會招致猜疑誣臣欲叛雖識真者保明其心世亂讒勝餘嫌猶在常懼一旦橫受無辜憂心孔疚如履冰炭昔樂毅為燕昭王立功於齊惠王即位疑奪其任遂去燕之趙休烈不虧彼豈欲二三其德蓋畏功名不建而懼禍之將及也昔遣魏郡周光以賈販為名託叛南詣宣達密計時以倉卒未敢便有章表使光口傳而已以為天下大歸可見天意所在非吳復誰此方之民思為臣妾延頸舉踵惟恐兵來之遲耳若使聖恩少加信納當以河北承望王師疑心赤實天日是鑒而光去經年不聞咳唾未審此意竟得達不瞻望長歎日月以幾魯望高子何足以喻又臣今日見待稍薄蒼蠅之聲綿綿不絶必受此禍遲速事耳臣私度陛下未垂明慰者必以臣質貫穿仁義之道不行若此之事謂光所傳多虛少實或謂此中有他消息不知臣質搆讒見疑恐受大害也且臣質若有罪之日自當奔赴鼎鑊束身待罪此蓋人臣之宜也今日無罪橫見譖毀將有商鞅白起之禍尋惟事勢去亦宜也死而弗義不去何為樂毅之出吳起之志君子傷其不遇未有非之者也願陛下推古況今不疑怪於臣質也又念人臣獲罪當如伍員奉已自效不當徼幸因事為利然今與古厥勢不同南北悠遠江湖隔絶自不舉事何得濟免是以忘志士之節而思立功之義也且臣質又以曹氏之嗣非天命所在政弱刑亂柄奪於臣諸將專威於外各自為政莫或同心士卒衰耗帑藏空虛綱紀毀廢上下並昏想前後數得降叛具聞此問兼弱攻昧宜應天時此實陛下進取之秋是以區區敢獻其計今若內兵淮泗據有下邳荊揚二州聞聲響應臣從河北席卷而南形勢一連根牙永固關西之兵繫於所衛青徐二州不敢徹守許洛餘兵衆不滿萬誰能來東與陛下爭者此誠千載一會之期可不深思而熟計乎及臣所在既自多馬加諸羌胡常以三四月中美草時驅馬來出隱度今者可得三千餘匹陛下出軍當投此時多將騎士來就馬耳此皆先定所一二知凡兩軍不能相究虛實今此間實羸易可克定陛下舉動應者必多上定洪業使普天一統下令臣質建非常之功此乃天也若不見納此亦天也願陛下思之不復多陳其三曰昔許子遠舍袁就曹規畫計較應見納受遂破袁軍以定曹業向使曹氏不信子遠懷疑猶豫不決於心則今天下袁氏有也願陛下思之間聞界上將閻浮趙楫欲歸大化唱和不速以取破亡今臣款款遠授其命若復懷疑不時舉動令臣孤絶受此厚禍即恐天下雄夫烈士欲立功者不敢復託命陛下矣願陛下思之皇天后土實聞其言吳志胡綜傳太子賓友目英才卓越超踰倫匹則諸葛恪精識時機達幽究微則顧談凝辨宏達言能釋結則謝景究學甄微遊夏同科則范慎吳志孫登傳注引江表傳領魯王傅上疏臣竊以魯王天挺懿德兼資文武當今之宜宜鎮四方為國藩輔宣揚德美廣耀威靈乃國家之良規海內所瞻望但臣言辭鄙野不能究盡其意愚以二宮宜有降殺正上下之序明教化之本吳志是儀傳
