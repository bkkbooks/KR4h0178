body:
  text: 虞翻上書吳主權陛下膺明聖之德體舜禹之孝厤運當期順天濟物奉承策命臣獨抃舞罪棄兩絕拜賀無階仰瞻宸極且喜且悲臣伏自刻省命輕鼠雀性輶毫氂罪惡莫大不容于誅昊天罔極全宥九載退當念戮頻受生活復偷視息臣年耳順思咎憂憤形容枯悴髮白齒落雖未能死自悼終沒不見宮闕百官之富不覩皇輿金軒之飾仰觀巍巍眾民之謠傍聽鐘鼓侃然之樂永隕海隅棄骸絕域不勝悲慕逸豫大慶悅以忘罪虞翻傳注引翻別傳曰權即尊號翻因上書云云奏上易注臣聞六經之始莫大陰陽是以伏羲仰天縣象而建八卦觀變動六爻為六十四以通神明以類萬物臣高祖父故零陵太守光少治孟氏易曾祖父故平輿令成纘述其業至臣祖父鳳為之最密臣先考故日南太守歆受本於鳳最有舊書世傳其業至臣五世前人通講多玩章句雖有祕說於經疏闊臣生遇世亂長於軍旅習經於枹鼓之間講論於戎馬之上蒙先師之說依經立注又臣郡吏陳桃夢臣與道士相遇放髮被鹿裘布易六爻撓其三以飲臣臣乞盡吞之道士言易道在天三爻足矣豈臣受命應當知經所覽諸家解不離流俗義有不當實輒悉改定以就其正孔子曰乾元用九而天下治聖人南面蓋取諸離斯誠天子所宜協陰陽致麟鳳之道矣謹正書副上惟不罪戾吳志虞翻傳注引翻別傳經之大者莫過於易自漢初以來海內英才其讀易者解之率少至孝靈之際潁川荀諝號為知易臣得其注有愈俗儒至所說西南得朋東北喪朋顛倒反逆了不可知孔子歎易曰知變化之道者其知神之所為乎以美大衍四象之作而上為章首尤可怪笑又南郡太守馬融名有俊才其所解釋復不及諝孔子曰可與共學未可與適道豈不其然若乃北海鄭玄南陽宋忠雖各立注忠小差玄而皆未得其門難以示世吳志虞翻傳注御覽三百九十九並引虞翻別傳奏鄭玄解尚書違失事因臣聞周公制禮以辨上下孔子曰有君臣然後有上下有上下然後禮義有所錯是故尊君卑臣禮之大司也伏見故徵士北海鄭玄所注尚書以顧命康王執瑁古曰似同從誤作同既不覺定復訓為杯謂之酒杯成王疾困憑几洮頮為濯以為澣衣成事洮字虛更作濯以從其非又古大篆卯字讀當為柳古柳卯同字而以為昧分北三苗北古別字又訓北言北猶別也若此之類誠可怪也玉人職曰天子執瑁以朝諸侯謂之酒杯天子頮面謂之澣衣古篆卯字反以為昧甚違不知蓋闕之義於此數事誤莫大焉宜命學官定此三事又馬融訓注亦以為同者大同天下今經益金就作銅字詁訓言天子副璽雖皆不得猶愈於玄然此不定臣沒之後而奮乎百世雖世有知者懷謙莫或奏正又玄所注五經違義尤甚者百六十七事不可不正行乎學校傳乎將來臣竊恥之吳志虞翻傳注引翻別傳追與客書僕聞虎魄不取腐芥磁石不受曲鍼過而不存不可宜乎吳志虞翻傳注引吳書與丁固同僚書丁子賤塞淵好德堂構克舉野無遺薪斯之為懿其美優矣令德之後惟此君嘉耳吳志虞翻傳注引會稽典錄山陰丁覽字孝連為郡功曹守始平長覽子固字子賤孫休時為左御史大夫孫皓即位遷司徒與徐陵書元大受上卿之遇叔向任晉未若於今吳志虞翻傳注引會稽典錄太末徐陵字元大為零陵太守時朝廷俟以列卿之位與士仁書明者防禍於未萌智者圖患於將來知得知失可與為人知存知亡足別吉凶大軍之行斥候不及施烽火不及舉此非天命必有內應將軍不先見時時至又不應之獨守縈帶之城而不降死戰則毀宗滅祀為天下譏笑呂虎威欲徑到南郡斷絕陸道生路一塞案其地形將軍為在箕舌上耳奔走不得免降則失義竊為將軍不安幸熟思焉吳志呂蒙傳注引吳書與所親書諸葛敦仁則天活物比蒙清論有以保分惡積罪深見忌殷重雖有祁老之救德無羊舌解釋難冀也吳志諸葛瑾傳與某書此中小兒年四歲矣似欲聰哲雖蝦不生鯉子此子似人欲為求婦不知所向君為訪之勿怪老癡譽此兒也御覽四百九十又七百三十九與弟書長子容當為求婦其父如此誰肯嫁之者造求小姓足使生子天其福人不在舊族揚雄之才非出孔氏之門芝草無根醴泉無源家聖受禪父頑母嚚虞家世法出癡子御覽五百十一有數頭男皆如奴僕伯安雖癡諸兒不及觀我所生有兒無子伯安三男阿思似父思其兩弟有似人也去日南遠恐如甘蔗近杪即薄御覽九百七十四說孫賁破虜將軍昔率義兵入討董卓聲冠華夏義士壯之討逆繼世廓定六郡特以君侯骨肉至親器為時生故表漢朝剖符大郡兼建將校仍關綜兩府榮冠宗室為遠近所瞻加討虜聰明神武繼承洪業攬結英雄周濟世務軍眾日盛事業日隆雖昔蕭王之在河北無以加也必克成王基應運東南故劉玄德遠布腹心求見拯救此天下所共知也前在東聞道路之言云將軍有異趣良用憮然今曹公阻兵傾覆漢室幼主流離百姓元元未知所歸而中國蕭條或百里無煙城邑空虛道殣相望士歎於外婦怨乎室加之以師旅因之以饑饉以此料之豈能越長江與我爭利哉將軍當斯時也而欲背骨肉之親違萬安之計割同氣之膚啖虎狼之口為一女子改慮易圖失機毫釐差以千里豈不惜哉吳志朱治傳權從兄豫章太守賁女為曹公子婦及曹公破荊州賁欲遣子入質注引江表傳載治說賁上疏討馬茂馬茂小子敢負恩養臣今奉天威事蒙克捷欲令所獲震耀遠近方舟塞江使足可觀以解上下之忿惟陛下識臣先言責臣後效吳志朱然傳與諸葛融書昶遠來疲困馬無所食力屈而走此天助也今追之力也可引兵相繼吾欲破之於前足下乘之於後豈一人之功哉宜同斷金之義吳志朱績傳召處士謝譚教夫應龍以屈伸為神鳳皇以嘉鳴為貴何必隱形於天外潛鱗於重淵者哉吳志吾粲傳渾天儀說先王之道存乎治厤明時本之驗著在于天象夫法象莫若渾天渾天之設久矣昔在顓頊使南正重司天而帝嚳亦敘三辰堯命羲和欽若昊天厤象日月星辰舜之受禪在璿璣玉衡以齊七政以數者言之曩時已立渾天之象明矣周公敘次六十四卦兩兩相承反覆成象以法天行周而復始晝夜之義故晉卦彖曰晝日三接明夷爻象曰初登于天後入于地仲尼說之曰明出地上晉進而麗乎大明是以晝日三接明入地中明夷夜也先晝後夜先晉後明夷故曰初登于天昭四國也後入于地失則也日月麗乎天隨天轉運入乎地以成晝夜也渾天之義蓋與此同仲尼歿大道乖諸子穿鑿妄作乃有蓋天之說其為虛偽較然可知渾天以日出地上則晝故易曰明出地上晝日三接又曰晉進也日入于地則夜夜則明傷故易曰明夷傷也又曰初登于天昭四國也後入于地失則也尚書寅賓出日寅餞納日以此言之而知日出入于地審矣若不出入于地則何緣得有晝夜明闇乎天半覆地上半周地下繞地而運故二十八宿半見半隱若天半右覆地上半不在地下二十八宿何故更見更隱乎由此言之天乃裹地而運信矣此是昏明之大術也天之形狀圓周渾然運于無窮故曰渾易曰乾為天為圓又曰先甲三日後甲三日終則有始天行健此之謂矣天大地小天繞地半覆地上半周地下譬如卵白白繞黃也揚子雲太玄經曰天穹窿而周乎下地旁薄而向乎上故知天裹地下周天三百六十五度四分度之一一百八十二度八分度之五覆地上百八十二度八分度之五周地下故二十八宿半見半隱日月出入以成昏明也北極星北方偏出于地三十五度南極中偏入于地亦三十五度南極北極天軸所在轉運所由譬車之有輪所以自行也眾星皆移無常惟北辰守中不易是以知其為天中也天傾故極在中北仲尼曰譬如北辰居其所而眾星拱之又太玄經曰天圓地方極樞中央動以厤靜時乘十二以建七政是以堯典曰在璇璣玉衡以齊七政此之謂也繞北極七十度之外常在地下不出地周天一百七萬一千里東西南北徑三十五萬七千里立徑亦然開元占經一又二閏月無中氣北斗斜指二辰之間御覽十七渾天圖魁星第一星主徐州第二星主益州第三星主冀州第四星主荊州第五星主兗州第六星主揚州第七星主豫州開元占經六十七太玄經序闊達大節北堂書鈔九述玄績昔常見同郡鄒邠字伯岐與邑人書歎楊子雲所述太玄連推求玄本不能得也鎮南將軍劉景升遣梁國成奇修好鄙州奇將玄經自隨時雖幅寫一通年尚暗稚甫學書毛詩王誼人事未能深索玄道真故不為也後數年專精讀之半歲閒粗覺其意於是草創注解未能也章陵宋仲子為作解詁後奇復銜命尋盟仲子以所解付奇與安遠將軍彭城張子布績得覽焉仲子之思慮誠為深篤然玄道廣遠淹廢歷載師讀斷絕難可一備故往往有違本錯誤績智意豈能弘裕顧聖人有所不知匹夫誤有所達加緣先王詢于芻蕘之誼故遂卒有所述就以仲子解為本其合於道者因仍其說其失者因釋而正之所以不復為一解欲令學者瞻覽彼此論其曲直故合聯之爾夫玄之大義揲蓍之謂而仲子失其旨歸休咎之占靡所取定雖得文閒義說大體乖矣書曰若網在綱有條而弗紊今綱不正欲弗紊不可得已績不敢苟好著作以虛譽也庶合道真使玄不為後世所尤而已昔楊子雲述玄經而劉歆觀之謂曰雄空自苦今學經者有祿利然尚不能明易又如玄何吾恐後人用覆醬瓿雄笑而不應雄卒大司空王邑納言嚴尤聞雄死謂桓譚曰玄其傳乎譚曰必傳顧君與譚不及見也班固贊敘雄事曰凡人貴遠賤近親見楊雄祿位容貌不能動人故輕其書楊子雲之言文誼至深論不詭於聖人若使遭遇時君更閱賢智為所稱善則必度越諸子矣自雄之沒至今四十餘年其法言大行而玄終未顯又張平子與崔子玉書曰乃者以朝駕明日披讀太玄經知子雲特極陰陽之數也以其滿汎故故時人不務此非特傳記之屬心實與五經擬漢家得二百歲卒乎所以作興者之數其道必顯一代常然之符也玄四百歲其興乎竭己精思以揆其義更使人難論陰陽之事足下累世窮道極微子孫必命世不絕且幅寫一通藏之以待能者績論數君所云知楊子雲太玄無疆也歆云經將覆沒猶法言而今顯揚歆之慮尋於是為漏固曰法言大行而玄終未顯固雖云終不必其廢有愈於歆譚云必傳顧譚與君不見也而玄果傳譚所思過固遠矣平子云漢之四百其興乎漢元至今四百年矣其道大顯處期甚效厥迹速其最復優乎且以歆厤譜之隱奧班固漢書之淵弘桓譚新論之深遠尚不能鏡照玄經廢興之數況夫王邑嚴尤之倫乎覽平子書令子玉深藏以待能者子玉為世大儒平子嫌不能理但令深藏益明玄經之為乎驗雖平子焯亮其道處其熾興之期人之材意相倍如此雄歎曰師曠之調鐘俟知音之在後孔子作春秋冀君子之將睹信哉斯言於是乎驗雄受氣純和韜真含道通敏叡達鉤深致遠建立玄經與聖人同趣雖周公繇大易孔子修春秋不能是過論其所述終年不能盡其美也考之古今宜曰聖人昔孔子在衰周之時不見深識或遭困苦謂之佞人列國智士稱之達者不曰聖人唯弟子中言其聖耳逮至孟軻孫卿之徒及漢世賢人君子咸並服德歸美謂之聖人用春秋以為王法故遂隆崇莫有非毀楊子雲亦生衰亂之世雖不見用智者識焉桓譚之絕倫稱曰聖人其事與孔子相似又述玄經平子處其將興之期果如其言若玄道不應天合神平子無以知其行數若平子瞽言期應不宜效驗如合符契也作而應天非聖如何昔詩稱母氏聖善多方曰惟聖罔念作狂惟狂克念作聖洪範曰睿作聖孟軻謂柳下惠作聖人由是言之人之受性聰明純淑無所繫輆順天道履仁誼因可謂之聖人何常之有乎世不達聖賢之數謂聖人如鬼神而非人類豈不遠哉凡人賤近而貴遠聞績所云其笑必矣冀值識者有以察焉太玄范望注本自知亡日為辭有漢志士吳郡陸績幼敦詩書長玩禮易受命南征遘疾遇戹遭命不幸嗚呼悲隔吳志陸績傳又見袁宏後漢紀二十九從今已去六十年之外車同軌書同文恨不及見也同上為荊州士人上疏昔漢高受命招延英異光武中興群俊畢至苟可以熙隆道教者未必遠近今荊州始定人物未達臣愚慺慺乞普加覆載抽拔之恩令並獲自進然後四海延頸思歸大化吳志陸遜傳上疏請緩攻劉備夷陵要害國之關限雖為易得亦復易失失之非徒損一郡之地荊州可憂今日爭之當令必諧備干天常不守窟穴而敢自送臣雖不材憑奉威靈以順討逆破壞在近尋備前後行軍多敗少成推此論之不足為戚臣初嫌之水陸俱進今反舍船就步處處結營察其布置必無他變伏願至尊高枕不以為念也吳志陸遜傳陳時事疏臣以為科法嚴峻下犯者多頃年以來將吏罹罪雖不慎可責然天下未一當圖進取小宜恩貸以安下情且世務日興良能為先自不姦穢入身難忍之過乞復顯用展其力效此乃聖王忘過記功以成王業昔漢高舍陳平之愆用其奇略終建勳祚功垂千載夫峻法嚴刑非帝王之隆業有罰無恕非懷遠之弘規也吳志陸遜傳請勿取夷州及朱崖疏臣愚以為四海未定當須民力以濟時務今兵興歷年見眾損減陛下憂勞聖慮忘寢與食將遠規夷州以定大事臣反覆思惟未見其利萬里襲取風波難測民易水土必致疾疫今驅見眾經涉不毛欲益更損欲利反害又朱崖絕險民猶禽獸得其民不足濟事無其兵不足虧眾今江東見眾自足圖事但當畜力而後動耳昔桓王創基兵不一旅而開大業陛下承運拓定江表臣聞治亂討逆須兵為威農桑衣食民之本業而干戈未戢民有饑寒臣愚以為宜育養士民寬其租賦眾克在和義以勸勇則河渭可平九有一統矣吳志陸遜傳乞息親征公孫淵疏淵憑險恃固拘留大使名馬不獻實可讎忿蠻夷猾夏未染王化鳥竄荒裔拒逆王師至令陛下爰赫斯怒欲勞萬乘汎輕越海不慮其危而涉不測方今天下雲擾群雄虎爭英雄踴躍張聲大視陛下以神武之資誕膺期運破操烏林敗備西陵禽羽荊州斯三虜者當世雄傑皆摧其鋒聖化所綏萬里草偃方蕩平華夏總一大猷今不忍小忿而發雷霆之怒違垂堂之戒輕萬乘之重此臣之所惑也臣聞志行萬里者不中道而輟足圖四海者匪懷細以害大彊寇在境荒服未庭陛下乘桴遠征必致闚𨵦慼至而憂悔之無及若使大事時捷則淵不討自服今乃遠惜遼東眾之與馬奈何獨欲捐江東萬安之本業而不惜乎乞息六師以威大虜早定中夏垂曜將來吳志陸遜傳疏請安太子太子正統宜有盤石之固魯王藩臣當使寵秩有差彼此得所上下獲安謹叩頭流血以聞吳志陸遜傳建議平山寇方今英雄棊跱豺狼闚望克敵寍亂非眾不濟而山寇舊惡依阻深地夫腹心未平難以圖遠可大部伍取其精銳吳志陸遜傳議緩興利改作國以民為本彊由民力財由民出夫民殷國弱民瘠國彊者未之有也故為國者得民則治失之則亂若不愛利而令盡用立效亦為難也是以詩歎宜民宜人受祿于天乞垂聖恩寍濟百姓數年之間國用少豐然後更圖吳志陸遜傳與關羽書前承觀釁而動以律行師小舉大克一何巍巍敵國敗績利在同盟聞慶拊節想遂席卷共獎王綱近以不敏受任來西延慕光塵思稟良規吳志陸遜傳于禁等見獲遐邇欣歎以為將軍之勳足以長世雖昔晉文城濮之師淮陰拔趙之略蔑以尚茲聞徐晃等步騎駐旌闚望麾葆操猾虜也忿不思難恐潛增眾以逞其心雖云師老猶有驍悍且戰捷之後常苦輕敵古人杖術軍勝彌警願將軍廣為方計以全獨克僕書生疏遲忝所不堪喜鄰威德樂自傾盡雖未合策猶可懷也儻明注仰有以察之同上答劉備但恐軍新破創痍未復始求通親且當自補未暇窮兵耳若不推算欲復以傾覆之餘遠送以來者無所逃命吳志陸遜傳注引吳錄假作答逯式書得報懇惻知與休久結嫌隙勢不兩存欲求歸附輒以密呈來書表聞撰眾相迎宜潛速嚴更示定期吳志陸遜傳答全琮子弟苟有才不憂不用不宜私出以要榮利若其不佳終為取禍且聞二宮勢敵必有彼此此古人之厚忌也吳志陸遜傳與全琮書卿不師日磾而宿留阿寄終為足下門戶致禍矣吳志陸遜傳
