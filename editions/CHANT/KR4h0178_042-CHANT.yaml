body:
  text: 杜恕二君第一體論人主之大患莫大乎好名人主好名則群臣知所要矣夫名所以名善者也善脩而名自隨之非好之之所能得也苟好之甚則必偽行要名而姦臣以偽事應之一人而受其慶則舉天下應之矣君以偽化天下欲貞信敦樸誠難矣雖有至聰至達之主由無緣見其非而知其偽況庸主乎人主之高而處隩譬猶遊雲夢而迷惑當借左右以正東西者也左曰功巍巍矣右曰名赫赫乎今日聞斯論明日聞斯論苟不校之以事類則人主囂然自以為名齊乎堯舜而化洽乎泰平也群臣璅璅皆不足任也堯舜之君宜獨斷者也不足任之臣當受成者也以獨斷之君與受成之臣帥訛偽之俗而天下治者未之有也夫聖人之脩其身所以御群臣也所以化萬民也其法輕而易守其禮𥳑而易持其求諸已也誠其化諸人也深苟非其人道不虛行苟非其道治不虛應是以古之聖君之于其臣也疾則視之無數死則臨其大斂小斂為撤膳不舉樂豈徒色取仁而實違之者哉乃慘怛之心出于自然形于顏色世未有不自然而能得人自然者也色取仁而實違之者謂之虛不以誠待其臣而望其臣以誠事己謂之愚虛愚之君未有能得人之死力者也故書稱君為元首臣為股肱期其一體相須而成也而險偽淺薄之士有商鞅韓非申不害者專飾巧辯邪偽之術以熒惑諸侯著法術之書其言云尊君而卑臣上以尊君取容于人主下以卑臣得售其姦說此聽受之端參言之要不可不慎也元首已尊矣而復云尊之是以君過乎頭也股肱已卑矣而復曰卑之是使其臣不及乎手足也君過乎頭而臣不及乎手足是離其體也君臣體離而望治化之洽未之前聞也且夫術家說又云明主之道當外御群臣內疑妻子其引證連類非不辯且悅也然不免于利口之覆國家也何以言之夫善進不善無由入不善進善亦無由入故湯舉伊尹而不仁者遠何畏乎驩兜何遷乎有苗夫奸臣賊子下愚不移之人自古及今未嘗不有也百歲一人是謂繼踵千里一人是為比肩而舉以為戒是猶一噎而禁人食也噎者雖少餓者必多未知奸臣賊子處之云何且令人主魁然獨立是無臣子也又誰為君父乎是猶髡其枝而欲根之蔭揜其目而欲視之明襲獨立之跡而願其扶疏也夫徇名好術之主又有惑焉皆曰為君之道凡事當密人主苟密則群臣無所容其巧而不敢怠于職此即趙高之教二世不當聽朝之類也是好乘高履危而笑先僵者也易曰機事不密則害成易稱機事不謂凡事也不謂宜共而獨之也不謂釋公而行私也人主欲以之匿病飾非而人臣反以之竊寵擅權疑似之閒可不察歟夫設官分職君之體也委任責成君之體也好謀無倦君之體也寬以得眾君之體也含垢藏疾君之體也不動如山君之體也難知如淵君子體也君有君人之體其臣畏而愛之此文王所以戒百辟也夫何法術之有哉故善為政者務在于擇人而已及其求人也總其大略不具其小善則不失賢矣故曰記人之功忘人之過宜為君者也人有厚德無問其小節人有大譽無訾其小故自古及今未有能全其行者也和氏之璧不能無瑕隋侯之珠不能無纇然天下寶之者不以小故妨大美也不以小故妨大美故能成大功夫成大功在已而己何具之于人也今之從政者稱賢聖則先乎商韓言治道則師乎法術法術之御世有似鐵轡之御馬非必能制馬也適所以梏其手也人君之數至少而人臣之數至眾以至少御至眾其勢不勝也人主任術而欲御其臣無術其勢不禁也俱任術則至少者不便也故君使臣以禮則臣事君以忠晏平仲對齊景公君若棄禮則齊國五尺之童皆能勝嬰又能勝君所以服者以有禮也今末世棄禮任術之君之于其身也得無所不能勝五尺之童子乎三代之亡非其法亡也御法者非其人也苟得其人王良造父能以腐索御奔駟伊尹太公能以敗法御悍民苟非其人不由其道索雖堅馬必敗法雖明民必叛柰何乎萬乘之主釋人而任法哉且世未嘗無賢也求賢之務非其道故常不遇之也除去湯武聖人之君任賢之功近觀桓中才之主耳猶知勞于索人逸于任之不疑子糾之親不忘射鉤之怨蕩然而委政焉不已明乎九合諸侯壹匡天下不已榮乎一曰仲父二曰仲父不己優乎孰與秦二世懸石程書愈密愈亂為之愈勤而天下愈叛至于弒死以斯二者觀之優劣之相懸存亡之相背不亦昭昭乎夫人主莫不欲安存而惡危亡莫不欲榮樂而惡勞辱也終恆不得其所欲而不免乎所惡者何誠失道也欲宮室之崇麗也必懸重賞而求良匠內不以阿親戚外不以遺疏遠必得其人然後授之故宮室崇麗而處之逸樂至于求其輔佐獨不若是之公也唯便辟親近者之用故圖國不如圖舍是人主之大患也使賢者為之與不肖者議之使智者慮之與愚者斷之使修士履之與邪人疑之此又人主之所患也夫賞賢使能則民知其方賞罰明必則民不偷兼聰齊明則天下歸之然後明分職序事業公道開而私門塞矣如此則忠公者進而佞悅者止虛偽者退而貞實者起自群臣以下至乎庶人莫不修己而後敢安其職業變心易慮反其端愨此之謂政化之極審斯論者明君之體畢矣群書治要臣第二凡人臣之于其君也猶四肢之戴元首耳目之為心使也皆相須而成為體相得而後為治者也故虞書曰臣作股肱耳目而屠蒯亦云汝為君目將司明也汝為君耳將司聰也然則君人者安可以斯須無臣臣人者安可以斯須無君斯須無君斯須無臣是斯須無身也故臣之事君猶子之事父而加敬焉父子至親矣然其相須尚不及乎身之與手足也身之于手足可謂無閒矣然而聖人猶復督而致之故其化益淳其恩益密自然不覺教化之移也奸人離而閒之故使其臣自疑于下而令其君孤立乎上君臣相疑上下離心乃奸人之所以為劫殺之資也然夫中才之主明不及乎治化之原而感于偽術似是之說故備之愈密而奸人愈甚譬猶登高者愈懼愈危愈危愈墜孰如早去邪徑而就夫大道乎凡士之結髮束脩立志于家門欲以事君也宗族稱孝焉鄉黨稱悌焉及志乎學自託于師友師貴其義而友安其信孝悌以篤信義又著以此立身以此事君何待乎法然後為安及其為人臣也稱才居位稱能受祿不面譽以求親不偷悅以苟合公家之利知無不為也上足以尊主安國下足以豐財阜民謀事不忘其君圖身不忘其國內匡其過外揚其義不下比以闇上不上同以病下見善行之如不及見賢舉之如不容內舉不避親戚外舉不避仇讎程功積事而不望其報進賢達能而不求其賞道塗不爭險易之利見難而無苟免之心其身可殺而其守不可奪此直道之臣所以佐賢明之主致治平之功者也若夫主明而臣闇主闇而臣偽有盡忠不見信有見信而不盡忠溷淆于臣主之分出入于治亂之閒或被褐懷玉以待時或巧言令色以容身又可勝盡哉是以古之全其道者進則正退則曲正則與世樂其業曲則全身歸于道不傲世以華眾不立高以為名不為苟得以偷安不為苟免而無恥夫脩之于鄉閭壞之于朝廷可惜也脩之于已立壞之于闔棺可惜也君子惜茲二者是以有殺身以成仁無求生以害仁況害仁以求寵乎故孔子曰不義而富且貴于我如浮雲若夫智慮足以圖國忠貞足以悟主公平足以懷眾溫柔足以服人不誹毀以取進不刻人以自入不苟容以隱忠不耽祿以傷高通則使上恤其下窮則教下順其上故用于上則民安行于下則君尊可謂進不失忠退不失行此正士之義為臣之體也凡趣舍之患在于見可欲而不慮其敗見可利而不慮其害故動近于危辱昔孫叔敖三相楚國而其心愈卑每益祿而其施愈博位滋高而其禮愈恭正考父傴僂而走晏平仲辭其賜邑此皆守滿以沖為臣之體也夫不憂主之不尊于天下而唯憂已之不富貴此古之所謂庸人而今之所謂顯士小人之所榮慕而君子之所以為恥也凡人臣之論所以事君者有四有賢主之臣有明主之臣有中主之臣有庸主之臣上能尊主下能壹民物至能應事起能辨教化流于下如影響之應形聲此賢主之臣也內足以壹民外足以拒難民親而士信之身之所長不以怫君身之所短不取功此明主之臣也君有過事能壹心同力相與諫而正之以解國之大患成君之大榮此中主之臣也端殼而守法壹心以事君君有過事雖不能正諫其憂見于顏色此庸生之臣也以庸主之臣事賢主則從以賢主之臣事庸主則凶古之所以成其名者皆度主而行者也脩之在已而遭遇有時是以古人抱麟而泣也夫名不可以虛偽取也不可以比周爭也故君子務修諸內而讓之于外務積于身而處之以不足夫為人臣其猶土乎萬物載焉而不辭其重水瀆汙焉而不辭其下草木殖焉而不有其功此成功而不處為臣之體也若夫處大位任大事荷重權于萬乘之國必無後患者其上莫如推賢讓能而安隨其後不為管仲即為鮑叔耳其次莫如廣樹而竝進之不為魏成子即為翟璜耳安有壅君蔽主專權之害哉此事君之道為臣之體也群書治要言第三束脩之業其上在于不言其次莫如寡辭諺曰使口如鼻至老不失白孔六帖三十御覽三百六十七引杜恕論當在言篇行第四夫行也者舉趾所由之徑路也東西南北之趣舍也君子小人之分界也吉凶榮辱之皁白也由南則失北也由東則失西矣由乎利則失為君子由乎義則失為小人吉凶榮辱之所由生義利為之本母也是以君子慎趣舍焉群書治要君子居必選鄉游必擇士意林夫君子直道以耦世小人枉行以取容君子揜人之過以長善小人毀人之善以為功君子寬賢容眾以為道小人徼訐懷詐以為智君子下學而無常師小人恥學而羞不能此又君子小人之分界也君子心有所定計有所守智不務多務行其所知行不務多務審其所由安之若性行之如不及小人則不然心不在乎道義之經口不吐乎訓誥之言不擇賢以託身不力行以自定隨轉如流不知所執此又君子小人之分界也君子之養其心莫善于誠夫誠君子所以懷萬物也天不言而人推高焉地不言而人推厚焉四時不言而人期焉此以至誠者也誠者天地之大定而君子之所守也天地有紀矣不誠則不能化育君臣有義矣不誠則不能相臨父子有禮矣不誠則疏夫婦有恩矣不誠則離交接有分矣不誠則絕以義應當曲得其情其唯誠乎群書治要可以使鬼者錢也可以使神者誠也御覽八百三十六政第五孔子曰為政以德又曰導之以德齊之以禮有恥且格然則德之為政大矣而禮次之也夫德禮也者其導民之具歟大上養化使民日遷善而不知其所以然此治之上也其次使民交讓處勞而不怨此治之次也其下正法使民利賞而勸善畏刑而不敢為非此治之下也夫善御民者其猶御馬乎正其銜勒齊其轡策均馬力和馬心故能不勞而極千里善御民者壹其德禮正其百官齊民力和民心是故令不再而民從刑不用而天下化治所貴聖人者非貴其隨罪而作刑也貴其防亂之所生也是以至人之為治也處國于不傾之地積政于萬全之鄉載德于不止之輿行令于無竭之倉使民于不爭之塗開法于必得之方民有小罪必求其善以赦其過民有大罪必原其故以仁輔化是故上下親而不離道化流而不蘊夫君子欲政之速行莫如以道御之也皋繇瘖而為大理有不貴乎言也師曠盲而為大宰有不貴乎見也唯神化之為貴是故聖王冕而前旒所以蔽明黈纊充耳所以揜聰也觀夫獘俗偷薄之政耳目以效聰明設倚伏以探民情是為以軍政虜其民也而望民之信向之可謂不識乎分者矣難哉為君也夫君尊嚴而威高遠而危民者卑賤而恭愚弱而神惡之則國亡愛之則國存庶民水也君子舟也水所以載舟亦所以覆舟御民者必明此要故南面而臨官不敢以其富貴驕人有諸中而能圖外取諸身而能畼遠觀一物而貫乎萬者以身為本也夫欲知天之終始也今日是也欲知千萬之情一人情是也故為政者不可以不知民之情知民然後民乃從令己所不欲不施之于人令安得不從乎故善政者𥳑而易行則民不變法存身而民象之則民不怨近臣便嬖百官因之而後達則群臣自汙也是以為政者必慎擇其左右左右正則人主正矣人主正則夫號令安得曲邪天下大惡有五而盜竊不豫焉一曰心達而性險二曰行僻而志堅三曰言偽而辭辯四曰記醜而喻博五曰循非而言澤此五者有一于人則不可以不誅況兼而有之置之左右訪之以事而人主能立其身者未之有也群書治要法第六夫淫逸盜竊百姓之所惡也我從而刑之殘之刻剝之雖過乎當百姓不以為暴者公也怨曠飢寒亦百姓之所惡也遁而陷于法我從而寬宥之雖及于刑必加隱惻焉百姓不以我為偏者公也我之所重百姓之所憎也我之所輕百姓之所憐也是故賞約而勸善刑省而禁奸由此言之公之于法無不可也過輕亦可過重亦可私之于法無可也過輕則縱姦過重則傷善今之為法者不平公私之分而辯輕重之文不本百姓之心而謹奏當之書是治化在身而走求之也聖人之于法也已公矣然猶身懼其未也故曰與其害善寍其利淫知刑當之難必也從而救之以化此上古之所務也後之治獄者則不然未訊罪人則驅而致之意謂之能下不探獄之所由生為之分而上求人主之微旨以為制謂之忠其當官也能其事上也忠則名利隨而與之驅世而陷此以望化道之隆亦不幾矣凡聽訟決獄必原父子之親立君臣之義權輕重之敘測淺深之量悉其聰明致其忠愛然後察之疑則與眾共之眾疑則從輕者所以重之也非為法不具也以為法不獨立當須賢明共聽斷之也故舜命皋繇曰汝作士惟刑之恤又復加之以三誶眾所謂善然後斷之是以為法參之人情也故春秋傳曰小大之獄雖不能察必以情而世俗拘愚苛刻之吏以為情也者取貨賂者也立愛憎者也祐親戚者也陷怨讎者也何世俗小吏之情與夫古人之懸遠乎無乃風化使之然邪有司以此情疑之群吏人主以此情疑之有司是君臣上下不通相疑也不通相疑欲其盡忠立節亦難矣苟非忠節免而無恥免而無恥則民安所厝其手足乎春秋之時王道浸壞教化不行子產相鄭而鑄刑書偷薄之政自此始矣逮至戰國韓任申子秦用商鞅連相坐之法造參夷之誅至于始皇兼吞六國遂滅禮義之官專任刑罰而奸邪竝生天下叛之高祖約法三章而天下大悅及孝文即位躬脩玄默論議務在寬厚天下化之有刑厝之風至于孝武徵發煩數百姓虛耗窮民犯法酷吏擊斷姦宄不勝于是張湯趙禹之屬條定法令轉相比況禁固積密文書盈于機格典者不能徧覩姦吏因緣為市議者咸怨傷之凡治獄之情必本所犯之事以為之主不放訊不旁求不貴多端以見聰明也故律正其舉效之法參伍其辭以求實也非所以飾實也但當參伍聰明之耳目不使獄吏斷練飾治成辭于手也孔子曰古之聽獄求所以生之也今之聽獄求所以殺之也故厈言以破律詆案以成法執左道以亂政皆王誅之所必加也群書治要聽察第七夫聽察者乃存亡之門戶安危之機要也若人主聽察不博偏受所信則謀有所漏不盡良策若博其觀聽納受無方攷察不精則數有所亂矣人主以獨聽之聰攷察成敗之數利害之說雜而竝至以千闚聽如此誠至精之難在于人主耳不在竭誠納謀盡已之策者也若人主聽察不差納受不謬則計濟事全利倍功大治隆而國富民強而敵滅矣若過聽不精納受不審則計困事敗利喪功虧國貧而兵弱治亂而勢危矣聽察之所攷不可不精不可不審者如此急也凡有國之主不可謂舉國無深謀之臣闔朝無智策之士也在聽察所攷精與不精審與不審耳何以驗其然乎有昔漢祖者聰聽之主也納陳恢之謀則下南陽不用婁敬之計則困平城廣武君者策謀之士也韓信納其計則燕齊舉陳餘不用其謀則泜水敗由此觀之漢祖之聽未必一闇一聰也在于精與不精耳廣武之謀非為一拙一工也在用與不用耳不可謂事濟者有計策之士覆敗者無深謀之臣也吳王夫差拒子胥之謀納宰嚭之說國滅身亡者不可謂無深謀之臣也楚懷王拒屈原之計納靳尚之策沒秦而不反者不可謂無計畫之士也虞公不用宮奇之謀滅于晉仇由不聽赤章之言亡于智氏蹇叔之哭不能濟崤澠之覆趙括之母不能救長平之敗此皆人主之聽不精不審耳由此觀之天下之國莫不皆有患臣謀士也或喪師敗軍危身亡國者誠在人主之聽不精不審取忠臣謀博士將何國無之乎群書治要臣以為忠良慮治益國之臣必竭誠納謀懇惻而不隱者欲以究盡治亂之數舒展安危之策耳故準聖主明君莫不皆有獻可退否納忠之臣也昔者帝舜大聖之君也猶有咎繇獻謨夏禹納戒暨至殷之成湯周之文武皆亦至聖之君也然必俟伊尹為輔呂尚為師然後乃能興功濟業混一天下者誠視聽之聰察須忠良為耳目也由此觀之忠良慮治益國之臣者得不師蹤往古襲迹前聖投命自盡以輔佐視聽乎夫人君者以至尊之聰聽總萬機而賢之以至貴之明察料治亂而攷焉將當能皆窮究其孔要料盡其門戶乎其數必用有所遺漏不有忠臣良謀輔佐視聽者則凡百機微有所不聞矣何以論其然乎夫人君所以尊異于人者順志養真也歡康之虞則嚴樂盈耳玩好足目美色充慾麗服適體遠眺迴望則登雲表之崇臺逍遙容豫則歷飛閣之高觀嬉乎綠水之清池遊乎桂林之芳園弋鳧與鴈從禽逐獸行與毛嬙俱入與西施處將當何從體覺窮愁之戚悴識鰥獨之難堪乎食則膳鼎几俎庶羞兼品酸甘盈備珍饌充庭奏樂而進鳴鐘而徹閒饋代至口不絕味將當何從覺飢餒之阸艱識困餓之難堪乎暑則被霧縠襲纖絺處華屋之大廈居重蔭之玄堂褰羅帷以來清風烈凝冰以遏微暑侍者御粉扇典衣易輕裳飄飄焉有秋日之涼將當何從體覺炎夏之鬱赫識毒熱之難堪乎寒則服綿袍襲輕裘綿衾貂蓐疊茵累席居隩密之深室處複帟之重幄熾猛炭于室隅以起溫御玉卮之旨酒以禦寒燄燄焉有夏日之熱將當何從體覺隆冬之慘烈識毒寒之難堪乎此數者誠無從得而知之者也凡百機微如此比類者必用遺漏有所未詳也如此則至忠之臣者得不輔佐視聽以起寤遺忘乎群書治要用兵第八天生五材民竝用之廢一不可誰能去兵故兵之來也久矣所以威不軌而昭文德所以討彊暴而除殘賊也聖人以興亂人以廢廢興存亡皆兵之由也昔五帝不能偃況衰世乎濫殺無辜之民以養不義之君非兵之體也殫天下之財以贍一人之求非兵之體也怙其率卒之彊矜其變詐之謀欲以定威取名非兵之體也虜其君隸其臣遷其社易其民非兵之體也故夫霸王之用兵也始之以義終之以仁將以存亡非以危存也將以禁暴非以為暴也兵之來也以除不義而援德克其國而不傷其民廢其君而不易其政尊其後秀顯其賢良賑其孤寡恤其窮困百姓聞之欣然簞食壼漿以迎其君奚之遲也湯武之師用兵之上也誰與交鋒而接刃哉所謂善用兵者先弱敵而後戰者也若乃征之以義以責其過振之以武以威其淫懷之以德以誓其民置之以仁以救其危此四者用兵之體所謂因民之欲乘民之力也治家國理境內施仁義布德惠明勸賞黜幽昧功臣附親士卒和輯上下一心君臣同德指麾而響應此上兵之體也地廣民眾主賢將能國富賞罰信未至交兵而敵人亡遁此次兵之體也知地之形因險阸之利明奇正之變審進退之宜援枹而鼓之黃塵四起乃以決勝此用兵之下非兵之體也夫德義足以懷天下之民事業足以當天下之怠選舉足以得賢才之用則兵之所加若勁風振槁此兵之體也己上六條竝御覽二百七十一恕性疏惰但飽食而已家有書傳頗嘗涉歷父憂行喪在禮多愆孝聲不聞後除中郎又作黃門郎同朝友人問余志余荅曰見大臣論議或黨甲苦乙所親或黨乙謗甲所親余處甲乙之閒幸無毀譽耳意林以為人倫之大綱莫重于君臣立身之基本莫大于言行安上理民莫精于政法勝殘去殺莫善于用兵夫禮也者萬物之體也萬物皆得其體無有不善故謂之體論三國志本傳引杜氏新書蓋用體論自敘篇篤論水性勝火分之以金甑則火強而水弱人性勝志分之以利欲則志強而性弱意林攷實性行莫過于鄉閭校才選能莫善于對策意林案此二條當是興性論漢伐匈奴取胡麻蒲萄大麥苜蓿示廣地蓺文類聚八十七引杜恕篤邊論案此條篤論之言邊事者邊是篇名聖人之制刑也非以害民也將以利民也故民從而安之非以陷民也將以導民也故民從而化之斷一人之獄而天下義之是安之也斷一人之獄而天下伏之是化之也當于民心合于道理所斷于民者不行于身公之也御覽六百三十六日給之華與柰相似也柰結實而日給零落虛偽之態與真實相似也虛偽敗而真實成御覽九百九十夫萍之浮與菱之浮相似也菱植根萍隨波是以堯舜歎巧言之亂德仲尼惡紫之奪朱御覽九百七十五又一千杜氏始出帝堯在周為唐杜氏漢世有杜周杜欽杜篤意林案此敘傳篇畿字伯侯魏書有傳意林案魏書王沈撰沈卒于晉泰始二年恕卒于魏嘉平四年魏書之成未必在嘉平前則敘傳晉人編附畿為河東太守平虜將軍劉勳為太祖所親貴震朝廷嘗從畿求大棗畿拒以他故後勳伏法太祖得其書歎曰杜畿可謂不媚于竈者也稱畿功美以下州郡曰昔仲尼之于顏子每言不能不歎既情愛發中又宜率馬以驥今吾亦冀眾人仰高山慕景行也魏志杜畿傳注御覽九百六十五竝引杜氏新書畿長子恕字務伯恕第理字務仲少而機察精要畿奇之故名之曰理年二十一而卒少子寬字務叔清虛玄靜敏而好古以名臣門戶少長京師而篤志博學絕于世務其意欲探賾索隱由此顯名當塗之士多交焉舉孝廉除郎中年四十二而卒經傳之義多所論駮皆草創未就惟刪集禮記及春秋左氏傳解今存于世魏志本傳注引杜氏新書意林引篤論案意林作畿長子理字務仲少而機察故名曰理少子恕字務伯意林轉寫不無倒誤應以伯仲叔為次今依本傳注為正恕少與馮翊李豐俱為父任總角相善及各成人豐砥礪名行以要世譽而恕誕節直意與豐殊趣豐竟馳名一時京師之士多為之游說而當路者或以豐名過其實而恕被褐懷玉也由是為豐所不善恕亦任其自然不力行以合時豐以顯仕朝廷恕猶家居自若明帝以恕大臣子擢拜散騎侍郎數月轉補黃門侍郎魏志本傳注引杜氏新書時李豐為常侍黃門郎袁侃見轉為吏部郎荀俁出為東郡太守二人皆恕之同班友善魏志本傳注引杜氏新書陛下謂以今世無良才朝廷乏賢佐豈可追望前世之稷契坐待後來之俊乂可能治乎意林引篤論案此疏魏志本傳有全文疑本傳所載三疏皆當在篤論中今既入文集不復具載恕遂去京師營宜陽一泉隖因其壘塹之固小大家焉明帝崩時人多為恕言者魏志本傳注引杜氏新書恕在河東坐臥恆避父住處意林喜欲恕折節謝已諷司馬宋權示之以微意恕荅權書曰況示委曲夫法天下事以善言相待無不致快也以不善意相待無不致嫌隙也而議者言凡人天性皆不善不當待以善意更墮其調中僕得此輩便欲歸蹈東海乘桴耳不能自諧在其閒也然以年五十二不見廢棄者頗亦遭明達君子亮其本心若不見亮使人刳心著地正與數斤肉相似耳何足有所明邪故終不自解說程征北功名宿著在僕前甚多有人出征北乎若令下官事無大小咨而後行則非上司彈繩之意若咨而不從又非上下相順之宜故推一心順一意直而行之耳殺胡之事天下謂之是邪是僕諧也呼為非邪僕自受之無所怨咎程征北明之亦善不明之亦善諸君子自共為其心耳不在僕言也喜于是遂深文刻恕魏志本傳注引杜氏新書御覽三百七十六引篤論武字文業闊達博通淵雅之士位止清河太守武弟炳字叔文河南尹精意醫術撰藥方一部炳子坦字弘舒晉太子少傅平東將軍坦弟柯字士度魏志本傳注引杜氏新書
