body:
  text: 文帝一愁霖賦脂余車而秣馬將言旋乎鄴都玄雲黯其四塞雨濛濛而襲予塗漸洳以沈滯潦淫衍而橫湍豈在余之憚勞哀行旅之艱難仰皇天而歎息悲白日之不暘思若木以照路假龍燭之末光藝文類聚二喜霽賦乃命駕而言歸啟吉日而北巡厭群萌之至願感上下之明神密雲興之坱扎甘雨降以灑塵既灑塵而為塗惟平路之未晞激清風以漂潦發皎日之揚暉振余策而長驅忽臨食而忘飢思寄身于鴻鸞舉六翮而輕飛藝文類聚二文選陸機為顧彥先贈婦詩注石崇王明君辭注濟川賦臨濟川之層淮覽洪波之容裔濞騰揚以相薄激長風而亟逝漫浩汗而難測眇不覩其垠際于是龜龍神嬉鴻鸞群翔鱗介霍驛載止載行俯唼菁藻仰飧若芳永號長吟延首相望美玉昭晰以曜煇明珠灼灼而流光于是遊覽既厭日亦西傾朱旗電曜擊鼓雷鳴長驅風厲悠爾北征思魏都以偃息託華屋而遨遊酌玄清于金罍騰羽觴以獻酬藝文類聚八臨渦賦并序并序臨渦賦并序上建安十八年至譙余兄弟從上拜墳墓遂乘馬遊觀經東園遵渦水相佯乎高樹之下駐馬書鞭為臨渦之賦曰藝文類聚八初學記九又二十二御覽三百五十九五百八十七蔭高樹兮臨曲渦微風起兮水增波魚頡頏兮鳥逶迤雌雄鳴兮聲相和蓱藻生兮散莖柯春木繁兮發丹華藝文類聚八滄海賦美百川之獨宗壯滄海之威神經扶桑而遐逝跨天崖而託身驚濤暴駭騰踊澎湃鏗訇隱鄰涌沸淩邁于是黿鼉漸離泛濫淫遊鴻鸞孔鵠哀鳴相求揚鱗濯翼載沈載浮仰唼芳芝俛漱清流巨魚橫奔厥勢吞舟爾乃釣大貝採明珠搴懸黎收武夫窺大麓之潛林覩搖木之羅生上蹇產以交錯下來風之泠泠振綠葉以葳蕤吐芬葩而揚榮藝文類聚八述征賦建安之十三年荊楚傲而弗臣命元司以簡旅予願奮武乎南鄴伐靈鼓之硼隱兮建長旗之飄颻躍甲卒之皓旴馳萬騎之瀏瀏揚凱悌之豐惠兮仰乾威之靈武伊皇衢之遐通兮維天綱之畢舉經南野之舊都聊弭節而容與遵往初之舊迹順歸風以長邁鎮江漢之遺民靜南畿之遐裔藝文類聚五十九羨西門之嘉迹忽遙睇其靈宇水經濁漳水注浮淮賦并序并序浮淮賦并序建安十四年王師自譙東征大興水運泛舟萬艘時余從行始入淮口行洎東山覩師徒觀旌帆赫哉盛矣雖孝武盛唐之狩舳艫千里殆不過也乃作斯賦云泝淮水而南邁兮泛洪濤之湟波仰嵓岡之崇阻兮經東山之曲阿浮飛舟之萬艘兮建干將之銛戈揚雲旗之繽紛兮聆榜人之讙譁乃撞金鐘爰伐雷鼓白旄沖天黃鉞扈扈武將奮發驍騎赫怒于是驚風泛涌波駭眾帆張群櫂起爭先遂進莫適相待北堂書鈔一百三十七藝文類聚八初學記六御覽七百七十戒盈賦并序并序戒盈賦并序避暑東閣延賓高會酒酣樂作悵然懷盈滿之戒乃作斯賦惟應龍之將舉飛雲降而下征資物類之相感信貫徹之通靈何今日之延賓君子紛其集庭信臨高而增懼獨處滿而懷愁願群士之箴規博納我以良謀藝文類聚二十二離居賦惟離居之可悲塊獨處于空床愁耿耿而不寐歷終夜之悠長驚風厲于閨闥忽增激于中房動惟裳之晻曖對明燭而無光藝文類聚三十初學記十八感離賦并序并序感離賦并序建安十六年上西征余居守老母諸弟皆從不勝思慕乃作賦曰秋風動兮天氣涼居常不快兮中心傷出北園兮彷徨望眾慕兮成行柯條憯兮無色綠草變兮萎黃感微霜兮零落隨風雨兮飛揚日薄暮兮無悰思不衰兮愈多招延佇兮良久忽踟躕兮忘家蓺文類聚三十永思賦仰北辰而永思泝悲風以增傷哀遐路之漫漫痛長河之無梁願託乘于浮雲嗟逝速之難當藝文類聚三十出婦賦念在昔之恩好似比翼之相親惟方今之疏絕若驚風之吹塵夫色衰而愛絕信古今其有之傷煢獨之無恃恨胤嗣之不滋甘沒身而同穴終百年之常期信無子而應出自典禮之常度悲谷風之不荅怨昔人之忽故被入門之初服出登車而就路遵長塗而南邁馬躊躇而迴顧野鳥翩而高飛愴哀鳴而相慕撫騑服而展節即臨沂之舊城踐麋鹿之曲蹊聽百鳥之群鳴情悵恨而顧望心鬱結其不平藝文類聚三十悼夭賦并序并序悼夭賦并序族弟文仲亡時年十一母氏傷其夭逝追悼無已予以宗族之愛乃作斯賦氣紆結以填胸不知涕之縱橫時徘徊于舊處覩靈衣之在床感遺物之如故痛爾身之獨亡愁端坐而無聊心慼慼而不寍步廣廈而踟躕覽萱草于中庭悲風蕭其夜起秋氣憯以厲情仰瞻天而太息聞別鳥之哀鳴藝文類聚三十四悼夭賦并序并序寡婦賦并序陳留阮元瑜與余有舊薄命早亡每感存其遺孤未嘗不愴然傷心故作斯賦以敘其妻子悲苦之情命王粲竝作之藝文類聚二十四文選潘岳寡婦賦注惟生民兮艱危在孤寡兮常悲人皆處兮歡樂我獨怨兮無依撫遺孤兮太息俛哀傷兮告誰三辰周兮遞照寒署運兮代臻歷夏日兮苦長涉秋夜兮漫漫微霜隕兮集庭燕雀飛兮我前去秋兮既冬改節兮時寒水凝兮成冰雪落兮翻翻傷薄命兮寡獨內惆悵兮自憐藝文類聚三十四感物賦并序并序感物賦并序喪亂以來天下城郭丘墟惟從太僕君宅尚在南征荊州還過鄉里舍焉乃種諸蔗于中庭涉夏歷秋先盛後衰悟興廢之無常慨然永歎乃作斯賦伊陽春之散節悟乾坤之交靈瞻玄雲之蓊鬱仰沈陰之杳冥降甘雨之豐霈垂長溜之泠泠堀中堂而為圃植諸蔗于前庭涉炎夏而既盛迄凜秋而將衰豈在斯之獨然信人物其有之藝文類聚三十四哀己賦蒙君子之博愛垂迫望之渥思文選陸雲為顧彥先贈婦詩注登臺賦并序并序登臺賦并序建安十七年春遊西園登銅雀臺命余兄弟竝作其詞曰登高臺以騁望好靈雀之麗嫺飛閣崛其特起層樓儼以承天步逍遙以容與聊遊目于西山溪谷紆以交錯草木鬱其相連風飄飄而吹衣鳥飛鳴而過前申躊躇以周覽臨城隅之通川藝文類聚六十二登城賦孟春之月惟歲權輿和風初畼有穆其舒駕言東邁陟彼城隅逍遙遠望乃欣以娛平原博敞中田闢除嘉麥被壟緣路帶衢流莖散葉列倚相扶水幡幡以長流魚裔裔而東馳風飄颻而既臻日掩薆而西移望舊館而言旋永優游而無為藝文類聚六十三初學記二十四校獵賦高宗征于鬼方兮黃帝有事于阪泉慍賊備之作戾兮忿吳夷之不藩將訓兵于講武兮因大蒐乎田隙初學記二十二披高門而方軌邁夷塗而直駕同上長鎩糺霓飛旗拂天部曲按列什伍相連跱如叢林動若崩山抗沖天之素旄兮靡格澤之修旃雄戟趪而躍厲兮黃鉞扈而揚鮮超崇岸之曾崖厲漳澨之雙川千乘亂擾萬騎奔走經營原隰騰越峻阻彤弓斯彀戈鋋具舉列翠星陳戎車方轂風迴雲轉埃連飆屬雷響震天地譟聲蕩川岳遂躙封狶藉麈鹿捎飛鳶接鸑鷟聚者成丘陵散者闐溪谷流血赫其丹野羽毛紛其翳目考功效績班賜有敘授受甘炰飛酌清酤割鮮野烹舉爵鳴鼓鑾輿促節騁轡迴翔望爵臺而增舉涉幽壍之花梁藝文類聚六十六御覽三百三十九引兩條登路寢而聽政總群司之紀綱逍遙後庭休息閑房步輦西園還坐玉堂初學記二十四蔡伯喈女賦序序蔡伯喈女賦序家公與蔡伯喈有管鮑之好乃命使者周近持玄璧于匈奴贖其女還以妻屯田都尉使者御覽八百六玉玦賦有昆山之妙璞產曾城之峻崖嗽丹水之炎波蔭瑤樹之玄枝包黃中之純氣抱虛靜而無為應九德之淑懿體五材之表儀藝文類聚六十七彈棊賦惟彈棊之嘉巧邈超絕其無儔苞上智之弘略允貫微而洞幽局則荊山妙璞發藻揚暉豐腹高隆庳根四穨平如砥礪滑若柔荑棊則玄木北幹素樹西枝洪纖若一修短無差象籌列植一據雙螭滑石霧散雲布四垂然後直叩先縱二八次舉緣邊閒造長邪迭取爾乃詳觀夫變化之理屈伸之形聯翩靃繹展轉盤縈或暇豫安存或窮困側傾或接黨連興或孤據偏停于時觀者莫不虛心竦踊咸側息而延佇或雷抃以大噱或戰悸而不能語藝文類聚七十四文石為局金碧齊精隆中夷外理緻肌平御覽七百五十五迷迭賦并序并序迷迭賦并序余種迷迭于中庭嘉其揚條吐香馥有令芳乃為之賦曰坐中堂以遊觀兮覽芳草之樹庭重妙葉于纖枝兮揚修榦而結莖承靈露以潤根兮嘉日月而敷榮隨迴風以搖動兮吐芳氣之穆清薄六夷之穢俗兮越萬里而來征豈眾卉之足方兮信希世而特生藝文類聚八十一御覽九百八十二瑪瑙勒賦并序并序瑪瑙勒賦并序瑪瑙玉屬也出自西域文理交錯有似馬腦故其方人因以名之或以繫頸或以飾勒余有斯勒美而賦之命陳琳王粲竝作其詞曰有奇章之珍物寄中山之崇岡稟金德之靈施含白虎之華章扇朔方之玄氣喜南離之焱陽歙中區之黃采曜東夏之純蒼苞五色之明麗配皎日之流光命夫良工是剖是鐫追形逐好從宜索便乃加砥礪刻方為圓沈光內炤浮景外鮮繁文縟藻交采接連奇章的皪其間嘉鏤鍚之盛美感戎馬之首飾圖茲物之攸宜信君子之所服爾乃藉彼朱罽華勒用成駢居列跱煥若羅星北堂書鈔一百二十六藝文類聚八十四御覽三百五十八八百八車渠椀賦并序并序車渠椀賦并序車渠玉屬也多纖理縟文生于西國其俗寶之小以繫頸大以為器惟二儀之普育何萬物之殊形料珍怪之上美無茲椀之獨靈苞華文之光麗發符采而揚榮理交錯以連屬似將離而復并或若朝雲浮高山忽似飛鳥厲蒼天夫其方者如矩圓者如規稠希不謬洪纖有宜藝文類聚八十四御覽八百八槐賦并序并序槐賦并序文昌殿中槐樹盛暑之時余數遊其下美而賦之王粲直登賢門小閣外亦有槐樹乃就使賦焉有大邦之美樹惟令質之可嘉託靈根于豐壤被日月之光華周長廊而開趾夾通門而駢羅承文昌之邃宇望迎風之曲阿修幹紛其漼錯綠葉萋而重陰上幽藹而雲覆下莖立而擢心伊暮春之既替即首夏之初期鴻雁遊而送節凱風翔而迎時天清和而溫潤氣恬淡以安治違隆暑而適體誰謂此之不怡藝文類聚八十八柳賦并序并序柳賦并序昔建安五年上與袁紹戰于官渡是時余始植斯柳自彼迄今十有五載矣左右僕御已多亡感物傷懷乃作斯賦曰伊中域之偉木兮瑰姿妙其可珍稟靈祇之篤施兮與造化乎相因四氣邁而代運兮去冬節而涉春彼庶卉之未動兮固肈萌而先辰盛德遷而南移兮星鳥正而司分應隆時而繁育兮揚翠葉之青純修榦偃蹇以虹指兮柔條阿那而虵伸上枎疏而孛散兮下交錯而龍鱗在余年之二七植斯柳乎中庭始圍寸而高尺今連拱而九成嗟日月之逝邁忽舋舋以遄征昔周遊而處此今倏忽而弗形感遺物而懷故俛惆悵以傷情于是曜靈次乎鶉首兮景風扇而增煖豐弘陰而博覆兮躬愷悌而弗倦四馬望而傾蓋兮行旅仰而迴睠秉至德而不伐兮豈簡卑而擇賤含精靈而奇生兮保休體之豐衍惟尺斷而能植兮信永貞而可羨藝文類聚八十九文選石崇王明君辭注初學記二十八御覽九百五十七鶯賦并序并序鶯賦并序堂前有籠鶯晨夜哀鳴悽若有懷憐而賦之曰怨羅人之我困痛密網而在身顧窮悲而無告知時命之將泯升華堂而進御奉明后之威神唯今日之僥倖得去死而就生託幽籠以栖息厲清風而哀鳴藝文類聚九十二
