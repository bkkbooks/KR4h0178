body:
  text: 劉曄議追尊宜不過高皇疏聖帝孝孫之欲襃崇先祖誠無量已然親疏之數遠近之降蓋有禮紀所以割斷私情克成公法為萬世式也周王所以上祖后稷者以其佐唐有功名在祀典故也至于漢氏之初追諡之義不過其父上比周室則大魏發迹自高皇始下論漢氏則追諡之禮不及其祖此誠往代之成法當今之明義也陛下孝思中發誠無已已然君舉必書所以慎于禮制也曄思以為追尊之義宜齊高皇而已魏志劉曄傳通典七十二遺魯肅書方今天下豪傑竝起吾子姿才尤宜今日急還迎老母無事滯于東城近鄭寶者今在巢湖擁眾萬餘處地肥饒廬江閒人多依就之況吾徒乎觀其形勢又可博集時不可失足下速之吳志魯肅傳重請合肥移城表孫子言兵者詭道也故能而示之以弱不能驕之以利示之以懾此為形實不必相應也又曰善動敵者形之今賊未至而移城卻內此所謂形而誘之也引賊遠水擇利而動舉得于外則福生于內矣魏志滿寵傳請備無彊口疏曹休雖明果而希用兵今所從道背湖旁江易進難退此兵之窪地也若入無彊口宜深為之備魏志滿寵傳請合肥移兵更立城疏合肥城南臨江湖北遠壽春賊攻圍之得據水為勢官兵救之當先破賊大輩然後圍乃得解賊往甚易而兵往救之甚難宜移城內之兵其西三十里有奇險可依更立城以固守此為引賊平地而掎其歸路于計為便魏志滿寵傳敕諸將今夕風甚猛賊必來燒軍宜為其備魏志滿寵傳敕留府長史若淩欲往迎勿與兵也魏志滿寵傳為王淩報孫布書知識邪正欲避禍就順去暴歸道甚相嘉尚今欲遣兵相迎然計兵少則不足相衛多則事必遠聞且先密計以成本志臨時節度其宜魏志滿寵傳白司馬宣王書五子哀母不惜其身若無其母是無五子無五子亦無淮也今輒追還若于法未通當受罪于主者覲展在近魏志郭淮傳注引世語又世說亦有約文制新科下州郡上言自喪亂已來民人失所今雖小安然服教日淺所下新科皆以明罰敕法齊一大化也所領六縣疆域初定加以饑饉若一切齊以科禁恐或有不從教者有不從教者不得不誅則非觀民設教隨時之意也先王辨九服之賦以殊遠近制三典之刑以平治亂愚以為此郡宜依遠域新邦之典其民閒小事使長吏臨時隨宜上不背正法下以順百姓之心比及三年民安其業然後齊之以法則無所不至矣魏志何夔傳入為丞相東曹掾上言自軍興以來制度草創用人未詳其本是以各引其類時忘道德夔聞以賢制爵則民慎德以庸制祿則民興功以為自今所用必先核之鄉閭使長幼順敘無相踰越顯忠直之賞明公實之報則賢不肖之分居然別矣又可修保舉故不以實之令使有司別受其負在朝之臣時受教與曹竝選者各任其責上以觀朝臣之節下以塞爭競之源以督群下以率萬民如是則天下幸甚魏志何夔傳諫治宮室發美女疏臣聞明主在上群下盡辭堯舜聖德求非索諫大禹勤功務卑宮室成湯遭旱歸咎責己周文刑于寡妻以御家邦漢文躬行節儉身衣弋綈此皆能昭令聞貽厥孫謀者也伏惟陛下奉武皇帝開拓之大業守文皇帝克終之元緒誠宜思齊往古聖賢之善治總觀季世放盪之惡政所謂善治者務儉約重民力也所謂惡政者從心恣欲觸情而發也惟陛下稽古世代之初所以明赫及季世所以衰弱至于泯滅近覽漢末之變是以動心誡懼矣曩使桓靈不廢高祖之法文景之恭儉太祖雖有神武于何所施其能邪而陛下何由處斯尊哉今吳蜀未定軍旅在外願陛下動則三思慮而後行重慎出入以往鑒來言之若輕成敗甚重頃者天雨又多卒暴雷電非常至殺鳥雀天地神明以王者為子也政有不當則見災譴克己內訟聖人所記惟陛下慮患無形之外慎萌纖微之初法漢孝文出惠帝美人令得自嫁頃所調送小女遠聞不令宜為後圖諸所繕治務從約節書曰九族既睦協和萬國事思厥宜以從中道精心計謀省息費用吳蜀以定爾乃上安下樂九親熙熙如此以往祖考心歡堯舜其猶病諸今宜開大信于天下以安眾庶以示遠人魏志楊阜傳伐蜀遇雨上疏昔文王有赤烏之符而猶日昃不暇食武王白魚入舟君臣變色而動得吉瑞猶尚憂懼況有災異而不戰竦者哉今吳蜀未平而天屢降變陛下宜深有以專精應荅側席而坐思示遠以德綏邇以儉閒者諸軍始進便有天雨之患稽閡山險以積日矣轉運之勞擔負之苦所費以多若有不繼必違本圖傳曰見可而進知難而退軍之善政也徒使六軍困于山谷之閒進無所略退又不得非主兵之道也武王還師殷卒以亡知天期也今年凶民饑宜發明詔損膳減服技巧珍玩之物皆可罷之昔邵信臣為少府于無事之世而奏罷浮食今者軍用不足益宜節度魏志楊阜傳諫帝送葬平原公主疏文皇帝武宣皇后崩陛下皆不送葬所以重社稷備不虞也何至孩抱之赤子而可送葬也故魏志楊阜傳諫營洛陽宮殿觀閣疏堯尚茅茨而萬國安其居禹卑宮室而天下樂其業及至殷周或堂崇三尺度以九筵耳古之聖帝明王未有極宮室之高麗以彫獘百姓之財力者也桀作琁室象廊紂為傾宮鹿臺以喪其社稷楚靈以築章華而身受其禍秦始皇作阿房而殃及其子天下叛之二世而滅夫不度萬民之力以從耳目之欲未有不亡者也陛下當以堯舜禹湯文武為法則夏桀殷紂楚靈秦皇為深誡高高在上實監后德慎守天位以承祖考巍巍大業猶恐失之不夙夜敬止允恭卹民而乃自暇自逸惟宮臺是侈是飾必有顛覆危亡之禍易曰豐其屋蔀其家闚其戶𨶑其無人王者以天下為家言豐屋之禍至于家無人也方今二虜合從謀危宗廟十萬之軍東西奔赴邊境無一日之娛農夫廢棄民有飢色陛下不以是為憂而營作宮室無有已時使國亡而臣可以獨存臣又不言也君作元首臣為股肱存亡一體得失同之孝經曰天子有爭臣七人雖無道不失其天下臣雖駑怯敢忘爭臣之義言不切至不足以感寤陛下陛下不察臣言恐皇祖烈考之祚將墜于地使臣身死有補萬一則死之日猶生之年也謹叩棺沐浴伏俟重誅魏志楊阜傳讓封關內侯阜君存無扞難之功君亡無死節之效于義當絀于法當誅超又不死無宜苟荷爵祿魏志楊阜傳應詔議政治不便于民致治在于任賢興國在于務農若舍賢而任所私此忘治之甚者也廣開宮館高為臺榭以妨民務此害農之甚者也百工不敦其器而競作奇巧以合上欲此傷本之甚者也孔子曰苛政甚于猛虎今守功文俗之吏為政不通治體苟好煩苛此亂民之甚者也當今之急宜去四甚竝詔公卿郡國舉賢良方正敦樸之士而選用之此亦求賢之一端也魏志楊阜傳諫修殿舍疏竊聞諸葛亮講武治兵而孫權市馬遼東量其意指似欲相左右備豫不虞古之善政而今者宮室大興加連年穀麥不收詩云民亦勞止迄可小康惠此中國以綏四方唯陛下為社稷計魏志辛毗傳諫平北芒疏天地之性高高下下今而反之既非其理加以損費人功民不堪役且若九河盈溢洪水為害而丘陵皆夷將何以禦之魏志辛毗傳奏請宣著符命侍中辛毗劉曄散騎常侍傅巽衛臻尚書令桓階尚書陳矯陳群給事中博士騎都尉蘇林董巴等奏曰伏見太史丞許芝上魏國受命之符令書懇切允執謙讓雖舜禹湯文義無以過然古先哲王所以受天命而不辭者誠急遵皇天之意副兆民之望弗得已也且易曰觀乎天文以察時變觀乎人文以化成天下又曰天垂象見吉凶聖人則之河出圖洛出書聖人效之以為天文因人而變至于河洛之書著于洪範則殷周效而用之矣斯言誠帝王之明符天道之大要也是以由德應錄者代興于前失道數盡者迭廢于後傳譏萇弘欲支天之所壤而說蔡墨雷乘乾之說明神器之存亡非人力所能建也今漢室衰替帝綱墮墜天子之詔歇滅無聞皇天將捨舊而命新百姓既去漢而為魏昭然著明是可知也先王撥亂平世將建洪基至于殿下以至德當厤數之運即位以來天應人事粲然大備神靈圖籍兼仍往古休徵嘉兆跨越前代是芝所取中黃運期姓緯之讖斯文乃著于前世與漢竝見由是言之天命久矣非殿下所得而拒之也神明之意候望禋享兆民顒顒咸注嘉願惟殿下覽圖籍之明文急天下之公義輒宣令內外布告州郡使知符命著明而殿下謙虛之意魏志文帝紀注引獻帝傳辛毗劉曄等奏又略見蓺文類聚十三奏事昔桓階為尚書令以崔林非尚書才遷以為河閒太守魏志崔林傳注引魏名臣奏改正朔議魏氏遵舜禹之統應天順民至于湯武以戰伐定天下乃改正朔孔子曰行夏之時左氏傳曰夏數為得天正何必期于相反魏志辛毗傳除妖謗賞告之法疏令妖言者必戮告之者輒賞既使過誤無反善之路又將開凶狡之群相誣罔之漸誠非所以息奸省訟緝熙治道也昔周公作誥稱殷之祖宗咸不顧小人之怨在漢太宗亦除妖言誹謗之令臣愚以為宜除妖謗賞告之法以隆天父養物之仁魏志高柔傳三公希與朝政上疏天地以四時成功元首以輔弼興治成湯杖阿衡之佐文武憑旦望之力逮至漢初蕭曹之儔竝以元勳代作心膂此皆明王聖主任臣于上賢相良輔股肱于下也今公輔之臣皆國之棟梁民所具瞻而置之三事不使知政遂各偃息養高鮮有進納誠非朝廷崇用大臣之義大臣獻可替否之謂也古者刑政有疑輒議于槐棘之下自今之後朝有疑議及刑獄大事宜數以咨訪三公三公朝朔望之日又可特延入講論得失博盡事情庶有裨起天聽弘益大化魏志高柔傳請待博士以不次之位疏臣聞遵道重學聖人洪訓襃文崇儒帝者明義昔漢末陵遲禮樂崩壞雄戰虎爭以戰陣為務遂使儒林之群幽隱而不顯太祖初興愍其如此在于撥亂之際竝使郡縣立教學之官高祖即位遂闡其業興復辟雍州立課試于是天下之士復聞庠序之教親俎豆之禮焉陛下臨政允迪叡哲敷弘大猷光濟先軌雖夏啟之承基周成之繼業誠無以加也然今博士皆經明行修一國清選而使遷除限不過長懼非所以崇顯儒術帥勵怠墮也孔子稱舉善而教不能則勸故楚禮申公學士銳精漢隆卓茂縉紳競慕臣以為博士者道之淵藪六蓺所宗宜隨學行優劣待以不次之位敦崇道教以勸學者于化為弘魏志高柔傳諫大興殿舍廣采眾女疏二虜狡猾潛自講肄謀動干戈未圖束手宜畜養將士繕治甲兵以逸待之而頃興造殿舍上下勞擾若使吳蜀知人虛實通謀并勢復俱送死甚不易也昔漢文惜十家之資不營小臺之娛去病慮匈奴之害不遑治第之事況今所損者非惟百金之費所憂者非徒北狄之患乎可粗成見所營立以充朝宴之儀訖罷作者使得就農二方平定復可徐興昔軒轅以二十五子傳阼彌遠周室以姬國四十歷年滋多陛下聰達窮理盡性而頃皇子連多夭逝熊羆之祥又未感應群下之心莫不悒戚周禮天子后妃以下百二十人嬪嬙之儀既以盛矣竊聞後庭之數或復過之聖嗣不昌殆能由此臣愚以為可妙𥳑淑媛以備內宮之數其餘遣還家且以育精養神專靜為寶如此則螽斯之徵可庶而致矣魏志高柔傳諫就獄殺公孫晃疏書稱用罪伐厥死用德彰厥善此王制之明典也晃及妻子叛逆之類誠應梟縣勿使遺育而臣竊聞晃先數自歸陳淵禍萌雖為凶族原心可恕夫仲尼亮司馬牛之憂祁奚明叔向之過在昔之美義也臣以為晃信有言宜貸其死苟自無言使當市斬今進不赦其命退不彰其罪閉著囹圄使自引分四方觀國或疑此舉也魏志高柔傳諫罪殺禁地鹿者疏聖王之御世莫不以廣農為務儉用為資夫農廣則穀積用儉則財畜畜財積穀而有憂患之虞者未之有也古者一夫一耕或為之飢一婦不織或為之寒中閒已來百姓供給眾役親田者既減加頃復有獵禁群鹿犯暴殘食生苗處處為害所傷不貲民雖障防力不能禦至如滎陽左右周數百里歲略不收元元之命實可矜傷方今天下生財者甚少而麋鹿之損者甚多卒有兵戎之役凶年之災將無以待之惟陛下覽先聖之所念愍稼穡之艱難寬放民閒使得捕鹿遂除其禁則眾庶永濟莫不悅預矣臣深思陛下所以不早取此鹿者誠欲使極蕃息然後大取以為軍國之用然臣竊以為今鹿但有日耗終無從得多也何以知之今禁地廣輪且千餘里臣下計無慮其中有虎大小六百頭狼有五百頭狐萬頭使大虎一頭三日食一鹿一虎一歲百二十鹿是為六百頭虎一歲食七萬二千頭鹿也使十狼日共食一鹿是為五百頭狼一歲共食萬八千頭鹿鹿子始生未能善走使十狐一日共食一子比至健走一月之閒是為萬狐一月共食鹿子三萬頭也大凡一歲所食十二萬頭其鵰鶚所害臣置不計以此推之終無從得多不如早取之為便也魏志高柔傳注引魏名臣奏案御覽九百六引魏名臣奏作郎中黃觀上疏疑當時兩人連名軍士亡勿罪妻子啟士卒亡軍誠在可疾然竊聞其中時有悔者愚謂乃宜貸其妻子一可使賊中不信二可使誘其還心正如前科固已絕其意望而猥復重之柔恐自今在軍之士見一人亡逃誅將及已亦且相隨而走不可復得殺也此重刑非所以止亡乃所以益走耳魏志高柔傳管長教還引去吏昔邴吉臨政吏嘗有非猶尚容之況此諸吏于吾未有失乎其召復之咸還皆自勵咸為佳吏魏志高柔傳丞相理曹掾令夫治定之化以禮為首撥亂之政以刑為先是以舜流四凶族皋陶作士漢祖除秦苛法蕭何定律掾清識平當明于憲典勉恤之哉魏志高柔傳與婦書今致瑇瑁梳一枚金鏆一雙御覽七百十八清河平原爭界案圖宜屬平原疏管仲霸者之佐其器猶小猶能奪伯氏駢邑使沒齒無怨言臣受牧伯之任奉聖朝明圖驗地著之界界實以王翁河為限而鄃以馬丹候為驗詐以鳴犢河為界假虛訟訴疑誤臺閣竊聞眾口鑠金浮石沈木三人成市虎慈母投其杼今二郡爭界八年一朝決之者緣有解書圖畫可得尋案㰅校也平原在兩河向東上其閒有爵隄爵隄在高唐西南所爭地在高唐西北相去二十餘里可謂長歎息流涕者也案解與圖奏而鄃不受詔此臣輭弱不勝其任臣亦何顏尸祿素餐輒束帶著履駕車待放魏志孫禮傳
