body:
  text: 桓範兗州刺史謝表兗州刺史謝表喜于復見選擢慚于不堪所職悲于戀慕闕廷三者交集不知所裁御覽二百五十五引桓氏家傳薦管寍表臣聞殷湯聘伊尹于畎畝之中周文進呂尚于渭水之濱竊見東完管寍束修著行少有令稱州閭之名亞故太尉華歆遭亂浮海遠客遼東于混濁之中履潔清之節篤行足以厲俗清風足以矯世以簞食瓢飲過于顏子漏室蔽衣踰于原憲臣聞唐堯寵許由虞舜禮支父夏禹優伯成文王養夷齊及漢祖高四皓之名屈命于商洛之野史籍歎述以為美談陛下紹五帝之鴻烈竝三王之逸軌膺期受命光昭百代仍有優崇之禮于大夫管寍寵以上卿之位榮以安車之稱斯之為美當在魏典流之無窮明世之高士也臣以為既加其大不受其細可重之以玄纁聘之殊禮矣蓺文類聚三十七正使寍病不能乘養不驎羈栖鳳拂范戟之史北堂書鈔三十三案此條多誤字無從校正薦徐宣臣聞帝王用人度世授才爭奪之時以策略為先分定之後以忠義為首故晉文行舅犯之計而賞雍季之言高祖用陳平之智而託後于周勃也古語云守文之代德高者位尊倉卒之時功多者賞厚竊見尚書徐宣體忠厚之行秉直亮之性清雅特立不拘世俗確然難動有社稷之節歷位州郡所在稱職今僕射缺宣行掌後事腹心任重莫宜宣者魏志徐宣傳長短經任長御覽六百三十一陳兵事善行兵者因敵為資故兵法從敵之意千里殺將如示其形開其利路潛設神策使若響之應聲此為江中之魚御腐索必可禽北堂書鈔一百十三一百十六引桓範集古人用兵者以長擊短然吳舍舟涉陸此為棄長用短也北堂書鈔一百十三引桓範集與管寍書鑿坯而處養德顯仁堯舜在上許由在下箕山之志于是復顯嚴平鄭真未足論比清聲遠播頑鄙慕仰思請見于蓬廬之側承訓誨于道德之門厥塗無由託思晨風蓺文類聚三十七為君難世要論或曰仲尼稱為君難夫人君者處尊高之位執賞罰之柄用人之才因人之力何為不成何求不得功立則受其功治成則厚其福故官人舜也治水禹也稼穡棄也理訟皋陶也堯無事焉而由之聖治何為君難邪曰此其所以為難也夫日月光照于晝夜風雨動潤于萬物陰陽代以生殺四時迭以成歲不見天事而猶貴之者其所以運氣陶演協和施化皆天之為也是以天萬物之覆君萬物之燾也懷生之類有不浸潤于澤者天以為負員首之民有不霑濡于惠者君以為恥是以在上者體人君之大德懷恤下之小心闡化立教必以其道發言則通四海行政則動萬物慮之于心思之于內布之于天下正身于廟堂之上而化應于千里之外雖黈纊塞耳隱屏而居照幽達情燭于宇宙動作周旋無事不慮服一綵則念女功之勞御一穀則恤農夫之勤決不聽之獄則懼刑之不中進一士之爵則恐官之失賢賞毫釐之善必有所勸罰纖芥之惡必有所沮使化若春風澤如時雨消凋汙之人移薄偽之俗救衰世之獘反之于上古之樸至德加于天下惠厚施于百姓故民仰之如天地愛之如父母敬之如神明畏之如雷霆且佐治之臣歷世難遇庸人眾而賢才寡是故君人者不能皆得稷契之幹伊呂之輔猶造父不能皆得騏驥之乘追風之四也御踶齧必煩轡銜統庸臣必勞智慮是以人君其所以濟輔群下均養大小審覈真偽攷察變態在于幽冥窈妙之中割毫折芒纖微之間非天下之至精孰能盡于此哉故臣有立小忠以售大不忠效小信以成大不信可不慮之以詐乎臣有貌厲而內荏色取仁而行違可不慮之以虛乎臣有害同儕以專朝塞下情以壅上可不慮之以嫉乎臣有進邪說以亂是因似然以傷賢可不慮之以讒乎臣有因賞以償恩因罰以作威可不慮之以奸乎臣有外顯相薦內陰相除謀事託公而實俠私可不慮之以欺乎臣有事左右以求進託重臣以自結可不慮之以偽乎臣有和同以取諧苟合以求進可不慮之以禍乎臣有悅主意以求親悅主言以取容可不慮之以佞乎此九慮者所以防惡也臣有辭拙而意工言逆而事順可不恕之以直乎臣有樸騃而辭訥外疏而內敏可不恕之以質乎臣有犯難以為上離謗以為國可不恕之以忠乎臣有守正以逆眾意執法而違私志可不恕之以公乎臣有不曲己以求合不耦世以取名可不恕之以貞乎臣有從側陋而進顯言由卑賤而陳國事可不恕之以難乎臣有孤特而執節介立而見毀可不恕之以勁乎此七恕者所以進善也接下之理御臣之道豈徒七恕九慮而已哉群書治要臣不易昔孔子言為臣不易或人以為易言臣之事君供職奉命敕身恭己忠順而已忠則獲寵安之福順則無危辱之憂曷為不易哉此言似易論之甚難夫君臣之接以愚奉智不易以明事闇為難唯以賢事聖以聖事賢為可然賢聖相遭既稀又周公之于成王猶未能得斯誠不易也且父子以恩親君臣以義固恩有所為虧況義能無所為缺哉苟有虧缺亦何容易且夫事君者竭忠義之道盡忠義之節服勞辱之事當危之難肝腦塗地膏液潤草而不辭者以安上治民宣化成德使君為一代之聖明己為一世之良輔輔千乘則念過管晏佐天下則思醜稷禹豈為七尺之軀寵一官之貴貪充家之祿榮華囂之觀哉以忠臣之事主投命委身期以成功立事便國利民故不為難易變節安危革行也然為大臣者或仍舊德藉故勢或見拔擢重任其所以保寵成功承上安下則當遠威權之地避嫌疑之分知虧盈之數達止足之義動依典禮事念忠篤乃當匡上之行諫主之非獻可濟否匪躬之故剛亦不吐柔亦不茹所謂大臣以道事君也然當託于幽微當行于隱密使怨咎從己身而眾善自君發為群寮之表式作萬官之儀範豈得偷樂容悅而已哉然或為邪臣所譖幸臣所亂聽一疑而不見信事似然而不可釋忠計詭而為非善事變而為惡罪結千天無所禱請激直言而無所訴深者即時伏劍賜死淺者以漸斥逐放棄蓋比干龍逢所以見害于飛廉惡來孔子周公所以見毀于管蔡季孫也斯則大臣所以不易也為小臣者得任則治其職受事脩其業思不出其位慮不過其職竭力致誠忠信而已然或困辱而不均厭抑而失所是以賢者或非其議豫非其事不著其陋不嫌其卑庶貫一言而利一事然以至輕至微至疏至賤千萬乘之主約以禮義之度匡以行事之非忤執政之臣暴其所短說合則裁自若不當則離禍害或計不欲人知事不從人豫而已策謀適合陳義偶同上者或顯戮其身以神其計在下者或妬其人而奪其策蓋關思見殺于鄭韓非受誅于秦龐涓刖孫臏之足魏齊折應侯之脅斯又孤宦小臣所以為難也為小臣者一當恪恭職司出內惟允造膝詭辭執心審密忠上愛主媚不求奧竈而已若為苟若此患為外人所彈邪臣所嫉以職近而言易身親而見信奉公俠私之吏求害之以見直懷奸抱邪之臣欲除之以示忠言有若是事有似然雖父子之閒猶不能明況臣之于君而得之乎故上官毀屈平爰盎譖鼂錯公孫排主父張湯陷嚴助夫數子者雖示純德亦親近之臣所以為難也為外臣者盡力致死其義一也不以遠而自外疏而自𥳑親涉其事而掌其任苟有可以興利除害安危定亂雖避本朝之議詭常法之道陳之于主行之于身志于忠上濟事憂公無私善否之間在己典主可也然患為左右所輕重貴臣所壅制或逆而毀之使不得用或用而害之使不得成或成而譖之使不得其所吳起見毀于魏李牧見殺于趙樂毅被讒于燕章邯畏誅于秦斯又外臣所以為危也此舉梗概耳曲折纖妙豈可得備論之哉群書治要夫治國之本有二刑也德也二者相須而行相待而成矣天以陰陽成歲人以刑德成治故雖聖人為政不能偏用也故任德多用刑少者五帝也刑德相半者三王也杖刑多任德少者五霸也純用刑強而亡者秦也夫人君欲治者既達專持刑德之柄矣位必使當其德祿必使當其功官必使當其能此三者治亂之本也位當其德則賢者居上不肖者居下祿當其功則有勞者勸無勞者慕未之有也凡國無常治亦無常亂欲治者治不欲治者亂後之國士人民亦前之有也前之有亦後之有也而禹獨以安幽厲獨以危斯不易天地異人民欲與不欲也吳坂之馬庸夫統銜則為獘乘伯樂執轡即為良驥非馬更異教民亦然也故遇禹湯則為良民遭桀紂則為凶頑治使然也故善治國者不尤斯民而罪諸己不責諸下而求諸身傳曰禹湯罪已其興也勃焉桀紂罪人其亡也忽焉由是言之長民治國之本在身故詹何曰未聞身治而國亂者也若詹者可謂知治本矣群書治要政務凡吏之于君民之于吏莫不聽其言而則其行故為政之務務在正身身正于此而民應于彼詩云爾之教矣民胥效矣是以葉公問政孔子對曰子帥以正敦敢不正又曰苟正其身于從政乎何有不能正其身如正人何故君子為政以正己為先教禁為次若君正于上則吏不敢邪于下吏正于下則民不敢僻于野國無傾君朝無邪吏野無僻民而政之不善者未之有也凡政之務務在節事事節于上則民有餘力于下下有餘力則無爭訟之有乎民民無爭訟則政無為而治教不言而行矣群書治要節欲夫人生而有情情發而為欲物見于外情動于中物之感人也無窮而情之所欲也無極是物至而人化也人化也者滅天理矣夫欲至無極以尋難窮之物雖有聖賢之姿鮮不衰敗故脩身治國之要莫大于節欲傳曰欲不可縱歷觀有家有國其得之也莫不階于儉約其失之也莫不由于奢侈儉者節欲奢者放情放情者危節欲者安堯舜之居土階三等夏日衣葛冬日鹿裘禹卑宮室而菲飲食此數帝者非其情之不好乃節儉之至也故其所取民賦也薄而使民力也寡其育物也廣而興利也厚故家給人民國積饒而群生遂以仁義興而四海安孔子曰以約失之者鮮矣且夫閉情無欲者上也咈心消除者次之昔帝舜藏黃金千嶄巖之山抵珠玉于深川之底及儀狄獻旨酒而禹甘之于是疏遠儀狄純上旨酒此能閉情于無欲者也楚文王悅婦人而廢朝政好獠獵而忘歸于是放逐丹姬斷殺如黃及共王破陳而得夏姬其豔國色王納之宮從巫臣之諫壞後垣而出之此能咈心消除之也既不能閉情欲能抑除之斯可矣故舜禹之德巍巍稱聖楚文用朝鄰國恭王終諡為恭也群書治要詳刑夫刑辟之作所從來尚矣聖人以治亂人以亡是以古昔帝王莫不詳慎之者以為人命至重一死不生一斷不屬故也夫堯舜之明猶惟刑之恤也是以後聖制法設三槐之吏肺石嘉石之訊然猶復三敕僉曰可殺然後殺之罪若有疑即從其輕此蓋詳慎之至也故苟詳則死者不恨生者不忿忿恨不作則災害不生災害不生大平之治也是以聖主用其刑也詳而行之必欲民犯之者寡而畏之者眾明刑至于無刑善殺至于無殺此之謂矣夫闇亂之主用刑彌繁而犯之者益多而殺之者彌眾而慢之者尤甚者何由用之不詳而行之不必也不詳則罪不值所罪不值則當死反生不必則令有所虧令有所虧則刑罰不齊矣失此二者雖日用五刑而民猶輕犯之故亂刑之刑刑以生刑惡殺之殺殺以致殺此之謂也群書治要兵要太古之初民始有知則分爭分爭則群群則智者為之君長君長立則兵興兵所從來久矣雖聖帝明王弗能廢也但用之有道耳故黃帝戰于阪泉堯伐驩兜舜征有苗夏禹殷湯周之文武皆用師克伐以取天下焉御覽二百七十一聖人之用兵也將以利物不以害物也將以救亡非以危存也故不得已而用之耳然以戰者危事兵者凶器不欲人之好用之故制法遺後命將出師雖勝敵而反猶以喪禮處之明弗樂也故曰好戰者亡忘戰者危不好不忘天下之王也夫兵之要在于修政修政之要在于得民心得民心在于利之利之之要在于仁以愛之義以理之也故六馬不和造父不能以致遠臣民不附湯武不能以立功故兵之要在得眾得眾者善政之謂也善政者恤民之患除民之害也故政善于內則兵強于外也歷觀古今用兵之敗非鼓之日也民心離散素行豫敗也用兵之勝非陣之朝也民心親附素行豫勝也故法天之道履地之德盡人之和君臣輯穆上下一心盟誓不用賞罰未施消奸慝于未萌折凶邪于殊俗此帝者之兵也德以為卒威以為輔修仁義之行行愷悌之令闢地殖穀國富民豐賞罰明約誓信民樂為之死將樂為之亡師不越境旅不涉場而敵人稽顙此王者之兵也群書治要夫事之安危實在于將故曰將不知兵以其主與敵主不擇將以其國與敵也然擇將者不務求其策而先索其勇不敢于威嚴而用之于輭緩此所謂棄本而要其末也昔霸王之戰策貴神勝故曰上兵伐謀而戰勝也吳起臨陣雖劍不持項羽初學劍後學兵略此勇難獨用況無勇乎太公誓師後至斬故云執桴鼓立軍門有不可犯之危嚴故能行其法威故能著其令今之擇將宜參準往古之數說于當時之法得其壯而責任之所謂坐車上而御騏驥不勞而致千里者也古之論將者言長于計策則課以將敵言善于治軍則攷以政事勇于奮擊則責以戰鬭若無此三者則不委之以境外之任付之以安危之事已上五條竝御覽二百七十三𥳑騎夫騎者軍之鋒銳也臨敵則衝鋒陷堅退則鶚下鷹擊往必如電發去必如風過北堂書鈔未改本一百十七辨能夫商鞅申韓之徒其能也貴尚譎詐務行苛剋廢禮義之教任刑名之數不師古始敗俗傷化此則伊尹周邵之罪人也然其尊君卑臣富國強兵守法持術有可取焉逮至漢興有甯成郅都之輩放商韓之治專以殺伐殘暴為能順人主之意希旨而行要時趨利敢行禍敗此又商韓之罪人也然其抑豪強撫孤弱清已禁奸背私立公尚有可取焉至于晚世之所謂能者乃犯公家之法赴私門之勢廢百姓之務趣人閒之事決煩理務臨時苟辨但使官無譴負之累不省下民吁嗟之冕復是申韓甯郅之罪人也而俗猶共言其能執敢者選用不廢者何也為貴勢之所持人間之士所稱聽聲用名者眾察實審能者寡故使能否之分不定也夫定令長之能者守相也定守相之能者州牧刺史也然刺史之徒未必能攷論能否也未必能端平也或委任下吏聽浮游之譽或受其戚黨貴勢之託其整頓傳舍待望迎賓聽其請謁供其私求則行道之人言其能也治政以威嚴為先行事務邀時取辨悕望上官之指敬順監司之教期會之命無降身以接士之來違法以供其求欲人閒之事無不循言說之談無不用則寄寓游行幅巾之士言其能也有此三者為之談聽聲譽者之所以可惑能否之所以不定也群書治要尊嫡凡光祖禰安宗廟傳國土利民人者在于立嗣繼世繼世之道莫重于尊嫡別庶也故聖人之制禮貴嫡異其服數殊其寵秩所以一群下之望塞變爭之路杜邪防萌深根固本之慮歷觀前代后妻賤而姪媵貴太子卑而庶子尊莫不爭亂以至危亡是以周有子帶之難齊有無知之禍晉有莊伯之患衛有州吁之篡故傳曰竝后匹嫡兩政耦國亂之本也群書治要諫爭夫諫爭者所以納君于道矯枉正非救上之謬也上苟有謬而無救焉則害于事害于事則危道也故曰危而不持顛而不扶則將焉用彼相扶之之道莫過于諫矣故子從命者不得為孝臣苟順者不得為忠是以國之將興貴在諫臣家之將盛貴在諫子若託物以風喻微生而不切不切則不改唯正諫直諫可以補缺也詩云袞職有缺仲山甫補之柔亦不茹剛亦不吐正諫者也易曰王臣謇謇傳曰諤諤者昌直諫者也然則咈人之耳逆人之意變人之情抑人之欲不爾不為諫也雖有父子兄弟猶用生怨隙焉況臣于君有天壤之殊無親戚之屬以至賤于至貴以至稀間至親何庸易邪惡死亡而樂生存恥困辱而樂榮寵雖甚愚人猶知之也況士君子乎今正言直諫則近死辱而遠榮寵人情何好焉此乃欲忠于主耳夫不能諫則君危固諫則身殆賢人君子不忍觀上之危而不愛身之殆故蒙危辱之災逆人主之鱗及罪而弗避者忠也義也深思諫士之事知進諫之難矣群書治要決壅夫人君為左右所壅制此有目而無見有耳而無聞積無聞見必至亂正故國有壅臣禍速近鄰人臣之欲壅其主者無國無之何也利在于壅也壅則擅寵于身威權獨于己此人臣日夜所禱祝而求也人臣之壅其君微妙工巧見壅之時不知也率至亡敗然後悔焉為人君之務在于決壅決壅之務在于進下進下之道在于博聽博聽之義無貴賤同異隸豎牧圉皆得達焉若此則所聞見者廣所聞見者廣則雖欲求壅弗得也人主之好惡不可見于外也所好惡見于外則臣妾乘其所好惡以行壅制焉故曰人君無見其意將為下餌昔晉公好色驪女乘色以壅之吳王好廣地太宰陳伐以壅之桓公好味易牙烝首子以壅之及薛公進美珥以勸立后龍陽臨釣魚行微巧之詐以壅制其主沈寞無端甚可畏矣古今亡國多矣皆由壅蔽于帷幄之內沈溺于諂諛之言也而秦二世獨甚趙高見二世好淫游之樂遺于政因曰帝王貴有天下者貴得縱欲恣意尊嚴若神固可得聞而不可得覩高遂專權欺冈二世見殺望夷臨死乃知見之禍悔復無及豈不哀哉群書治要讚象夫讚象之所作所以昭述勳德思詠政惠此蓋詩頌之末流矣宜由上而興非專下而作也世攷之導實有勳績惠利加于百姓遺愛留于民庶宜請于國當錄于史官載于竹帛上章君將之德下宣臣吏之忠若言不足紀事不足述虛而為盈亡而為有此聖人之所疾庶幾之所恥也群書治要銘誄夫渝世富貴乘時要世爵以賂至官以賄成視常侍黃門賓客假其氣勢以致公卿牧守所在宰莅無清惠之政而有饕餮之害為臣無忠誠之行而有姦欺之罪背正向邪附下罔下此乃繩墨之所加流放之所棄而門生故吏合集財貨刊石紀功稱述勳德高邈伊周下陵管晏遠追豹產近踰黃劭勢重者稱美財富者文麗後人相踵稱以為義外若讚善內為已發上下相效競以為榮其流之獘乃至于此欺曜當時疑誤後世罪莫大焉且夫賞生以爵祿榮死以誄諡是人主權柄而漢世不禁使私稱與王命爭流臣子與君上俱用善惡無章得失無效豈不誤哉群書治要序作夫著作書論者乃欲闡弘大道述明聖教推演事義盡極情類記是貶非以為法式當時可行後世可修且古者富貴而名賤廢滅不可勝記唯篇論俶儻之人為不朽耳夫奮名于百代之前而流譽干千載之後以其覽之者益聞之者有覺故也豈徒轉相放效名作書論浮辭談說而無損益哉而世俗之人不解作體而務汎溢之言不存有益之義非也故作者不尚其辭麗而貴其存道也不好其巧慧而惡其傷義也故夫小辯破道狂𥳑之徒斐然成文皆聖人之所疾矣群書治要夫賞賜者以悅下使眾北堂書鈔十九學者人之脂粉也北堂書鈔八十三觴酌遲速使用失意文選鮑照結客少年場行注遇不遇命也善不善人也文選辨命論注責公者易雖一賢少謬執難者眾雖九舜猶亂初學記九夫賢愚之異使若葵之與莧何得不知其然若其莠之似禾類是而非是類賢而非賢長短經知人夫帝王之君歷代相踵莫不慕霸王之任賢惡亡國之失士然猶授任凶愚破亡相屬其故何哉由取人不求合道而求合己也長短經知人桀紂之用刑也或脯醯人肌肉或刳割人心腹至乃叛逆眾多卒用傾危者此不用仁義為本者也故曰仁者法之恕義者法之斷也長短經政體有君好臥則刺其掌御覽三百七十又六百十一作有讀書倦而刺其掌案荀子勸學篇有子惡臥而卒其掌可謂能自忍矣水則有波釣則有磨我欲更之無如之何言物動而釁已彰形行而迹已著御覽八百三十四釣巨魚不使嬰兒輕豫非不親力不堪也御覽八百三十四引桓範世論案桓子新論有此桓範蓋承用之靈帝置西園之邸賣爵號曰禮錢錢積如屋封塗漆書御覽八百三十六學不勤則不知道耕不力則不得穀御覽八百三十七朝鮮之馬被鬣踶齧能使其成騏驥者習之故也御覽八百九十七
