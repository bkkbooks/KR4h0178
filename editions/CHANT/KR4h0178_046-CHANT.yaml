body:
  text: 阮籍三阮籍三樂論劉子問曰孔子云安上治民莫善于禮移風易俗莫善于樂夫禮者男女之所以別父子之所以成君臣之所以立百姓之所以平也為政之具靡先于此故安上治民莫善于禮也夫金石絲竹鍾鼓管絃之音干戚羽旄進退俯仰之容有之何益于政無之政何損于化而曰移風易俗莫善于樂乎阮先生曰善哉子之問也昔者孔子著其都乎且未舉其略也今將為子論其凡而子自備詳焉夫樂者天地之體萬物之性也合其體得其性則和離其體失其性則乖昔者聖人之作樂也將以順天地之性體萬物之生也故定天地八方之音以迎陰陽八風之聲均黃鍾中和之律開群生萬物之情氣故律呂協則陰陽和音聲適而萬物類男女不易其所君臣不犯其位四海同其觀九州一其節奏之圜丘而天神下降奏之方岳而地祇上應天地合其德則萬物合其生刑賞不用而民自安矣乾坤易簡故雅樂不煩道德平淡故無聲無味不煩則陰陽自通無味則百物自樂日遷善成化而不自知風俗移易而同于是樂此自然之道樂之所始也其後聖人不作道德荒壞政法不立智慧擾物化廢欲行各有風俗故造子之教謂之風習而行之謂之俗楚越之風好勇故其俗輕死鄭衛之風好淫故其俗輕蕩輕死故有火焰赴水之歌輕蕩故有桑閒濮上之曲各歌其所好各詠其所為欲之者流涕聞之者歎息背而去之無不慷慨懷永日之娛抱長夜之歎相聚而合之群而習之靡靡無已棄父子之親弛君臣之制匱室家之禮廢耕農之業忘終身之樂崇淫縱之俗故江淮之南其民好殘漳汝之閒其民好奔吳有雙劍之節趙有扶琴之客氣發于中聲入于耳手足飛揚不覺其駭好勇則犯上淫放則棄親犯上則君臣逆棄親則父子乖乖逆交爭則患生禍起禍起而意愈異患生而慮不同故八方殊風九州異俗乖離分背莫能相通音異氣別曲節不齊故聖人立調適之音建平和之聲制便事之節定順從之容使天下之為樂者莫不儀焉自上以下降殺有等至于庶人咸皆聞之歌謠者詠先王之德頫仰者習先王之容器具者象先王之式度數者應先王之制入于心淪于氣心氣和洽則風俗齊一聖人之為進退頫仰之容也將以屈形體服心意便所修安所事也歌詠詩曲將以宣平和著不逮也鍾鼓所以節耳羽旄所以制目聽之者不傾視之者不衰耳目不傾不衰則風俗移易故移風易俗莫善于樂也故八音有本體五聲有自然其同物者以大小相君有自然故不可亂大小相君故可得而平也若夫空桑之琴雲和之瑟孤竹之管泗濱之磬其物皆調和淳均者聲相宜也故必有常處以大小相君應黃鍾之氣故必有常數有常處故其器貴重有常數故其制不妄貴重故可得以事神不妄故可得以化人其物係天地之象故不可妄造其凡似遠物之音故不可妄易雅頌有分故人神不雜節會有數故曲折不亂周旋有度故頫仰不惑歌詠有主故言語不悖導之以善綏之以和守之以衷持之以久散其群比其文扶其夭助其壽使去風俗之偏習歸聖王之大化先王之為樂也將以定萬物之情一天下之意也故使其聲平其容和下不思上之聲君不欲臣之色上下不爭而忠義成夫正樂者所以屏淫聲也故樂廢則淫聲作漢哀帝不好音罷省樂府而不知制正禮樂法不修淫聲遂起張放淳于長驕縱過度丙彊景武富溢于世罷樂之後下移踰肆身不是好而淫亂愈甚者禮不設也刑教一體禮樂外內也刑弛則教不獨行禮廢則樂無所立尊卑有分上下有等謂之禮人安其生情意無哀謂之樂車服旌旗宮室飲食禮之具也鐘磬鞞鼓琴瑟歌舞樂之器也禮踰其制則尊卑乖樂失其序則親疏亂禮定其象樂平其心禮治其外樂化其內禮樂正而天下平昔衛人求繁纓曲縣而孔子歎息蓋惜禮壞而樂崩也夫鍾者聲之主也縣者鍾之制也鍾失其制則聲失其主主制無常則怪聲竝出盛衰之代相及古今之變若一故聖教廢毀則聰慧之人竝造奇音景王喜大鍾之律平王好師延之曲公卿大夫拊手嗟歎庶人群生踊躍思聞正樂遂廢鄭聲大興雅頌之詩不講而妖淫之曲是尋延年造傾城之歌而孝武思孊嫚之色壅門作松柏之音愍王念未寒之服故猗靡哀思之音發愁怨偷薄之辭興則人後有縱欲奢侈之意人後有內顧自奉之心是以君子惡大淩之歌憎北里之舞也昔先王制樂非以縱耳目之觀崇曲房之嬿也必通天地之氣靜萬物之神也固上下之位定性命之真也故清廟之歌詠成功之績賓饗之詩稱禮讓之則百姓化其善異俗服其德此淫聲之所以薄正樂之以貴也然禮與變俱樂與時化故五帝不同制三王各異造非其相反應時變也夫百姓安服淫亂之聲殘壞先王之正故後王必更作樂各宣其功德于天下通其變使民不倦然但改其名目變造歌詠至于樂聲平和自若故黃帝詠雲門之神少昊歌鳳鳥之迹咸池六英之名既變而黃鍾之宮不改易故達道之化者可與審樂好音之聲者不足與論律也舜命夔與典樂教冑子以中和之德也詩言志歌詠言聲依詠律和聲八音克諧無相奪倫神人以和又曰予欲聞六律五聲八音在治曶以出納五言女聽夫煩手淫聲汨湮心耳乃忘平和君子弗聽言正樂通平易簡心澄氣清以聞音律出納五言也夔曰戛擊鳴球搏拊琴瑟以詠祖考來格虞賓在位群后德讓下管鼗鼓合止祝敔笙鏞以閒鳥獸蹌蹌簫韶九成鳳凰來儀夔曰于予擊石拊石百獸率舞庶尹允諧詩言志歌詠言操磬鳴琴以聲依律述先王之德故祖考之神來格也笙鏞以閒正樂聲希治修無害故繁毓蹌蹌然也樂有節適九成而已陰陽調達和氣均通故遠鳥來儀也質而不文四海合同故繫石拊石百獸率舞也言天下治平萬物得所音聲不譁漠然未兆故眾官皆和也故孔子在齊聞韶三月不知肉味言至樂使人無欲心平氣定不以肉為滋味也以此觀之知聖人之樂和而已矣自西陵青陽之樂皆取之竹聽鳳凰之鳴尊長風之象采大林之當時之所不見百姓之所希聞故天下懷其德而化其神也夫雅樂周通則萬物和質靜則聽不淫易簡則節制令神靜重則服人心此先王造樂之意也自後衰末之為樂也其物不真其器不固其制不信取于近物同于人閒各求其好恣意所存閭里之聲競高永巷之音爭先童兒相聚以詠富貴芻牧負戴以歌賤貧君臣之職未廢而一人懷萬心也當夏后之末興女萬人衣以文繡食以糧肉端噪晨歌聞之者憂戚天下苦其殃百姓傷其毒殷之季君亦奏斯樂酒池肉林夜以繼日然咨嗟之音未絕而敵國已收其琴瑟矣滿堂而飲酒樂奏而流涕此非皆有憂者也則此樂非樂也當王居臣之時奏新樂于廟中聞之者皆為之悲咽桓帝聞楚琴悽愴傷心倚扆而悲慷慨長息曰善哉乎為琴若此一而已足矣順帝上恭陵過樊衢聞鳥鳴而悲泣下橫流曰善哉鳥鳴使左右吟之曰使絲聲若是豈不樂哉夫是謂以悲為樂者也誠以悲為樂則天下何樂之有天下無樂而有陰陽調和災害不生亦已難矣樂者使人精神平和衰氣不入天地交泰遠物來集故謂之樂也今則流涕感動噓唏傷氣寒暑不適庶物不遂雖出絲竹宜謂之哀奈何俛仰歎息以此稱樂乎昔季流子向風而鼓琴聽之者泣下沾襟弟子曰善哉鼓琴亦已妙矣季流子曰樂謂之善哀謂之傷吾為哀傷非為善樂也以此言之絲竹不必為樂歌詠不必為善也故墨子之非樂也悲夫以哀為樂者胡疪玄耽哀不變故願為黔首李斯隨哀不返故思逐狡兔嗚呼君子可不鑒之哉本集又略見續漢五行志注藝文類聚四十又四十四初學記十五御覽三百九十二五百七十七五百七十九琵琶箏笛閒促而聲高琴瑟之體閒遼而聲埤文選嵇康琴賦注故歌以敘志舞以宣情然后文之以采章昭之以風雅播之以八音感之以太和北堂書鈔卷一百五大人先生傳大人先生蓋老人也不知姓字陳天地之始言神農黃帝之事昭然也莫知其生年之數嘗居蘇門之山故世咸謂之閒養性延壽與自然齊光其視堯舜之所事若手中耳以萬里為一步以千歲為一朝行不赴而居不處求乎大道而無所寓先生以應變順和天地為家運去勢隤魁然獨存自以為能足與造化推移故默探道德不與世同之自好者非之無識者怪之不知其變化神微也而先生不以世之非怪而易其務也先生以為中區之在天下曾不若蠅蚊之著帷故終不以為事而極意乎異方奇域遊覽觀樂非世所見徘徊無所終極遺其書于蘇門之山而去天下莫知其所如往也或遺大人先生書曰天下之貴莫貴于君子服有常色貌有常則言有常度行有常式立則磬折拱若抱鼓動靜有節趨步商羽進退周旋咸有規矩心若懷冰戰戰慄慄束身修行日慎一日擇地而行唯恐遺失誦周孔之遺訓歎唐虞之道德唯法是脩唯禮是克手執珪璧足履繩墨行欲為目前檢言欲為無窮則少稱鄉閭長聞邦國上欲圖三公下不失九州牧故挾金玉垂文組享尊位取茅土揚聲名于後世齊功德于往古奉事君王牧養百姓退營私家育長妻子卜吉而宅慮乃億祉遠禍近福永堅固己此誠士君子之高致古今不易之美行也今先生乃被髮而居巨海之中與若君子者遠吾恐世之歎先生而非之也行為世所笑身無由自達則可謂恥辱矣身處困苦之地而行為世俗之所笑吾為先生不取也于是大人先生乃逌然而歎假雲霓而應之曰若之云尚何通哉夫大人者乃與造物同體天地竝生逍遙浮世與道俱成變化散聚不常其形天地制域于內而浮明開達于外天地之永固非世俗之所及也吾將為汝言之往者天嘗在下地嘗在上反覆顛倒未之安固焉得不失度式而常之天因地動山陷川起雲散震壞六合失理汝又焉得擇地而行趨步商羽往者群氣爭存萬物死慮支體不從身為泥土根拔枝殊咸失其所汝又焉得束身脩行磬折抱鼓李牧功而身死伯宗忠而世絕進求利以喪身營爵賞而家滅汝又焉得挾金玉萬億祗奉君上而全妻子乎且汝獨不見夫蝨之處于褌之中乎逃乎深縫匿乎壞絮自以為吉宅也行不敢離縫際動不敢出褌襠自以為得繩墨也飢則囓人自以為無窮食也然炎斤火流焦邑滅都群蝨死於褌中而不能出汝君子之處區之內亦何異夫蝨之處褌中乎悲夫而乃自以為遠禍近福堅無窮也亦觀夫陽烏遊于塵外而鷦鷯戲于蓬芰小大固不相及汝又何以為若君子聞于余乎且近者夏喪于商周播之劉耿薄為墟豐鎬成丘至人來一顧而世代相酬厥居未定他人也有汝之茅土將誰與久是以至人不處而居不修而治日月為正陰陽為期豈希情乎世繫累于一時來東雲駕西風與陰守雌據陽為雄志得欲從物莫之窮又何不能自達而畏夫世笑哉昔者天地開闢萬物竝生大者恬其性細者靜其形陰藏其氣陽發其精害無所避利無所爭放之不失收之不盈亡不為夭存不為壽福無所得禍無所咎各從其命以度相守明者不以智勝闇者不以愚敗弱者不以迫畏強者不以力盡蓋無君而庶物定無臣而萬事理保身修性不違其紀惟茲若然故能長久今汝造音以亂聲作色以詭形外易其貌內隱其情懷欲以求多詐偽以要名君立而虐興臣設而賊生坐制禮法束縛下民欺愚誑拙藏智自神強者睽眠而凌暴弱者憔悴而事人假廉以成貪內險而外仁罪至不悔過幸遇則自矜馳此以奏除故循滯而不振夫無貴則賤者不怨無富則貧者不爭各足于身而無所求也恩澤無所歸則死敗無所仇奇聲不作則耳不易聽淫色不顯則目不改視耳目不相易改則無以亂其神矣此先世之所至止也今汝尊賢以相高競能以相尚爭勢以相君寵貴以相加驅天下以趣之此所以上下相殘也竭天地萬物之至以奉聲色無窮之欲此非所以養百姓也于是懼民之知其然故重賞以喜之嚴刑以威之財匱而賞不供刑盡而罰不行乃始有亡國戮君潰散之禍此非汝君子之為乎汝君子之禮法誠天下殘賊亂危死亡之術耳而乃目以為美行不易之道不亦過乎今吾乃飄颻于天地之外與造化為友朝飧湯谷夕飲西海將變化遷易與道周始此之于萬物豈不厚哉故不通于自然者不足以言道闇于昭昭者不足與達明子之謂也先生既申若言天下之喜奇者異之忼愾者高之其不知其體不見其情猜耳其道虛偽之名莫識其真弗達其情雖異而高之與嚮之非怪者蔑如也至人者不知乃貴不見乃神神貴之道存乎內而萬物運于外矣故天下終而不知其用也逌乎有宗扶搖之野有隱士焉見之而喜自以為均志同行也曰善哉吾得之見而舒憤也上古質樸淳厚之道已廢而末枝遺華竝興豺虎貪虐群物無辜以害為利殞性亡軀吾不忍見也故去而處茲人不可與為儔不若與木石為鄰安期逃乎蓬山角李潛乎丹水鮑焦立以枯槁萊維去而逌死亦由茲夫吾將抗志顯高遂終于斯禽生而獸死埋形而遺骨不復反余之生乎夫志均者相求好合者齊與夫子同之于是先生乃舒虹霓以蕃塵傾雪蓋以蔽明倚瑤廂而徘徊總眾轡而安行顧而謂之曰太初真人惟天之根專氣一志萬物以存退不見後進不覩先發西北而造制啟東南以為門微道而以德久娛樂跨天地而處尊夫然成吾體也是以不避物而處所覩則寧不以物為累所逌則成彷徉足以舒其意浮騰足以逞其情故至人無宅天地為客至人無主天地為所至人無事天地為故無是非之別無善惡之異故天下被其澤而萬物所以熾也若夫惡彼而好我自是而非人忿激以爭求貴志而賤身伊禽生而獸死尚何顯而獲榮悲夫子之用心也薄安利以忘生要求名以喪體誠與彼其無詭何枯槁而逌死子之所好何足言哉吾將去子矣乃揚眉而蕩目振袖而撫裳令緩轡而縱筴遂風起而雲翔彼人者瞻之而垂泣自痛其志衣莫木之皮伏于巖石之下懼不終夕而死先生過神宮而息漱吳泉而行迴乎逌而遊覽焉見薪于阜者歎曰汝將焉以是終乎哉薪者曰是終我乎不以是終我乎且聖人無懷何其哀夫盛衰變化常不于茲藏器于身伏以俟時孫刖足以擒龐睢折脅而乃休百里困而相嬴牙既老而弼周既顛倒而更來兮固先窮而後收秦破六國并兼其地夷滅諸侯南面稱帝姱盛色崇靡麗鑿南山以為闕表東海以為門門萬室而不絕圖無窮而永存美宮室而盛帷㡩擊鍾鼓而揚其章廣苑囿而深池沼興渭北而建咸陽木曾未及成林而荊棘已藂乎阿房時代存而迭處故先得而後亡山東之徙虜遂起而王天下由此視之窮達詎可知邪且聖人以道德為心不以富貴為志以無為用不以人物為事尊顯不加重貧賤不自輕失不自以為辱得不自以為榮木根挺而枝遠葉繁茂而華零無窮之死猶一朝之生身之多少又何足營因歎而歌曰日沒不周西月出丹淵中陽精蔽不見陰光代為雄亭亭在須臾厭厭將復東離合雲霧兮往來如飄風富貴俛仰閒貧賤何必終留侯起亡虜威武赫夷荒召平封東陵一旦為布衣枝葉托根柢死生同盛衰得志從命升失勢與時隤寒暑代征邁變化更相推禍福無常主何憂身無歸推茲由斯理負薪又何哀先生聞之笑曰雖不及大庶免小矣乃歌曰天地解兮六合開星辰霣兮日月隤我騰而上將何懷衣弗襲而服美佩弗飾而自章上下徘徊兮誰識吾常遂去而遐浮肆雲轝興氣蓋徜徉回翔兮漭瀁之外建長星以為旗兮擊雷霆之𥕎礚開不周而出車兮步九野之夷泰坐中州而一顧兮望崇山而迴邁端余節而飛旃兮縱心慮乎荒裔擇前者而弗修兮馳蒙閒而遠逌棄世務之眾為兮何細事之足賴虛形體而輕舉兮精微妙而神豐命夷羿使寬日兮召忻來使緩風攀扶桑之長枝兮登扶搖之隆崇躍潛飄之冥昧兮洗光曜之昭明遺衣裳而弗服兮服雲氣而遂行朝造駕乎湯谷兮夕息馬乎長泉時崦嵫而易氣兮輝若華以照冥左朱陽以舉麾兮右玄陰以建旗變容飾而改度遂騰竊以修征陰陽更而代邁四時奔而相逌惟仙化之倏怱兮心不樂乎久留驚風奮而遺樂兮雖雲起而忘憂忽電消而神逌兮歷寥廓而遐逌佩日月以舒光兮登徜徉而上浮壓前進于彼逌兮將步足乎虛州掃紫宮而陳席兮坐帝室而忽會酬萃眾音而奏樂兮聲驚渺而悠悠五帝舞而再屬兮六神歌而代周樂啾啾肅肅洞心達神超遙茫茫心往而忘反慮大而志矜局大人微而弗復兮揚雲氣而上陳召大幽之玉女兮接上王之美人體雲氣之逌暢兮服太清之淑真合歡情而微授兮先豔溢其若神華姿燁以俱發兮采色煥其竝振傾玄髦而垂鬢兮曜紅顏而自新時曖曃而將逝兮風飄颻而振衣雲氣解而霧離兮靄奔散而永歸心惝惘而遙思兮眇迴目而弗晞揚清風以為旟兮翼旋軫而反衍騰炎陽而出彊兮命祝融而使遣驅玄冥以攝堅兮蓐收秉而先戈勾芒奉轂浮驚朝霞寥廓茫茫而靡都兮邈無儔而獨立倚瑤廂而一顧兮哀下土之憔悴分是非以為行兮又何足與比類霓旌飄兮雲旗靄樂遊兮出天外大人先生被髮飛鬢衣方離之衣繞紱陽之帶含奇芝嚼甘華噏浮霧飧霄霞興朝雲颺春風奮乎太極之東遊乎崑崙之西遺轡隤策流盼乎唐虞之都惘然而思悵爾若忘慨然而歎曰嗚呼時不若歲歲不若天天不若道道不若神神者自然之根也彼句句者自以為貴夫世矣而惡知夫世之賤乎茲哉故與世爭貴貴不足尊與世爭富富不足先必超世而絕群遺俗而獨往登乎太始之前覽乎忽漠之初慮周流于無外志浩蕩而遂舒飄颻于四運翻翱翔乎八隅欲從肆而彷彿浣瀁而靡拘細行不足以為毀聖賢不足以為譽變化移易與神明扶廓無外以為宅周宇宙以為廬強八維而處安據制物以永居夫如是則可謂富貴矣是故不與堯舜齊德不與湯武竝功王許不足以為匹陽丘豈能與比縱天地且不能越其壽廣成子曾何足與竝容激八風以揚聲躡元吉之高蹤被九天以開除兮來雲氣以馭飛龍專上下以制統兮殊古今而靡同夫世之名利胡足以累之哉故提齊而踧楚挈趙而蹈秦不滿一朝而天下無人東西南北莫之與鄰悲夫子之修飾以余觀之將焉存乎于茲先生乃去之紛泱莽軌沕洋流衍溢歷度重淵跨青天顧而逌覽焉則有逍遙以永年無存忽合散而下臻霍分離蕩瀁瀁洋洋飆涌雲浮達于搖光直馳騖乎太初之中而休息乎無為之宮太初何如無後無先莫究其極誰識其根邈渺綿綿乃反復乎大道之所存莫畼其究誰曉其根辟九靈而求索曾何足以自隆登其萬天而通觀浴大始之和風漂逍遙以遠逌遵大路之無窮遺太乙而弗使陵天地而徑行超鴻濛而遠迹左蕩莽而無涯右幽悠而無方上遙聽而無聲下修視而無章施無有而宅神永太清乎敖翔崔巍高山勃玄雲朔風橫厲白雲紛積冰若陵寒傷人陰陽失位日月隤地坼石裂林木摧大冷陽凝寒傷懷陽和微弱隆陰竭海凍不流綿絮折呼噏不通寒傷裂氣并代動變如神寒倡熱隨害傷人熙與真人懷大清精神專一用意平寒暑勿傷莫不驚憂患靡由素氣寧浮霧凌天恣所經往來微妙路無傾好樂非世又何爭人且皆死我獨生真人遊駕八龍曜日月載雲旗徘徊逌樂所之真人遊太階夷原辟天門開雨濛濛風登黃山出栖遲江河清洛無埃雲氣消真人來真人來惟樂哉時世易好樂隤真人去與天回反未央延年壽獨敖世望我何時反趈漫漫路日遠先生從此去矣天下莫知其所終極蓋陵天地而與浮明遨遊無始終自然之至真也鸜鵒不踰濟洛不渡汶世之常人亦由此矣曾不通區域又況四海之表天地之外哉若先生者以天地為卵耳如小物細人欲論其長短議其是非豈不哀也哉搏赤猿帖摶搏赤猿帖僕不想欻爾夢搏赤猿其力甚于貔虎良久反覆余乃觀天背地覩窮亦當不爽但僕之不達安得不憂吉乎執我凶乎詳告三月阮籍白繇君李懷琳七賢帖孔子誄養徒三千升堂七十潛神演思因史作書考混元于無形本造化于太初御覽一弔某公文沈漸荼酷仁義同違如何不弔玉碎冰摧
