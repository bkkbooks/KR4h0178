body:
  text: 陳王植一愁霖賦迎朔風而爰邁兮雨微微而逮行悼朝陽之隱曜兮怨北辰之潛精車結轍以盤桓兮馬躑躅以悲鳴攀扶桑而仰觀兮假九日於天皇瞻沈雲之泱漭兮哀吾願之不將又曰夫何季秋之淫雨兮既彌日而成霖瞻玄雲之晻晻兮聽長空之淋淋中宵臥而歎息起飾帶而撫琴喜霽賦禹身誓於陽旰卒錫圭而告成湯感旱於殷時造桑林而敷誠動玉輞而雲披鳴鑾鈴而日陽指北極以為期吾將倍道而兼行大暑賦炎帝掌節祝融司方羲和按轡南雀舞衡映扶桑之高熾燎九日之重光大暑赫其遂蒸玄服革而尚黃蛇折鱗於靈窟龍解角於皓蒼遂乃溫風赫戲草木垂榦山坼海沸沙融礫爛飛魚躍渚潛黿浮岸鳥張翼而近栖獸交遊而雲散于時黎庶徙倚棋布葉分機女絕綜農夫釋耘背暑者不群而齊跡向陰者不會而成群於是大人遷居宅幽緩神育靈雲屋重搆閒房肅清寒泉涌流玄木奮榮積素冰於幽館氣飛結而為霜奏白雪於琴瑟朔風感而增涼壯皇居之瑰瑋兮步八閎而為宇節四運之常氣兮踰太素之儀矩御覽一引大暑賦此疑篇首脫文秋思賦又愁秋思賦四節更王兮秋氣悲遙思惝怳兮若有遺原野蕭條兮煙無依雲高氣靜兮露凝野草變色兮莖葉稀鳴蜩抱木兮雁南飛西風悽悷兮朝夕臻扇箑屏棄兮絺綌捐歸室解裳兮步庭前月光照懷兮星依天居一世兮芳景遷松喬難慕兮誰能仙長短命也兮獨何愆感時賦惟淫雨之永降曠三旬而未晞文選鮑明遠苦熱行李注洛神賦并序并序洛神賦并序黃初三年余朝京師還濟洛川古人有言斯水之神名曰宓妃感宋玉對楚王說神女之事遂作斯賦其詞曰余從京域言歸東藩背伊闕越轘轅經通谷陵景山日既西傾車殆馬煩爾乃稅駕乎蘅皋秣駟乎芝田容與乎陽林流盻乎洛川於是精移神駭忽焉思散俯則未察仰以殊觀覩一麗人於豈之畔迺援御者而告之曰爾有覿於彼者乎彼何人斯若此之艷也御者對曰臣聞河洛之神名曰宓妃然則君王之所見也無迺是乎其狀若何臣願聞之余告之曰其形也翩若驚鴻婉若遊龍榮曜秋菊華茂春松髣髴兮若輕雲之蔽月飄颻兮若流風之回雪遠而望之皎若太陽升朝霞迫而察之灼若芙蓉出淥波穠纖得衷脩短合度肩若削成腰如約素延頸秀項皓質呈露芳澤無加鉛華弗御雲髻峨峨脩眉聯娟丹脣外朗皓齒內鮮明眸善睞輔靨承權瓌姿艷逸儀靜體閑柔情綽態媚於語言奇服曠世骨像應圖披羅衣之璀粲兮珥瑤碧之華琚戴金翠之首飾綴明珠以耀軀踐遠遊之文履曳霧綃之輕裾微幽蘭之芳藹兮步踟躕於山隅於是忽焉縱體以遨以嬉左倚采旄右蔭桂旗攘皓腕於神滸兮采湍瀨之玄芝余情悅其淑美兮心振蕩而不怡無良媒以接歡兮托微波而通辭願誠素之先達兮解玉珮以要之嗟佳人之信脩兮羌習禮而明詩抗瓊珶以和予兮指潛淵而為期執眷眷之款實兮懼斯靈之我欺感交甫之棄言兮悵猶豫而狐疑收和顏而靜志兮申禮防以自持於是洛靈感焉徙倚彷徨神光離合乍陰乍陽竦輕軀以鶴立若將飛而未翔踐椒塗之郁烈步蘅薄而流芳超長吟以永慕兮聲哀厲而彌長爾迺眾靈雜遝命儔嘯侶或戲清流或翔神渚或採明珠或拾翠羽從南湘之二妃攜漢濱之遊女嘆匏瓜之無匹兮詠牽牛之獨處揚輕袿之猗靡兮翳脩袖以延佇體迅飛鳧飄忽若神凌波微步羅襪生塵動無常則若危若安進止難期若往若還轉盻流精光潤玉顏含辭未吐氣若幽蘭華容婀娜令我忘餐於是屏翳收風川后靜波馮夷鳴鼓女媧清歌騰文魚以驚乘鳴玉鑾以偕逝六龍儼其齊首載雲車之容裔鯨鯢踊而夾轂水禽翔而為衛於是越北沚過南岡紆素領回清陽動朱唇以徐言陳交接之大綱恨人神之道殊兮怨盛年之莫當抗羅袂以掩涕兮淚流襟之浪浪悼良會之永絕兮哀一逝而異鄉無微情以效愛兮獻江南之明璫雖潛處於太陰長寄心於君王忽不悟其所舍悵神霄而蔽光於是背下陵高足往神留遺情想像顧望懷愁冀靈體之復形御輕舟而上泝浮長川而忘反思綿綿而增慕夜耿耿而不寐霑繁霜而至曙命僕夫而就駕吾將歸乎東路攬騑轡以抗策悵盤桓而不能去洛陽賦狐貉穴於紫闥兮茅莠生於禁闥本至尊之攸居於今之可悲書鈔一百五十八遷都賦序余初封平原轉出臨淄中命鄄城遂徙雍丘改邑浚儀而末將適於東阿號則六易居實三遷連遇瘠土衣食不繼靜思賦靜思賊賦夫何美女之爛妖紅顏曄而流光卓特出而無疋呈才好其莫當性通暢以聰惠行孊密而妍詳蔭高岑以翳日臨綠水之清流秋風起於中林離鳥鳴而相求愁慘慘以增傷悲予安能乎淹留懷親賦并序并序懷親賦并序濟陽南澤有先帝故營遂停馬住駕造斯賦焉獵平原而南騖覩先帝之舊營步壁壘之常制識旌旗之所停在官曹之典列心髣髴於平生回驥首而永游赴脩途以尋遠情眷戀而顧懷魂須臾而九反離思賦并序并序離思賦并序建安十六年大軍西討馬超太子留監國植時從焉意有憶戀遂作離思賦云在肇秋之嘉月將曜師而西旗余抱疾以賓從扶衡軫而不怡慮征期之方至傷無階以告辭念茲君之光惠庶沒命而不疑欲畢力於旌麾將何心而遠之願我君之自愛為皇朝而寶己水重深而魚悅林脩茂而鳥喜又釋思賦并序并序又釋思賦并序家弟出養旋父郎中伊予以兄弟之愛心有戀然作此賦以贈之彼翔友之離別猶求思乎白駒況同生之義絕重背親而為疏樂鴛鴦之同池羡比翼之共林亮根異其何戚痛別榦之傷心玄暢賦并序并序玄暢賦并序夫富者非財也貴者非寶也或有輕爵祿而重榮聲者或有反性命而徇功名者是以孔老異情楊墨殊義聊作斯賦名曰玄暢庶以司馬相如為上林賦控引天地古今陶神知機摛理表微夫何希世之大人罄天壤而作皇該仁聖之上義據神位以統方補五帝之漏月綴三代以維綱絙日際而來王僥余生之倖祿遘九二之嘉祥上同契於稷禼降合穎於伊望思薦寶以繼佩怨和璞之始鐫思黃鍾以協律怨伶夔之不存嗟所圖之莫合悵蘊結而延志希鵬舉以摶天蹶青雲而奮羽企駟躍而改駕任中才之展御望前軏而致策顧後乘而安驅匪逞邁之短脩長前貞而保素弘道德以為宇築無怨以作藩溜慈惠以為圃耕柔順以為田不媿景而慚魄言縣天之何欲逸千載而流聲超遺黎而度俗眾才所歸書鈔二十九引玄暢賦序絙日際而來王文選顏延年宋郊祀歌李注引玄暢賦序幽思賦倚高臺之曲隅處幽僻之閒深望翔雲之悠悠羌朝霽而夕陰顧秋華而零落感歲莫而傷心觀躍魚於南沼聆鳴鶴於北林搦素箏而慷慨揚大雅之哀吟仰清風以嘆息寄余思於悲絃信有心而在遠重登高以臨川何余心之煩錯寧翰墨之能傳述行賦尋曲路之南隅觀秦政之驪墳哀黔首之罹毒酷始皇之為君濯余身於神井偉湯液之若焚恨西夏之不綱文選潘安仁西征賦李注引述行賦又感節賦攜友生而游觀盡賓主之所求登高墉以永望冀消日以忘憂欣陽春之潛潤樂時澤之惠休望候雁之翔集想玄鳥之來游嗟征夫之長勤雖處逸而懷愁懼天河之一回沒我身乎長流豈吾鄉之足顧戀祖宗之靈丘唯人生之忽過若鑿石之未燿慕牛山之哀泣懼平仲之我咲折若華之翳日庶朱光之常照願寄軀於飛蓬乘陽風之遠飄亮吾志之不從乃拊心以嘆息青雲鬱其西翔飛鳥翩而止匿欲縱體而從之哀余身之無翼大風隱其四起揚黃塵之冥冥鳥獸驚以來群草木紛其揚英見遊魚之涔灂感流波之悲聲內紆曲而潛結心怛惕以中驚匪榮德之累身恐年命之早零慕歸全之明義庶不忝其所生商風入帷書鈔一百五十三引感節賦出婦賦妾十五而束帶辭父母而適人以才薄之陋質奉君子之清塵承顏色以接意恐疏賤而不親悅新婚而忘妾哀愛惠之中零遂摧頹而失望退幽屏於下庭痛一旦而見棄心忉忉以悲驚衣入門之初服背床室而出征攀僕御而登車左右悲而失聲嗟冤結而無訴乃愁苦以長窮恨無愆而見棄悼君施之不終愍志賦并序并序愍志賦并序或人有好鄰人之女者時無良媒禮不成焉彼女遂行適人有言之於予者予心感焉乃作賦曰竊托音於往昔迄來春之不從思同遊而無路情壅隔而靡通哀莫哀於永絕悲莫悲於生離豈良時之難俟痛予質之日虧登高樓以臨下望所歡之攸居去君子之清宇歸小人之蓬廬欲輕飛而從之迫禮防之我居妾穢宗之陋女蒙日月之餘輝委薄軀於貴戚奉君子之裳衣書鈔卷引愍志賦此疑篇首脫文歸思賦背故鄉而遷徂將遙憩乎他濱經平常之舊居感荒壞而莫振城邑寂以空虛草木穢而荊蓁嗟喬木之無陰處原野其何為信樂土之足慕忽並日之載馳慰子賦彼凡人之相親小離別而懷戀況中殤之愛子乃千秋而不見入空室而獨倚對孤幃而切嘆痛人亡而物在心何忍而復觀日晼晚而既沒月代照而舒光仰列星以至晨衣霑露而含霜惟逝者之日遠愴傷心而絕腸慰情賦黃初八年正月雨而北風飄寒園果墮冰枝幹摧折書鈔一百五十六寡婦詩高墳鬱兮巍巍松柏森兮成行文選謝靈運廬陵王墓下作李注敘愁賦并序并序敘愁賦并序時家二女弟故漢皇帝聘以為貴人家母見二弟愁思故令予作賦曰嗟妾身之微薄信未達乎義方遭母氏之聖善奉恩化之彌長迄盛年而始立脩女職於衣裳承師保之明訓誦六列之篇章觀圖像之遺形竊庶幾乎英皇委微軀於帝室充末列於椒房荷印紱之令服非陋才之所望對床帳而太息慕二親以憎傷揚羅袖而掩涕起出戶而彷徨顧堂宇之舊處悲一別之異鄉又九愁賦嗟離思之難忘心慘毒而含哀踐南畿之末境越引領之徘徊眷浮雲以太息顧攀登而無階匪徇榮而愉樂信舊都之可懷恨時王之謬聽受奸枉之虛辭揚天威以臨下忽放臣而不疑登高陵而反顧心懷愁而荒悴念先寵之既隆哀後施之不遂雖危亡之不豫亮無遠君之心刈桂蘭而秣馬舍余車於西林願接翼於歸鴻嗟高飛而莫攀因流景而寄言響一絕而不還傷時俗之趨險獨悵望而長愁感龍鸞而匿跡如吾身之不留竄江介之曠野獨眇眇而沉舟思孤客之可悲愍予身之翩翔豈天監之孔明將時運之無常謂內思而自策算乃昔之愆殃以忠言而見黜信毋負於時王俗參差而不齊豈毀譽之可同競昏瞀以營私害予身之奉公共朋黨而妬賢俾予濟乎長江嗟大化之移易悲性命之攸遭愁慊慊而繼懷惟慘慘而情挽曠年載而不回長去君兮悠遠御飛龍之蜿蜒揚翠電之華旌絕紫霄而高騖飄弭節於天庭披輕雲而下觀覽九土之殊形顧南郢之邦壤咸蕪穢而倚傾驂盤桓而思服仰御驤以悲鳴紆予袂而收涕僕夫感以失聲履先王之正路豈淫徑之可遵知犯君之招咎恥干媚而求親顧旋復之無軏長自棄於遐濱與麋鹿以為群宿林藪之葳蓁野蕭條而極望曠千里而無人民生期於必死何自苦以終身寧作清水之沉泥不為濁路之飛塵踐蹊隧之危阻登岧嶢之高岑見失群之離獸覿偏棲之孤禽懷憤激以切痛苦回忍之在心愁戚戚其無為遊綠林而逍遙臨白水以悲嘯猿驚聽以失條亮無怨而棄逐乃余行之所招悲命賦哀魂靈之飛揚文選江文通別賦李注潛志賦潛大道以遊志希往昔之遐烈矯貞亮以作矢當苑囿之呈藝驅仁義以為禽必信忠而後發退隱身以滅跡進出世而取容且摧剛而和謀接處肅以靜恭亮知榮而守辱匪狥天以為通藉田說春耕于藉田郎中令侍寡人焉顧而謂之曰昔者神農氏始嘗萬草教民種植今寡人之興此田將欲以擬乎治國非徒供耳目而已也夫營疇萬畝厥田上下經以大陌帶以橫阡奇柳夾路名果被園宰農實掌是謂公田此亦寡人之封疆也日殄沒而歸館晨未昕而即野此亦寡人之先下也菽雚特疇禾黍異田此亦寡人之理政也及其息泉涌庇重陰懷有虞撫素琴此亦寡人之習樂也蘭蕙荃蘅植之近疇此亦寡人之所親賢也刺蔾臭蔚棄之遠疆此亦寡人之所遠佞也若年豐歲登果茂菜滋則臣僕小大咸取驗焉又曰封人有能以輕鑿修鉤去樹之蝎者樹得以茂繁中舍人曰不識治天下者亦有蝎者乎寡人告之曰昔三苗共工鯀驩兜非堯之蝎歟問曰諸侯之國亦有蝎乎寡人告之曰齊之諸田晉之六卿魯之三桓非諸侯之蝎歟然三國無輕鑿脩鉤之任終於齊篡魯弱晉國以分不亦痛乎曰不識為君子者亦有蝎乎寡人告之曰固有之也富而慢貴而驕殘仁賊義甘財悅色此亦君子之蝎也天子勤耘以牧一國大夫勤耘以收世祿君子勤耘以顯令德夫農者始於種終於穫澤既時矣苗既美矣棄而不耘則改為荒疇蓋豐年者期於必收譬脩道亦期於歿身也寡人御輦登於金商之館察田夫之私者書鈔三十九引藉田論使習壤者相澤仁才者播種書鈔三十九引藉田論田修種理者必賜之以巨觴田蕪種穢者必戮之以柔桑書鈔三十九引藉田論名王親枉千乘於隴畝之中執鋤钁於畦町之側尊距勤於耒耜玉手勞於耕耘者也書鈔九十一引藉田賦夫凡人之為圃各植其所好焉好甘者植乎薺好苦者植乎荼好香者植乎蘭好辛者植乎蓼至於寡人之圃無不植也御覽八百二十四引藉田賦感婚賦陽氣動兮淑清百卉鬱兮含英春風起兮蕭條蟄蟲出兮悲鳴顧有懷兮妖嬈用搔首兮屏營登清臺以蕩志伏高軒而游情悲良媒之不顧懼歡媾之不成慨仰首而太息風飄飄以動纓娛賓賦感夏日之炎景兮游曲觀之清涼遂衎賓而高會兮丹幃曄以四張辦中廚之豐膳兮作齊鄭之妍倡文人騁其妙說兮飛輕翰而成章談在昔之清風兮總賢聖之紀綱欣公子之高義兮德芬芳其若蘭揚仁恩於白屋兮踰周公之棄餐聽仁風以忘憂兮美酒清而肴乾東征賦并序并序東征賦并序建安十九年王師東征吳寇余典禁兵衛官省然神武一舉東夷必克想見振旅之盛故作賦二篇登城隅之飛觀兮望六師之所營幡旗轉而心異兮舟楫動而傷情顧身微而任顯兮愧任重而命輕嗟我愁其何為兮心遙思而懸旌師旅憑皇穹之靈佑兮亮元勳之必舉揮朱旗以東指兮橫大江而莫御循戈櫓於清流兮氾雲梯而容與禽元帥於中舟兮振靈威於東野登臺賦從明后之嬉遊聊登臺以娛情見天府之廣開觀聖德之所營建高殿之嵯峨浮雙闕乎太清立沖天之華觀連飛閣乎西城臨漳川之長流望眾果之滋榮仰春風之和穆聽百鳥之悲鳴天功怛其既立家願得而獲呈楊仁化於宇內盡肅恭於上京雖桓文之為盛豈足方乎聖明休矣美矣惠澤遠揚翼佐皇家寧彼四方同天地之矩量齊日月之輝光永貴尊而無極兮等年壽於東王游觀賦靜閒居而無事將遊目以自娛登北觀而啟路涉雲際之飛除從羆熊之武士荷長戟而先驅罷若雲歸會如霧聚車不及回塵不獲舉奮袂成風揮汗如雨臨觀賦登高墉兮望四澤臨長流兮送遠客春風暢而氣通靈草含幹兮木交莖丘陵崛兮松柏青南國薆兮果載榮樂時物之逸豫悲予志之長違歎東山之愬勤歌式微以訴歸進無路以效公退無隱以營私俯無鱗以遊遁仰無翼以翻飛閒居賦何吾人之介特去朋匹而無儔出靡時以娛志入無樂以消憂何歲月之若騖復民生之無常感陽春之發節聊輕駕之遠翔登高丘以延企時薄暮而起余仰歸雲以載奔遇蘭蕙之長圃冀芬芳之可服結春衡以延佇入虛廊之閒館步生風之高廡踐密邇之脩除即蔽景之玄宇翡翠翔於南枝玄鶴鳴於北野青魚躍於東沼白鳥戲於西渚遂乃背通谷對綠波藉文茵翳春華丹轂更馳羽騎相過愬寒風以開襟文選潘安仁西征賦李注引閒居賦嚴輯全三國文又見沈約游沈道士館詩注願同衾於寒女文選郭泰機答傅咸詩李注引閒居賦
