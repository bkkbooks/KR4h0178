body:
  text: 傅巽槐樹賦葉葉扶疏參林蕭蔱松蘿寄生緜連標末延袤千畝蓊鬱晻藹蓺文類聚八十八初學記二十八蚊賦水與草其漸茹育茲孼而蚊觜咮銳于秋毫刺鋸利于芒錐無胎卵而化孕生博物翼而能飛肈孟夏以明起迄季秋而不衰眾繁熾而無數動群聲而成雷肆慘毒于有生迺飧膚體以療飢妨農功于南畝廢女工于杼機蓺文類聚九十七七誨孟冬香秔上秋膏粱彫胡苽子丹具東牆濡潤細滑流澤芬芳書鈔一百四十二一百四十四初學記二十六御覽人百五十乃有河蘇僕鮎龍淵巨鯉分皮截理書鈔一百四十二一百四十五豹胎熊膰肥濡晞沐飛鷃伏鶉雙雞合熟書鈔一百四十二爾乃選巢殊方魚有備物蒲陶宛榛齊柍燕栗恆陽黃棃巠山朱橘同上白醴九成玄酎清醇口華口蟻苞苦含辛書鈔一百四十八奢儉論豐狐以赤色禍身翡翠孔雀亦災斯文御覽九百二十四筆銘昔在上古結繩而誓降及後載易以書契書契之興興自頡皇肈建一體浸遂繁昌彌綸群事通遠達幽垂訓紀典匪筆靡脩實為心盡臧否斯由厥美弘大置類鮮儔德興之著惟道是揚苟逞其違禍亦無方蓺文類聚五十八對詔訪征吳三計嘉平四年四月孫權死征南大將軍王昶征東將軍胡遵鎮南將軍毋邱儉等表請征吳朝廷以三征計異詔訪尚書傅嘏嘏對曰昔夫差勝齊陵晉威行中國不能以免姑蘇之禍齊閔辟土兼國開地千里不足以救顛覆之敗有始不必善終古事之明效也孫權自破蜀兼平荊州之後志盈欲滿罪戮忠良誅及胤嗣元凶已極相國宣文侯先識取亂侮亡之義深建宏圖大舉之策今權已死託孫于諸葛恪若矯權苛暴蠲其虐政民免酷烈偷安新惠外內齊患有同舟之懼雖不能終自保完猶足以延期挺命于深江之表矣昶等或欲汎舟徑渡橫行江表收民略地因糧于寇或欲四道竝進臨之以武誘間攜貳待其崩壞或欲進軍大佃逼其項領積穀觀釁相時而動凡此三者皆取賊之常計也然施之當機則功成名立苟不應節必貽後患自治兵已來出入三載非掩襲之軍也賊喪元帥利存退守若撰飾舟楫羅船津要堅城清野以防卒攻橫行之計殆難必施賊之為寇幾六十年君臣偽立吉凶同患若恪蠲其獘天去其疾崩潰之應不可卒待今邊壤之守與賊相遠賊設羅落又特重密間諜不行耳目無聞夫軍無耳目校察未詳而舉大眾以臨巨險此為希幸徼功先戰而後求勝非全軍之長策也唯有進軍大佃最差完牢可詔昶遵等擇地居險審所錯置及令三方一時前守奪其肥壤使還耕塉土一也兵出民表寇鈔不犯二也招懷近路降附日至三也羅落遠設間構不來四也賊退其守羅落必淺佃作易之五也坐食積穀士不運輸六也釁隙時聞討襲速決七也凡此七者軍事之急務也不據則賊擅便資據之則利歸于國不可不察也夫屯壘相逼形勢已交智勇得陳巧拙得用策之而知得失之計角之而知有餘不足虜之情偽將焉所逃夫以小敵大則役煩力竭以貧敵富則斂重財匱故敵逸能勞之飽能飢之此之謂也然後盛眾厲兵以震之參惠倍賞以招之多方廣似以疑之由不虞之道以間其不戒比及三年左提右挈虜必冰散瓦解安受其獘可坐筭而得也昔漢氏歷世常患匈奴朝臣謀士早朝晏罷介冑之將則陳征伐搢紳之徒咸言和親勇奮之士思展摶噬故樊噲願以十萬之眾橫行匈奴季布面折其短李信求以二十萬獨舉楚人而果辱秦軍今諸將有陳越江陵險獨步虜庭即亦向時之類也以陛下聖德輔相忠賢法明士練錯計于全勝之地振長策以禦之虜之崩潰必然之數故兵法曰屈人之兵而非戰也拔人之城而非攻也若釋廟勝必然之理而行萬一不必全之路誠愚臣之所慮也故謂大佃而逼之計最長魏志傅嘏傳注引司馬彪戰略又本傳亦載此對有刪節請立貴嬪為皇后表有虞始德觀化媯汭夏后創業啟作塗山咸以椒哲垂之曲頌伏惟貴嬪誕秀令族稟貞高冑應昭明之量兼聖善之行金璽未授而玉瑞先顯表贊天休昭隆后祚貞侔先典告踰往訓而猶潛光未即皇統進違二儀烟熅之德退闕懸象兼曜之儀群僚百辟所以竦佇陛下欽若天秩祗贊帝祉夙崇盛禮俾君萬國則六合承風天下幸甚蓺文類聚十五諸葛恪揚聲欲向青徐議淮海非賊輕行之路又昔孫權遣兵入海漂浪沈溺略無孑遺恪豈敢傾根竭本寄命洪流以徼乾沒乎恪不過遣偏率小將素習水軍者乘海泝淮示動青徐恪自并兵來向淮南耳魏志傳嘏傳難劉劭攷課法論難劉劭攷課法論蓋聞帝制宏深聖道奧遠苟非其才則道不虛行神而明之存乎其人暨乎王略虧穨而曠載罔綴微言既沒六籍泯玷何則道弘致遠而眾才莫晞也案劭攷課論雖欲尋前代黜陟之文然其制度略以闕亡禮之存者惟有周典外建侯伯藩屏九服內立列司筦齊六職士有恆貴官有定則百揆均任四民殊業故攷績可理而黜陟易通也大魏繼百王之末承秦漢之烈制度之流靡所修采自建安以來至于青龍神武撥亂肈基皇祚埽除凶逆芟夷遺寇旌旗卷舒日不暇給及經邦治戎權法竝用百官群司軍國通任隨時之宜以應政機以古施今事雜義殊難得而通也所以然者制宜經遠或不切近法應時務不足垂後夫建官均職清理民物所以務本也循名攷實糾勵成規所以治末也本綱未舉而造制未呈國略不崇而攷課是先懼不足以料賢愚之分精幽明之理也昔先王之擇才必本行于州閭講道于庠序行具而謂之賢道修則謂之能鄉老獻賢能于王王拜受之舉其賢者出使長之科其能者人使治之此先王收才之義也方今九州之民爰及京城未有六鄉之舉其選才之職專任吏部案品狀則實才未必當任薄伐則德行未為敘如此則殿最之課未盡人才述綜王度敷贊國式體深義廣難得而詳也魏志傅嘏傳皇初頌尋盛德以降應著顯符于方臻積嘉祚以待期儲鴻施于真人昔九代之革命咸受天之休祥匪至德其焉昭匪至仁其焉章懿大魏之聖后固上天之所興應靈運以承統排閶闔以龍升攄皇象以闡化順帝則以播音遵陽春以行施揆四時以立信運聰明以舉善宣柔惠以養人於赫我后邁德如神化不期月令不浹辰于是天地休豫靈祗歡欣嘉瑞雲集四靈允臻甘露霄零于宮庭醴泉冬涌于中原白雉素烏丹芝朱魚鱗集群萃不可勝書信應天之美瑞受命之靈符也然後覽公卿之讜議詢百僚之典謨天子乃登彫輦戴羽蓋佩玉鏘鏘鑾聲噦噦拜上皇告受位兆休祚導神氣于是建皇初之上元發曠盪之明詔眚災肆赦盪滌瑕穢崇設九賓溥延公卿嘉羞千品俎豆充庭金石具懸鐘鼓畢作歌九功舞八佾鴻澤普皇恩洽民欲得神望塞蓺文類聚十豫作終制戒子儉葬告雲儀等夫禮者生民之始教而百世之中庸也故力行者則為君子不務者終為小人然非聖人莫能履其從容也是以富貴者有驕奢之過而貧賤者譏于固陋于是養生送死苟竊非禮由斯觀之陽虎璵璠甚于暴骨桓魋石椁不如速朽此言儒學撥亂反正鳴鼓矯俗之大義也未是夫窮理盡性陶冶變化之實論也若能原始要終以天地為一區萬物為芻狗該覽玄通求形景之宗同禍福之素一死生之命吾有慕于道矣夫道之為物惟恍惟忽壽為欺魄夭為鳧沒身淪有無與神消息含悅陰陽甘夢太極奚以棺槨為牢衣裳為纏屍繫地下長幽桎梏豈不哀哉昔莊周闊達無所適莫又楊王孫裸體貴不久容耳至夫末世緣生怨死之徒乃有含鱗柙玉床象衽殺人以徇壙穴之內錮以紵絮藉以蜃灰千載僵燥託類神仙于是大教陵遲競于厚葬謂莊子為放蕩以王孫為戮屍豈復識古有衣薪之鬼而野有孤貍之胔乎哉吾以才質滓濁汙于清流昔忝國恩歷試宰守所在無效代匠傷指狼跋首尾無以雪恥如不可求從吾所好今年過耳順奄忽無常苟得獲沒即以吾身襲于王孫矣上冀以贖市朝之逋罪下以親道化之靈祖顧爾幼昏未知臧否若將逐俗抑廢吾志私稱從令未必為孝而犯魏顆聽治之賢爾為棄父之命誰或矜之使死而有知吾將屍視魏志常林傳注引魏略清介傳又戒後亡者不得入藏不得封樹魏志常林傳注引魏略清介傳又敕豫掘埳戒氣絕令二人舉屍即埳絕哭泣之聲止婦女之送禁弔祭之賓無設摶治粟米之奠魏志常林傳注引魏略清介傳對詔論選舉名不足以致異人而可以得常士常士畏教慕善然後有名非所當疾也愚臣既不足以識異人又主者正以循名案常為職但當有以驗其後故古者敷奏以言明試以功今攷績之法廢而以毀譽相進退故真偽混雜虛實相蒙魏志盧毓傳奏祀天地樂舞漢武有雲翹育命之舞不知其所從來舊以祀天地今可兼以雲翹祀圓丘以育命祀方澤也北堂書鈔一百七引魏名臣奏案續漢祭祀志中注引繆襲議如此蓋盧據繆議為之奏定也奏忌月不設樂烈祖明皇帝以今年正月棄離萬國禮忌日不樂甲乙之謂也烈祖明皇帝建丑之月棄天下臣妾之情于此正日有甚甲乙今若以建丑正朝四方會群臣設盛樂不合于禮宋書禮志一議祀厲殊事具犧牲祭器如前後師出告郊之禮魏志文帝紀注引魏郊祀奏駮大理奏亡士妻白等始適夫家數日未與夫相見坐棄市夫女子之情以接見而恩生成婦而義重故詩云未見君子我心傷悲亦既見止我心則夷又禮未廟見之婦而死歸葬女氏之黨以未成婦也今白等生有未見之悲死有非婦之痛而吏議欲肆之大辟則若同牢合巹之後罪何所加且記曰附從輕言附人之罪以輕者為比也又書云與其殺不辜寍失不經恐過重也苟以白等皆受禮聘已入門庭刑之為可殺之為重魏志盧毓傳致禮張珔教張先生所謂上不事天子下不友諸侯者也此豈版謁所可光飾哉但遣主簿奉書致羊酒之禮魏志管寍傳冀州論冀州天下之上國也尚書何平叔鄧玄茂謂其土產無珍人生質樸上古以來無應仁賢之例異徐雍豫諸州也盧釋曰除黃帝已前未可備聞略言唐虞已來冀州乃聖賢之淵藪帝王之寶地東河以上西河以來南河以北易水已南膏壤千里天地之所會陰陽之所交所謂神州也初學記八常山為林大陸為澤蒹葭蒲葦雲母御席魏郡好杏常山好棃房子好緜河內好稻真定好稷中山好栗地產不為無珍也蓺文類聚六十九八十七書鈔一百三十三御覽六十八七百九八百十九八百三十九八百四十又九百六十四九百六十八道論古之公也篤今之公也薄絕骨肉篤也今疏遠天下腄絕骨肉故親離北堂書鈔三十七太王不私其身不外其民故曰百姓之身猶吾身也為夷狄之病棄國之富杖策而去民追慕之如水書鈔三十七夫賢人者至德以為己心行道以為已任處則不求私名仕則不求私寵不為其身不阿其君積禮義于朝播仁風于野使天下之人翼翼焉向戴其君之尊欣欣焉歌舞其君之德初學記十七御覽四百二鳳為羽族之美麟為毛類之俊龜為介蟲之長便柟為眾材之最是物之貴也初學記三十御覽九百十五日月為天下眼目人不知德山川為天下衣食人不知謝御覽三木氣人勇金氣人剛火氣人強而躁土氣人智而寬水氣人急而賊御覽三百六十道德之懷民如春陽之柔物也履淙水而不寒結木條而不折御覽四百三以義事主不私其已以仁接人不私其欲火佚焚家家不罪己食過傷人人不罪食以其積之于仁義無私害也伊尹放太甲太甲無怨心管仲黜伯氏伯氏無怨言以其積之于公正無私惡也御覽四百二十九學所以治己教所以治人不勤學則無以為智不勤教則無以為仁御覽六百十三丹淵之珠沈于黃泥御覽八百三善陣者徒眾整一如列宿之陳部伍周迴如山岳之盤是陣之體也書鈔一百十七外祖母服依周禮議周禮王弔弁絰錫縗禮有損益令進賢冠練單衣通典八十一忌月設樂議正月旦受朝貢群臣奉贄後五日乃大宴會作樂宋書禮志一上言備蜀上言備蜀往者賊亮縮藏窟穴猶有悕懼而頻歲三出鳴鼓邊垂由此言之賊未可忽北堂書鈔一百五十八引魏名臣奏尚書令陳矯僕射衛臻言
