body:
  text: 文帝四上書讓禪皇帝陛下奉被今月乙卯璽書伏聽冊命五內驚震精爽散越不知所處臣前上還相位退守藩國聖恩聽許臣雖無古人量德度身自定之志保己存性實其私願不寤陛下猥損過謬之命發不世之詔以加無德之臣且聞堯禪重華舉其克諧之德舜授文命采其齊聖之美猶下咨四嶽上觀璿璣今臣德非虞夏行非二君而承厤數之諮應選授之命內自揆撫無德以稱且許由匹夫猶拒帝位善卷布衣而逆虞詔臣雖鄙蔽敢忘守節以當大命不勝至願謹拜章陳情使行相國永壽少府糞土臣毛宗奏竝上璽綬魏志文帝紀注引獻帝傳又略見藝文類聚十三上書再讓禪奉今月戊戌璽書重被聖命伏聽冊告肝膽戰悸不知所措天下神器禪代重事故堯將禪舜納于大麓舜之命禹玄圭告功烈風不迷九州攸平詢事攷言然後乃命而猶執謙讓于德不嗣況臣頑固質非二聖乃應天統受終明詔敢守微節歸志箕山不勝大願謹拜表陳情使并奉上璽綬魏志文帝紀注引獻帝傳上書三讓禪臣聞舜有賓于四門之勳乃受禪于陶唐禹有存國七百之功乃承祿于有虞臣以蒙蔽德非二聖猥當天統不敢聞命敢屢抗疏略陳私願庶章通紫庭得全微節情達宸極永守本志而音重復銜命申制詔臣臣實戰惕不發璽書而音迫于嚴詔不敢復命願陛下馳傳騁驛召音還臺不勝至誠謹使宗奉書魏志文帝紀注引獻帝傳有司劾田疇不受封宜免官加刑議建安十五年建安十五年有司劾田疇不受封宜免官加刑議建安十五年昔薳敖逃祿傳載其美所以激濁世勵貪夫賢于尸祿素餐之人也故可得而小不可得而毀至于田疇方斯近矣免官加刑于法為重魏志田疇傳注引魏書報傅崔琰昨奉嘉命惠示雅數欲使燔翳捐褶翳已壞矣褶亦去焉後有此比蒙復誨諸魏志崔琰傳昨奉嘉命廣開正路翳已壞矣畢亦去焉師傳之言實獲我心文苑英華六百二十七辥元超諫皇太子牋引此與魏志不同報吳主孫權黃初三年正月癸亥昔隗囂之斃禍發栒邑子陽之禽變起扞關將軍其亢厲威武勉蹈奇功以稱吾意魏志文帝紀注引魏書又報吳主孫權黃初三年九月黃初三年九月又報吳主孫權黃初三年九月君生于擾攘之際本有縱橫之志降身奉國以享茲祚自君策名已來貢獻盈路討備之功國朝仰成埋而掘之古人之所恥朕之與君大義已定豈樂勞師遠臨江漢廊廟之議王者所不得專三公上君過失皆有本末朕以不明雖有曾母投杼之疑猶冀言者不信以為國福故先遣使者犒勞又遺尚書侍中踐修前言以定任子君遂設辭不欲使進議者怪之又前都尉浩周勸君遣子乃實朝臣交謀以此卜君君果有辭外引隗囂遣子不終內喻竇融守忠而已世殊時異人各有心浩周之還口陳指麾益令議者發明眾嫌終始之本無所據杖故遂俛仰從群臣議今省上事款誠深至心用慨然悽愴動容即日下詔敕諸軍但深溝高壘不得妄進若君必效忠節以解疑議登身朝到夕召兵還此言之誠有如大江吳志吳主權紀黃武元年手報司馬芝省表明卿至心欲奉詔書以權行事是也此乃卿奉詔之意何謝之有後黃門復往慎勿通也魏志司馬芝傳報王朗黃初初年黃初初年報王朗黃初初年覽表雖魏絳稱虞箴以諷晉悼相如陳猛獸以戒漢武未足以喻方今二寇未殄將帥遠征故時入原野以習戎備至于夜還之戒已詔有司施行魏志王朗傳荅繁欽書披書歡笑不能自勝奇才妙伎何其善也頃守宮王孫世有女曰瑣年始九歲夢與神通寤而悲吟哀聲急切涉歷六載于今十五近者督將具以狀聞是日戊午祖于北園博延眾賢遂奏名倡曲極數彈歡情未逞白日西逝清風赴闈羅幃徒祛玄燭方微乃令從官引內世女須臾而至厥狀甚美素顏玄髮皓齒丹脣詳而問之云善歌舞于是振袂徐進揚蛾微眺芳聲清激逸足橫集眾倡騰遊群賓失席然后修容飾妝改曲變度激清角揚白雪接孤聲赴危節于是商風振條春鷹度吟飛霧成霜斯可謂聲協鐘石氣應風律網羅韶濩囊括鄭衛者也今之妙舞莫巧于絳樹清歌莫善于宋臈豈能上亂靈祇下變庶物漂悠風雲橫厲無方若斯也哉固非車子喉轉長吟所能逮也吾練色知聲雅應此選謹卜良日納之閑房藝文類聚四十三初學記十九二十五三十御覽三百八十一五百七十三九百二十六荅楊修書重惠流離卮昭厚意御覽七百六十一與鍾繇書袁王國士更為脣齒荀閎勁悍往來銳師真君侯之勍敵左右之深憂也魏志荀彧傳注引荀氏家傳九日與鍾繇書歲往月來忽復九月九日九為陽數而日月竝應俗嘉其名以為宜于長久故以享宴高會是月律中無射言群木庶草無有射地而生至于芳菊紛然獨榮非夫含乾坤之純和體芬芳之淑氣孰能如此故屈平悲冉冉之將老思飱秋菊之落英輔體延年莫斯之貴謹奉一束以助彭祖之術藝文類聚四北堂書鈔一百五十五初學記四御覽三十二鑄五熟釜成與鍾繇書昔者黃帝三鼎周之九寶咸以一體使調一味豈若斯釜五味時芳蓋鼎之烹飪以饗上帝以養聖賢昭德祈福莫斯之美故非大人莫之能造故非斯器莫宜盛德今之嘉釜有逾茲美夫周之尸臣宋之攷父衛之孔悝晉之魏顆彼四臣者竝以功德勒名鍾鼎今執事寅亮大魏以隆聖化堂堂之德于斯為盛誠太常之所宜銘彝器之所宜勒故作斯銘勒之釜口庶可贊揚洪美垂之不朽魏志鍾繇傳注引魏略又見御覽七百五十七又與鍾繇書丕白良玉比德君子珪璋見美詩人晉之垂棘魯之璵璠宋之結綠楚之和璞價越萬金貴重都城有稱疇昔流聲將來是以垂棘出晉虞虢雙禽和璧入秦相如抗節竊見玉書稱美玉白如截肪黑譬純漆赤擬鷄冠黃侔蒸栗側聞斯語未覩厥狀雖德非君子義無詩人高山景行私所仰慕然四寶邈焉已遠秦漢未聞有良比也是以求之曠年不遇厥真私願不果飢渴未副近見南陽宗惠叔稱君侯昔有美玦聞之驚喜笑與抃會當自白書恐傳言未審是以令舍弟子建因荀仲茂時從容喻鄙旨乃不忽遺厚見周稱鄴騎既到寶玦初至捧匣跪發五內震駭繩窮匣開爛然滿目猥以蒙鄙之姿得覩希世之寶不煩一介之使不損連城之價既有秦昭章臺之觀而無藺生詭奪之誑嘉貺益腆敢不欽承謹奉賦一篇以讚揚麗質丕白魏志鍾繇傳注引魏略文選御覽九百六十四又報鍾繇書得報知喜南方至于荀公之清談孫權之嫵媚執書嗢噱不能離手若權復黠當折以汝南許邵月旦之評權優游二國俯仰荀許亦已足矣魏志鍾繇傳注引魏略借取廓落帶嘲劉楨書夫物因人為貴故在賤者之手不御至尊之側今雖取之勿嫌其不反也魏志王粲傳注引典略與吳質書五月十八日丕白季重無恙途路雖局官守有限願言之懷良不可任足下所治僻左書問致簡益用增勞每念昔日南皮之游誠不可忘既妙思六經逍遙百氏彈棊閒設終以六博高談娛心哀箏順耳馳騖北場旅食南館浮甘瓜于清泉沈朱李于寒水白日既匿繼以朗月同乘竝載以游後園輿輪徐動參從無聲清風夜起悲笳微吟樂往哀來淒然傷懷余顧而言斯樂難常足下之徒咸以為然今果分別各在一方元瑜長逝化為異物每一念至何時可言方今蕤賓紀時景風扇物天氣和暖眾果具繁時駕而游北遵河曲從者鳴笳以啟路文學託乘于後車節同時異物是人非我勞如何今遣騎到鄴故使枉道相過行矣自愛丕白文選又見魏志王粲傳注引魏略又藝文類聚二十六又與吳質書二月三日丕白歲月易得別來行復四年三年不見東山猶歎其遠況乃過之思何可支雖書疏往返未足解其勞結昔年疾疫親故多離其災徐陳應劉一時俱逝痛可言邪昔日遊處行則連輿止則接席何曾須臾相失每至觴酌流行絲竹竝奏酒酣耳熱仰而賦詩當此之時忽然不自知樂也謂百年己分可長共相保何圖數年之閒零落略盡言之傷心頃撰其遺文都為一集觀其姓名以為鬼錄追思昔遊猶在心目而此諸子化為糞壤可復道哉觀古今文人類不護細行鮮能以名節自立而偉長獨懷文抱質恬淡寡欲有箕山之志可謂彬彬君子者矣著中論二十餘篇成一家之言辭義典雅足傳于後此子為不朽矣德璉常斐然有述作之意其才學足以著書美志不遂良可痛惜閒者歷覽諸子之文對之抆淚既痛逝者行自念也孔璋章表殊健微為繁富公幹有逸氣但未遒耳其五言詩之善者妙絕時人元瑜書記翩翩致足樂也仲宣續自善于辭賦惜其體弱不足起其文至于所善古人無以遠過昔伯牙絕絃于鍾期仲尼覆醢于子路痛知音之難遇傷門人之莫逮諸子但為未及古人自一時之雋也今之存者已不逮矣後生可畏來者難誣然恐吾與足下不及見也年行已長大所懷萬端時有所慮至通夜不瞑志意何時復類昔日已成老翁但未白頭耳光武言年三十餘在兵中十歲所更非一吾德不及之年與之齊矣以犬羊之質服虎豹之文無眾星之明假日月之光動見瞻觀何時易乎恐永不復得為昔日遊也少壯真當努力年一過往何可攀援古人思炳燭夜遊良有以也頃何以自娛頗復有所述造不東望於邑裁書敘心丕白魏志王粲傳又裴注引魏略文選藝文類聚二十六又與吳質書延康元年延康元年又與吳質書延康元年南皮之游存者三人烈祖龍飛或將或侯今惟吾子棲遲下仕從我游處獨不及門缻罄罍恥能無懷愧路不云遠今復相聞魏志王粲傳注荅曹洪書今魯包凶邪之心肆蠱惑之政天兵神拊師徒無暴樵牧不臨文選陳孔璋為曹洪與文帝書注今魯罪兼苗桀惡稔厲莽縱使宋翟妙機械之巧田單騁奔牛之狂孫吳勒八陳之變猶無益也同上與曹洪書五賢興邦二八登帝書鈔十一與王朗書建安二十二年冬建安二十二年冬與王朗書建安二十二年冬生有七尺之形死惟一棺之土惟立德揚名可以不朽其次莫如著篇籍疫癘數起士人彫落余獨何人能全其壽故論撰所著典論詩賦蓋百餘篇集諸儒于肅城門內講論大義侃侃無倦魏志文帝紀注引魏書蚤蝨雖細處于安寢鼷鼠雖微猶毀郊牛初學記二十九鼠御覽九百五十一丕白不受江漢之珠而受巴蜀之鉤此言難得之貴寶不若易有之賤物御覽三百五十四孫權重遣使稱臣奉貢明珠百筐黃金千鎰馴象二頭或牝或牡擾禽鸚鵡其他珍玩盈舟溢航千類萬品御覽六百二十六荅王朗書建安二十四年建安二十四年荅王朗書建安二十四年昔石厚與州吁游父碏知其與亂韓子昵田蘇穆子知其好仁故君子游必有方居必就士誠有以也嗟乎宋忠無石子先識之明老罹此禍今雖欲願行滅親之誅立純臣之節尚可得邪蜀志尹默傳注引魏略荅劉備書獲累紙之命兼美之貺他既備善雙鉤尤妙前後之惠非賢兄之貢則執事之貽也來若川流聚成山積其充匱笥頓府藏者固已無數矣御覽三百五十四與孟達書延康元年延康元年與孟達書延康元年近日有命不足達旨何者昔伊摯背商而歸周百里去虞而入秦樂毅感鴟夷以蟬蛻王遵識順逆以去就皆審廢興之符效知成敗之必然故丹青畫其形容良史載其功勳聞卿姿度純茂器量優絕當騁能明時收名傳記今者翻然濯鱗清流甚相嘉樂虛心西望依依若舊下筆屬辭歡心從之昔虞卿入趙再見取相陳平就漢一覲參乘孤今于卿情過于往故致所御馬物以昭忠愛魏志明帝紀注引魏略今者海內清定萬里一統三垂無邊塵之警中夏無狗吠之虞以是弛罔闊禁與世無疑保官空虛初無質任卿來相就當明孤意慎勿令家人繽紛道路以親駭疏也若卿欲來相見且當先安部曲有所保固然後徐徐輕騎來東同上與孫權書前使于禁郭及夫所道吾纖驪馬本欲使禁自致之念將軍儻欲速得今故先以付徐奉往此二馬朕之常所自乘甚調良善走數萬匹之極選者乘之真可樂也中國雖饒馬其知名絕足亦時有之耳藝文類聚九十三御覽八百九十四知己選擇見船最大樟材者六艘受五百石從沔水送付樊口御覽七百七十今因趙咨致文馬一匹白鼲子裘一領石蜜五斛鰒魚千枚御覽八百五十七九百三十八與諸將書劉備既孤老智窮勢極正使欲與死爭則諸將軍便當就穴中將取之爾北堂書鈔一百五十八與劉曄書劉生帽裁製微不長有似里父之服御覽六百八十七與朝臣書江表惟長沙名有好米何得比新城秔稻邪上風炊之五里聞香藝文類聚八十五初學記二十七御覽八百三十九送劍書送劍書僕有劍一枚明珠標首藍玉飾靶因給左右以除妖氛敘詩為太子時北園及東閣講堂竝賦詩命王粲劉楨阮瑀應瑒等同作初學記十皇太子門引魏文帝集敘繁欽上西征余守譙繁欽從時辥訪車子能喉囀與笳同音欽牋還與余盛歎之雖過其實而其文甚麗文選繁欽與魏文帝牋注引文帝集敘陳琳上平定漢中族父都護還書與余盛稱彼方土地形勢觀其詞知陳琳所敘為也文選陳孔璋為曹洪與文帝書注御覽五百九十五竝引文帝集誡子父母于子雖肝腸腐爛為其掩避不欲使鄉黨士友聞其罪過然行之不改久矣人自知之用此任官不亦難乎御覽四百五十九周成漢昭論或方周成王于漢昭帝僉高成而下昭余以為周成王體上聖之休氣稟賢妣之貽誨周召為保傅呂尚為太師口能言則行人稱辭足能履則相者導儀目厭威容之美耳飽仁義之聲所謂沈漬玄流而沐浴清風者矣猶有咎悔聆二叔之謗使周公東遷皇天赫怒顯明厥咎猶啟諸金縢稽諸國史然後乃悟不亮周公之聖德而信金縢之教言豈不暗哉夫孝昭父非武王母非邑姜養惟蓋主相則桀光體不承聖化不胎育保無仁孝之質佐無隆平之治所謂生于深宮之中長于婦人之手然而德與性成行與體并年在二七早智夙達發燕書之詐亮霍光之誠豈將有啟金縢信國史而後乃悟哉使夫昭成均年而立易世而化貿臣而治換樂而歌則漢不獨少周不獨多也藝文類聚十二御覽八十九太宗論昔有苗不賓重華舞以干戚尉佗稱帝孝文撫以恩德吳王不朝錫之几杖以撫其意而天下賴安乃弘三章之教愷悌之化欲使曩時累息之民得闊步高談無危懼之心若賈誼之才敏籌畫國政特賢臣之器管晏之姿豈若孝文大人之量哉魏志文帝紀注引魏書交友論夫陰陽交萬物成君臣交邦國治士庶交德行光同憂樂共富貴而友道備矣易曰上下交而其志同由是觀之交乃人倫之本務王道之大義非特士友之志也初學記十八引魏文帝集連珠蓋聞琴瑟高張則哀彈發節士抗行則榮名至是以申胥流音于南極蘇武揚聲于朔裔蓋聞四節異氣以成歲君子殊道以成名故微子奔走而顯比干剖心而榮蓋聞駑蹇服御良樂咨嗟鉛刀剖截歐冶歎息故少師幸而季梁懼宰嚭任而伍員憂藝文類聚五十七五熟釜銘於赫有魏作漢藩輔厥相惟鍾寔幹心膂靖恭夙夜匪遑安處百寮師師楷茲度矩魏志鍾繇傳露陌刀銘於鑠良刀胡煉亶時譬諸麟角靡所任茲不逢不若永世寶持藝文類聚六十初學記二十二御覽三百四十六曹蒼舒誄惟建安十有五年五月甲戌童子曹蒼舒卒嗚呼哀哉乃作誄曰於惟淑弟懿矣純良誕豐令質荷天之光既哲且仁爰柔克剛彼德之容茲義肇行猗歟公子終然允臧宜逢介祉以永無疆如何昊天雕斯俊英嗚呼哀哉惟人之生忽若朝露促促百年亹亹行暮矧爾既夭十三而卒何辜于天景命不遂兼悲增傷侘傺失氣永思長懷哀爾罔極貽爾良妃襚爾嘉服越以乙酉宅彼城隅增丘峨峨寢廟渠渠姻媾雲會充路盈衢悠悠群司岌岌其車傾都蕩邑爰迄爾居魂而有靈庶可以娛嗚呼哀哉藝文類聚四十五古文苑武帝哀策文痛神曜之幽潛哀鼎俎之虛置舒皇德而詠思遂腷臆以莅事矧乃小子夙遭不造煢煢在疚嗚呼皇考產我曷晚棄我曷早群臣子輔奪我哀願猥抑奔墓俯就權變卜葬既從大隧既通漫漫長夜窈窈玄宮有晦無明曷有所窮鹵簿既整三官駢羅前驅建旗方相執戈棄此宮庭陟彼山阿藝文類聚十三受禪告天文延康元年十一月辛未延康元年十一月辛未受禪告天文延康元年十一月辛未皇帝臣丕敢用玄牡昭告于皇皇后帝漢歷世二十有四踐年四百二十有六四海困窮王綱不立五緯錯行靈祥竝見推術數者慮之古道咸以為天之厤數運終茲世凡諸嘉祥民神之意比昭有漢數終之極魏家受命之符漢主以神器宜授于臣憲章有虞致位于丕丕震畏天命雖休勿休群公庶尹六事之人外及將士洎于蠻夷君長僉曰天命不可以辭拒神器不可以久曠群臣不可以無主萬機不可以無統丕祗承皇象敢不欽承卜之守龜兆有大橫筮之三易兆有革兆謹擇元日與群寮登壇受帝璽綬告類于爾大神惟爾有神尚饗永吉兆民之望祚于有魏世享魏志文帝紀注引獻帝傳失題博覽群書書鈔十二引魏文集
