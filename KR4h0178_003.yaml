body:
  text: 武帝使辛毗曹休參治下辨令二十二年十月二十二年十月使辛毗曹休參治下辨令二十二年十月昔高祖貪財好色而良平匡其過失今佐治文烈憂不輕矣魏志辛毗傳敕王必領長史令二十三年正月二十三年正月敕王必領長史令二十三年正月領長史王必是吾披荊棘時吏也忠能勤事心如鐵石國之良吏也蹉跌久未辟之舍騏驥而弗乘焉遑遑而更求哉故教辟之已署所宜便以領長史統事如故魏志武帝紀注引魏武故事又御覽二百四十八贍給災民令二十三年四月去冬天降疫癘民有凋傷軍興于外墾田損少吾甚憂之其令吏民男女女年七十已上無夫子若年十二已下無父母兄弟及目無所見手不能作足不能行而無妻子父兄産業者廩食終身幼者至十二止貧窮不能自贍者隨口給貸老耄須待養者年九十已上復不事家一人魏志武帝紀注引魏書終令古之葬者必居瘠薄之地其規西門豹祠西原上為壽陵因高為基不封不樹周禮冢人掌公墓之地凡諸侯居左右以前卿大夫居後漢制亦謂之陪陵其公卿大臣列將有功者宜陪壽陵其廣為兆域使足相容魏志武帝紀宋書禮志二假徐晃節令此閣道漢中之險要咽喉也劉備欲斷絶外內以取漢中將軍一舉克奪賊計善之善者也魏志徐晃傳在陽平將還師令雞肋魏志武帝紀注引九州春秋選留府長史令釋騏驥而不乘焉皇皇而更索魏志杜襲傳原劉廙令叔向不坐弟虎古之制也特原不問魏志劉廙傳遣徐商呂建等詣徐晃令須兵馬集至乃俱前魏志徐晃傳以徐奕為中尉令昔楚有子玉文公為之側席而坐汲黯在朝淮南為之折謀詩稱邦之司直君之謂與魏志徐奕傳勞徐晃令賊圍塹鹿角十重將軍致戰全勝遂陷賊圍多斬首虜吾用兵三十餘年及所聞古之善用兵者未有長驅徑入敵圍者也且樊襄陽之在圍過于莒即墨將軍之功踰孫武穰苴魏志徐晃傳追稱丁幼陽令昔吾同縣有丁幼陽者其人衣冠良士又學問材器吾愛之後以憂恚得狂疾即差愈往來故當共宿止吾常遣歸謂之曰昔狂病儻發作持兵刃我畏汝俱共大笑輒遣不與共宿御覽七百三十九內誡令平參王作問大人語元盈言卒位上設青布帳教撤去以為大人自可施帳當令君臣上下悉共見書鈔未改本一百三十二孤不好鮮飾嚴具所用雜新皮韋笥以黃韋緣中遇亂無韋笥乃作方竹嚴具以帛衣粗布作裏此孤之平常所用也書鈔未改本一百三十六百鍊利器以辟不祥攝服姦宄者也御覽三百四十五吾衣被皆十歲也歲解浣補納之耳御覽四百三十一八百十九今貴人位為貴人金印藍紱女人爵位之極御覽六百九十一吏民多製文繡之服履絲不得過絳紫金黃絲織履前于江陵得雜綵絲履以與家約當盡著此履不得效作也御覽六百九十七孤有逆氣病常儲水臥頭以銅器盛臭惡前以銀作小方器人不解謂孤喜銀物令以木作御覽七百五十六昔天下初定吾便禁家內不得熏香後諸女配國家為其香因此得燒香吾不好燒香恨不遂初禁今復禁不得燒香其以香藏衣著身亦不得御覽九百八十一房屋不潔聽燒楓膠及蕙香御覽九百八十二禮讓令里諺曰讓禮一寸得禮一尺斯合經之要矣藝文類聚二十一御覽四百二十四辭爵逃祿不以利纍名不以位虧德之謂讓藝文類聚二十一御覽四百二十四引魏武雜事清時令今清時但當盡忠于國效力王事雖私結好于他人用千匹絹萬石穀猶無所益造發石車令傳言旝動而鼓本注云説文曰旝發石車也御覽三百三十七引魏武本紀百辟刀令往歲作百辟刀五枚適成先以一與五官將其餘四吾諸子中有不好武而好文學者將以次與之藝文類聚六十御覽三百四十五鼓吹令孤所以能常以少兵敵衆者常念增戰士忽餘事是以往者有鼓吹而使步行為戰士愛馬也不樂多署吏為戰士愛糧也御覽五百六十七戒飲山水令凡山水甚強寒飲之皆令人痢御覽七百四十三軍策令孤先在襄邑有起兵意與工師共作卑手刀時北海孫賓碩來候孤譏孤曰當慕其大者乃與工師共作刀耶孤答曰能小復能大何害書鈔一百二十三御覽三百四十六袁本初鎧萬領吾大鎧十二領本初馬鎧三百具吾不能有十具見其少遂不施也吾遂出奇破之是時士卒練甲不與今時等也御覽三百五十六夏侯淵今月賊燒卻鹿角鹿角去本營十五里淵將四百兵行鹿角因使士補之賊山上望見從谷中卒出淵使兵與鬭賊遂繞出其後兵退而淵未至甚可傷淵本非能用兵也軍中呼為白地將軍為督帥尚不當親戰況補鹿角乎御覽三百三十七軍令兵欲作陳對敵營先白表乃引兵就表而陳皆無喧譁明聽鼓音旗幡麾前則前麾後則後麾左則左麾右則右不聞令而擅前後左右者斬伍中有不進者伍長殺之伍長不進什長殺之什長不進都伯殺之督戰部曲將拔刃在後察違令不進者斬之一部受敵餘部有不進救者斬之御覽二百九十六吾將士無張弓弩于軍中其隨大軍行其欲試調弓弩者得張之不得著箭犯者鞭二百沒入吏不得于營中屠殺賣之犯令沒所賣皮都督不糾白杖五十始出營豎矛戟舒幡旗鳴鼓行三里辟矛戟結幡旗止鼓將至營舒幡旗鳴鼓至營訖復結幡旗止鼓違令者髡翦以徇軍行不得斫伐田中五果桑柘棘棗通典一百四十九船戰令雷鼓一通吏士皆嚴再通什伍皆就船整持櫓棹戰士各持兵器就船各當其所幢幡旗鼓各隨將所載船鼓三通鳴大小戰船以次發左不得至右右不得至左前後不得易處違令者斬通典一百四十九御覽三百三十四步戰令嚴鼓一通步騎悉裝再通騎上馬步結屯三通以次出之隨幡所指住者結屯幡後聞急鼓音整陳斥候者視地形廣狹從四角面立表制戰陳之宜諸部曲者各自安部陳兵疏數兵曹舉白不如令者斬兵若欲作陳對敵營先白表乃引兵就表而陳臨陳皆無歡譁明聽鼓音旗幡麾前則前麾後則後麾左則左麾右則右不聞令而擅前後左右者斬伍中有不進者伍長殺之伍長有不進者什長殺之什長有不進者都伯殺之督戰部曲將拔刃在後察違令不進者斬之一部受敵餘部不進救者斬臨戰兵弩不可離陳離陳伍長什長不舉發與同罪無將軍令有妄行陳間者斬臨戰陳騎皆當在軍兩頭前陷陳騎次之遊騎在後違令髡鞭二百兵進退入陳間者斬若步騎與賊對陳臨時見地勢便欲使騎獨進討賊者聞三鼓音騎特從兩頭進戰視麾所指聞三金音還此但謂獨進戰時也其步騎大戰進退自如法吏士向陳騎馳馬者斬吏士有妄呼大聲者斬追賊不得獨在前在後犯令者罰金四兩士將戰皆不得取牛馬衣物犯令者斬進戰士各隨其號不隨號者雖有功不賞進戰後兵出前前兵在後雖有功不賞臨陳牙門將騎督明受都令諸部曲都督將吏士各戰時校督部曲督住陳後察凡違令畏懦者有急聞雷鼓音絶後六音嚴畢白辨便出卒逃歸斬之一日家人弗捕執及不言于吏盡與同罪通典一百四十九御覽三百營繕令諸私家不得有艨衝等御覽七百七十與皇甫隆令聞卿年出百歲而體力不衰耳目聰明顏色和悅此盛事也所服食施行導引可得聞乎若有可傳想可密示封內千金方卷八十一遺令吾夜半覺小不佳至明日飲粥汗出服當歸湯吾在軍中持法是也至于小忿怒大過失不當效也天下尚未安定未得遵古也吾有頭病自先著幘吾死之後持大服如存時勿遺百官當臨殿中者十五舉音葬畢便除服其將兵屯戍者皆不得離屯部有司各率乃職斂以時服葬于鄴之西岡上與西門豹祠相近無藏金玉珍寶吾婢妾與伎人皆勤苦使著銅雀臺善待之于臺堂上安六尺床施繐帳朝晡上脯糒之屬月旦十五日自朝至午輒向帳中作伎樂汝等時時登銅雀臺望吾西陵墓田餘香可分與諸夫人不命祭諸舍中無所為可學作組履賣也吾歷官所得綬皆著藏中吾餘衣裘可別為一藏不能者兄弟可共分之魏志武帝紀宋書禮志二世説言語篇注文選陸機弔魏武文序通典八十書鈔一百三十二御覽五百又五百六十又六百八十七又六百九十七六百九十九八百二十又八百五十九下州郡昔仲尼之于顏子每言不能不歎既情愛發中又宜率馬以驥今吾亦冀衆人仰高山慕景行也魏志杜畿傳注引杜氏新書拒王芬辭夫廢立之事天下之至不祥也古人有權成敗計輕重而行之者伊尹霍光是也伊尹懷至忠之誠據宰臣之勢處官司之上故進退廢置計從事立及至霍光受託國之任藉宗臣之位內因太后秉政之重外有群卿同欲之勢昌邑即位日淺未有貴寵朝乏讜臣議出密近故計行如轉圜事成如摧朽今諸君徒見曩者之易未覩當今之難諸君自度結衆連黨何若七國合肥之貴孰若吳楚而造作非常欲望必克不亦危乎魏志武帝紀注引魏書載太祖拒芬辭遺荀攸書方今天下大亂智士勞心之時也而顧觀變蜀漢不已久乎魏志荀攸傳手書與呂布山陽屯送將軍所失大封國家無好金孤自取家好金更相為作印國家無紫綬自取所帶紫綬以籍心將軍所使不良袁術稱天子將軍止之而使不通章朝廷信將軍使復重上以相明忠誠魏志呂布傳注引英雄記與荀彧書建安三年五月三年五月與荀彧書建安三年五月賊來追吾雖日行數里吾策之到安衆破繡必矣魏志武帝紀自志才亡後莫可與計事者汝潁固多奇士誰可以繼之魏志郭嘉傳御覽四百六十七與君共事已來立朝廷君之相為匡弼君之相為舉人君之相為建計君之相為密謀亦已多矣夫功未必皆野戰也願君勿讓魏志荀彧傳注引彧別傳與荀彧書追傷郭嘉郭奉孝年不滿四十相與周旋十一年險阻艱難皆共罹之又以其通達見世事無所疑滯欲以後事屬之何意卒爾失之悲痛傷心今表增其子滿千戶然何益亡者追念之感深且奉孝乃知孤者也天下人相知者少又以此痛惜奈何奈何魏志郭嘉傳注引傅子追惜奉孝不能去心其人見時事兵事過絶於人又人多畏病南方有疫常言吾往南方則不生還然與共論討云當先定荊此為不但見計之忠厚必欲立功分棄命定事人心乃爾何得使人忘之魏志郭嘉傳注引傅子下荊州書建安十三年九月建安十三年九月下荊州書建安十三年九月不喜得荊州喜得蒯異度耳魏志劉表傳注引傅子與鍾繇書得所送馬甚應其急關右平定朝廷無西顧之憂足下之勳也昔蕭何鎮守關中足食成軍亦適當爾魏志鍾繇傳手書答朱靈兵中所以為危險者外對敵國內有姦謀不測之變昔鄧禹中分光武軍西行而有宗歆馮愔之難後將二十四騎還洛陽禹豈以是減損哉來書懇惻多引咎過未必如所云也魏志徐晃傳注引魏書與王修書君澡身浴德流聲本州忠能成績為世美談名實相副過人甚遠孤以心知君至深至熟非徒耳目而已也察觀先賢之論多以鹽鐵之利足贍軍國之用昔孤初立司金之官念非屈君餘無可者故與君教曰昔遏父陶正民賴其器用及子媯滿建侯于陳近桑弘羊位至三公此君元龜之兆先告者也是孤用君之本言也或恐衆人未曉此意自是以來在朝之士每得一顯選常舉君為首及聞袁軍師衆賢之議以為不宜越君然孤執心將有所底以軍師之職間于司金至于建功重于軍師孤之精誠足以達君君之察孤足以不疑但恐旁人淺見以蠡測海為蛇畫足將言前後百選輒不用之而使此君沈滯冶官張甲李乙尚猶先之此主人意待之不優之效也孤懼有此空聲冒實淫蛙亂耳假有斯事亦庶鍾期不失聽也若其無也過備何害昔宣帝察少府蕭望之才任宰相故復出之令為馮翊從正卿往似于左遷上使侍中宣意曰君守平原日淺故復試君三輔非有所間也孤揆先主中宗之意誠備此事既君崇勳業以副孤意公叔文子與臣俱升獨何人哉魏志王修傳注引魏略與孫權書近者奉辭伐罪旄麾南指劉琮束手今治水軍八十萬衆方與將軍會獵于吳吳志孫權傳注引江表傳又藝文類聚六十六御覽八百三十一赤壁之役值有疾病孤燒船自退橫使周瑜虛獲此名吳志周瑜傳注引江表傳手書與閻行觀文約所為使人笑來吾前後與之書無所不説如此何可復忍卿父諫議自平安也雖然牢獄之中非養親之處且又官家亦不能久為人養老也魏志張既傳注引魏略報蒯越書死者反生生者不愧孤少所舉行之多矣魂而有靈亦將聞孤此言也魏志劉琮傳注引傅子與諸葛亮書今奉雞舌香五斤以表微意與太尉楊彪書操白與足下同海內大義足下不遺以賢子見輔比中國雖靖方外未夷今軍征事大百姓騷擾吾制鐘鼓之音主簿宜守而足下賢子恃豪父之勢每不與吾同懷即欲直繩顧頗恨恨謂其能改遂轉寬舒復即宥貸將延足下尊門大纍便令刑之念卿父息之情同此悼楚亦未必非幸也今贈足下錦裘二領八節銀角桃杖一枚青氈床褥三具官絹五百匹錢六十萬畫輪四望通幰七香車一乘青牸牛二頭八百里驊騮馬一匹赤戎金裝鞍轡十副鈴眊一具驅使二人並遺足下貴室錯綵羅縠裘一領織成靴一量有心青衣二人長奉左右所奉雖薄以表吾意足下便當慨然承納不致往返古文苑又略見書鈔一百三十三一百三十四初學記二十五御覽三百四十一四百七十八六百九十三六百九十四六百九十八七百八又七百十又七百七十三八百十五答袁紹初平元年正月初平元年正月答袁紹初平元年正月董卓之罪暴于四海吾等合大衆興義兵而遠近莫不響應此以義動故也今幼主微弱制于姦臣未有昌邑亡國之釁而一旦改易天下其孰安之諸君北面我自西向魏志武帝紀注引魏書報荀彧微足下之相難所失多矣水經湍水注繡遏吾歸師迫吾死地水經湍水注君之策謀非但所表二事前後謙沖欲慕魯連先生乎此聖人達節者所不貴也昔介子推有言竊人之財猶謂之盜況君密謀安衆光顯于孤者以百數乎以二事相還而復辭之何取謙亮之多邪魏志荀彧傳注引彧別傳又見袁宏後漢紀三十略同楊阜讓爵報君與群賢共建大功西土之人以為美談子貢辭賞仲尼謂之止善君其剖心以順國命薑敘之母勸敘早發明智乃爾雖楊敞之妻蓋不過此賢哉賢哉良史紀録必不墜于地矣魏志楊阜傳報劉廙建安二十年建安二十年報劉廙建安二十年非但君當知臣臣亦當知君今欲使吾坐行西伯之德恐非其人也魏志劉廙傳孫子兵法序操聞上古有弧矢之利論語曰足食足兵尚書八政曰師易曰師貞丈人吉詩曰王赫斯怒爰征其旅黃帝湯武咸用干戚以濟世也司馬法曰人故殺人殺之可也恃武者滅恃文者亡夫差偃王是也聖賢之于兵也戢而時動不得已而用之吾觀兵書戰策多矣孫武所著深矣孫子者齊人也名武為吳王闔閭作兵法一十三篇試之婦人卒以為將西破強楚入郢北威齊晉后百歲餘有孫臏是武之后也審計重舉明畫深圖不可相誣而但世人未之深亮訓説況文煩富行於世者失其旨要故撰為略解焉御覽二百七十又道藏本孫子十家注有刪節戒子植吾昔為頓丘令年二十三思此時所行無悔于今今汝年亦二十三矣可不勉歟魏志陳思王植傳又御覽四百五十九引曹植別傳家傳曹叔振鐸之後魏志蔣濟傳注兵書要略銜枚毋歡譁唯令之從御覽三百五十七兵法太白已出高賊深入人境可擊必勝去勿追雖見其利必有後害開元占經四十五四時食制郫縣子魚黃鱗赤尾出稻田可以為醬御覽九百三十六𩶶一名黃魚大數百斤骨軟可食出江陽犍為御覽九百三十六蒸鮕御覽九百三十七東海有大魚如山長五六里謂之鯨鯢次有如屋者時死岸上膏流九頃其鬚長一丈二三尺厚六寸瞳子如三升碗大骨可為臼文選海賦注御覽九百三十八海牛魚皮生毛可以飾物出揚州御覽九百三十九望魚側如刀可以刈草出豫章明都澤御覽九百三十九蕭折魚海之乾魚也御覽九百三十九䱐䰽魚黑色大如百斤豬黃肥不可食數枚相隨一浮一沈一名敷常見首出淮及五湖御覽九百三十九蕃踰魚如鱉大如箕甲上邊有髯無頭口在腹下尾長數尺有節有毒螫人御覽九百三十九髮魚帶髮如婦人白肥無鱗出滇池御覽九百四十蒱魚其鱗如粥出郫縣御覽九百四十疏齒魚味如豬肉出東海御覽九百四十班魚頭中有石如珠出北海御覽九百四十鱣魚大如五斗奩長丈口頷下常三月中從河上常于孟津捕之黃肥唯以作酢淮水亦有初學記三十題識送終衣奩有不諱隨時以斂金珥珠玉銅鐵之物一不得送通典七十九祀故太尉橋玄文故太尉橋公誕敷明德泛愛博容國念明訓士思令謨靈幽體翳邈哉晞矣吾以幼年逮升堂室特以頑鄙之姿為大君子所納增榮益觀皆由獎助猶仲尼稱不如顏淵李生之厚歎賈復士死知己懷此無忘又承從容約誓之言殂逝之後路有經由不以斗酒隻雞過相沃酹車過三步腹痛勿怪雖臨時戲笑之言非至親之篤好胡肯為此辭乎匪謂靈忿能詒己疾舊懷惟顧念之悽愴奉命東征屯次鄉里北望貴土乃心陵墓裁致薄奠公其尚饗魏志武帝紀注引褒賞令又見後漢書橋玄傳水經二十四睢水注藝文類聚三十八操以頑質見納君子士死知己懷此無忘又承約言徂沒之後路有經由不以斗酒隻雞過相沃酹車過三步腹痛勿怨雖臨時戲言非至親篤好胡肯為此辭哉悽愴致祭以申宿懷失題好學明經書鈔十二引魏武帝集
