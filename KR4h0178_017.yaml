body:
  text: 陳王植五學官頌自五帝典絶三皇禮廢應期命世齊賢等聖者莫高於孔子也故有若曰出乎類拔乎萃誠所謂性與天道不可得而聞矣由也務學名在前志宰豫晝寢糞土作誡過庭子弟詩禮明記歌以詠言文以騁志豫今不述后賢曷識於鑠尼父生民之傑性與天成該聖備藝德倫三五配皇作烈玄鏡獨鑑神明昭晰仁塞宇宙志凌雲霓學者三千莫不俊乂惟仁是憑惟道足恃鑽仰彌高請益不已言為世範行為時矩文選沈休文安陸昭王碑文李注引學官頌孔子廟頌修復舊廟豐其甍宇莘莘學徒爰居爰處王教既備郡小遄沮魯道以興永作憲矩洪聲登避神祇來祜休徵雜沓瑞我邦家內光區域外被荒遐余前封鄄城侯轉雍丘皆遇荒土宅宇初造以府庫尚豐志在繕宮室務園圃而已農桑一無所營經離十載塊然守空飢寒備嘗聖朝愍之故封此縣田則一州之膏腴桑則天下之甲第故封此桑以為田社乃作頌云社頌於惟太社官名后土是曰勾龍功著上古德配帝王實為靈主克明播植農正曰柱尊以作稷豐年是與義與社同方神北宇建國承家莫不攸敘皇子生頌於聖我后憲章前志克篡二皇三靈昭事祗肅郊廟明德敬惠潛和積石鍾天之釐嘉月令辰篤生聖嗣天地降祥儲君應祉慶由一人萬國作喜喁喁萬國岌岌群生稟命我后綏之則榮長為臣職終天之經仁聖奕代永載明明同年上帝休祥淑禎藩臣作頌光流德聲吁嗟卿士祗承豫聽冬至獻襪頌玉趾既御履和蹈貞行與祿邁動以祥并南窺北戶西巡王城翱翔萬域聖體浮輕晷景舒長書鈔一百五十六引冬至獻襪履頌舒原作耶校改酈生頌序余道經酈生之墓聊駐馬書此文於其碑側玄俗頌玄俗妙識飢餌神穎在陰倏游即陽無景逍遙北嶽凌霄引領揮霧昊天含神自靜例女傳頌尚卑貴禮來世作程母儀頌殷湯令妃有莘之女仁教內修度義以處清謐后宮九嬪有序伊為媵臣遂作元輔明賢頌於鑠姜后光配周宣非禮不動非禮不言晏起失朝永巷告愆王用勤政萬國以虔宜男花頌草號宜男既曄且貞其貞伊何惟乾之嘉其曄伊何緑葉丹花光采晃曜配彼朝日君子耽樂好和琴瑟固作螽斯惟立孔臧福濟大姒永世克昌柳頌序豫以間暇駕言出遊過友人楊德祖之家視其屋宇寥廓庭中有一柳樹聊戲刊其枝葉故著斯文表之遺翰遂因辭勢以譏當今之士畫贊序蓋畫者鳥書之流也昔明德馬后美於色厚於德帝用嘉之嘗從觀畫過虞舜廟見娥皇女英帝指之戲后曰恨不得如此人為妃又前見陶唐之像后指堯曰嗟乎群臣百寮恨不得戴君如是帝顧而笑故夫畫所見多矣上形太極混元之前卻列將來未萌之事觀畫者見三皇五帝莫不仰戴見三季暴主莫不悲惋見篡臣賊嗣莫不切齒見高節妙士莫不忘食見忠節死難莫不抗首見忠臣孝子莫不歎息見淫夫妬婦莫不側目見令妃順后莫不嘉貴是知存乎鑒者何如也庖犧贊木德風姓八卦創焉龍瑞名官法地象天庖廚祭祀罟網魚畋瑟以象時神德通玄女媧贊古之國君造簧作笙禮物未就軒轅篡成或云二皇人首蛇形神化七十何德之靈神農贊少典之胤火德承木造為耒耜導民播穀正為雅琴以暢風俗黃帝贊少典之孫神明聖哲土德承火赤帝是滅服牛乘馬衣裳是制雲氏名官功冠五帝少昊贊祖自軒轅青陽之裔金德承土儀鳳帝世官鳥號名殊職別系農正扈氏各有品制顓頊贊昌意之子祖自軒轅始誅九黎水德統天以國為號風化神宣威暢八極靡不祗虔帝嚳贊祖自軯轅玄囂之裔生言其名木德帝世撫寧天地神聖靈察教弭四海明並日月帝堯贊火德統位父則高辛克平共工萬國同塵調適陰陽其惠如春巍巍成功配天則神巢父贊堯禪許由巢父是恥穢其溷聽臨河洗耳池主是讓以水為濁嗟此三士清足厲俗姜嫄簡狄贊嚳有四妃子皆為王帝摯早崩堯承天綱玄鳥大跡殷周美祥稷契既生翊化虞唐帝舜贊顓頊之族重瞳神聖克協頑瞽應唐蒞政除凶舉俊以齊七政應曆受禪顯天之命夏禹贊吁嗟天子拯世濟民克卑宮室致孝鬼神蔬食薄服黻冕乃新厥德不回其誠可親亹亹其德溫溫其人尼稱無間何德之純舜居隴畝明德上宣孝乎頑瞽乂不格奸韻補二引禹贊舜將崩殂告天禪位虞氏既沒三年禮畢韻補五引禹贊避隱商山示不敢蒞諸侯向己乃奉天秩韻補五引禹贊禹治水贊嗟夫夏禹實勞水功西鑿龍門疏河道江梁岐既闢九州以同天錫玄圭奄有萬邦禹渡河贊禹濟於河黃龍負船舟人並懼禹歎仰天豫受大運勤功恤民死亡命也龍乃弭身禹妻贊禹妻塗山土功是急惟啓之生過門不入矯達明義勳庸是執成長望嗣大祿以襲殷湯贊殷湯代夏諸侯振仰放桀鳴條南面以王桑林之禱炎災克償伊尹佐治可謂賢相湯禱桑林贊惟殷之世炎旱七年湯禱桑林祈福于天翦髮離爪自以為牲皇靈感應時雨以靈務光贊湯將伐桀謀於卞子既讓位隨以為恥薄於殷世著自汙己自投潁水清風邈矣周文王贊於赫聖德實惟文王三分有二猶服事商化加虞芮傍暨四方王業克昭武嗣遂光赤雀賦贊西伯積德天命攸顧赤雀銜書爰集昌戶瑞為天使和氣所致嗟爾後王昌期而至周武王贊桓桓武王繼世滅殷咸任尚父且作商臣功皆四海救世濟民天下宗周萬國是賓周成王贊成王繼武賢聖保傅年雖幼稚岐嶷有素初疑周公終焉克寤旦奭佐治遂致刑錯周公贊成王即位年尚幼稚周公居攝四海慕利罰叛柔服祥應仍至誦長反政達夫忠義古冶子等贊齊姜接子勇節徇名虎門之博忽晏置釁矜而曰伐輕死重分漢高帝贊屯雲斬蛇靈母告祥朱旗既抗九野披攘禽嬰克羽掃滅英雄承機帝世功著武湯商山四皓贊嗟爾四皓避秦隱形劉項之爭養志弗營不應朝聘保節全貞應命太子漢嗣以寧漢文帝贊孝文即位愛物儉身驕吳撫越胸奴和親納諫赦罪以德讓民殆至刑錯萬國化淳漢景帝贊景帝明德繼文之則肅清王室克滅七國省役薄賦百姓殷昌風移俗易齊美成康漢武帝贊世宗光光文武是攘威振百蠻恢拓土疆簡定律曆辨修舊章封天禪土功越百王班婕妤贊斑班婕妤贊有德有言實惟班婕盈沖其驕窮悅其厭在漢夷貞在晉正接臨飆端幹衝霜振葉長樂觀畫贊妙哉平安君才巧若神辭賦之作華若望春禹廟贊序有禹祠植移於其城城本名杞城吹雲贊天地變化是生神物吹雲吐潤浮雲蓊鬱魏德論元氣否塞玄黃噴薄晨星亂逆陰陽舛錯國無完邑陵無掩槨四海鼎沸蕭條沙漠武王之興也以道陵殘義氣風發神戈退指則妖氛順制靈旗一舉則朝陽播越惟我聖后神武蓋天威光佐掃辰彗北彎首尾爭擊氣齊率然乃電北席卷千里隱乎若崩嶽旰乎若潰海慍彼蠻夏蠢爾弗恭脂我蕭斧簡武練鋒星陳而天運振耀乎南封荊人風靡交益影從軍蘊餘勢襲利乘權蕩鬼區於白水摛矯制於遐川仰屬目於條支晞弱水之潺湲薄張騫於大夏笑驃騎於祁連其化之也如神其養之也如春柔遠能邇誰敢不賓憲度增飾日曜月明跡存乎建安道隆乎延康於是漢氏歸義顧音孔昭顯禪天位希唐效堯上猶謙謙弗納也發不世之明詔薄皇居而弗泰蹈北人之清節美石戶之高介義貫金石神明已興神祇致祥乾靈效祜於是群公卿士功臣列辟率爾而進曰昔文王三分居二以服事殷非能之而弗欲蓋欲之而弗能況天網弗禁皇綱圮紐侯民非復漢萌尺土非復漢有故皇父創迹於前陛下光美於後蓋所謂勳成於彼位定於此者也將使斯民播秬鬯植靈芝鋤岐穗挹醴滋遂乃凱風回猋甘露匝時農夫詠於田隴織婦而綜絲黃吻之齓含哺而怡鮐背之老擊壤而嬉古雖稱乎赫胥曷若斯之大治乎于時上富於春秋聖德汪濊奇志妙思神鑒靈察方將審御陰陽增耀日月極禎祥於遐奧飛仁風以樹惠既遊精於萬機逍遙乎六藝兼覽儒林抗思乎文藻之場囿容與乎道術之疆畔超天路而高峙階清雲以妙觀將參跡於三皇豈徒論功於大漢天地位矣九域清矣皇化四達帝猷成矣明哉元首股肱貞矣禮樂既作興頌聲矣固將封泰山禪梁甫歷名山以祈福周五方之靈宇越八九於往素踵帝王之靈矩流餘祚於黎蒸鍾元吉乎聖主纖雲不形陽光赫戲文選傅休奕雜詩李注引魏德論武創洪基克光厥德文選孫子荊為石仲容與孫皓書李注引魏德論又王元長永明九年策秀才文李注引作魏德頌玄宴之化豐洽之政文選陸士衡演連珠李注引魏德論武帝執政日白雀集於庭槐藝文八十八引魏德論棲筆寢牘含光而不明矇竊惑焉書鈔一百四引魏德論名儒按讖良史披圖書鈔九十六引魏德喻喻乃論誤有白鵲之瑞白帖九十五引魏德論不能貫道義之清英窮混元於太素亦以明矣御覽一引魏德論在昔太初玄黃混并渾沌鴻濛兆朕未形御覽一引魏德論此疑篇首脫文甘露玄德洞幽飛化上蒸甘露以降蜜淳冰凝觀陽弗晞瓊爵是承獻之帝朝以明聖徵穀於穆聖皇仁暢惠渥辭獻減膳以服鰥獨和氣致祥時雨灑沃野草萌芽變化嘉穀禾猗猗嘉禾惟穀之精其洪盈箱協穗殊莖昔生周朝今植魏庭獻之朝堂以昭祖靈連理木皇樹嘉德風靡雲披有木連理別幹同枝將承大同應天之規鵲鵲之彊彊詩人取喻今存聖世呈質見素飢食苕華渴飲清露異於儔匹衆鳥是慕鳩班班者鳩爰素其質昔翔殷邦今為魏出朱目丹趾靈姿詭類載飛載鳴彰我皇懿
