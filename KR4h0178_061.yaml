body:
  text: 秦宓奏記益州牧劉焉薦任安奏記益州牧劉焉薦任安昔百里蹇叔以耆艾而定策甘羅子奇以童冠而立功故書美黃髮而易稱顏淵固知選士用能不拘長幼明矣乃者以來海內察舉率多英雋而遺舊齒衆論不齊異同相半此乃承平之翔步非亂世之急務也夫欲救危撫亂修己以安人則宜卓犖超倫與時殊趣震驚鄰國駭動四方上當天心下合人意天人既和內省不疚雖遭凶亂何憂何懼昔楚葉公好龍神龍下之好偽徹天何況于真今處士任安仁義直道流名四遠如今見察則一州斯服昔湯舉伊尹不仁者遠何武貢二龔雙名竹帛故貪尋常之高而忽萬仞之嵩樂面前之飾而忘天下之譽斯誠往古之所重慎也甫欲鑿石索玉剖蚌求珠今乃隨和炳然有如皎日復何疑哉誠知晝不操燭日有餘光但餘情區區貪陳所見蜀志秦宓傳答王商書昔堯優許由非不弘也洗其兩耳楚聘莊周非不廣也執竿不顧易曰確乎其不可拔夫何衒之有且以國君之賢子為良輔不以是時建蕭張之策未足為智也僕得曝背乎隴畝之中誦顏氏之簞瓢詠原憲之蓬戶時翱翔于林澤與沮溺之等儔聽玄猿之悲吟察鶴鳴于九皋安身為樂無憂為福處空虛之名居不靈之龜知我者希則我貴矣斯乃僕得志之秋也何困苦之戚焉蜀志秦宓傳與王商書疾病伏匿甫知足下為嚴李立祠可謂厚黨勤類者也觀嚴文章冠冒天下由夷逸操山嶽不移使楊子不歎固自昭明如李仲元不遭法言令名必淪其無虎豹之文故也可謂攀龍附鳳者矣如揚子雲潛心著述有補于世泥蟠不滓行參聖師于今海內談詠厥辭邦有斯人以耀四遠怪子替茲不立祠堂蜀本無學士文翁遣相如東受七經還教吏民于是蜀學比于齊魯故地里志曰文翁倡其教相如為之師漢家得士盛于其世仲舒之徒不達封禪相如制其禮夫能知禮造樂移風易俗非禮所秩有益于世者乎雖有王孫之纍猶孔子大齊桓之霸公羊賢叔術之讓僕亦善長卿之化宜立祠堂速定其銘蜀志秦宓傳報李權書非史記周圖仲尼不采道非虛無自然嚴平不演海以受淤歲一蕩清君子博識非禮不視今戰國反覆儀秦之術殺人自生亡人自存經之所疾故孔子發憤作春秋大乎居正復制孝經廣陳德行杜漸防萌豫有所抑是老氏絶禍于未萌豈不信邪成湯大聖覩野魚而有獵逐之失定公賢者見女樂而棄朝事若此輩類焉可勝陳道家法曰不見所欲使心不亂是故天地貞觀日月貞明其直如矢君子所履洪範記災發于言貌何戰國之譎權乎哉蜀志秦宓傳李權從宓借戰國策宓報與諸葛亮書聞雒城已拔此天祚也尊兄應期贊世配業光國魄兆見矣夫變用雅慮審貴重明于以簡才宜適其時若乃和光悅遠邁德天壤使時間于聽世服于道齊高妙之音正鄭衛之聲並利于事無相奪倫此乃管絃之至牙曠之調也雖非鍾期敢不擊節蜀志馬良傳為諸葛亮與吳主書寡君遣椽馬良通聘繼好以紹昆吾豕韋之勳其人吉士荊楚之令鮮于造次之華而有克終之美願降心存納以慰將命蜀志馬良傳臨終與諸葛亮書明公視謖猶子謖視明公猶父願深惟殛鯀興禹之義使平生之交不虧于此謖雖死無恨于黃壤也蜀志馬良傳注引襄陽記又見御覽四百六十三入吳移關候入吳移關候東之與西驛使往來冠蓋相望申盟初好日新其事東尊應保聖祚告燎受符剖判土宇天下應響各有所歸于此時也以同心討賊則何寇不滅哉西朝君臣引領欣賴震以不才得充下使奉騁敘好踐界踊躍入則如歸獻子適魯犯其山諱春秋譏之望必啓告使行人睦焉即日張旍誥衆各自約誓順流漂疾國典異制懼或有違幸必斟誨示其所宜蜀志陳震傳初學記二十辭先主表伏惟殿下將建伊呂之業追桓文之功大事草創假勢吳楚是以有為之士深覩歸趣臣委質已來愆戾山積臣猶自知況于君乎今王朝以興英俊鱗集臣內無輔佐之器外無將領之才列次功臣誠自愧也臣聞范蠡識微浮于五湖咎犯謝罪逡巡于河上夫際會之間請命乞身何則欲潔去就之分也況臣卑鄙無元功巨勳自繫干時竊慕前賢早思遠恥昔申生至孝見疑于親子胥至忠見誅于君蒙恬拓境而被大刑樂毅破齊而遭讒佞臣每讀其書未嘗不慷慨流涕而親當其事益以傷絶何者荊州覆敗大臣失節百無一還惟臣尋事自致房陵上庸而復乞身自放于外伏想殿下聖恩感悟愍臣之心悼臣之舉臣誠小人不能始終知而為之敢謂非罪臣每聞交絶無惡聲去臣無怨辭臣過奉教于君子願君王勉之也蜀志劉封傳注引魏略在魏奏薦王雄臣聞明君以求賢為業忠臣以進善為效故易稱拔茅連茹傳曰舉爾所知臣不自量竊慕其義臣昔以人乏謬充備部職時涿郡太守王雄為西部從事與臣同寮雄天性良固果而有謀歷試三縣政成人和及在近職奉宣威恩懷柔有術清慎持法臣往年出使經過雄郡自説特受陛下拔擢之恩常勵節精心思投命為效言辭激揚情趣款側臣雖愚暗不識真偽以謂雄才兼資文武忠烈之性踰越倫輩今涿郡領戶三千孤寡之家參居其半北有守兵藩衛之固誠不足舒雄智力展其勤幹也臣受恩深厚無以報國不勝慺慺淺見之情謹冒陳聞魏志崔林傳注引魏名臣奏在魏與劉封書在魏與劉封書古人有言疏不間親新不加舊此謂上明下直讒慝不行也若乃權君譎主賢父慈親猶有忠臣蹈功以罹禍孝子抱仁以陷難種商白起孝已伯奇皆其類也其所以然非骨肉好離親親樂患也或有恩移愛易亦有讒間其間雖忠臣不能移之于君孝子不能變之于父者也勢利所加改親為讎況非親親乎故申生衛伋禦寇楚建稟受形之氣當嗣立之政而猶如此今足下與漢中王道路之人耳親非骨血而據勢權義非君臣而處上位征則有偏任之威居則有副軍之號遠近所聞也自立阿斗為太子已來有識之人相為寒心如使申生從子輿之言必為太伯衛伋聽其弟之謀無彰父之譏也且小白出奔入而為霸重耳踰垣卒以克復自古有之非獨今也夫智貴免禍明尚夙達僕揆漢中王慮定于內疑生于外矣慮定則心固疑生則心懼亂禍之興作未曾不由廢立之間也私怨人情不能不見恐左右必有以間于漢中王矣然則疑成怨聞其發若踐機耳今足下在遠尚可假息一時若大軍遂進足下失據而還竊相為危之昔微子去殷智果別族違難背禍猶皆如斯今足下棄父母而為人後非禮也知禍將至而留之非智也見正不從而疑之非義也自號為丈夫為此三者何所貴乎以足下之才棄身來東繼嗣羅侯不為背親也北面事君以正綱紀不為棄舊也怒不致亂以免危亡不為徒行也加陛下新受禪命虛心側席以德懷遠若足下翻然內向非但與僕為倫受三百戶封繼統羅國而已當更剖符大邦為始封之君陛下大軍金鼓以震當轉都宛鄧若二敵不平軍無還期足下宜因此時早定良計易有利見大人詩有自求多福行矣今足下勉之無使狐突閉門不出蜀志劉封傳夫不經之言而有驗應者號曰世讖也書鈔九十六天地生如鏡御覽七百十七與諸葛亮書今送白綸帽玉玦各一以示微意焉御覽六百八十七六百九十二宛去洛八百里去此千二百里聞吾舉事當表上天子比相反覆一月間也則吾城已固諸軍足辦吾所在深險司馬公必不自來諸將來吾無患矣華陽國志二又見晉書宣帝紀兵到又告諸葛亮吾舉事八日而兵至城下何其速也華陽國志二與蜀郡太守許靖書薦秦宓昔高宗夢傅説周文求呂尚爰及漢祖納食其于布衣此乃帝王之所以倡業垂統緝熙厥功也今明府稽古皇極允執神靈體公劉之德行勿翦之惠清廟之作于是乎始褒貶之義于是乎興然而六翮未之備也伏見處士綿竹秦宓膺山甫之德履雋生之直枕石漱流吟詠縕袍偃息于仁義之途恬淡于浩然之域高概節行守真不虧雖古人潛遁蔑以加旃若明府能招致此人必有忠讜落落之譽豐功厚利建迹之勳然後紀功于王府飛聲于來世不亦美哉蜀志彭羕傳獄中與諸葛亮書僕昔有事于諸侯以為曹操暴虐孫權無道振威暗弱其惟主公有霸王之器可與興業致治故乃翻然有輕舉之志會公來西僕因法孝直自衒鬻龐統斟酌其間遂得詣公于葭萌指掌而談論治世之務講霸王之義建取益州之策公亦宿慮明定即相然贊遂舉事焉僕于故州不免凡庸憂于罪罔得遭風雲激矢之中求君得君志行名顯從布衣之中擢為國士盜竊茂才分子之厚誰復過此羕一朝狂悖自求葅醢為不忠不義之鬼乎先民有言左手據天下之圖右手刎咽喉愚夫不為也況僕頗別菽麥者哉所以有怨望意者不自度量苟以為首興事業而有投江陽之論不解主公之意意卒感激頗以被酒侻失老語此僕之下愚薄慮所致主公實未老也且夫立業豈在老少西伯九十寧有衰志負我慈父罪有百死至于內外之言欲使孟起立功北州戮力主公共討曹操耳寧敢有他志邪孟起説之是也但不分別其間痛人心耳昔每與龐統共相誓約庶託足下末蹤盡心于主公之業追名古人載勳竹帛統不幸而死僕敗以取禍自我惰之將復誰怨足下當世伊呂也宜善與主公計事濟其大猷天明地察神祇有靈復何言哉貴使足下明僕本心耳行矣努力自愛自愛蜀志彭羕傳報巴西太守龐羲郡合部曲本不為叛雖有交搆要在盡誠若必以懼遂懷異志非畿之所聞蜀志楊戲傳本注敕子郁我受州恩當為州牧盡節汝為郡吏當為太守效力不得以吾故有異志也蜀志楊戲傳本注與孟達書吾與孔明俱受寄託憂深責重思無良伴蜀志李嚴傳又見華陽國志二有小異與丞相亮書宜受九錫進爵稱王蜀志李嚴傳注引諸葛亮集丞相亮卒上疏呂祿霍禹未必懷反叛之心孝宣不好為殺臣之君直以臣懼其逼主畏其威故姦萌生亮身杖強兵狼顧虎視五大不在邊臣常危之今亮殞沒蓋宗族得全西戎靜息大小為慶蜀志楊戲傳注引華陽國志劉琰與諸葛亮箋琰稟性空虛本薄操行加有酒荒之病自先帝以來紛紜之論殆將傾覆頗蒙明公本其一心在國原其身中穢垢扶持全濟致其祿位以至今日間者迷醉言有違錯慈恩念忍不致之于理使得全完保育性命雖必克己責躬改過投死以誓神靈無所用命則靡寄顏蜀志劉琰傳遺言戒子傳稱師克在和不在衆此言天地和則萬物生君臣和則國家平九族和則動得所求靜得所安是以聖人守和以存以亡也吾楚國之小子耳而早喪所天為二兄所誘養使其性行不隨祿利以墮今但貧耳貧非人患惟和為貴汝其勉之蜀志向朗傳與所親書近者涉道晝夜接賓不得寧息人自敬丞相長史男子張君嗣附之疲倦欲死蜀志張裔傳
