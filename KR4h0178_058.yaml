body:
  text: 蜀卷五十八諸葛亮答蔣琬教思惟背親捨德以殄百姓眾人既不隱於心實又使遠近不解其義是以君宜顯其功舉以明此選之清重也三國志卷四十四蜀志蔣琬傳與群下教與群下教夫參署者集眾思廣忠益也若遠小嫌難相違覆曠闕損矣違覆而得中猶棄敝蹻而獲珠玉然人心苦不能盡惟徐元直處此不惑又董幼宰參署七年事有不至至於十反來相啟告苟能慕元直之十反幼宰之殷勤有忠於國則亮可少過矣三國志卷三十九蜀志董和傳黜來敏教將軍來敏對上官顯言新人有何功德而奪我榮資與之耶諸人共憎我何故如是敏年老狂悖生此怨言昔成都初定議者以為來敏亂群先帝以新定之際故遂含容無所禮用後劉子初選以為太子家令先帝不悅而不忍拒也今上即位吾闇於知人遂復擢為將軍祭酒違議者之審見背先帝所疏外自謂能以敦厲薄俗帥之以義今既不能表退職使閉門思愆三國志卷四十二蜀志來敏傳裴注引與李豐教吾與君父子戮力以獎漢室此神明所聞非但人知之也表都護典漢中委君於東關者不與人議也謂至心感動終始可保何圖中乖乎昔楚卿屢絀亦乃克復思道用福應自然之數也願寬慰都護勤追前闕今雖解任形業失故奴婢賓客百數十人君以中郎參軍居府方之氣類猶為上家若都護思負一意君與公琰推心從事者否可復通逝可復還也詳思斯戒明吾用心臨書長嘆泣涕而已三國志卷四十蜀志李嚴傳裴注引與張裔教去婦不顧門萎韭不入園以婦人之性草萊之情猶有所恥想忠壯者意何所之太平御覽卷九百七十六轉運教計一歲運用蓬旅簟千萬具太平御覽卷七百八教今民貧國虛決敵之資惟仰錦耳太平御覽卷八百十五昔孫叔敖乘馬三年不知牝牡稱其賢也藝文類聚卷九十三若賊騎左右來至徒從行以戰者陟嶺不便宜以車蒙陳而待之地狹者以鋸齒而待之北堂書鈔卷一百十七作部作匕首五百枚以給騎士北堂書鈔卷一百二十三敕作部皆作五折剛鎧十折矛以給之太平御覽卷三百五十三作斧教前後所作斧都不可用前到武都一日鹿角壞刀環千餘枚賴賊已走若未走無所復用問自令作部刀斧數百枚用之百餘日初無壞者爾乃知彼主者無意宜收治之非小事也若臨敵敗人軍事矣太平御覽卷三百三十七七百六十三軍令始出營豎矛戟舒幡旗鳴鼓角行三里辟矛戟結幡旗止鼓角未至營三里復豎矛戟舒幡旗鳴鼓角至營復結幡旗止鼓角違令者髡太平御覽卷三百三十九連衝之陳以狹而厚為利陣令騎不得與相離護側騎與相遠北堂書鈔卷一百十七敵以來進持鹿角兵悉卻在連衝後敵已附鹿角裏兵但得進踞以矛戟刺之不得此駐起駐妨弩壞太平御覽卷三百十七帳下及右陳各持彭排太平御覽卷三百五十七軍行人將一斗乾飯不得持烏育及幔餘大車乘帳幔什光耀日往就與會矣北堂書鈔卷一百三十二南征表初謂高定失其窟穴獲其妻子道窮計盡當歸首以取生也而邈蠻心異乃更殺人為盟糾合其類二千餘人求欲死戰北堂書鈔卷一百五十八薦呂凱表永昌郡吏呂凱府丞王伉等執忠絕域十有餘年雍闓高定偪其東北而凱等守義不與交通臣不意永昌風俗敦直乃爾三國志卷四十三蜀志呂凱傳彈廖立表長水校尉廖立坐自貴大臧否群士公言國家不任賢達而任俗吏又言萬人率者皆小子也誹謗先帝疵毀眾臣人有言國家兵眾簡練部伍分明者立舉頭視屋憤詫作色曰何足言凡如是者不可勝數羊之亂群猶能為害況立託在大位中人以下識真偽耶三國志卷四十蜀志廖立傳又彈廖立立奉先帝無忠孝之心守長沙則開門就敵領巴郡則有闇昧闒茸其事隨大將軍則誹謗譏訶侍梓宮則挾刃斷人頭於梓宮之側陛下即位之後普增職號立隨比為將軍面語臣曰我何宜在諸將軍中不表我為卿上當在五校臣答將軍者隨大比耳至於卿者正方亦未為卿也且宜處五校自是之後怏怏懷恨三國志卷四十蜀志廖立傳裴注引諸葛亮集出師表臣亮言先帝創業未半而中道崩殂今天下三分益州疲敝此誠危急存亡之秋也然侍衛之臣不懈於內忠志之士忘身於外者蓋追先帝之殊遇欲報之於陛下也誠宜開張聖聽以光先帝遺德恢弘志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宮中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使內外異法也侍中侍郎敦攸之費禕董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宮中之事事無大小悉以咨之然後施行必能裨補闕漏有所廣益也將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以眾議舉寵以為督愚以為營中之事事無大小悉以咨之必能使行陳和穆優劣得所也親賢臣遠小人此先漢所以興隆也親小人遠賢臣此後漢所以傾頹也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史參軍此悉貞亮死節之臣也願陛下親之信之則漢室之隆可指日而待也臣本布衣躬耕南陽苟全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之事由是感激遂許先帝以馳驅後值傾覆受任於敗軍之際奉命於危難之間邇來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂懼恐付託不效以傷先帝之明故五月渡瀘深入不毛今南方已定甲兵已足當獎率三軍北定中原庶竭駑鈍攘除姦兇興復漢室還于舊都此臣所以報先帝而忠陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈若無興德之言則戮允等以章其慢陛下亦宜自謀以諮諏善道察納雅言追惟先帝遺詔臣不勝受恩感激今當遠離臨表涕泣不知所云蜀志本傳彈李平表自先帝崩後平所在治家尚為小惠安身求名無憂國之事臣當北出欲得平兵以鎮漢中平窮難縱橫無有來意而求以五郡為巴州刺史去年臣欲西征欲令平主督漢中平說司馬懿等開府辟召臣知平鄙情欲因行之際偪臣取利也是以表平子豐督主江州隆崇其遇以取一時之務耳平至之日都委諸事群臣上下皆怪臣待平之厚也正以大事未定漢室傾危伐平之短莫若襃之然謂平情在於榮利而已不意平心顛倒乃爾若事稽留將致禍敗是臣不敏言多增咎三國志卷四十蜀志李嚴傳上事表臣先遣虎步監孟琰據武功水東司馬懿因渭水漲以二十日出騎萬人來攻琰營臣作車橋越水射之橋成馳去太平御覽卷七十三祁山表祁山去沮縣五百里有民萬戶矚其丘墟信為殷矣水經注卷二十漾水注臨終遺表伏念臣賦性拙直遭時艱難興師北伐未獲全功何期病在膏肓命垂旦夕伏願陛下清心寡慾約己愛民達孝道於先君布仁心於寰宇提拔隱逸以進賢良屏黜姦讒以厚風俗臣初奉先帝資仰於官不自治生今臣家成都有桑八百株薄田十五頃子孫衣食自有餘饒臣身在外無別調度隨時衣食悉仰於官不別治生以長尺寸若臣死之日不使內有餘帛外有盈財以負陛下也蜀志本傳街亭自貶疏臣以弱才叨竊非據親秉旄鉞以厲三軍不能訓章明法臨事而懼至有街亭違命之闕箕谷不戒之失咎皆在臣授任無方臣明不知人料事多闇春秋責帥臣職是當請自貶三等以督厥咎蜀志本傳上先帝書亮夜算太乙數今年歲次癸巳罡星在西方又觀乾象太白臨於雒城之分主於將帥多凶少吉請宣大行皇帝遺詔表伏惟大行皇帝邁仁樹德覆燾無疆昊天不弔寢疾彌留今月二十四日奄忽升遐臣妾號咷若喪考妣乃顧遺詔事惟太宗動容損益百寮發哀滿三日除服到葬期後如禮其郡國太守相都尉縣令長三日便除服臣亮親受敕戒震畏神靈不敢有違臣請宣下奉行三國志卷三十二蜀志先主傳上言追尊甘夫人為昭烈皇后皇思夫人履行修仁淑慎其身大行皇帝昔在上將嬪妃作合載育聖躬大命不融大行皇帝存時篤義垂恩念皇思夫人神柩在遠飄颻特遣使者奉迎會大行皇帝崩今皇思夫人神柩已到又梓宮在道園陵將成安厝有期臣輒與太常臣賴恭等議禮記曰立愛自親始教民孝也立敬自長始教民順也不忘其親所繇生也春秋之義母以子貴昔高皇帝追尊太上昭靈夫人為昭靈皇后孝和皇帝改葬其母梁貴人尊號曰恭懷皇后孝愍皇帝亦改葬其母王夫人尊號曰靈懷皇后今皇思夫人宜有尊號以慰寒泉之思輒與恭等案諡法宜曰昭烈皇后詩曰穀則異室死則同穴故昭烈皇后宜與大行皇帝合葬臣請太尉告宗廟布露天下具禮儀別奏三國志卷三十四蜀志甘皇后傳公文上尚書平為大臣受恩過量不思忠報橫造無端危恥不辨迷罔上下論獄棄科導人為奸俠情狂志若無天地自度姦露嫌心遂生聞軍臨至西嚮託疾還沮漳軍臨至沮復還江陽平參軍狐忠勸諫乃止今纂賊未滅社稷多難國事惟和可以克捷不可苞含以危大業輒與行中軍師車騎將軍都鄉侯臣劉琰使持節前軍師征西大將軍領涼州刺史南鄭侯臣魏延前將軍都亭侯臣袁琳左將軍領荊州刺史高陽鄉侯臣吳壹督前部右將軍玄鄉侯臣高翔督後部後將軍安樂亭侯臣吳班領長史綏軍將軍臣楊儀督左部行中監軍揚武將軍臣鄧芝行前監軍征南將軍臣劉巴行中護軍偏將軍臣費禕行前護軍偏將軍漢成亭侯臣許允行左護軍篤信中郎將臣丁咸行右護軍偏將軍臣劉敏行護軍征南將軍當陽亭侯臣姜維行中典軍討虜將軍臣上官雝行中參軍昭武中郎將臣胡濟行參軍建義將軍臣閻晏行參軍偏將軍臣爨習行參軍裨將軍臣杜義行參軍武略中郎將臣杜祺行參軍綏戎都尉臣盛勃領從事中郎武略中郎將臣樊岐等議輒解平任免官祿節傳印綬符策削其爵土三國志卷四十蜀志李嚴傳裴注引朝發南鄭牋朝發南鄭莫宿黑水四五十里水經注卷二十七沔水注
