body:
  text: 鮑勳諫文帝游獵疏臣聞五帝三王靡不明本立教以孝治天下陛下仁聖惻隱有同古烈臣冀當繼蹤萬代令萬世可則也如何在諒闇之中修馳騁之事乎臣冒死以聞陛下察焉魏志鮑勛傳田孤議或有為四孤論者曰遇兵饑饉有賣子者有棄溝壑者有生而父母亡無緦親其死必也有俗人五月生子妨忌之不舉者有家無兒收養教訓成人或語汝非此家兒禮異姓不為後于是便欲還本姓為可然不博士田瓊議曰雖異姓不相為後禮也家語曰絕嗣而後他人于理為非今此四孤非故廢其家祀既是必死之人他人收以養活且襃姒長養于襃便稱曰襃姓無常也其家若絕嗣可四時祀之于門戶外有子可以為後所謂神不歆非類也通典六十九荅劉德問劉德問曰君弔大夫迎于門外又拜送于門外大夫弔不迎于門外今時縣令長來弔主人待之當依國君來弔禮歟依大夫來弔也又當去杖其至皆如故無可捨邪又今時丞尉來弔待之當云何田瓊荅曰今之君與禮所云君輕重不同若必欲依之令長宜依國君丞尉宜依大夫君于禮但見去杖戢杖其餘不見也今于君弔以首絰貫臂遣人則不釋之而已通典八十三劉德問田瓊曰乳母緦注云養子者有他故賤者代之慈已今時婢生口使為乳母得無甚賤不應服也瓊荅曰婢生口故不服也通典九十二劉德問以為人後者支子可也長子不以為後同宗無支子唯有長子長子不後人則大宗絕後則違禮如之何田瓊荅曰以長子後大宗則成宗子禮諸父無後于宗家復以其庶子還承其父通典九十六劉德問于田瓊曰失君父終身不得者其臣子當得婚否瓊荅曰昔許叔重作五經異義已設此疑鄭玄駮云若終身不除是絕祖嗣也除而成婚違禮適權也通典九十八問曰小記云朋友虞祔而已此為主幼而為虞祔也若都無主族神不歆非類當為虞祔否田瓊荅曰虞安神也祔以死者祔于祖也既朋友恩舊歡愛固當安之祔之然後義備也但後日不常祭之耳通典一百一又問朋友無所歸于我殯若此者當迎彼還已館皆當停柩于何所荅曰朋友無所歸故呼而殯之不謂已殯迎之也于已館而殯之者殯之而已不于西階也通典一百一皇后降服諸侯女嫁為天王后降其旁親一等與出降為二等為外親尊不同則降天子后為眾子無服何以明之據大夫于庶子大功其妻亦服大功今天諸侯于眾子無服后何緣獨服之邪通典八十一公子降服公子以厭降公子厭于君為其母妻昆弟練冠麻縗謂君所不服子亦不敢服也父卒猶有先君餘尊所厭不得過大功也通典九十三大夫子降服喪服經不見大夫嫡子為庶昆弟服者與大夫為庶子為士者同父之所降子亦不敢不降也通典九十三諸侯大夫妻及大夫士女降服大夫女嫁于諸侯降其家旁親一等與出嫁降并二等為外親尊不同則降諸侯夫人為眾子無服何以明之據大夫于庶子大功其妻亦服大功今天子諸侯于眾子無服夫人何緣獨得服之又大夫妻為大夫之親亦隨大夫而降一等大夫之女嫁于大夫還為其族親尊不同者亦降之唯父母昆弟為父後者宗子亦不降也士之女嫁于大夫者亦降其族親不同尊者如大夫也又大夫之妻為庶子女子在室大功女適于士小功此為大夫之妻尊與大夫同大夫為伯叔父母子昆弟昆弟為士者以尊降一等為之大功其妻亦服大功通典九十三貴不降服大夫之妻為長子三年女子子嫁大夫大功通典九十三四孤議此四孤者非其父母不生非遇公嫗不濟既生既育由于二家棄生背恩實未之可子者父母之遺體乳哺成人公嫗之厚恩也棄絕天性之道而戴他族不為逆乎鄭伯惡姜氏誓而絕之君子以為不孝及其復為母子傳以為善今宜為子竭其筋力服于公嫗育養之澤若終為報父在為母之服別立宮宇而祭之畢已之年也詩云父兮生我母兮鞠我今四子服報如母不亦宜乎愛敬哀戚報惠備矣通典六十九報蘭臺蘭臺為外臺祕書為內閣臺閣一也何不相移之有魏志王肅傳注引魏略上書請受禪伏讀令書深執克讓聖意懇惻至誠外昭臣等有所不安何者石戶北人匹夫狂狷行不合義事不經見者是以史遷謂之不然誠非聖明所當希慕且有虞不逆放勳之禪夏禹亦無辭位之語故傳曰舜陟帝位若固有之斯誠聖人知天命不可逆厤數弗可辭也伏惟陛下應乾符運至德發聞升昭于天是以三靈降瑞人神以和休徵雜沓萬國響應雖欲勿用將焉避之而固執謙虛違天逆眾慕匹夫之微分背上聖之所蹈違經讖之明文信百氏之穿鑿非所以奉荅天命光慰眾望也臣等昧死以請輒整頓壇場至吉日受命如前奏分別寫令宣下魏志文帝紀注引獻帝傳奏請受禪臣聞符命不虛見眾心不可違故孔子曰周公其為不聖乎以天下讓是天地日月輕去萬物也是以舜嚮天下不拜而受命今火德氣盡炎上數終帝遷明德祚隆大魏符瑞昭晢受命既固光天之下神人同應雖有虞儀鳳成周躍魚方今之事未足以喻而陛下違天命以飾小行逆人心以守私志上忤皇穹眷命之旨中忘聖人達節之數下孤人臣翹首之望非所以揚聖道之高衢乘無窮之懿勳也臣等聞事君有獻可替否之道奉上有逆鱗固爭之義臣等敢以死請魏志文帝紀注引獻帝傳勸進表天有十二次以為分野王公之國各有所屬周在鶉火魏在大梁歲星行歷凡十二次所在國天子受命諸侯以封周文王始受命歲星在鶉火至武王伐紂十三年歲星復在鶉火故春秋傳曰武王伐紂歲在鶉火又曰歲之所在即我有周之分野也昔光和七年歲在大梁武王始受命為將討黃巾是歲改元為中平元年建安元年歲復在大梁始拜大將軍十三年復在大梁始拜丞相今二十五年歲復在大梁陛下受命此魏得歲與周文王受命相應今年青龍在庚子詩推度災日庚者更也子者滋也聖人制法天下治又曰王者布德于子治成于丑此言今年天更命聖人制治天下布德于民也魏以改制天下與時協矣顓頊受命歲在豕韋衛居其地亦在豕韋故春秋傳曰衛顓頊之墟也今十月斗之所建則顓頊受命之分也魏以十月受禪此同符始祖受命之驗也魏之氏族出自顓頊與舜同祖見于春秋世家舜以土德承堯之火今魏亦以土德承漢之火其于行運合干堯舜授受之次臣聞天之去就固有常分聖人當之昭然不疑故堯捐骨肉而禪有虞終無恡色舜發壟畝而君天下若固有之其相授受閒不稽漏刻天下已傳矣所以急天命明天下不可一日無君也今漢期運已終妖異絕之已審陛下受天之命符瑞告徵丁寍詳悉反覆備至雖言語相喻無以代此今既發詔書璽綬未御固執謙讓上逆天命下違民望臣謹案古之典籍參以圖緯魏之行運及天道所在即尊之驗在于今年此月昭晰分明唯陛下遷思易慮以時即位顯告上帝布詔天下然後改正朔易服色正大號天下幸甚魏志文帝紀注引獻帝傳蘇林董巴上表又見宋書符瑞志上皇后崩稱大行議皇后皆有諡未葬宜稱大行臣以為古禮無稱大行之文案漢天子稱行在所言不常居崩曰大行者不返之稱也未葬未有諡不言大行則嫌與嗣天子同號至于后崩未葬禮未立后宜無所嫌故漢氏諸后不稱大行謂未葬宜直稱皇后通典七十九厤議聖人迹太陽于晷景效太陰于弦望明五星于見伏正是非于晦朔弦望伏見者厤數之綱紀檢驗之明著也晉書律厤志中昔伏羲始造八卦作三畫以象二十四氣黃帝因之初作調厤歷代十一更年五千凡有七厤顓頊以今之孟春正月為元其時正月朔旦立春五星會于天厤營室也冰凍始泮蟄蟲始發雞始三號天曰作時地曰作昌人曰作樂鳥獸萬物莫不應和故顓頊聖人為厤室也湯作殷厤弗復以正月朔旦立春為節也更以十一月朔旦冬至為元首下至周魯及漢皆從其節據正四時夏為得天以承堯舜從顓頊故也禮記大戴曰虞夏之厤建正于孟春此之謂也晉書律厤志中攷課議案周官攷課其文備矣自康王以下遂以陵遲此即攷課之法存乎其人也及漢之季其失豈在乎佐吏之職不密哉方今軍旅或猥或卒備之以科條申之以內外增減無常固難一矣且萬目不張舉其綱眾毛不整振其領皋陶仕虞伊尹臣殷不仁者遠五帝三王未必如一而各以治亂易曰易𥳑而天下之理得矣太祖隨宜設辟以遺來今不患不法古也以為今之制度不為疏闊惟在守一勿失而已若朝臣能任仲山甫之重式是百辟則孰敢不肅魏志崔林傳議宗聖侯祀孔子不須命祀宗聖侯亦以王命祀不為未有命也周武王封黃帝堯舜之後及立三恪禹湯之世不列于時復特命他官祭也今周公已上達于三皇忽焉不祀而其禮經亦存其言今獨祀孔子者以世近故也以大夫之後特受無疆之祀禮過古帝義踰湯武可謂崇明報德矣無復重祀于非族也魏志崔林傳遺令子秀儉葬墓中惟置一坐瓦器數枚其餘一無所設魏志裴潛傳諫立郭后疏在昔帝王之治天下不惟外輔亦有內助治亂所由盛衰從之故西陵配黃英娥降媯竝以賢明流芳上世桀奔南巢禍階妹喜紂以炮烙怡悅妲己是以聖哲慎立元妃必取先代世族之家擇其令淑以統六宮虔奉宗廟陰教聿脩易曰家道正而天下定由內及外先王之令典也春秋書宗人釁夏云無以妾為夫人之禮齊桓誓命于葵丘亦曰無以妾為妻今後宮嬖寵常亞乘輿若因愛登后使賤人暴貴臣恐後世下陵上替開張非度亂自上起也魏志文德郭皇后傳中郎棧潛上疏云云又初學記十作裴潛攷魏志裴潛傳文帝踐阼為散騎常侍出為魏郡潁川典農中郎將兩人同時為中郎未審孰是姑從魏志諫明帝興眾役疏戚屬疏天生蒸民而樹之君所以覆燾群生熙育兆庶故方制四海匪為天子裂土分疆匪為諸侯也始自三皇爰暨唐虞咸以博濟加于天下醇德以洽黎元賴之三王既微降逮于漢治日益少喪亂弘多自時厥後亦罔克乂太祖濬哲神武芟除暴亂克復王綱以開帝業文帝受天明命廓恢皇基踐阼七載每事未遑陛下聖德纂承洪緒宜崇晏晏與民休息而方隅匪寍征夫遠戍有事海外縣旌萬里六軍騷動水陸轉運百姓舍業日費千金大興殿舍功作萬計徂來之松刊山窮谷怪石珷玞浮于河淮都圻之內盡為甸服當供稾秸銍粟之調而為苑囿擇禽之府盛林莽之穢豐鹿兔之藪傷害農功地繁茨棘災疫流行民物大潰上減和氣嘉禾不植臣聞文王作豐經始勿亟百姓子來不日而成靈沼靈囿與民共之今宮觀崇侈彫鏤極妙忘有虞之總期思殷辛之瓊室禁地千里舉足投網麗擬阿房役百乾谿臣恐民力彫盡下不堪命也昔秦據殽函以制六合自以德高三皇功兼五帝欲號諡至萬葉而二世顛覆願為黔首由枝幹既杌本實先拔也蓋聖王之御世也克明俊德庸勳親親俊乂在官則功業可隆親親顯用則安危同憂深根固本竝為幹翼雖歷盛衰內外有輔昔成王幼沖未能莅政周呂召畢竝在左右今既無衛侯康叔之監分陝所任又非旦奭東宮未建天下無副願陛下留心關塞永保無極則海內幸甚魏志高堂隆傳諫太子田獵夜還王公設險以固其國都城禁衛用戒不虞大雅云宗子維城無俾城壞又曰猶之未遠是用大諫若逸于遊田晨出昏歸以一日從禽之娛而忘無垠之釁愚竊惑之魏志高堂隆傳
