body:
  text: 張純賦席席以冬設簟為夏施揖讓而坐君子攸宜吳志朱桓傳注引文士傳又藝文類聚六十九引雜記賦弩南嶽之幹鍾山之銅應機命中獲隼高墉吳志朱桓傳注引文土傳賦犬守則有威出則有獲韓盧宋鵲書名竹帛吳志朱桓傳注引文土傳請立太子師傅表昔賈誼為漢文帝陳周成王為太子以周公為傅召公為太保呂望為太師又立三少皆上大夫使與太子居處左右前後皆正人也明禮義以導習之故能光熙文武興隆周室伏惟陛下命世應期開拓土字順乾作主皇太子以天然之姿為國上嗣朝廷以四海未定國家多事師傅之官闕而未備臣愚以為高祖初基天下造創引張良叔孫通出為師保入與朝政宜博采周漢依舊儀用將相名官輔弼太子於是以熙贊洪業增輝日月實為光大也藝文類聚十六默記述佐篇漢朝傾覆天下崩壞豪傑之士競希神器魏氏跨中土劉氏據益州並稱兵海內為世霸王諸葛司馬二相遭值際會託身盟主或收功於蜀漢或册名於伊洛丕備既沒後嗣繼統各受保阿之任輔翼幼主不負然諾之誠亦一國之宗臣霸王之賢佐也歷前世以觀近事二相優劣可得而詳也孔明起巴蜀之地蹈一州之士方之大國其戰士人民蓋有九分之一也而以貢贄大吳抗對北敵至使耕戰有伍刑法整齊提步卒數萬長驅祁山慨然有飲馬河洛之志仲達據天下十倍之地杖兼并之衆據牢城擁精鋭無禽敵之意務自保全而已使彼孔明自來自去若此人不亡終其志意連年運思刻日興謀則涼雍不解甲中國不釋鞍勝負之勢亦已決矣昔子産治鄭諸侯不敢加兵蜀相其近之矣方之司馬不亦優乎或曰兵者凶器戰者危事也有國者不務保安境內綏靜百姓而好開闢土地征伐天下未為得計也諸葛丞相誠有匡佐之才然處孤絶之地戰士不滿五萬自可閉關守險君臣無事空勞師旅無歲不征未能進咫尺之地開帝王之基而使國內受其荒殘西土若其役調魏司馬懿才用兵衆未易可輕量敵而進兵家所慎若丞相必有以策之則未見坦然之勳若無策以裁之則非明哲之謂海內歸向之意也余竊疑焉請聞其説答曰蓋聞湯以七十里文王以百里之地而有天下皆用征伐而定之揖讓而登王位者惟舜禹而已今蜀魏為敵戰之國勢不俱王自操備時強弱縣殊而備猶出兵陽平禽夏侯淵羽圍襄陽將降曹仁生獲于禁當時北邊大小憂懼孟德身出南陽樂進徐晃等為救圍不即解故蔣子通言彼時有徙許渡河之計會國家襲取南郡羽乃解軍玄德與操智力多少士衆衆寡用兵行軍之道不可同年而語猶能暫以取勝是時又無大吳掎角之勢也今仲達之才減於孔明當時之勢異於曩日玄德尚與抗衡孔明何以不可出軍而圖敵邪昔樂毅以弱燕之衆兼從五國之兵長驅下齊七十餘城今蜀漢之卒不少燕軍君臣之接信於樂毅加以國家為脣齒之援東西相應首尾如蛇形勢重大不比於五國之兵也何憚於彼而不可哉夫兵以奇勝制敵以智土地廣狹人馬多少未可偏恃也余觀彼治國之體當時既肅整遺教在後及其辭意懇切陳進取之圖忠謀謇謇義形於主雖古之管晏何以加之乎蜀志諸葛亮傳注引吳大鴻臚張儼默記又見御覽四百四十五失題威振六合書鈔十三引張儼默記辭典糧穀表臣昔為雷池監母三年不食魚臣若典糧穀臣母不可以三年不食米臣是以死守之御覽四百十三引孟宗別傳臨死敕其子吾州里有木奴千頭不責衣食歲絹千匹太史公曰江陵千樹橘可當封君此之謂矣水經泿水注羅陵桂陽先賢畫贊朱陽羅陵果而好義汲郡府君為州章陵被掠拷慘加五毒受刀截舌以著盤中獻之廷尉群公義之事得清理御覽四百二十一案汲郡府君為州章謂郡太守為刺史所劾挂于奏章也成武丁成武丁郴人能達鳥鳴為郡主簿與衆人俱坐聞雀鳴而笑曰東市輦粟車覆雀相呼往食之衆人遣視信然藝文類聚八十五密書與諸葛恪今日張設非常疑有他故吳志諸葛恪傳劉廞新議夫交接者人道之本始紀綱之大要名由之成事由之立御覽四百六引劉欽新議交之於人也猶脣齒之相濟同上才非交不用名非交不發身非交不立同上諫諸葛恪書大行皇帝本有遏東關之計計未施行今公輔贊大業成先帝之志寇遠自送將士憑賴威德出身用命一旦有非常之功豈非宗廟神靈社稷之福邪宜且案兵養鋭觀釁而動今乘此勢欲復大出天時未可而苟任盛意私心以為不安吳志諸葛恪傳與滕胤書當人強盛河山可拔一朝羸縮人情萬端言之悲歎吳志諸葛恪傳乞收葬諸葛恪表臣聞震雷電激不崇一朝大風衝發希有極日然猶繼以雲雨因以潤物是則天地之威不可經日浹辰帝王之怒不宜訖情盡意臣以狂愚不知忌諱敢冒破滅之罪以邀風雨之會伏念故太傅諸葛恪得承祖考風流之烈伯叔諸父遭漢祚盡九州鼎立分託三方並履忠勤熙隆世業爰及於恪生長王國陶育聖化致名英偉服事纍紀禍心未萌先帝委以伊周之任屬以萬機之事恪素性剛愎矜己陵人不能敬守神器穆靜邦內興功暴師未期三出虛耗士民空竭府藏專擅國憲廢易由意假刑劫衆大小屏息侍中武衛將軍都鄉侯俱受先帝囑託之詔見其姦虐日月滋甚將恐蕩搖宇宙傾危社稷奮其威怒精貫昊天計慮先於神明智勇百於荊聶躬持白刃梟恪殿堂勳超朱虛功越東牟國之元害一朝大除馳首徇示六軍喜踊日月增光風塵不動斯實宗廟之神靈天人之同驗也今恪父子三首縣市積日觀者數萬詈聲成風國之大刑無所不震長老孩幼無不畢見人情之於品物樂極則哀生見恪貴盛世莫與二身處台輔中間歷年今之誅夷無異禽獸觀訖情反能不憯然且己死之人與土壤同域鑿掘斫刺無所復加願聖朝稽則乾坤怒不極旬使其鄉邑若故吏民收以士伍之服惠以三寸之棺昔項籍受殯葬之施韓信獲收斂之恩斯則漢高發神明之譽也惟陛下敦三王之仁垂哀矜之心使國澤加於辜戮之骸復受不已之恩於以揚聲遐方沮勸天下豈不弘哉昔欒布矯命彭越臣竊恨之不先請主上而專名以肆情其得不誅實為幸耳今臣不敢章宣愚情以露天恩謹伏手書冒昧陳聞乞聖朝哀察吳志諸葛恪傳答問大夫子降服問者云若父已卒已未為大夫故猶士耳未審庶子及昆弟當服降否答云大夫之子從乎大夫而降至於父卒則如國人也通典九十三喪服變除天子子之子封為諸侯天子皆不服也通典八十天子弔三公辨絰錫縗弔大夫士皆辨絰疑縗弔畿內諸侯辨絰緦縗服通典八十一始聞喪去吉冠著素辨十五升布深衣從其君哭太廟阼階下袒免即位成踊襲絰吉屨無絇張帷為次於其所舍別內外蔬食飲水牡麻絰至成服服四十升半繐布縗縷裳細而疏其冠八升纓帶中衣領袖緣亦如之七月而除受以朝服素冠踰月復吉通典八十徐整問射慈曰諸侯之大夫時會見於天子故為繐縗七月不知此大夫時以何事而得見之也遠國大夫在蕃荒服者未嘗及見天子亦為服不答曰諸侯之大夫有出朝聘之事會見天子故言時會雖未會見猶服此服士己下則無服通典八十一徐整問為姑姊長殤在大功下殤在小功為姊下殤已下絻六七歲未成童子為父母不杖不廬不菲至童猶尚不備今此何以越得為姊殤服備大功小功之制乎十七八尚可恕六七歲兒誰能服此縗麻射慈答六七歲雖未為童其姊死故宜若布深衣通典八十一射慈云諸侯之女為天子后為天王之親隨天王而降一等諸侯之女為后為其父母及昆弟為父後者服齋縗其宗子亦不降除整云諸侯女嫁為天王后為外親尊同則如邦人為君之長子三年也通典八十一徐整問云經言為君夫人不道為其妻然則公卿諸侯之妻不為皇后服耶射慈答曰皇后天下之母則宜服周禮君命其夫后夫人亦宜命其婦其受命不宜無服通典八十一為父既葬日中反哭諸侯於太祖廟別子為卿大夫亦於太祖廟其非別子為卿大夫於皇考廟上士於皇考廟中士下士於王考廟皆升自西階東向哭踊虞祭於殯宮通典八十七為廬當就繼母之家若遠不得往者則別為異室亦有廬變除堊室及禫如親子也亦報子周不言報者凡經中之文悉報也通典八十九徐整問曰出妻之子為其母及父卒繼母嫁為之服報皆周也二母既出則為絶族今子為之服皆當於何處為位有廬堊室不出母亦當報其子不繼母報子於何處制服豈止所適者之家為哭位乎又當有禫不射慈答曰當就出母之家若遠不得往也可別為異室亦有廬變除堊室及禫如親子也母亦報子周也通典八十九徐整問曰婦人為君服周則諸侯夫人士為天子服比也其聞喪之儀衣麻之數哭泣之位變除之節如周制將復有異也射慈答曰其畿內諸侯夫人有助祭之禮則始喪之時悉當到京師復當還耳其畿外諸侯聞喪則當於路寢庭發喪夫人當堂上也變除之節皆如周服之制也通典九十徐整問射慈曰八歲以上為殤者服未滿八歲為無服假令子以元正月生七歲十二月死此為七歲則無服也或以元年十二月生以八年正月死以但踐八年計其日月適六歲耳然號為八歲日月甚少全七歲者日月為多若人有二子各死如此其七歲者獨無服則父母之恩有偏頗答曰凡制數自以生月計之不以歲也問曰無服之殤以日易月哭之於何處有位無答曰哭之無位禮葬下殤于園中則無服之殤亦於園也其哭之就園也通典九十徐整問射慈云子思哭嫂為位在何面加麻袒免為位不審服此有日數乎慈答云凡喪位皆西面服皆麻者謂大殮及殯之時已畢而釋之通典九十二諸侯之女為諸侯夫人服諸侯之親隨諸侯降一等還為族親則皆降之通典九十三傳曰尊同則得服其親服言尊同者諸侯為卿大夫母隨本親則不降也諸侯女為諸侯夫人不降父母昆弟之服及父後者大夫妻唯父母昆弟為父後者宗子不降也通典九十三雖緦必往親骨肉也雖鄰不往疏無親也通典九十七三年周歲喪沒閏九月以下數閏也通典一百徐整問射慈云改葬緦其奠如大斂從廟之廟從墓至墓禮宜同也又此大斂謂如始死之大斂耶從廟謂從何廟牲物何用慈答奠如大斂奠士大斂特豚從禰廟朝祖廟從故墓之新墓皆用特豚大夫以上其禮亡以此推之大夫奠用特豚天子太牢諸侯少牢通典一百二射慈答徐整問改葬虞曰不在殯宮又不為位何反虞之有通典一百徐整問射慈曰久喪不除小祥練可知耳有故未得葬遂至二十八月服制已過可得變否豈服十年五年至葬乃止乎答云主雖不得變其餘旁親亦不除日月竟自釋之耳通典一百三上吳主皓表臣稟氣淺薄體不及衆形容短陋訥口弱顏御覽
