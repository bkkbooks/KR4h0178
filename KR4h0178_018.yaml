body:
  text: 陳王植六征蜀論今將以謀謨為劍戟以策略為旌旗師徒不擾藉力天師下礨成雷榛殘木碎干戈所拂則何虜不崩金鼓一駭則何城不登書鈔一百十七引征蜀論成王漢昭論周王以天下初定武王既終而成土尚幼未能定南面之事是以推以忠誠稱制假號二弟流言召公疑之發金縢之匱然後用寤亦未決也至於昭帝所以不疑於霍光亦緣武帝有遺詔於光使光若周公踐天子之位行周公之事吾恐叛者非徒二弟疑者非徒召公也且賢者固不能知聖賢自其宜爾昭帝固可不疑霍光周王自可疑周公也若以昭帝勝成王霍光當踰周公耶若以堯舜為成王湯禹作管蔡召公周公之不見疑必也漢二祖優劣論有客問予曰夫漢二帝高祖光武俱為受命撥亂之君此時事之難易論其人之優劣孰者為先予應之曰昔漢之初興高祖因暴秦而起官由亭長自亡徒招集英雄遂誅強楚光有天下功齊湯武業流後嗣誠帝王之元勳人君之盛事也然而名不繼德行不純道直寡善人之美稱鮮君子之風采惑秦宮而不出窘項坐而不起計失乎酈生忿過乎韓信太公是誥于孝違矣敗古今之大教傷王道之實義身歿之後崩亡之際果令凶婦肆酖酷之心嬖妾被人豕之刑亡趙幽囚禍殃骨肉諸呂專權社稷幾移凡此諸事豈非高祖寡計淺慮以致然彼之雄材大略俶儻之節信當世至豪健壯傑士也又其梟將畫臣皆古今之鮮有歷世之希覩彼能任其才而用之聽其言而察之故兼天下而有帝位流巨功而遺元勳也不然斯不免於閭閻之人當世之匹夫也世祖體乾靈之休德稟貞和之純精通黃鐘之妙理韜亞聖之懿才其為德也通達而多識仁智而明恕重慎而周密樂施而愛人值陽九無妄之世遭炎光厄會之運殷爾雷發赫然神舉用武略以攘暴興義兵以掃殘神光前驅威風先逝軍未出於南京莽已弊於西都破二公於昆陽斬阜賜於漢津當此時也九州鼎沸四海淵涌言帝者二三稱王者四五咸鴟視狼顧虎超龍驤光武秉朱光之臣鉞震赫斯之隆怒夫其蕩滌凶穢勦除醜類若順迅風而縱烈火曬白日而掃朝雲也若克東齊難勝之寇降赤眉不計之虜彭寵以望異內隕龐萌以叛主取誅隗戎以背信軀斃公孫以離心授首爾乃廟謀而後動眾計定而後行師故攻無不陷之壘戰無奔北之卒是以群下欣欣歸心聖德宣仁以和眾邁德以來遠於時戰克之將等畫之臣承詔奉令者獲寵違命犯旨者顛危故曰建武之行師也計出於主心勝決於廟堂故竇融聞聲而影附馬援一見而嘆息股肱有濟濟之美元首有穆穆之容敦睦九族有唐虞之稱高尚純樸有羲皇之素謙虛納下有吐握之勞留心庶事有日昃之勤乃規弘跡而造皇極創帝道而立德基是以計功則業殊比隆則事異旌得則靡愆言行則無穢量力則勢微論輔則力劣卒能握乾坤之休徵應五百之顯期立不刊之遐迹建不朽之元功金石播其休烈詩書載其勳懿故曰光武其優也漢之二祖俱起布衣高祖闕於微細光武知於禮法金樓子卷引曹植語高祖又鮮君子之風溺儒冠不可言敬辟陽淫僻與眾共之詩書禮樂帝堯之所以為治也而高帝輕之濟濟多士文王之所以獲寧也高帝蔑之不用聽戚姬之邪媚致呂氏之暴戾同上將則難比於韓周謀臣則不敵於良平同上藉田說春耕于藉田郎中令侍寡人焉顧而謂之曰昔者神農氏始嘗萬草教民種植今寡人之興此田將欲以擬乎治國非徒供耳目而已也夫營疇萬畝厥田上下經以大陌帶以橫阡奇柳夾路名果被園宰農實掌是謂公田此亦寡人之封疆也日殄沒而歸館晨未昕而即野此亦寡人之先下也菽雚特疇禾黍異田此亦寡人之理政也及其息泉涌庇重陰懷有虞撫素琴此亦寡人之習樂也蘭蕙荃蘅植之近疇此亦寡人之所親賢也刺蔾臭蔚棄之遠疆此亦寡人之所遠佞也若年豐歲登果茂菜滋則臣僕小大咸取驗焉又曰封人有能以輕鑿修鉤去樹之蝎者樹得以茂繁中舍人曰不識治天下者亦有蝎者乎寡人告之曰昔三苗共工鯀驩兜非堯之蝎歟問曰諸侯之國亦有蝎乎寡人告之曰齊之諸田晉之六卿魯之三桓非諸侯之蝎歟然三國無輕鑿脩鉤之任終於齊篡魯弱晉國以分不亦痛乎曰不識為君子者亦有蝎乎寡人告之曰固有之也富而慢貴而驕殘仁賊義甘財悅色此亦君子之蝎也天子勤耘以牧一國大夫勤耘以收世祿君子勤耘以顯令德夫農者始於種終於穫澤既時矣苗既美矣棄而不耘則改為荒疇蓋豐年者期於必收譬脩道亦期於歿身也寡人御輦登於金商之館察田夫之私者書鈔三十九引藉田論使習壤者相澤仁才者播種書鈔三十九引藉田論田修種理者必賜之以巨觴田蕪種穢者必戮之以柔桑書鈔三十九引藉田論名王親枉千乘於隴畝之中執鋤钁於畦町之側尊距勤於耒耜玉手勞於耕耘者也書鈔九十一引藉田賦夫凡人之為圃各植其所好焉好甘者植乎薺好苦者植乎荼好香者植乎蘭好辛者植乎蓼至於寡人之圃無不植也御覽八百二十四引藉田賦輔臣論七首七首輔臣論七首蓋精微聽察理析毫分規矩可則阿保不傾群言系於口而研摭是非典謨總乎心而唯所用之者鍾太傅也清素寡欲明敏特達志存太虛安心玄妙處平則以和養德遭變則以斷蹈義華太尉歆之謂也文武竝亮權智時發奢不過制儉不損禮入毗皇家帝之股肱出則侯伯實撫東夏者曹大司馬也辨博通幽見傳異度德實充塞於內知謀縱橫於外解疑釋滯剖散盤錯者王司徒朗也容中下士則眾心不攜進吐善謀則眾議不格疏達至德純粹者陳司空也智慮深奧淵然難測執節平敵中表條暢恭以奉上愛以接下納言左右為帝喉舌曹大將軍也魁傑雄特秉心平直威嚴足憚風行草靡在朝廷則匡贊時俗百僚儀一臨事則戎昭果毅折衝厭難者司馬驃騎也仁孝論且禽獸悉知愛其母知其孝也唯白虎通麒麟稱仁獸者以其明盛衰知治亂也孝者施近仁者及遠相論世固有人身瘠而志立體小而名高者於聖則否是以堯眉八彩舜目重瞳禹耳參漏文王四乳然則世亦有四乳者此則駑馬一毛似驥耳又曰宋臣有公孫呂者長七尺面長三尺廣三尺名震天下若此之狀蓋遠代而求非一世之異也使形殊於外道合其中名震天下不亦宜乎語云無憂而戚憂必及之無慶而歡樂必隨之此心有先動而神有先知則色有先見也故扁鵲見桓公知其將亡申叔見巫臣知其竊妻而逃也荀子曰以為天不知人事耶則周公有風雷之災宋景有三舍之福以為知人事耶則楚昭有弗禜之應魏文無延期之報由是言之則天道之與相占可知而疑不可得而無也白起為人頭小而銳瞳子白黑分明故可與持久難與爭鋒書鈔一百十五引相論令禽惡鳥論國人有以伯勞生獻者王召見之侍臣曰世人同惡伯勞之鳴敢問何謂也王曰月令仲夏鵙始鳴詩云七月鳴鵙七月夏五月鵙則博勞也昔尹吉甫用後妻之說殺孝子伯奇其弟伯封求而不得作黍離之詩俗傳云吉甫後悟追傷伯奇出遊于田見異鳥鳴於桑其聲噭然吉甫動心曰無乃伯奇乎鳥乃撫翼其音尤切吉甫曰果吾子也乃顧謂曰伯奇勞乎是吾子棲吾輿非吾子飛勿居言未卒鳥尋聲而栖于蓋歸入門集於井幹之上向室而號吉甫命後妻載弩射之遂射殺後妻以謝之故俗惡伯勞之鳴言所鳴之家必有尸也此好事者附名為之說令俗人惡之而今普傳惡之斯實否也伯勞以五月而鳴應陰氣之動陽為人養陰為賊害伯勞蓋賊害之鳥也屈原曰鶗鴂之先鳴使百草為之不芳其聲鵙鵙然故俗憎之若其為人災害愚民之所信通人之所略也鳥鳴之惡自取憎人言之惡自取滅不有能累於當世也而凶人之行弗可易梟鳥之鳴不可更者天性然也昔荊之梟將徙巢於吳鳩遇之曰子將安之梟曰將巢於吳鳩曰何去荊而巢吳乎梟曰荊人惡予之聲鳩曰子能革子之聲則免無為去荊而巢吳也如不能革子之音則吳楚之民不異情也為子計者莫若宛頸戢翼終身勿復鳴也昔會朝議者有人問曰寧有聞梟食其母乎有答之者曰嘗聞烏反哺未聞梟食母也問者慚唱不善也孟春之旦從太陽方貴放鳥雀者加其祿也得善者莫不馴而放之為利人也得蚤者莫不糜之齒牙為害身也鳥獸昆蟲猶以名聲見異況夫吉士之與凶人乎螢火論詩云熠燿宵行章句以為鬼火或謂之燐未為得也天陰沈數雨在於秋日螢火夜飛之時也故云宵行然腐草木得濕而光亦有明驗眾說並為熒火近得實矣張文虎舒藝室雜著據詩經東山篇正義引辯道論夫神仙之書道家之言乃云傅說上為辰尾宿歲星降下為東方朔淮南王安誅於淮南而謂之獲道輕舉鉤弋死於雲陽而謂之尸逝柩空其為虛妄甚矣哉中興篤論之士有桓君山者其所著述多善劉子駿嘗問言人誠能抑嗜欲闔耳目可不衰竭乎時庭中有一老榆君山指而謂曰此樹無情欲可忍無耳目可闔然猶枯槁腐朽而子駿乃言可不衰竭非談也君山援榆喻之未是也何者余前為王莽典樂大夫樂記云文帝得魏文侯樂人竇公年百八十兩目盲帝奇而問之何所施行對曰臣年十三而失明父母哀其不及事教臣鼓琴臣不能導引不知壽得何力君山論之曰頗得少盲專一內視情不外鋻之助也先難子駿以內視無益退論竇公便以不外鑒證之吾未見其定論也君山又曰方山有董仲君者有罪繫獄佯死數日目陷蟲出死而復生然後竟死生之必死君子所達夫何喻乎夫至神不過天地不能使蟄蟲夏潛震雷冬發時變則物動氣移而事應彼仲君者乃能藏其氣尸其體爛其膚出其蟲無乃大怪乎世有方士吾王悉所招致甘陵有甘始盧江有左慈陽城有郗儉始能行氣導引慈曉房中之術儉善辟穀悉號數百歲所以集之魏國者誠恐此人之徒接姦詭以欺眾行妖惡以惑民故聚而禁之也豈復欲觀神仙於瀛洲求安期於邊海釋金輅而顧雲輿棄六驥而求飛龍哉自家王與太子及余兄弟咸以為調笑不信之矣然始等知上遇之有恒奉不過於員吏賞不加於無功海島難得而游六黻難得而佩終不敢進虛誕之言出非常之語余嘗試郗儉絕穀百日躬與之寢處行步起居自若也夫人不食七日則死而儉乃如是然不必益壽可以療疾而不憚饑饉焉左慈善修房內之術差可終命然自非有志至精莫能行也甘始者老而有少容自諸術士咸共歸之然始辭繁寡實頗有怪言余嘗辟左右獨與之談問其所行溫顏以誘之美辭以導之始語余吾本師姓韓字世雄嘗與師於南海作金前後數四投數萬斤金於海又言諸梁時西域胡來獻香罽腰帶割玉刀時悔不取也又言車師之西國兒生擘背出脾欲其食少而努行也又言取鯉魚五寸一雙合其一煮藥俱投沸膏中有藥者奮尾鼓鰓游行沈浮有若處淵其一者已熟而可噉余時問言率可試否言是藥去此逾萬里當出塞始不自行不能得也言不盡於此頗難悉載故粗舉其巨怪者始若遭秦始皇漢武帝則復為徐市欒大之徒也桀紂殊世而齊惡姦人異代而等偽乃如此耶又世虛然有仙人之說仙人者儻猱猿之屬與世人得道化為仙人乎夫雉入海為蜃燕入海為蛤當夫徘徊其翼差池其羽猶自識也忽然自投神化體變乃更與黿鱉為群豈復自識翔林薄巢垣屋之娛乎牛哀病而為虎逢其兄而噬之若此者何貴於變化邪夫帝者位殊萬國富有天下威尊彰明齊光日月宮殿闕庭焜耀紫薇何顧乎王母之宮崑崙之域哉夫三烏被致不如百官之美也素女嫦娥不若椒房之麗也雲衣羽裳不若黼黻之飾也駕螭載霓不若乘輿之盛也瓊蕊玉華不若玉圭之潔也而顧為匹夫所罔納虛妄之辭信眩惑之說隆禮以招弗臣傾產以供虛求散王爵以榮之清閒館以居之經年累稔終無一驗或歿於沙丘或崩於五柞臨時雖復誅其身滅其族紛然足為天下一笑矣若夫玄黃所以娛目鏗鏘所以聳耳媛妃所以紹先芻豢所以悅口也何以甘無味之味聽無聲之樂觀無彩之色也然壽命長短骨體強劣各有人焉善養者終之勞擾者半之虛用者殀之其斯之謂歟釋疑論初謂道術直呼愚民詐偽空言定矣及見武皇帝試閉左慈等令斷穀近一月而顏色不減氣力自若常云可五十年不食正爾復何疑哉令甘始以藥含生魚而煮之於沸脂中其無藥者熟而可食其銜藥者游戲終日如在水中也又以藥粉桑以飼蠶蠶乃到十月不老又以住年藥食雞雛及新生犬子皆止不復長以還白藥食犬百日毛盡黑乃知天下之事不可盡知而以臆斷之不可任也但恨不能絕聲色專心以學長生之道耳髑髏說曹子遊乎陂塘之濱步乎蓁穢之藪蕭條潛虛經幽踐阻顧見髑髏塊然獨居於是伏軾而問之曰子將結纓首劍殉國君乎將被堅執銳斃三軍乎將嬰茲固疾命隕傾乎將壽終數極歸幽冥乎叩遺骸而嘆息哀白骨之無靈慕嚴周之適楚儻託夢以通情於是伻若有來怳若有存影見容隱厲聲而言曰子何國之君子乎既枉輿駕愍其枯朽不惜咳唾之音而慰以若言子則辯於辭矣然未達幽冥之情識死生之說也夫死之為言歸也歸也者歸於道也道也者身以無形為主故能與化推移陰陽不能更四時不能虧是故洞於纖微之域通於怳惚之庭望之不見其象聽之不聞其聲挹之不充注之不盈吹之不凋噓之不榮激之不流凝之不停寥落冥漠與道相拘偃然長寢樂莫是踰曹子曰予將請之上帝求諸神靈使司命輟籍反子骸形於是髑髏長呻廓然歎曰甚矣何子之難語也昔太素氏不仁無故勞我以形苦我以生今也幸變而之死是反吾真也何子之好勞而我之好逸乎子則行矣予將歸於太虛於是言卒響絕神光霧除顧將旋軫乃命僕夫拂以玄塵覆以縞巾爰將藏彼路濱覆以丹土翳以綠榛夫存亡之異世乃宣尼之所陳何神憑之虛對云死生之必均說疫氣二首二首說疫氣二首建安二十二年癘氣流行家家有僵尸之痛室室有號泣之哀或闔門而殪或覆族而喪或以為疫者鬼神所作夫罹此者悉被褐茹藿之子荊室蓬戶之人耳若夫殿處鼎食之家重貂累蓐之門若是者鮮焉此乃陰陽失位寒暑錯時是故生疫而愚民懸符厭之亦可笑也又鹹水之魚不游於江澹水之魚不入於海
