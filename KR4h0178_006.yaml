body:
  text: 文帝三改封縣王詔黃初五年黃初五年改封縣王詔黃初五年先王建國隨時而制漢祖增秦所置郡至光武以天下損耗并省郡縣以今比之益不及焉其改封諸王皆為縣王魏志彭城王據傳車駕臨江還詔三公三世為將道家所忌窮兵黷武古有成戒況連年水旱士民損耗而功作倍于前勞役兼于昔進不滅賊退不和民夫屋漏在上知之在下然迷而知反失道不遠過而能改謂之不過今將休息棲備高山沈權九淵割除擯棄投之畫外車駕當以今月中旬到譙淮漢衆軍亦各還反不臘西歸矣魏志王朗傳議輕刑詔黃初五年十月黃初五年十月議輕刑詔黃初五年十月近之不綏何遠之懷今事多而民少上下相斃以文法百姓無所措其手足昔太山之哭者以為苛政甚于猛虎吾備儒者之風服聖人之遺教豈可以目玩其辭行違其誡者哉廣議輕刑以惠百姓魏志文帝紀注引魏書禁設非禮之祭詔黃初五年十二月黃初五年十二月禁設非禮之祭詔黃初五年十二月先王制禮所以昭孝事祖大則郊社其次宗廟三辰五行名山大川非此族也不在祀典叔世衰亂崇信巫史至乃宮殿之內戶牖之閒無不沃酹甚矣其惑也自今其敢設非禮之祭巫祝之言皆以執左道論著于令典魏志文帝紀宋書禮志四通典五十五伐吳設鎮軍撫軍大將軍詔黃初六年二月黃初六年二月伐吳設鎮軍撫軍大將軍詔黃初六年二月制詔昔軒轅建四面之號周武稱豫有亂臣十人斯蓋先聖所以體國君民亮成天工多賢為貴也今內有公卿以鎮京師外設牧伯以監四方至于元戎出征則軍中宜有柱石之賢帥輜重所在又宜有鎮守之重臣然後車駕可以周行天下無內外之慮吾今當征賊欲守之積年其以尚書令潁鄉侯陳群為鎮軍大將軍尚書僕射西鄉侯司馬懿為撫軍大將軍若吾臨江授諸將方略則撫軍當留許昌督後諸軍録後臺文書事鎮軍隨車駕當董督衆軍録行尚書事皆假節鼓吹給中軍兵騎六百人吾欲去江數里築宮室往來其中見賊可擊之形便出奇兵擊之若或未可則當舒六軍以遊獵饗賜軍士魏志文帝紀注引魏略文館詞林六百六十二征吳臨行詔司馬懿吾深以後事為念故以委卿曹參雖有戰功而蕭何為重使吾無西顧之憂不亦可乎晉書宣帝紀詔賜張遼李典子爵黃初六年黃初六年詔賜張遼李典子爵黃初六年合肥之役遼典以步卒八百破賊十萬自古用兵未之有也使賊至今奪氣可謂國之爪牙矣其分遼典邑各百戶賜一子爵關內侯魏志張遼傳追贈杜畿詔黃初六年黃初六年追贈杜畿詔黃初六年昔冥勤其官而水死稷勤百穀而山死故尚書僕射杜畿于孟津試船遂至覆沒忠之至也朕甚愍焉追贈太僕諡曰戴侯魏志杜畿傳贈夏侯尚詔黃初六年黃初六年贈夏侯尚詔黃初六年尚自少侍從盡誠竭節雖云異姓其猶骨肉是以入為腹心出當爪牙智略深敏謀謨過人不幸早殞命也奈何贈征南大將軍昌陵侯印綬魏志夏侯尚傳注引魏書還洛陽詔司馬懿吾東撫軍當總西事吾西撫軍當總東事晉書宣帝紀收鮑勛詔黃初七年四月黃初七年四月收鮑勛詔黃初七年四月勛指鹿為馬收付廷尉魏志鮑勛傳詔劉靖遷廬江太守卿父昔為彼州今卿復據此郡可謂克負荷者也魏志劉馥傳成皋令沐竝收校事劉肇以狀聞有詔成皋令沐竝收校事劉肇以狀聞有詔肇為牧司爪牙吏而竝欲收縛無所忌憚自恃清名邪魏志常琳傳注引魏略清介傳詔報孫雍生敬其人死辭其室追遠敬終違而得道者也晉任城太守夫人孫氏碑長沙人桓伯序有寡妻伏氏魏文帝以妻雍辭文帝詔報賜辥悌等關內侯詔賜辥悌等關內侯詔辥悌駮吏也王思郤嘉純吏也各賜關內侯以報其勤魏志梁習傳注引魏略苛吏傳械繫令狐浚詔浚何愚魏志王浚傳注引魏書答孟達薦王雄詔昔蕭何薦韓信鄧禹進吳漢惟賢知賢也雄有膽智技能文武之姿吾宿知之今便以參散騎之選方使少在吾門下知指歸便大用之矣天下之士欲使皆先歷散騎然後出據州郡是吾本意也魏志崔林傳注引魏名臣奏詔群臣三世長者知被服五世長者知飲食此言被服飲食非長者不別也御覽六百八十九作被服飲食難曉也夫珍玩必中國夏則縑總綃繐其白如雪冬則羅紈綺縠衣疊鮮文未聞衣布服葛也前後每得蜀錦殊不相似比適可訝而鮮卑尚復不愛也自吾所織如意虎頭連璧錦亦有金薄蜀薄來至洛邑皆下惡是為下工之物皆有虛名藝文類聚八十五御覽八百十五江東為葛寧可比羅紈綺縠御覽八百十八前于闐王山習所上孔雀尾萬枝文彩五色以為金根車蓋遙望耀人眼目藝文類聚九十一御覽九百二十四飲食一物南方有橘酢正裂人牙時有甜耳藝文類聚八十六新城孟太守道蜀䐗肫雞鶩味皆淡故蜀人作食喜著飴蜜以助味也書鈔一百四十七御覽八百五十七真定御梨大若拳甘若蜜脆若菱可以解煩釋渴藝文類聚八十六御覽九百六十九大觀本草二十三南方有龍眼荔枝寧比西國蒲萄石蜜乎酢且不如中國今以荔枝賜將吏噞之則知其味薄矣凡棗味莫若安邑御棗也藝文類聚八十七御覽七十一八百五十七九百七十一中國珍果甚多且復為蒲萄說當其朱夏涉秋尚有餘暑醉酒宿醒掩露而食甘而不䬼脆而不酢冷而不寒味長汁多除煩解渴又釀以為酒甘于鞠糱善醉而易醒道之固已流涎咽唾況親食之邪他方之果寧有匹之者藝文類聚八十七御覽九百七十二大觀本草二十三敕豫州禁吏民往老子亭禱祝黃初三年黃初三年敕豫州禁吏民往老子亭禱祝黃初三年告豫州刺史老聃賢人未宜先孔子不知魯郡為孔子立廟成未漢桓帝不師聖法正以嬖臣而事老子欲以求福良足笑也此祠之興由桓帝武皇帝以老子賢人不毀其屋朕亦以此亭當路行來者輒往瞻視而樓屋傾穨儻能壓人故令修整昨過視之殊整頓恐小人謂此為神妄往禱祝違犯常禁宜宣告吏民咸使知聞續高僧傳三十僧勔難道論又釋道宣集古今佛道論衡策諡龐德延康元年延康元年策諡龐德延康元年昔先軫喪元王蠋絶脰隕身徇節前代美之惟侯式昭果毅蹈難成名聲溢當時義高在昔寡人愍焉諡曰壯侯魏志龐德傳策命孫權九錫文黃初二年十一月黃初二年十一月策命孫權九錫文黃初二年十一月蓋聖王之法以德設爵以功制祿勞大者祿厚德盛者禮豐故叔旦有夾輔之勳太公有鷹揚之功竝啓土宇并受備物所以表章元功殊異賢哲也近漢高祖受命之初分裂膏腴以王八姓斯則前世之懿事後王之元龜也朕以不德承運革命君臨萬國秉統天機思齊先代坐而待旦惟君天資忠亮命世作佐深覩曆數達見廢興遠遣行人浮于潛漢望風景附抗疏稱藩兼納纖絺南方之貢普遣諸將來還本朝忠肅內發款誠外昭信著金石義蓋山河朕甚嘉焉今封君為吳王使使持節太常高平侯貞授君璽綬策書金虎符第一至第五左竹使符第一至第十以大將軍使持節督交州領荊州牧事錫君青土苴以白茅對揚朕命以尹東夏其上故驃騎將軍南昌侯印綬符策今又加君九錫其敬聽後命以君綏安東南綱紀江外民夷安業無或攜二是用錫君大輅戎輅各一玄牡二駟君務財勸農倉庫盈積是用錫君袞冕之服赤舄副焉君化民以德禮教興行敦義崇讓內外咸和是用錫君軒縣之樂君宣導休風懷柔百越是用錫君朱戶以居君運其才謀官方任賢是用錫君納陛以登君顯直厝枉群善必舉忠勇竝奮清除姦慝是用錫君虎賁之士百人君振威陵邁宣力荊南梟滅凶醜罪人期得是用錫君鈇鉞各一君文和于內武信于外禽討逆節折衝掩難是用錫君彤弓一彤矢百玈弓十玈矢千君以忠肅為基恭勤為德是用錫君秬鬯一卣圭瓚副焉欽哉敬敷訓典以服朕命以勖相我國家永終爾顯烈吳志大帝權傳二北堂書鈔三十又藝文類聚五十三冊孫權太子登為東中郎封侯文冊孫權太子登為東中郎封侯文蓋河洛寫天意符讖述聖心昭晰著明與天談也故易曰河出圖洛出書聖人則之孫將軍歸心國朝忠亮之節同功佐命而其子當為魏將軍著在圖讖由漢光武受命李氏為輔王梁孫咸竝見符緯也斯乃皇天啓佑大魏永令孫氏仍世為佐其以登為東中郎將封縣侯萬戶昔周嘉公旦祚流七胤漢禮蕭何一門十侯今孫將軍亦當如斯若夫長平之榮安豐之寵方斯蔑如藝文類聚五十一除禁輕稅令延康元年二月延康元年二月除禁輕稅令延康元年二月關津所以通商旅池苑所以禦災荒設禁重稅非所以便民其除池籞之禁輕關津之稅皆復什一魏志文帝紀注引魏書拜毛玠等子為郎中令延康元年三月延康元年三月拜毛玠等子為郎中令延康元年三月故尚書僕射毛玠奉常王修涼茂郎中令袁渙少府謝奐萬潛中尉徐奕國淵等皆忠直在朝履蹈仁義竝早即世而子孫陵遲惻然愍之其皆拜子男為郎中魏志文帝紀注引魏書以鄭稱授太子經學令延康元年五月延康元年五月以鄭稱授太子經學令延康元年五月令龍淵太阿出昆吾之金和氏之璧由井里之田礱之以砥礪錯之以他山故能致連城之價為命世之寶學亦人之砥礪也稱篤學大儒勉以經學輔侯宜旦夕入授曜明其志魏志文帝紀注引魏略文館詞林六百九十五問張既令延康元年延康元年問張既令延康元年試守金城太守蘇則既有綏民平夷之功聞又出軍西定湟中為河西作聲勢吾甚嘉之則之功效為可加爵邑未邪封爵重事故以問卿密白意且勿宣露也魏志蘇則傳注引魏名臣奏敕盡規諫令延康元年七月庚辰延康元年七月庚辰敕盡規諫令延康元年七月庚辰軒轅有明臺之議放勛有衢室之問皆所以廣詢于下也百官有司其務以職盡規諫將率陳軍法朝士明制度牧守申政事縉紳考六藝吾將兼覽焉魏志文帝紀孟達楊僕降附令延康元年七月庚辰延康元年七月庚辰孟達楊僕降附令延康元年七月庚辰日前遣使宣國威靈而達即來吾惟春秋褒儀父即封拜達使還領新城太守近復有扶老攜幼首向王化者吾聞夙沙之民自縛其君以歸神農豳國之衆繈負其子而入豐鎬斯豈驅略迫脅之所致哉乃風化動其情而仁義感其衷歡心內發使之然也以此而推西南將萬里無外權備將與誰守死乎魏志文帝紀注引魏略王自手筆令復譙租稅令延康元年七月甲午延康元年七月甲午復譙租稅令延康元年七月甲午先王皆樂其所生禮不忘其本譙霸王之邦真人本出其復譙租稅二年魏志文帝紀注引魏書殯祭死亡士卒令延康元年十月癸卯延康元年十月癸卯殯祭死亡士卒令延康元年十一月癸卯諸將征伐士卒死亡者或未收斂吾甚哀之其告郡國給槥櫝殯斂送至其家官為設祭魏志文帝紀以李伏言禪代合符讖示外令以示外薄德之人何能至此未敢當也斯誠先王至德通于神明固非人力也魏志文帝紀注引獻帝傳辭符讖令延康元年十一月丙午延康元年十一月丙午辭符讖令延康元年十一月丙午犁牛之駮似虎莠之幼似禾事有似是而非者今日是已覩斯言事良重吾不德于是尚書僕射宣告官寮咸使聞知魏志文帝紀注引獻帝傳辭許芝等條上讖緯令延康元年十一月辛亥延康元年十一月辛亥辭許芝等條上讖緯令延康元年十一月辛亥昔周文三分天下有其二以服事殷仲尼歎其至德公旦履天子之籍聽天下之斷終然復子明辟書美其人吾雖德不及二聖敢忘高山景行之義哉若夫唐堯舜禹之蹟皆以聖質茂德處之故能上和靈祇下寧萬姓流稱今日今吾德至薄也人至鄙也遭遇際會幸承先王餘業恩未被四海澤未及天下雖傾倉竭府以振魏國百姓猶寒者未盡暖飢者未盡飽夙夜憂懼弗敢遑寧庶欲保全髮齒長守今日以沒于地以全魏國下見先王以塞負荷之責望狹志局守此而已雖屢蒙祥瑞當之戰惶五色無主若芝之言豈所聞乎心栗手悼書不成字辭不宣口吾閒作詩曰喪亂悠悠過紀白骨縱橫萬里哀哀下民靡恃吾將佐時整理復子明辟致仕庶欲守此辭以自終卒不虛言也宜宣示遠近使昭赤心魏志文帝紀注引獻帝傳再讓符命令延康元年十一月辛亥延康元年十一月辛亥再讓符命令延康元年十一月辛亥下四方以明孤款心是也至于覽餘辭豈余所謂哉寧所堪哉諸卿指論未若孤自料之審也夫虛談謬稱鄙薄所弗當也且聞比來東征經郡縣歷屯田百姓面有飢色衣或裋褐不完罪皆在孤是以上慚衆瑞下愧士民由斯言之德尚未堪偏王何言帝者也宜止息此議無重吾不德使逝之後不愧後之君子魏志文帝紀注引獻帝傳答司馬懿等再陳符命令延康元年十一月癸丑延康元年十一月癸丑答司馬懿等再陳符命令延康元年十一月癸丑世之所不足者道義也所有餘者苟妄也常人之性賤所不足貴所有餘故曰不患無位患所以立孤雖寡德庶自免于常人之貴夫石可破而不可奪堅丹可磨而不可奪赤丹石微物尚保斯質況吾託士人之末列曾受教于君子哉且於陵仲子以仁為富柏城子高以義為貴鮑焦感子貢之言棄其蔬而槁死薪者譏季札失辭皆委重而弗視吾獨何人昔周武大聖也使叔旦盟膠鬲于四內使召公約微子于共頭故伯夷叔齊相與笑之曰昔神農氏之有天下不以人之壞自成不以人之卑自高以為周之伐殷以恭也吾德非周武而義慚夷齊庶欲遠苟妄之失道立丹石之不奪邁於陵之所富蹈柏成之所貴執鮑焦之貞至遵薪者之清節故曰三軍可奪帥匹夫不可奪志吾之斯志豈可奪哉魏志文帝紀注引獻帝傳止群臣議禪代禮儀令當議孤終不當承之意而已猶獵還方有令魏志文帝紀注引獻帝傳又令吾殊不敢當之外亦何豫事也同上罷設受禪壇場令屬出見外便設壇場斯何謂乎今當辭讓不受詔也但于帳前發璽書威儀如常且天寒罷作壇士使歸魏志文帝紀注引獻帝傳既發璽書又下令當奉還璽綬為讓章吾豈奉此詔承此貺邪昔堯讓天下于許由子州支甫舜亦讓于善卷石戶之農北人無擇或退而耕潁之陽或辭以幽憂之疾或遠入山林莫知其處或攜子入海終身不反或以為辱自投深淵且顏燭懼太璞之不完守知足之明分王子搜樂丹穴之潛處被熏而不出柳下惠不以三公之貴易其介曾參不以晉楚之富易其仁斯九士者咸高節而尚義輕富而賤貴故書名千載于今稱焉求仁得仁仁豈在遠孤獨何為不如哉義有蹈東海而逝不奉漢朝之詔也亟為上章還璽綬宣之天下使咸聞焉魏志文帝紀注引獻帝傳辭請禪令延康元年十一月乙卯延康元年十一月乙卯辭請禪令延康元年十一月乙卯昔柏成子高辭夏禹而匿野顏闔辭魯幣而遠跡夫以王者之重諸侯之貴而二子忽之何則其節高也故列士徇榮名義夫高貞介雖蔬食瓢飲樂在其中是以仲尼師王駘而子産嘉申徒今諸卿皆孤股肱腹心足以明孤而今咸若斯則諸卿遊于形骸之內而孤求為形骸之外其不相知未足多怪亟為上章還璽綬勿復紛紛也魏志文帝紀注引獻帝傳讓禪令夫古聖王之治也至德合乾坤惠澤均造化禮教優乎昆蟲仁恩洽乎草木日月所照戴天履地含氣有生之類靡不被服清風沐浴玄德是以金革不起苛慝不作風雨應節禎祥觸類而見今百姓寒者未暖飢者未飽鰥者未室寡者未嫁權備尚存未可舞以干戚方將整以齊斧戎役未息于外士民未安于內耳未聞康哉之歌目未覩擊壤之戲嬰兒未可託于高巢餘糧未可以宿于田畝人事未備至于此也夜未曜景星治未通真人河未出龍馬山未出象車蓂莢未植階庭萐莆未生庖廚王母未獻白環渠搜未見珍裘靈瑞未效又如彼也昔東戶季子容成大庭軒轅赫胥之君咸得以此就功勒名今諸卿獨不可少假孤精心竭慮以和天人以格至理使彼衆事備群瑞效然後安乃議此乎何遽相愧相迫之如是也速為讓章上還璽綬無重吾不德也魏志文帝紀注引獻帝傳又令泰伯三以天下讓人無得而稱焉仲尼歎其至德孤獨何人同上答董巴等令凡斯皆宜聖德故曰苟非其人道不虛行天瑞雖彰須德而光吾德薄之人胡足以當之今讓冀見聽許外內咸使聞知魏志文帝紀注引獻帝傳三讓璽綬令冀三讓而不見聽何汲汲于斯乎魏志文帝紀注引獻帝傳讓禪令天下重器王者正統以聖德當之猶有懼心吾何人哉且公卿未至乏主斯豈小事且宜以待固讓之後乃當更議其可耳魏志文帝紀注引獻帝傳又令以德則孤不足以時則戎虜未滅若以群賢之靈得保首領終君魏國于孤足矣若孤者胡足以辱四海至乎天瑞人事皆先王聖德遺慶孤何有焉是以未敢聞命魏志文帝紀注引獻帝傳允受禪令昔者大舜飯糗茹草將終身焉斯則孤之前志也乃至承堯禪被袗裘妻二女若固有之斯則順天命也群公卿士誠以天命不可拒民望不可違孤亦曷以辭焉魏志文帝紀注引獻帝傳令樹德垂聲崇化篤俗文選桓溫薦譙秀表注道薄于當年風穨于百代矣同上答卞蘭教賦者言事類之所附也頌者美盛德之形容也故作者不虛其辭受者必當其實蘭此賦豈吾實哉昔吾丘壽王一陳寶鼎何武等徒以歌頌猶受金帛之賜蘭事雖不諒義足嘉也今賜牛一頭魏志卞后傳注引魏略又藝文類聚十六又五十六御覽五百八十七
