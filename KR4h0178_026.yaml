body:
  text: 邯鄲淳投壼賦古者諸侯閒于天子之事則相朝也以正班爵講禮獻功于是乃崇其威儀恪其容貌繁登降之節盛揖拜之數机設而弗倚酒澄而弗舉肅肅濟濟其惟敬焉敬不可久禮成于飫乃設大射否則投壼植茲華壼鳧氏所鑄厥高二尺盤腹修脰飾以金銀文以雕鏤象物必具距筵七尺傑焉植駐矢維二四或柘或棘豐本纖末調勁且直執笇奉中司射是職曾孫侯氏與之乎皆得然後觀夫投者之閑習察妙巧之所極駱驛聯翩爰爰免發翻翻集集不盈不縮應壼順入何其善也每投不空四矢退效既入躍出荏苒偃仰僶俛趨下餘勢振掉又足樂也擬議于此命中于彼動之如志靡有違盩譬諸為政群職罔弛也左右畢投效奇數鈞列置功笇稱善告賢三載考績幽明始分也比投不釋增是自遂雖往有功義所不貴春秋貶翬亦猶是類也若乃撮矢作驕累掇聯取一往納二巧無與耦斯乃絕倫之才尤異之手也柯列葩布匪罕匪稠雖就置猶弗然矧迥絕之所投惟茲巧之妙麗亦希世之寡儔調心術于混冥適容體于便安紛縱奇于施舍顯必中以微觀悅舉坐之耳目樂眾心而不倦瓌瑋百變惡可窮讚蓺文類聚七十四上受命述表臣聞雅頌作于盛德典謨興于茂功德盛功茂傳序弗忘是故竹帛以載之金石以聲之垂諸來世萬載彌光陛下以聖德應期龍飛在位其有天下也恭已以受天子之籍無為而四海順風若乃天地顯應休徵祥瑞以表聖德者不可勝載鑠乎煥顯真神明之所以祚命世之令主也凡自能言之類莫不謳歎于野執筆之徒咸竭文思獻詩上頌臣抱疾伏蓐作書一篇欲謂之頌則不能雍容盛懿列伸玄妙欲謂之賦又不能敷演洪烈光揚緝熙故思竭愚稱受命述蓺文類聚十受命述伊上天闡載自民主肇建歷聽風聲陶唐為盛虞夏受終殷周革命有禪而帝有代而王禪代雖殊大小繇同于是以漢歷在魏赤運歸黃也是故大魏之業皇耀震霆肅清宇內萬邦有截師義翼漢奉禮不越飾躬戮力茂亮弘烈樹深根以厚基播醇澤以釀味含光而弗耀戢翼而弗發將俟聖嗣是遂是達聖嗣承統爰宣重光陳錫裕下民悅無疆三神宜釐四靈順方元龜介玉應龍粹黃若云魏德據茲以昌爾乃鳴玉陟壇三搢以俟既受休命龍旋鳳峙煌煌厥暉穆穆容止臨下有赫允也天子既踐帝位納璽要紱太常司燎升炮告類珪璋峨峨髦士棣棣蹌蹌聖躬御策以莅巍巍乎崇功顯顯乎德容信帝者之壯業天休之所鍾也于時天地咸和日月光精氛祲不作風塵弭清凡在壇場之位舉目平廣庭莫不君臣和德咸玉色而金聲屢省萬機訪謀老成治詠儒墨納策公卿昧旦孜孜夕惕乾乾務在諧萬國敘彝倫而折不若懷遠人混六合之風納于仁壽之門刑錯靡試偃伯靡軍然後乃勤功岱嶽升中上玄斯因我皇之大摹思心之所存也蓺文類聚十漢鴻臚陳紀碑君諱紀字元方太丘君之元子也始祖有虞受禪陶唐亦以命禹其後媯滿當周武王時祚土于陳君其世也君生應乾坤之純質受嵩嶽之精粹內苞九德外兼百行川深淪于不測膽智應于無方弘裕足以容眾矜嚴足以正已然後研幾道蓺涉覽文學凡前言往行竹帛所載靡不悉該其善也亹亹焉其誘人也是以令聞廣譽塞于天淵儀形嘉誨範乎人倫存乎本傳故略舉其著于人事者焉顯考以茂行崇冠先儔季弟亦以英才知名當世孝靈之初竝遭黨錮俱處于家號曰三君故得奉常供養以循子道親執饋食朝夕竭歡及太丘君疾病終亡喪過乎哀崩傷嘔血如此者數焉服禮既除戚容彌甚聞名心矍言及隕涕雖大舜之終慕曾參之自盡無以喻也豫州刺史嘉懿至德命敕百城圖畫形象于今遺稱越在民口既處隱約潛躬味道足不踰閾乃覃思著書三十餘萬言言不務華事不虛設其所交釋合贊規聖哲而後建旨明歸焉今所謂陳子者也初平之元禁罔蠲除四府竝辟弓旌交至雖崇其禮命莫敢屈用大將軍何進表選明儒君為舉首公車特徵起家拜五官中郎將到遷侍中旬有八日出相平原會孝靈晏駕賊臣秉政肆其兇虐剝亂宇內州郡幅裂戎輿竝戒君冒犯鋒矢勤恤民隱馴之以禮教示之以知恥視事未朞士女向方會刺史敗于黃巾幽冀二州爭利其土君料敵知難不忍其民為己致死乃辭而去之于是故老隨慕攀轅持轂輪不得轉遂晨夜閒行寓于邳郯之野袁術恣睢僭號江淮圖覆社稷結婚呂布斯事成重必不測救君諗布不從遂與成婚送女在塗君為國深憂乃奮策出奇以奪其心卒使絕好追女而還離逖姦謀使不得成國用乂安君之力也唯帝念功命作尚書令會車駕幸許拜大鴻臚實掌九儀四門穆穆遂登補袞闕以熙帝載不幸寢疾年七十有一建安四年六月卒惜乎懷道處否登庸日寡實使大業不究元勳靡建茲海內所為嗟悼凡百所以失望也天子愍焉使者弔祭郡卿以下臨喪會葬有子曰群追惟蓼莪罔極之恩乃與邦彥碩老咨所以計功稱伐銘贊之義遂樹斯石用監于後其辭曰於穆上德時惟我君固天縱之允鍾厥純命世作則實紹斯文遭險龍潛抗志浮雲所貴在已樂存事親雖處畎畝天子屢聞乃階郎將陪帝作鄰平原寇深遂辭其民思齊古公邠土是因不忘諗國惠我無垠復命喉舌秉國之均爰登卿士媚茲一人如何穹蒼不授遐年鮮厥在位每懷不申股肱或虧朝誰與詢煢煢小子號泣于旻勒銘表德久而彌新古文苑又略見蓺文類聚四十九孝女曹娥碑孝女曹娥者上虞曹盱之女也其先與周同𥛜末冑荒沈爰來適居盱能撫節案歌婆娑樂神以漢安二年五月時迎伍君逆濤而上為水所淹不得其屍時娥年十四號慕思盱哀吟澤畔旬有七日遂自投江死經五日抱父屍出以漢安迄于元嘉元年青龍在辛卯莫之有表度尚設祭誄之辭曰伊惟孝女曄曄之姿偏其反而令色孔儀窈窕淑女巧笑倩兮宜其家室在洽之陽待禮未施嗟喪慈父彼蒼伊何無父孰怙訴神告哀赴江永號視死如歸是以眇然輕絕投入沙泥翩翩孝女乍沈乍浮或泊洲嶼或在中流或趨湍瀨或還波濤千夫失聲悼痛萬餘觀者填道雲集路衢流淚掩涕驚慟國都是以哀姜哭市杞崩城隅或有剋面引鏡剺耳用力坐臺待水抱樹而燒於戲孝女德茂此儔何者大國防禮自修豈況庶賤露屋草茅不扶自直不鏤而雕越梁過宋比之有殊哀此真厲千載不渝烏呼哀哉亂曰名勒金石質之乾坤歲數歷祀丘墓起墳光于后土顯照天人生賊死貴利之義門何悵華落雕零早分葩豔窈窕永世配神若堯二女為湘夫人時效彷彿以昭後昆古文苑明帝莅政上疏詩稱儀刑文王萬邦作孚又曰刑于寡妻至于兄弟以御于家邦道自近始而化洽于天下自喪亂已來干戈未戢百姓不識王教之本懼其陵遲已甚陛下當盛魏之隆荷二祖之業天下想望至治唯有以崇德布化惠恤黎庶則兆民幸甚夫臣下雷同是非相蔽國之大患也若不和睦則有讎黨有讎黨則毀譽無端毀譽無端則真偽失實不可不深防備有以絕其源流魏志陳群傳諫諡皇女淑平原公主疏長短有命存亡有分故聖人制禮或抑或致以求厥中防墓有不修之儉嬴博有不歸之魂夫大人動合天地垂之無窮又大德不踰閑動為師表故也八歲下殤禮所不備況未朞月而以成人禮送之加為制服舉朝素衣朝夕哭臨自古以來未有此比而乃復自往視陵親臨祖載願陛下抑割無益有損之事但悉聽群臣送葬乞車駕不行此萬國之至望也聞車駕欲幸摩陂實到許昌二宮上下皆悉俱東舉朝大小莫不驚怪或言欲以避衰或言欲于便處移殿舍或不知何故臣以為吉凶有命禍福由人移徙求安則亦無益若必當移避繕治金墉城西宮及孟津別宮皆可權時分止可無舉宮暴露野次廢損盛節蠶農之要又賊地聞之以為大衰加所煩費不可計量且由吉士賢人當盛衰處安危秉道信命非徙其家以寍鄉邑從其風化無恐懼之心況乃帝王萬國之主靜則天下安動則天下擾行止動靜豈可輕脫哉魏志陳群傳諫營治宮室疏禹承唐虞之盛猶卑宮室而惡衣服況今喪亂之後人民至少比漢文景之時不過一大郡加邊境有事將士勞苦若有水旱之患國家之深憂也且吳蜀未滅社稷不安宜及其未動講武勸農有以待之今舍此急而先宮室臣懼百姓遂困將何以應敵昔劉備自成都至白水多作傳舍興費人役太祖知其疲民也今中國勞力亦吳蜀之所願此安危之機也惟陛下慮之魏志陳群傳又疏諫營治宮室昔漢祖唯與項羽爭天下羽已滅宮室燒焚是以蕭何建武庫太倉皆是要急然猶非其壯麗今二虜未平誠不宜與古同也夫人之所欲莫不有辭況乃天王莫之敢違前欲壞武庫謂不可不壞也後欲置之謂不可不置也若必作之固非臣下辭言所屈若少留神卓然回意亦非臣下之所及也漢明帝欲起德陽殿鍾離意諫即用其言後乃復作之殿成謂群臣曰鍾離尚書在不得成此殿也夫王者豈憚一臣蓋為百姓也今臣曾不能少凝聖聽不及意遠矣魏志陳群傳諫追封太后父母陛下以聖德應運受命創業革制當永為後式案典籍之文無婦人分土命爵之制在禮典婦因夫爵秦違古法漢氏因之非先王之令典也魏志下后傳薦管寍臣聞王者顯善以消惡故湯舉伊尹不仁者遠伏見徵士北海管寍行為世表學任人師清儉足以激濁貞正足以矯時前雖徵命禮未優備昔司空荀爽家拜光祿先儒鄭玄即授司農若加備禮庶必可致至延西序坐而論道必能昭明古今有益大化魏志管寍傳注引傅子奏請魏王受禪漢自安席已來政去公室國統數絕至于今者唯有名號尺土一民皆非漢有期運久已盡厤數久已終非適今日也是以桓靈之閒諸明圖緯者皆言漢行氣盡黃家當興殿下應期十分天下而有其九以服事漢群生注望遐邇怨歎是故孫權在遠稱臣此天人之應異氣齊聲臣愚以為虞夏不以謙辭殷周不吝誅放畏天知命無所與讓也魏志武帝紀注引魏略侍中陳群尚書桓階奏奏定厤厤數難明前代通儒多共紛爭黃初之元以四分厤久遠疏闊大魏受命宜正厤明時韓翊首建黃初猶恐不審故以乾象互相參校其所校日月行度弦望朔晦校厤三年更相是非合本即末爭長短而疑尺丈竟無時而決案三公議皆綜盡典理殊塗同歸欲使效之璿璣各盡其法一年之閒得失足定合于事宜晉書律厤志中宋書厤志上復肉刑議臣父紀以為漢除肉刑而增加笞本興仁惻而死者更眾所謂名輕而實重者也名輕則易犯實重則傷民書曰惟敬五刑以成三德易著劓刖滅趾之法所以輔政助教懲惡息殺也且殺人償死合于古制至于傷人或殘毀其體而裁翦毛髮非其理也若用古刑使淫者下蠶室盜者刖其足則永無淫放穿窬之姦矣夫三千之屬雖未可悉復若斯數者時之所患宜先施用漢律所殺殊死之罪仁所不及也其餘逮死者可以刑殺如此則所刑之與所生足以相貿矣今以笞死之法易不殺之刑是重人支體而輕人軀命也魏志陳群傳追尊始祖太王為高皇議周武追尊太王王季文王皆為王是時周天子以王為號追尊即同故謂不以卑臨尊也魏以皇帝為號令追號皇曾祖中常侍大長秋特進君為王乃以卑臨尊也故漢祖尊其父為上皇自是以後諸侯為帝者皆尊其父為皇也大長秋特進君宜號高皇載主宜以金根車可遣大鴻臚持節乘大使車從騶騎奉印綬即鄴廟以太牢告祠通典七十二諸王國相不應為國王服斬縗議諸王相國不應為國王服斬縗古今異制損益不同古者諸侯專國子人至漢初患諸王子強暴奪之權食租而已乃選賢能代王居國相王為善否則彈糾國家置王以下之吏非陪臣之謂也禮記雖有與諸侯為親服斬者蓋謂異于國臣與有親于王斬耳雖陪臣不親猶不為服豈專帝臣而為蕃王服斬未有實不為臣而名稱臣若欲假虛名優王者欲崇君臣而服糾其罪名實既借君臣義乖遺禮失教難以為典近防輔小吏尚不稱臣況剖符帝臣而稱臣妾于藩王若使正名為王臣則尚書當稱陪臣則王正臣不可不服則不宜還糾王罪若不稱陪臣俱言臣者此為王與天子同臣也通典八十八與諸葛亮書問劉巴消息劉君子初蜀志劉巴傳汝穎人物論荀文若公達休若友若仲豫當今竝無對魏志荀彧傳注引荀氏家傳荅司馬宣王書年過八十而以居位譬猶鍾鳴漏盡而夜行不休是罪人也魏志田豫傳荅或問或問長吏遷在傳舍而死彼迎吏未至此二國吏服誰當輕重孫叔然荅曰古者諸侯以國為家衛出其君于襄牛不書出奔以未出境也衛侯奔死烏傳曰猶境內則衛君也雖出傳舍固當以君服之彼迎吏依娶女有吉日夫死斬衰弔既葬除之通典九十九祖臘議土行之君故宜以未祖以丑臘為得盛終之節不可以戍祖辰臘也初學記四臘十三引魏名臣奏大司農董遇議云云又見御覽三十三臨終上疏生有益不民死猶不害于民況臣備位台司在職日淺未能宣揚聖德以廣益黎庶寢疾彌留奄即幽冥方今百姓農務不宜勞役乞不令洛陽士民供設喪具懼國典有常使臣私願不得展從謹冒以聞惟蒙哀許魏志韓暨傳注引楚國先賢傳奏外祖母無服天子降周為外祖母無服通典八十一太和六年明帝有外祖母之喪太常韓暨奏臨終遺言夫俗奢者示之以儉儉則節之以禮歷見前代送終過制失之甚矣若爾曹敬聽吾言斂以時服葬以土藏穿畢便葬送以瓦器慎勿有增益魏志韓暨傳注引楚國先賢傳攷竟曹洪乳母等事無㵎神上疏諸應死罪者皆當先表須報前制書禁絕淫祀以正風俗今當等所犯妖刑辭語始定黃門吳達詣臣傳太皇太后令臣不敢通懼有救護速聞聖聽若不得已以垂宿留由事不早竟是臣之罪是以冒犯常科輒敕縣攷竟擅行刑戮伏須誅罰魏志司馬芝傳奏請崇本抑末王者之治崇本抑末務農重穀王制無三年之儲國非其國也管子區言以積穀為急方今二虜未滅師旅不息國家之要唯在穀帛武皇帝特開屯田之官專以農桑為業建安中天下倉廩充實百姓殷足自黃初以來聽諸典農治生各為部下之計誠非國家大體所宜也夫王者以海內為家故傳曰百姓不足君誰與足富足之由在于不失天時而盡地力今商旅所求雖有加倍之顯利然于一統之計已有不貲之損不如墾田益一畝之收也夫農民之事田自正月耕種耘鋤條桑耕熯種麥穫刈築場十月乃畢治廩繫橋運輸租賦除道理梁墐塗室屋以是終歲無日不為農事也今諸典農各言留者為行者宗田計課其力勢不得不爾不有所廢則當素有餘力臣以為不宜復以商事雜亂專以農桑為務于國計為便魏志司馬芝傳議盜官練事夫刑罪之失失在苛暴今贓物先得而後訊其辭若不勝掠或至誣服誣服之情不可以折獄且𥳑而易從大人之化也不失有罪庸世之治耳今宥所疑以隆易從之義不亦可乎魏志司馬芝傳遷大理正有盜官練置都廁上者吏疑女工收以付獄芝日云云太祖從其議與群下教與群下教蓋君能設教不能使吏必不犯也吏能犯教而不能使君必不聞也夫設教而犯君之劣也犯教而聞吏之禍也君劣于上吏禍于下此政事所以不理也可不各勉之哉魏志司馬芝傳門幹盜簪辭不符下教凡物有相似而難分者自非離婁鮮能不惑就其實然循行何忍重惜一簪輕傷同類乎其寢勿問魏志司馬芝傳與劉節書君為大宗加股肱郡而賓客每不與役既眾庶怨望或流聲上聞今條同等為兵幸時發遣魏志司馬芝傳荅劉綽問河南尹丞劉綽問曰士孫德祖以樂陵太守被書遷陳留已受印綬發邁仰吏雖未至左右已達未入境而亡不知樂陵送故吏當持重乎陳留迎吏當持重乎河南尹司馬芝荅曰德祖見陳留太守故樂陵守耳樂陵吏以舊君服復何疑也通典九十九劉綽難云雖去樂陵其義未絕陳留雖迎其恩未加今使恩未加而服重恩未絕而服輕乎禮娶女有吉日而女死壻齊衰而弔既葬除之謂樂陵宜三年矣芝荅德祖已受帝命君名已定乃欲以成名之君比未成之婦何邪同上綽又難陳留之吏既未相見而使三年是責非時之恩禮云仕而未有祿違而君薨弗為之服明服以恩不以名也同上
