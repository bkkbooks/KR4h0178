body:
  text: 陳王植四求通親親表臣植言臣聞天稱其高者以無不覆地稱其廣者以無不載日月稱其明者以無不照江海稱其大者以無不容故孔子曰大哉堯之為君惟天為大惟堯則之夫天德之於萬物可謂弘廣矣蓋堯之為教先親後疏自近及遠其傳曰克明峻德以親九族九族既睦平章百姓及周之文王亦崇厥化其詩曰刑于寡妻至于兄弟以御于家邦是以雍雍穆穆風人詠之昔周公弔管蔡之不咸廣封懿親以藩屏王室傳曰周之宗盟異姓為後誠骨肉之恩爽而不離親親之義實在敦固未有義而後其君仁而遺其親者也伏惟陛下資帝唐欽明之德體文王翼翼之仁惠洽椒房恩昭九親群臣百僚番休遞上執政不廢於公朝下情得展於私室親理之路通慶弔之情展誠可謂恕己治人推惠施恩者矣至於臣者人道絶緒禁固明時臣切自傷也不敢乃望交氣類修人事敘人倫近且婚媾不通兄弟永絶吉凶之問塞慶弔之禮廢恩紀之違甚於路人隔閡之異殊於胡越今臣以一切之制永無朝覲之望至於注心皇極結情紫闥神明知之矣然天實為之謂之何哉退省諸王常有戚戚具爾之心願陛下沛然垂詔使諸國慶問四節得展以敘骨肉之歡恩全怡怡之篤義妃妾之家膏沐之遺歲得再通齊義於貴宗等惠於百司如此則古人之所歎風雅之所詠復存於聖世矣臣伏自惟省豈無錐刀之用及觀陛下之所拔授若以臣為異姓竊自料度不後於朝士矣若得辭遠遊戴武辨解朱組佩青紱駙馬奉車趣得一號安宅京室執鞭珥筆出從華蓋入侍輦轂承答聖問拾遺左右乃臣丹情之至願不離於夢想者也遠慕鹿鳴君臣之宴中詠棠棣匪他之誡下思伐木友生之義終懷蓼莪罔極之哀每四節之會塊然獨處左右唯僕隸所對唯妻子高談無所與陳發義無所與展未嘗不聞樂而拊心臨觴而歎息也臣伏以為犬馬之誠不能動人譬人之誠不能動天崩城隕霜臣初信之以臣心況徒虛語耳若葵藿之傾葉太陽雖不為之回光然終向之者誠也臣竊自比葵藿若降天地之施垂三光之明者實在陛下臣聞文子曰不為福始不為禍先今之否隔友于同憂而臣獨唱言者何也竊不願於聖代使有不蒙施之物有不蒙施之物必有慘毒之懷故柏舟有天只之怨谷風有棄豫之嘆伊尹恥其君不為堯舜孟子曰不以舜之所以事堯事其君者不敬其君者也臣之愚蔽固非虞伊至於欲使陛下崇光被時雍之美宣緝熙章明之德者是臣慺慺之誠竊所獨守實懷鶴立企佇之心敢復陳聞者冀陛下儻發天聰而垂神聽也陳審舉表臣聞天地協氣而萬物生君臣合德而庶政成五帝之世非皆智三季之末非皆愚用與不用知與不知也既時有舉賢之名而無得賢之實必各援其類而進矣諺曰相門有相將門有將夫相者文德昭者也將者武功烈者也文德昭則可以匡國朝致雍熙稷契夔龍是也武功烈則可以征不庭威四夷南仲方叔是矣昔伊尹之為媵臣至賤也呂尚之處屠釣至陋也及其見舉於湯武周文誠道合志同玄謨神通豈復假近習之薦因左右之介哉書曰有不世之君必能用不世之臣用不世之臣必能立不世之功殷周二王是矣若夫齷齪近步遵常守故安足為陛下言哉故陰陽不和三光不暢官曠無人庶政不整者三司之責也疆場騷動方隅內侵沒軍喪衆干戈不息者邊將之憂也豈可虛荷國寵而不稱其任哉故任益隆者負益重位益高者責益深書稱無曠庶官詩有職思其憂此其義也陛下體天真之淑聖登神機以繼統冀聞康哉之歌偃武行文之美而數年以來水旱不時民困衣食師徒之發歲歲增調加東有覆敗之軍西有殪沒之將至使蚌蛤浮翔於淮泗鼲鼬歡譁於林木臣每念之未嘗不輟食而揮餐臨觴而扼腕矣昔漢文發代疑朝有變宋昌曰內有朱虛東牟之親外有齊楚淮南琅邪此則磐石之宗願王勿疑臣伏惟陛下遠覽姬文二虢之援中慮周成召畢之輔下存宋昌磐石之固昔騏驥之於吳坂可謂困矣及其伯樂相之孫郵御之形體不勞而坐取千里蓋伯樂善御馬明君善御臣伯樂馳千里明君致太平誠任賢使能之明效也若朝司惟良萬機內理武將行師方難克弭陛下可得雍容都城何事勞動鑾駕暴露於邊境哉臣聞羊質虎皮見草則悅見豺則戰忘其皮之為虎也今置將不良有似於此故語曰患為之者不知知之者不得為也昔樂毅奔趙心不忘燕廉頗在楚思為趙將臣生乎亂長乎軍又數承教於武皇帝伏見行師用兵之要不必取孫吳而暗與之合竊揆之於心常願得一奉朝覲排金門蹈玉陛列有職之臣賜須臾之問使臣得一散所懷攄舒蘊積死不恨矣被鴻臚所下發士息書期會甚急又聞豹尾已建戎軒騖駕陛下將復勞玉躬擾掛神思臣誠竦息不遑寧處願得策馬執鞭首當塵露撮風后之奇接孫吳之要追慕卜商起豫左右效命先軀畢命輪轂雖無大益冀有小補然天高聽遠情不上通徒獨望青雲而拊心仰高天而歎息耳屈平曰國有驥而不知乘焉皇皇而更索昔管蔡放誅周召作弼叔魚陷刑叔向匡國三監之釁臣自當之二南之輔求不必遠華宗貴族藩王之中必有應斯舉者故傳曰無周公之親不得行周公之事惟陛下少留意焉近者漢氏廣建藩王豐則連城數十約則饗食祖祭而已未若姬周之樹國五等之品制也若扶蘇之諫始皇淳于越之難周青臣可謂知時變矣夫能使天下傾耳注目者當權者是矣故謀能移主威能懾下豪右執政不在親戚權之所在雖疏必重勢之所去雖親必輕蓋取齊者田族非呂宗也分晉者趙魏非姬姓也惟陛下察之苟吉專其位凶離其患者異姓之臣也欲國之安祈家之貴存共其榮沒同其禍者公族之臣也今反公族疏而異姓親臣竊惑焉臣聞孟子曰君子窮則獨善其身達則兼善天下今臣與陛下踐冰履炭登山浮澗寒溫燥溼高下共之豈得離陛下哉不勝憤悶拜表陳情若有不合乞且藏之書府不便滅棄臣死之後事或可思若有毫釐少掛聖意者乞出之朝堂使夫博古之士糾臣表之不合義者如是則臣願足矣昔段干木修德於閭閻秦師為之輟攻而文侯以安穰苴授節於邦境燕晉為之退師而景公無患皆簡德尊賢之所致也願陛下垂高宗傅巖之明以顯中興之功諫取諸國士息表臣聞古者聖君與日月齊其明四時等其信是以戮凶無重賞善無輕怒若驚霆喜若時雨恩不中絶教無二可以此臨朝則臣下知所死矣受任在萬里之外審主之所以授官必己之所以投命雖有搆會之徒泊然不以為懼者蓋君臣相信之明效也昔章子為齊將人有告之反者威王曰不然左右曰王何以明之王曰聞章子改葬死母彼尚不欺死父顧當叛生君乎此君之信臣也昔管仲親射桓公後幽囚從魯檻車載使少年挽而送齊管仲知桓公之必用己懼魯之悔謂少年曰吾為汝唱汝為和聲和聲宜走於是管仲唱之少年走而和之日行數百里宿昔而至至則相齊此臣之信君也臣初受封策書曰植受茲青社封於東土以屏翰皇家為魏藩輔而所得兵百五十人皆年在耳順或不踰矩虎賁官騎及親事凡二百餘人正復不老皆使年壯備有不虞檢校乘城顧不足以自救況皆復耄耋罷曳乎而名為魏東藩使屏翰王室臣竊自羞矣就之諸國國有士子合不過五百人伏以為三軍益損不復賴此方外不定必當須辦者臣願將部曲倍道奔赴夫妻負襁子弟懷糧蹈鋒履刃以徇國難何但習業小兒哉愚誠以揮涕增河鼷鼠飲海於朝萬無損益於臣家計甚有廢損又臣士息前後三送兼人已竭惟尚有小兒七八歲已上十六七已還三十餘人今部曲皆年耆臥在床席非糜不食眼不能視氣息裁屬者凡三十七人疲瘵風靡疣盲聾聵者二十三人惟正須此小兒大者可備宿衛雖不足以禦寇粗可以警小盜小者未堪大使為可使耘鋤穢草驅護鳥雀休候人則一事廢一日獵則衆業散不親自經營則功不攝常自躬親不委下吏而已陛下聖仁恩詔三至士子給國長不復發明詔之下有若皎日保金石之恩必明神之信畫然自固如天如地定習業者並復見送暗若晝晦悵然失圖伏以為陛下既爵臣百寮之右居藩國之任為置卿士屋名為宮冡名為陵不使其危居獨立無異於凡庶若柏成欣耕於野子仲樂於灌園蓬戶茅牖原憲之宅也陋巷簞瓢顏子之居也臣才不見效用常慨然執斯志焉若陛下聽臣悉還部曲罷官屬省監官使解璽釋紱追柏成子仲之業營顏淵原憲之事居子臧之廬宅延陵之宅如此雖進無成功退有可守身死之日猶松喬也然伏度國朝終未肯聽臣之若是固當羈絆於世繩維繫於祿位懷屑屑之小憂執無已之百念安得蕩然肆志逍遙於宇宙之外哉此願未從陛下必欲崇親親篤骨肉潤白骨而榮枯木者惟遂仁德以副前恩與楊德祖書植白數日不見思子為勞想同之也僕少小好為文章迄至于今二十有五年矣然今世作者可略而言也昔仲宣獨步於漢南孔璋鷹揚於河朔偉長擅名於青土公幹振藻於海隅德璉發跡於此魏足下高視於上京當此之時人人自謂握靈蛇之珠家家自謂抱荊山之玉吾王於是設天網以該之頓八紘以掩之今悉集茲國矣然此數子猶復不能飛軒絶跡一舉千里也以孔璋之才不閒於詞賦而多自謂能與司馬長卿同風譬畫虎不成反為狗也前有書嘲之反作論盛道僕讚其文夫鍾期不失聽于今稱之吾亦不能妄嘆者畏後世之嗤余也世人著述不能無病僕嘗好人譏彈其文有不善者應時改定昔丁敬禮嘗作小文使僕潤飾之僕自以才不過若人辭不為也敬禮謂僕卿何所疑難文之佳惡吾自得之後世誰相知定吾文者邪吾嘗歎此達言以為美談昔尼父之文辭與人通流至於制春秋遊夏之徒乃不能措一辭過此而言不病者吾未之見也蓋有南威之容乃可以論於淑媛有龍淵之利乃可以議於斷割劉季緒才不能逮於作者而好詆訶文章掎托利病昔田巴毀五帝罪三王訾五霸於稷下一旦而服千人魯連一說使終身杜口劉生之辨未若田氏今之仲連求之不難可無息乎人各有好尚蘭茝蓀蕙之芳衆人所好而海畔有逐臭之夫咸池六莖之發衆人所共樂而墨翟有非之之論豈可同哉今往僕少小所著辭賦一通相與夫街談巷說必有可采擊轅之歌有應風雅匹夫之思未易輕棄也辭賦小道固未足以揄揚大義彰示來世也昔楊子云先朝執戟之臣耳猶稱壯夫不為也吾雖薄德位為蕃侯猶庶幾勠力上國流惠下民建永世之業流金石之功豈徒以翰墨為勳績辭賦為君子哉若吾志未果吾道不行則將采庶官之實録辨時俗之得失定仁義之衷成一家之言雖未能藏之於名山將以傳之於同好非要之皓首豈今日之論乎其言之不慚恃惠子之知我也明早相迎書不盡懷曹植白與吳季重書植白季重足下前日雖因常調得為密坐雖燕飲彌日其於別遠會稀猶不盡其勞積也若夫觴酌陵波於前簫笳發音於後足下鷹揚其體鳳觀虎視謂蕭曹不足儔衛霍不足侔也左顧右盻謂若無人豈非君子壯志哉過屠門而大嚼雖不得肉貴且快意當斯之時願舉太山以為肉傾東海以為酒伐雲夢之竹以為笛斬泗濱之梓以為箏食若填巨壑飲若灌漏卮其樂固難量豈非大丈夫之樂哉然日不我與曜靈急節面有逸景之速別有參商之闊思欲抑六龍之首頓羲和之轡折若木之華閉濛汜之谷天路高邈良久無緣懷戀反側何如何如得所來訊文采委曲曄若春榮瀏若清風申詠反覆曠若復面其諸賢所著文章想還所治復申詠之也可令喜事小吏諷而誦之夫文章之難非獨今也古之君子猶亦病諸家有千里驥而不珍焉人懷盈尺和氏而無貴矣夫君子而不知音樂古之達論謂之通而蔽墨翟不好妓何為過朝歌而回車乎足下好妓而正值墨翟回車之縣想足下助我張目也又聞足下在彼自有佳政夫求而不得者有之矣未有不求而自得者也且改轍而行非良樂之御易民而治非楚鄭之政願足下勉之而已矣適對嘉賓口授不悉往來數相聞曹植白與陳琳書夫披翠雲以為衣戴北斗以為冠帶虹霓以為紳連日月以為佩此服非不美也然而帝王不服者望殊於天志絶於心矣葛天氏之樂千人唱萬人和因以蔑韶夏矣文心雕龍八引報孔璋書文心雕龍云陳思群才之英也報孔璋書云云此引事之實謬也按葛天之歌唱和三人而已相如上林云奏陶唐之舞聽葛天之歌千人唱萬人和唱和千萬人乃相如接人然而濫侈葛天推三成萬者信賦妄書致斯謬也驥騄不常一步應良御而效足文選顏延年赭白馬賦及陸士衡漢高祖功臣頌李注引與陳琳書與丁敬禮書頃不相聞覆相聲音亦為怪故乘興為書含欣而秉筆大笑而吐辭亦歡之極也與司馬仲達書與司馬仲達書今賊徒欲保江表之城守歐吳耳無有爭雄於宇內角勝於平原之志也故其俗蓋以洲渚為營壁江淮為城塹而已若可得挑致則吾一旅之卒足以敵之矣蓋弋鳥者矯其矢釣魚者理其綸此皆度彼為慮因象設宜者也今足下曾無矯矢理綸之謀徒欲候其離舟伺其登陸乃圖并吳會之地牧東野之民恐非主上授節將之心也答崔文始書臨江直釣不獲一鱗非江魚之不食其所餌之者非也是以君子慎舉擢辨問赫灰而日曜之文選潘安仁關中詩李注君子隱居以養真也衡門茅茨文選陶淵明還江陵詩李注游說之士星流電耀文選劉孝標廣絶交論李注子徒苞懷仁義鋭精詩書書鈔九十七七啓昔枚乘作七發傅毅作七激張衡作七辨崔駰作七依辭各美麗豫有慕之焉遂作七啓並命王粲作焉玄微子隱居大荒之庭飛遁離俗澄神定靈輕祿傲貴與物無營耽虛好靜羡此永生獨馳思乎天雲之際無物象而能傾於是鏡機子聞而將往說焉駕超野之駟乘追風之輿經迥漠出幽墟入乎泱漭之野遂屆玄微子之所居其居也左激水右高岑背洞壑對芳林冠皮辨被文裘出山岫之潛穴倚峻崖而嬉游志飄飄焉嶢嶢焉似若狹六合而隘九州若將飛而未逝若舉翼而中留於是鏡機子攀葛藟而登距巖而立順風而稱曰豫聞君子不遁俗而遺名智士不背世而滅勳今吾子棄道藝之華遺仁義之英耗精神乎虛廓廢人事之紀經譬若畫形於無象造響於無聲未之思乎何所規之不通也玄微子俯而應之曰嘻有是言乎夫太極之初混沌未分萬物紛錯與道俱隆蓋有形必朽有跡必窮茫茫元氣誰知其終名穢我身位纍我躬竊慕古人之所志仰老莊之遺風假靈龜以托喻寧掉尾於塗中鏡機子曰夫辨言之艷能使窮澤生流枯木發榮庶感靈而激神況近在乎人情僕將為君子說游觀之至娛演聲色之妖靡論變化之至妙敷道德之弘麗願聞之乎玄微子曰吾子整身倦世探隱拯沉不遠遐路幸見光臨將敬滌耳以聽玉音鏡機子曰芳菰精稗霜蓄露葵玄熊素膚肥豢膿肌蟬翼之割剖纖析微纍如疊縠離若散雪輕隨飛風刃不轉切山鵽斥鷃珠翠之珍搴芳蓮之巢龜膾西海之飛鱗臛江東之潛鼉臇漢南之鳴鶉糅以芳酸甘和既醇玄冥適鹹蓐收調辛紫蘭丹椒施和必節滋味既殊遺芳射越乃有春清縹酒康狄所營應化則變感氣而成彈徵則苦發扣宮則甘生於是盛以翠樽酌以雕觴浮蟻鼎沸酷烈馨香可以和神可以娛腸此肴饌之妙也子能從我而食之乎玄微子曰豫甘藜藿未暇此食也鏡機子曰步光之劍華藻繁縟飾以文犀雕以翠緑綴以驪龍之珠錯以荊山之玉陸斷犀象未足稱雋隨波截鴻水不漸刃九旒之冕散曜垂文華組之纓從風紛紜佩則結緑懸黎寶之妙微符采照爛流景揚輝黼黻之服紗縠之裳金華之舄動趾遺光繁飾參差微鮮若霜緄佩綢繆或雕或錯薰以幽若流芳肆布雍容閒步周旋馳耀南威為之解顏西施為之巧笑此容飾之妙也子能從我而服之乎玄微子曰豫好毛褐未暇此服也鏡機子曰馳騁足用蕩思游獵可以娛情僕將為吾子駕雲龍之飛駟飾玉輅之繁纓垂宛虹之長抗招搖之華旍捷忘歸之矢秉繁弱之弓忽躡景而輕騖逸奔驥而超遺風於是磎填谷塞榛藪平夷緣山置罝彌野張罘下無漏跡上無逸飛鳥集獸屯然後會圍獠徒雲布武騎霧散丹旗耀野戈殳皓旰曳文狐掩狡兔捎鷫鷞拂振鷺當軌見藉值足遇踐飛軒電逝獸隨輪轉翼不暇張足不及騰動觸飛鋒舉挂輕罾搜林索險探薄窮阻騰山赴壑風厲焱舉機不虛發中必飲羽於是人稠網密地逼勢脅哮闞之獸張牙奮鬣志在觸突猛氣不懾乃使北宮東郭之疇生抽豹尾分裂貙肩形不抗手骨不隱拳批熊碎掌拉虎摧班野無毛類林無羽群積獸如陵飛翮成雲於是駴鍾鳴鼓收旌弛旆頓綱縱網羆獠回邁駿騄齊驤揚鑾飛沫俯倚金較仰撫翠蓋雍容暇豫娛志方外此羽獵之妙也子能從我而觀之乎玄微子曰豫性樂恬靜未暇此觀也鏡機子曰閒宮顯敞雲屋皓旰崇景山之高基迎清風而立觀彤軒紫柱文榱華梁綺井含葩金墀玉廂溫房則冬服絺綌清室則中夏含霜華閣緣雲飛陛陵虛俯眺流星仰觀八隅升龍攀而不逮眇天際而高居繁巧神怪變名異形班輸無所措其斧斤離婁為之失睛麗草交植殊品詭類緑葉朱榮熙天曜日素水盈沼叢木成林飛翮陵高鱗甲隱深於是逍遙暇豫忽若忘歸乃使任子垂釣魏氏發機芳餌沈水輕繳弋飛落翳雲之翔鳥援九淵之靈龜然後採菱花擢水蘋弄珠蚌戲鮫人諷漢廣之所詠覿游女於水濱耀神景於中沚被輕縠之纖羅遺芳烈而靜步抗皓手而清歌歌曰望雲際兮有好仇天路長兮往無由佩蘭蕙分為誰修嬿婉絶兮我心愁此宮館之妙也子能從我而居之乎玄微子曰豫耽巖穴未暇此居也鏡機子曰既游觀中原逍遙閒宮情放志蕩淫樂未終亦將有才人妙妓遺世越俗揚北里之流聲紹陽阿之妙曲爾乃御文軒臨洞庭琴瑟交揮左箎右笙鍾鼓俱振簫管齊鳴然後姣人乃被文縠之華袿振輕綺之飄颻戴金搖之熠耀揚翠羽之雙翹揮流芳耀飛文歷盤鼓煥繽紛長裾隨風悲歌入雲蹻捷若飛蹈虛遠跖陵躍超驤蜿蟬輝霍翔爾鴻翥濈然鳧沒縱輕體以迅赴景追形而不逮飛聲激塵依威厲響才捷若神形難為象於是為歡未泄白日西頽散樂變飾微步中閨玄眉弛兮鉛花落收亂髮兮拂蘭澤形媠服兮揚幽若紅顏宜笑睇盻流光時與吾子攜手同行踐飛除即閒房花燭爛幄幕張動朱唇發清商揚羅袂振華裳九秋之夕為歡未央此聲色之妙也子能從我而遊之乎玄微子曰豫願清虛未暇此遊也鏡機子曰豫聞君子樂奮節以顯義烈士甘危軀以成仁是以雄俊之徒交黨結倫重氣輕命感分遺身故田光伏劍於北燕公叔畢命於西秦果毅輕斷虎步谷風威懾萬乘華夏稱雄詞未及終而玄微子曰善鏡機子曰此乃游俠之徒耳未足稱妙也若夫田文無忌之儔乃上古之俊公子也皆飛仁揚義騰躍道藝遊心無方抗志雲際陵轢諸侯驅馳當世揮袂則九野生風慷慨則氣成虹霓吾子若當此之時能從我而友之乎玄微子曰豫亮願焉然方於大道有纍如何鏡機子曰世有聖宰翼帝霸世同量乾坤等曜日月玄化參神與靈合契惠澤播於黎苗威靈振乎無外超隆平於殷周踵羲皇而齊泰顯朝惟清王道遐均民望如草我澤如春河濱無洗耳之士喬嶽無巢居之民是以俊乂來仕觀國之光舉不遺材進各異方讚典禮於辟雍講文德於明堂正流俗之華說綜孔氏之舊章散樂移風國富民康神應休臻屢獲嘉祥故甘露紛而晨降景星宵而舒光觀遊龍於神淵聆鳴鳳於高岡此霸道之至隆而雍熙之盛際然主上猶尚以沈恩之未廣懼聲教之未厲采英奇於仄陋宣皇明於巖穴此寧子商歌之秋而呂望所以投綸而逝也吾子為太和之民不欲仕陶唐之世乎於是玄微子攘袂而興曰偉哉言乎近者吾子所述華淫欲以厲我祗攪豫心至聞天下穆清明君蒞國覽盈虛之正義知頑素之迷惑令豫廓爾身輕若飛願反初服從子而歸七咨素冰象玉難可磨蕩結土成龍遭雨則傷贈白馬王彪黃初四年五月白馬王任城王與余俱朝京師會節氣到洛陽任城王薨至七月與白馬王還國後有司以二王歸藩道路宜異宿止意毒恨之蓋以大別在數日是用自剖與王辭焉憤而成篇離友并序并序離友并序鄉人有夏侯威者少有成人之風余尚其為人與之昵好王師振旅送豫于魏邦心有眷然為之隕涕乃作離友之詩鞞舞歌有序五首程缺有序五首程缺鞞舞歌有序五首程缺漢靈帝西園鼓吹有李堅者能鞞舞遭亂西隨段熲先帝聞其舊有技召之堅既中廢兼古曲多謬誤異代之文未必相襲故依前曲改作新歌五篇不敢充之黃門近以成下國之陋樂焉前録自序故君子之作也儼乎若高山勃乎若浮雲質素也如秋蓬摛藻也如春葩泛乎洋洋光乎皓皓與雅頌爭流可也余少而好賦其所尚也雅好慷慨所著繁多雖觸類而作然蕪穢者衆故刪定別撰為前録七十八篇
