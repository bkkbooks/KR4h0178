body:
  text: 魏卷四十九嵇康聲無哀樂論有秦客問於東野主人曰聞之前論曰治世之音安以樂亡國之音哀以思夫治亂在政而音聲應之故哀思之情表於金石安樂之象形於管絃也又仲尼聞韶識虞舜之德季札聽絃知衆國之風斯已然之事先賢所不疑也今子獨以為聲無哀樂其理何居若有嘉訊今請聞其説主人應之曰斯義久滯莫肯拯救故令歷世濫於名實今蒙啓導將言其一隅焉夫天地合德萬物貴生寒暑代往五行以成故章為五色發為五音音聲之作其猶臭味在於天地之間其善與不善雖遭遇濁亂其體自若而不變也豈以愛憎易操哀樂改度哉及宮商集比聲音克諧此人心至願情欲之所鍾古人知情不可恣欲不可極故因其所用每為之節使哀不至傷樂不至淫因事與名物有其號器謂之哀歌謂之樂斯其大較也然樂云樂云鍾鼓云乎哉哀云哀云哭泣云乎哉因茲而言玉帛非禮敬之實歌舞非悲哀之主也何以明之夫殊方異俗歌哭不同使錯而用之或聞哭而歡或聽歌而戚然而哀樂之情均也今用均同之情而發萬殊之聲斯非音聲之無常哉然聲音和比感人之最深者也勞者歌其事樂者舞其功夫內有悲痛之心則激切哀言言比成詩聲比成音雜而詠之聚而聽之心動於和聲情感於苦言嗟歎未絶而泣涕流漣矣夫哀心藏於內遇和聲而後發和聲無象而哀心有主夫以有主之哀心因乎無象之和聲其所覺悟唯哀而已豈復知吹萬不同而使其自已哉風俗之流遂成其政是故國史明政教之得失審國風之盛衰吟詠情性以諷其上故曰亡國之音哀以思也夫喜怒哀樂愛憎慚懼凡此八者生民所以接物傳情區別有屬而不可溢者也夫味以甘苦為稱今以甲賢而心愛以乙愚而情憎則愛憎宜屬我而賢愚宜屬彼也可以我愛而謂之愛人我憎而謂之憎人所喜則謂之喜味所怒則謂之怒味哉由此言之則外內殊用彼我異名聲音自當以善惡為主則無關於哀樂哀樂自當以情感而後發則無係於聲音名實俱去則盡然可見矣且季子在魯採詩觀禮以別風雅豈徒任聲以決臧否哉又仲尼聞韶歎其一致是以咨嗟何必因聲以知虞舜之德然後歎美耶今粗明其一端亦可思過半矣秦客難曰八方異俗歌哭萬殊然其哀樂之情不得不見也夫心動於中而聲出於心雖託之於他音寄之於餘聲善聽察者要自覺之不使得過也昔伯牙理琴而鍾子知其所志隸人擊磬而子産識其心哀魯人晨哭而顏淵審其生離夫數子者豈復假智於常音借驗於曲度哉心戚者則形為之動情悲者則聲為之哀此自然相應不可得逃唯神明者能精之耳夫能者不以聲衆為難不能者不以聲寡為易今不可以未遇善聽而謂之聲無可察之理見方俗之多變而謂聲音無哀樂也又云賢不宜言愛愚不宜言憎然則有賢然後愛生有愚然後憎成但不當共其名耳哀樂之作亦有由而然此為聲使我哀音使我樂也苟哀樂由聲更為有實何得名實俱去耶又云季子採詩觀禮以別風雅仲尼歎韶音之一致是以咨嗟是何言歟且師襄奏操而仲尼覩文王之容師涓進曲而子野識亡國之音寧復講詩而後下言習禮然後立評哉斯皆神妙獨見不待留聞積日而已綜其吉凶矣是以前史以為美談今子以區區之近知齊所見而為限無乃誣前賢之識微負夫子之妙察耶主人答曰難云雖歌哭萬殊善聽察者要自覺之不假智於常音不借驗於曲度鍾子之徒云云是也此為心悲者雖談笑鼓舞情歡者雖拊膺咨嗟猶不能御外形以自匿誑察者於疑似也以為就令聲音之無常猶謂當有哀樂耳又曰季子聽聲以知衆國之風師襄奏操而仲尼覩文王之容案如所云此為文王之功德與風俗之盛衰皆可象之於聲音聲之輕重可移於後世襄涓之巧能得之於將來若然者三皇五帝可不絶於今日何獨數事哉若此果然也則文王之操有常度韶武之音有定數不可雜以他變操以餘聲也則向所謂聲音之無常鍾子之觸類於是乎躓矣若音聲之無常鍾子之觸類其果然耶則仲尼之識微季札之善聽固亦誣矣此皆俗儒妄記欲神其事而追為耳欲令天下惑聲音之道不言理自盡此而推使神妙難知恨不遇奇聽於當時慕古人而自歎斯所以大罔後生也夫推類辨物當先求之自然之理理已定然後借古義以明之耳今未得之於心而多恃前言以為談證自此以往恐巧歷不能紀又難云哀樂之作猶愛憎之由賢愚此為聲使我哀而音使我樂苟哀樂由聲更為有實矣夫五色有好醜五聲有善惡此物之自然也至於愛與不愛喜與不喜人情之變統物之理唯止於此然皆無豫於內待物而成耳至夫哀樂自以事會先遘於心但因和聲以自顯發故前論已明其無常今復假此談以正名號耳不謂哀樂發於聲音如愛憎之生於賢愚也然和聲之感人心亦猶酒醴之發人性也酒以甘苦為主而醉者以喜怒為用其見歡戚為聲發而謂聲有哀樂猶不可見喜怒為酒使而謂酒有喜怒之理也秦客難曰夫觀氣採色天下之通用也心變於內而色應於外較然可見故吾子不疑夫聲音氣之激者也心應感而動聲從變而發心有盛衰聲亦降殺同見役於一身何獨於聲便當疑耶夫喜怒章於色診哀樂亦宜形於聲音聲音自當有哀樂但暗者不能識之至鍾子之徒雖遭無常之聲則穎然獨見矣今矇瞽面牆而不悟離婁照秋毫於百尋以此言之則明暗殊能矣不可守咫尺之度而疑離婁之察執中庸之聽而猜鍾子之聰皆謂古人為妄記也主人答曰難云心應感而動聲從變而發心有盛衰聲亦降殺哀樂之情必形於聲音鍾子之徒雖遭無常之聲則穎然獨見矣必若所言則濁質之飽首陽之飢卞和之冤伯奇之悲相如之含怒不占之怖祗千變百態使各發一詠之歌同啓數彈之微則鍾子之徒各審其情矣爾為聽聲者不以寡衆易思察情者不以大小為異同出一身者期於識之也設使從下出則子野之徒亦當復操律鳴管以考其音知南風之盛衰別雅鄭之淫正也夫食辛之與甚噱熏目之與哀泣同用出淚使狄牙嘗之必不言樂淚甜而哀淚苦斯可知矣何者肌液肉汗踧笮便出無主於哀樂猶蓰酒之囊漉雖笮具不同而酒味不變也聲俱一體之所出何獨當含哀樂之理也且夫咸池六莖大章韶夏此先王之至樂所以動天地感鬼神者也今必云聲音莫不象其體而傳其心此必為至樂不可託之於瞽史必須聖人理其絃管爾乃雅音得全也舜命夔擊石拊石八音克諧神人以和以此言之至樂雖待聖人而作不必聖人自執也何者音聲有自然之和而無係於人情克諧之音成於金石至和之聲得於管絃也夫纖毫自有形可察故離瞽以明暗異功耳若以水濟水孰異之哉秦客難曰雖衆喻有隱足招攻難然其大理當有所就若葛盧聞牛鳴知其三子為犧師曠吹律知南風不竟楚師必敗羊舌母聽聞兒啼而審其喪家凡此數事皆效於上世是以咸見録載推此而言則盛衰吉凶莫不存乎聲音矣今若復謂之誣罔則前言往記皆為棄物無用之也以言通論未之或安若能明斯所以顯其所由設二論俱濟願重聞之主人答曰吾謂能反三隅者得意而忘言是以前論略而未詳今復煩循環之難敢不自一竭耶夫魯牛能知犧曆之喪生哀三子之不存含悲經年訴怨葛盧此為心與人同異於獸形耳此又吾之所疑也且牛非人類無道相通若謂鳥獸皆能有葛盧受性獨曉之此為稱其語而論其事猶譯傳異言耳不為考聲音而知其情則非所以為難也若謂知者為當觸物而達無所不知今且先議其所易者請問聖人卒入胡域當知其所言否乎難者必曰知之知之之理何以明之願借子之難以立鑒識之域或當與關接識其言耶將吹律鳴管校其音耶觀氣採色知其心耶此為知心自由氣色雖自不言猶將知之知之之道可不待言也若吹律校音以知其心假令心志於馬而誤言鹿察者固當由鹿以知馬也此為心不係於所言言或不足以證心也若當關接而知言此為孺子學言於所師然後知之則何貴於聰明哉夫言非自然一定之物五方殊俗同事異號趣舉一名以為摽識耳夫聖人窮理謂自然可尋無微不照理蔽則雖近不見故異域之言不得強通推此以往葛盧之不知牛鳴得不全乎又難云師曠吹律知南風不競楚多死聲此又吾之所疑也請問師曠吹律之時楚國之風耶則相去千里聲不足達若正識楚風來入律中耶則楚南有吳越北有梁宋苟不見其原奚以識之哉凡陰陽憤激然後成風氣之相感觸地而發何得發楚庭來入晉乎且又律呂分四時之氣耳時至而氣動律應而灰移皆自然相待不假人以為用也上生下生所以均五聲之和敘剛柔之分也然律有一定之聲雖冬吹中呂其音自滿而無損也今以晉人之氣吹無韻之律楚風安得來入其中與為盈縮耶風無形聲與律不通則校理之地無取於風律不其然乎豈獨師曠多識博物自有以知勝敗之形欲固衆心而託以神微若伯常騫之許景公壽哉又難云羊舌母聽聞兒啼而審其喪家復請問何由知之為神心獨悟暗語而當耶嘗聞兒啼若此其大而惡今之啼聲似昔之啼聲也故知其喪家耶若神心獨悟暗語之當非理之所得也雖曰聽啼無取驗於兒聲矣若以嘗聞之聲為惡故知今啼當惡此為以甲聲為度以校乙之啼也夫聲之於音猶形之於心也有形同而情乖貌殊而心均者何以明之聖人齊心等德而形狀不同也苟心同而形異則何言乎觀形而知心哉且口之激氣為聲何異於籟籥納氣而鳴耶啼聲之善惡不由兒口吉凶猶琴瑟之清濁不在操者之工拙也心能辨理善談而不能令內籥調利猶瞽者能善其曲度而不能令器必清和也器不假妙瞽而良籥不因惠心而調然則心之與聲明為二物二物之誠然則求情者不留觀於形貌揆心者不借聽於聲音也察者欲因聲以知心不亦外乎今晉母未得之於老成而專信昨日之聲以證今日之啼豈不誤中於前世好奇者從而稱之哉秦客難曰吾聞敗者不羞走所以全也吾心未厭而言難復更從其餘今平和之人聽箏笛琵琶則形躁而志越聞琴瑟之音則聽靜而心間同一器之中曲用每殊則情隨之變奏秦聲則歎羡而慷慨理齊楚則情一而思專肆姣弄則歡放而欲愜心為聲變若此其衆苟躁靜由聲則何為限其哀樂而但云至和之聲無所不感託大同於聲音歸衆變於人情得無知彼不明此哉主人答曰難云琵琶箏笛令人躁越又云曲用每殊而情隨之變此誠所以使人常感也琵琶箏笛間促而聲高變衆而節數以高聲御數節故使人形躁而志越猶鈴鐸警耳鍾鼓駭心故聞鼓鼙之音則思將帥之臣蓋以聲音有大小故動人有猛靜也琴瑟之體間遼而音埤變希而聲清以埤音御希變不虛心靜聽則不盡清和之極是以聽靜而心間也夫曲用不同亦猶殊器之音耳齊楚之曲多重故情一變妙故思專姣弄之音挹衆聲之美會五音之和其體贍而用博故心役於衆理五音會故歡放而欲愜然皆以單復高埤善惡為體而人情以躁靜專散為應譬猶遊觀於都肆則目濫而情放留察於曲度則思靜而容端此為聲音之體盡於舒疾情之應聲亦止於躁靜耳夫曲用每殊而情之處變猶滋味異美而口輒識之也五味萬殊而大同於美曲變雖衆亦大同於和美有甘和有樂然隨曲之情盡於和域應美之口絶於甘境安得哀樂於其間哉然人情不同自師所解則發其所懷若言平和哀樂正等則無所先發故終得躁靜若有所發則是有主於內不為平和也以此言之躁靜者聲之功也哀樂者情之主也不可見聲有躁靜之應因謂哀樂皆由聲音也且聲音雖有猛靜猛靜各有一和和之所感莫不自發何以明之夫會賓盈堂酒酣奏琴或欣然而歡或慘爾而泣非進哀於彼導樂於此也其音無變於昔而歡戚並用斯非吹萬不同耶夫唯無主於喜怒亦應無主於哀樂故歡戚俱見若資偏固之音含一致之聲其所發明各當其分則焉能兼御群理總發衆情耶由是言之聲音以平和為體而感物無常心志以所俟為主應感而發然則聲之與心殊塗異軌不相經緯焉得染太和於歡戚綴虛名於哀樂哉秦客難曰論云猛靜之音各有一和和之所感莫不自發是以酒酣奏琴而歡戚並用此言偏并之情先積於內故懷歡者值哀音而發內戚者遇樂聲而感也夫音聲自當有一定之哀樂但聲化遲緩不可倉卒不能對易偏重之情觸物而作故令哀樂同時而應耳雖二情俱見則何損於聲音有定理耶主人答曰難云哀樂自有定聲但偏重之情不可卒移故懷戚者遇樂聲而哀耳即如所言聲有定分假使鹿鳴重奏是樂聲也而令戚者遇之雖聲化遲緩但當不能使變令歡耳何得更以哀耶猶一爝之火雖未能溫一室不宜復增其寒矣夫火非隆寒之物樂非增哀之具也理絃高堂而歡戚並用者直至和之發滯導情故令外物所感得自盡耳難云偏重之情觸物而作故令哀樂同時而應耳夫言哀者或見機杖而泣或覩輿服而悲徒以感人亡而物存痛事顯而形潛其所以會之皆自有由不為觸地而生哀當席而淚出也今無機杖以致感聽和聲而流涕者斯非和之所感莫不自發也秦客難曰論云酒酣奏琴而歡戚並用欲通此言故答以偏情感物而發耳今且隱心而言明之以成效夫人心不歡則戚不戚則歡此情志之大域也然泣是戚之傷笑是歡之用也蓋聞齊楚之曲者唯覩其哀涕之容而未曾見笑噱之貌此必齊楚之曲以哀為體故其所感皆應其度量豈徒以多重而少變則致情一而思專耶若誠能致泣則聲音之有哀樂斷可知矣主人答曰雖人情感於哀樂哀樂各有多少又哀樂之極不必同致也夫小哀容壞甚悲而泣哀之方也小歡顏悅至樂心愈樂之理也何以明之夫至親安豫則恬若自然所自得也及在危急僅然後濟則抃不及儛由此言之儛之不若向之自得豈不然哉至夫笑噱雖出於歡情然自以理成又非自然應聲之具也此為樂之應聲以自得為主哀之應感以垂涕為故垂涕則形動而可覺自得則神合而無變是以觀其異而不識其同別其外而未察其內耳然笑噱之不顯於聲音豈獨齊楚之曲耶今不求樂於自得之域而以無笑噱謂齊楚體哀豈不知哀而不識樂乎秦客問曰仲尼有言移風易俗莫善於樂即如所論凡百哀樂皆不在聲即移風易俗果以何物耶又古人慎靡靡之風抑慆耳之聲故曰放鄭聲遠佞人然則鄭衛之音擊鳴球以協神人敢問鄭雅之體隆弊所極風俗移易奚由而濟幸重聞之以悟所疑主人應之曰夫言移風易俗者必承衰弊之後也古之王者承天理物必崇簡易之教御無為之治君靜於上臣順於下玄化潛通天人交泰枯稿之類浸育靈液六合之內沐浴鴻流蕩滌塵垢群生安逸自求多福默然從道懷忠抱義而不覺其所以然也和心足於內和氣見於外故歌以敘志儛以宣情然後文之以采章照之以風雅播之以八音感之以太和導其神氣養而就之迎其情性致而明之使心與理相順氣與聲相應合乎會通以濟其美故凱樂之情見於金石含弘光大顯於音聲也若以往則萬國同風芳榮濟茂馥如秋蘭不期而信不謀而成穆然相愛猶舒錦布綵而粲炳可觀也大道之隆莫盛於茲太平之業莫顯於此故曰移風易俗莫善於樂樂之為體以心為主故無聲之樂民之父母也至八音會諧人之所悅亦總謂之樂然風俗移易本不在此也夫音聲和比人情所不能已者也是以古人知情之不可放故抑其所遁知欲之不可絶故因其所自為可奉之禮制可導之樂口不盡味樂不極音揆終始之宜度賢愚之中為之檢則使遠近同風用而不竭亦所以結忠信著不遷也故鄉校庠孰亦隨之使絲竹與俎豆並存羽毛與揖讓俱用正言與和聲同發使將聽是聲也必聞此言將觀是容也必崇此禮禮猶賓主升降然後酬酢行焉於是言語之節聲音之度揖讓之儀動止之數進退相須共為一體君臣用之於朝庶士用之於家少而習之長而不怠心安志固從善日遷然後臨之以敬持之以久而不變然後化成此又先王用樂之意也故朝宴聘享嘉樂必存是以國史採風俗之盛衰寄之樂工宣之管絃使言之者無罪聞之者足以自誡此又先王用樂之意也若夫鄭聲是音聲之至妙妙音感人猶美色惑志耽槃荒酒易以喪業自非至人孰能禦之先王恐天下流而不反故具其八音不瀆其聲絶其大和不窮其變損窈窕之聲使樂而不淫猶大羹不和不極勺藥之味也若流浴淺近則聲不足悅又非所歡也若上失其道國喪其紀男女奔隨媱荒無度則風以此變俗以好成尚其所志則群能肆之樂其所習則何以誅之託於和聲配而長之誠動於言心感於和風俗一成因而名之然所名之聲無中於淫邪也淫之與正同乎心雅鄭之體亦足以觀矣
