body:
  text: 華歆請敘鄭小同表臣聞勵俗宣化莫先于表善班祿敘爵莫美于顯能是以楚人思子文之治復命其胤漢室嘉江公之德用顯其世伏見故漢大司農北海鄭玄當時之學名冠華夏為世儒宗文皇帝旌録先賢拜玄適孫小同以為郎中長假在家小同年踰三十少有令質學綜六經行著鄉邑海岱之人莫不加其自然美其氣量迹其所履有質直不渝之性然而恪恭靜默色養其親不治可見之美不競人閒之名斯誠清時所宜式敘前後明詔所斟酌而求也臣老病委頓無益視聽謹具以聞魏志高貴鄉公紀注引魏名臣奏諫代蜀疏兵亂以來過踰二紀大魏承天受命陛下以聖德當成康之隆宜弘一代之治紹三王之迹雖有二賊負險延命苟聖化日躋遠人懷德將繈負而至夫兵不得已而用之故戢而時動臣誠願陛下先留心于治道以征伐為後事且千里運糧非用兵之利越險深入無獨克之功如聞今年徵役頗失農桑之業為國者以民為基民以衣食為本使中國無飢寒之患百姓無離土之心則天下幸甚二賊之釁可坐而待也臣備位宰相老病日篤犬馬之命將盡恐不復奉望鑾蓋不敢不竭臣子之懷唯陛下裁察魏志華歆傳請受禪上言相國華歆太尉賈詡御史大夫王朗及九卿上言曰臣等被召到伏見太史丞許芝左中郎將李伏所上圖讖符命侍中劉廙等宣敘衆心人靈同謀又漢朝知陛下聖化通于神明聖德參于虞夏因瑞應之備至聽曆數之所在遂獻璽綬固讓尊號能言之倫莫不抃舞河圖洛書天命瑞應人事協于天時民言協于天敘而陛下性秉勞謙體尚克讓明詔懇切未肯聽許臣妾小人莫不伊邑臣等聞自古及今有天下者不常在乎一姓考以德勢則盛衰在乎彊弱論以終始則廢興在乎期運唐虞曆數不在厥子而在舜禹舜禹雖懷克讓之意迫群后執玉帛而朝之兆民懷欣戴而歸之率土揚歌謠而詠之故其守節之拘不可得而常處達節之權不可得而久避是以或遜位而不吝或受禪而不辭不吝者未必厭皇寵不辭者未必渴帝祚各迫天命而不得以已既禪之後則唐氏之子為賓于有虞虞氏之胄為客于夏代然則禪代之義非獨受之者實應天福授之者亦與有餘慶焉漢自章和之後世多變故稍以陵遲洎乎孝靈不恆其心虐賢害仁聚斂無度政在嬖豎視民如讎遂令上天震怒百姓從風如歸當時則四海鼎沸既沒則禍發宮庭寵勢竝竭帝室遂卑若在帝舜之末節猶擇聖代而授之荊人抱玉璞猶思良工而刊之況漢國既往莫之能匡推器移君委之聖哲固其宜也漢朝委質既願禪禮之速定也天祚率土必將有主主率土者非陛下其孰能任之所謂論德無與為比考功無推讓矣天命不可久稽民望不可久違臣等慺慺不勝大願伏請陛下割撝謙之志修受禪之禮副人神之意慰外內之願魏志文帝紀注引獻帝傳奏討孫吳臣聞枝大者披心尾大者不掉有國有家之所慎也昔漢承秦斃天下新定大國之王臣節未盡以蕭張之謀不備録之至使六王前後反叛已而伐之戎車不輟又文景守成忘戰戢役驕縱吳楚養虺成蛇既為社稷大憂蓋前事之不忘後事之師也吳王孫權幼豎小子無尺寸之功遭遇兵亂因父兄之緒少蒙翼卵昫伏之恩長含鴟梟反逆之性背棄天地罪惡積大復與關羽更相覘伺逐利見便挾為卑辭先帝知權姦以求用時以于禁敗于水災等當討羽因以委權先帝委裘下席權不盡心誠在惻怛欲因大喪寡弱王室希託董桃傳先帝令乘未得報許擅取襄陽及見驅逐乃更折節邪辟之態巧言如流雖重驛纍使發遣禁等內包隗囂顧望之姦外欲緩誅支仰蜀賊聖朝含弘既加不忍優而赦之與之更始猥乃割地王之使南面稱孤兼官纍位禮備九命名馬百駟以成其勢光寵顯赫古今無二權為犬羊之姿橫被虎豹之文不思靜力致死之節以報無量不世之恩臣每見所下權前後章表又以愚意採察權旨自以阻帶江湖負固不服狃挾纍世詐僞成功上有尉他英布之計下誦伍被屈疆之辭終非不侵不伐之臣以為朝錯不發削弱王侯之謀則七國同衡禍久而大蒯通不決襲歷下之策則田橫自慮罪深變重臣謹考之周禮九伐之法平權凶惡逆節萌生見罪十五昔九黎亂德黃帝加誅項羽罪十漢祖不捨權所犯罪釁明白非仁恩所養宇宙所容臣請免權官鴻臚削爵土捕治罪敢有不從移兵進討以明國典好惡之常以靜三州元元之苦吳志吳主權傳注引魏略載魏三公奏案此事在黃初三年時三公乃華歆賈詡楊彪也冬臘不得朝表拘守留職曠離車駕況乃踐長于至迎始于臘履端于正連歷天人三朝之元慶而無緣祗奉玉爵以獻萬壽宵夢庭燎之光晨想百華之耀藝文類聚八十論樂舞表凡音樂以舞為主自黃帝雲門至周大武皆太廟舞樂所以樂君臣之德舞所以象君之功御覽五百七十四引魏名臣奏上求正貸民表昔在西京有鄠杜膏腴之饒池陽谷口之利涇渭三川之水鄭國白渠之溉每年成熟雨灌竝畝至今號為陸海御覽八百二十一諫行役夜表司空臣言臣聞飛蓬隨風集于正梁之衡而駟馬為之奔乳虎為之走蓬非馬之策馬非蓬之敵所以或奔走者驚也御覽九百九十七答文帝表夫張大網以漉鰌蝦辱九鼎以烹䵷鼂御覽九百四十三勸育民省刑疏兵起已來三十餘年四海蕩覆萬國殄瘁賴先王芟除寇賊扶育孤弱遂令華夏復有綱紀鳩集兆民于茲魏土使封鄙之內雞鳴狗吠達跨四境蒸庶欣欣喜遇升平今遠方之寇未賓兵戎之役未息誠令復除足以懷遠人良宰足以宣德澤阡陌咸修四民殷熾心復過于曩時而富于平日矣易稱敕法書著祥刑一人有慶兆民賴之慎法獄之謂也昔曹相國以獄市為寄路溫舒疾治獄之吏夫治獄者得其情則無冤死之囚丁壯者得盡地力則無饑饉之民窮老者得仰食倉廩則無餧餓之殍嫁娶以時則男女無怨曠之恨胎養必全則孕者無自傷之哀新生必復則孩者無不育之纍壯而後役則幼者無離家之思二毛不戎則老者無頓伏之患醫藥以療其疾寬繇以樂其業威罰以抑其強恩仁以濟其弱賑貸以瞻其乏十年之後既笄者必盈巷二十年之後勝兵者必滿野矣魏志王郎傳諫文帝游獵疏夫帝王之居外則飾周衛內則重禁門將行則設兵而後出幄稱警而後踐墀張弧而後登輿清道而後奉引遮列而後轉轂靜室而後息駕皆所以顯至尊務戒慎垂法教也近日車駕出臨捕虎日昃而行及昏而反違警蹕之常法非萬乘之至慎也魏志王朗傳諫東征疏昔南越守善嬰齊入侍遂為冢嗣還君其國康居驕黠情不副辭都護奏議以為宜遣侍子以黜無禮且吳濞之禍萌于子入隗囂之叛亦不顧子往者聞權有遣子之言而未至今六軍戒嚴臣恐輿人未畼聖旨當謂國家慍于登之逋留是以為之興師設師行而登乃至則為所動者至大所致者至細猶未足以為慶設其傲很殊無入志懼彼輿論之未畼者并懷伊邑臣愚以為宜敕別征諸將各明奉禁令以慎守所部外曜烈威內廣耕稼使泊然若山淡然若淵勢不可動計不可測魏志王朗傳諫明帝營修宮室疏陛下即位已來恩詔屢布百姓萬民莫不欣欣臣頃奉使北行往反道路聞衆徭役其可得蠲除省減者甚多願陛下重留日昃之聽以計制寇昔大禹將欲拯天下之大患故乃先卑其宮室儉其衣食用能盡有九州弼成五服句踐欲廣其禦兒之疆馘夫差于姑蘇故亦約其身以及家儉其家以施國用能囊括五湖席卷三江取威中國定霸華夏漢之文景亦欲恢弘祖業增崇洪緒故能割意于百金之臺昭儉于弋綈之服內減太官而不受貢獻外省徭賦而務農桑用能號稱升平幾致刑錯孝武之所以能奮其軍勢拓其外境誠因祖考畜積素足故能遂成大功霍去病中才之將猶以胸奴未滅不治第宅明恤遠者略近事外者𥳑內自漢之初及其中興皆于金革略寢之後然後鳳闕猥閌德陽竝起今當建始之前足用列朝會崇華之後足用序內官華林天淵足用展游宴若且先成閶闔之象魏使足用列遠人之朝貢者修城池使足用絶踰越成國險其餘一切且須豐年一以勤耕農為務習戎備為事則國無怨曠戶口滋息民充兵彊而寇戎不賓緝熙不足未之有也魏志王朗傳屢失皇子上疏昔周文十五而有武王遂享十子之祚以廣諸姬之胤武王既老而生成王成王是以鮮于兄弟此二王者各樹聖德無以相過比其子孫之祚則不相如蓋生育有早晚所産有衆寡也陛下既德祚兼彼二聖春秋高于姬文育武之時矣而子發未舉于椒蘭之奧房藩王未繁于掖庭之衆室以成王為喻雖未為晚取譬伯邑則不為夙周禮六宮內官百二十人而諸經常說咸以十二為限至于秦漢之末或以千百為數矣然雖彌猥而就時于吉館者或甚鮮明百斯男之本誠在于一意不但在于務廣也老臣慺慺願國家同祚于軒轅之五五而未及周文之二五用為伊邑且少小常苦被褥泰溫泰溫則不能便柔膚弱體是以難可防護而易用感慨若常令少小之縕袍不至于甚厚則必咸保金石之性而比壽于南山矣魏志王朗傳上請敘主簿張登上請敘主簿張登主簿趙郡張登昔為本縣主簿值黑山賊圍郡登與縣長王雋帥吏兵七十二人直往赴救與賊交戰吏兵散走雋殆見害登手格二賊以全雋命又守長夏逸為督郵所枉登身受考掠理逸之罪義濟二君宜加顯異魏志王朗傳注引王朗集又見御覽二百二十九雋作攜上劉纂等樗蒱事左中郎樂林得纂麵肉共啖湯餅御覽八百六十奏賀朔故事故事正月朔賀殿下設雨百華鐙對于二階之閒端門設庭燎火炬端門外設五尺三尺鐙月照星明雖夜猶晝矣宋書禮志一引魏司空王朗奏事初學記二十五引王朗奏奏宜節省詔問所宜損益必謂東京之事也若夫西京雲陽汾陰之大祭千有五百之群祀通天之臺人阿房之宮齊必百日養犧五載牛則三千其重玉則七千其器文綺以飾重席童女以蹈舞綴釀酹必貫三時而後成樂人必三千四百而後備內宮美人數至近千學官博士七千餘人中廄則騑騄駙馬六萬餘匹外牧則扈養三萬而馬十之執金吾從騎六百走卒倍焉太常行陵幸車千乘太官賜官奴婢六千長安城內治民為政者三千中二千石蔽罪斷刑者二十有五獄政充事猥威儀繁富隆于三代近過禮中夫所以極奢者大抵多受之于秦餘既違繭栗愨誠之本掃地簡易之指又失替質而損文避泰而從約之趣豈夫當今隆興盛明之時祖述堯舜之際割奢務儉之政除繁崇省之令詳刑慎罰之教所宜希慕哉及夫寢廟日一太牢之祀郡國並立宗廟之法丞相御史大夫官屬吏從之數若此之輩既已屢改于哀平之前不行光武之後矣謹案圖牒所改奏在天地及五帝六宗宗廟社稷既已因前代之兆域矣夫天地則掃地而祭其餘則皆壇而埒之矣明堂所以祀上帝靈臺所以觀天文辟雍所以修禮樂太學所以集儒林高禖所以祈休祥又所以察時務揚教化稽古先民開誕慶祚舊時皆在國之陽竝高棟夏屋足以肆饗射望雲物七郊雖尊祀尚質猶皆有門宇便坐足以避風雨可須軍罷年豐以漸修治舊時虎賁羽林五營兵及衛士并合雖且萬人或商賈墯游子弟或農野謹鈍之人雖有乘制之處不講戎陳既不簡練又希更寇雖名實不副難以備急有警而後募兵軍行而後運糧或乃兵既久屯而不務營佃不修器械無有貯聚一隅馳羽檄則三面並荒擾此亦漢氏近世之失而不可式者也當今諸夏已安而巴蜀在畫外雖未得偃武而韜甲放馬而戢兵宜因年之大豐遂寄軍政于農事吏士小大竝勤稼穡止則成井里于廣野動則成校隊于六軍省其暴繇贍其衣食易稱悅以使民民忘其勞悅以犯難民忘其死今之謂矣糧畜于食勇畜于勢雖坐曜烈威而衆未動畫外之蠻必復稽顙以求改往而效用矣若畏威效用不戰而定則賢于交兵而後威立接刃而後功成遠矣若姦凶不革遂迷不反猶欲以其所虐用之民待大魏投命報養之士然後徐以前歌後舞樂征之衆臨彼倒戟折矢樂服之群伐腐摧枯未足以為喻魏志王朗傳注引魏名臣奏劾刺史王淩不遣王基凡家臣之良則升于公輔公臣之良則入于王職是故古者侯伯有貢士之禮今州取宿衛之臣留祕閣之吏所希聞也魏志王基傳四孤議收捐拾棄不避寒暑且救垂絶之氣而肉必死之骨可謂仁過天地恩踰父母者也吾以為田議是也通典六十九大理王朗議興師與吳取蜀議天子之軍重于華岱誠宜坐曜天威不動若山假使權親與蜀賊相持搏戰曠日智均力敵兵不速決當須軍興以成其勢者然後宜選持重之將承寇賊之要相時而後動擇地而後行一舉可無餘事今權之師未動則助吳之軍無為先征且雨水方盛非行軍動衆之時魏志王朗傳改元議古者有年數無年號漢初猶然或有世而改有中元後元元改彌數中後之號不足故更假取美名非古也述春秋之事曰隱公元年則𥳑而易知載漢世之事曰建元元年則後不見宜若古稱元而已宋書禮志一遺針御衣議至于遺針御衣懼傷至尊之體故加之以髡刑欲將懲戒先傷以防絶後傷御覽八百三十引王朗新奏議議不宜復肉刑繇欲輕減大辟之條以增益刖刑之數此即起偃為豎化尸為人矣然臣之愚猶有未合微異之意夫五刑之屬著在科律科律自有減死一等之法不死即為減施行已久不待遠假斧鑿于彼肉刑然後有罪次也前世仁者不忍肉刑之慘酷是以廢而不用不用已來歷年數百今復行之恐所減之文未彰于萬民之目而肉刑之問已宣于寇讎之耳非所以來遠人也今可案繇所欲輕之死罪使減死之髡刖嫌其輕者可倍其居作之歲數內有以生易死不訾之恩外無以刖易釱駭耳之聲魏志鍾繇傳議晏平仲以齊君奢故浣其朝冠振其鹿裘御覽八百二十六風俗通東海王景興議引對孫策誥朗以瑣才誤竊朝私受爵不讓以遘罪網前見征討畏死苟免因治人物寄命須臾又迫大兵惶怖北引從者疾患死亡略盡獨與老母共乘一欐流矢始交便棄欐就俘稽顙自首于征役之中朗惶惑不達自稱降虜緣前迷謬被詰慚懼朗愚淺駑怯畏威自驚又無良介不早自歸于破亡之中然後委命下隸身輕罪重死有餘辜申脰就鞅蹴足入絆叱咤聽聲東西惟命魏志王朗傳注引獻帝春秋朗稱禽虜對使者答太祖遣咨孫權稱臣孫權前箋白詭躬討虜以補前愆後疏稱臣以明無二牙獸屈膝言鳥告歡明珠南金遠珍必至情見乎辭效著乎功三江五湖為沼于魏西吳東越化為國民鄢郢既拔荊門自開席卷巴蜀形勢已成重休纍慶雜沓相隨承旨之日撫掌擊節情之畜者辭不能宣魏志王朗傳注引魏略遣孫伯符書劉正禮昔初臨州未能自達實賴尊門為之先後用能濟江成治有所處定踐境之禮感分結意情在終始後以袁氏之嫌稍更乖刺更以同盟還為讎敵原其本心實非所樂康寧之後常念渝平更成復踐宿好一爾分離款意不昭奄然殂隕可為傷恨知敦以厲薄德以報怨收骨育孤哀亡愍存捐既往之猜保六尺之託誠深恩重分美名厚實也昔魯人雖有齊怨不廢喪紀春秋善之謂之得禮誠良史之所宜藉鄉校之所歎聞正禮元子致有志操想必有以殊異威盛刑行施之以恩不亦優哉吳志劉繇傳與魏太子書不遺惠書所以慰沃奉讀歡笑以藉飢渴雖復萱草忘憂皋蘇擇勞無以加也初學記二十七與許文休書文休足下消息平安甚善甚善豈意脫別三十餘年而無相見之緣乎詩人比一日之別于歲月豈況悠悠歷纍紀之年者哉自與子別若沒而復浮若絶而復連者數矣而今而後居升平之京師攀附于飛龍之聖主儕輩略盡幸得老與足下竝為遺種之叟而相去數千里加有邅蹇之隔時聞消息于風聲託舊情于思想眇眇異處與異世無以異也往者隨軍到荊州見鄧子孝桓元將粗聞足下動靜云夫子既在益州執職領郡德素規矩老而不墮是時侍宿武皇帝于江陵劉景升聽事之上共論道足下至于通夜不寐拳拳飢渴誠無已也自天子在東宮及即位之後每會群賢論天下髦雋之見在者豈獨人盡易為英士鮮易取最故乃猥以原壤之朽質感夫子之情聽每敘足下以為謀首豈其注意乃復過于前世書曰人惟求舊易稱同聲相應同氣相求劉將軍之與大魏兼而兩之總此二義前世邂逅以同為睽非武皇帝之旨頃者蹉跌其泰而否亦非足下之意也深思書易之義利結分于宿好故遣降者送吳所獻致名馬貂罽得因無嫌道初開道展敘舊情以達聲問久闊情慉非夫筆墨所能寫陳亦想足下同其志念今者親生男女凡有幾人年竝幾何僕連失一男一女今有二男大男名肅年三十九歲生于會稽小兒裁歲餘臨書愴恨有懷緬然蜀志許靖傳注引魏略又略見御覽一百八十五過聞受終于文祖之言于尚書又聞曆數在躬允執其中之文于論語豈自意得于老耄之齒正值天命受于聖主之會親見三讓之弘辭觀衆瑞之總集覩升堂穆穆之盛禮瞻燔燎焜曜之青烟于時忽自以為處唐虞之運際于紫微之天庭也徒慨不得攜子之手共列于世有二子之數以聽有唐欽哉之命也子雖在裔土想亦極目而回望側耳而遐聽延頸而鶴立也昔汝南陳公初拜不依故常讓上卿于李元禮以此推之吾宜退身以避子位也苟得避子以竊讓名然後綬帶委質游談于平勃之閒與子共陳往時避地之艱辛樂酒酣宴高談大噱亦足遺憂而忘老捉筆陳情隨以喜笑蜀志許靖傳注引魏略前夏有書而未達今重有書而并致前問皇帝既深悼劉將軍之早世又愍其孤之不易又惜使足下孔明等士人氣類之徒遂沈溺于羌夷異種之閒永與華夏乖絶而無朝聘中國之期緣瞻睎故土桑梓之望也故復運慈念而勞仁心重下明詔以發德音申敕朗等使重為書與足下等以足下聰明揆殷勤之聖意亦足悟海岱之所常在知百川之所宜注矣昔伊尹去夏而就殷陳平違楚而歸漢猶曜德于阿衡著功于宰相若足下能弼人之遺孤定人之猶豫去非常之僞號事受命之大魏客主兼不世之榮名上下蒙不朽之常耀功與事竝聲與勳著考績效足以超越伊呂矣既承詔直且服舊之情情不能已若不言足下之所能陳足下之所見則無以宣明詔命弘光大之恩敘宿昔夢想之思若天啓衆心子導蜀意誠此意有攜手之期若險路未夷子謀不從則懼聲問或否復面何由前後二書言每及斯希不切然有動于懷足下周游江湖以暨南海歷觀夷俗可謂遍矣想子之心結思華夏可謂深矣為身擇居猶願中土為主擇居安豈可以不繫意于京師而持疑于荒裔乎詳思愚言速示還報也蜀志許靖傳注引魏略與鍾繇書朗白近聞室人孫氏歸或曰大歸也共經憂樂既久矣曷為一旦離析以至于歸而不反乎不得面談裁書敘心御覽論喪服書鄭玄云兄弟猶曰族親也無所不關之辭也吾以為古學以九代之親為九族謂兄弟者亦九代兄弟也凡屬乎父道者則父之兄弟在乎祖道者則祖之兄弟在乎子道者則子之兄弟在乎孫道者則孫之兄弟故族親亦可謂為兄弟者也通典七十三相論然仲尼之門童冠之群不言相形之事抑者亦難據故也古之人固有懷不副其貌行不稱其聲者是故夫子以言信行失之于宰豫以貌度性失之于子羽聖人之于聽察精矣然猶或有所不得以此推之則彼度表捫骨指色摘理不常中必矣若夫周之叔服漢之許負各以善相稱于前世而書專記其效驗之尤著者不過公孫氏之二子與夫周氏之條侯而已藝文類聚七十五雜針家人有嚴君焉井竈之謂也俾冬作夏非竈孰能俾夏作冬非井孰間藝文類聚八十貧寠語諺曰魯班雖巧不能為乞丐者顏御覽四百九十六塞勢余所與遊處唯東萊徐先生素習九章能為計數問何以代博奕者乎曰塞其次也乃試習其術以驚睡焉御覽七百五十四
