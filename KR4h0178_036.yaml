body:
  text: 衛臻止越職疏古制侵官之法非惡其勤事也誠以所益者小所墮者大也臣每察校事類皆如此懼群司將遂越職以至陵遲矣魏志衛臻傳奏拒蜀宜遣奇兵入散關絶其糧道魏志衛臻傳諸葛亮寇天水臻奏祀天樂用宮懸議圓丘宜用大韶樂宜宮懸宗廟之樂宜用武始咸熙通典一百四十七答蔣濟古人遺智慧而任度量須考績而加黜陟今子同牧野于成康喻斷蛇于文景好不經之舉開拔奇之津將使天下馳騁而起矣魏志衛臻傳禪代合符讖緯昔先王初建魏國在境外者聞之未審皆以為拜王武都李庶薑合羈旅漢中謂臣曰必為魏公未便王也定天下者魏公子桓神之所命當合符讖以應天人之位臣以合辭語鎮南將軍張魯魯亦問合知書所出合曰孔子玉版也天子曆數雖百世可知是後月餘有亡人來寫得册文卒如合辭合長于內學關右知名魯雖有懷國之心沈溺異道變化不果寤合之言後密與臣議策質國人不協或欲西通魯即怒曰寧為魏公奴不為劉備上客也言發惻痛誠有由然合先迎王師往歲病亡于鄴自臣在朝每為所親宣説此意時未有宜弗敢顯言殿下即位初年禎祥衆瑞日月而至有命自天昭然著見然聖德洞達符表豫明實乾坤挺慶萬國作孚臣每慶賀欲言合驗事君盡禮人以為諂況臣辨行穢賤入朝日淺言為罪尤自抑而已今洪澤被四表靈恩格天地海內翕習殊方歸服兆應並集以揚休命始終允臧臣不勝喜舞謹具表通魏志文帝紀注引獻帝傳條奏魏代漢讖緯易傳曰聖人受命而王黃龍以戊己日見七月四日戊寅黃龍見此帝王受命之符瑞最著明者也又曰初六履霜陰始凝也又有積蟲大𤕠天子之宮厥咎然今蝗蟲見應之也又曰聖人以德親比天下仁恩洽普厥應麒麟以戊己日至厥應聖人受命又曰聖人清淨行中正賢人福至民從命厥應麒麟來春秋漢含孳曰漢以魏魏以徵春秋玉版讖曰代赤眉者魏公子春秋佐助期曰漢以許昌失天下故白馬令李雲上事曰許昌氣見于當塗高當塗高者當昌于許當塗高者魏也象魏者兩觀闕是也當道而高大者魏魏當代漢今魏基昌于許漢徵絶于許乃今效見如李雲之言許昌相應也佐助期又曰漢以蒙孫亡説者以蒙孫漢二十四帝童蒙愚昏以弱亡或以雜文為蒙其孫當失天下以為漢帝非正嗣少時為董侯名不正蒙亂之荒惑其子孫以弱亡孝經中黃讖曰日載東絶火光不橫聖聰明四百之外易姓而王天下歸功致太平居八甲共禮樂正萬民嘉樂家和雜此魏王之姓諱著見圖讖易運期讖曰言居東西有午兩日並光日居下其為主反為輔五八四十黃氣受真人出言午許字兩日昌字漢當以許亡魏當以許昌今際會之期在許是其大效也易運期又曰鬼在山禾女連王天下臣聞帝王者五行之精易姓之符代興之會以七百二十年為一軌有德者遇之至于八百無德者不及至四百載是以周家八百六十七年夏家四百數十年漢行夏正訖今四百二十二歲又高祖受命數雖起乙未然其兆徵始于獲麟獲麟以來七百餘年天之曆數將以盡終帝王之興不常一姓太微中黃帝坐常明而赤帝坐常不見以為黃家興而赤家衰凶亡之漸自是以來四十餘年又熒惑失色不明十有餘年建安十年彗星先除紫微二十三年復掃太微新天子氣見東南以來二十三年白虹貫日月蝕熒惑比年己亥壬子丙午日蝕皆水滅火之象也殿下即位初踐祚德配天地行合神明恩澤盈溢廣被四年格于上下是以黃龍數見鳳皇仍翔麒麟皆臻白虎效仁前後獻見于郊甸甘露醴泉奇獸神物衆瑞並出斯皆帝王受命易姓之符也昔黃帝受命風后受河圖舜禹有天下鳳皇翔洛出書湯之王白烏為符文王為西伯赤鳥銜丹書武王代殷白魚升舟高祖始起白蛇為徵巨迹瑞應皆為聖人興觀漢前後之大災今茲之符瑞察圖讖之期運揆河洛之所甄未若今大魏之最美也夫得歲星者道始興昔武王伐殷歲在鶉火有周之分野也高祖入秦五星聚東井有漢之分野也今茲歲星在大梁有魏之分野也而天之瑞應並集來臻四方歸附繈負而至兆民欣戴咸樂嘉慶春秋大傳曰周公何以不之魯蓋以為雖有繼體守文之君不害聖人受命而王周公反政尸子以為孔子非之以為周公不聖不為兆民也京房作易傳曰凡為王者惡者去之弱者奪之易姓改代天命應常人謀鬼謀百姓與能伏惟殿下體堯舜之盛明膺七百之禪代當湯武之期運值天命之移受河洛所表圖讖所載昭然明白天下學士所共見也臣職在史官考符察徵圖讖效見際會之期謹以上聞魏志文帝紀注引獻帝傳自建安三年十二月戊辰有新天子氣見于東南到今積二十三年建安十年茀星出庫樓歷犯氐房宿北入天市犯北斗紫微氐為天子宿宮路寢所止房為天子明堂政教之首北斗七星主尊輔象近臣紫微者北極最尊此除掃漢家之大異也建安十八年秋歲星鎮星熒惑俱入太微逆行留守帝坐百有餘日歲星入太微人主改姓鎮星入太微內有兵亂人主以弱三者漢改姓易代之異也建安十九年正月白虹貫日易傳曰后妃擅國白虹貫日建安二十一年五月朔己亥日蝕建安二十三年三月茀星晨見東方二十餘日久出西方犯歷五車東井五諸侯文昌軒轅太微鋒炎刺帝坐茀者除舊布新亡惡興聖之異也建安二十四年二月晦壬子日蝕日者陽精月為侯王而以亥子日蝕皆水滅火之異也延康元年九月十日黃昏時月蝕熒惑過人定時熒惑出營室宿羽林月為大臣侯王之象熒惑火精漢氏之行占曰漢家以兵亡延康元年九月二十日剝卦天子氣不見皆崩亡之異也熒惑火精行縮日一度有餘故太史令王昱以為漢家衰亡之極熒惑大而赤色光不明赤而小與小星無別皆赤家衰亡之異也易傳曰上下流通聖賢昌厥應帝德鳳皇翔萬民喜樂無咎殃易傳又曰聖人受命厥應鳳皇下天子虜易傳又曰黃龍見天災將至天子絀聖人出黃龍以戊己日見五色文章皆具聖人得天受命黃龍以戊寅見此帝王受命之符瑞最著明者也易傳又曰聖人清靜行中正賢人至民從命厥麒麟來春秋玉版讖曰代赤者魏公子春秋佐助期曰漢以許昌失天下故白馬令甘陵李雲上事言許昌氣見當塗高已萌欲使漢家防絶萌牙今漢都許日以微弱當居許昌以失天下當塗高者魏也魏者象魏兩闕之名當道而高大者也魏當代漢如李雲之言也春秋佐助期又曰漢以蒙孫亡説者以蒙孫直漢二十四帝童蒙愚惑以弱亡漢帝少時名為董侯名不正蒙亂荒惑其子孫以弱亡也孝經中黃讖曰日載東絶火光不橫一聖明聰四百之外易姓而王天下歸功致太平此魏王之姓諱著見圖讖也易運期曰言居東西有午兩日並光日居下其為主及為輔五八四十黃氣受真人出言午許字兩日昌字漢當以許亡魏當以許昌今際會之期在許是其大效也易運期又曰鬼在山禾女運王天下宋書符瑞志上案此與魏志注所載小同而大異曆議劉洪月行術用以來且四十餘年已復覺失一辰有奇晉書律曆志中劉洪以曆後天潛精內思二十餘載參校漢家太初三統四分曆術課弦望于兩儀郭間而月行九歲一終謂之九道九章百七十一歲九道小終九九八十一章五百六十七分而九終進退牛前四度五分學者務追合四分但減一道六十三分分不下通是以疏闊皆由斗分多故也課弦望當以昏明度日所在則知加時先後之意不宜用兩儀郭間洪加太初元十二紀減十斗下分元起己丑又為月行遲疾交會及黃道去極度五星術理實粹密信可長行今韓翊所造皆用洪法小益斗下分所錯無幾翊所增減致亦留思然十術新立猶未就悉至于日蝕有不盡效效曆之要要在日蝕熹平之際時洪為郎欲改四分先上驗日蝕日蝕在晏加時在辰蝕從下上三分侵二事御之後如洪言海內識真莫不聞見劉歆已來未有洪比夫以黃初二年六月二十七日戊辰加時未日蝕乾象術加時申半強于消息就加未黃初以為加辛強乾象後天一辰半強為近黃初二辰半為遠消息與天近晉書律曆志中追崇始祖議按春秋之義五等諸侯卒葬皆稱公乃與王者之後宋公同號然臣子褒崇其君父以此言之中常侍大長秋特進君侯誕育大皇篤生武王奄有四方其功德之號莫過大王今迎神主宜乘王車又宜先遣使者上諡號為大王通典七十二文帝即王位孫欽等議告瑞祀天不以地配議周禮祀天南郊無地配之文大魏受禪因漢祀天以地配此謂正月南郊常祀也今告靈瑞不須以地配通典五十五引尚書奏孫欽議曆議史遷造太初其後劉歆以為疏復為三統章和中改為四分以儀天度考合符應時有差跌日蝕覺過半日至熹平中劉洪改為乾象推天七曜之符與天地合其序晉書律曆志中阮元瑜誄既登宰朝充我祕府允司文章爰及軍旅庶績惟殷簡書如雨強力敏成事至則舉論賜諡啓古者存有號則歿有諡必考行迹論功業而為之制漢不修古禮大臣有寵乃賜之諡今國家因用未革臣以為今諸侯薨于位者可有諡主者宜作得諡者秩品之限通典一百四魏劉輔等啓論賜諡下涿郡教此郡濱近外虜數有寇害云何不為劇邪魏志王觀傳遺令藏足容棺不設明器不封不樹魏志王觀傳謝棨表復假臣棨光榮照赫非臣怯弱所當可受御覽六百八十一考課疏唐虞雖有黜陟之文而考課之法不垂周制冢宰之職大計群吏之治而誅賞又無校比之制由此言之聖主明于任賢略舉黜陟之體以委達官之長而總其統紀故能否可得而知也魏志王昶傳考課事卿考課一曰掌建邦國以考制治二曰丸卿時敘以考事典三曰經綸國體以考奏議四曰共屬衆職以考總攝五曰明慎用刑以考留獄書鈔五十三尚書侍中考課一曰掌建六材以考官人二曰綜理萬機以考庶績三曰進視惟允以考讜言四曰出納王命以考典政五曰罰法以考興行御覽二百十二陳治略五事其一欲崇道篤學抑絶浮華使國子入太學而修庠序其二欲用考試考試猶準繩也未有舍準繩而意正曲直廢黜陟而空論能否也其三欲令居官者久于其職有治績則就增位賜爵其四欲約官實祿勵以廉恥不使與百姓爭利其五欲絶侈靡務崇節儉今衣服有章上下有敘儲穀畜帛反民于朴魏志王昶傳奏吳蜀事狀孫權流放良臣適庶分爭可乘釁而制吳蜀白帝夷陵之間黔巫秭歸房陵皆在江北民夷與新城郡接可襲取也魏志王昶傳白晉文王箋昔與南陽宗世林共為東宮官屬世林少得好名州里瞻敬及其年老汲汲自勵恐見廢棄時人咸共笑之若天假其壽致仕之年不為此公婆娑之事晉書王述傳述上書乞骸骨曰昔臣曾祖父魏司空白箋于文皇帝云云檄吳將校部曲釋無前之矢實映日之甲書鈔羽騎迅逝步卒星陳鳴震山之鼓張蔽天之旌書鈔一百二十一家誡夫人為子之道莫大于寶身全行以顯父母此三者人知其善而或危身破家陷于滅亡之禍者何也由所祖習非其道也夫孝敬仁義百行之首行之而立身之本也孝敬則宗族安之仁義則鄉黨重之此行成于內名著于外者矣人若不篤于至行而背本逐末以陷浮華焉以成朋黨焉浮華則有虛偽之纍朋黨則有彼此之患此二者之戒昭然著明而循覆車滋衆逐末彌甚皆由惑當時之譽昧目前之利故也夫富貴聲名人情所樂而君子或得而不處何也惡不由其道耳患人知進而不知退知欲而不知足故有困辱之纍悔吝之咎語曰如不知足則失所欲故知足之足常足矣覽往事之成敗察將來之吉凶未有干名要利欲而不厭而能保世持家永全福祿者也欲使汝曹立身行已遵儒者之教履道家之言故以玄默沖虛為名欲使汝曹顧名思義不敢違越也古者盤杆有銘几杖有誡俯仰察焉用無過行況在己名可不戒之哉夫物速成則疾亡晚就則善終朝華之草夕而零落松柏之茂隆寒不衰是以大雅君子惡速成戒闕黨也若范丐對秦客至武子擊之折其委笄惡其掩人也夫人有善鮮不自伐有能者寡不自矜伐則掩人矜則陵人掩人者人亦掩之陵人者人亦陵之故三卻為戮于晉王叔負罪于周不惟矜善自伐好爭之咎乎故君子不自稱非以讓人惡其蓋人也夫能屈以為伸讓以為得弱以為強鮮不遂矣夫毀譽愛惡之原而禍福之機也是以聖人慎之孔子曰吾之于人誰毀誰譽如有所譽必有所試又曰子貢方人賜也賢乎哉我則不暇以聖人之德猶尚如此況庸庸之徒而輕毀譽哉昔伏波將軍馬援戒其兄子言聞人之惡當如聞父母之名耳可得而聞口不可得而言也斯戒至矣人或毀已當退而求之于身若己有可毀之行則彼言當矣若己無可毀之行則彼言妄矣當則無怨于彼妄則無害于身又何反報焉且聞人毀己而忿者惡醜聲之加人也人報者滋甚不如默而自修已也諺曰救寒莫如重裘止謗莫如自修斯言信矣若與是非之士凶險之人近猶不可況與對校乎其害深矣夫虛偽之人言不根道行不顧言其為浮淺較可識別而世人惑焉猶不檢之以言行也近濟陰魏諷山陽曹偉皆以傾邪敗沒熒惑當世挾持姦慝驅動後生雖刑于鈇鉞大為炯戒然所汙染固以衆矣可不慎與若夫山林之士夷叔之倫甘長飢于首陽安赴火于綿山雖可以激貪勵俗然聖人不可為吾亦不願也今汝先人世有冠冕惟仁義為名守慎為稱孝悌于閨門務學于師友吾與時人從事雖出處不同然各有所取潁川郭伯益好尚通達敏而有知其為人弘曠不足輕貴有餘得其人重之如山不得其人忽之如草吾以所知親之昵之不願兒子為之北海徐偉長不治名高不求苟得淡然自守惟道是務其有所是非則託古人以見其意當時無所褎貶吾敬之重之願兒子師之東平劉公幹博學有高才誠節有大意然性行不均少所拘忌得失足以相補吾愛之重之不願兒子慕之樂安任昭先淳粹履道內敏外恕推遜恭讓處不避汙怯而義勇在朝忘身吾友之善之願兒子遵之若引而伸之觸類而長之汝其庶幾舉一隅耳及其用財先九族其施舍務周急其出入存故老其論議貴無貶其進仕尚忠節其取人務道實其處世戒驕淫其貧賤慎無戚其進退念合宜其行事加九思如此而已吾復何憂哉魏志王昶傳又略見御覽六百九十四夫立功者有二難功就而身不退一難也退而不靜務伐其功二難也且懷祿之士耽寵之臣苟患失之何所不至若樂毅帥弱燕之衆東破強齊收七十餘城其功盛矣知難而退保身全名張良杖劍建策光濟大漢辭三萬戶封學養性之道棄人聞之事卒無咎悔何二賢綽綽有餘裕哉治家亦有患焉積而不能散則有鄙吝之纍積而好奢則有驕上之罪大者破家小者辱身此二患也藝文類聚三十三奕字伯益魏志郭嘉傳注三戲論禮記有投壼之宴論語稱博奕之賢茲三戲者君子末事不足為也樗蒲彈碁既不益人又國有禁皆不得為也吾見坐圍碁而死近事非遠昔晉侯以投壼喪宋公好博奕亡豈不哀哉諸戲中唯有射者男子之事在于六藝若欲戲惟得射而已其餘不得為也御覽七百四十六引王昶集與從叔征南將軍昶書亡母少修婦道事慈姑二十餘年不幸久寢篤疾會東郡君初到官而李夫人亡是時亡母所苦困劇不任臨喪東郡君自痛遠不得嘗藥而婦宜親侍疾而不得臨終手書責遣載病大歸遂至殞亡東郡君後深悼恨之慈妣存無過行沒荷出名春秋之義原心定罪乞迎亡母神柩改葬墓田上當先姑慈愛之恩次釋先君既往之恨下蠲亡靈無負之恥通典一百二奏議臨災侯求祭先王禮公子不得稱先君公子之子不得祖諸侯謂不得廟而祭之也禮又曰庶子不得祭宗廟御覽五百二十六遺令戒子凱吾為將知將不可為也吾數發冢取其木以為攻戰具又知厚葬無益于死者也汝必斂以時服且人生有處所死復何在耶今去本墓遠東西南北在汝而已魏志明帝紀注引魏略
