body:
  text: 魏卷五十五闕名詔唯有一息足堪負荷思所散其憂懷終傷道車四望御覽七百七十三引晉陽秋曰魏書云詔曰云云魏令官長卒者官吏皆齊衰葬訖而除之通典九十九喪葬令王及郡公侯之國者薨其國相官屬長史及內史下令長丞尉皆服斬縗居倚廬妃夫人服齊縗朝晡詣喪庭臨以喪服視事葬訖除服其非國下令長丞尉及不之國者相內史及令長丞尉其相內史吏皆素服三日哭臨其雖非近官而親在喪庭執事者亦宜制服其相內史及以列侯為吏令長者無服皆發哀三日通典八十八上言孔子祀典漢舊立孔子廟褒成侯歲時奉祠辟雍行禮必祭先師王家出穀春秋祭祀今宗聖侯奉嗣未有命祭之禮宜給牲牢長史奉祀尊為貴神魏志崔林傳景初中魯相上言上言大人見襄武有大人見身長三丈餘迹長三尺二寸白髮著黃單衣黃巾柱丈呼民王始語云今當太平魏志陳留王紀咸熙二年八月襄武縣言又見水經渭水注引魏志襄武上言奏改廟樂舞改漢氏宗廟安世樂曰正世樂嘉至樂曰迎靈樂武德樂曰武頌樂昭容樂曰昭業樂雲翻舞曰鳳翔舞育命舞曰靈應舞武德舞曰武頌舞文昭舞曰大昭舞五行舞曰大武舞魏志文帝紀黃初四年注引魏書有司奏奏立親廟二太皇帝大長秋與文帝之高祖共一廟特立武帝廟百世不毀魏志明帝紀注引黃初四年有司奏案黃初中不合預稱文帝當是裴松之追改奏改埋銘旌祖宗之號所以表德題旌古今異儀今列祖之號宜改施新銘旌故旌故杠所埋如怡等議與重俱埋于廟內外之左通典八十四引魏尚書奏奏改元太和易曰乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧宜為太和元年宋書禮志一引尚書奏奏置大鈞樂臣聞德盛而化隆者則樂舞足以象其形容音聲足以發其歌詠故薦之郊廟而鬼神享其和用之朝廷則君臣樂其度使四海之內遍知至德之盛而光輝日新者禮樂之謂也故先王殷薦上帝以配祖考蓋當其時而制之矣周之末世上去唐虞幾二千年韶簫南籥武象之樂風聲遺烈皆可得而論也由斯言之禮樂之事弗可以已今請太祖武皇帝樂宜曰武始之樂武神武也武又迹也言神武之始又王迹所起也高祖文皇帝樂宜曰咸熙之舞咸皆也熙興也言應受命之運天下由之皆興也至于群臣述德論功建定烈祖之稱而未制樂舞非所以昭德紀功夫歌以詠德舞以象事于文文武為斌兼秉文武聖德所以章明也臣等謹制樂舞名章斌之舞昔簫韶九奏親于虞帝之庭武象大武亦振于文武之阼特以顯其德教箸其成功天下被服其光輝習詠其風聲者也自漢高祖文帝各逮其時而為武德四時之舞上考前代制作之宜以當今成業之美播揚弘烈莫盛于章斌焉樂志曰鐘磬于戚所以祭先王之廟又所以獻酬酳酢也在宗廟之中君臣莫不致敬族長之中長幼無不從和故仲尼答賓牟賈之問曰周道四達禮樂交通傳云魯有禘樂賓祭用之此皆祭禮大享通用盛樂之明文也今有事于天地宗廟則此三舞宜並以為薦享及臨朝大享亦宜舞之然後乃合古制事神訓民之道關于萬世其義益明又臣等思惟三舞宜有總名可名大鈞之樂鈞平也言大魏三世同功以至隆平也于名為美于義為當宋書樂志一太和初公卿奏又通典一百四十一奏樂舞冠服祀圓丘以下武始舞者平冕黑介幘玄衣裳白領袖絳領袖中衣絳合幅褲絳黑韋鞮咸熙舞者冠委貌其餘服如前章斌舞者與武始咸熙舞者同服奏于朝庭則武始舞者武冠赤介幘生絳袍單衣絳領袖阜領袖中衣虎文畫合幅褲白布黑韋鞮咸熙舞者進賢冠黑介幘生黃袍單衣白幅褲此三舞者皆執羽籥其餘服如前宋書樂志一太和初尚書又奏又通典一百四十一奏諡文昭皇后蓋孝敬之道篤乎其親乃四海所以承化天地所以明察是謂生則致其養歿則光其靈誦述以盡其美宣揚以顯其名者也今陛下以聖懿之德紹承洪業至孝蒸蒸通于神明遭離殷憂每勞謙讓先帝遷神山陵大禮既備至于先后未有顯諡伏惟先后恭讓著于幽微至行顯于不言化流邦國德侔二南故能膺神靈嘉祥為大魏世妃雖夙年登遐萬載之後永播融烈后妃之功莫得而尚也案諡法聖聞周達曰昭德明有功曰昭昭者光明之至盛久而不昧者也宣上尊諡曰文昭皇后魏志文昭甄皇后傳注引魏書三公奏奏立文昭皇后廟自古周人始祖后稷又特立廟以祀薑嫄今文昭皇后之于萬嗣聖德至化豈有量哉夫以皇家世妃之尊而克讓允恭固推盛位神靈遷化而無寢廟以承享祀非所以報顯德昭孝敬也稽之古制宜依周禮先妣別立寢廟魏志文昭甄皇后傳注引魏書三公奏又見晉書禮志上宋書禮志三奏議文昭皇后廟樂禮婦人繼夫之爵同牢配食者樂不異文昭皇后今雖別廟至于宮縣樂器音均宜如襲議宋書樂志一尚書奏又通典一百四十七奏外祖母喪制漢舊事亡闕無外祖制儀三代異禮可臨畢御還寢明日反吉便膳通典八十一太和六年四月明帝有外祖母敬后夫人之喪尚書奏奏事今作洛陽宮殿取白石之人鑽山索異石鑿石求雲母工役之事莫過于此白帖魏名臣奏奏定告瑞儀秦靜議當遣兼太尉告祠以武皇帝從五精以上六座餘衆神皆不設牲用如郊祭通典五十五尚書奏奏增定告瑞册文册文侍中韋誕所作文中皇皇后帝即五精之帝昔舜受禪告天云皇皇后帝亦合五精之帝于文少不可分別可更增五精字通典五十五尚書奏奏定七廟制大魏三聖相承以成帝業武皇帝肇建洪基撥亂夷險為魏太祖文皇帝繼天革命應期受禪為魏高祖上集成大命清定華夏興制禮樂宜為魏烈祖更于太祖廟北為二祧其左為文帝廟號曰高祖昭祧其右擬明帝號曰烈祖穆祧三祖之廟萬世不毀其餘四廟親盡迭遷一如周后稷文武廟祧之禮晉書禮志上景初元年六月群公有司奏又見宋書禮志三奏不毀文昭皇后廟蓋帝王之興既有受命之君又有聖妃協于神靈然後克昌厥世以成王業焉昔高辛氏卜其四妃之子皆有天下而帝摯陶唐商周代興周人上推后稷以配皇天追述王初本之薑嫄特立宮廟世世享嘗周禮所謂奏夷則歌中呂舞太濩以享先妣者也詩人頌之曰厥初生民時維薑嫄言王化之本生民所由又曰閟宮有侐實實枚枚赫赫薑嫄其德不回詩禮所稱姬宗之盛其美如此大魏期運繼于有虞然崇弘帝道三世彌隆廟祧之數實與周同今武宣皇后文德皇后各配無窮之祚至于文昭皇后膺天靈符誕育明聖功濟生民德盈宇宙開諸後嗣乃道化之所興也寢廟特祀亦薑嫄之閟宮也而未著不毀之制懼論功報德之義萬世或闕焉非所以昭孝示後世也文昭廟宜世世享祀奏樂與祖廟同永著不毀之典以播聖善之風魏志文昭甄皇后傳有司奏奏議燕王不稱臣禮莫崇于尊祖制莫大于正典陛下稽德期運撫臨萬國紹太宗之重隆三祖之基伏惟燕王體尊戚屬正位藩服躬秉虔肅率蹈恭德以先萬國其于正典闡濟大順所不得制聖朝誠宜崇以非常之制奉以不臣之禮臣等平議以為燕王章表可聽如舊式中詔所施或存好問準之義類則宴覿之族也可少順聖敬加崇儀稱示不敢斥宜曰皇帝敬問大王侍御至于制書國之正典朝廷所以辨章公制宣昭軌儀于天下者也宜循法故曰制詔燕王凡詔命制書奏事上書諸稱燕王者可皆上平其非宗廟助祭之事皆不得稱王名奏事上書文書及吏民皆不得觸王諱以彰殊禮加于群后上遵正典尊祖之制俯順聖敬蒸蒸之心二者不愆禮實宜之可普告施行魏志陳留王紀有司等議奏又見通典六十七奏事世祖朝有獻虎者問虎何食對曰食肉詔曰下民厭粳何忍以肉食虎乃命虎賁射之斯實得計于時而名垂于後御覽八百九十二引魏名臣奏夫樂所以播德通靈初學記十五引魏名臣奏請太后令書稱詔制殿下聖德光隆寧濟六合而猶稱令與藩國同請自今殿下令書皆稱詔制如先代故事魏志高貴鄉公紀群公請鍾繇諡議繇昔為廷尉辨理刑獄決嫌明疑民無怨者猶于張之在漢也魏志鍾繇傳注引魏書有司議諡以為以劉康襲爵素服奪情議按周禮天子公卿諸侯吉服皆玄冕朱裏玄衣纁裳有喪凶則變之麻冕黼裳邦君麻冕蟻裳云麻冕者則素冕麻不加采色又變其裳亦非純吉亦不純凶漢氏承秦改六冕之制以玄冠絳衣一服而已有喪凶之事則變吉服以從簡易故諸王薨遣使者拜嗣子為王則玄冠縗絰服素以承詔命事訖然後反喪服考之前典則差周書論之漢室則合常制通典七十二魏尚書奏議誅曹爽等春秋之義君親無將將而必誅爽以支屬世蒙殊寵親受先帝握手遺詔託以天下而包藏禍心蔑棄顧命乃與晏揚及當等謀圖神器範黨同罪人皆為大逆不道魏志曹爽傳會公卿朝臣廷議以為云云于是收爽羲訓何晏鄧揚丁謐畢軌李勝桓範張當等皆伏誅夷三族議發王淩令狐愚冢春秋之義齊崔杼鄭歸生皆加追戮陳尸斫棺載在方策淩愚罪宜如舊典魏志王淩傳朝議以為議斬李豐夏侯玄等議斬李豐夏侯玄等豐等各受殊寵典綜機密緝承外戚椒房之尊玄備世臣並居列位而包藏禍心構圖凶逆交關閹豎授以姦計畏憚天威不敢顯謀乃欲要君脅上肆其詐虐謀誅良輔擅相建立將以傾覆京室顛危社稷育所正皆如科律報育施行魏志夏侯玄傳公卿朝臣廷尉議文昌殿前鐘虡銘文昌殿前鐘虡銘惟魏四年歲在丙申龍次大火五月丙寅作蕤賓之鐘文選魏都賦劉淵林注案丙申當是丙辰乃明帝青龍四年也中論序豫以荀卿子孟軻懷亞聖之才著一家之法繼明聖人之業皆以姓名自書猶至于今厥字不傳原思其故皆由戰國之世樂賢者寡同時之人不早記録豈況徐子中論之書不以姓名為目乎恐歷久遠名或不傳故不量其才喟然感歎先目其德以發其姓名述其雅好不刊之行屬之篇首以為之序其辭曰世有雅達君子者姓徐名幹字偉長北海劇人也其先業以清亮臧否為家世濟其美不隕其德至君之身十世矣君含元休清明之氣持造化英哲之性放口而言則樂誦九德之文通耳而識則教不再告未志乎學蓋已誦文數十萬言矣年十四始讀五經發憤忘食下帷專思以夜繼日父恐其得疾常禁止之故能未至弱冠學五經悉載于口博覽傳記言則成章操翰成文矣此時靈帝之末年也國典隳廢冠族子弟結黨權門交援求售競相尚爵號君病俗迷昏遂閉戶自守不與之群以六籍娛心而已君子之達也學無常師有一業勝己者便從學焉必盡其所知而後釋之有一言之美不令過耳必心識之志在總衆言之長統道德之微恥一物之不知愧一藝之不克故日夜亹亹昃不暇食夕不解衣晝則研精經緯夜則歷觀列宿考混元于未形補聖德之空缺誕長慮于無窮旌微言之將墜何暇歡小學治浮名與俗士相彌縫哉故浮淺寡識之人適解驅使榮利豈知大道之根然其餘以疏略為太簡曾無憂樂徒以為習書之儒不足為上欣之者衆辨之者寡故令君州閭之稱不早彰徹然秉正獨立志有所存俗之毀譽有如浮雲若有覺而還反者則以道進之忘其前之謗己也其犯而不校下學而上達皆此之類也于時董卓作亂劫主西遷姦雄滿野天下無主聖人之道息邪偽之事興營利之士得譽守貞之賢不彰故令君譽聞不振于華夏玉帛安車不至于門考其德行文藝實帝王之佐也道之不行豈不惜哉君避地海表自歸舊都州郡牧守禮命踧踖連武欲致之君以為縱橫之世乃先聖之所厄困也豈況吾徒哉有譏孟軻不較其量擬聖行道傳食諸侯深美顏淵荀卿之行故絶迹山谷幽居研幾用思深妙以發疾痎潛伏延年會上公撥亂王路始闢遂力疾應命從戍征行歷載五六疾稍沈篤不堪王事潛身窮巷頤志保真淡泊無為惟存正道環者之牆以庇妻子并日而食不以為戚養浩然之氣習羡門之術時人或有聞其如此而往觀之或有頗識其真而從之者君無不容而見之厲以聲色度其情志倡其言論知可以道長者則微而誘之令益者不自覺而大化陰行其所匡濟亦已多矣君之交也則不以其短各取其長而善之取故少顯盡已之交亦無孜孜和愛之好統聖人中和之業蹈賢哲守度之行淵默難測誠寶偉之器也君之性常欲損世之有餘益俗之不足見辭人美麗之文並時而作曾無闡弘大義敷散道教上求聖人之中下救流俗之昏者故廢詩賦頌銘贊之文著中論之書二十二篇其所甄紀邁君昔志蓋千百之一也文義未究年四十八建安二十三年春二月遭厲疾大命隕頽豈不痛哉余數侍坐觀君之言常怖篤意自勉而心自薄也何則自顧才志不如之遠矣耳然宗之仰之以為師表自君之亡有子貢山梁之行故追述其事粗舉其顯露易知之數沈冥幽微深奧廣遠者遺之精通君子將自贊明之也中論元板本案此序徐幹同時人作舊無名氏意林中論六卷任氏注任嘏與幹同時多著述疑此序及注皆任嘏作不敢定之
