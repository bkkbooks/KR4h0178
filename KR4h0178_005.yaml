body:
  text: 文帝二制復于禁等官昔荀林父敗績于邲孟明喪師于殽秦晉不替使復其位其後晉獲狄土秦霸西戎區區小國猶尚若斯而況萬乘乎樊城之敗水災暴至非戰之咎其復禁等官魏志于禁傳注引魏書詔議追崇始祖前奏以朝車迎中常侍大長秋特進君侯神主然君侯不宜但依故爵乘朝車也禮有尊親之義為可依諸王比更議通典七十二文帝即王位尚書令桓階等奏云云下詔任城王彰增邑詔延康元年延康元年任城王彰增邑詔延康元年先王之道庸勳親親並建母弟開國承家故能藩屏大宗禦侮厭難彰前受命北伐清定朔土厥功茂焉增邑五千并前萬戶魏志任城威王傳封朱靈為鄃侯詔延康元年延康元年封朱靈為鄃侯詔延康元年將軍佐命先帝典兵歷年威過方邵功踰絳灌圖籍所美何以加焉朕受天命帝有海內元功之將社稷之臣皆朕所與同福同慶傳之無窮者也今封鄃侯富貴不歸故鄉如夜行衣繡若平常所志願勿難言魏志徐晃傳注引魏書報何夔乞遜位詔延康元年延康元年報何夔乞遜位詔延康元年蓋禮賢親舊帝王之常務也以親則君有輔弼之勳焉以賢則君有醇固之茂焉夫有陰德者必有陽報今君疾雖未瘳神明聽之矣君其即安以順朕意魏志何夔傳詔官李通子基緒延康元年延康元年詔官李通子基緒延康元年昔袁紹之難自許蔡以南人懷異心通秉義不顧使攜二率服朕甚嘉之不幸早薨子基雖已襲爵未足酬其庸勳基兄緒前屯樊城又有功世篤其勞其以基為奉義中郎將緒平虜中郎將以寵異焉魏志李通傳詔張既為涼州刺史昔賈復請擊郾賊光武笑曰執金吾擊郾吾復何憂卿謀略過人今則其時以便宜從事勿復先請魏志張既傳出蔣濟為東中郎將不聽請留詔出蔣濟為東中郎將不聽請留詔高祖歌曰安得猛士守四方天下未寧要須良臣以鎮邊境如其無事乃還鳴玉未為後也魏志蔣濟傳止臨災侯植求祭先王詔得月二十八日表知侯推情欲祭先王于河上覽省上下悲傷感切將欲遣禮以紓侯敬恭之意會博士鹿優等奏禮如此故寫以下開國承家顧迫禮制推侯存心與吾同之御覽五百二十六詔褎張既擊胡延康元年延康元年詔褎張既擊胡延康元年卿踰河歷險以勞擊逸以寡勝衆功過南仲勤踰吉甫此勳非但破胡乃永寧河右使吾長無西顧之念矣魏志張既傳制詔三公改元大赦延康元年十一月辛未延康元年十一月辛未制詔三公改元大赦延康元年十一月辛未上古之始有君也必崇恩化以美風俗然百姓順教而刑辟厝焉今朕承帝王之緒其以延康元年為黃初元年議改正朔易服色殊徽號同律度量承土行大赦天下自殊死以下諸不當得赦皆赦除之魏志文帝紀注引獻帝傳答桓階等奏改服色詔黃初元年黃初元年答桓階等奏改服色詔黃初元年服色如所奏其餘宜如虞承唐但臘日用丑耳此亦聖人之制也宋書禮志一定服色詔黃初元年黃初元年定服色詔黃初元年孔子稱行夏之時乘殷之輅服周之冕樂則韶舞此聖人集群代之美事為後王制法也傳曰夏數為得天朕承唐虞之美至于正朔當依虞夏故事若殊徽號異器械制禮樂易服色用牲幣自當隨土德之數每四時之季月服黃十八日臘以丑牲用白其飾節旄自當赤但節幡黃耳其餘郊祀天地朝會四時之服宜如漢制宗廟所服一如周禮宋書禮志一改雒為洛詔漢火行也火忌水故洛去水而加隹魏于行次為土土水之牡也水得土而流土得水而柔故除隹加水變雒為洛御覽十七引魏略册府元龜四詔征南將軍夏侯尚詔征南將軍夏侯尚卿腹心重將特當任使恩施足死惠愛可懷作威作福殺人活人魏志蔣濟傳又見御覽五百九十三春分拜日詔覲禮天子拜日東門之外反禮方明朝事議曰天子冕而執鎮圭率諸侯朝日于東郊以此言之蓋諸侯朝天子祀方明因率朝日也漢改周法群公無四朝之事故不復朝于東郊得禮之變矣然旦夕常于殿下東向拜日其禮太煩今采周春分之禮損漢日拜之儀又無諸侯之事無所出東郊今正殿即亦朝會行禮之庭也宜常以春分于正殿之庭拜日其夕月文不分明其議奏南齊書禮志上永元元年何佟之議引又略見晉書禮志上宋書禮志一通典四十四以張登為大官令詔登忠義彰著在職公勤名位雖卑直亮宜顯饔膳近任當得此吏今以登為太官令魏志王朗傳注書鈔五十五並引王朗集又見御覽二百二十九下詔賜華歆衣黃初元年黃初元年下詔賜華歆衣黃初元年司徒國之俊老所與和陰陽理庶事也今太官重膳而司徒蔬食甚無謂也特賜御衣及為其妻子男女皆作衣服魏志華歆傳賜桓階詔昔子文清儉朝不謀夕而有脯糧之秩宣子守約簞食魚飧而有加粱之賜豈況光光大魏富有四海棟宇大臣而有蔬食非吾所以禮賢之意也其賜射鹿師二人並給媒御覽二百六十二引桓階別傳又引本注齊人謂麴糱為媒答邯鄲淳上受命述詔淳作此甚典雅斯亦美矣朕何以堪也哉其賜帛四十匹御覽八百十八復潁川一年田租詔黃初二年正月壬午黃初二年正月壬午復潁川一年田租詔黃初二年正月壬午潁川先帝所由起兵征伐也官渡之役四方瓦解遠近顧望而此郡守義丁壯荷戈老弱負糧昔漢祖以秦中為國本光武恃河內為王基今朕復于此登壇受禪天以此郡翼成大魏魏志文帝紀注引魏書以孔羡為宗聖侯置吏修廟詔黃初二年正月壬午黃初二年正月壬午以孔羡為宗聖侯置吏修廟詔黃初二年正月壬午昔仲尼資大聖之才懷帝王之器當衰周之末無受命之運在魯衛之朝教化乎洙泗之上栖栖焉皇皇焉欲屈己以存道貶身以救世于時王公終莫能用之乃退考五代之禮修素王之事因魯史而制春秋就太師而正雅頌俾千載之後莫不宗其文以述作仰其聖以成謀咨可謂命世之大聖億載之師表者也遭天下大亂百祀墮壞舊居之廟毀而不修褎成之後絶而莫繼闕里不聞講頌之聲四時不覩蒸嘗之位斯豈所謂崇化報功盛德百世必祀者哉其以議郎孔羡為宗聖侯邑百戶奉孔子祀令魯郡修起舊廟置百戶吏卒以守衛之又于其外廣為屋宇以居學者魏志文帝紀又見宋書禮志四為漢帝置守冢詔朕承符運受終革命其敬事山陽公如舜之宗堯有始有卒傳之無窮前群司奏處正朔欲使一皆從魏制意所不安其令山陽公于其國中正朔服色祭祀禮樂自如漢典又為武昭宣明帝置守冢各三百家御覽五百六十一日食勿劾太尉詔黃初二年六月晦黃初二年六月晦日食勿劾太尉詔黃初二年六月晦災異之作以譴元首而歸過股肱豈禹湯罪己之義乎其令百官各虔厥職後有天地之眚勿復劾三公魏志文帝紀晉天文志二藝文類聚四十六引齊職儀贈諡鄧哀侯詔贈諡鄧哀侯詔惟黃初二年八月丙午皇帝曰咨爾鄧哀侯沖昔皇天鍾美于爾躬俾聰哲之才成于弱年當永享顯祚克成厥終如何不祿早世夭昏朕承天序享有四海並建親親以藩王室惟爾不逮斯榮且葬禮未備追悼之懷愴然攸傷今遷葬于高陵使使持節兼謁者僕射郎中陳承追賜號曰鄧公祠以大牢魂而有靈休茲寵榮嗚呼哀哉魏志鄧哀王沖傳注引魏書與于禁詔昔漢高祖脫衣以衣韓信光武解綬以帶李忠誠皆人主當時貴敬功勞效勤心之至也今賜將軍以魏王時自所佩朱韍及遠遊冠御覽六百八十五又六百九十一平準詔今與孫驃騎和通商旅當日月而至而百賈偷利喜賤其物平價又與其絹故官逆為平準耳官豈少此物輩耶御覽八百十七賜故太尉楊彪几杖詔黃初二年十月己亥黃初二年十月己亥賜故太尉楊彪几杖詔黃初二年十月己亥夫先王制几杖之賜所以賓禮黃耇褎崇元老也昔孔光卓茂皆以淑德高年受茲嘉賜公故漢宰臣乃祖已來世著名節年過七十行不踰矩可謂老成人矣所宜寵異以章舊德其賜公延年杖及馮几謁請之日便使杖入又可使著鹿皮冠魏志文帝紀注引魏書又後漢楊彪傳注北堂書鈔一百三十三並引續漢書又見袁宏後漢紀三十書鈔一百三十三改封曹植為安鄉侯詔黃初二年黃初二年改封曹植為安鄉侯詔黃初二年植朕之同母弟朕于天下無所不容而況植乎骨肉之親舍而不誅其改封植魏志陳思王植傳注引魏書取士勿限年詔黃初三年正月庚午黃初三年正月庚午取士勿限年詔黃初三年正月庚午今之計孝古之貢士也十室之邑必有忠信若限年然後取士是呂尚周晉不顯于前世也其令郡國所選勿拘老幼儒通經術吏達文法到皆試用有司糾故不以實者魏志文帝紀詔答吳王黃初三年黃初三年詔答吳王黃初三年老虜邊窟越險深入曠日持久內迫罷弊外困智力故見身于雞頭分兵擬西陵其計不過謂可轉是前迹以搖動江東根未著地摧折其支雖未刳備五藏使身首分離其所降誅亦足使虜部衆凶懼昔吳漢先燒荊門後發夷陵而子陽無所逃其死來歙始襲略陽文叔喜之而知隗囂無所施其巧今討此虜正似其事將軍勉建方略務全獨克吳志吳王傳二注引魏書載詔答撫勞西域奉獻詔黃初三年二月黃初三年二月撫勞西域奉獻詔黃初三年二月西戎即敘氐羌來王詩書美之頃者西域外夷並款塞內附其遣使者撫勞之魏志文帝紀毀高陵祭殿詔黃初三年黃初三年毀高陵祭殿詔黃初三年先帝躬履節儉遺詔省約子以述父為孝臣以繫事為忠古不墓祭皆設于廟高陵上殿屋皆毀壞車馬還廄衣服藏府以從先帝儉德之志晉書禮志中宋書禮志三又通典五十二禁婦人與政詔黃初三年九月黃初三年九月禁婦人與政詔黃初三年九月夫婦人與政亂之本也自今以後群臣不得奏事太后后族之家不得當輔政之任又不得橫受茅土之爵以此詔傳後世若有背違天下共誅之魏志文帝紀制傍枝入嗣大位不得加父母尊號詔制傍枝入嗣大位不得加父母尊號詔依漢祖之尊太上皇是也且禮不以父命辭王父命漢氏諸侯之入皆受天子之命胤于宗也而猶顧其私親僭擬天號豈所謂為人後之義哉後代若有諸侯入嗣者皆不得追加其私考為皇妣為后也敢有佞媚妖惑之人欲悅時主繆建非義之事以亂正統者此股肱大臣所當禽誅也其著乎甲令書之金策藏諸宗廟副乎三府尚書中書亦當各藏一通通典七十二答中山王獻黃龍頌詔黃初三年黃初三年答中山王獻黃龍頌詔黃初三年昔唐叔歸禾東平獻頌斯皆骨肉贊美以彰懿親王研精墳典耽味道真文雅煥炳朕甚嘉之王其克慎明德以終令問魏志中山恭王衮傳詔責孫權黃初三年黃初三年詔責孫權黃初三年權前對浩周自陳不敢自遠樂委質長為外臣又前後辭旨頭尾擊地此鼠子自知不能保爾許地也又今與周書請以十二月遣子復欲遣孫長緒張子布隨子俱來彼二人皆權股肱心腹也又欲為子于京師求婦此權無異心之明效也吳志大帝傳注引魏略伐吳詔黃初三年十月黃初三年十月伐吳詔黃初三年十月制詔昔軒轅不為涿鹿之師則蚩尤之妖不滅唐堯不興丹水之陳則南蠻之難不平漢武不行呂嘉之罰則橫浦之表不附光武不加囂述之誅則隴蜀之亂不清故曰非威不服非兵不定孫權小醜憑江悖暴因有外心凶頑有性故奮武鋭順天行誅驍騎龍驤猛將武步或修句踐潛涉之頑或圖韓信夏之誑愚接船以水攻陳六軍以陸橫擊征南進運以圍江陵多獲舟船斬首執俘降者盈路牛酒日至大司馬及征東諸將卷甲長驅其舟隊今已向濟今車駕自東為之瞻鎮雲行天步乘釁而運賊進退道迫首尾有難不為楚靈乾溪之潰將有彭寵蕭牆之變必自魚爛不復血刃宜慎終節動靜以聞文館詞林六百六十二禁復私讎詔喪亂以來兵革縱橫天下之人多相殘害者昔田橫殺酈商之兄張步害伏湛之子漢氏二祖下詔使不得相讎賈復寇恂私相怨憾至懷手劍之忿光武召而和之卒共同輿而載今兵戎始息宇內初定民之存者非流亡之孤則鋒刃之餘當相親愛養老長幼自今以後宿有讎怨者皆不得相讎敢有復私讎者皆族之魏志文帝紀藝文類聚三十三御覽四百八十二敕還師詔黃初四年三月黃初四年三月敕還師詔黃初四年三月孫權殘害民物朕以寇不可長故分命猛將三道並征今征東諸軍與權黨呂範等水戰則斬首四萬獲船萬艘大司馬據守濡須其所禽獲亦以萬數中軍征南攻圍江陵左將軍張郃等舳艫直渡擊其南渚賊赴水溺死者數千人又為地道攻城城中外雀鼠不得出入此几上肉耳而賊中癘氣疾病夾江塗地恐相染污昔周武伐殷旋師孟津漢祖征隗囂還軍高平皆知天時而度賊情也且成湯解三面之網天下歸仁今開江陵之圍以緩成死之禽且休力役罷省繇戍畜養士民咸使安息魏志文帝紀注引魏書以蔣濟為東中郎將代領曹仁兵詔黃初四年三月黃初四年三月以蔣濟為東中郎將代領曹仁兵詔黃初四年三月卿兼資文武志節慷愾常有超越江湖吞吳會之志故復授將率之任魏志蔣濟傳鵜鶘集靈芝池詔黃初四年五月黃初四年五月鵜鶘集靈芝池詔黃初四年五月此詩人所謂汙澤者也曹詩刺恭公遠君子而近小人今豈有賢智之士處于下位者乎否則斯鳥何為而至哉其博舉天下俊德茂才獨行君子以答曹人之刺魏志文帝紀又晉書五行志中宋書五行志二詔賜張既子翁歸爵黃初四年黃初四年詔賜張既子翁歸爵黃初四年昔荀桓子立勳翟土晉侯賞以千室之邑馮異輸力漢朝光武封其二子故涼州刺史張既能容民畜衆使群羌歸土可謂國之良臣不幸薨隕朕甚愍之其賜小子翁歸爵關內侯魏志張既傳止王朗讓位詔黃初四年黃初四年止王朗讓位詔黃初四年朕求賢于君而未得君乃翻然稱疾非徒不得賢更開失賢之路增玉鉉之傾無乃居其室出其言不善見違于君子乎君其勿有後辭魏志王朗傳詔賜溫恢子生爵恢有柱石之質服事先帝功勤明著及為朕執事忠于王室故授之以萬里之任任之以一方之事如何不遂吾甚愍之賜恢子生爵關內侯魏志溫恢傳
