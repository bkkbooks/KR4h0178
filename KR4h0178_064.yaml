body:
  text: 廢帝議封故齊王奮詔齊王奮前坐殺吏廢為庶人連有赦令獨不見原縱未宜復王何以不侯又諸孫兄弟作將列在江渚孤有兄獨爾云何吳志孫奮傳注引江表傳與衆僧書悼支謙支恭明不救所疾其業履沖素始終可高為之惻愴不能已已釋藏百字三號出三藏記集十三封孫綝等詔朕以不德守藩于外值茲際會群公卿士暨于朕躬以奉宗廟朕用憮然若涉淵水大將軍忠計內發扶危定傾安康社稷功勳赫然昔漢孝宣踐阼霍光尊顯褒德賞功古今之通義也其以大將軍為丞相荊州牧食五縣恩為御史大夫衛將軍據右將軍皆縣侯幹雜號將軍亭侯闓亦封亭侯吳志孫綝傳褒德賞功詔褒德賞功詔夫褒德賞功古今通義其以大將軍綝為丞相荊州牧增食五縣武衛將軍恩為御史大夫衛將軍中軍督封縣侯威遠將軍授為右將軍縣侯偏將軍幹雜號將軍亭侯長水校尉張布輔導勤勞以布為輔義將軍封永康侯董朝親迎封為鄉侯吳志嗣主休傳遣李衡還郡詔丹陽太守李衡以往事之嫌自拘有司夫射鉤斬袪在君為君遣衡還郡勿令自疑同上止奏立皇后太子詔朕以寡德奉承洪業蒞事日淺恩澤未敷加后妃之號嗣子之位非所及也吳志嗣主傳注引江表傳加大將軍綝爵位詔大將軍忠敬內發首建大計以安社稷卿士內外咸贊其議並有勳勞昔霍光定計百僚同心無復是過亟案前日與議定策告廟人名依故事應加爵位者促施行之吳志嗣主休傳大將軍掌中外諸軍事事統煩多其加衛將軍御史大夫恩侍中與大將軍分省諸事同上聽軍出家留子弟一人除米限詔聽軍出家留子弟一人除米限詔諸吏家有五人三人兼重為役父兄在都子弟給郡縣吏既出限米軍出又從至于家事無經護者朕甚愍之其有五人三人為役聽其父兄所欲留為留一人除其米限軍出不從同上加諸將位紹諸將吏奉迎陪位在永昌亭者皆加位一級同上置學官立五經博士詔古者建國教學為先所以道世治性為時養器也自建興以來時事多故吏民頗以目前趨務去本就末不循古道夫所尚不淳則傷化敗俗其案古置學官立五經博士核取應選加其寵祿科見吏之中及將吏子弟有志好者各令就業一歲課試差其品第加以位賞使見之者樂其榮聞之者羡其譽以敦王化以隆風俗吳志嗣主休傳又宋書禮志一通典五十三又御覽二百三十六改葬諸葛恪等詔諸葛恪滕胤呂據蓋以無罪為峻綝兄弟所見殘害可為痛心促皆改葬各為祭奠其罹恪等事見遠徙者一切召還吳志孫綝傳詔顧雍子裕襲爵故丞相雍至德忠賢輔國以禮而侯統廢絶朕甚愍之其以雍次子裕襲爵為醴陵侯以明著舊勳吳志顧雍傳務農桑詔朕以不德託于王公之上夙夜戰戰忘寢與食今欲偃武修文以崇大化推此之道當由士民之贍必須農桑管子有言倉廩實知禮節衣食足知榮辱夫一夫不耕有受其饑一婦不織有受其寒饑寒並至而民不為非者未之有也自頃年以來州郡吏民及諸營兵多違此業皆浮船長江賈作上下良田漸廢見穀日少欲求大定豈可得哉亦由租入過重農人利薄使之然乎今欲廣開田業輕其賦稅差科彊羸課其田畝務令優均官私得所使家給戶贍足相供養則受身重命不犯科法然後刑罰不用風俗可整以群僚之忠賢若盡心于時雖太古盛化未可卒致漢文升平庶幾可及及之則臣主俱榮不之則損削侵辱何可從容俯仰而已諸鄉尚書可共咨度務取便佳田桑已至不可後時事定施行稱朕意焉吳志嗣主休傳為四男作名字詔人之有名以相紀別長為作字憚其名耳禮名子欲令難犯易避五十稱伯仲古或一字今人競作好名好字又令相配所行不副此瞽字伯明者也孤嘗哂之或師友父兄所作或自已為師友尚可父兄猶非自為最不謙孤令為四男作名字太子名𩅦𩅦音如湖水灣澳之灣字莔莔音如迄今之迄次子名𩃙𩃙音如兕觥之觥字𧟨𧟨音如玄礥首之礥次子名枂枂音如草莽之莽字昷昷音如舉物之舉次子名𠅬𠅬音如褒衣下寬大之褒字㷏㷏音如有所擁持之擁此都不與世所用者同故鈔舊文會合作之夫書八體損益因事而生今造此名字既不相配又字但一庶易棄避其普告天下使咸聞知吳志嗣主休傳立子𩅦為太子注引吳録答張布孤之涉學群書略遍所見不少也其明君暗主奸臣賊子古今賢愚成敗之事無不覽也今曜等入但欲與論講書耳不為從曜等始更受學也縱復如此亦何所損君特當以曜等恐道臣下奸變之事以此不欲令入耳如此之事孤己自備之不須曜等然後乃解也此都無所損君意特有所忌故耳吳志嗣主休傳休欲與博士祭酒韋曜博士盛沖講論道藝曜沖素皆切直布恐入侍發其陰失令已不得專因妄飾說以拒遏之休答曰書籍之事患人不好好之無傷也此無所為非而君以為不宜是以孤有所及耳政務學業其流各異不相妨也不圖君今日在事更行此于孤也良所不取吳志嗣主休傳布又言懼妨政事休答曰聊相開悟耳何至叩頭乎如君之忠誠遠近所知往者所以相感今日之巍巍也詩云靡不有初鮮克有終終之實難君其終之吳志嗣主休傳立吳興郡詔古者分土建國所以褒賞賢能廣樹藩屏秦毀五等為三十六郡漢室初興闓立乃至百五因事制宜蓋無常數也今吳郡楊羡永安餘杭臨水及丹陽故鄣安吉原鄉於潛諸縣地勢水流之便悉注烏程既宜立郡以鎮山越且以藩衛明陵奉承大祭不亦可乎其亟分此九縣為吳興郡治烏程吳志歸命侯傳分丹陽為吳興郡注詔陸凱君所議誠是大趣然未合鄙意如何此宮殿不利宜當避之乃可以妨勞役常坐不利宮乎父之不安子亦何倚吳志陸凱傳注引江表傳下詔用孫丞自今已後用侍郎皆當如今宗室丞顧榮儔也吳志宗室孫植傳注引文土傳又見通典二十一以范慎為太尉詔以范慎為太尉詔慎勳德俱茂朕所敬憑宜登上公以副群望以為大尉吳志孫登傳注引吳録報司馬昭書知以高世之才處宰輔之任漸導之功勤亦至矣孤以不德階承統緒思與賢良共濟世道而以雍隔未有所緣嘉意允著深用依依今遣光祿大夫紀陟五官中郎將弘璆宣明至懷吳志歸命傳皓遣使隨紹彧報書曰注引江表傳曰皓書兩頭言曰稱名言而不著姓答華核得表以東觀儒林之府當講校文藝處定疑難漢時皆名學碩儒乃任其職乞更選英賢問之以卿研精墳典博覽多聞可謂悅禮樂敦詩書者也當飛翰騁藻光贊時事以越揚班張蔡之疇怪乃謙光厚自菲薄宜勉修所職以邁先賢勿復紛紛吳志華核傳與舅何植書昔大皇帝以神武之略奮三千之卒割據江南席卷交廣開拓洪基欲祚之萬世至孤未德嗣守成緒不能懷集黎元多為咎闕以違天度暗昧之變反謂之祥致使南蠻逆亂征討未克聞晉大衆遠來臨江庶竭勞瘁衆皆摧退而張悌不反喪軍過半孤甚愧悵于今無聊得陶濬表云武昌以西並復不守不守者非糧不足非城不固兵將背戰耳兵之背戰豈德兵邪孤之罪也天文縣變千上士民憤歎于下觀此事勢危如纍卵吳祚終訖何其局哉天匪亡吳孤所招也瞑目黃壤當復何顏見四帝乎公其最勉奇謨飛筆以聞吳志歸命侯傳注引江表傳遺群臣書遺群臣書孤以不德忝繼先軌處位歷年政教凶勃遂令百姓久困塗炭至一朝歸命有道社稷傾覆宗廟無主慚愧山積沒有餘罪自惟空薄過偷尊號才瑣質穢任重王公故周易有折鼎之誡詩人有彼其之譏自居宮室仍抱篤疾計有不足思慮失中多所荒替邊側小人因生酷虐虐毒橫流忠順被害暗昧不覺尋其壅蔽孤負諸君事已難圖覆水不可收也今大晉平治四海勞心務于擢賢誠是英俊展節之秋也管仲極讎桓公用之良平去楚入為漢臣舍亂就理非不忠也莫以移朝改朔用損厥志嘉勖休尚愛敬動靜夫復何言投筆而已吳志歸命侯傳注引江表傳
