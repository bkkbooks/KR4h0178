body:
  text: 太子登臨終上疏臣以無狀嬰抱篤疾自省微劣懼卒隕斃臣不自惜念當委離供養埋胔后土長不復奉望宮省朝覲日月生無益於國死貽陛下重戚以此為哽結耳臣聞死生有命長短自天周晉顏回有上智之才而尚夭折況臣愚陋年過其壽生為國嗣沒享樂祚於臣已多亦何悲恨哉方今大事未定逋寇未討萬國喁喁係命陛下危者望安亂者仰治願陛下棄忘臣身割下流之恩修黃老之術篤養神光加羞珍膳廣開神明之慮以定無窮之業則率土幸賴臣死無恨也皇子和仁孝聰哲德行清茂宜早建置以繫民望諸葛恪才略博達器任佐時張休顧談謝景皆通敏有識斷入宜委腹心出可為爪牙范慎華融矯矯壯節有國士之風羊道辨捷有專對之材刁玄優弘志履道真裴欽博記翰采足用蔣修虞翻志節分明凡此諸臣或宜廊廟或任將帥皆練時事明習法令守信固義有不可奪之志此皆陛下日月所照選置臣宮得與從事備知情素敢以陳聞臣重惟當今方外多虞師旅未休當厲六軍以圖進取軍以人為衆衆以財為寶竊聞郡縣頗有荒殘民物凋弊姦亂萌生是以法令繁滋刑辟重切臣聞為政聽民律令與時推移誠宜與將相大臣詳擇時宜博采衆議寬刑輕賦均息力役以順民望陸遜忠勤於時出身憂國謇謇在公有匪躬之節諸葛瑾步騭朱然全琮朱據呂岱吾粲闞澤嚴畯張承孫怡忠於為國通達治體可令陳上便宜蠲除苛煩愛養士馬撫循百姓五年之外十年之內遠者歸復近者盡力兵不血刃而大事可定也臣聞烏之將死其鳴也哀人之將死其言也善故子囊臨終遺言戒時君子以為忠豈況臣登其能已乎願陛下留意聽采臣雖死之日猶生之年也吳志孫登傳與步騭書夫賢人君子所以興隆大化佐理時務者也受性暗蔽不達道數雖實區區欲盡心於明德歸分於君子至於遠近士人先後之宜猶或緬焉未之能詳傳曰愛之能勿勞乎忠焉能勿誨乎斯其義也豈非所望於君子哉吳志步騭傳下令兵候今所誅者曹氏其百姓何罪自今以往不得繫其老弱吳志宗室孫皎傳嘗遣兵候獲魏邊將吏美女以進皎皎更其衣服送還之下令奉書琅邪王休綝以薄才見授大任不能輔導陛下頃月以來多所造立親近劉承悅於美色發吏民婦女料其好者留於宮內取兵子弟十八已下三千餘人習之苑中連日續夜大小呼嗟敗壞藏中矛戟五千餘枚以作戲具朱據先帝舊臣子男熊損皆承父之基以忠義自立昔殺小主自是大主所創帝不復精其本末便殺熊捐諫不見用諸下莫不側息帝於宮中作小船三百餘艘成以金銀師工晝夜不息太常全尚纍世受恩不能督諸宗親而全端等委城就魏尚位過重曾無一言以諫陛下而與敵往來使傳國消息懼必傾危社稷推案舊典運集大王輒以今月二十七日擒尚斬承以帝為會稽王遺楷奉迎百寮喁喁立住道側吳志孫綝傳詣闕上書臣伏自省才非幹國因緣胏腑位極人臣傷錦敗駕罪負彰露尋愆惟闕夙夜憂懼臣聞天命棐諶必就有德是以幽厲失度周宣中興陛下聖德纂承大統宜得良輔以協雍熙雖堯之盛猶求稷契之佐以協明聖之德古人有言陳力就列不能者止臣雖自展竭無益庶政謹上印綬節鉞退還田里以避賢路吳志孫綝傳休即位綝稱草莽臣詣闕上書宜為舊君諱論客有見大國之議士君子之論云起元建武已來舊君名諱五十六人以為後生不得協也取乎經論譬諸行事義高辭麗甚可嘉羡愚意褊淺竊有疑焉蓋乾坤剖分萬物定形肇有父子君臣之經故聖人順天之性制禮尚敬在三之義君實食之在喪之哀君親臨之厚莫重焉恩莫大焉誠臣子所尊仰萬夫所天恃焉得而同之哉然親親有衰尊尊有殺故禮服上不盡高祖下不盡玄孫又傳記四世而緦麻服之窮也五世袒免降殺同姓也六世而親屬竭矣又曲禮有不逮事之義則不諱不諱者蓋名之謂屬絶之義不拘於協況乃古君五十六哉邾子會盟季友來歸不稱其名咸書字者是時魯人嘉之也何解臣子為君父諱乎周穆王諱滿至定王時有王孫滿者其為大夫是臣協君也又厲王諱胡及莊王之子名胡其比衆多夫類事建議經有明據傳有徵案然後進攻退守萬無奔北垂示百世永無咎失今應劭雖上尊舊君之名而下無所斷齊猶歸之疑云曲禮之篇疑事無質觀省上下闕義自證文辭可為倡而不法將來何觀言聲一放猶拾瀋也過辭在前悔其何追吳志張昭傳注徐州刺史陶謙哀辭猗歟使君君侯將軍膺秉懿德允武允文體足剛直守以溫仁令舒及盧遺愛于民牧幽暨徐甘棠是均憬憬夷貊賴侯以清蠢蠢妖寇匪侯不寧唯帝念績爵命以章既牧且侯啓土溧陽遂升上將受號安東將平世難社稷是崇降年不永奄忽殂薨喪覆失恃民知困窮曾不旬日五郡潰崩哀我人斯將誰仰憑追思靡及仰叫皇穹嗚呼哀哉魏志陶謙傳注引吳書與呂岱書昔旦奭翼周二南作歌今則足下與陸子也忠勤相先勞謙相讓功以權成化與道合君子歎其德小人悅其美加以文書鞅掌賓客終日罷不舍事勞不言倦又知上馬輒自超乘不由跨躡如此足下過廉頗也何其事事快也周易有之禮言恭德言盛足下何有盡此美耶吳志呂岱傳連名上疏請為周胤復爵故將軍周瑜子胤昔蒙粉飾受封為將不能養以之福思立功效至縱情欲招速罪辟臣竊以瑜昔見寵任入作心膂出為爪牙銜命出征身當矢石盡節用命視死如歸故能摧曹操於烏林走曹仁於郢都揚國威德華夏是震蠢爾蠻荊莫不賓服雖周之方叔漢之信布誠無以尚也夫折衝扞難之臣自古帝王莫不貴重故漢高帝封爵之誓曰使黃河如帶太山如礪國以永存爰及苗裔申以丹書重以盟詛藏於宗廟傳於無窮欲使功臣之後世世相踵非徒子孫乃關苗裔報德明功勤勤懇懇如此之至欲以勸戒後人用命之臣死而無悔也況于瑜身沒未久而其子胤降為匹夫益可悼傷竊惟陛下欽明稽古隆於興繼為胤歸訴乞丐餘罪還兵復爵使失旦之雞復得一鳴抱罪之臣展其後效吳志周瑜傳子胤後以罪徙廬陵郡諸葛瑾步騭連名上疏與劉備箋與劉備箋奄聞旗鼓來至白帝或恐議臣以吳王侵取此州危害關羽怨深禍大不宜答和此用心於小未留意於大者也試為陛下論其輕重及其大小陛下若抑威損忿暫省瑾言者計可立決不復咨之於群后也陛下以關羽之親何如先帝荊州大小孰與海內俱應仇疾誰當先後若審此數易如反掌吳志諸葛瑾傳與陸遜書大駕已旋賊得韓扁具知吾闊狹且水乾宜當急去吳志陸遜傳敕下四部屬城山民去惡從化皆當撫慰徙出外縣不得嫌疑有所執拘吳志諸葛恪傳諫齊王孫奮箋帝王之尊與天同位是以家天下臣父兄四海之內皆為臣妾仇讎有善不得不舉親戚有惡不得不誅所以承天理物先國後身蓋聖人立制百代不易之道也昔漢初興多王子弟至於太彊輒為不軌上則幾危社稷下則骨肉相殘其後懲戒以為大諱自光武以來諸王有制惟得自娛於宮內不得臨民干與政事其與交通皆有重禁遂以全安各保福祚此則前世得失之驗也近袁紹劉表各有國土土地非狹人衆非弱以適庶不分遂滅其宗祀此乃天下愚智所共嗟痛大行皇帝覽古戒今防芽遏萌慮於千載是以寢疾之日分遣諸王各早就國詔策殷勤科禁嚴峻其所戒敕無所不至誠欲上安宗廟下全諸王使百世相承無凶國害家之悔也大王宜上惟太伯順父之志中念河閒獻王東海王彊恭敬之節下當裁抑驕恣荒亂以為警戒而聞頃至武昌以來多違詔敕不拘制度擅發諸將兵治護宮室又左右常從有罪過者當以表聞公付有司而擅私殺事不明白大司馬呂岱親受先帝詔敕輔導大王既不承用其言令懷憂怖華錡先帝近臣忠良正直其所陳道當納用之而聞怒錡有收縛之語又中書楊融親受詔敕所當恭肅云正自不聽禁當如我何聞此之日大小驚怪莫不寒心里語曰明鏡所以照形古事所以知今大王宜深以魯王為戒改易其行戰戰兢兢盡敬朝廷如此則無求不得若棄忘先帝法教懷輕慢之心臣下寧負大王不敢負先帝遺詔寧為大王所怨疾豈敢忘尊主之威而令詔敕不行於藩臣耶此古今正義大王所照知也夫福來有由禍來有漸漸生不憂將不可悔向使魯王早納忠直之言懷驚懼之慮享祚無窮豈有滅亡之禍哉夫良藥苦口惟疾者能甘之忠言逆耳惟達者能受之今者恪等慺慺欲為大王除危殆於萌芽廣福慶之基原是以不自知言至願蒙三思吳志孫奮傳與丞相陸遜書楊敬叔傳述清論以為方今人物雕盡守德業者不能復幾宜相左右更為輔車上熙國事下相珍惜又疾世俗好相謗毀使已成之器中有損纍將進之徒意不歡笑聞此喟然誠獨擊節愚以為君子不求備於一人自孔氏門徒大數三千其見異者七十二人至于子張子路子貢等七十之徒亞聖之德然猶各有所短師辟由唁賜不受命豈況下此而無所闕且仲尼不以數子之不備而引以為友不以人所短棄其所長也加以當今取士宜寬於往古何者時務從橫而善人單少國家職司常苦不充苟令性不邪惡志在陳力便可獎就騁其所任若於小小宜適私行不足皆宜闊略不足縷責且士誠不可纖論苛克苛克則彼賢聖猶將不全況其出入者耶故曰以道望人則難以人望人則易賢愚可知自漢末以來中國士大夫如許子將輩所以更相謗訕或至於禍原其本起非為大讎惟坐克已不能盡如禮而責人專以正義夫已不如禮則人不服責人以正義則人不堪內不服其行外不堪其責則不得不相怨相怨一生則小人得容其間得容其間則三至之言浸潤之譖紛錯交至雖使至明至親者處之猶難以自定況已為隙且未能明者乎是故張陳至於於血刃蕭朱不終其好本由於此而已夫不赦小過纖微相責久乃至於家戶為怨一國無復全行之士也吳志諸葛恪傳與弟公安督融書今月十六日乙未大行皇帝委棄萬國群下大小莫不傷悼至吾父子兄弟竝受殊恩非徒凡庸之隸是以悲慟肝心圮裂皇太子以丁酉踐尊號哀喜交并不知所措吾身受顧命輔相幼主竊自揆度才非博陸而受姬公負圖之託懼忝丞相輔漢之效恐損先帝委付之明是以憂慚惶惶所慮萬端且民惡其上動見瞻觀何時易哉今以頑鈍之姿處保傅之位艱多智寡任重謀淺誰為脣齒近漢之世燕蓋交遘有上官之變以身值此何敢怡豫邪又弟所在與賊犬牙相錯當於今時整頓軍具率厲將士警備過常念出萬死無顧一生以報朝廷無忝爾先又諸將備守各有境界猶恐賊虜聞諱恣睢寇竊邊邑諸曹已別下約敕所部督將不得妄委所戍徑來奔赴雖懷愴怛不忍之心公義奪私伯禽服戎若苟違戾非徒小故以親正疏古人明戒也吳志諸葛恪傳題論後為書答聶友足下雖有自然之理然未見大數熟省此論可以開悟矣吳志諸葛恪傳出軍論夫天無二日土無二王王者不務兼并天下而欲垂祚後世古今未之有也昔戰國之時諸侯自恃兵彊地廣互有救援謂此足以傳世人莫能危恣情從懷憚於勞苦使秦漸得自大遂以并之此既然矣近者劉景升在荊州有衆十萬財穀如山不及曹操尚微與之力競坐觀其彊大吞滅諸袁北方都定之後操率三十萬衆來向荊州當時雖有智者不能復為畫計於是景升兒子交臂請降遂為囚虜凡敵國欲相吞即仇讎欲相除也有讎而長之禍不在己則在後人不可不為遠慮也昔伍子胥曰越十年生聚十年教訓二十年之外吳其為沼乎夫差自恃彊大聞此邈然是以誅子胥而無備越之心至於臨敗悔之豈有及乎越小於吳尚為吳禍況其彊大者邪昔秦但得關西耳尚以并吞六國今賊皆得秦趙韓魏燕齊九州之地地悉戎馬之鄉士林之藪今以魏比古之秦土地數倍以吳與蜀比古六國不能半之然今所以能敵之但以操時兵衆於今適盡而後生者未悉長大正是賊衰少未盛之時加司馬懿先誅王淩續自隕斃其子幼弱而專彼大任雖有智計之士未得施用當今伐之是其厄會聖人急於趨時誠謂今日若順衆人之情懷偷安之計以為長江之險可以傳世不論魏之終始而以今日遂輕其後此吾所以長歎息者也自本以來務在産育今者賊民歲月繁滋但以尚小未可得用耳若復十數年後其衆必倍於今而國家徑兵之地已空盡唯有此見衆可以定事若不早用之端坐使老復十數年略當損半而見子弟數不足言若賊衆一倍而我兵損半雖復使伊管圖之未可如何今不達遠慮者必以此言為迂夫禍難未至而豫憂慮此固衆人之所迂也及於難至然後頓顙雖有智者又不能圖此乃古今所病非獨一時昔吳始以伍員為迂故難至而不可救劉景升不能慮十年之後故無以詒其子孫今恪無具臣之才而受大吳蕭霍之任智與衆同思不經遠若不及今日為國斥境俯仰年老而讎敵更彊欲刎頸謝責寧有補邪今聞衆人或以百姓尚貧欲務間息此不知慮其大危而愛其小勤者也昔漢祖幸己自有三秦之地何不閉關守險以自娛樂空出攻楚身被創痍介胄生蟣蝨將士厭困苦豈甘鋒刃而忘安寧哉慮於長久不得兩存者耳每覽荊邯說公孫述以進取之圖近見家叔父表陳與賊爭競之計未嘗不喟然歎息也夙夜反側所慮如此故聊疏愚言以達二三君子之末若一朝隕殞志畫不立貴令來世知我所憂可思於後吳志諸葛恪傳諸葛子若能力兼三人身與馬如膠漆手與箭如飛虻誠宜寵異御覽三百五十引諸葛子
