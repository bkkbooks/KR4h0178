body:
  text: 魏卷五十嵇康釋私論一首一首釋私論一首夫稱君子者心無措乎是非而行不違乎道者也何以言之夫氣靜神虛者心不存於矜尚體亮心達者情不繫於所欲矜尚不存乎心故能越名教而任自然情不繫於所欲故能審貴賤而通物情物情順通故大道無違越名任心故是非無措也是故言君子則以無措為主以通物為美言小人則以匿情為非以違道為闕何者匿情矜𠫤小人之至惡虛心無措君子之篤行也是以大道言及吾無身吾又何患無以生為貴者是賢於貴生也由斯而言夫至人之用心固不存有措矣是故伊尹不惜賢於殷湯故世濟而名顯周旦不顧嫌而隱行故假攝而化隆夷吾不匿情於齊桓故國霸而主尊其用心豈為身而繫乎私哉故管子曰君子行道忘其為身斯言是矣君子之行賢也不察於有度而後行也任心無邪不議於善而後正也顯情無措不論於是而後為也是故傲然忘賢而賢與度會忽然任心而心與善遇儻然無措而事與是俱也故論公私者雖云志道存善無凶邪無所懷而不匿者不可謂無私雖欲之伐善情之違道無所抱而不顯者不可謂不公今執必公之理以繩不公之情使夫雖為善者不離於有私雖欲之伐善不陷於不公重其名而貴其心則是非之情不得不顯矣是非必顯有善者無匿情之不是有非者不加不公之大非無不是則善莫不得無大非則莫過其非乃所以救其非也非徒盡善亦所以厲不善也夫善以盡善非以救非而況乎以是非之至者故善之與不善物之至者也若處二物之間所往者必以公成而私敗同用一器而有成有敗夫公私者成敗之途而吉凶之門乎故物至而不移者寡不至而在用者眾若質乎中人之體運乎在用之質而栖心古烈擬足公塗值心而言則言無不是觸情而行則事無不吉於是乎同之所措者乃非所措也欲之所私者乃非所私也言不計乎得失而遇善行不準乎是非而遇吉豈公成私敗之數乎夫如是也又何措之有哉故里鳧顯盜晉文愷悌勃鞮號罪忠立身存繆賢吐釁言納名稱漸離告誠一堂流涕然數子皆以投命之禍臨不測之機表露心識猶以安全況乎君子無彼人之罪而有其善乎措善之情其所病也唯病病是以不病病而能療亦賢於病矣然事亦有似非而非非類是而非是者不可不察也故變通之機或有矜以至讓貪以致廉愚以成智忍以濟仁然矜吝之時不可謂無廉猜忍之形不可謂無仁此似非而非非者也或讒言似信不可謂有誠激盜似忠不可謂無私此類是而非是也故乃論其用心定其所趣執其辭以準其理察其情以尋其變肆乎所始名其所終則夫行私之情不得因乎似非而容其非淑亮之心不得蹈乎似是而負其是故實是以暫非而後顯實非以暫是而後明公私交顯則行私者無所冀而淑亮者無所負矣行私者無所冀則思改其非立公者無所忌則行之無疑此大治之道也故主妾覆醴以罪受戮王陵庭爭而陳平順旨於是觀之非似非非者乎明君子之篤行顯公私之所在闔堂盈階莫不寓目而曰善人也然背顏退議而含私者不復同耳抱而匿情不改者誠神以喪於所惑而體以溺於常名心以制於所慴而情有繫於所欲咸自以為有是而莫賢乎己未有攻肌之慘駭心之禍遂莫能收情以自反棄名以任實乃心有是焉匿之以私志有善焉措之為惡不措所措而措所不措不求所以不措之理而求所以為措之道故明為措而闇於措是以不措為拙以致措為工唯懼隱之不微唯患匿之不密故有矜忤之容以觀常人矯飾之言以要俗譽謂永年良規莫盛於茲終日馳思莫闚其外故能成其私之體而喪其自然之質也於是隱匿之情必存乎心偽怠之機必形乎事若是則是非之議既明賞罰之實又篤不知冒廕之可以無景而患景之不匿不知無措之可以無患而患措之不以豈不哀哉是以申侯苟順取棄楚恭宰嚭耽私卒享其禍由是言之未有抱隱顧私而身立清世匿非藏情而信著明名者也君子既有其質又覩其鑒貴夫亮達布而存之惡夫矜吝棄而遠之所措一非而內愧乎神賤隱一闕而外慚其形言無苟諱而行無苟隱不以愛之而苟善不以惡之而苟非心無所矜而情無所繫體清神正而是非允當忠感明天子而信篤乎萬民寄胸懷於八荒垂坦蕩以永日斯非賢人君子高行之美冀異者乎或問曰第五倫有私乎哉曰昔吾兄子有疾吾一夕十往省而反寐自安吾子有疾終朝不往視而通夜不得眠若是可謂私乎非私也答曰是非也非私也夫私以不言為名公以盡言為稱善以無𠫤為體非以有措為負今第五倫顯情是無私也矜往不眠是有非也無私而有非者無措之志也夫言無措者不齊於必盡也言多吝者不具於不言而已故多吝有非無措有是然無措之所以有是以志無所尚心無所欲達乎大道之情動以自然則無道以至非也抱一而無措則無私無非兼有二義乃為絕美耳若非而能言者是賢於不言之私非無情以非之大者也今第五倫有非而能顯不可謂不公也所顯是非不可謂有措也有非而謂私不可謂不惑公私之理也管蔡論一首一首管蔡論一首或問曰案記管蔡流言叛戾東都周公征討誅以凶逆頑惡顯著流名千載且明父聖兄曾不鑒凶愚於幼稚覺無良之子弟而乃使理亂殷之弊民顯榮爵於藩國使惡積罪成終遇禍害於理不通心無所安願聞其說答曰善哉子之問也昔文武之用管蔡以實周公之誅管蔡以權權事顯實理沉故令時人全謂管蔡為頑凶方為吾子論之夫管蔡皆服教殉義忠誠自然是以文王列而顯之發旦二聖舉而任之非以情親而相私也乃所以崇德禮賢濟殷弊民綏輔武庚以興頑俗功業有績故曠世不廢名冠當時列為藩臣逮至武卒嗣誦幼沖周公踐政率朝諸侯思光前載以隆王業而管蔡服教不達聖權卒遇大變不能自通忠於乃心思在王室遂乃抗言率眾欲除國患翼存天子甘心毀旦斯乃愚誠憤發所以徼禍也成王大悟周公顯復一化齊俗義以斷恩雖內信如心外體不立稱兵叛亂所惑者廣是以隱忍授刑流涕行誅示以賞罰不避親戚榮爵所顯必鍾盛德戮撻所施必加有罪斯乃為教之正體古今之明義也管蔡雖懷忠抱誠要為罪誅罪誅已顯不得復理內必幽伏罪惡遂章幽章之路大殊故令奕世未蒙發起然論者承名信行便以管蔡為惡不知管蔡之惡乃所以令三聖為不明也若三聖未為不明則聖不祐惡而任頑凶頑凶不容於明世則管蔡無取私於父兄而見任必以忠良則二叔故為淑善矣今若本三聖之用明思顯授之實理推忠賢之闇權論為國之大紀則二叔之良乃顯三聖之用也有以流言之故有緣周公之誅是矣且周公居攝邵公不悅推此言之則管蔡懷疑未為不賢而忠賢可不達權三聖未為用惡而周公不得不誅若此三聖所用信良周公之誅得宜管蔡之心見理爾乃大義得通外內兼敘無相伐負者則時論亦得釋然而大解也明膽論一首一首明膽論一首有呂子者精義味道研覈是非以為人有膽可無明有明便有膽矣嵇先生以為明膽殊用不能相生論曰夫元氣陶鑠眾生稟焉賦受有多少故才性有昏明唯至人特鍾純美兼周外內無不畢備降此已往蓋闕如也或明於見物或勇於決斷人情貪廉各有所止譬諸草木區以別矣兼之者博於物偏受者守其分故吾謂明膽異氣不能相生明以見物膽以決斷專明無膽則雖見不斷專膽無明則違理失機故子家軟弱陷於弒君左師不斷見逼華臣皆智及之而決不行也此理坦然非無疑滯故略舉一隅想不重疑呂子曰敬覽來論可謂海亦不加者矣折理貴約而盡情何尚浮穢而迂誕哉今子之論乃引渾元以為喻何遼遼而坦謾也故直答以人事之切要焉漢之賈生陳切直之策奮危言之至行之無疑明所察也忌鵩作賦暗所惑也一人之膽豈有盈縮乎蓋見與不見故行之有果否也子家左師皆愚惑淺弊明不徹達故惑於曖昧終丁禍害豈明見照察而膽不斷乎故霍光懷沉勇之氣履上將之任戰乎王賀之事延年文生夙無武稱陳義奮辭膽氣淩雲斯其驗歟及於期授首陵母伏劍明果之疇若此萬端欲詳而載之不可勝言也況有覩夷塗而無敢投足階雲路而疑於迄泰清者乎若愚弊之倫為能自託幽昧之中棄身陷穽之間如盜跖竄身於虎吻穿窬先首於溝瀆而暴虎憑河愚敢之類則能有之是以余謂明無膽無膽能偏守易了之理不在多喻故不遠引繁言若未反三隅猶復有疑思承後誨得一騁辭夫論理性情折引異同固當尋所受之終始推氣分之所由順端極末乃不悖耳今子欲棄置渾元捃摭所見此為好理網目而惡持綱領也本論二氣不同明不生膽欲極論之當令一人播無刺諷之膽而有見事之明故當有不果之害非中人血氣無之而復資之以明二氣存一體則明能運膽賈誼是也賈誼明膽自足相經故能濟事誰言殊無膽獨任明以行事者乎子獨自作此言以合其論也忌鵩闇惑明所不周何害於膽乎明既以見物膽能行之耳明所不見膽當何斷進退相扶可謂盈縮就如此言賈生陳策明所見也忌鵩作賦闇所惑也爾為明徹於前而闇惑於後明有盈縮也苟明有進退膽亦何為不可偏乎子然霍光有沉勇而戰於廢王此勇有所撓也而子言一人膽豈有盈縮此則是也賈生闇鵩明有所塞也光懼廢立勇有所撓也夫唯至明能無所惑至膽能無所虧耳自非若此誰無弊損乎但當總有無之大略而致論之耳夫物以實見為主延年奮發勇義凌雲此則膽也而云夙無武稱此為信宿稱而疑成事也延年處議明所見也壯氣騰厲勇之決也此足以觀矣子又曰言明無膽無膽能偏守案子之言此則有專膽之人亦為膽特自一氣矣五才存體各有所生明以陽曜膽以陰凝豈可為有陽而生陰可無陽耶雖相須以合德要自異氣也凡餘雜說於期陵母暴虎云云萬言致一欲以何明耶幸更詳思不為辭費而已矣難自然好學論一首一首難自然好學論一首夫民之性好安而惡危好逸而惡勞故不擾則其願得不逼則其志從洪荒之世大朴未虧君無文於上民無競於下物全理順莫不自得飽則安寢饑則求食怡然鼓腹不知為至德之世也若此則安知仁義之端禮律之文及至人不存大道陵遲乃始作文墨以傳其意區別群物使有類族造立仁義以嬰其心制其名分以檢其外勸學講文以神其教故六經紛錯百家繁熾開榮利之塗故奔騖而不覺是以貪生之禽食園池之粱菽求安之士乃詭志以從俗操筆執觚足容蘇息積學明經以代稼穡是以困而後學學以致榮計而後習好而習成有似自然故令吾子謂之自然耳推其原也六經以抑引為主人性以從欲為歡抑引則違其願從欲則得自然然則自然之得不由抑引之六經全性之本不須犯情之禮律故仁義務於理偽非養真之要術廉讓生於爭奪非自然之所出也由是言之則鳥不毀以求馴獸不群而求畜則人之真性無為正當自然耽此禮學矣論又云嘉肴珍膳雖所未嘗嘗必美之適於口也處在闇室覩烝燭之光不教而悅得於心況以長夜之冥得照太陽情變鬱陶而發其蒙雖事以末來情以本應則無損於自然好學難曰夫口之於甘苦身之於痛癢感物而動應事而作不須學而後能不待借而後有此必然之理吾所不易也今子以必然之理喻未必然之好學則恐似是而非之議學如一粟之論於是乎在也今子立六經以為準仰仁義以為主以規矩為軒駕以講誨為哺乳由其塗則通乖其路則滯遊心極視不覩其外終年馳騁思不出位聚族獻議唯學為貴執書擿句俛仰咨嗟使服膺其言以為榮華故吾子謂六經為太陽不學為長夜耳今若以堂為丙舍以誦諷為鬼語以六經為蕪穢以仁義為臭腐覩文籍則目瞧脩揖讓則變傴襲章服則轉筋譚禮典則齒齲於是兼而棄之與萬物為更始則吾子雖好學不倦猶將闕焉則向之不學未必為長夜六經未必為太陽也俗語曰乞兒不辱馬醫若遇上古無文之治可不學而獲安不勤而得志則何求於六經何欲於仁義哉以此言之則今之學者豈不先計而後學苟計而後動則非自然之應也子之云云恐故得菖蒲葅耳難宅無吉凶攝生論一首一首難宅無吉凶攝生論一首夫神祗遐遠吉凶難明雖中人自竭莫得其端而易以惑道故夫子寢答於來問終慎神怪而不言是以古人顯仁於物藏用於身知其不可眾所共非故隱之彼非所明也吾無意於庶幾而足下師心陋見斷然不疑繫決如此足以獨斷思省來論旨多不通謹因來言以生此難方推金木未知所在莫有食治世無自理之道法無獨善之術苟非其人道不虛行禮樂政刑經常外事猶有所疏況乎幽微者耶縱欲辨明神微袪惑起滯立端以明所由斷以檢其要乃為有徵若但撮提群愚蠶種忿而棄之因謂無陰陽吉凶之理得無似噎而怨粒稼溺而責舟楫者耶論曰百年之宮不能令殤子壽孤逆魁岡不能令彭祖夭又曰許負之相條侯英布之黥而後王皆性命也應曰此為命有所定壽有所在禍不可以智逃福不可以力致英布畏痛卒罹刀鋸亞夫忌餒終有餓患萬事萬物凡所遭遇無非相命也然唐虞之世命何同延長平之卒命何同短此吾之所疑也即如所論雖慎若曾顏不得免禍惡若桀跖故當昌熾吉凶素定不可推移則古人何言積善之家必有餘慶履信思順自天祐之必積善而後福應信著而後祐來猶罪之招罰功之致賞也苟先積而後受報事理所得不為闇自遇之也若皆謂之是相此為決相命於行事定吉凶於知力恐非本論之意此又吾之所疑也又云多食不消必須黃丸苟命自當生多食何畏而服良藥若謂服藥是相之所一宅豈非是一耶若謂雖命猶當須藥以自濟何知相不須宅以自輔乎若謂藥可論而宅不可說恐天下或有說之者矣既曰壽夭不可求甚於貴賤而復曰善求壽強者必先知災疾之所自來然後可防也然則壽夭果可求耶不可求也既曰彭祖七百殤子之夭皆性命自然而復曰不知防疾致壽去夭求實於虛故性命不遂此為壽夭之來生於用身性命之遂得於善求然則夭短者何得不謂之愚壽延者何得不謂之智苟壽夭成於愚智則自然之命不可求之論奚所措之凡此數者亦雅論之矛楯矣論曰專氣致柔少私寡欲直行情性之所宜而合養生之正度求之於懷抱之內而得之矣又曰善養生者和為盡矣誠哉斯言匪謂不然但謂全生不盡此耳夫危邦不入所以避亂政之害重門擊柝所以備狂暴之災居必爽塏所以遠風毒之患凡事之在外能為害者此未足以盡其數也安在守一和而可以為盡乎夫專靜寡欲莫若單豹行年七十而有童孺之色可謂柔和之用矣而一旦為虎所食豈非恃內忽外耶若謂豹相正當給廚雖智不免則寡欲何益而云養生可得若單豹以未盡善而致災則輔生之道不止於一和苟和未足保生則外物之為患者吾未知其所齊矣論曰師占成居則有驗使造新則無徵請問占成居而有驗者為但占墻屋耶占居者之吉凶也若占居者而知盛衰此自占人非占成居也占成居而知吉凶此為宅自有善惡而居者從之故占者觀表而得內也苟宅能制人使從之則當吉之人受災於凶宅妖逆無道獲福於吉居爾為吉凶之致唯宅而已更令由人也新便無徵耶若吉凶故當由人則雖成居何得而云有驗耶若此果可占耶不可占耶果有宅耶其無宅也論曰宅猶卜筮可以知吉凶而不能為吉凶也應曰此相似而不同卜者吉凶無豫待物而應將來之兆也相宅不問居者之賢愚唯觀已然有傳者已成之形也猶覩龍顏而知當貴見縱理而知當餓然各有由不為闇中也今見其同於得吉凶因謂相宅與卜不異此猶見琴而謂之箜篌非但不知琴也縱如論宅與卜同但能知而不能為則吉凶已成雖知何益卜與不卜了無所在而古人將有為必曰問之龜筮吉以定所由差此豈徒也哉此復吾之所疑也武王營周則云考卜惟王宅是鎬京周公遷邑乃卜澗瀍終惟洛食又曰卜其宅兆而安厝之古人修之於昔如彼足下非之於今如此不知誰定可從論曰為三公宅而愚民必不為三公可知也或曰愚民必不得久居公侯宅然則果無宅也應曰不謂吉宅能獨成福但謂君子既有賢才又卜其居順履積德乃享元吉猶夫良農既懷善藝又擇沃土復加耘耔乃有盈倉之報耳今見愚民不能得福於吉居便謂宅無善惡何異覩種田之無十千而謂田無壤塉耶良田雖美而稼不獨茂卜宅雖吉而功不獨成相須之理誠然則宅之吉凶未可惑也今信徵祥則棄人理之所宜守卜相則絕陰陽之吉凶持知力則忘天道之所存此何異識時雨之生物因垂拱而望嘉穀乎是故疑怪之論生偏是之議興所託不一烏能相通若夫兼而善之者得無半非冢宅耶論曰時日譴祟古盛王無之季王之所好聽此言善矣顧其不盡然湯禱桑林周公秉圭不知是譴祟非也吉日惟戊既伯既禱不知是時日非也此皆足下家事先師所立而一朝背之必若湯周未為盛王幸更詳之又當校知二賢何如足下耶論曰賊方至以疾走為務食不消以黃丸為先子徒知此為賢於安須臾與求乞胡而不知制賊病於無形事功幽而無跌也夫救火以水雖自多於抱薪而不知曲突之先物矣況乎天下微事言所不能及數所不能分是以古人存而不論神而明之遂知來物故能獨觀於萬化之前收功於大順之後百姓謂之自然而不知所以然若此豈常理之所逮耶今形象著明有數者猶尚滯之天地廣遠品物多方智之所知未若所不知者眾也今執辟穀之術謂養生已備至理已盡馳心極觀齊此而還意所不及皆謂無之欲據所見以定古人之所難言得無似蟪蛄之議冰耶欲以所識而之所棄得無似戎人問布於中國覩麻種而不事耶吾怯於專斷進不敢定禍福於卜相退不敢謂家無吉凶也
