body:
  text: 陸瑁諫親征公孫淵疏臣聞聖王之御遠夷羈縻而已不常保有故古者制地謂之荒服言慌惚無常不可保也今淵東夷小醜屏在海隅雖託人面與禽獸無異國家所為不愛貨寶遠以加之者非嘉其德義也誠欲誘納愚弄以規其馬耳淵之驕黠恃遠負命此乃荒貊常態豈足深怪昔漢諸帝亦嘗鋭意以事外夷馳使散貨充滿西域雖時有恭從然其使人見害財貨并沒不可勝數今陛下不忍悁悁之忿欲越巨海身踐其土群臣愚議竊謂不安何者北寇與國壤地連接苟有間隙應機而至夫所以越海求馬曲意於淵者為赴目前之急除心腹之疾也而更棄本追末捐近治遠忿以改規激以動衆斯乃猾虜所願聞非大吳之至計也又兵家之術以功役相疲勞逸相待得失之間所覺輒多且沓渚去淵道里尚遠今到其岸兵勢三分使強者進取次當守船又次運糧行人雖多雖得悉用加以單步負糧經遠深入賊地多馬邀截無常若淵狙詐與北未絶動衆之日脣齒相濟若實孑然無所憑賴其畏怖遠迸或難卒滅使天誅稽於朔野山虜承間而起恐非萬安之長慮也吳志陸瑁傳夫兵革者固前代所以誅暴亂威四夷也然其役皆在姦雄已除天下無事從容廟堂之上以餘議議之耳至於中夏鼎沸九域槃牙之時率須深根固本愛力惜費務自休養以待鄰敵之闕未有正於此時舍近治遠以疲軍旅者也昔尉他叛逆憯號稱帝于時天下乂安百姓殷阜帶甲之數糧食之積可謂多矣然漢文猶以遠征不易重興師旅告喻而已今凶桀未殄疆埸猶警雖蚩尤鬼方之亂故當以緩急差之未宜以淵為先願陛下抑威住計暫寧六師潛神默規以為後圖天下幸甚同上與暨豔書夫聖人嘉善矜愚忘過記功以成美化加今王業始建將一大統此乃漢高棄瑕録用之時也若令善惡異流貴汝潁月旦之評誠可以厲俗明教然恐未易行也宜遠模仲尼之泛愛中則郭泰之弘濟近有益於大道也吳志陸瑁傳上表言宜優恤功臣後呂蒙淩統早亡先帝痛悼不已子並幼稚皆內省中稱肉食之書鈔一百四十五御覽八百六十三上表諫吳主皓臣聞惡不可積過不可長積惡長過喪亂之源也是以古人懼不聞非故設進善之旍立敢諫之鼓武公九十思聞警戒詩美其德士説其行臣察陛下無思警戒之義而有積惡之漸臣深憂之此禍兆見矣故略陳其要寫盡愚懷陛下宜克己復禮述履前德不可捐棄臣言而放奢意意奢情至吏日斯民民離則上不信下下當疑上骨肉相克公子相奔臣雖愚暗於天命以心審之敗不過二十稔也臣常忿亡國之人夏桀殷紂亦不可使後人復忿陛下也臣受國恩奉朝三世復以餘年值遇陛下不能循俗與衆沈浮若比于伍員以忠見戮以正見疑自謂畢足無所餘恨灰身泉壤無負先帝願陛下九思社稷存焉吳志陸凱傳注引江表傳重表諫起宮臣聞宮功當起夙夜反側是以頻煩上事往往留中不見省報於邑歎息企想應罷昨食時被詔曰君所諫誠是大趣然未合鄙意如何此宮殿不利宜當避之乃可以妨勞役長坐不利宮乎父之不安子亦何倚臣拜紙詔伏讀一周不覺氣結於胸而涕泣雨集也臣年已六十九榮祿已重於臣過望復何所冀所以勤勤數進苦言者臣伏念大皇帝創基立業勞苦勤至白髮生於鬢膚黃耇被於甲胄天下始靜晏駕早崩自含息之類能言之倫無不歔欷如喪考妣幼主嗣統柄在臣下軍有連征之費民有雕殘之損賊臣干政公家空竭今強敵當塗西州傾覆孤罷之民宜當畜養廣力肆業以備有虞且始徙都屬有軍征戰士流離州郡搔擾而大功復起徵召四方斯非保國致治之漸也臣聞為人主者攘災以德除咎以義故湯遭大旱身禱桑林熒惑守心宋景退殿是以旱魃銷亡妖星移舍今宮室之不利但當克己復禮篤湯宋之至道愍黎庶之困苦何憂宮之不安災之不銷乎陛下不務修德而務築宮室若德之不修行之不貴雖殷辛之瑤臺秦皇之阿房何止而不喪身覆國宗廟作墟乎夫興土功高臺榭既致水旱民又多疾其不疑也為父長安使子無倚此乃子離於父臣離於陛下之象也臣子一離雖念克骨茅茨不翦復何益焉是以大皇帝居於南宮自謂過於阿房故先朝大臣以為宮室宜厚備衛非常大皇帝曰逆虜遊魂當愛育百姓何聊趣於不急然臣下懇側由不獲己故裁調近郡苟副衆心比當就功猶豫三年當此之時寇鈔懾威不犯我境師徒奔北且西阻岷漢南州無事尚猶沖讓未肯築宮況陛下危側之世又乏大皇帝之德可不慮哉願陛下留意臣不虛言吳志陸凱傳注引江表傳疏悼王蕃常侍王蕃黃中通理知天知物處朝忠蹇斯社稷之重鎮大吳之龍逢也昔事景皇納言左右景皇欽嘉歎為異倫而陛下忿其苦辭惡其直對梟之殿堂尸骸暴棄邦內傷心有識悲悼吳志王蕃傳按陸凱傳亦有此疏彼略刪節上疏諫吳主皓臣聞有道之君以樂樂民無道之君以樂樂身樂民者其樂彌長樂身者不久而亡夫民者國之根也誠宜重其食愛其命民安則君安民樂則君樂自頃年以來君威傷於桀紂君明暗於姦雄君惠閉於群孽無災而民命盡無為而國財空辜無罪賞無功使君有謬誤之愆天為作妖而諸公卿媚上以求愛困民以求饒導君於不義敗政於淫俗臣竊為痛心今鄰國交好四邊無事當務息役養士實其廩庫以待天時而更傾動天心搔擾萬姓使民不安大小呼嗟此非保國養民之術也臣聞吉凶在天猶影之在形響之在聲也形動則影動形止則影止此分數乃有所繫非在口之所進退也昔秦所以亡天下者但坐賞輕而罰重政刑錯亂民力盡於奢侈目眩於美色志濁於財寶邪臣在位賢哲隱藏百姓棄業天下苦之是以遂有覆巢破卵之憂漢所以強者躬行誠信聽諫納賢惠及負薪躬請巖穴廣采博察以成其謀此往事之明證也近者漢之衰末三家鼎立曹失綱紀晉有其政又益州危險兵多精強閉門固守可保萬世而劉氏與奪乖錯賞罰失所君恣意於奢侈民力竭於不急是以為晉所伐君臣見虜此目前之明驗也臣暗於大理文不及義智慧淺劣無復冀望竊為陛下惜天下耳臣謹奏耳目所聞見百姓所為煩苛刑政所為錯亂願陛下息大功損百役務寬蕩忽苛政又武昌土地實危險而塉確非王都安國養民之處船泊則沈漂陵居則峻危且童謠言寧飲建業水不食武昌魚寧還建業死不止武昌居臣聞翼星為變熒惑作妖童謠之言生於天心乃以安居而比死足明天意知民所苦也臣聞國無三年之儲謂之非國而今無一年之畜此臣下之責也而諸公卿位處人上祿延子孫曾無致命之節匡救之術苟進小利於君以求容媚荼毒百姓不為君計也自從孫弘造義兵以來耕種既廢所在無復輸入而分一家父子異役廩食日張畜積日耗民有離散之怨國有露根之漸而莫之恤也民力困窮鬻賣兒子調賦相仍日以疲極所在長吏不加隱括加有監官既不愛民務行威勢所在搔擾更為煩苛民苦萬端財力再耗此為無益而有損也願陛下一息此輩矜哀孤弱以鎮撫百姓之心此猶魚鱉得免毒螫之淵鳥獸得離羅網之綱四方之民繈負而至矣如此民可得保先王之國存焉臣聞五音令人耳不聰五色令人目不明此無益於政有損於事者也自昔先帝時後宮列女及諸織絡數不滿百米有畜積貨財有餘先帝崩後幼景在位更改奢侈不蹈先迹伏聞織絡及諸徒坐乃有千數計其所長不足為國財然坐食官廩歲歲相承此為無益願陛下料出賦嫁給與無妻者如此上應天心下合地意天下幸甚臣聞殷湯取士於商賈齊桓取士於車轅周武取士於負薪大漢取士於奴僕明王聖主取士以賢不拘卑賤故其功德洋溢名流竹素非求顏色而取好服捷口容悅者也臣伏見當今內寵之臣位非其人任非其量不能輔國匡時群黨相扶害忠隱賢願陛下簡文武之臣各勤其官州牧督將藩鎮方外公卿尚書務修仁化上助陛下下拯黎民各盡其忠拾遺萬一則康哉之歌作刑錯之理清願陛下留神思臣愚言吳志陸凱傳上疏諫吳主皓不遵先帝二十事皓遣親近趙欽口詔報凱前表曰孤動必遵先帝有何不平君所諫非也又建業宮不利故避之而西宮室宇摧朽須謀移都何以不可徙乎凱上疏曰臣竊見陛下執政以來陰陽不調五星失晷職司不忠姦黨相扶是陛下不遵先帝之所致夫王者之興受之於天修之由德豈在宮乎而陛下不咨之公輔便盛意驅馳六軍流離悲懼逆犯天地天地以災童歌其謠縱令陛下一身得安百姓愁勞何以用治此不遵先帝一也臣聞有國以賢為本夏殺龍逢殷獲伊摯斯前世之明效今日之師表也中常侍王蕃黃中通理處朝忠謇斯社稷之重鎮大吳之龍逢也而陛下忿其苦辭惡其直對梟之殿堂尸骸暴棄邦內傷心有識悲悼咸以吳國夫差復存先帝親賢陛下反之是陛下不遵先帝二也臣聞宰相國之柱也不可不強是故漢有蕭曹之佐先帝有顧步之相而萬彧瑣才凡庸之質昔從家隸超步紫闥於彧已豐於器已溢而陛下愛其細介不訪大趣榮以尊輔越尚舊臣賢良憤惋智士赫吒是不遵先帝三也先帝憂民過於嬰孩民無妻者以妾妻之見單衣者以帛給之枯骨不收而取埋之而陛下反之是不遵先帝四也昔桀紂滅由妖婦幽厲亂在嬖妾先帝鑒之以為身戒故左右不置淫邪之色後房無曠積之女今中宮萬數不備嬪嬙外多鰥夫女吟於中風雨逆度正由此起是不遵先帝五也先帝憂勞萬機猶懼有失陛下臨阼以來遊戲後宮眩惑婦女乃令庶事多曠下吏容姦是不遵先帝六也先帝篤尚朴素服不純麗宮無高臺物不雕飾故國富民充姦盜不作而陛下徵調州郡竭民財力土被玄黃宮有朱紫是不遵先帝七也先帝外杖顧陸朱張內近胡綜嶭綜是以庶績雍熙邦內清肅今者外非其任內非其人陳聲曹輔斗筲小吏先帝之所棄而陛下幸之是不遵先帝八也先帝每宴見群臣抑損醇醲臣下終日無失慢之尤百寮庶尹並展所陳而陛下拘以視瞻之敬懼以不盡之酒夫酒以成禮過則敗德此無異商辛長夜之飲也是不遵先帝九也昔漢之桓靈親近宦豎大失民心今高通詹廉羊度黃門小人而陛下賞以重爵權以戰兵若江渚有難烽燧互起則度等之武不能禦侮明也是不遵先帝十也今宮女曠積而黃門復走州郡條牒民女有錢則舍無錢則取怨呼道路母子死訣是不遵先帝十一也先帝在時亦養諸王太子若取乳母其夫復役賜與錢財給其資糧時遣歸來視其弱息今則不然夫婦生離夫故作役兒從後死家為空戶是不遵先帝十二也先帝歎曰國以民為本民以食為天衣其次也三者孤存之於心今則不然農桑並廢是不遵先帝十三也先帝簡士不拘卑賤任之鄉閭效之於事舉者不虛受者不妄今則不然浮華者登朋黨者進是不遵先帝十四也先帝戰士不給他役使春惟知農秋惟收稻江渚有事責其死效今之戰士供給衆役廩賜不贍是不遵先帝十五也夫賞以勸功罰以禁邪賞罰不中則士民散失今江邊將士死不見哀勞不見賞是不遵先帝十六也今在所監司已為煩猥兼有內使擾亂其中一民十吏何以堪命昔景帝時交趾反亂實由茲起是為遵景帝之闕不遵先帝十七也夫校事吏民之仇也先帝末年雖有呂一錢欽尋皆誅夷以謝百姓今復張立校曹縱吏言事是不遵先帝十八也先帝時居官者咸久於其位然後考績黜陟今州郡職司或蒞政無幾便徵召遷轉迎新送舊紛紜道路傷財害民於是為甚是不遵先帝十九也先帝每察竟解之奏當留心推接是以獄無冤囚死者吞聲今則違之是不遵先帝二十也若臣言可録藏之盟府如其虛妄治臣之罪願陛下留意吳志陸凱傳奏重備西陵奏重備西陵臣愚以西陵國之關首宜重其備備重則敵不敢輕輕備則為敵所侮藝文類聚六奏事諸暨永安出御絲御覽八百十四吳先賢傳贊揚州別駕從事戴矯猗猗茂才執節雲停志勵秋霜冰潔玉清初學記十七奮武將軍顧承於鑠奮武奕奕全德在家必聞鴻飛高陟同上上虞令史胄猗猗上虞金鎣玉貞鳳立鸞跱邈矣不傾同上陳時宜疏臣聞德均則衆者勝寡力侔則安者制危蓋六國所以兼并於強秦西楚所以北面於漢高也今敵跨制九服非徒關右之地割據九州豈但鴻溝以西而已國家外無連國之援內非西楚之強庶政陵遲黎民未乂而議者所恃徒以長川峻山限帶封域此乃守國之末事非智者之所先也臣每遠惟戰國存亡之符近覽劉氏傾覆之釁考之典籍驗之行事中夜撫枕臨餐忘食昔胸奴未滅去病辭館漢道未純賈生哀泣況臣王室之出世荷光寵身名否泰與國同戚死生契闊義無苟且夙夜憂怛念至情慘夫事君之義犯而勿欺人臣之節匪躬是殉謹陳時宜十七條如左吳志陸抗傳云十七條失本故不載請抑黜群小疏請抑黜群小疏臣聞開國承家小人勿用靖譖庸回唐書攸戒是以雅人所以怨刺仲尼所以歎息也春秋以來爰及秦漢傾覆之釁未有不由斯者也小人不明理道所見既淺雖使竭情盡節猶不足任況其姦心素篤而憎愛移易哉苟患失之無所不至今委以聰明之任假以專制之威而冀雍熙之聲作肅清之化立不可得也方今見吏殊才雖少然或冠冕之胄少漸道教或清苦自立資能足用自可隨才授職抑黜群小然後俗化可清庶政無穢也吳志陸抗傳戒動師旅疏臣聞易貴隨時傳美觀釁故有夏多罪而殷湯用師紂作淫虐而周武授鉞苟無其時玉臺有憂傷之慮孟津有反旆之軍今不務富國強兵力農畜穀使文武之才效展其用百揆之署無曠厥職明黜陟以厲庶尹審刑罰以示勸沮訓諸司以德而撫百姓以仁然後順天承運席卷宇內而聽諸將徇名窮兵黷武動費萬計士卒雕瘁寇不為衰而我已太病矣今爭帝王之資而昧十百之利此人臣之姦便非國家之良策也昔齊魯三戰魯人再克而亡不旋踵何則大小之勢異也況今師所克獲不補所喪哉且阻兵無衆古之明鑒誠宜暫息進取小規以畜士民之力觀釁伺隙庶無悔吝吳志陸抗傳疾病上疏西陵建平國之蕃表既處下流受敵二境若敵泛舟順流舳艫千里星奔電邁俄然行至非可恃援他部以救倒縣也此乃社稷安危之機非徒封疆侵陵小害也臣父遜昔在西垂陳言以為西陵國之西門雖云易守亦復易失若有不守非但失一郡則荊州非吳有也如其有虞當傾國爭之臣往在西陵得涉遜迹前乞精兵三萬而至者循常未肯差赴自步闡以後益更損耗今臣所統于里受敵四處外禦強對內懷百蠻而上下見兵財有數萬羸弊日久難以待變臣愚以為諸王幼沖未統國事可且立傅相輔導賢姿無用兵馬以妨要務又黃門豎宦開立占募兵民怨役逋逃入占乞特詔簡閲一切料出以補疆埸受敵常處使臣所部足滿八萬省息衆務信其賞罰雖韓白復生無所展巧若兵不增此制不改而欲克諧大事此臣之所深戚也若臣死之後乞以西方為屬願陛下思覽臣言則臣死且不朽吳志陸抗傳請原薛瑩夫俊乂者國家之良寶社稷之貴資庶政所以倫敘四門所以穆清也故大司農樓玄散騎中常侍王蕃少府李勗皆當世秀穎一時顯器既蒙初寵從容列位而並旋受誅殛或圮族替祀或投棄荒裔蓋周禮有赦賢之辟春秋有宥善之義書曰與其殺不辜寧失不經而蕃等罪名未定大辟以加心經忠義身被極刑豈不痛哉且已死之刑固無所識至乃焚爍流漂棄之水濱懼非先王之正典或甫侯之所戒也是以百姓哀聳士民同戚蕃勗永已悔亦靡及誠望陛下赦召玄出而頃聞嶭瑩卒見逮録瑩父綜納言先帝傅弼文皇及瑩承基內厲名行今之所坐罪在可宥臣懼有司未詳其事如復誅戮益失民望乞垂天恩原赦瑩罪哀矜庶獄清澄刑網則天下幸甚吳志陸抗傳
