body:
  text: 王蕃渾天象說虞書稱在璇璣玉衡以齊七政則今渾天儀日月五星是也鄭玄說動運為機持正為衡皆以玉為之視其行度觀受禪是非也渾儀羲和氏之舊器歷代相傳謂之機衡其所由來有原統矣而斯器設在候臺史官禁密學者寡得聞見穿鑿之徒不解機衡之義見有七政之言因以為北斗七星構造虛文託之讖緯史遷班固猶尚惑之鄭玄有贍雅高遠之才沈靜精妙之思超然獨見改正其說聖人復出不易斯言矣渾儀以察三光分宿度象以著天體布星辰按斯二者以考於天蓋詳察矣幽平之後周室遂卑天子不能頒朔魯曆不正百有餘年以建申之月為建亥而怪蟄蟲不伏也曆紀廢壞道術侵亂渾天之義傳之者寡末世之儒或不聞見各以私意為天作說故有周髀宣夜之論宣夜之學絶無師法周髀見行於世考驗天狀多所違失依劉洪乾象曆之法而論渾天曰渾天之作由來尚矣考之於天信而有徵前儒舊說天地之體狀如鳥卵天包地外猶殼之裹黃也周旋無端其形渾渾然故曰渾天也周天三百六十五度五百八十九度之百四十五東西南北展轉周規半覆地上半在地下故二十八宿半見半隱以赤儀準之其見者常百八十二度有奇是以察知其半覆地上半隱地下其二端謂之南極北極天之中也北極在正北出地三十六度南極在正南入地亦三十六度兩極相去一百八十二度半強衆星皆移而北極不徙猶車輪之有輻軸也繞北極徑二十二度常見不隱謂之上規繞南極七十二度常隱不見謂之下規是也上規去南極下規去北極皆一百四十四度半強以二規於渾儀為中規赤道帶天之紘去兩極各九十一度少強黃道日之所行也半在赤道外半在赤道內與赤道東交於角五少弱西交於奎十四少強其出赤道外極遠者出赤道二十四度斗二十一度是也其入赤道內極遠者入赤道二十四度井二十五度是也日南至在斗二十一度去極百一十五度少強是日最南去極最遠故景最長黃道斗二十一度出辰入申故日出辰入申晝行地上百四十六度強故日短夜行地下二百一十九度少弱故夜長自南至之後日去極稍近故景稍短日晝行地上度稍多故日稍長夜行地下度稍少故夜稍短日行度稍北故日出入稍北以至於夏至日在井二十五度去極六十七度少強是日最近北去極最近故景最短黃道井二十五度出寅入戌晝行地上二百一十九度少弱故日長夜行地下百四十六度少強故夜短自夏至之後日去極稍遠故景最長日晝行地上度稍少故日稍短夜行地下度稍多故夜稍長日所在度稍南故出入稍南以至於南至而復初焉斗二十一度井二十五度南北相較四十八度春分日在奎十四少強秋分日在角五少弱此黃赤二度之交中也去極俱九十一度少強南北處斗二十一井二十五之中故景居二至長短之中奎十四角五出卯入酉故日亦出卯入酉日晝行地上夜行地下俱百八十二度半強故日見之漏五十刻不見之漏五十刻謂之晝夜同夫天之晝夜以日出為分人之晝夜以昏明為限日未出二刻半而明日入後二刻半而昏故損夜五刻以增晝刻是以春秋分之漏晝五十五刻渾天遭周秦之亂師徒斷絶而喪其文唯渾儀尚在候臺是以不廢故其法可得言至於纖微委曲闕而不傳蔡雍以為精微深妙百世不易之道周天里數無聞焉爾而洛書甄曜度春秋考異郵皆云周天一百七萬一千里至以日景驗之違錯甚多然其流行布在衆書通儒達士未之考正是以不敢背捐舊術獨攄所見故按其說更課諸數以究其意也古曆皆云周天三百六十五度四分度之一皆分一百七萬一千里數為一度得二千九百三十二里七十一步二尺七寸四分四百八十七分分之三百六十二斗下分為七百三十三里一十七步五尺一寸八分大弱三光之行不必有常術家以算追而求之故諸家之曆各有異同漢靈之末四分曆與天違錯時會稽東郡都尉泰山劉洪善於推候乃考術官及史自古至今曆法原其進退之行察其出入之驗視其往來度其終始課較其法不能四分之一減以為五百八十九分之一百四十五更造乾象曆以追日月五星之行比於諸家最為精密今史官所用則其曆也故所作渾象諸分度節次及昏明中星皆更以乾象法作之周天一百七萬一千里以乾象法分之得二千九百三十二里八十步三尺九寸五分弱斗下分為七百二十一里二百五十九步四尺五寸二分弱乾象全度張古曆零度九步一尺二寸一分弱斗下分減古曆斗下分十一里五十八步六寸六分弱其大數俱一百七萬一千里斗下分減則全度純數使其然也又陸績云周天一百七萬一千里東西南北徑三十五萬七千里立徑亦然此蓋天黃赤道之徑數也渾天蓋天黃赤道周天度同故績取以言耳此言周三徑一也古少廣術用率圓周三中徑一臣更考之徑一不翅周三率周百四十二而徑四十五以徑率乘一百七萬一千里以周率約之得徑三十三萬九千四百五里一百二十二步三尺二寸一分七十一分分之十東西南北及立徑皆同半之得十六萬九千七百二里二百一十一步一尺六寸百四十二分分之八十一地上去天之數也夫周天徑目前定物圖蓋天者尚不考驗而乃論天地之外日月所不照陰陽所不至目精所不及儀衡所不測皆為之說虛誕無徵是亦鄒子瀛海之類也臣謹更以晷景考周天里數按周禮大司徒之職立土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多陰日至之景尺有五寸謂之地中鄭衆云土圭之長尺有五寸以夏至立八尺表中景適與圭等謂之地中今潁川陽城地為然鄭玄云凡日景於地千里而差一寸景尺有五寸者南戴日下萬五千里也誠以八尺之表而有尺五寸景是立八十而旁十五也南萬五千里而當日下則日當去其下地八萬里矣從日斜射陽城則天徑之半也天體圓如彈丸地處天之半而陽城為中則日春秋冬夏昏明晝夜去陽城皆等無盈縮矣故知從日斜射陽城為天徑之半也以句股之法言之旁萬五千里則句也立八萬里則股也從日斜陽城則弦也以句股求弦法入之得八萬一千三百九十四里三十步五尺三寸六分天徑之半而地上去天之數也倍之得十六萬二千七百八十八里六十一步四尺七寸二分天徑之數也以周率乘之徑率約之得五十一萬三千六百八十七里六十八步一尺八寸二分周天之數也減甄曜度考異郵五十五萬七千三百一十二里有奇一度凡一千四百六里百二十四步六寸四分十萬七千五百六十五分分之一萬九千四十九減舊度千五百二十五里二百五十六步三尺三寸二十一萬五千一百三十分分之十六萬七百三十夫末世之儒多妄穿鑿減增河洛竊作讖緯其言浮虛難悉據用六官之職周公所制句股之術目前定數晷景之度事有明驗以此推之近為詳矣黃赤二道相與交錯其閒相去二十四度以兩游儀準之二道俱三百六十五度有奇又赤道見者常百八十二度半強又南北考之天見者亦一百八十二度半強是以知天體圓如彈丸北極出地三十六度是知南極入地亦三十六度而南北極相去一百八十二度半強也而陸績所作渾象其形如鳥卵以施二道不得如法若使二道同規則其間相去不得滿二十四度若令相去二十四度則黃道當長於赤道又兩極相去不翅百八十二度半強案績說云天東西徑三十五萬七千里直徑亦然則績意亦以天形為正圓也而渾象為鳥卵則器與言謬為自相違背月行二十七日有奇而周天其行半出黃道外半入黃道內在內謂之陰道在外謂之陽道其行陰陽道極遠者不過六度黃道無常諸家各異各依其曆節氣所行宿度尚書月令太初三統四分乾象各不同昏明亦異日行蹉跌不遵常軌之所為也夫三光之行雖有盈縮天地之體常然不變故諸家之曆皆不著渾象為黃道當各隨其曆而錯之而今臣所施黃道乾象法也審校春秋二分於先代諸曆差而冬夏二至恆在二分張中蕃按渾象之法地當在天中其勢不便故反觀其形地為外匡於己解人無異在內詭狀殊體而合於理可謂奇巧古舊渾象以二分為一度凡周七尺三寸半分漢張衡更制以四分為一度凡周一丈四尺六寸一分臣以古制局小以布星辰相去稠概不得了察而張衡所作又復過大難可轉移前表聞以三分為一度事許令臣所作周一丈九寸五分四分分之三張古法三尺六寸五分四分分之一減張衡亦三尺六寸五分四分分之一渾象法黃道赤道各廣一度有半故今所作渾象黃赤道各廣四分半相去七寸二分渾儀中筒為璇機外規為玉衡晉書天文志宋書天文志隋書天文志北堂書鈔一百三十開元占經一御覽二諫吳主皓疏古之聖王所以潛處重闈之內而知萬里之情垂拱衽席之上明照八極之際者任賢之功也陛下以至德淑姿統承皇業宜率身履道恭奉神器旍賢表善以康庶政自頃年以來朝列紛錯真僞相貿上下空任文武曠位外無山嶽之鎮內無拾遺之臣佞諛之徒拊翼天飛干弄朝威盜竊榮利而忠良排墜信臣被害是以正土摧方而庸臣苟媚先意承旨各希時趣人執反理之評士吐詭道之論遂使清流變濁忠臣結舌陛下處九天之上隱百重之室言出風靡令行景從親洽寵媚之臣日聞順意之辭將謂此輩實賢而天下已平也臣心所不安敢不以聞臣聞興國之君樂聞其過荒亂之主樂聞其譽聞其過者過日消而福臻聞其譽者譽日損而禍至是以古之人君揖讓以進賢虛己以求過譬天位於乘奔以虎尾為警戒至於陛下嚴刑法以禁直辭黜善士以逆諫臣眩耀毀譽之實沈淪近習之言昔高宗思佐夢寐得賢而陛下求之如忘忽之如遺故常侍王蕃忠恪在公才任輔弼以醉酒之間加之大戮近鴻臚葛奚先帝舊臣偶有逆忤昏醉之言耳三爵之後禮所不諱陛下猥發雷霆謂之輕慢飲之醇酒中毒隕命自是之後海內悼心朝臣失圖任者以退為幸居者以出為福誠非所以保光洪緒熙隆道化也又何定本趨走小人僕隸之下身無錙銖之行能無鷹犬之用而陛下愛其佞媚假其威柄使定恃寵放恣自擅威福口正國議手弄天機上虧日月之明下塞君子之路夫小人求入必進姦利定間妄興事役發江邊戍兵以驅麋鹿結罝山陵芟夷林莽殫其九野之獸聚於重圍之內上無益時之分下有損耗之費而兵士罷於運送人力竭於驅逐老弱飢凍大小怨歎臣竊觀天變自比年以來陰陽錯謬四時逆節日食地震中夏隕霜參之典籍皆陰氣陵陽小人弄勢之所致也臣嘗覽書傳驗諸行事災祥之應所為寒栗昔高宗修已以消鼎雉之異宋景崇德以退熒惑之變願陛下上懼皇天譴告之誚下追二君攘災之道遠覽前代任賢之功近寤今日謬授之失清澄朝位旌敘俊乂放退佞邪抑奪姦勢如是之輩一勿復用廣延淹滯容受直辭祗承乾指敬奉先業則大化光敷天人望塞也傳曰國之興也視民如赤子其亡也以民為草芥陛下昔韜神光潛德東夏以聖哲茂姿龍飛應天四海延頸八方拭目以成康之化必隆于旦夕也自登位以來法禁轉苛賦調益繁中宮內豎分布州郡橫興事役競造姦利百姓罹杼軸之困黎民罷無已之求老幼飢寒家戶菜色而所在長吏迫畏罪負嚴法峻刑苦民求辦是以人力不堪家戶離散呼嗟之聲感傷和氣又江邊戍兵遠當以拓土廣境近當以守界備難宜時優育以待有事而徵發賦調煙至雲集衣不全裋褐食不贍朝夕出當鋒鏑之難入抱無聊之戚是以父子相棄叛者成行願陛下寬賦除煩振恤窮乏省諸不急蕩禁約法則海內樂業大化普洽夫民者國之本食者民之命也今國無一年之儲家無經月之畜而後宮之中坐食者萬有餘人內有離曠之怨外有損耗之費使庫廩空於無用士民飢於糟糠又北敵注目伺國盛衰陛下不恃已之威德而怙敵之不來忽四海之困窮而輕虜之不為難誠非長策廟勝之要也昔大皇帝勤身苦體創基南夏割據江山拓土萬里雖承天贊實由人力也餘慶遺祚至於陛下陛下宜勉崇德器以光前烈愛民養士保全先軌何可忽顯祖之功勤輕難得之大業忘天下之不振替興衰之巨變哉臣聞否泰無常吉凶由人長江之限不可久恃苟我不守一葦可航也昔秦建皇帝之號據殽函之阻德化不修法政苛酷毒流生民忠臣杜口是以一夫大呼社稷傾覆近劉氏據三關之險守重山之固可謂金城石室萬世之業任授失賢一朝喪沒君臣係頸共為羈僕此當世之明鑒目前之炯戒也願陛下遠考前事近鑒世變豐基彊本割情從道則成康之治興而聖祖之祚隆矣吳志賀劭傳與丁孝正書吾聞班固善揚孫之省葬惡始皇之飾終夫倮以矯世君子弗為若乃據周公之定品依延州而成事取中庸以建基獲美稱於當世不亦優哉
