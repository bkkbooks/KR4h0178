body:
  text: 武帝置屯田令當在初平興平間當在初平興平間置屯田令當在初平興平間夫定國之術在于彊兵足食秦人以急農兼天下孝武以屯田定西域此先代之良式也晉書食貨志為徐宣議陳矯下令當在建安二年後四年前當在建安二年後四年前為徐宣議陳矯下令當在建安二年後四年前喪亂已來風教彫薄謗議之言難用褒貶自建安五年已前一切勿論其以斷前誹議者以其罪罪之魏志陳矯傳褒賞令別部司馬付其衙請立齊桓公神堂使記室阮瑀議之北堂書鈔六十九加棗祗子處中封爵竝祀祗令建安六年建安六年加棗祗子處中封爵竝祀祗令建安六年故陳留太守棗祗天性忠能始共舉義兵周旋征討後袁紹在冀州亦貪祗欲得之祗深附託于孤使領東阿令呂布之亂兗州皆叛惟范東阿完在由祗以兵據城之力也後大軍糧乏得東阿以繼祗之功也及破黃巾定許得賊資業當興立屯田時議者皆言當計牛輸穀佃科以定施行後祗白以為僦牛輸穀大收不增穀有水旱災除大不便反覆來說孤猶以為當如故大收不可復改易祗猶執之孤不知所從使與荀令君議之時故軍祭酒侯聲云科取官牛為官田計如祗議於官便於客不便聲懷此云云以疑令君祗猶自信據計畫還白執分田之術孤乃然之使為屯田都尉施設田業其時歲則大收後遂因此大田豐足軍用摧滅群逆克定天下以隆王室祗興其功不幸早沒追贈以郡猶未副之今重思之祗宜受封稽留至今孤之過也祗子處中宜加封爵以祀祗為不朽之事魏志任峻傳注引魏武故事軍譙令吾起義兵為天下除暴亂舊土人民死喪略盡國中終日行不見所識使吾悽愴傷懷其舉義兵已來將士絕無後者求其親戚以後之授土田官給耕牛置學師以教之為存者立廟使祀其先人魂而有靈吾百年之後何恨哉魏志武帝紀御覽六百三十七敗軍令令司馬法將軍死綏故趙括之母乞不坐括是古之將者軍破于外而家受罪于內也自命將征行但賞功而不罰罪非國典也其令諸將出征敗軍者抵罪失利者免官爵魏志武帝紀又文館詞林六百九十五論吏士行能令令議者或以軍吏雖有功能德行不足堪任郡國之選所謂可與適道未可與權者也管仲曰使賢者食于能則上尊鬭士食于功則卒輕于死二者設于國則天下治未聞無能之人不鬭之士竝受祿賞而可以立功興國者也故明君不官無功之臣不賞不戰之士治平尚德行有事賞功能論者之言一似管窺虎歟魏志武帝紀注引魏書又文館詞林六百九十五脩學令令喪亂以來十有五年後生者不見仁義禮讓之風吾甚傷之其令郡國各脩文學縣滿五百戶置校官選其鄉之俊造而教學之庶幾先王之道不廢而有以益于天下魏志武帝紀又文館詞林六百九十五蠲河北租賦令河北罹袁氏之難其令無出今年租賦魏志武帝紀收田租令令有國有家者不患寡而患不均不患貧而患不安袁氏之治也使豪彊擅恣親戚兼并下民貧弱代出租賦衒鬻家財不足應命審配宗族至于藏匿罪人為逋逃主欲望百姓親附甲兵彊盛豈可得邪其收田租畝四升戶出絹二匹綿二斤而已他不得擅興發郡國守相明檢察之無令彊民有所隱藏而弱民兼賦也魏志武帝紀注引魏書文館詞林六百六十五誅袁譚令敢有哭之者戮及妻子御覽四百二十二引傅子赦袁氏同惡及禁復讎厚葬令其與袁氏同惡者與之更始魏志武帝紀整齊風俗令令阿黨比周先聖所疾也聞冀州俗父子異部更相毀譽昔直不疑無兄世人謂之盜嫂第五伯魚三娶孤女謂之撾婦翁王鳳擅權谷永比之申伯王商忠義張匡謂之左道此皆以白為黑欺天罔君者也吾欲整齊風俗四者不除吾以為羞魏志武帝紀又文館詞林六百九十五選舉令夫遣人使于四方古人所慎擇也故仲尼曰使乎使乎言其難也初學記二十鄴縣甚大一鄉萬數千戶兼人之吏未易得也書鈔七十七聞小吏或有著巾幘書鈔七十七魏諸官印各以官為名印如漢法斷二千石者章國家舊法選尚書郎取年未五十者使文筆真草有才能謹慎典曹治事起草立義又以草呈示令僕訖乃付令史書之耳書訖共省讀內之事本來臺郎統之令史不行知也書之不好令史坐之至于謬誤讀省者之責若郎不能為文書當御史令是為牽牛不可以服箱而當取辯于繭角也御覽二百十五令詔書省司隸官鍾校尉材智決洞通敏先覺可上請參軍事以輔闇政御覽二百四十九引魏武選令諺曰失晨之雞思補更鳴昔季闡在白馬有受金取婢之罪棄而弗問後以為濟北相以其能故御覽四百九十六明罰令聞太原上黨西河雁門冬至後百有五日皆絕火寒食云為介子推子胥沈江吳人未有絕水之事至于子推獨為寒食豈不悖乎且北方沍寒之地老少羸弱將有不堪之患令到人不得寒食若犯者家長半歲刑主使百日刑令長奪一月俸藝文類聚四御覽二十八又三十又八百六十八求言令建安十一年建安十一年求言令建安十一年令夫治世御眾建立輔弼誡在面從詩稱聽用我謀庶無大悔斯實君臣懇懇之求也吾充重任每懼失中頻年以來不聞嘉謀豈吾開延不勤之咎邪自今以後諸掾屬治中別駕常以月旦各言其失吾將覽焉魏志武帝紀注引魏書又文館詞林六百九十五自今諸掾屬侍中別駕常以月朔各進得失紙書函封主者朝常給紙函各一初學記二十一舉泰山太守呂虔茂才令夫有其志必成其事蓋烈士之所殉也卿在郡以來禽姦討暴百姓獲安躬蹈矢石所征輒克昔寇恂立名于汝潁耿弇建策于青兗古今一也舉茂才加騎都尉典郡如故魏志呂虔傳辨衛臻不同朱越謀反論孤與卿君同共舉事加欽令問始聞越言固自不信及得荀令君書具亮忠誠魏志衛臻傳封功臣令吾起義兵誅暴亂于今十九年所征必克豈吾功哉乃賢士大夫之力也天下雖未悉定吾當要與賢士大夫共定之而專饗其勞吾何以安焉其促定功行封魏志武帝紀下令大論功行封忠正密謀撫寧內外文若是也公達其次也魏志荀攸傳分租與諸將掾屬令令昔趙奢竇嬰之為將也受賜千金一朝散之故能濟成大功永世流聲吾讀其文未嘗不慕其為人也與諸將士大夫共從戎事幸賴賢人不愛其謀群士不遺其力是以夷險平亂而吾得竊大賞戶邑三萬追思竇嬰散金之義今分所受租與諸將掾屬及故戍于陳蔡者庶以疇答眾勞不擅大惠也宜差死事之孤以租穀及之若年殷用足租奉畢入將大與眾人悉共饗之魏志武帝紀注引魏書又文館詞林六百九十五告涿郡太守令建安十二年七月建安十二年七月告涿郡太守令建安十二年七月故北中郎將盧植名著海內學為儒宗士之楷模乃國之楨幹也昔武王入殷封商容之閭鄭喪子產而仲尼隕涕孤到此州嘉其餘風春秋之義賢者之後有異于人今亟敬遣丞掾修其墳墓存其子孫並致薄醊以彰厥德魏志盧毓傳注引續漢書又見藝文類聚四十下田疇令田子泰非吾所宜吏者魏志田疇傳聽田疇讓封令昔伯成棄國夏后不奪將欲使高尚之士優賢之主不止于一世也其聽疇所執魏志田疇傳注引魏書表劉琮令建安十三年九月建安十三年九月表劉琮令建安十三年九月楚有江漢山川之險後服先彊與秦爭衡荊州則其故地劉鎮南久用其民矣身沒之後諸子鼎峙雖終難全猶可引日青州刺史琮心高志潔智深慮廣輕榮重義薄利厚德蔑萬里之業忽三軍之眾篤中正之體敦令名之譽上耀先君之遺塵下圖不朽之餘祚鮑永之棄并州竇融之離五郡未足以喻也雖封列侯一州之位猶恨此寵未副其人而比有牋求還州監史雖尊秩祿未優今聽所執表琮為諫議大夫參同軍事魏志劉表傳注引魏武故事宣示孔融罪狀令太中大夫孔融既伏其罪矣然世人之採其虛名失于核實見融浮豔好作變異眩其誑詐不復察其亂俗也此州人說平原禰衡受傳融論以為父母與人無親譬若瓶器寄盛其中又言若遭饑饉而父不肖寧贍活餘人融違天反道敗倫亂理雖肆市朝猶恨其晚更以此事列上宣示諸軍將校掾屬皆使聞見魏志崔琰傳注引魏氏春秋為張範下令邴原名高德大清規邈世魁然而峙不為孤用聞張子頗欲學之吾恐造之者富隨之者貧也魏志邴原傳注引原別傳爵封田疇令蓨令田疇至節高尚遭值州里戎夏交亂引身深山研精味道百姓從之以成都邑袁賊之盛命召不屈慷慨守志以徼真主及孤奉詔征定河北遂服幽都將定胡寇時加禮命疇即受署陳建攻胡蹊路所由率齊山民一時向化開塞導送供承使役路近而便令虜不意斬蹋頓于白狼遂長驅于柳城疇有力焉及軍入塞將圖其功表封亭侯食邑五百而疇懇惻前後辭賞出入三載歷年未賜此為成一人之高甚違王典失之多矣宜從表封無久留吾過魏志田疇傳注引先賢行狀存䘏從軍吏士家室令自頃以來軍數征行或遇疫氣吏士死亡不歸家室怨曠百姓流離而仁者豈樂之哉不得已也其令死者家無基業不能自存者縣官勿絕廩長吏存䘏撫循以稱吾意魏志武帝紀以蔣濟為揚州別駕令季子為臣吳宜有君今君還州吾無憂矣魏志蔣濟傳辟蔣濟為丞相主簿西曹屬令舜舉皋陶不仁者遠臧否得中望于賢屬矣魏志蔣濟傳求賢令令自古受命及中興之君曷嘗不得賢人君子與之共治天下者乎及其得賢也曾不出閭巷豈幸相遇哉上之人不求之耳今天下尚未定此特求賢之急時也孟公綽為趙魏老則優不可以為滕薛大夫若必廉士而後可用則齊桓其何以霸世今天下得無有被褐懷玉而釣于渭濱者乎又得無有盜嫂受金而未遇無知者乎二三子其佐我明揚仄陋唯才是舉吾得而用之魏志武帝紀又文館詞林六百九十五讓縣自明本志令孤始舉孝廉年少自以本非巖穴知名之士恐為海內人之所見凡愚欲為一郡守好作政教以建立名譽使世士明知之故在濟南始除殘去穢平心選舉違迕諸常侍以為彊豪所忿恐致家禍故以病還去官之後年紀尚少顧視同歲中年有五十未名為老內自圖之從此卻去二十年待天下清乃與同歲中始舉者等耳故以四時歸鄉里于譙東五十里築精舍欲秋夏讀書冬春射獵求底下之地欲以泥水自蔽絕賓客往來之望然不能得如意後徵為都尉遷典軍校尉意遂更欲為國家討賊立功欲望封侯作征西將軍然後題墓道言漢故征西將軍曹侯之墓此其志也而遭值董卓之難興舉義兵是時合兵能多得耳然常自損不欲多之所以然者多兵意盛與彊敵爭倘更為禍始故汴水之戰數千後還到揚州更募亦復不過三千人此其本志有限也後領兗州破降黃巾三十萬眾又袁術僭號于九江下皆稱臣名門曰建號門衣被皆為天子之制兩婦預爭為皇后志計已定人有勸術使遂即帝位露布天下答言曹公尚在未可也後孤討禽其四將獲其人眾遂使術窮亡解沮發病而死及至袁紹據河北兵勢彊盛孤自度勢實不敵之但計投死為國以義滅身足垂于後幸而破紹梟其二子又劉表自以為宗室包藏奸心乍前乍卻以觀世事據有當州孤復定之遂平天下身為宰相人臣之貴已極意望已過矣今孤言此若為自大欲人言盡故無諱耳設使國家無有孤不知當幾人稱帝幾人稱王或者人見孤彊盛又性不信天命之事恐私心相評言有不遜之志妄相忖度每用耿耿齊桓晉文所以垂稱至今日者以其兵勢廣大猶能奉事周室也論語云三分天下有其二以服事殷周之德可謂至德矣夫能以大事小也昔樂毅走趙趙王欲與之圖燕樂毅伏而垂泣對曰臣事昭王猶事大王臣若獲戾放在他國沒世然後已不忍謀趙之徒隸況燕後嗣乎胡亥之殺蒙恬也恬曰自吾先人及至子孫積信于秦三世矣今臣將兵三十餘萬其勢足以背叛然自知必死而守義者不敢辱先人之教以忘先王也孤每讀此二人書未嘗不愴然流涕也孤祖父以至孤身皆當親重之任可謂見信者矣以及子桓兄弟過于三世矣孤非徒對諸君說此也常以語妻妾皆令深知此意孤謂之言顧我萬年之後汝曹皆當出嫁欲令傳道我心使它人皆知之孤此言皆肝鬲之要也所以勤勤懇懇敘心腹者見周公有金縢之書以自明恐人不信之故然欲孤便爾委捐所典兵眾以還執事歸就武平侯國實不可也何者誠恐己離兵為人所禍也既為子孫計又己敗則國家傾危是以不得慕虛名而處實禍此所不得為也前朝恩封三子為侯固辭不受今更欲受之非欲復以為榮欲以為外援為萬安計孤聞介推之避晉封申胥之逃楚賞未嘗不舍書而歎有以自省也奉國威靈仗鉞征伐推弱以克彊處小而禽大意之所圖動無違事心之所慮何向不濟遂蕩平天下不辱主命可謂天助漢室非人力也然封兼四縣食戶三萬何德堪之江湖未靜不可讓位至于邑土可得而辭今上還陽夏柘苦三縣戶二萬但食武平萬戶且以分損謗議少減孤之責也魏志武帝紀注引魏武故事轉邴原五官長史令建安十六年建安十六年轉邴原五官長史令建安十六年子弱不才懼其難正貪欲相屈以匡勵之雖云利賢能不恧恧魏志邴原傳注下令增杜畿秩建安十六年九月建安十六年九月下令增杜畿秩建安十六年九月河東太守杜畿孔子所謂禹吾無間然矣增秩中二千石魏志杜畿傳隴右平定下令姜敘之母明智乃爾雖楊敞之妻蓋不過也御覽四百四十一引皇甫謐列女傳止省東曹令日出于東月盛于東凡人言方亦復先東何以省東曹魏志毛玠傳辭九鍚令夫受九錫廣開土宇周公其人也漢之異姓八王者與高祖俱起布衣創定王業其功至大吾何可比之魏志武帝紀注引魏書以高柔為理曹掾令夫治定之化以禮為首撥亂之政以刑為先是以舜流四凶族皋陶作士漢祖除秦苛法蕭何定律掾清識平當明于憲典勉恤之哉魏志高柔傳復肉刑令安得通理君子達于古今者使平斯事乎昔陳鴻臚以為死刑有可加于仁恩者正謂此也御史中丞能申其父之論乎魏志陳群傳以杜畿為尚書仍鎮河東令昔蕭何定關中寇恂平河內卿有其功間將授卿以納言之職顧念河東吾股肱郡充實之所足以制天下故且煩卿臥鎮之魏志杜畿傳與和洽辯毛玠謗毀令今言事者白玠不但謗吾也乃復為崔琰觖望此損君臣恩義妄為死友怨歎殆不可忍也昔蕭曹與高祖竝起微賤致功立勳高祖每在屈笮二相恭順臣道益彰所以祚及後世也和侍中比求實之所以不聽欲重參之耳魏志和洽傳悼荀攸下令孤與荀公達周游二十餘年無毫毛可非者魏志荀攸傳注引魏書荀公達真賢人也所謂溫良恭儉讓以得之孔子稱晏平仲善與人交久而敬之公達即其人也同上夏侯淵平隴右令宋建造為亂逆三十餘年淵一舉滅之虎步關右所向無前仲尼有言吾與爾不如也魏志夏侯淵傳敕有司取士毋廢偏短令令夫有行之士未必能進取進取之士未必能有行也陳平豈篤行蘇秦豈守信邪而陳平定漢業蘇秦濟弱燕由此言之士有偏短庸可廢乎有司明思此義則士無遺滯官無廢業矣魏志武帝紀又文館詞林頁六百九十五選軍中典獄令夫刑百姓之命也而軍中典獄者或非其人而任以三軍死生之事吾甚懼之其選明達法理者使持典刑魏志武帝紀又通典二十九高選諸子官屬令侯家吏宜得淵深法度如邢顒輩魏志邢顒傳春祠令令議者以為祠廟上殿當解履吾受錫命帶劍不解履上殿今有事于廟而解履上殿是尊先公而替王命敬父祖而簡君主故吾不敢解履上殿也又臨祭就洗以手擬水而不盥夫盥以潔為敬未聞擬而不盥之禮且祭如在祭神如神在故吾親受水而盥也又降神禮訖下階就坐而立須奏樂畢竟似若不衎烈祖遲祭不速訖也故吾坐俟樂闋送神乃起也受胙納袖以授侍中此為敬恭不終實也古者親執祭事故吾親納于袖終抱而歸也仲尼曰雖違眾吾從下誠哉斯言也魏志武帝紀注引魏書又文館詞林六百九十五御覽七百六十一諸兒令今壽春漢中長安先欲使一兒各往督令之欲擇慈孝不違吾令亦未知用誰也兒雖小時見愛而長大能善必用之吾非有二言也不但不私臣吏兒子亦不欲有所私御覽四百二十九賜死崔琰令琰雖見刑而通賓客門若市人對賓客虬鬚直視若有所瞋魏志崔琰傳賜夏侯惇伎樂名倡令魏絳以和戎之功猶受金石之樂況將軍乎魏志夏侯惇傳曹植私出開司馬門下令始者謂子建兒中最可定大事魏志陳思王植傳注引魏武故事自臨菑侯植私出開司馬門至金門令吾異目視此兒矣同上又下諸侯長史令諸侯長史及帳下吏知吾出輒將諸侯行意否從子建私開司馬門來吾都不復信諸侯也恐吾適出便復私出故攝將行不可恆使吾以誰為心腹也魏志陳思王植傳注引魏武故事舉賢勿拘品行令昔伊摯傅說出于賤人管仲桓公賊也皆用之以興蕭何曹參縣吏也韓信陳平負汙辱之名有見笑之恥卒能成就王業聲著千載吳起貪將殺妻自信散金求官母死不歸然在魏秦人不敢東向在楚則三晉不敢南謀今天下得無有至德之人放在民間及果勇不顧臨敵力戰若文俗之吏高才異質或堪為將守負汙辱之名見笑之行或不仁不孝而有治國用兵之術其各舉所知勿有所遺魏志武帝紀注引魏書立太子令告子文汝等悉為侯而子桓獨不封止為五官中郎將此是太子可知矣御覽二百四十一引魏武令
