body:
  text: 陸景與兄書向訣不知所言追惟銜恨恨結胸懷懷此戀恨何時可言望路則已近別已千里其為思結纏在心膂於是離析路人悲之況處此戚兼之懿好情之感咽何時可勝念兄始出既當勞思嚴寒向隆經塗轗軻既宜保德為世何資厚自珍愛藝文類聚二十一自尋外役出入三年緣兄之篤睦必時存之寶録兄書積之盈笥不得新命無以自慰時輒溫故以釋其思有信忘數字每見手迹如復暫會藝文類聚二十一案類聚二十一有陸景答從兄安成王書考吳時諸陸無封安成王者其文亦不類當是蕭景之誤安成王蕭秀也今改編入全梁文書獲答虎蔚德音孔昭披紙尋句粲然耀眼北堂書鈔一百三書記篇誡盈富貴天下之至榮位勢人情之所趨然古之智士或山藏林竄忽而不慕或功成身退逝若脫屣者何哉蓋居高畏其危處滿懼其盈富貴榮勢本非禍始而多以凶終者持之失德守之背道道德喪而身隨之矣是以留侯范蠡棄貴如遺叔敖蕭何不宅美地此皆知盛衰之分識倚伏之機故身全名著與福始卒自此以來重臣貴戚隆盛之族莫不罹患搆禍鮮以善終大者破家小者滅身唯金張子弟世履忠篤故保貴持寵祚鍾昆嗣其餘禍敗可為痛心藝文類聚二十三御覽四百五十九典語爵祿賞罰人主之威柄帝王之所以為尊者也故爵祿不可不重重之則居之者貴輕之則處之者賤居之者貴則君子慕義取之者賤則小人覬覦君子慕義治道之兆小人覬覦亂政之漸也易曰聖人之大寶曰位何以守位曰人故先王重於爵位慎於官人制爵必俟有德班祿必施有功是以見其爵者昭其德聞其祿者知其功然猶誡以威罰勸以黜陟顯以錫命耀以車服故朝無曠官之譏士無尸位之責矣夫無功而受祿君子猶不可況小人乎孔子所以恥稟丘之封而惡季氏之富也故曰富與貴是人之所欲不以其道得之不處苟得其志執鞭可為苟非其道卿相猶避明君不可以虛授人臣亦不可以苟受也書曰天工人其代之是以聖帝明王重器與名尤慎官人故周褒申伯吉甫箸誦祈父失職詩人作刺不商為宰單于震畏千秋登相胸奴輕漢推此言之官人封爵不可不慎也官得其人方類相求雖在下位士以為榮也俗以貨成位失其守雖則三公士以為辱也故王陽在位貢公彈冠王許並立班伯恥之天子據率土之資總三才之任以制御六合統理群生固未易為也是以聖帝明王憂勞待旦勤於日昃未有不汲汲於求賢勤勤於遠惡者也故大舜招二八於唐朝投四凶於荒裔殛鯀不嫌登禹親仁也舉子不為宥父遠惡也以能昭德立化為百王之命也夫世之治亂國之安危非由他也俊乂在官則治道清姦佞干政則禍亂作故王者任人不可不慎也得人之道蓋在於敬賢而誅惡也敬一賢則衆賢悅誅一惡則衆惡懼昔魯誅少正佞人變行燕禮郭隗群士嚮至非其效與然人主處於深宮之中生於禁闥之內眼不親見臣下之得失耳不親聞賢愚之否臧焉知臣下誰忠誰否誰是誰非須當留意隱括聽言觀行驗之以實效之以事能推事效實則賢愚明而治道清矣王者所以稱天子者以其號令政治法天而行故也夫天之育萬物也耀之以日月紀之以星辰運之以陰陽成之以寒暑震之以雷霆潤之以雲雨天不親事而萬事歸功者以所任者得其宜也然握璿璣御七辰調四時制五行此蓋天子之所為任者也孔子曰唯天為大唯堯則之帝王之盛莫過虞昔帝堯之末洪水有滔天之災蒸民有昏墊之憂於是咨嗟四嶽舉及側陋虞舜既登百揆時敘二八龍騰並幹唐朝故能揚嚴億載冠德百王舜既受終並簡俊德咸列庶官從容垂拱身無一勞而庶事歸功光炎百世者所任得其人也天子所以立公卿大夫列士之官者非但欲備員數設虛位而己也以天下至廣庶事總猥非一人之身所能周理故分官別職各守其位事有大小故官有尊卑人有優劣故爵有等級三公者帝王之所杖也自非天下之俊德當世之良材即不得而處其任處其任者必荷其責在其任者必知所職籩豆之事則有司存大臣不親細事猶周鼎不調小味也故書曰元首叢莝哉股肱惰哉庶事隳哉此之謂也陳平曰宰相者上佐天子下理陰陽外撫四夷諸侯內親附百姓使卿大夫各得任其職也可謂知其任者也天下至廣萬機至繁人主以一人之身處重仞之內而御至廣之士聽至繁之政安知萬國之聲息民俗之動靜乎故古之聖帝立輔弼之臣列官司之守勸之以爵賞誡之以刑罰故明誡以效其功考績以核其能德高者位尊才優者任重人主總君謨以觀衆智杖忠賢而布政化明耳目以來風聲進直言以求得失夫如是雖廣必周雖繁必理何則御之有此具也夫君樹元首臣云股肱明大臣與人主一體者也克明俊德守位以人所以強四支而輔體也其為己周豈細也哉苟非其選器不虛假苟得其人委之無疑君之任臣如身之信手臣之事君亦宜如手之繫身安則共樂痛則同憂其上下協心以治世事不俟而自勤不求容而自親何則相信之忠著也是以天子改容於大臣所以動之也人臣盡命於君上所以報德也寵之以爵級而天下莫尊其位任之以重器天下莫不敬其人顯之以車服天下莫不瞻其榮者以其荷光景於辰耀登階於天路也若此之人進退必足動天地而應列宿也故選不可以不精任不可以不信進不可以不禮退不可以權辱昔賈生嘗陳階級而文帝加重大臣每賢其遺言博引古今文辭雅偉真君人之至道王臣之碩謨也夫料才核能治世之要也凡人之才用有所周能有偏達自非聖人誰兼資百行備貫衆理乎故明君聖主裁而用焉昔舜命群司隨才守位漢述功臣三傑異稱況非此儔而可備責乎且造父善御師曠知音皆古之至奇也使其探事易伎則彼此俱屈何則才有偏達也人之才能率皆此類不可不料也若任得其才才堪其任而國不治者未之有也或有用士而不能以治者既任之不盡其才不核其能故功難成而世不治也馬無輦重之任牛無千里之迹違其本性責其效事豈可得哉使韓信下帷仲舒當戎于公馳説陸賈聽訟必無曩時之勳而顯今日之名也何則素非才之所長也推此論之何可不料哉政有宜於古而不利於今有長於彼而不行於此者風移俗易每世則變故結繩之治五帝不行三代損益政法不同隨時改制所以救斃也易曰隨時之義大矣哉孔子曰不教民戰是謂棄之司馬法曰國雖大好戰必亡天下雖安忘戰必危明用武有時昔秦杖威用武卒成王業吞滅六國帝有天下而不斟酌唐虞以美其治損益三代以御其世爾乃廢先聖之教任殘酷之政阻兵行威暴虐海內故百姓怨毒雄桀奮起至於二世社稷湮滅非武不能取而所守之者非也傳曰夫兵猶火也不戢將自焚秦無戢兵之慮故有自焚之禍好戰必亡此之謂也徐偃王好行仁義不修武備楚人伐之身死國滅天下雖安武不可廢況以區區之徐處爭奪之世乎忘戰必危此之謂也漢高帝發迹泗水龍起豐沛仁以懷遠武以弭難任奇納策遂掃秦項被以惠澤飾以文德文武並作祚流世長此高帝之舉也秦漢俱杖兵用武以取天下漢何以昌秦何以亡秦知取而不知守漢取守之具備矣乎中世孝武以成功恢帝綱元成以儒術失皇綱德不堪也王莽之世內尚文章外繕師旅立明堂之制修辟雍之禮招集儒學思遵古道文武之事備矣然而命絶於漸臺支解於漢刃者豈文武之不能治世哉而用之者拙也班輸騁功於利器拙夫操刀而傷手非利器有害於工匠而夫膏粱旨饌時或生疾針艾樂石時或瘳疾故體病則攻之以針艾疾瘳則養之以膏粱文武之道亦猶是矣世亂則威之以師旅道治則被之以文德天生蒸民授之以君所以綜理四海收養品庶也王者據天值御萬國臨兆民之衆有率土之資此所以尊者也然宮室壯觀出於民力器服珍玩生於民財千乘萬騎由於民衆無此三者則天子魁然獨在無所為尊者也明主知君階民以為尊國須政而後治其恤民也憂勞待旦日昃忘飧恕己及下務在博愛臨御華殿軒檻華美則欲民皆有容身之宅廬室之居窈窕盈堂美女侍側則欲民皆有配匹之偶室家之好肥肉淳酒珠膳玉食則欲民皆有餘糧之資充飢之飴輕裘纍暖衣裳重繭則欲民皆有溫身之服禦寒之備凡四者生民之本性人情所共有故明主樂之於上亦欲士女歡之於下是以仁惠廣洽家安厥所臨軍則士忘其死御政則民戴其化此先王之所以豐動祚享長期者也若居無庇首之廬家無配匹之偶口無充飢之食身無蔽形之衣婚姻無以致聘死葬無以相恤飢寒入於腸骨悲愁出於肝心雖百舜不能杜其怨聲千堯不能成其治迹是以明王御世恤民養士恕下以身自近及遠化通宇宙丕懼民之不安故能康厥世治播其德教焉已上並群書治要若衝風之摧枯枝烈火之炎寒草武王伐紂勢然也北堂書鈔未改本一百十七御覽八百六十八清氣漂於青雲之上文選王僧達答顏延年詩注神農嘗百草嘗五穀蒸民乃粒食御覽七十八戈刀雖備於執事而無所揚其鋒御覽三百五十一周世以膏腴之沃壤豐鎬之寶地大啓封境以封驕泰釋鞍投鞚假驥他人欲無陵己其可得乎御覽三百五十八所謂文者非徒執卷於儒生之門攄筆於翰墨之采乃貴其造化禮樂之淵之盛也御覽五百八十五吳朝貢歲或犯道背理雕車麗服橫陵市路車服雖侈人不為榮宮室雖美士不過門御覽七百七十三飛車策馬橫騰超邁來如霧合去若雲散得志則進失意則退御覽七百七十三狻獹之狗吠于廟門社稷之鼠竄于坐側御覽九百十一孤將興水軍一萬從風舉帆朝發海島暮至沓渚御覽七百七十一爭太子和事臣聞太子國之本根雅性仁孝天下歸心今卒責之將有一朝之慮昔晉獻用驪姬而申生不存漢武信江充而戾太子冤死臣竊懼太子不堪其憂雖立思太子之宮無所復及矣吳志朱據傳注引殷基通語
