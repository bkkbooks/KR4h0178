body:
  text: 明帝一遊魂賦崆洞丹穴孤竹北戶沈淪窅冥豈有所覩北堂書鈔一百五十八喻指華歆詔朕新蒞庶事一日萬幾懼聽斷之不明賴有德之臣左右朕躬而君屢以疾辭位夫量主擇君不居其朝委榮棄祿不究其位古人固有之矣願以為周公伊尹則不然潔身徇節常人為之不望之于君君其力疾就位以惠豫一人將立席機筵命百官總已以須君到朕然後御坐魏志華歆傳改元詔先帝即位之元則有延康之號受禪之初亦有黃初之稱今名年可也宋書禮志一封聊城王詔昔象之為虐至甚而大舜猶侯之有鼻近漢氏淮南阜陵皆為亂臣逆子而猶或及身而復國或至子而錫土有虞建之于上古漢文明章行之乎前代斯皆敦敘親親之厚義也聊城公茂少不間禮教長不務善道先帝以為古之立諸侯也皆命賢者故姬姓有未必侯者是以獨不王茂太皇太后數以為言如聞茂頃來少知悔昔之非欲修善將來君子與其進不保其往也合封茂為聊城王以慰太皇太后下流之念魏志樂陵王茂傳議定廟樂及舞詔禮樂之作所以類物表庸而不忘其本者也凡音樂以舞為主自黃帝雲門以下至于周大武皆太廟舞名也然則其所司之官皆曰太樂所以總領諸物不可以一物名武皇帝廟樂未稱其議定廟樂及舞舞者所執綴兆之制聲歌之詩務令詳備樂官自如故為太樂宋書樂志一通典一百四十一日蝕求言詔蓋聞人主政有不得則天懼之以災異所以譴告使得自修也故日月薄蝕明治道有不當者朕即位以來既不能光明先帝聖德而施化有不合于皇神故上天有以寤之宜勵政自修以報于神明天之于人猶父之于子未有父欲責其子而可獻盛饌以求免也今外欲遣上公與太史令具禳祠于義于聞也群公卿士其各勉修厥職有可以補朕不逮者各封上之宋書五行志五太和初太史令許芝奏日應蝕與太尉于靈臺祈禳帝詔曰云云下詔徵管寧太中大夫管寧耽懷道德服膺六藝清虛足以侔古廉白可以當世曩遭王道衰缺浮海遁居大魏受命則襁負而至斯蓋應龍潛升之道聖賢用舍之義而黃初以來徵命屢下每輒辭疾拒違不至豈朝廷之政與生殊趣將安樂山林往而不能反乎夫以姬公之聖而耇德不降則鳴鳥弗聞以秦穆之賢猶思詢乎黃髮況朕寡德曷能不願聞道于子大夫哉今以寧為光祿勳禮有大倫君臣之道不可廢也望必速至稱朕意焉魏志管寧傳下公卿議復肉刑詔太傅學優才高留心政事又于刑理深遠此大事公卿群僚善共平議魏志鍾繇傳詔張郃益邑賊亮以巴蜀之衆當虓虎之師將軍被堅執鋭所向克定朕甚嘉之益邑千戶并前四千三百戶魏志張郃傳刊典論詔先帝昔著典論不朽之格言其刊石于廟門之外及太學與石經並以永示來世魏志齊王芳紀注引搜神記貢士先經學詔尊儒貴學王教之本也自頃儒官或非其人將何以宣明聖道其高選博士才任侍中常侍者申敕郡國貢士以經學為先魏志明帝紀又見御覽二百三十六詔雍丘王植皇帝問雍丘王先帝昔常非于漢氏諸帝積貯衣被使敗于函篋之中遺詔以所服衣被賜王公卿官僚諸將今以十三種賜王初學記二十曹植表稱詔曰云云報楊阜詔間得密表先陳往古明王聖主以諷暗政切至之辭款誠篤實退思補過將順匡救備至悉矣覽思苦言吾甚嘉之魏志楊阜傳答東阿王論邊事詔制詔覽省來書至于再三朕以不德夙遭旻凶聖祖皇考復見孤棄武宣皇后復即玄官重此哀煢五內傷剝又以眇身暗于從政是故二寇未誅黔首元元各不得所雖復兢兢坐而待旦懼無云益不俠輔帝室朕深賴焉何乃謙卑自同三監知吳蜀未梟而海內虛耗為憂又慮邊將或非其人諸所開喻朕敬聽之高謀良策思聞其次文館詞林卷六百六十四議追崇處士君號諡詔尊嚴祖考所以崇孝表行也追本敬始所以篤教流化也是以成湯文武實造商周克昌王業而詩書之義追尊稷契歌頌有娀薑嫄之事明盛德之源流受命所由興也自我魏室之承天序既發迹于高皇太皇帝而功隆于武皇文皇帝至于高皇之父處士君潛修德讓行動神明斯乃乾坤所福饗光靈所從來也而精神幽遠號稱罔記非所謂崇孝重本也其令公卿已下會議號諡魏志劉曄傳通典七十二禁外藩入嗣復顧私親詔禮皇后無嗣擇建支子以繼大宗則當纂正統而奉公義何得復顧私親哉漢宣繼昭帝後加悼考以皇號哀帝以外藩援立而董宏等稱引亡秦或誤朝議遂尊恭皇立廟京都又寵藩妾使比長信敘昭穆于前殿並四位于東宮僭差無度人神弗祐而非罪師丹忠正之諫用致丁傅焚如之禍自是之後相踵行之昔魯文逆祀罪由夏父宋國非度譏在華元其令公卿有司深以前世行事為戎後嗣萬一有由諸侯入奉大統則當明為人後之義敢為佞邪導諛時君妄建非正之號以干正統謂考為皇稱妣為后則股肱大臣誅之無赦其書之金策藏之宗廟著于令典魏志明帝紀又宋書禮志四詔青州刺史禮遣管寧寧抱道懷貞潛翳海隅比下徵書違命不至盤桓利居高尚其事雖有素履幽人之貞而失考父茲恭之義使朕虛心引領歷年其何謂邪徒欲懷安必肆其志不惟古人亦有翻然改節以隆斯民乎日逝月除時方已過澡身浴德將以曷為仲尼有言吾非斯人之徒與而誰與哉其命別駕從事郡丞掾奉詔以禮發遣寧詣行在所給安車吏從茵蓐道上廚食上道先奏魏志管寧傳策試罷退浮華詔世之質文隨教而變兵亂以來經學廢絶後生進趣不由典謨豈朕訓導未洽將進用者不以德顯乎其令郎吏學通一經才任牧民博士策試擢其高第者亟用其浮華不務道本者皆罷退之魏志明帝紀又藝文類聚五十三諡鍾繇詔太傅功高德茂位為師保論行賜諡當先依此兼敘廷尉于張之德耳魏志鍾繇傳注引魏書有司議諡詔曰云云乃策諡曰成侯又見御覽五百六十二聽曹真分邑封曹遵朱讚詔大司馬有叔向撫孤之仁篤晏平久要之分君子成人之美聽分真邑賜遵讚子爵關內侯各百戶魏志曹真傳答張郃詔昔祭遵為將奏置五經大夫居軍中與諸生雅歌投壼今將軍外勒戎旅內存國朝朕將軍之意今擢湛為博士魏志張郃傳封曹真五子詔大司馬蹈履忠節佐命二祖內不恃親戚之寵外不驕白屋之士可謂能持盈守位勞謙其德者也其悉封真五子羲訓則彥皚皆為列侯魏志曹真傳令諸王及宗室公侯各將適子一人入朝詔古者諸侯朝騁所以敦睦親親協和萬國也先帝著令不欲使諸王在京都者謂幼主在位母后攝政防微以漸關諸盛衰也朕惟不見諸王十有二載悠悠之懷能不興思其令諸王及宗室公侯各將適子一人入朝後有少主母后在宮者自如先帝令申明著于令魏志明帝紀報滿寵求留詔昔廉頗強食馬援據鞍今君未老而自謂已老何與廉馬之相背邪其思安邊境惠此中國魏志滿寵傳詔報東阿王植蓋教化所由各有隆弊非皆善始而惡終也事使之然故夫忠厚仁及草木則行葦之詩作恩澤衰薄不親九族則角弓之章刺今令諸國兄弟情禮簡怠妃妾之家膏沐疏略縱不能敦而睦之王援古喻義備悉矣何言精誠不足以感通哉夫明貴賤崇親親禮賢良順少長國之綱紀本無禁固諸國通問之詔也矯枉過正下吏懼譴以至于此耳已敕有司如王所訴魏志陳思王植傳改封諸侯以郡為國詔古之帝王封建諸侯所以藩屏王室也詩不云乎懷德維寧宗子維城秦漢繼周或強或弱俱失厥中大魏創業諸王開國隨時之宜未有定制非所以永為後法也其改封諸侯王皆以郡為國魏志明帝紀又藝文類聚五十一報陳王植等詔此奈乃從涼州來道里既遠又來東轉暖故奈中變色不佳耳初學記二十八又御覽九百七十作故奈色非如夏也詔陳王植吾既薄才至于賦誄特不間從兒陵上還哀懷未散作兒誄為田公家語耳御覽五百九十六與陳王植詔昔先帝時甘露屢降於仁壽殿前靈芝生芳林園中自吾建承露盤已來甘露復降芳林園仁壽殿前藝文類聚九十八初學記二御覽八百七十二與陳王植手詔王顏色瘦弱何意耶腹中調和不今者食幾許米又啖肉多少見王瘦吾甚驚宜當節水加餐御覽三百七十八陳國相為國王制服詔若正名實司空議是也且謂之國相而不稱臣制服則亦名實有錯若去相之號除國之名則傷親親之恩也宜釋輕從重以彰優崇之大義也通典八十八獲玉印告廟詔推原符瑞有感而至宜因祭祀奠于文思皇后神座前以慰神靈之思念通典五十五拒蔣濟請議封禪詔聞濟斯言使吾汗出流足自開闢以來封禪者七十餘君耳故太史公曰雖有受命之君而功有不洽是以中間曠遠者千有餘年近者數百載其儀闕不可得記吾何德之修敢庶茲乎濟豈謂世無管仲以吾有桓公登泰山之志乎吾不敢欺天也濟之所言華則華矣非助我者也公卿侍中尚書常侍省之而已勿復有所議亦不須答詔也晉書禮志下宋書禮志三魏志高堂隆傳載首二句玉佩詔中書領軍遊擊皆玉佩御覽二百四十引高堂隆集已巳詔弔陳群母詔司空今遭母憂當遣使者弔祭如故事通典八十三以蔣濟為護軍將軍詔夫骨鯁之臣人主之所仗也濟才兼文武服勤盡節每軍國大事輒有奏議忠誠奮發吾甚壯之就遷為護軍將軍加散騎常侍魏志蔣濟傳以夏侯惇等配饗武帝廟庭詔昔先王之禮于功臣存則顯其爵沒則祭于大蒸故漢氏功臣祠于廟廷大魏元功之臣功勳優著終始休明者其皆依禮祀之魏志明帝紀注引魏書詔有司議中山王衮犯禁王素敬慎邂逅至此其以議親之典議之魏志中山恭王袞傳詔何楨揚州別駕合楨有文章才試使作許都賦成上不封得令人見御覽五百八十七引文士傳禁淫祀詔郡國山川不在祀典者勿祠宋書禮志四通典五十五減鞭杖之制詔鞭作官刑所以糾慢怠也而頃多以無辜死其減鞭杖之制著于令魏志明帝紀諡山陽公為孝獻皇帝詔蓋五帝之事尚矣仲尼盛稱堯舜巍巍蕩蕩之功者以為禪代乃大聖之懿事也山陽公深識天祿永終之運禪位文皇帝以順天命先帝命公行漢正朔郊天祀祖以天子之禮言事不稱臣此舜事堯之義也昔放勛殂落四海如喪考妣遏密八音明喪葬之禮同于王者也今有司奏喪禮比諸侯王此豈古之遺制而先帝之至意哉今諡公漢孝獻皇帝魏志明帝紀注引獻帝傳入賈逵祠詔昨過項見賈逵碑像念之愴然古人有言患名之不立不思年之不長逵存有忠勳沒而見思可謂死而不朽者矣其布告天下以勸將來魏志賈逵傳詔下司空征南將軍帶金紫都督使位高任重近者正朝乃與卿校同執羔非也自今以後從特進應奉璧者如故事通典七十五皇后崩稱大行詔稱大行者所以別存亡之號故事已然今當如林議稱大行通典七十九文德郭后崩侍中蘇林議宜稱大行報孫禮詔敬納讜言促遣民作魏志孫禮傳詔衛臻殿舍不成吾所留心卿推之何魏志衛臻傳幸許昌還詔吾省與僕射何異魏志徐宣傳宣下靈命瑞圖詔張掖郡玄川溢涌激波奮蕩寶石負圖狀像靈龜宅于川西嶷然磐峙倉質素章麟鳳龍馬煥炳成形文字告命粲然著明魏志管寧傳議獄從寬簡詔有虞氏畫象而民弗犯周人刑錯而不用朕從百王之末追望上世之風邈乎何相去之遠法令滋章犯者彌多刑罰愈衆而姦不可止往者案大辟之條多所蠲除思濟生民之命此朕之至意也而郡國蔽獄一歲之中尚過數百豈朕訓導不醇俾民輕罪將苛法猶存為之陷穽乎有司其議獄緩死務從寬簡及乞恩者或辭未出而獄以報斷非所以究理盡情也其令廷尉及天下獄官諸有死罪具獄以定非謀反及手殺人亟語其親治有乞恩者使與奏當文書俱上朕將思所以全之其布告天下使明朕意魏志明帝紀選舉詔欲得有才智文章謀慮淵深料遠若近視昧而察籌不虛運策弗徒發端一小心清修密靜乾乾不解志尚在公者無限年齒勿拘貴賤卿校已上各舉一人魏志王昶傳贈諡徐宣詔宣體履至實直內方外歷在三朝公亮正色有託孤寄命之節可謂柱石臣也常欲倚以台輔未及登之惜乎大命不永其追贈車騎將軍葬如公禮諡曰貞侯魏志徐宣傳詔問程喜問青州刺史程喜寧為守節高乎審老疾尪頓邪魏志管寧傳收考解弘詔汝非曾閔何言毀邪促收考竟魏志高柔傳原解弘詔孝哉弘也其原之魏志高柔傳
