body:
  text: 華核車賦鞍罽緝裘珠輪玉光初學記二十五奏薦陸胤胤天姿聰朗才通行潔昔歷選曹遺迹可紀還在交州奉宣朝恩流民歸附海隅肅清蒼梧南海歲有舊風障氣之害風則折木飛砂轉石氣則霧鬱飛鳥不經自胤至州風氣絶息商旅平行民無疾疫田稼豐稔州治臨海海流秋鹹胤又畜水民得甘食惠風橫被化感人神遂憑天威招合遺散至被詔書當出民感其恩以忘戀土負老攜幼甘心景從衆無攜二不煩兵衛自諸將合衆皆脅之以威未有如胤結以恩信者也銜命在州十有餘年賓帶殊俗寶玩所生而內無粉黛附珠之妾家無文甲犀象之珍方之今臣實難多得宜在輦轂股肱王室以贊唐虞康哉之頌江邊任輕不盡其才虎林選督堪之者衆若召還都寵以上司則天工畢修庶績咸熙矣吳志陸凱附傳表薦陸褘褘體質方剛器幹強固董率之才魯肅不過及被召當下徑還赴都道由武昌曾不回顧器械軍資一無所取在戎果毅臨財有節夫夏口賊之衝要宜選名將以鎮戍之臣竊思惟莫善於褘吳志陸凱附傳聞蜀亡詣宮門上表間聞賊衆蟻聚向西境西境艱險謂當無虞定聞陸抗表至成都不守臣主播越社稷傾覆昔衛為翟所滅而桓公存之今道里長遠不可救振失委附之土棄貢獻之國臣以草芥竊懷不寧陛下聖仁恩澤遠撫卒聞如此必垂哀悼臣不勝忡悵之情謹拜表以聞吳志華核表表今雖遣大夫循行風俗銜命糾察黜陟為名揚虎視之威厲秋鷹之爪然其人或畏威結舌未肯言人短也北堂書鈔四十諫吳主皓盛夏興工疏臣聞漢文之世九州晏然秦民喜去慘毒之苛政歸劉氏之寬仁省役約法與之更始分王子弟以蕃漢室當此之時皆以為泰山之安無窮之基也至於賈誼獨以為可痛哭及流涕者三可為長歎息者六乃曰當今之勢何異抱火於積薪之下而寢其上火未及然而謂之安其後變亂皆如其言臣雖下愚不識大倫竊以曩時之事揆今之勢誼云復數年間諸王方剛漢之傅相稱疾罷歸欲以此為治雖堯舜不能安今大敵據九州之地有大半之衆習攻戰之餘術乘戎馬之舊勢欲與中國爭相吞之計其猶楚漢勢不兩立非徒漢之諸王淮南濟北而已誼之所欲痛哭比今為緩抱火臥薪之喻於今而急大皇帝覽前代之如彼察今勢之如此故廣開農桑之業積不訾之儲恤民重役務養戰士是以大小感恩各思竭命期運未至早棄萬國自是之後強臣專政上詭天時下違衆議忘安存之本邀一時之利數興軍旅傾竭府藏兵勞民困無時獲安今之存者乃創夷之遺衆哀苦之餘民耳遂使軍資空匱倉廩不實布帛之賜寒暑不周重以失業家戶不贍而北積穀養民專心東向無復他警蜀為西藩土地險固加承先主統御之術謂其守御足以長久不圖一朝奄至傾覆脣亡齒寒古人所懼交州諸郡國之南土交址九真二郡己沒日南孤危存亡難保合浦以北民皆搖動因連避役多有離叛而備戌減少威鎮轉輕常恐呼吸復有變故昔海虜窺窬東縣多得離民地習海行狃於往年鈔盜無日今胸背有嫌首尾多難乃國朝之厄會也誠宜住建立之役先備豫之計勉墾殖之業為飢乏之救惟恐農時將過東作向晚有事之日整嚴未辨若舍此急盡力功作卒有風塵不虞之變當委版築之役應烽燧之急驅怨苦之衆赴白刃之難此乃大敵所因為資也如但固守曠日持久則軍糧必乏不待接刃而戰士已困矣昔太戊之時桑穀生庭懼而修德怪消殷興熒惑守心宋以為災景公下從瞽史之言而熒惑退舍景公延年夫修德於身而感異類言發於口而通神明臣以愚蔽誤忝近署不能翼宣仁澤以感靈祇仰慚依愧無所投處退伏思惟熒惑桑穀之異天示二主至如他餘錙介之妖近是門庭小神所為驗之天地無有他變而徵祥符瑞前後屢臻明珠既覿白雀繼見萬億之祚實靈所挺以九域為宅天下為家不與編戶之民轉徙同也又今之宮室先帝所營卜土立基非為不祥又楊市土地與宮連接若大功畢竟輿駕遷住門行之神皆當轉移猶恐長久未必勝舊屢遷不可留則有嫌此乃愚臣所以夙夜為憂灼也臣省月令季夏之月不可以興土功不可以會諸侯不可以起兵動衆舉大事必有天殃今雖諸侯不會諸侯之軍與會無異六月戊己土行正王既不可犯加又農月時不可失昔魯隱公夏城中丘春秋書之垂為後戒今築宮為長世之洪基而犯天地之大禁襲春秋之所書廢敬授之上務臣以愚管竊所未安又恐所召離民或有不至討之則廢役興事不討日月滋慢若悉並到大衆聚會希無疾病且人心安則念善苦則怨叛江南精兵北土所難欲以十卒當東一人天下未定深可憂惜之如此宮成死叛五千則北軍之衆更增五萬若到萬人則倍益十萬病者有死亡之損叛者傳不善之語此乃大敵所以歡喜也今當角力中原以定強弱正於際會彼益我損加以勞困此乃雄夫智士所以深憂臣聞先王治國無三年之儲曰國非其國安寧之世戒備如此況敵強大而忽農忘畜今雖頗種殖間者大水沈沒其餘存者當須耘獲而長吏怖期上方諸郡身涉山林盡力伐材廢農棄務士民妻孥羸小墾殖又薄若有水旱則永無所獲州郡見米當待有事𤕠食之衆仰官供濟若上下空乏運漕不供而北敵犯疆使周召更生良平復出不能為陛下計明矣臣聞君明者臣忠主聖者臣直是以慺慺昧犯天威乞垂哀省吳志華核傳上務農禁侈疏今寇虜充斥征伐未已居無積年之儲出無應敵之畜此乃有國者所宜憂也夫財穀所生當出於民趨時務農國之上急而都下諸官所掌別異各自下調不計民力輒與近期長吏畏罪晝夜催民委舍佃事遑赴會日定送到都或蘊積不用而徒使百姓消力失時到秋收月督其限入奪其播殖之時而責其今年之稅如有逋懸則籍沒財物故家戶貧困衣食不足宜暫息衆役專心農桑古人稱一夫不耕或受其飢一女不織或受其寒是以先王治國惟農是務軍興以來已向百載農人廢南畝之務女工停機杼之業推此揆之則蔬食而長飢薄衣而履冰者固不少矣臣聞主之所求于民者二民之所望于主者三二謂求其為已勞也求其為已死也三謂飢者能食之勞者能息之有功者能賞之民以致其二事而主失其三望者則怨心生而功不建今帑藏不實民勞役猥主之二求已備民之三望未報且飢者不待美饌而後飽寒者不俟狐貉而後溫為味者口之奇文繡者身之飾也今事多而役繁民貧而俗奢百工作無用之器婦人為綺靡之飾不勤麻枲並繡文繡黻轉相倣效恥獨無有兵民之家猶復逐俗內無擔石之儲而出有繌綺之服至於富賈商販之家重以金銀奢恣尤甚天下未平百姓不贍宜一生民之原豐穀帛之業而棄功于浮華之巧妨日於侈靡之事上無尊卑等級之差下有耗財費力之損今吏士之家少無子女多者三四少者一二通令戶有一女十萬家則十萬人人織績一歲一束則十萬束矣使四疆之內且心戮力數年之間布帛必積恣民五色惟所服用但禁綺繡無益之飾足美貌者不待華采以崇好豔姿者不待文綺以致愛五采之飾足以麗矣若極粉黛窮盛服未必無醜婦廢華采去文繡未必無美人也若實如論有之無益廢之無損者何愛而不暫禁以充府藏之急乎此救乏之上務富國之本業也使管晏復生無以易此漢之文景承平繼統天下己定四方無虞猶以雕文之傷農事錦繡之害女工開富國之利杜飢寒之本況今六合分乖豺狼充路兵不離疆甲不釋帶而可以不廣生財之原充府藏之積哉吳志華核傳乞赦樓玄疏臣竊以治國之體其猶治家主田野者皆宜良信又宜得一人總其條目為作綱維衆事乃理論語曰無為而治者其舜也與恭己正南面而已言所任得其人故優遊而自逸也今海內未定天下多事事無大小皆當關聞動經御坐勞損聖慮陛下既垂意博古綜極藝文加勤心好道隨節致氣宜得間靜以展神思呼翕清淳與天同極臣夙夜思惟諸吏之中任幹之事足委杖者無勝於樓玄玄清忠奉公冠冕當世衆服其操無與爭先夫清者則心平而意直忠者惟正道而履之如玄之性終始可保乞陛下赦玄前愆使得自新擢之宰司責其後效使為官擇人隨才授任則舜之恭己近亦可得吳志樓玄傅上疏請召還薛塋臣聞五帝三王皆立史官敘録功美垂之無窮漢時司馬遷班固咸命世大才所撰精妙與六經俱傳大吳受命建國南土大皇帝末年命太史令丁孚郎中項峻始撰吳書孚峻俱非史才其所撰作不足紀録至少帝時更差韋曜周昭嶭瑩梁廣及臣五人訪求往事所共撰立備有本末昭廣先亡曜負恩蹈罪瑩出為將復以過徙其書遂委滯迄今未撰奏臣愚淺少劣適可為瑩等記注而己若使撰合必襲孚峻之迹懼墜大皇帝之元功損當世之盛美瑩涉學既博文章尤妙同寮之中瑩為冠首今者見吏雖多經學記述之才如瑩者少是以慺慺為國惜之實欲使卒垂成之功編於前史之末奏上之後退填溝壑無所復恨吳志薛綜傳皓下瑩獄徙廣州右國史華核上疏云云上疏救韋曜曜運值千載特蒙哀識以其儒學得與史官貂蟬內侍承合天問聖朝仁篤慎終追遠迎神之際垂涕敕曜曜愚惑不達不能敷宣陛下大舜之美而拘擊史官使聖趣不敘至行不彰實曜愚蔽當死之罪然臣慺慺見曜自少勤學雖老不倦探綜墳典溫故知新及意所經識古今行事外吏之中少過曜者昔李陵為漢將軍敗不還而降胸奴司馬遷不加疾惡為陵遊説漢武帝以遷有良史之才欲使畢成所撰忍不加誅書卒成立垂之無窮今曜在吳亦漢之史遷也伏見前後符瑞彰著神指天應繼見纍見一統之期庶不復久事平之後當觀時設制三王不相因禮五帝不相浴樂質文殊塗損益異體宜曜輩依準古義有所改立漢氏承秦則有叔孫通定一代之儀曜之才學亦漢通之次也又吳書雖已有頭角敘贊未述昔班固作漢書文辭典雅後劉珍劉毅等作漢記遠不及固敘傳尤劣今吳書當垂千載編次詣史後之才士論次善惡非得良少如曜者實不可使闕不朽之書如臣頑蔽誠非其人曜年己七十餘數無幾乞赦其一等之罪為終身徒使成書業永足傳示垂之百世謹通進表叩碩百下吳志韋曜傳奉敕草對咨核小臣草芥凡庸遭眷值聖受恩特隆越從朽壤蟬蛻朝中熙光紫闥青璅是憑毖挹清露沐浴凱風效無絲氂負闕山崇滋潤含垢恩貸纍重穢質被榮局命得融欲報罔極委之皇穹聖恩雨注哀棄其尤猥命草對潤被下愚不敢違敕懼速罪誅冒承詔命魂逝形留吳志華核傳上言臣象言頑暗空薄加以年老凡百乖穢無所聞宜特蒙哀傷殊異之遇安感騎乘之歡遊息之燕淳和足使忘軀命榮觀足以光心膂延望翹翹念在效報而蕭走垂須終何才力以答新恩唯尚有借近趙走文過首貧尚尋夭恩智方當私成無往顏愛自彌文唯淳化閣帖二書想必醉令作醴梅相待御覽八百六十一與友人論草書欲見草書宜得精毫𠤦筆委曲宛轉不叛散者紙當得滑密不粘污者墨又須多膠紺黝者如逸豫之餘手調適而心佳娛可以小展尺書太子屏風在此己久而未得之廣川書跋詣吏自列不白妖言事出於已非府君罪吳志孫皓傳鳳皇三年會稽妖言章安侯奮當為天子臨海太守奚熙輿會稽太守郭誕書非論國政誕但白熙書不白妖言注引會稽邵氏家傳曰邵疇為誕功曹誕被收惶遽無以自明遂詣吏自列臨亡置辭疇生長邊陲不間教道得以門資廁身本郡踰越儕類位極朝右不能贊揚盛化養之以福今妖訛橫興干國亂紀疇以噂誻之語本非事實雖家誦人詠不足有慮天下重器而匹橫議疾其醜聲不忍聞見欲含垢藏疾不彰之翰筆鎮躁歸靜使之自息愚心勤勤每執斯旨故誕屈其所是默以見從此之為愆實由於疇謹不敢逃死歸罪有司唯乞天鑒特垂清察吳志孫皓傳注引邵氏家傳疇詣吏自列自殺以證之臨亡置辭貝南州異物志贊乃有大貝奇姿難儔素質紫飾文若羅朱不磨不瑩彩輝光浮思雕莫加欲琢靡踰在昔姬伯用免其拘御覽八百七犀獸曰玄犀處自林麓食唯棘刺體兼五肉或有神異表露以角含精吐烈望如華燭置之荒野禽獸莫觸藝文類聚九十五御覽八百九十象象之為獸形體特詭身倍數牛目不逾狶鼻為口役望頭若尾馴良承教聽言則跪素牙玉潔載籍所美服重致遠行若丘徙御覽八百九十八上疏呈木柿晉必有攻吳之計宜增建平兵建平不下終不敢渡晉書王濬傳與伍延書北來諸軍乃飛度江也晉書杜預傳通典一百五十三上吳主皓表若用俶為司直有罪乞不從坐吳志孫皓傳天紀元年注引江表傳親蠶賦體龍頸而驥啄邁皎素於羔羊御覽八百二十五后課功以觀匿均衆寡而抽稅令織綖於命婦供禘郊之舊制洪恩美而周普配春天之略福揚黼黻之奇藻播朱紫之豔色初學記十四琴賦乃從容以旁眺覩美材於山陽上森蕭以崇立下婆娑而四張北堂書鈔一百九嗟雅弄之淳妙時緬邈以超倫同上汝南鹿鳴張女尋彈文選笙賦注羽扇賦惟羽扇之攸興乃鳴鴻之嘉容産九皋之中澤邁雍階之天聰表高義於大易著詩人之雅章藾茲翮以內飛曜羽儀於外揚於時祝融持運朱明發揮奔陽衝布飛炎赫曦同熅隆於雲漢咸慘毒於中懷爾乃登爽塏臨甘泉漱清流廕玄雲運輕融以容與激清風於自然披綃衽而入懷飛羅纓之繽紛衆坐侃以怡懌咸付節以齊歡感蕙風之蕩懷詠棘心之所歎於是暑氣云消獻酬乃設停神靜思且以永日妍羽詳回清風盈室動靜揚暉嘉好越逸翻翻奕奕飛景曜日同皎素於凝霜豈振鷺之能匹藝文類聚六十九芙蓉賦川源清徹羡溢中塘芙蓉豐植彌被大澤朱儀榮藻有逸目之觀初學記二十七引閔鴻蓮華賦序乃有芙蓉靈草載育中川竦修幹以淩波建緑葉之規圓灼若夜光之在玄岫赤若大陽之映朝雲乃有陽文修嫮傾城之色揚桂枻而來遊玩英華于水側納嘉實兮傾筐珥紅葩以為飾咸桃夭而歌詩申關睢以自敕嗟留夷與蘭芷聽鶗鴦而不鳴嘉芙蓉之殊偉託皇居以發英藝文類聚八十二與劉子雅書若能控奔驥以接駑乘則力追者萬群傾修翅以顧短翮則歸飛者如雲御覽三百五十六
