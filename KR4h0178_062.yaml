body:
  text: 楊儀與費禕書公亡際吾當舉軍降魏處世寧當落度如此邪令人悔不可追華陽國志七薦董允表允內侍歷年翼贊王室宜賜爵土以褒勳勞蜀志董允傳承命上疏芟穢弭難臣職是掌自臣奉辭漢中已經六年臣既暗弱加嬰疾疢規方無成夙夜憂慘今魏跨帶九州根蒂滋蔓平除未易若東西并力首尾掎角雖未能速得如志且當分裂蠶食先摧其支黨然吳期二三連不克果俯仰惟艱實忘寢食輒與費褘等議以涼州胡塞之要進退有資賊之所惜且羌胡乃心思漢如渴又昔偏軍入羌郭淮破走算其長短以為事首宜以姜維為涼州刺史若維征行銜持河右臣當帥軍為維鎮繼今涪水陸四通惟急是應若東北有虞赴之不難蜀志蔣琬傳又見華陽國志七答鍾會書知惟臭味意眷之隆雅託通流未拒來謂也亡考昔遭疾疢亡于涪縣卜云其吉遂安厝之知君西邁乃欲屈駕修敬墳墓視豫猶父顏子之仁也聞命感愴以增情思蜀志蔣琬傳諫漢中王稱尊號疏殿下以曹操父子逼主篡位故乃羈旅萬里糾合士衆將以討賊今大敵未克而先自立恐人心疑惑昔高祖與楚約先破秦者王及屠咸陽獲子嬰猶懷推讓況今殿下未出門庭便欲自立邪愚臣誠不為殿下取也蜀志費詩傳又見華陽國志六答雍闓檄天降喪亂奸雄乘釁天下切齒萬國悲悼臣妾大小莫不思竭筋力肝腦塗地以除國難伏惟將軍世受漢恩以為當躬聚黨衆率先啓行上以報國家下不負先人書功竹帛遺名千載何期臣僕吳越背本就末乎昔舜勤民事隕于蒼悟書籍嘉之流聲無窮崩于江浦何足可悲文武受命成王乃平先帝龍興海內望風宰臣聰睿自天降康而將軍不覩盛衰之紀成敗之符譬如野火在原蹈履河冰火滅冰泮將何所依附曩者將軍先君雍侯造怨而封竇融知興歸志世祖皆流名後葉世歌其美今諸葛丞相英才挺出深覩未萌受遺託孤翊贊季興與衆無忌録功忘瑕將軍若能翻然改圖易跡更步古人不難追鄙土何足宰哉蓋聞楚國不恭齊桓是責夫差僭號晉人不長況臣于非主誰肯歸之邪竊惟古義臣無越境之交是以前後有來無往重承告示發憤忘食故略陳所懷惟將軍察焉蜀志呂凱傳甲乙論甲以為曹爽兄弟凡品庸人苟以宗子枝屬得蒙顧命之任而驕奢僭逸交非其人私樹朋黨謀以亂國懿奮誅討一朝殄盡此所以稱其任副士民之望也乙以為懿感曹仲附己不一豈爽與相干事勢不專以此陰成疵瑕初無忠告侃爾之訓一朝屠戮讒其不意豈大人經國篤本之事乎若爽信有謀主之心大逆己搆而發兵之日更以芳委爽兄弟懿父子從後閉門舉兵蹙而向芳必無悉有脫字寧忠臣為君深慮之謂乎以此推之爽無大惡明矣若懿以爽奢僭廢之刑之可也滅其尺口被以不義絶子丹血食及何晏子魏之親甥亦與同戮為僭濫不當矣蜀志費褘傳注引殷基通語戒費禕書昔岑彭率師來歙杖節咸見害于刺客今明將軍位尊權重宜鑒前事少以為警蜀志張嶷傳與諸葛瞻書東主初崩帝實幼弱太傅受寄託之重亦何容易親以周公之才猶有管蔡流言之變霍光受任亦有燕蓋上官逆亂之謀賴成昭之明以免斯難耳昔每聞東主殺生賞罰不牟下人又今以垂沒之命卒召太傅屬以後事誠實可慮加吳楚剽急乃昔所記而太傅離少主履敵庭恐非良計長算之術也雖云東家綱紀肅然上下輯睦百有一失非明者之慮邪取古則今今則古也自非郎君進忠言于太傅誰復有盡言者也旋軍廣農務行德惠數年之中東西竝舉實為不晚願深採察蜀志張嶷傳表後主聞鍾會治兵關中欲規進取宜竝遣張翼廖化督諸軍分護陽安關口陰平橋頭以防未然蜀志姜維傳密書通後主願陛下忍數日之辱臣欲使社稷危而復安日月幽而復明華陽國志士欲僞服事鍾會因殺之以復蜀土蜀志姜維傳注引晉陽秋密與劉禪表疏云云議諡趙雲雲昔從先帝勞績既著經營天下遵奉法度功效可書當陽之役義貫金石忠以衛上君念其賞禮以厚下臣忘其死死者有知足以不朽生者感恩足以殞身謹案諡法柔賢慈惠曰順執事有班曰平克定禍亂曰平應諡雲曰順平侯蜀志趙雲傳注引雲別傳建議殄敵錯守諸圍雖合周易重門之義然適可禦敵不獲大利不若使聞敵至諸圍皆斂兵聚穀退就漢樂二城使敵不得入平且重關鎮守以捍之有事之日令游軍竝進以伺其虛敵攻關不克野無散穀千里縣糧自然疲乏引退之日然後諸城竝出與游軍并力搏之此殄敵之術也蜀志姜維傳報母書良田百頃不計一畝但見遠志無有當歸晉書五行志中又御覽三百十引孫盛雜記又九百八十九引孫盛異同評蒲元傳君性多奇思于斜谷為諸葛亮鑄刀三千口刀成自言漢水鈍弱不任淬用蜀江爽烈是謂大金之元精天分其野乃命人于成都取江水君以淬刀言雜涪水不可用取水者捍言不雜君以刀畫水言雜八升取水者叩頭云于涪津覆水遂以泣水八升益之以竹筒內鐵珠滿中舉刀斷之應手虛落因曰神刀今屈耳環者乃是其遺範藝文類聚六十蒲元別傳君性多奇思得之天然鼻類之事出若神不嘗見鍛功忽于斜谷為諸葛亮鑄刀三千口鎔金造器特異常法刀成白言漢水鈍弱不任淬用蜀江爽烈是謂大金之元精天分其野乃命人于成都取之有一人前至君以淬刀言雜涪水不可用取水者猶悍言不雜君以刀畫水云雜八升何故言不雜取水者方叩首伏云實于涪津渡負倒覆水懼怖遂以涪水八升益之于是咸共驚服稱為神妙刀成以竹筒密內鐵珠滿其中舉刀斷之應手靈落若剃生芻故稱絶當世因曰神刀今之屈耳環者是其遺範也御覽三百四十五與丞相諸葛亮牒元等輒率雅意作一木牛廉仰雙轘人行六尺牛行四步人載一歲之糧也北堂書鈔六十八掾篇引蒲元別傳元牒與亮請于沔陽立諸葛亮廟表臣聞周人懷召伯之德甘棠為之不伐越王思范蠡之功鑄金以存其像自漢興以來小善小德而圖形立廟者多矣況亮德範遐邇勳蓋季世興王室之不壞實斯人是賴而蒸嘗止于私門廟像闕而莫立使百姓巷祭戎夷野祀非所以存德念功述追在昔者也今若盡順民心則瀆而無典建之京師又逼宗廟此聖懷所以惟疑也臣愚以為宜因近其墓立之于沔陽使所親屬以時賜祭凡其臣故吏欲奉祠者皆限至廟斷其私祀以崇正禮蜀志諸葛亮傳注引襄陽記又見宋書禮志四水經注沔水上案此事在景耀六年季漢輔臣贊昔文王歌德武王歌興夫命世之主樹身行道非唯一時亦由開基植緒光于來世者也自我中漢之末王綱棄柄雄豪竝起役殷難結生人塗地于是世主感而慮之初自燕代則仁聲洽著行自齊魯則英風播流寄業荊郢則臣主歸心顧援吳越則賢愚賴風奮威巴蜀則萬里肅震厲師庸漢則元寇斂迹故能承高祖之始兆復皇漢之宗祀也然而姦凶懟險天征未加猶孟津之翔師復須戰于鳴條也天祿有終奄忽不豫雖攝歸一統萬國合從者當時俊乂扶攜翼戴明德之所懷致也蓋濟濟有可觀焉遂乃竝述休風動于後聽其辭曰皇帝遺植爰滋八方別自中山靈精是鍾順期挺生傑起龍驤始于燕代伯豫君荊吳越憑賴望風請盟挾巴跨蜀庸漢以并乾坤復秩宗祀惟寧躡基履迹播德芳聲華夏思美西伯其音開慶來世歷載攸興贊昭烈皇帝忠武英高獻策江濱攀吳連蜀權我世真受遺阿衡整武齊文敷陳德教理物移風賢愚競心僉忘其身誕靜邦內四裔以綏屢臨敵庭實耀其威研精大國恨于未夷贊諸葛丞相司徒清風是咨是臧識愛人倫孔音鏘鏘贊許司徒關張赳赳出身匡世扶翼攜上雄壯虎烈藩屏左右翻飛靈發濟于艱難贊主洪業侔迹韓耿齊聲雙德交待無禮竝致姦慝悼惟輕慮隕身匡國贊關雲長張益德驃騎奮起連橫合從首事三秦保據河潼宗計于朝或異或同敵以乘釁家破軍亡乖道反德託鳳攀龍贊馬孟起翼侯良謀料世興衰委質于主是訓是咨暫思經算覩事知機贊法孝直軍師美至雅氣曄曄致命明主忠情發臆惟此義宗亡身報德贊龐士元將軍敦壯摧鋒登難立功立事于時之幹贊黃漢升掌軍清節亢然恆常讜言惟司民思其綱贊董幼宰安遠彊志允休允烈輕財果壯當難不惑以少禦多殊方保業贊鄧孔山揚威才幹欷歔文武當官理任衎衎辨舉圖殖財施有義有敘贊費賓伯屯騎主舊固節不移既就初命盡心世規軍資所恃是辨是裨贊王文儀尚書清尚敕行整身抗志存義味覽典文倚其高風好侔古人贊劉子初安漢雍容或昏或賓見禮當時是謂循臣贊糜子仲少府修慎鴻臚明真諫議隱行儒林天文宣班大化或首或林贊王元泰何彥英杜輔國周仲宣車騎高徑惟其泛愛以弱制強不陷危墜贊吳子遠安漢宰南奮擊舊鄉翦除蕪穢惟刑以張廣遷蠻濮國用用強贊李德昂輔漢惟聰既機且惠因言遠思切問近對贊時休美和戎業世贊張君嗣鎮北敏思籌畫有方導師禳穢遂事成章偏任東隅永命不祥哀悲本志放流殊疆贊黃公衡越騎惟忠厲志自祗職于內外念公忘私贊楊季休征南厚重征西忠克統時選士猛將之烈贊趙子龍陳叔至鎮南粗強監軍尚篤竝豫戎任任自封裔贊輔元弼劉南和司農性才敷述允章藻麗辭理斐奜有光贊秦子敕正方受遺豫聞後綱不陳不僉造此異端斥逐當時任業以喪贊李正方文長剛粗臨難受命折衝外禦鎮保國境不協不和忘節言亂疾終惜始實惟厥性贊魏文長威公狷狹取異衆人間則及理逼則傷侵舍順人凶大易之云贊楊威公季常良實文經勤類士元言規處仁聞計孔休文祥或才或臧播播述志楚之蘭芳贊馬季常衛文經韓士元張處仁殷孔休習文祥國山休風永南耽思盛衡承伯言藏言時孫德果鋭偉南篤常德緒義彊志壯氣剛濟濟修志蜀之芬香贊王國出李永南馬盛衡馬承伯李孫德李偉南龔德緒土義彊休元輕寇損時致害文進奮身同此顛沛患生一人至于弘大贊馮休元張文進江陽剛烈立節明君兵合遇寇不屈其身單夫隻役隕命于君贊程李然公弘後生卓爾奇精夭命二十悼恨未呈贊程公弘古之奔臣禮有來逼怨興司官不顧大德靡有匡救倍成奔北自絶于人作笑二國贊糜芳士仁郝普潘濬蜀志楊戲傳答李嚴蓋聞天無二日土無二王今天下鼎立正朔有三是以遠人惶惑不知所歸也蜀志呂凱傳又見華陽國志四與此小異假鬼教張府君如瓠壼外雖澤而內實粗不足殺令縛與吳蜀志張裔傳又見華陽國志四與此小異劉琰遣婦事議劉琰遣婦事議卒非撾妻之人面非受履之地蜀志劉琰傳有司議
