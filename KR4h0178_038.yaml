body:
  text: 繆襲喜霽賦嗟四時之平分兮何陰陽之不均當夏至之句萌兮或旱乾以歷旬既麰麥之方登兮洎注潦以成川忍下民之昏墊兮棄嘉穀于中田倬彼昊天兮旁魄后土育我黎苗兮降之伊祜既垂曜于辰角兮申勸之以九鳸何災沴之無常兮曾粢盛之弗顧覽唐氏之洪流兮悵侘傺以長懷日黃昏而不寐兮思達曙以獨哀白日時其浩旭兮雲滃勃而交回雷隱隱而震其響兮雨霖霖而又隤察長霤之潺湲兮若龍門之未開賴我后之明聖兮獨克躬而罪己發一言而感靈兮人靡食其何恃咨天鑒之遄速兮猶影響之未彰屯玄雲以東徂兮扇凱風以南翔穹蒼皎其呈色兮羲和粲以揚光農夫欣以斂川田畯耕于封疆初學記二霽晴八藉田賦詔句芒使掌厤兮敕羲仲以農期儀晨祥而舉趾兮樂田祖以豳詩嘉載芟之千祿兮美振古之如茲初學記十四靈旗蔚以壽奡兮雄戟偈以嵯峨彎枉矢于狼弧兮建黃鏚于瓠瓜御覽三百三十九許昌宮賦序太和六年春上既躬耕帝藉發趾乎千畝以帥先萬國乃命群牧守相述職班教順陽宣化烝黎允示訓德歌功觀事樂業是歲甘露降黃龍見海內有克捷之師方內有農穰之慶農有餘粟女有餘布選秋來享殊俗內附穆乎有太平之風御覽五百三十七嘉夢賦心灼爍其如陽不識道之焉如文選沈約別范安成詩注青龍賦蓋青龍者火辰之精木官之瑞蓺文類聚九十六懿矣神龍其知惟時覽皇代之云為襲九泉以潛處當仁聖而覿儀應令月之風律照嘉祥之赫戲敷華耀之珍體燿文采以陸離曠時代以稀出觀四靈而特奇是以見之者驚駭聞之者崩馳觀夫仙龍之為形也蓋鴻洞輪碩豐盈修長容姿溫潤蜲蜿成章繁虵虯蟉不可度量遠而視之似朝日之陽邇而察之象列缺之光爚若鑒陽和映瑤瓊㬣若望飛雲曳旗旌或蒙翠岱或類流星或如虹蜺之垂耀或似紅蘭之芳榮煥璘彬之瑰異實皇家之休靈奉陽春而介福賚乃國以嘉禎初學記三十撰上仲長統昌言表統字公理少好學博涉書記贍于文辭年二十餘游學青徐并冀之閒與交者多異之并州刺史高幹素貴有名招致四方游士士多歸焉統過幹幹善待遇之訪以世事統謂幹曰君有雄志而無雄才好士而不能擇人所以為君深戒也幹雅自多不納統言統去之無幾而幹敗并冀之士以是識統大司農常林與統共在上黨為臣道統性倜儻敢直言不矜小節每列郡命召輒稱疾不就默語無常時人或謂之狂漢帝在許尚書令荀彧領典樞機好士愛奇聞統名啟召以為尚書郎後參太祖軍事還復為郎廷康元年卒時年四十餘統每論說古今世俗行事發憤歎息輒以為論名曰昌言凡三十四篇魏志劉劭傳注案後漢書仲長統傳云東海繆襲常稱統才章足繼西京董賈劉揚當亦表中語奏對詔問外祖母服漢舊云何後漢鄧太后新野君薨時安帝服緦百官素服安帝繼和帝後鄧太后母即為外祖母也但太后臨朝安帝自蕃見援立故也又案後漢壽張恭侯樊宏以光祿大夫薨宏即光武之舅也親臨喪葬準前代宜尚書侍中以下弔祭送葬通典八十一奏改安世哥為享神哥安世哥本漢時哥名今詩哥非往詩之文則宜變改案周禮注云安世樂猶周房中之樂也是以往昔議者以房中哥后妃之德所以風天下正夫婦宜改安世之名曰正始之樂自魏國初建故侍中王粲所作登哥安世詩專以思詠神靈及說神靈鑒享之意襲後又依哥省讀漢安世哥詠亦說高張四縣神來燕享嘉薦令儀永受厥福無有二南后妃風化天下之言今思惟往者謂房中為后妃之哥者恐失其意方祭祀娛神登堂哥先祖功德下堂哥詠燕享無事哥后妃之化也自宜依其事以名其樂哥改安世哥曰享神哥宋書樂志一又通典一百四十一奏文昭皇后廟樂文昭皇后廟置四縣之樂當銘顯其均奏次第依太祖廟之名號曰昭廟之具樂宋書樂志一通典一百四十七樂舞議周禮以六律六同五聲八音六舞大合樂以致鬼神今之樂官徒知古有此制莫有明者後魏書樂志周存六代之樂故各有所用今樂制既亡唯承漢氏韶武魏承舜又周為二王之統故文始大武武德武始大鈞可以備四代之樂奏黃鍾舞文始以禮天地奏太簇舞大武以祀五郊明堂奏姑洗舞武德巡狩以祭四望山川奏蕤賓舞武始大鈞以祀宗廟及二至祀丘澤于祭可兼舞四代又漢有雲翹育命之舞不知所出舊以祀天今可兼以雲翹祀圓丘兼以育命祀方澤配天地宜宮懸如延年議後魏書樂志通典一百四十七又續漢祭祀志中注引末七句處士君號諡議元者一也首也氣之初也是以周文演易以冠四德仲尼作春秋以統三正又諡法曰行義悅人曰元尊仁貴德曰元處士君宜追加諡號曰元皇通典七十二皇后銘旌議自殷以前復與銘旌皆書姓男名女字無書國者周之復天王稱天子諸侯稱某甫秦漢皇帝皇后太后復書銘置之柩也舊禮書銘皆不書國號后亦不書氏魏為天下之號無所復別臣子所以稱魏故某侯某者皆以自別耳明太后不宜復稱魏案左氏云天王崩不言周通典八十四神芝贊青龍元年五月庚辰神芝產于長平之習陽許昌典農中郎將蔣充奉表以聞其色丹紫其質光耀其長尺有八寸五分其本圍三寸有三分上別為三幹分為九枝散為三十六莖圍則一寸九分葉徑二寸七分其幹委綏洪纖連屬有似珊瑚之形其吐柯載葉祥明蠲絜攷圖案諜蓋美乎所同于前代者矣古瑞命記曰王者慈仁則芝生採食之則延年不終與真人同又神農氏論芝云山川雲雨五行四時陰陽晝夜之精以生五色神芝皆為聖王休祥焉自漢孝武顯宗世號隆盛而元封永平所紀神芝方斯蔑如也且其枝幹條莖本末相承乃協于天官之數非神明其孰能如此哉推其類象則蓂莢之植階庭萐蒲之生庖廚視四靈矣乃詔御府匱而藏之且盡其形遂以名園為之贊曰帝德允臻廚不難致煌煌神芝吐葩揚榮曩披其圖今握其形永章遐紀載之頌聲蓺文類聚九十八御覽八百七十三九百八十六祭儀夏祀以蒸餅御覽八百六十夏祀調和羹芼以葵秋祀調和羹芼以蔥春祀調和羹芼以韭書鈔一百四十四御覽八百六十一九百七十七九百七十九譏許由潛居默靜隱于箕山身在布衣而輕天下世人歸其高行學者以為美談夫際會之閒矯時所譽至乃抽簪散髮背時逆命隱于山林之中以此自高非以勸智能之士入通達之教故譏而責之曰太上貴德其次立功世殊時異不得而同故伯禹過門而不入稷契刻節而奮庸股肱帝室作民王公今子生聖明之世得觀雍熙之治則當攄不朽之功畼不羈之志龍飛鳳起修攝君司佐天理物幹成王事若子以堯為闇主則歷代載其功以民為貪亂則比屋可封若夫世濁時昏上無賢君忠臣不出小人聚群即當揆煩理亂跨騰風雲光顯時主拔濟生民何得偃蹇藏影蔽身夫道不虛行士不徒生生則幹時為國之楨故伊尹干湯周公相成興治濟世以致太平生有顯功沒有美名人生于世貴能立功何得逃位矯世絕蹤丹朱不肖朝有四凶堯放求賢遜位于子度才處分不能則已何所感激臨河洗耳山居巢處執心不傾辭君之祿忘君之榮居君之地避君之庭立身若此非子之貞欲言子智則不仕聖若欲言子高則鳥獸同群無功可紀無事可論蓺文類聚三十六弔夷齊文少承洪烈從戎于王側聞先生餓于首陽敢不敬弔寄之山岡嗚呼哀哉夫五德更運天秩靡常如有絕代之主必有受命之王故堯德終于虞舜禹祚殄于成湯且夏后之末祀亦殷氏之所亡若周武為有失則帝乙亦有傷子不棄殷而餓死何獨背周而深藏是識春香之為馥而不知秋蘭之亦芳也所在誰路而子絕之首陽誰山而予匿之彼薇誰菜而子食之行周之道藏周之林讀周之書彈周之琴飲周之水食周之芩謗周之主謂周之淫是誦聖之文聽聖之音居聖之世而異聖之心嗟乎二子何痛之深蓺文類聚三十七御覽五百九十六朝日夕月論舊事朝日以春分夕月以秋分案周禮朝日無常日鄭玄云用二分故遂施行秋分之夕日多東昇而西向拜之背實遠矣謂朝日宜用仲春之朔夕月宜用仲秋之朔南齊書禮志上永元元年何佟之議引嶭循請論云云循請乃靖之誤又見通典四十四劉靖陳儒訓之本疏夫學者治亂之軌儀聖人之大教也自黃初以來崇立太學二十餘年而寡有成者蓋由博士選輕諸生避役高門子弟恥非其倫故夫學者雖有其名而無其人雖設其教而無其功宜高選博士取行為人表經任人師者掌教國子依遵古法使二千石以上子孫年從十五皆入太學明制絀陟陳榮辱之路其經明行脩者則進之以崇德荒教廢業者則退之以懲惡舉善而教不能則勸浮華交游不禁自息矣闡弘大化以綏未賓六合承風遠人來格此聖人之教致治之本也魏志劉馥傳又宋書禮志一通典五十三誤作劉馥奏事今吏初除有三通爵里刺條疏行狀御覽六百六引魏名臣奏賜諡議古之諡紀功懲惡也故有桓文靈厲之諡今侯始封其以功美受爵土者雖無官位宜皆賜諡以紀其功且旌奉法能全爵祿者也其斬將搴旗以功受爵而身在本位類皆比列侯自關內侯以下及名號賜爵附庸非諡所及皆可闕之若列侯襲有官位比大夫以上其不莅官理事則當宿衛中勤或身死王事皆宜加諡其餘襲爵既無功勞官小善微皆不足錄通典一百四尚書趙咨奏云云黃門侍郎荀閎議云云一本作荀攸疑誤攸為黃門侍郎在漢靈帝少帝時趙咨為尚書在魏明帝時故知是荀閎也後漢亦有趙咨傳不言為尚書與荀仲茂牋舉國喁喁歎慕盈塗文選沈約齊安陸昭王碑文注上明帝疏諫盛脩宮室臣聞古人以水喻民曰水所以載舟亦所以覆舟故在民上者不可以不戒懼夫民逸則慮易苦則思難是以先王居之以約儉俾不至于生患昔顏淵云東野子之御馬力盡矣而求進不已是以知其將敗今事役勞苦男女離曠願陛下深察東野之獘留意舟水之喻息奔駟于未盡節力役于未困昔漢有天下至孝文時唯有同姓諸侯而賈誼憂之曰置火積薪之下而寢其上因謂之安也今寇賊未殄猛將擁兵檢之則無以應敵久之則難以遺後當盛明之也不務以除患若子孫不競社稷之憂也使賈誼復起必深切于曩時矣魏志王基傳上疏請守便宜今與賊家對敵當不動如山若遷移依險人心搖蕩于勢大損諸軍竝據深溝高壘眾心皆定不可傾動此御兵之要也魏志王基傳通典一百五十八奉詔停駐請進軍南頓議儉等舉軍足以深入而久不進者是其詐偽已露眾心疑沮也今不張示威形以副民望而停車高壘有似畏懦非用兵之勢也若或虜略民人又州郡兵家為賊所得者更懷離心儉等所迫脅者自顧非重不敢復還此為錯兵無用之地而成姦宄之源吳寇因之則淮南非國家之有譙沛汝豫危而不安此計之大失也軍宜速進據南頓南頓有大邸閣計足軍人四十日糧保堅城因積穀先人有奪人之心此平賊之要也魏志王基傳進據㶏水復議兵聞拙速未覩工遲之久方今外有疆寇內有叛臣若不時決則事之深淺未可測也議者多欲將軍持重將軍持重是也停軍不進非也持重非不行之謂也進而不可犯耳今據堅城保壁壘以積實資虜懸運軍糧甚非計也同上被詔迎鄧由馳驛陳狀且當清澄未宜便舉重兵深入應之魏志王基傳注引司馬彪戰略夷陵東道當由車御至赤岸乃得渡沮西道當出箭谿口乃趣平土皆山險狹竹木叢蔚卒有要害弩馬不陳今者筋角弩弱水潦方降廢盛農之務徼難必之利此事之危者也昔子午之役兵行數百里而值淋雨橋關破壞後糧腐敗前軍縣乏姜維深入不待輜重士眾飢餓覆軍上邽文欽唐咨舉吳重兵昧利壽春身沒不反此皆近事之鑒戒也嘉平以來累有內難當今之宜當鎮安社稷撫寍上下力農務本懷柔百姓未宜動眾以求外利也得之未足為多失之傷損威重魏志王基傳注引司馬彪戰略昔漢祖納酈生之說欲封六國寤張良之謀而趣銷印基謀慮淺短誠不及留侯亦懼襄陽有食其之謬同上薦劉毅于公府薦劉毅于公府毅方正亮直挻然不群言不苟令行不苟容往日僑仕平陽為郡股肱正色立朝舉綱引墨朱紫有分鄭衛不雜孝悌著于邦族忠貞效于三魏昔孫陽取騏驥于吳坂秦穆拔百里于商旅毅未遇知己無所自呈前已口白謹復申請晉書劉毅傳伐吳進趣之宜對夫兵動而無功則威名折于外財用窮于內故必全而後用也若不資通川聚糧水戰之備則雖積兵江內無必渡之勢矣今江陵有沮漳二水溉灌膏腴之田以千數安陸左右陂池沃衍若水陸竝農以實軍資然後引兵詣江陵夷陵分據夏口順沮漳資水浮穀而下賊知官兵有經久之勢則拒天誅者意沮而向王化者益固然後率合蠻夷以攻其內精卒勁兵以討其外則夏口以上必拔而江外之郡不守如此吳蜀之交絕交絕而吳禽矣不然兵出之利未可必矣魏志王基傳戒司馬景王書天下之廣萬機至猥誠不可不矜矜業業坐而待旦也夫志正則眾邪不生心靜則眾事不躁思慮審定則教令不煩親用忠良則遠近協服故知和遠在身定眾在心許允傅嘏袁侃崔贊皆一時正士有直質而無流心可與同政事者也魏志王基傳上武略士表幽州刺史王雄氣長涉道蓺天性仁勇毅有略約身儉己務養吏士能得人歡心謂當任為大將也書鈔未刪改本一百十五案雄王渾父孟達亦有薦王雄表見蘇林傳注薦楊俊伏見南陽太守楊俊秉純粹之茂質履忠肅之弘量體仁足以育物篤實足以動眾克長後進惠訓不倦外寬內直仁而有斷自初彈冠所歷垂化再守南陽恩德流著殊鄰異黨繈負而至今境守清靜無所展其智能宜還本朝宣力輦轂熙帝之載魏志楊俊傳
