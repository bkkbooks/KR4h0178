body:
  text: 先主昭烈帝詔酹霍峻峻既隹士加有功于國欲行酹蜀志霍峻傳敕後主昭汝與丞相從事事之如父蜀志諸葛亮傳又見華陽國志六遺詔敕後主朕初疾但下痢耳後轉雜他病殆不自濟人五十不稱夭年已六十有餘何所復恨不復自傷但以卿兄弟為念射君到說丞相歎卿智量甚大增修過于所望審能如此吾復何憂勉之勉之勿以惡小而為之勿以善小而不為惟賢惟德能服于人汝父德薄勿效之可讀漢書禮記閑暇歷觀諸子及六韜商君書益人意智聞丞相為寫申韓管子六韜一通已畢未送道亡可自更求聞達蜀志先主傳注引諸葛亮集又見御覽四百五十九攻成都令軍中其有害巴者誅及三族蜀志劉巴傳注引零陵先賢傳上言漢帝臣以具臣之才荷上將之任董督三軍奉辭于外不能埽除寇難靖匡王室久使陛下聖教陵遲六合之內否而未泰惟憂反側疢如疾首曩者董卓造為亂階自是之後群凶縱橫殘剝海內賴陛下聖德威靈人神同應或忠義奮討或上天降罰暴逆竝殪以漸冰消惟獨曹操久未梟除侵擅國權恣心極亂臣等昔與車騎將軍董承圖謀討操機事不密承見陷害臣播越失據忠義不果遂得使操窮凶極逆主后戮殺皇子鴆害雖糾合同盟念在奮力懦弱不武歷年未效常恐殞沒孤負國恩寤寐永歎夕惕若厲今臣群寮以為在昔虞書敦敘九族庶明厲翼五帝損益此道不廢周監二代竝建諸姬實賴晉鄭夾輔之福高祖龍興尊王子弟大啟九國卒斬諸呂以安大宗今操惡直醜正實繁有徒包藏禍心篡盜已顯既宗室微弱帝族無位斟酌古式依假權宜上臣大司馬漢中王臣伏自三省受國厚恩荷任一方陳力未效所獲己過不宜復忝高位以重罪謗群寮見逼迫臣以義臣退惟寇賊不梟國難未已宗廟傾危社稷將墜成臣憂責碎首之負若應權通變以寍靖聖朝雖赴水火所不得辭敢慮常宜以防後悔輒順眾議拜受印璽以崇國威仰惟爵號位高寵厚俯思報效憂深責重驚怖累息如臨于谷盡力輸誠獎厲六師率齊群義應天順時撲討凶逆以寍社稷以報萬分謹拜章因驛上還所假左將軍宜城亭侯印綬蜀志先主傳又見袁宏後漢紀三十拒荅孫權益州民富彊土地險阻劉璋雖弱足以自守張魯虛偽未必盡忠于操今暴師于蜀漢轉運于萬里欲使戰克攻取舉不失利此吳起不能定其規孫武不能善其事也曹操雖有無君之心而有奉主之名議者見操失利于赤壁謂其力屈無復遠志也今操三分天下已有其二脟欲飲馬于滄海觀兵于吳會何肯守此坐須老乎今同盟無故自相攻伐借樞于操使敵乘其隙非長計也蜀志先主傳注引獻帝春秋報孫權備與璋託為宗室冀憑英靈以匡漢朝今璋得罪左右備獨竦懼非所敢聞願加寬貸若不獲請備當放髮歸于山林吳志魯肅傳益州不明得罪左右庶幾將軍高義上匡漢朝下輔宗室若必尋干戈備將放髮于山林未敢聞命華陽國志六案此即吳志文但小異耳荅諸葛亮表請張裕罪芳蘭生門不得不鉏蜀志周群傳貽劉璋書貽劉璋書孫氏與孤本為脣齒今樂進在清泥與關羽相拒不往赴救進必大克轉侵州界其憂有甚于魯魯自守之賊不足慮也求益萬兵及資實華陽國志五與陸遜書賊今己在江陵吾將復東將軍謂其能然不吳志陸遜傳注引吳錄與魯王鼎銘富貴昌宜侯王與梁王鼎銘大吉祥宜公王徙廖立詔三苗亂政有虞流宥廖立狂惑朕不忍刑亟徙不毛之地蜀志廖立傳注引諸葛亮集出軍詔朕聞天地之道福仁而禍淫善積者昌惡積者喪古今常數也是以湯武修德而王桀紂極暴而亡曩者漢祚中微網漏凶慝董卓造難震蕩京畿曹操階禍竊執天衡殘剝海內懷無君之心子丕孤豎敢尋亂階盜據神器更姓改物世濟其凶當此之時皇極幽昧天下無主則我帝命隕越于下昭烈皇帝體明叡之德光演文武應乾坤之運出身平難經營四方人鬼同謀百姓與能兆民欣戴奉順符讖建位易號丕承天序補弊興衰存復祖業膺誕皇綱不墜于地萬國未靜早世遐殂朕以幼沖繼統鴻基未習保傅之訓而嬰祖宗之重六合雍否社稷不建永惟所以念在匡救光載前緒未有攸濟朕甚懼焉是以夙興夜寐不敢自逸每從菲薄以益國用勸分務穡以阜民財授方任能以參其聽斷私降意以養將士欲奮劍長驅指討凶逆朱旗未舉而丕復隕喪斯所謂不然我薪而自焚也殘類餘醜又支天禍恣睢河洛阻兵未弭諸葛丞相弘毅忠壯忘身憂國先帝託以天下以勖朕躬今授之以旄鉞之重付之以專命之權統領步騎二十萬眾董督元戎龔行天伐除患寍亂克復舊都在此行也昔項籍總一彊眾跨州兼土所務者大然卒敗垓下死于東城宗族如焚為笑千載皆不以義陵上虐下故也今賊傚尤天人所怨奉時宜速庶憑炎精祖宗威靈相助之福所向必克吳王孫權同恤災患潛軍合謀犄角其後涼州諸國王各遣月支唐居胡侯支富康植等二十餘人詣受節度大軍北出便欲率將兵馬奮戈先驅天命既集人事又至師貞勢并必無敵矣夫王者之兵有征無戰尊而且義莫敢抗也故鳴條之役軍不血刃牧野之師商人倒戈今旍麾首路其所經至亦不欲窮兵極武有能棄邪從正簞食壼漿以迎王師者國有常典封寵大小各有品限及魏之宗族支葉中外有能規利害審逆順之數來詣降者皆原除之昔輔果絕親于智氏而蒙全宗之福微子去殷項伯歸漢皆受茅土之慶此前世之明驗也若其迷沈不反將助亂人不式王命戮及妻孥罔有攸赦廣宣恩威貸其元帥弔其殘民他如詔書律令丞相其靈布天下使稱朕意焉蜀志後主傳注引諸葛亮集詔荅丞相亮行當離別以為惆悵今致氍毹一以達心也御覽七百八引諸葛亮集詔諡趙雲雲昔從先帝功績既著朕以幼沖涉塗艱難賴恃忠順濟于危險夫諡所以敘元勳也外議雲宜諡蜀志趙雲傳引雲別傳詔蔣琬屯漢中寇難未弭曹叡驕凶遼東三郡苦其暴虐遂相糾結與之離隔叡大興眾役還相攻伐曩秦之亡勝廣首難今有此變斯乃天時君其治嚴總帥諸軍屯住漢中須吳舉動東西掎角以乘其釁蜀志蔣琬傳詔武邑侯輯襲安平王詔武邑侯輯襲安平王安平王先帝所命三世早夭國嗣頹絕朕用傷悼其以武邑侯輯襲王位蜀志劉理傳詔諡陳祗祗統職一紀柔嘉惟則幹肅有章和義利物庶績允明命不融遠朕用悼焉夫存有令問則亡加美諡諡曰忠侯賜子粲爵關內侯拔次子裕為黃門侍郎蜀志董允傳復諸葛亮丞相詔策街亭之役咎由馬謖而君引愆深自貶抑重違君意聽順所守前年燿師馘斬王雙今歲爰征郭淮遁走降集氐羌興復二郡威震凶暴功勳顯然方今天下騷擾元惡未梟君受大任幹國之重而久自挹損非所以光揚洪烈矣今復君丞相君其勿辭蜀志諸葛亮傳又見華陽國志七贈諸葛忠武詔策惟君體資文武明叡篤誠受遺託孤匡輔朕躬繼絕興微志存靖亂爰整六師無歲不征神武赫然威震八荒將建殊功于季漢參伊周之巨勳如何不弔事臨垂克遘疾隕喪朕用傷悼肝心若裂夫崇德序功紀行命諡所以光照將來刊載不朽今使使持節左中郎將杜瓊贈君丞相武鄉侯印綬諡君為忠武侯魂而有靈嘉茲寵榮嗚呼哀哉嗚呼哀哉蜀志諸葛亮傳策張皇后朕統承大業君臨天下奉郊廟社稷今以貴人為皇后使行丞相事佐將軍向朗持節授璽綬勉修中饋恪肅禋祀皇后其敬之哉蜀志張皇后傳策立皇太子在昔帝王繼體立嗣副貳國統古今常道今以璿為皇太子昭顯祖宗之威命使行丞相事左將軍朗持節授印綬其勉修茂質袛恪道義諮詢典禮敬友師傅斟酌眾善翼成爾德可不務修以自勖哉蜀志太子璿傳
