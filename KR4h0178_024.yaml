body:
  text: 賈詡奏請治王立周忠罪立司候不明疑誤上下太尉周忠職所典掌請皆治罪袁宏後漢獻帝紀初平四年尚書賈詡奏云云又見續漢五行志六注引同敕魏郡功曹此郡既大今在都輦而少學問者其𥳑開解年少欲遣就師魏志國淵傳駮鄭玄皇后敬父母議孝經云父子之道天性也明王之章先陳事父之孝女子子出降其父母婦人外成不能二統耳春秋左氏傳曰紀裂繻來逆女列國尊同逆者謙不敢自成故以在父母之辭言之禮敵必三讓之義也祭公逆王后于紀者至尊以無外辭無所屈成言曰王后紀季姜歸于京師尊已成稱季姜從禮子尊不加于父母之明文也如皇后于公庭官僚之中令父獨拜違古之道斯義何施漢高五日一朝太上皇家令譏子道不盡欲微感之令太上皇擁篲卻行稱臣雖去聖久遠禮文闕然父子之義五品之常不易之道寧為公私易節公庭則為臣在家則為父是違禮而無常也言子事父無貴賤又云子不爵父通典六十七辭疾上書臣聞傅說發夢以感殷宗呂尚啓兆以動周文以通神之才悟于聖主用能匡佐帝業克成大勳臣之器朽實非其人雖貪清時釋體蟬蛻內省頑病日薄西山唯陛下聽野人山藪之願使一老者得盡微命魏志管寧傳注引傅子辭徵命上書草莽臣寧上疏臣海濱孤微罷農無伍祿運幸厚橫蒙陛下纂承洪緒德侔三皇化溢有唐久荷渥澤積祀一紀不能仰答陛下恩養之福沈委篤疴寢疾彌留逋違臣隸顛倒之節夙宵戰怖無地自厝臣元年十一月被公車司馬令所下州郡八月甲申詔書徵臣更賜安車衣被茵蓐以禮發遣光寵竝臻優命屢至怔營竦息悼心失圖思自陳聞申展愚情而明詔抑割不令稍修章表是以鬱滯訖于今日誠謂乾覆恩有紀極不意靈潤彌以隆赫奉今年二月被州郡所下三年十二月辛酉詔書重賜安車衣服別駕從事與郡功曹以禮發遣又特被璽書以臣為光祿勳躬秉勞謙引喻周秦損上益下受詔之日精魄飛散靡所投死臣重自省揆德非園綺而蒙安車之榮功無竇融而蒙璽封之寵楶梲駑下荷棟梁之任垂沒之命獲九棘之位懼有朱博鼓妖之責又年疾日侵有加無損不任扶輿進路以塞元責望慕閶闔徘徊闕庭謹拜章陳情乞蒙哀省抑恩聽放無令骸骨填于衢路魏志管寧傳辭辟別駕文州民管誕燕雀之賤栖朝桐之華夫別駕者明使君之羽翼顯化之鷹揚宜得英儒非誕暗昧所可私者書鈔七十三引兩條又通典三十二引管寧集案魏志本傳不言辟別駕當是在遼東時事耳答桓範書乾道輔誠誕膺嘉祚膺受多福為國蕃維雖分陝之任未足比盛遠近隆望何慶如之昔值險阻越竄海濱于裔歷載風綱不紀暨蒙國恩還踐舊土簿佐多難恆嬰篤疾愧使區區展之無偕泛愛遇隆遠辱綸墨降尊誘卑訓喻過泰見得思義抱以踧踖不勝來顧裁因答辱藝文類聚三十七奏請追崇始祖臣聞尊祖敬宗古之大義故六代之君未嘗不追崇始祖顯彰所出先王應期撥亂啓魏大業然禰廟未有異號非崇孝敬示無窮之義也太尉公侯宜有尊號所以表功崇德發事顯名者也故易言乾坤皆曰大德言大人與天地合臣等以為太尉公侯誕育聖哲以濟群品可謂資始其德之號莫過于大王通典七十二奏請具受禪禮儀漢氏以天子位禪之陛下陛下以聖明之德曆數之序承漢之禪允當天心夫天命弗可得辭兆民之望弗可得違臣請會列侯諸將群臣陪隸發璽書順天命具禮儀列奏魏志文帝紀注引獻帝傳奏議受禪禮儀昔堯舜禪于文祖至漢氏以師征受命畏天之威不敢怠遑便即位行在所之地今當受禪代之命宜會百寮群司六軍之士皆在行位使咸覩天命營中促狹可于平敞之處設壇場奉答休命臣輒與侍中常侍會議禮儀太史官擇吉日訖復奏魏志文帝紀注引獻帝傳奏請受禪今漢使音奉璽書到臣等以為天命不可稽神器不可黷周武中流有白魚之應不待師期而大號已建舜受大麓桑蔭未移而已陟帝位皆所以祗承天命若此之速也故無固讓之義不以守節為貴必道信于神靈符合于天地而已易曰其受命如響無有遠近幽深遂知來物非天下之至精其孰能與于此今陛下應期運之數為皇天所子而復稽滯于辭讓低徊于大號非所以則天地之道副萬國之望臣等敢以死請輒敕有司修治壇場擇吉日受禪命發璽綬魏志文帝紀注引獻帝傳于是尚書令桓階等奏又略見藝文類聚十三又奏今漢氏之命已四至而陛下前後固辭臣等伏以為上帝之臨聖德期運之隆大魏斯豈數載傳稱周之有天下非甲子之朝殷之去帝位非牧野之日也故詩序商湯追本玄王之至述姬周上録后稷之生是以受命既固厥德不回漢氏衰廢行次已絶三辰垂其徵史官著其驗耆老記先古之占百姓協歌謠之聲陛下應天受禪當速即壇場柴燎上帝誠不宜久停神器拒億兆之願臣輒下太史令擇元辰今月二十九日可登壇受命請詔王公群卿具條禮儀別奏魏志注同上奏改服色犧牲據三正周復之義國家承漢氏人正之後當受之以地正犧牲宜用白今從漢十三月正則犧牲不得獨改今新建皇統宜稽古典先代以從天命而告朔犧牲一皆不改非所以明革命之義也宋書禮志一賀捷表臣繇言戎路兼行履險冒寒臣以無任不獲扈從企仰懸情無有寧舍即日長史逮充宣大令命知征南將軍運田單之奇厲憤怒之衆與徐晃同勢并力撲討表裏俱進應期剋捷馘滅凶逆賊帥關羽已被矢刃傅方反覆胡修背恩天道禍淫不終厥命奉聞嘉喜喜不自勝望路載笑踊躍逸豫臣不勝欣慶謹拜表因便宜上聞臣繇誠惶誠恐頓首頓首死罪死罪建安草四年閏月九日南蕃東武亭侯臣繇上絳帖請許吳主委質表尚書宣示孫權所求詔令所報所以博示逮于卿佐必冀良方出于阿是芻蕘之言可擇廓廟況繇始以疏賤得為前恩橫所盱睨公私見異愛同骨肉殊遇厚寵以至今日再世榮名同國休戚敢不自量竊致愚慮仍日達晨坐以待旦退思鄙淺聖意所棄則又割意不敢獻聞深念天下今為已平權之委質外震神武度其拳拳無有二計高尚自疏況未見信今推款誠欲求見信實懷不自信之心亦宜待之以信而當護其未自信也其所求者不可不許許之而反不必可與求之而不許勢必自絶許而不與其曲在己里語曰何以罰與之奪何以怒許不與思省所示報權疏曲折得宜宜神聖之慮非今臣下所能有增益昔與文若奉事先帝事有數者有似于此粗表二事以為今者事勢尚當有所依違願君思省若以在所慮可不須復貌節度唯君恐不可采故不自拜表淳化閣帖二力命表臣繇言臣力命之用以無所立帷幄之謀而又愚耄聖恩低佪待以殊禮天下始定帥土欣戴唯有江東當少留思既與上公同見訪問昨宴見復蒙逮及雖緣詔令陳其愚心而臣所懷造膝之事昔先帝嘗以事及臣遣侍中王粲杜襲就問臣臣所懷未盡冀益絲髮乞使侍中與臣議之臣不勝愚款慺慺之情謹表以聞臣繇誠惶誠恐頓首頓首死罪死罪司徒東武亭侯臣鍾繇表寶晉齊帖薦關內侯季直表臣繇言臣自遭遇先帝忝列腹心爰自建安之初王師破賊關東時年荒穀貴郡縣殘毀三軍餽餉朝不及夕先帝神略奇計委任得人深山窮谷民所米豆道路不絶遂使強敵喪膽我衆作氣旬月之閒廓清蟻聚當時實用故山陽太守關內侯季直之策剋期成事不差豪髮先帝賞以封爵授以劇郡今直罷任旅食許下素為廉吏衣食不充臣愚欲望聖德録其舊勳矜其老困復彼一州俾圖報效直力氣尚壯必能夙夜保養人民臣受國家異恩不敢雷同見事不言干犯宸嚴臣繇誠惶誠恐頓首頓首謹言黃初二年八月日司徒東武亭侯臣鍾繇表寶晉齊帖請復肉刑代死刑疏大魏受命繼蹤虞夏孝文革法不合古道先帝聖德固天所縱墳典之業一以貫之是以繼世仍發明詔思復古刑為一代法連有軍事遂未施行陛下遠追二祖遺意惜斬趾可以禁惡恨入死之無辜使明習律令與群臣共議出本當右趾而入大辟者復行此刑書云皇帝清問下民鰥寡有辭于苗此言堯當除蚩尤有苗之刑先審問于下民之有辭者也若今蔽獄之時訊問三槐九棘群吏萬民使如孝景之令其當棄市欲斬右趾者許之其黥劓左趾宮刑者自如孝文易以髡笞能有姦者率年二十至四五十雖斬其足猶任生育今天下人少于孝文之世下計所全歲三千人張蒼除肉刑所殺歲以萬計臣欲復肉刑歲生三千人子貢問能濟民可謂仁乎子曰何事于仁必也聖乎堯舜其猶病諸又曰仁遠乎哉我欲仁斯仁至矣若誠行之斯民永濟魏志鍾繇傳又見藝文類聚五十四上書自劾臣前上言故鎮北將軍領河東太守安陽亭侯王邑巧辟治官犯突科條事當推劾檢實姦詐被詔書當如所糾以其歸罪故加寬赦又臣上言吏民大小各懷顧望謂邑當還拒太守杜畿今皆反悔共仰畿之官謹案文書臣以空虛被蒙拔擢入充近侍兼典機衡忝膺重任總統偏方既無德政以惠民物又無威刑以檢不恪至使邑違犯詔書郡掾衛固誑迫吏民訟訴之言交驛道路漸失其禮不虔王命今雖反悔醜聲流聞咎皆由繇刑威不攝臣又疾病前後歷年氣力日微尸素重祿曠廢職任罪明法正謹案侍中守司隸校尉東武亭侯鍾繇幸得蒙恩以斗筲之才仍見拔擢顯從近密銜命督使明知詔書深疾長吏政教寬弱檢下無刑久病淹滯衆職荒頓法令失張邑雖違科當必繩正法既舉文書操彈失理至乃使邑遠詣闕廷隳恭使命挫傷爪牙而固誑迫吏民拒畿連月今雖反悔犯順失正海內凶赫罪一由繇威刑暗弱又繇久病不任所職非繇大臣當所宜為繇輕慢憲度不畏詔令不與國同心為臣不忠無所畏忌大為不敬又不承用詔書奉詔不謹又聰明蔽塞為下所欺弱不勝任數罪謹以劾臣請法車徵詣廷尉治繇罪大鴻臚削爵土臣久嬰篤疾涉夏盛劇命縣呼吸不任部官輒以文書付功曹從事馬適議免冠徒跣伏須罪誅魏志鍾繇傳注引魏略處士君號諡議案禮小記曰親親以三為五以五為九上殺下殺旁殺而親畢矣乃唐堯之所以敦敘于九族也其禮上殺于五非不孝敬于祖也下殺于五非不慈愛于其孫也旁殺于五非不篤友于昆弟也故為族屬以禮殺之處士君其數在六于屬已盡其廟當毀其主當遷今若追崇帝王之號天下素不聞其受命之符則是武皇帝櫛風沐雨勤勞天下為非功也推以人情普天率土不襲此議處士君明神不安此禮今諸博士以禮斷之其義可從通典七十二謝曹公書屬賜甘酪及櫻桃御覽八百五十八引魏武帝集報太子書昔忝近任并得賜玦尚方耆老頗識舊物名其符采必得處所以為執事有珍此者是以鄙之用未奉貢幸而紆意實以悅懌在昔和氏殷勤忠篤而繇待命是懷愧恥魏志鍾繇傳注引魏略又報書臣出宮屬賜甘酪及櫻桃惠厚意綢繆非言所申御覽九百六十九答太子書臣同郡故司空荀爽言人當道情愛我者一何可愛憎我者一何可憎顧念孫權了更嫵媚魏志鍾繇傳注引魏略與人書吾與公達曾共使朱建平相建平曰荀君雖少然當以後事付鍾君吾時啁之曰惟當嫁卿阿騖耳何當此子竟早隕沒戲言遂驗乎今欲嫁阿騖使得善處追思建平之妙雖唐舉許負何以復加也魏志朱建平傳詰毛玠對狀自古聖帝明王罪及妻子書云左不共左右不共右豫則孥戮女司寇之職男子入于罪隸女子入于舂稿漢律罪人妻子沒為奴婢黥面漢法所行黥墨之刑存于古典今真奴婢祖先有罪雖歷百世猶有黥面供官一以寬良民之命二以宥并罪之辜此何以負于神明之意而當致旱案典謀急恆寒若舒恆燠若寬則亢陽所以為旱玠之吐言以為寬邪以為急也急當陰霖何以反旱成湯聖世野無生草周宣令主旱魃為虐亢旱以來積三十年歸咎黥面為相值不衛人代邢師興而雨罪惡無徵何以應天玠譏謗之言流于下民不悅之聲上聞聖聽玠之吐言勢不獨語時見黥面凡為幾人黥面奴婢所識知邪何緣得見對之歎言時以語誰見答云何以何日月于何處所事己發露不得隱欺具以狀對魏志毛玠傳雜帖繇白昨疏還示知憂虞復深遂積疾苦何乃爾耶蓋張樂于洞庭之野鳥值而高翔魚聞而深潛豈絲磬之響雲英之奏非耶此所愛有殊所樂乃異君能審己而恕物則常無所結滯矣鍾繇白淳化閣帖二白騎遂內書不俟車駕計吳人權道情懷急切當以時月待取伏罪之言蓋不以疑相府小緣心吞若八九同上弟常患羸頓遇寒進口物多少新婦動止仰人同上十二日繇白雪寒想勝常得張侯書賢從帷帳之悼甚哀傷不可言疾患自宜量力不復具繇白同上墓田丙舍欲使一孫于城西一孫于都尉府此繇家之嫡正之良者也兄弟共哀異之哀懷傷切都尉文岱自取禍痛賢兄慈篤情無有己一門同恤助以悽愴如何如何隸書勢鳥勢之變乃惟佐隸蠲彼煩文崇此𥳑易煥若星陳鬱若雲布初學記二十一引鍾氏隸書勢三條果然賦果然似猴象猿黑頰青身肉非嘉殽唯皮為珍藝文類聚九十五御覽七百十諫西征疏夫策貴廟勝功尚帷幄不下殿堂之上而決勝千里之外車駕宜鎮守中土以為四方威勢之援今大軍西征雖有百倍之威于關中之費所損非一且盛暑行師詩人所重實非至尊動軔之時也魏志鍾繇傳奏誅李豐等豐等謀迫脅至尊擅誅冢宰大逆無道請論如法魏志夏侯玄傳與曹爽書止增兵伐蜀竊以為廟勝之策不臨矢石王者之兵有征無戰誠以干戚可以服有苗退舍足以納原寇不必縱吳漢于江關騁韓信于井陘也見可而進知難而退蓋自古之政惟公侯詳之魏志鍾繇傳
