body:
  text: 張就被拘執私與父恭疏大人率厲敦煌忠義顯然豈以就在困厄之中而替之哉昔樂羊食子李通覆家經國之臣寧懷妻孥邪今大軍垂至但當促兵以掎之耳願不以下流之愛使就有恨于黃壤也魏志閻溫傳表毋丘興河右遐遠喪亂彌久武威當諸郡路道喉轄之要加民夷雜處數有兵難領太守毋丘興到官內撫吏民外懷羌胡卒使柔附為官效用黃華張進初圖逆亂扇動左右興志氣忠烈臨難不顧為將校民夷陳説禍福言則涕泣于時男女萬口咸懷感激形毀髮亂誓心致命尋率精兵踧脅張掖濟拔領太守杜通西海太守張睦張掖番和驪靬二縣吏民及郡雜胡棄惡詣興興皆安恤使盡力田興每所歷盡竭心力誠國之良吏殿下即位留心萬機苟有毫毛之善必有賞録臣伏緣聖旨指陳其事魏志毋丘儉傳注引魏名臣奏答文帝問蘇則金城郡昔為韓遂所見屠剝死喪流亡或竄戎狄或陷寇亂戶不滿五百則到官內撫凋殘外鳩離散今見戶千餘又梁燒雜種羌昔與遂同惡遂斃之後越出障塞則前後招懷歸就郡者三千餘落皆恤以威恩為官效用西平麴演等倡造邪謀則尋出軍臨其項領演即歸命送質破絶賊糧則既有恤民之效又能和戎狄盡忠效節遭遇聖明有功必録若則加爵邑誠足以勸忠臣勵風俗也魏志蘇則傳注引魏名臣奏薦崔林夫宰相者天下之所瞻效誠宜得秉忠履正本德仗義之士足為海內所師表者竊見司隸校尉崔林稟自然之正性體高雅之弘量論其所長以比古人忠直不回則史魚之儔清儉守約則季文之匹也牧守州郡所在而治及為外司萬里肅齊誠台輔之妙器袞職之良才也魏志崔林傳曆議以太史天度與相覆校二年七月三年十一月望與天度日皆差異月蝕加時乃後天六時半非從三度之謂定為後天過半日也晉書律曆志中請罷校事官疏周禮云設官分職以為民極春秋傳曰天有十日人有十等愚不得臨賢賤不得臨貴于是並建聖哲樹之風聲明試以功九載考績各修厥業思不出位故欒書欲拯晉侯其子不聽死人橫于街路邴吉不問上不責非職之功下不務分外之賞吏無兼統之勢民無二事之役斯誠為國要道治亂所由也遠覽典志近觀秦漢雖官名改易職司不同至于崇上抑下顯分明例其致一也初無校事之官干與庶政者也昔武皇帝大業草創衆官未備而軍旅勤苦民心不安乃有小罪不可不察故置校事取其一切耳然檢御有方不至縱恣也此霸世之權宜非帝王之正典其後漸蒙見任復為疾病轉相因仍莫正其本遂令上察宮廟下攝衆司官無局業職無分限隨意任情唯心所適法造于筆端不依科詔獄成于門下不顧覆訊其選官屬以謹慎為粗疏以謥詷為賢能其治事以刻暴為公嚴以循理為怯弱外則託天威以為聲勢內則聚群姦以為腹心大臣恥與分勢含忍而不言小人畏其鋒芒鬱結而無告至使尹模公于日下肆其姦慝罪惡之著行路皆知纖惡之過積年不聞既非周禮設官之意又非春秋十等之義也今外有公卿將校總統諸署內有侍中尚書綜理萬機司隸校尉督察京輦御史中丞董攝宮殿皆高選賢才以充其職申明科詔以督其違若此諸賢猶不足任校事小吏益不可信若此諸賢各思盡忠校事區區亦復無益若更高選國士以為校事則是中丞司隸重增一官耳若如舊選尹模之姦今復發矣進退推算無所用之昔桑弘羊為漢求利卜式以為獨烹弘羊天乃可雨若使政治得失必感天地臣恐水旱之災未必非校事之由也曹恭公遠君子近小人國風託以為刺衛獻公舍大臣與小臣謀定薑謂之有罪縱令校事有益于國以禮義言之尚傷大臣之心況姦回暴露而復不罷是袞闕不補迷而不返也魏志程昱傳與傅玄書文公詠周孔父述殷聲揚千古業垂後嗣初學記二十一文章女典篇丈夫百行以功補過婦人四教以備為成婦德闕則仁義廢矣婦言虧則辭令慢矣婦工簡則織紝荒矣是以禮有功宮宗室之教詩有牖下蘋藻之奠然後家道諧允儀表則見于內若夫麗色妖容高才美辭貌足傾城言以亂國此乃蘭形棘心玉曜凡質在邦必危在家必亡藝文類聚二十三薦辛毗表尚書僕射王思精勤舊吏亮計略不及辛毗宜以毗代思御覽出軍表輒出軍以外威比能內鎮步度根魏志明帝紀青龍元年保塞鮮卑步度根與叛鮮卑軻比能私通并州刺史畢軌表景福殿賦大哉惟魏世有哲聖武創元基文集大命皆體天作制順時立政至于帝皇遂重熙而纍盛遠則襲陰陽之自然近則本人物之至情上則崇稽古之弘道下則闡長世之善經庶事既康天秩孔明故載祀二三而國富刑清歲三月東巡狩至于許昌望祠山川考時度方存問高年率民耕桑越六月既望林鍾紀律大火昏正桑梓繁廡大雨時行三事九司宏儒碩生感乎溽暑之伊鬱而慮性命之所平惟岷越之不靜寤征行之未寧乃昌言曰昔在蕭公暨于孫卿皆先識博覽明允篤誠莫不以為不壯不麗不足以一民而重威靈不飾不美不足以訓後而永厥成故當時享其功利後世賴其英聲且許昌者乃大運之攸戾圖讖之所旌苟德義其如斯夫何宮室之勿營帝曰俞哉玄輅既駕輕裘斯御乃命有司禮儀是具審量日力詳度費務鳩經始之黎民輯農功之暇豫因東師之獻捷就海孽之賄賂立景福之祕殿備皇居之制度爾乃豐層覆之耽耽建高基之堂堂羅疏柱之汨越肅坻鄂之鏘鏘飛櫩翼以軒翥反宇䡾以高驤流羽毛之威蕤垂環玭之琳琅參旗九旒從風飄揚皓皓旴旴丹彩煌煌故其華表則鎬鎬鑠鑠赫奕章灼若日月之麗天也其奧祕則蘙蔽曖昧髣佛退概若幽星之纚連也既櫛比而欑集又宏槤以豐敞兼苞博落不常一象遠而望之若摛朱霞而耀天文迫而察之若仰崇山而戴垂雲羌瓌瑋以壯麗紛彧彧其難分此其大較也若乃高薨崔嵬飛宇承霓綿蠻黮䨴隨雲融泄鳥企山峙若翔若滯峨峨嶪嶪罔識所屆雖離朱之至精猶眩曜而不能昭晰也爾乃開南端之豁達張筍虡之輪豳華鍾杌其高懸悍獸仡以儷陳體洪剛之猛毅聲訇殷其若震爰有遐狄鐐質輪菌坐高門之側堂彰聖主之威神藝若充庭槐楓被宸綴以萬年綷以紫榛或以嘉名取寵或以美材見珍結實商秋敷華青春藹藹萋萋馥馥芬芬爾其結構則修梁彩制下褰上奇桁梧復疊勢合形離赩如宛虹赫如奔螭南距陽榮北極幽崖任重道遠厥庸孔多于是列髹彤之繡桷垂琬琰之文璫蝹若神龍之登降灼若明月之流光爰有禁楄勒分翼張承以陽馬接以員方斑間賦白疏密有章飛枊鳥踊雙轅是荷赴險淩虛獵捷相加皎皎白間離離列錢晨光內照流景外烻烈若鉤星在漢煥若雲梁承天騧徙增錯轉縣成郛茄蔤倒植吐被芙蕖繚以藻井編以綷疏紅葩𦾏鞢丹綺離婁菡萏赩翕纖縟紛敷繁飾纍巧不可勝書于是蘭栭積重窶數矩設櫼櫨各落以相承欒栱夭蟜而交結金楹齊列玉舄承跋青瑣銀鋪是為閨闥雙枚既修重桴乃飾㮰梠緣邊周流四極侯衛之班藩服之職溫房承其東序涼室處其西偏開建陽則朱炎豔啓金光則清風臻故冬不淒寒夏無炎燀鈞調中適可以永年墉垣碭基其光昭昭周制白盛今也惟縹落帶金釭此焉二等明珠翠羽往往而在欽先王之允塞悅重華之無為命共工使作繢明五采之彰施圖象古昔以當針規椒房之列是準是儀觀虞姬之容止知治國之佞臣見薑后之解珮寤前世之所遵賢鍾離之讜言懿楚樊之退身嘉班妾之辭輦偉孟母之擇鄰故將廣智必先多聞多聞多雜多雜眩真不眩焉在在乎擇人故將立德必先近仁欲此禮之不愆是以盡乎行道之先民朝觀夕覽何與書紳若乃階除連延蕭曼雲征櫺檻邳張鉤錯矩成楯類騰蛇槢似瓊英如螭之蟠如虯之停玄軒交登光藻昭明騶虞承獻素質仁形彰天瑞之休顯昭遠戎之來庭陰堂承北方軒九戶右個清宴西東其宇連以永寧安昌臨圃遂及百子後宮攸處處之斯何窈窕淑女思齊徽音聿求多祜其祜伊何宜爾子孫克明克哲克聰克敏永錫難老兆民賴止于南則有承光前殿賦政之宮納賢用能詢道求中疆理宇宙甄陶國風雲行雨施品物咸融其西則有左墄右平講肄之場二六對陳殿翼相當僻脫承便蓋象戎兵察解言歸譬諸政刑將以行令豈唯娛情鎮以崇臺實曰永始復閣重闈猖狂是俟京庾之儲無物不有不虞之戒干是焉取爾乃建凌雲之層盤浚虞淵之靈沼清露瀼瀼淥水浩浩樹以嘉木植以方草悠悠玄魚㿥㿥白鳥沈浮翱翔樂我皇道若乃虯龍灌注溝洫交流陸設殿館水方輕舟篁棲鵾鷺瀨戲鰋鮋豐侔淮海富賑山丘叢集委積焉可殫籌雖咸池之壯觀夫何足以比讎于是碣以高昌崇觀表以建城峻廬岧嶢岑立崔嵬巒居飛閣干雲浮階乘虛遙目九野遠覽長圖俯眺三市孰有誰無覩農人之耘耔亮稼穡之艱難惟饗年之豐寡思無逸之所歎感物衆而思深因居高而慮危惟天德之不易懼世俗之難知觀器械之良窳察俗化之誠偽瞻貴賤之所在悟政刑之夷陂亦所以省風助教豈惟盤樂而崇侈靡屯坊列署三十有二星居宿陳綺錯鱗比辛壬癸甲為之名秩房室齊均堂庭如一出此入陂欲反忘術惟工匠之多端固萬變之不窮物無難而不知乃與造化乎比隆讎天地以開基並列宿而作制制無細而不協于規景作無微而不違于水臬故其增構如積植木如林區連域絶葉比枝分離背別趣駢田胥附縱橫踰延各有攸注公輸荒其規矩匠石不知其所斫既窮巧于規摹何彩章之未殫爾乃文以朱緑飾以碧丹點以銀黃爍以琅玕光明熠爚文彩璘班清風萃而成響朝日曜而增鮮雖崑崙之靈宮將何以乎侈旃規矩既應乎天地舉措又順乎四時是以六合元亨九有雍熙家懷克讓之風人詠康哉之詩莫不優遊以自得故淡泊而無所思歷列辟而論功無今日之至治彼吳蜀之湮滅固可翹足而待之然而聖上猶孜孜靡忒求天下之所以自悟招中正之士開公直之路想周公之昔戒慕咎繇之典謨除無用之官省生事之故絶流遁之繁禮反民情于太素故能翔岐陽之鳴鳳納虞氏之白環蒼龍覿于陂塘龜書出于河源醴泉涌于池圃靈芝生于丘園總神靈之貺祐集華夏之至歡方四三皇而六五帝曾何周夏之足言文選奏請大臣侍從遊幸善為國者必先治其身治其身者慎其所習所習正則其身正其身正則不令而行所習不正則其身不正其身不正則雖令不從是故為人君者所與遊必擇正人所觀覽必察正象放鄭聲而弗聽遠佞人而弗近然後邪心不生而正道可弘也季末暗主不知損益斥遠君子引近小人忠良疏遠便辟褻狎亂生近昵譬之社鼠考其昏明所積以然故聖賢諄諄以為至慮舜戒禹曰鄰哉鄰哉言慎所近也周公戒成王曰其朋其朋言慎所與也詩云一人有慶兆民賴之可自今以後御幸式乾殿及遊豫後園皆大臣侍從因從容戲宴兼省文書詢謀政事講論經義為萬世法魏志齊王芳紀祀五郊六宗及厲殃議月令季春磔攘大儺非所以祀皇天也夫天道不諂不二共命若之何攘之國有大故可祈于南郊至于祈禳自宜止于山川百物而己通典五十五明帝諡議案外內群寮議宜曰明餘所執難各不同書曰三人占則從二人之言傳曰善鈞從衆今稱明者可謂衆也書鈔未改本九十四諡篇與夏侯太初難蔣濟叔嫂無服論夫嫂叔宜服誠自有形然小功章娣姒婦為嫂叔文則恐未是也禮之正名母婦異義今取弟于姒婦之句以為夫之昆弟雖省文互體恐未有及此者也凡男女之相服也非有骨肉之親則有尊卑之敬受重之報今嫂叔同班並列無父子之降則非所謂尊卑也他族之女則非所謂骨肉也是以古人謂之無名者豈謂其無嫂叔之字或無所與為體也夫有名者皆禮與至尊為體而交與正名同接也有其體有其交故以其名名之故服之可也苟無斯義其服焉依夫嫂叔之交有男女之別故絶其親授禁其通問家人之中男女宜別未有若嫂叔之至者也彼無尊卑之至敬故交接不可不疏彼無骨肉之不殊故交疏而無服情亦微矣通典九十二韓白論此兩將者殆蚩尤之敵對開闢所希有也何者為勝也或曰白起為秦將攻城略地功多不可勝數所向無敵前史以為出奇無窮欲窺滄海白起為勝若夫韓信斷幡以覆軍拔旗以流血其以取勝非復人力也亦可謂奇之又奇者哉白起之破趙軍詐奔而斷其糧道取勝之術皆此類也所謂可奇于不奇之間矣安得比其奇之又奇者哉書鈔一百十五藝文類聚五十九御覽二百七十三白起論白起之降趙卒詐而坑其四十萬豈徒酷暴之謂乎後亦難以重得志矣向使衆人皆豫知降之必死則張虛捲猶可畏也況于四十萬被堅執鋭哉天下見降秦之將頭顱似山歸秦之衆骸積成丘則後日之戰死當死耳何衆肯服何城肯下乎是為雖能裁四十萬之命而適足以強天下之戰欲以要一朝之功而乃更堅諸侯之守故兵進而自伐其勢軍勝而還喪其計何者設使趙衆復合馬服更生則後日之戰必非前日之對也況今皆使天下為後日乎其所以終不敢復加兵于邯鄲者非但憂平原之補袒患諸侯之救至也徒諱之而不言耳若不悟而不諱則毋所以遠智也可謂善戰而拙勝長平之事秦民之十五以上者皆荷戟而向趙矣秦王又親自賜民爵于河內夫以秦之強而十五以上死傷過半者此謂破趙之功小傷秦之敗大又何稱奇哉若後之役戍不豫其論者則秦衆多矣降者可致也必不可致者本自當戰殺不當受降詐也戰殺雖難降殺雖易然降殺之為害禍大于劇戰也史記白起傳集解冀州論略言春秋以來可以海內比而校也恭謹有禮莫賢乎趙襄仁德忠義莫賢乎趙盾納諫服義莫賢乎韓起決危定國莫賢乎狐偃勇謀經國莫賢乎魏絳達讎為主莫賢乎祈奚延譽先生莫賢乎張老明智識物莫賢乎趙武清直篤義莫賢乎叔向聰向肅恭莫賢乎羊舌職守信不移莫賢乎荀息見利思義莫賢乎中行穆子保國扞君莫賢乎先軫書法不諱莫賢乎董狐分詔和戎莫賢乎郤克流放能顯莫賢乎冀缺拔幽進滯莫賢乎臼季守義死節莫賢乎欒恭子抗言不屈莫賢乎師曠放而益顯莫賢乎狼瞫儒雅博通莫賢乎董仲舒體恭篤敬莫賢乎石奮才兼文武千金不入私門莫賢乎竇嬰明君顯賢莫賢乎明叔證主知分莫賢乎貫高忠義正直莫賢乎鮑子都謇諤忠諫莫賢乎王宏御覽四百四十七九州論冀州北接燕代初學記八清河縑總房子好絺御覽八百十八安平好棗中山好栗魏郡好杏河內好稻真定好黎共汲好漆藝文類聚八十六八十七御覽七百六十六九百六十九大觀本草二十二無為論天地萬物皆以無為為本無也者開物成務無往不成者也陰陽恃以化生萬物恃以成形賢者恃以成德不肖恃以免身故無之為用無爵而貴矣晉書王衍傳何晏王弼等祖述老莊立論云云無名論為民所譽則有名者也無譽無名者也若夫聖人名無名譽無譽謂無名為道無譽為大則夫無名者可以言有名矣無譽者可以言有譽矣然與夫可譽可名者豈同用哉此比于無所有故皆有所有矣而于有所有之中當與無所有相從而與夫有所有者不同同類無遠而相應異類無近而不相違譬如陰中之陽陽中之陰各以物類自相求從夏日為陽而夕夜遠與冬日共為陰冬日為陰而朝晝遠與夏日同為陽皆異于近而同于遠也詳此異同而後無名之論可知矣凡所以至于此者何哉夫道者惟無所有者也自天地已來皆有所有矣然猶謂之道者以其能復用無所有也故雖處有名之域而沒其無名之象由以在陽之遠體而忘其自有陰之遠類也夏侯玄曰天地以自然運聖人以自然用自然者道也道本無名故老氏曰強為之名仲尼稱堯蕩蕩無能名焉下云巍巍成功則強為之名取世所知而稱耳豈有名而更當云無能名焉者邪夫惟無名故可得遍以天下之名名之然豈其名也哉唯此足喻而終莫悟是觀泰山崇崛而謂元氣不浩芒者也列子仲尼篇注論語集解敘敘曰漢中壘校尉劉向言魯論語二十篇皆孔子弟子記諸善言也太子太傅夏侯勝前將軍蕭望之丞相韋賢及子玄成等傳之齊論語二十二篇其二十篇中章句頗多于魯論琅琊王卿及膠東庸生昌邑中尉王吉皆以教授故有魯論有齊論魯共王時嘗欲以孔子宅為宮壞得古文論語齊論有問王知道多于魯論二篇古論亦無此二篇分堯曰下章子張問以為一篇有兩子張凡二十一篇篇次不與齊魯論同安昌侯張禹本受魯論兼講齊説善者從之號曰張侯論為世所貴包氏周氏章句出焉古論唯博士孔安國為之訓解而世不傳至順帝時南郡太守馬融亦為之訓説漢末大司農鄭玄就魯論篇章考之齊古為之注近故司空陳群太常王肅博士周生烈皆為義説前世傳授師説雖有異同不為訓解中間為之訓解至于今多矣所見不同互有得失今集諸家之善記其姓名有不安者頗為改易名日論語集解光祿大夫關內侯臣孫雍光祿大夫臣鄭沖散騎常侍中領軍安鄉亭侯臣曹羲侍中臣荀顗尚書駙馬都尉關內侯臣何晏等上唐石經論語瑞頌若稽古帝魏武濬哲欽明文思罄民生之俊德懿前烈之極休先天而天弗違後天而奉天時聿迪明命肇啓皇基夫居高聽卑乾之紀也靡德不酬坤之理也故靈符頻繁衆瑞仍章通政辰修玉燭告祥和風播烈景星揚光應龍遊于華澤鳳鳥鳴于高岡麒麟依于圃籍甝虎類于坰疆鹿之麌麌載素其色雉之朝雊亦白其服交交黃鳥信我中霤倏倏嘉苗吐穎田疇藝文類聚九十八斫猛獸刀銘徒搏不兵作戒宣丘用造斯器螭獸是劉制禽允良昏明亶時永釐厥後蠲民之災藝文類聚六十又初學記二十二引斬虎刀銘云用造斯器螭虎是斬類聚避諱改虎為猛獸耳
