body:
  text: 魏卷三十二劉劭趙都賦且敝邑者固靈州之敞宇而天下之雄國其南也則有洪川巨瀆黃水濁河發源積石徑拂太華灑為九流入于玄波其東則有天浪水府百川是鍾包絡坤維連薄太濛北則有陶林玄壇增冰沍寒西則有靈丘平囿邪接崑崙其近則有天井句注飛壺太行璀錯磊硌屬阜連岡龍首嵯峨以岪鬱羊坂輪𡹤以𡵓嵣清漳發源濁滏汨越湯泉涫沸洪波漂厲爾乃都城萬雉百里周回九衝交錯三門旁開層樓竦閣連棟結階峙華爵以表甍若翔鳳之將飛正殿儼其造天朱櫺赫以舒光盤虯螭之蜿蜒承雄虹之飛梁結雲閣于南宇立叢臺于少陽及至暮秋涉冬則風烈寒猛豺鷙攫鷹隼奮翰國乃講武狩于清源駕騖冥之駿駁抗沖天之旌旃北連昭餘南屬呼沱西眄太陵東結繚河然後溪子放機戈矛亂發決班鬐破文頞當手斃僵應弦倒越爾乃進夫中山名倡襄國妖女狄鞮妙音邯鄲才舞六八駢羅遞奏迭舉體淩浮雲聲哀激楚姿絶倫之逸態實倬然而寡偶其珍玩服物則昆山美玉玄珠曲環輕綃綮繒織纊綈紈其器用良馬則六弓四弩緑沈黃間堂溪魚腸丁令角端飛兔裊斯常驪紫燕豐鬒確顱龍身鵠頸目如黃金蘭筋參精迅躡飛浮軼響追聲若乃至季春元已辰火熾光挻新贈往祓于水陽朱幕蔽野綵帷連岡妖冶呈飾顏如春英藝文類聚六十一又略見文選海賦注赭白馬賦注初學記六又十五二十二御覽三百四十七巨鰲冠山陵魚吞舟吸潦吐波氣成雲霧文選海賦注又演連珠注煦氣成虹霓揮袖起風雲文選七啓注神鉦發聲文選魏都賦劉淵林注置酒乎黃華之館御覽一百九十四其謀謨之士則思通神睿權略無形沈竈生蛙轉敗為成書鈔一百九十四辨論之士則智淩徂丘材過東里分摛滯義割劈纖理論折堅白辨臧三耳御覽四百六十四游俠之徒晞風擬類貴交尚信輕命重氣義激毫毛節成感慨御覽四百七十三爰及富人郭侯之倫資衍陶衛奓溢無垠金碧其輿朱丹其輪會遇燕好其從如雲御覽四百七十二許都賦闕闕洛都賦闕闕嘉瑞賦乾坤交泰嘉瑞降靈皓雉呈其潔質素威效其人形白兔揚其翰耀黃龍耀其神精章光列之焞耀顯休徵之有成昔聖王之降瑞或卓爾而弗經猶著美于篇籍貽來業而垂名實明德之所墜宜允納而是丁信無思而不服又何遠之不寧方將收麒麟于玄圃栖鳳皇于軒櫺舞鸞鳥于中唐聆鸑鷟之和鳴弄萐蒲之華芳玩朱草之丹榮承靈祚而建基垂遐福于億齡超三五而無儔與泰初乎齊聲藝文類聚九十八龍瑞賦太和七年春龍見摩陂行自許昌親往臨觀形狀瓌麗光色燭耀侍衛左右咸與覩焉自載籍所紀瑞應之致或翔集于邦國卓犖于要荒未有若斯之著明也惟殷俯之舊式乃展義而省方皇輿發于洛邑遂巡幸于許昌憲宸極之天居建正殿以當陽歲在析木時惟仲春靈威統方句芒司辰陽升九四或躍于淵有蜿之龍來遊郊甸應節合義象德效仁紆體鞶縈摛藻布文青耀章采雕琢璘玢煥若羅星蔚若翠雲光舄奕以外照水清景而內分聖上觀之無射左右察之既精聊假物以擬身忽神化而無形泉含物而下淡固保險而常寧昔太昊之初化首帝德以表名暨明后之隆盛又降見以揚聲惟珍獸之玄真實殊異于四靈信應龍之道揚將天飛于泰清藝文類聚九十又初學記三十上都官考課疏百官考課王政之大較然而歷代弗務是以治典闕而未補能否混而相蒙陛下以上聖之宏略愍王綱之弛頽神慮內鑒明詔外發臣奉恩曠然得以啓矇輒作都官考課七十二條又作說略一篇臣學寡識淺誠不足以宣畼聖旨著定典制魏志劉劭傳祀六宗議萬物負陰而抱陽沖氣以為和六宗者太極沖和之氣為六氣之宗者也虞書謂之六宗周書謂之天宗晉書禮志上景初二年大議其神朝士紛紜各有所執惟散騎常侍劉劭以為云云元會日蝕議梓慎裨竈古之良史猶占水火錯失天時禮諸侯見天子入門不得終禮者四日蝕在一然則聖人垂制不為變異先廢朝禮或災消異伏或推術謬誤通典七十人建安中將元會而太史上言正朝當日蝕朝臣議應會不博平計吏劉劭建言云云時尚書令荀彧及衆人咸善而從之遂朝如舊日亦不蝕劭由此著名皇后銘旌議主生稱魏不稱姓據漢律使節稱漢今魏使節亦稱魏及二千石諸竹使符皆稱魏以類推之其義宜同今太后之旌宜稱魏通典八十四新律序略舊律所以難知者由于六篇篇少故也篇少則文荒文荒則事寡事寡則罪漏是以後人稍增更與本體相離今制新律宜都總事類多其篇條刪舊科采漢律為魏律懸之象魏舊律因秦法經就增三篇而具律不移因在第六罪條例既不在始又不在終非篇章之義故集罪例以為刑名冠于律首盜律有劫掠恐喝和賣買人科有持質皆非盜事故分以為劫掠律賊律有欺謾詐僞踰封矯制囚律有詐僞生死令景有詐自復免事類衆多故分為詐律賊律有賊伐樹木殺傷人畜産及諸亡命金布律有毀傷亡失縣官財物故分為毀亡律囚律有告劾傳覆廄律有告及逮受科有登聞道辭故分為告劾律囚律有繫囚鞠獄斷獄之法興律有上獄之事科有考事報讞宜別為篇故分為繫訊斷獄律盜律有受所監臨受財枉法雜律有假借不廉令乙有所呵人受錢科有使者驗賂其事相類故分為請賕律盜律又有㪍辱強賊興律有擅興徭役其律有出賣呈科有擅作修舍事故分為擅興律興律有乏徭稽留賊律有儲峙不辦廄律有乏軍之興及舊典有奉詔不謹不承用詔書漢氏施行有小愆乏及不如令輒劾以不承用詔書之罪腰斬又減以丁酉詔書丁酉詔書漢文所下不宜復以為法故復別為之留律秦世舊有廄置乘傳副車食廚漢初承秦不改後以費廣稍省是故後漢但設騎置而無車馬律猶著其文則為虛設故除廄律取其可用合科者以為郵騎令其告反逮驗別入告劾律上言變事以為變事令以警事告急與興律烽燧及科令者以為警事律盜律有還贓畀主金布律有罰贖入責以呈黃金為償科有平庸坐贓事以為償贓律蓋律之初制無免坐之文張湯趙禹始作監臨部主見知故縱之例其見知而故不舉劾者各與同罪失不舉劾各以贖論其不見不知不坐也是以文約而例通科之為制每條有違科不覺不知從坐之免不復分別而免坐繁多宜總為免例以省科文故更制定其由例以為免坐律諸律令中有其教制本條無從坐之文者皆從此取法也凡所定增十三篇就故五篇合十八篇于正律九篇為增于旁章科令為省矣改漢舊律不行于魏者皆除之更依古義制為五刑其死刑有三髡刑有四完刑作刑各三贖刑十一罰金六雜抵罪七凡三十有七名以為律首又改賊律但以言語及犯宗廟園陵謂之大逆無道腰斬家屬從坐不及祖父母孫至于謀反大逆臨時捕之或污瀦或梟葅夷其三族不在律令所以嚴絶惡路也賊鬭殺人以劾而亡許依古義聽子弟得追殺之會赦及過誤相殺不得報讎所以止殺害也殺繼母與親母同防繼假之隙也除異子之科使父子無異財也毆兄姊加至五歲刑以明教化也囚徒誣告人反罪及親屬異于善人所以纍之使省刑息誣也改投書棄市之科所以輕刑也正篡囚棄市之罪斷凶強為義之蹤也二歲刑以上除家人乞鞠之制所以省煩獄也改諸郡不得自擇伏日所以齊風俗也晉書刑法志通典一百六十三人物志序夫聖賢之所美莫美乎聰明聰明之所貴莫貴乎知人知人誠智則衆材得其序而庶績之業興矣是以聖人著爻象則立君子小人之辭敘詩志則別風俗雅正之業制禮樂則考六藝祇庸之德躬南面則援俊逸輔相之材皆所以達衆善而成天功也天功既成則竝受名譽是以堯以克明俊德為稱舜以登庸二八為功湯以拔有莘之賢為名文王以舉渭濱之叟為貴由此論之聖人興德孰不勞聰明于求人獲安逸于任使者哉是故仲尼不試無所授升猶序門人以為四科泛論衆材以辨三等又歎中庸以殊聖人之德尚德以勸庶幾之論訓六蔽以戒偏材之失思狂狷以通拘抗之材疾悾悾而無信以明僞似之難保又曰察其所安觀其所由以知居止之行人物之察也如此其詳是以敢依聖訓志序人物庶以補綴遺忘惟博識君子裁覽其義焉宋本人物志七華玄休先生棄世遁名藏身于虛廓絶影于無形榮時子聞而往焉曰僕聞至人之生世也必承天地之時勢統萬物之紘綱生有九州之秩沒有祀典之常僕將為先生陳天下之遠圖論品物之弘式規人事之榮華傳情志之所極藝文類聚五十七榮時子曰追風之馬出自遐裔狀若逸虯莫能羈制踐路躡節迅驅機發後不可及前不可越尋逸響追晷逐電藝文類聚五十七漱馬河源遊目崑崙文選魏都賦注超重淵越流沙文選七命注榮時子曰三時既畢玄冬效節木落草斃鳥竄獸穴爾乃駕六虯乘雕軒載金鉦鳴玉鸞鼓與雷起野火電延聲與天屬熛與電連藝文類聚五十七榮時子曰洞庭之鮒出于江涽紅腴青鱸朱尾碧鱗乃使朱玄揮臠騁厥妙伎先事敷割皮骨書鈔一百四十五引兩條藝文類聚五十七煮丹穴之卵炮南海之蠵除之臠麒麟之麛書鈔一百四十二一百四十五煎雋陵之縹翠蒸蔥嶺之碧雞書鈔一百四十二又一百四十五作嵩陵御覽九百二十四厥齊不同各有攸宜九沸三變其味乃和書鈔一百四十二于是爨陽山之穄九朔之禾書鈔一百四十二金光鏡野旌旗曜天雷輜翳路風馬如雲藝文類聚五十七化如神明書鈔十威光遠震書鈔十三于是三辰增曜大明重光醴泉波流芝圃揚芳毛群率舞羽族回翔聆九韶之聲變儀矩步之蹌蹌感神人而懷異物寧九有而綏人荒藝文類聚五十七樂論闕闕飛白書勢鳥魚龍蛇龜獸仙人蛟腳偃波楷隸八分世施常妙索草鍾真爰有飛白之麗貌豔勢珍若乃敷折毫芒纖手和會素幹冰解蘭墨電掣直准箭馳屈擬蠖勢繁節參談綺靡循殺有若煙雲拂蔚交紛刻繼韓盧接飛宋鵲遊逝藝文類聚七十四文帝誄鳳皇立翥文選頭陀寺碑注明帝誄先皇嘉其誕受洪允文選赭白馬賦注劉放奏停賣胡粉今官販粉賣胡粉與百姓爭錐刀之末利宜乞停之書鈔一百三十五引魏名臣奏以太尉司馬懿為太傅詔昔吳漢佐光武有征定四方之功為大司馬名稱于今太尉體道正直盡忠三世南摛孟達西破蜀虜東滅公孫淵功蓋海內先帝本以前後欲更其位者輒不彌久是以遲遲不施行耳今大將軍薦太尉宜為大司馬既合先帝本旨又放推讓進德尚勳乃欲明賢良辨等列順長少也雖旦奭之屬宗師呂望念在引領以處其下何以過哉朕甚嘉焉朕惟先帝固知君子樂天知命纖芥細疑不足為忌當顧柏人彭亡之文故用低回有意未遂耳斯亦先帝敬重大臣恩愛深厚之至也昔周成王建保傅之官近漢顯宗以鄧禹為太傅皆所以優崇雋乂必有尊也其以太尉為太傅持節統兵都督諸軍事如故魏志曹爽傳注引魏書帝使中書監劉放令孫資為詔又略見魏志齊王芳紀對明帝詔問萬年後計陛下恩深慮遠誠非愚臣所及書傳所載皆聖聽所究向使漢高不知平勃能安劉氏孝武不識金霍付屬以事殆不可言文皇帝始召曹真還時親詔臣以重慮及至晏駕陛下即阼猶有曹休外內之望賴遭日月御勒不傾使各守分職纖芥不閒以此推之親臣貴戚雖當據勢握兵宜使輕重素定若諸侯典兵力均衡平寵齊愛等則不相為服不相為服則意有異同今五營所領見兵常不過數百選授校尉如其輩類為有儔匹至于重大之任能有所維綱者宜以聖恩𥳑擇如平勃金霍劉章等一二人漸殊其威重使相鎮固于事為善魏志劉放傳注引孫資別傳又對臣聞知人則哲惟帝難之唐虞之聖凡所進用明試以功陳平初事漢祖絳灌等謗平有受金盜嫂之罪周勃以吹簫引彊始事高祖亦未知名也高祖察其行迹然後知可付以大事霍光給事中二十餘年小心謹慎乃見親信日磾夷狄以至孝質直特見擢用左右尚曰妄得一胡兒而重貴之平勃雖安漢嗣其終勃被反名平劣自免于呂須之讒上官桀桑弘羊與霍光爭權幾成禍亂此誠知人之不易為君之難也又所簡擇當得陛下所親當得陛下所信誠非愚臣之所能識別魏志劉放傳注引孫資別傳薦賈逵于相府逵在絳邑帥厲吏民與賊郭援交戰力盡而敗為賊所俘挺然直志顏辭不屈忠言聞于大衆烈節顯于當時雖古之直髮據鼎罔以加也其才兼文武誠時之利用魏志賈逵傳注引孫資別傳敘志賦胤鴻烈之末流蒙祖考之餘德奉過庭之明訓納微躬于軌則勉四民之耕耘遂能辨乎菽麥自弱冠而立廟無匡時之異才每寤寐以歎息思損己而降階遭大魏之革命罔群士于行職雖固陋之無用猶收録而序飾歷文武于機衡擁大璫于帝側隨倫儕以案牒乃剖符而封殖顧儀服而增憤心夕惕以愧恧蒙聖皇之宏恩過待罪于卿士奏朝請于朔望恭禋享于郊祀念余年之冉冉忽一過其如馳微奇功以佐時徒曠官其何為匪遜讓之足殉信神氣之稍衰將訴誠于明后乞骸骨而告歸藝文類聚二十六景福殿賦瞻大廈之穹崇結層搆而高驤修棟迪以虹指飛甍竦而鳳翔榱桷駢逼以星羅軒檻曼延而悠長伏應龍于反宇乘流蘇以飄揚于是周覽升降流目評觀業楹負極飛櫨承櫟枅梧綺錯楶梲鱗攢芙蓉側植藻井懸川則有望舒涼室羲和溫房玄冬則暖炎夏則涼總寒暑于區宇制天地之陰陽又有外城金狄詭貌殊姿列于應門肅有容威若乃離殿別館粲如列星安昌延休清宴永寧美百號之特居嘉休祥之令名步雕輦以逍遙時容與于蘭庭又有教坊講肆才士布列新詩變聲曲調殊別吟清商之激哇發角徵與白雪音感靈以動物起世俗以獨絶然後御龍舟兮翳翠蓋吳姬擢歌越女鼓枻詠采菱之清謳奏淥水之繁會藝文類聚六十二御覽一百八十八昭剛義于金光崇柔惠于建陽文選景福殿賦注時襄羊以劉覽步華輦于永始知稼穡之艱難壯農夫之克敏同上虞淵靈沼淥水泱泱文選景福殿賦注北看高昌邪睨建城文選景福殿賦注踐高昌以北眺臨列隊之京布文選景福殿賦注奏題署蔡雍自矜能書兼明斯喜之法非流紈體素不妄下筆夫工欲善其事必先利其器用張芝筆左伯紙及臣墨兼此三具又得臣手然後可逞徑丈之勢方寸千言御覽七百四十七引三輔決録注駮議胡昭禮賢徵士王政之所重也古者考行于卿今顗等位皆常伯納言嶷為卿佐足以取信附下罔上忠臣之所不行也昭宿德耆艾遺逸山林世所高尚誠宜嘉異魏志管寧傳注引高士傳皇后親蠶頌于時明庶扇物鳥帑昏正躬耕帝藉邁德班令嘉柔桑之肇敷思郊廟之至敬命皇后以親蠶俾躬桑于外坰考時日于巫咸詔大卜以獻貞御坤德之大輅翳翠葆以揚旌爾乃皇英參乘塗山奉輿總姜任于後陳載樊衛于二車千乘隱其雷動萬騎粲以星敷啓前路于三官命蚩尤而清衢遊青虬于左角步素螭于右隅登崇壇而正位覿休氣于朝陽步雕輦而下降采柔條于公桑嬪妾肅以蒞事職蠶植而承筐供副褘之六服昭孝敬于蒸嘗盛華禮于中宇神化馳于八方乃延群妾宴賜于前降至貴以逮下布愷悌之渥恩禮儀備序巾車回轅班中黃之禁財散束帛之戔戔神澤霈以雨施洪惠播于無原同碩慶于生民發三靈之永歡苞繁祜于萬國卷福釐以言旋美休祚于億載豈百世之曾玄藝文類聚十五初學記十四太僕杜侯誄入作納言光耀紫微北堂書鈔一百六十墨方合墨法以真朱一兩麝香半兩皆搗細後都合下鐵臼中搗三萬杵杵多愈益不得過二月九月初學記二十一筆方先次以鐵梳兔毫及羊青毛去其穢毛蓋使不髯茹訖各別之皆用梳掌痛拍整齊毫鋒端本各作扁極令均調平好用衣羊青毛縮羊青毛去兔毫頭下二分許然後合扁捲令極圓訖痛頡之以所整羊毛中或用衣中心名曰筆柱或曰墨池承墨復用毫青衣羊毛外如作柱法使中心齊亦使平均痛頡納管中寧隨毛長者使深寧小不大筆之大要也齊民要術九
