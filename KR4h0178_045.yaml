body:
  text: 阮籍二阮籍為鄭沖勸晉王箋沖等死罪伏見嘉命顯至竊聞明公固讓沖等眷眷實有愚心以為聖王作制百代同風褒德賞功有自來矣昔伊尹有莘氏之媵臣耳一佐成湯遂荷阿衡之號周公藉已成之勢據既安之業光宅曲阜奄有龜蒙呂尚磻溪之漁者一朝指麾乃封營丘自是以來功薄而賞厚者不可勝數然賢哲之士猶以為美談況自先相國以來世有明德翼輔魏室以綏天下朝無闕政民無謗言前者明公西征靈州北臨沙漠榆中以西望風震服羌戎東馳回首內向東誅叛逆全軍獨剋禽闔閭之將斬輕鋭之卒以萬萬計威加南海名懾三越宇內康寧苛慝不作是以殊俗畏威東夷獻舞故聖上覽乃昔以來禮典舊章開國光宅顯茲太原明公宜承聖旨受茲介福允當天人元功盛勳光光如彼國土嘉祚巍巍如此內外協同靡愆靡違由斯征伐則可朝服濟江掃除吳會西塞江源望祀岷山回戈弭節以麾天下遠無不服邇無不肅令大魏之德光于唐虞明公盛勳超于桓文然後臨滄州而謝支伯登箕山而揖許由豈不盛乎至公至平誰與為鄰何必勤勤小讓也哉沖等不通大體敢以陳聞文選又見晉書文帝紀詣蔣公奉記辭辟命籍死罪死罪伏惟明公以含一之德據上台之位群英翹首俊賢抗足開府之日人人自以為掾屬辟書始下而下走為首昔子夏處西河之上而文侯擁彗鄒子居黍谷之陰而昭王陪乘夫布衣韋帶之士孤居獨立王公大人所以屈體而下之者為道存也今籍無鄒卜之德而有其陋猥煩大禮何以當之方將耕于東皋之陽輸黍稷之餘稅以避當塗者之路負薪疲病足力不強補吏之召非所克堪乞回謬恩以光清舉文選晉書阮籍傳違由鄙鈍學行固野進無和俗崇譽之高退無靜默恬沖之操猥見顯飾非所被荷舊素尪瘵守病委劣拜謁之命未敢堪任昔榮期帶索仲尼不易其三樂仲子守志楚王不奪其灌園貪榮塞賢昧進負譏憂望交集五情相愧明公侔蹤魯衛勳隆桓文廣延俊傑恢崇大業乞降期會以避清路畢願家巷惟蒙于許此篇明刻阮集不載見舊寫本集與晉文王書薦盧播蓋聞興化濟治在于得人收奇拔異聖賢高致是以八士歸周周道以隆虞舜登庸元凱咸事伏惟明公公侯皇靈誕秀九德光被應期作輔論道敷化開闢四門延納羽翼賢士以贊雍熙是以英俊之士願排皇闥策名委質真豸之徒輻輳大府誠以鄧林昆吾翔鳳所栖懸黎和肆垂棘所集伏見鄙州別駕同郡盧播年三十二字景宣少有才秀之異長懷淑茂之量耽道悅禮仗義依仁研精墳典升堂覩奧聰鑒物理心通玄妙貞固足以幹事忠敬足以肅朝明斷足以質疑機密足以應權臨煩不惑在急彌明若得佐時理物則政事之器銜命聘享則專對之才潛心圖籍文學之宗敷藻載述良史之表然而學不為人行不求達故久沈淪未階太清誠後門之秀偉當時之利器宜蒙旌命和味鼎鉉孔子曰如有所譽必有所試播之所能著在已效不敢虛飾取謗大府本集藝文類聚五十三答伏義書藉白承音覽旨有心翰迹夫九蒼之高迅羽不能尋其巔四溟之深幽鱗不能測其底矧無毛分所能論哉且玄雲無定體應龍不常儀或朝濟夕卷翕忽代興或泥潛天飛晨降宵升舒體則八維不足以畼迹促節則無間足以從容是又瞽夫所不能瞻瑣蟲所不能解也然則弘修淵邈者非近力所能究矣靈變神化者非局器所能察矣何吾子之區區而吾真之務求乎人力勢不能齊好尚舛異鸞鳳凌雲漢以舞翼鳩鵷悅蓬林以翱翔螭浮八濱以濯鱗鱉娛行潦而群逝斯用情各從其好以取樂焉據此非彼胡可齊乎夫人之立節也將舒網以籠世豈樽樽以入罔方開模以範俗何暇毀質以通檢若良運未協神機無準則騰精抗志邈世高超蕩精舉于玄區之表攄妙節于九垓之外而翱翔之乘景躍踸踔陵忽慌從容與道化同逌逍遙與日月並流交名虛以齊變及英祇以等化上乎無上下乎無下居乎無室出乎無門齊萬物之去留隨六氣之虛盈總玄網于太極撫天一于寥廓飄埃不能揚其波飛塵不能垢其潔徒寄形軀于斯域何精神之可察雖業無不聞略無不稱而明有所逮未可怪也觀君子之趨欲衒傾城之金求百錢之售制造天之禮擬膚寸之檢勞王躬以役物守臊穢以自畢沈牛迹之浥薄慍河漢之無根其陋可愧其事可悲亮規略之懸踰信大道之弘幽且局步于常衢無為思遠以自愁比連疹憒力喻不多阮籍白老子贊陰陽不測變化無倫飄颻太素歸虛反真御覽一通易論阮子曰易者何也乃昔之玄真往古之變經也庖犧氏當天地一終值人物憔悴利用不存法制夷昧神明之德不通萬古之情不類于是始作八卦引而伸之觸類而長之分陰陽序剛柔積山澤連水火雜而一之變而通之終于未濟六十四卦盡而不窮是以天地象而萬物形吉凶著而悔吝生事用有取變化有成南面聽斷向明而治結繩而為網罟致日中之貨修耒耜之利以教天下皆得其所黃帝堯舜應時當務各有攸取窮神知化述則天序庖犧氏布演六十四卦之變後世聖人觀而因之象而用之禹湯之經皆在而上古之文不存至乎文王故繫其辭于是歸藏氏逝而周典經興上下無常剛柔相易不可為典要惟變所適故謂之易易之為書也本天地因陰陽推盛衰出自幽微以致明著故乾元初潛龍勿用言大人之德隱而未彰潛而未達待時而興循變而發天地既設屯蒙始生需以待時訟以立義師以聚衆比以安民是以先王以建萬國親諸侯收其心也原而積之畜而制之是以上下和洽裁成天地之道輔相天地之宜以左右民順其理也先王既沒德法乖易上陵下替君臣不制剛柔不和天地不交是以君子一類求同遏惡揚善以致其大謙而光之裒多益寡崇聖善以命雷出于地于是大人得位明聖又興故先王作樂薦上帝昭明其道以答天貺于是萬物服從隨而事之子遵其父臣承其君臨馭統一大觀天下是以先王以省方觀民設教儀之以度也包而有之合而含之故先王用之以明罰敕法自上乃下貴復其賤美成亨盡時極日至先王閉關商旅不行后不省方以靜民也季葉既衰非謀之獲應運順天不妄而作故先王茂對時育萬物施仁布澤以樹其德也萬物歸隨如法流承養善反惡利積生害剛過失柄習坎以位上失其道下喪其群於是大人繼明照于四方顯其德也自乾元以來施平而明盛衰有時剛柔無常或得或失一陰一陽出入吉凶由暗察彰文明以止有翼不飛隨之乃存取之者歸施之以若用之在微貴變慎小與物相追非知來藏往者莫之能審也易之為書也覆燾天地之道囊括萬物之情道至而反事極而改反用應時改用當務應時故天下仰其澤當務故萬物恃其利澤施而天下服此天下之所以順自然惠生類也富貴侔天地功名充六合莫之能傾莫之能害者道不逆也天地易之主也萬物易之心也故虛以受之感以和之男下女上通其氣也柔以承剛久其類也順而持之遁而退之上隆下積剛動大壯正大必用力盛則望明升惟進光大則傷聚以處身異以成類乖離既解緩以為失損益有時察以主使揚于王庭乘五馬敗剛既決柔上索下合令臣遭明君以柔遇剛品物咸亨剛據中正天下大行是以后用施命誥四國貴離教也于是天地萃聚百姓合用升而不已屆極及下井養不窮卑不能通不可弗革改以成器尊卑有分長幼有序主之以震守之以威動不可終敵應而行漸以進之為人求位君子之欲進者也臣之求君陰之從陽委之歸誠乃得其所歸而應之專而一之陽德受歸道豐位大也賢人君子有衆以成其大也窮侈喪大夫之位群而靡容容而無所卑身下意利見大人巽以申命柔順乎剛入而説之説而教之順而應人渙然成章風行水上有文有光男行不窮女位乎外衆陰承五上同在中從初更始乘木有功故先王以享于帝立廟奉天建國也剛柔分適得中節之以制其道不窮信愛結內剛得中位誠發于心庶物唯類大得則虧甚往則過既應于遠默則不利故君子是以行重乎恭喪重乎哀篤偽薄也小過下泰不宜于上下止上動有飛鳥之象焉初六坎下上六離體飛鳥以凶是以災眚也柔處中剛失位利與時行過而欲遂小亨正象陰皆乘陽陽剛淩替君臣易位亂而不已非中之謂故君子思患而豫防之慮其敗也通變無窮周敗又始剛未出陰在中柔濟不遺遂度不窮則象河洛神物設教而天下服慎辨居方陰陽相求初與之道遠作之由也卦體開闔乾以一為開坤以二為闔乾坤成體而剛柔有位故木老于未水生于申而坤在西南火老于戌木生于亥而乾在西北剛柔之際也故謂之父母陽承震動發而相承專制遂行萬物以興故謂之長男水老于辰金生于巳一氣存之終而復起故巽為長女震發于風陰德有紀火中鶪鳴母道將始故離為中女又在西北健戰將升季陰幼昧衰而不勝故兌為少女倉中拔留肇幽為陽在中未達含而未章故坎為中男周流接合萬物既終造微更始明而未融故艮為少男乾圓坤方女柔男剛健柔時推而福禍是將循化知生從變見亡故吉凶成敗不可亂也大過何也棟橈莫輔大者過也先王之馭世也刑設而不犯罰著而不施習坎剛中惟以心亨王正其德公守厥職上下不疑臣主無惑納約自牖非戶何咎車騎中門劍戟在闥雖置叢棘凶已三歲上六失道刑決也故高宗伐鬼方柔道中也三年有賞德乃豐也同人五號思其終也旅上之美樂其窮也是以失刑者嚴而不檢喪德者高而不尊故君子正義以守位固法以威民何衢則亨滅耳而凶也小過何也踰位淩上害正危身小者過也既濟初六終亂何也水加日上三陰乘陽以力求濟不止必亡故初吉終亂也未濟上六飲酒無咎何也過而莫改危而弗間誰咎之也無妄何也無望而至非會合陰陽之違行也六三無妄之災或繫之牛行人得之邑人災何也有國而不收其民有衆而不修其器行人得之不亦災乎九五之疾勿藥何也非常之厚離以為同無妄之疾災以除凶天時成敗何疾之功勿藥有喜不成何識也龍者何也陽健之類盛德尊貴之喻也配天之厚盛德莫高之謂尊貴大人受命處中當陽德之至也亢龍有悔何也繼守承貴有因而德不充者也欲大而不顧其小甘侈而不思其匱居正上位而無卑有貴勞而無據喪志危身是以悔也先王何也大人之功也故建萬國親諸侯樹其義也作樂薦上帝正其命也省方觀民施其令也明罰敕法督其政也閉關不行靜亂民也茂時育德應顯其福也享帝立廟昭其祿也稱聖王所造非承平之謂也后者何也成君定位據業修制保教守法畜履治安者也故自然成功濟用已至大通后成天地之道以左右民也成化理決施令誥方因統紹衰中處將正之務非應初受命之事也上者何也日月相易盛衰相及致飾則利之未捷受故王后不稱君子不錯上以厚下道自然也君子者何也佐聖扶命翼教明法觀時而行有道而臣人者也因正德以理其義察危廢以守其身故經綸以正盈果行以遂義飲食以須時辨義以作事皆所以章先王之建國輔聖人之神志也見險慮難思患預防別物居方慎初敬始皆人臣之行非大君之道也大人者何也龍德潛達貴賤通明有位無稱大以行之故大過滅示天下幽明大人發輝重光繼明照于四方萬物仰生合德天地不為而成故大人虎變天德興也君子曰易順天地序萬物方圓有正體四時有常位事業有所麗鳥獸有所萃故萬物莫不一也陰陽性生性故有剛柔剛柔情生情故有愛惡愛惡生得失得失生悔吝悔吝著而吉凶見八卦居方以正性蓍龜圓通以索情情性交而利害出故立仁義以定性取蓍龜以制情仁義有偶而禍福分是故聖人以建天下之位定尊卑之制序陰陽之適別剛柔之節順之者存逆之者亡得之者身安失之者身危故犯之以別求者雖吉必凶知之以守篤者雖窮必通故寂寞者德之主恣睢者賊之原進往者反之初終盡者始之根也是以未至不可坼也已用不可越也紂有天下之號而比匹夫之類鄰周處小侯之細而享于西山之賓外內之應已施而貴賤之名未分何也天道未究善惡未淳也是以明夫天之道者不欲審乎人之德者不憂在上而不凌乎下處卑而不犯乎貴故道不可逆德不可拂也是以聖人獨立無悶大群不益釋之而道存用之而不可既由此觀之易以通矣通老論聖人明于天人之理達于自然之分通于治化之體審于大慎之訓故君臣垂拱完太素之朴百姓熙怡保性命之和御覽一道者法自然而為化侯王能守之萬物將自化易謂之太極春秋謂之元老子謂之道御覽一三皇依道五帝仗德三王施仁五霸行義強國任智蓋優劣之異薄厚之降也御覽七十七達莊論伊單閼之辰執徐之歲萬物權輿之時季秋遙夜之月先生徘徊翱翔迎風而遊往遵乎赤水之上來登乎隱坌之丘臨乎曲轅之道顧乎泱漭之州恍然而止忽然而休不識曩之所以行今之所以留悵然而無樂愀然而歸白素焉平晝間居隱几而彈琴于是縉紳好事之徒相與聞之共議撰辭合句啓所常疑乃窺鑒整飾嚼齒先引推年躡踵相隨俱進奕奕然步䐱䐱然視投迹蹈階趨而翔至差肩而坐恭袖而檢猶豫相林莫肯先占有一人是其中雄桀也乃怒目擊勢而大言曰吾生乎唐虞之後長乎文武之裔遊乎成康之隆盛乎今者之世誦乎六經之教習乎吾儒之迹被沙衣冠飛翮垂曲裙揚雙鶂有日矣而未聞乎至道之要有以異之于斯乎且大人稱之細人承之願聞至教以發其疑先生曰何哉子之所疑者客曰天道貴生地道貴貞聖人修之以建其名吉凶有分是非有經務利高勢惡死重生故天下安而大功成也今莊周乃齊禍福而一死生以天地為一物以萬類為一指無乃徼惑以失真而自以為誠者也于是先生乃撫琴容與慨然而歎俯而微笑仰而流眄噓吸精神言其所見曰昔人有欲觀于閬峰之上者資端冕服驊騮至乎崑崙之下沒而不反端冕者常服之飾驊騮者凡乘之耳非所以矯騰增城之上遊玄圃之中也且燭龍之光不照一堂之上鏜山之口不談曲室之內今吾將墮崔巍之高杜衍謾之流言子之所由幾其寤而獲及乎天地生于自然萬物生于天地自然者無外故天地名焉天地者有內故萬物生焉當其無外誰謂異乎當其有內誰謂殊乎地流其燥天抗其濕月東出日西入隨以相從解而後合升謂之陽降謂之陰在地謂之理在天謂之文蒸謂之雨散謂之風炎謂之火凝謂之冰形謂之石象謂之星朔謂之朝晦謂之冥通謂之川回謂之淵平謂之土積謂之山男女同位山澤通氣雷風不相射水火不相薄天地合其德日月順其光自然一體則萬物經其常入謂之幽出謂之章一氣盛衰變化而不傷是以重陰雷電非異出也天地日月非殊物也故曰自其異者視之則肝膽楚越也自其同者視之則萬物一體也人生天地之中體自然之形身者陰陽之精氣也性者五行之正性也情者遊魂之變欲也神者天地之所以馭者也以生言之則物無不壽推之以死則物無不夭自小視之則萬物莫不小由大觀之則萬物莫不大殤子為壽彭祖為夭秋毫為大泰山為小故以死生為一貫是非為一條也別而言之則鬚眉異名合而説之則體之一毛也彼六經之言分處之教也莊周之云致意之辭也大而臨之則至極無外小而理之則物有其制夫守什伍之數審左右之名一曲之説也循自然住天地者寥廓之談也凡耳目之耆名分之施處官不易司舉奉其身非以絶手足裂肢體也然後世之好異者不顧其本各言我而已矣何待于彼殘生害性還為讎敵斷割肢體不以為痛目視色而不顧耳之所聞耳所聽而不待心之所思心奔欲而不適性之所安故疾疢萌則生不盡禍亂作則萬物殘矣夫至人者恬于生而靜于死生恬則情不惑死靜則神不離故能與陰陽化而不易從天地變而不移生究其壽死循其宜心氣平治不消不虧是以廣成子處崆洞之山以入無窮之門軒轅登崑崙之阜而遺玄珠之根此則潛身者易以為活而離本者難與永存也馮夷不遇海若則不以己為小雲將不失于其濛鴻則無以知其少由斯言之自是者不章自建者不立守其有者有據持其無者無執月弦則滿日朝則襲咸池不留陽谷之上而懸車之後將入也故求得者喪爭明者失無欲者自足空虛者受實夫山靜而谷深者自然之道也得之道而正者君子之實也是以作智造巧者害于物明是考非者危其身修飾以顯潔者惑于生畏死而崇生者失其貞故自然之理不得作天地不泰而日月爭隨朝夕失期而晝夜無分競逐趨利舛倚橫馳父子不合君臣乖離故復言以求信者梁下之誠也克己以為人者郭外之仁也竊其雉經者亡家之子也刳腹割肌者亂國之臣也曜菁華被沆瀣者昏世之士也履霜露蒙塵埃者貪冒之民也潔己以尤世修身以明汙者誹謗之屬也繁稱是非背質追文者迷罔之倫也誠非媚悅以容求孚故被珠玉以赴水火者桀紂之終也含菽采薇交餓而死顏夷之窮也是以名利之塗開則忠信之誠薄是非之辭著則醇厚之情爍也故至道之極混一不分同為一體得失無聞伏羲氏結繩神農教耕逆之者死順之者生又安知貪汙之為罰而貞白之為名乎使至德之要無外而已大均淳固不二其紀清靜寂寞空豁以俟善惡莫之分是非無所爭故萬物反其所而得其情也儒墨之後堅白並起吉凶連物得失在心結徒聚黨辨説相侵昔大齊之雄三晉之士嘗相與瞑目張膽分別此矣咸以為百年之生難致而日月之蹉無常皆盛僕馬修衣裳美珠玉飾帷牆出媚君上入欺父兄矯厲才智競逐縱橫家以慧子殘國以才臣亡故不終其天年而大自割繁其于世俗也是以山中之木本大而莫傷復萬數竅相和忽焉自已夫雁之不存無其質而濁其文死生無變而龜之見寶知吉凶也故至人清其質而濁其文死生無變而未始有云夫別言者懷道之談也折辨者毀德之端也氣分者一身之疾也二心者萬物之患也故夫裝束馬軾者行以離支慮在成敗者坐而求敵踰阻攻險者趙氏之人也舉山填海者燕楚之人也莊周見其若此故述道德之妙敘無為之本寓言以廣之假物以延之聊以娛無為之心而逍遙于一世豈將以希咸陽之門而與稷下爭辨也哉夫善接人者導焉而已無所逆之故公孟季子衣繡而見墨子弗攻中山子牟心在魏闕而詹子不距因其所以來用其所以至循而泰之使自居之發而開之使自舒之且莊周之書何足道哉猶未聞夫太始之論玄古之微言乎直能不害于物而形以生物無所毀而神以清形神在我而道德成忠信不離而上下平茲容今談而同古齊説而意殊是心能守其本而口發不相須也于是二三子者風搖波蕩相視䐱脈亂次而退踼跌失迹隨而望之耳後頗亦以是知其無實喪氣而慚愧于衰僻也本集又略見藝文類聚三十七
