body:
  text: 武帝滄海賦覽島嶼之所有文選吳都賦劉逵注登臺賦引長明灌街里水經濁漳水注鶡雞賦序鶡雞猛氣其鬭終無負期于必死今人以鶡為冠像此也大觀本草十九鶡雞假為獻帝策收伏后建安十九年建安十九年假為獻帝策收伏后建安十九年皇后壽得由卑賤登顯尊極自處椒房二紀于茲既無任姒徽音之美又乏謹身養己之福而陰懷妒害苞藏禍心弗可以承天命奉祖宗今使御史大夫郄慮持節策詔其上皇后璽綬退避中宮遷于它館嗚呼傷哉自壽取之未致于理為幸多焉後漢書獻帝伏皇后紀策立卞后建安二十四年建安二十四年策立卞后建安二十四年夫人卞氏撫養諸子有母儀之德今進位王后太子諸侯陪位群卿上壽減國內死罪一等魏志卞皇后傳領兗州牧表入司兵校出總符任臣以累葉受恩膺荷洪施不敢顧命是以將戈帥甲順天行誅雖戮夷覆亡不暇臣愧以興隆之秩功無所執以偽假實條不勝華竊感譏請益以惟谷藝文類聚五十陳損益表初平三年初平三年陳損益表初平三年陛下即祚復蒙試用遂受上將之任統領二州內參機事實所不堪昔韓非閔韓之削弱不務富國強兵用賢任能臣以區區之質而當鐘鼎之任以闇鈍之才而奉明明之政顧恩念責亦臣竭節投命之秋也謹條遵奉舊訓權時之宜十四事奏如左庶以蒸螢增明太陽言不足採藝文類聚五十二表糜竺領嬴郡建安元年建安元年表糜竺領嬴郡建安元年泰山郡界曠遠舊多輕悍權時之宜可分五縣為嬴郡揀選清廉以為守將偏將軍糜竺素履忠貞文武昭烈請以竺領嬴郡太守撫慰吏民蜀志糜竺傳注引曹公集謝襲費亭侯表建安元年建安十九年謝襲費亭侯表建安元年不悟陛下乃尋臣祖父廁豫功臣克定寇逆援立孝順皇帝謂操不忘獲封茅土聖恩明發遠念桑梓日以臣為忠孝之苗不復量臣才之豐否既勉襲爵邑忝厥祖考復寵上將鈇鉞之任兼領大州萬里之憲內比鼎臣外參二伯身荷兼紱之榮本枝賴無窮之祚也昔大彭輔殷昆吾翼夏功成事就乃備爵錫臣束脩無稱統御無績比荷殊寵策命褒績未盈一時三命交至雙金重紫顯以方任雖不識義庶知所尤藝文類聚五十二謝置旄頭表不悟陛下復加後命命置旄頭以比東海御覽六百八十讓還司空印綬表臣文非師尹之佐武非折衝之任遭天之幸干竊重授內踵伯禽司空之職外承呂尚鷹揚之事斗筲處之民其瞻觀水土不平姦宄未靜臣常媿辱憂為國累臣無智勇以助萬一夙夜慚懼若集水火未知何地可以殞越藝文類聚六十七請爵荀彧表建安八年建安八年請爵荀彧表建安八年臣聞慮為功首謀為賞本野績不越廟堂戰多不踰國勳是故曲阜之錫不後營丘蕭何之土先于平陽珍策重計古今所尚侍中守尚書令彧積德累行少長無悔遭世紛擾懷忠念治臣自始舉義兵周游征伐與彧戮力同心左右王略發言授策無施不效彧之功業臣由以濟用披浮雲顯光日月陛下幸許彧左右機近忠恪祗順如履薄冰研精極銳以撫庶事天下之定彧之功也宜享高爵以彰元勳魏志荀彧傳注引彧別傳守尚書令荀彧自在臣營參同計畫周旋征伐每皆克捷奇策密謀悉皆共決及彧在臺常私書往來大小同策詩美腹心傳貴廟勝勳業之定彧之功也而臣前後獨荷異寵心所不安彧與臣事通功並宜進封賞以勸後進者袁宏後漢紀二十九建安八年七月曹操上言請封荀攸表軍師荀攸自初佐臣無征不從前後克敵皆攸之謀也魏志荀攸傳表稱樂進于禁張遼建安十一年建安十一年表稱樂進于禁張遼建安十一年武力既弘計略周備質忠性一守執節義每臨戰攻常為督率奮彊突固無堅不陷自援枹鼓手不知倦又遣別征統御師旅撫眾則和奉令無犯當敵制決靡有遺失論功紀用各宜顯寵魏志樂進傳請增封荀彧表昔袁紹作逆連兵官渡時眾寡糧單圖欲還許尚書令荀彧深建宜往之便遠恢進討之略起發臣心革易愚慮堅營固守徼其軍實遂摧撲大寇濟危以安紹既破敗臣糧亦盡將舍河北之規改就荊南之策彧復備陳得失用移臣議故得反旆冀土克平四州向使臣退軍官渡紹必鼓行而前敵人懷利以自百臣眾怯沮以喪氣有必敗之形無一捷之勢復若南征劉表委棄兗豫飢軍深入踰越江沔利既難要將失本據而彧建二策以亡為存以禍為福謀殊功異臣所不及是故先帝貴指蹤之功薄搏獲之賞古人尚帷幄之規下攻拔之力原其績效足享高爵而海內未喻其狀所受不侔其功臣誠惜之乞重平議增疇戶邑後漢荀彧傳又魏志苟彧傳注引彧別傳曰太祖又表曰昔袁紹侵入郊甸戰于官渡時兵少糧盡圖欲還許書與彧議彧不聽臣建宜住之便恢進討之規更起臣心易其愚慮遂摧大逆覆取其眾此彧覩勝敗之機略不世出也及紹破敗臣糧亦盡以為河北未易圖也欲南討劉表彧復止臣陳其得失臣用反旆遂吞凶族克平四州向使臣退于官渡紹必鼓行而前有傾覆之形無克捷之勢後若南征委棄兗豫利既難要將失本據彧之二策以亡為存以禍致福謀殊功異臣所不及也是以先帝貴指蹤之功薄搏獲之賞古人尚帷幄之規下攻拔之捷前所賞錄未副彧巍巍之勳乞軍平議疇其戶邑又見袁宏後漢紀三十與別傳及後漢略同昔袁紹入郊甸戰於官渡時兵少糧盡圖欲還許荀彧乃建進討之規遂摧大逆覆取其眾此彧覩勝敗之機略不出世紹既破敗臣糧亦盡以為河北未易圖也欲南討劉表或復止臣陳其得失臣用反於是遂平四州向使臣退於官渡紹必鼓行而前遂征劉表則河北延其凶訃彧之二策以立為存以禍為福臣所不及也是故先帝貴指縱之功薄搏獲之賞古人尚帷幄之規下攻拔之捷原其績效足享高爵而海內未喻其狀所受不侔其功臣誠惜之乞重平議增疇戶邑表論田疇功文雅優備忠武又著和于撫下慎于事上量時度理進退合義幽州始擾胡漢交萃蕩析離居靡所依懷疇率宗人避難于無終山北拒盧龍南守要害清靜隱約耕而後食人民化從咸共資奉及袁紹父子威力加于朔野遠結烏丸與為首尾前後召疇終不陷撓後臣奉命軍次易縣疇長驅自到陳討胡之勢猶廣武之建燕策薛公之度淮南又使部曲持臣露布出誘胡眾漢民或因亡來烏丸聞之震蕩王旅出塞塗由山中九百餘里疇帥兵五百啟導山谷遂滅烏丸蕩平塞表疇文武有效節義可嘉誠應寵賞以旌其美魏志田疇傳注引先賢行狀請追增郭嘉封邑表臣聞褒忠示寵未必當身念功惟績恩隆後嗣是以楚宗孫叔顯封厥子岑彭既沒爵及支庶誠賢君殷勤于清良聖祖敦篤于明勳也故軍祭酒洧陽亭侯潁川郭嘉立身著行稱茂鄉邦與臣參事盡節為國忠良淵淑體通性達每有大議發言盈廷執中處理動無遺策自在軍旅十有餘年行同騎乘坐共幄席東禽呂布西取眭固斬袁譚之首平朔土之眾踰越險塞盪定烏丸震威遼東以梟袁尚雖假天威易為指麾至于臨敵發揚誓命凶逆克殄勳實由嘉臣今日所以免戾嘉與其功方將表顯使賞足以報效薄命夭殞不終美志上為陛下悼惜良臣下自毒恨喪失奇佐昔霍去病蚤死孝武為之咨嗟祭遵不究功業世祖望柩悲慟仁恩降下念發五內今嘉隕命誠足憐傷宜追贈加封並前千戶褒亡為存厚往勸來也魏志郭嘉傳注引魏書又藝文類聚五十一案魏志郭嘉傳載此表云軍祭酒郭嘉自從征伐十有一年每有大謀臨敵制變臣策未決嘉輒成之平定天下謀功為高不幸短命事業未終追思嘉勳實不可忘可增邑八百戶並前千戶即前表約文惟多出增邑八百戶一句表論張遼功登天山履峻險以取蘭成盪寇功也增邑假節魏志張遼傳掩獲宋金生表臣前遣討河內獲嘉諸屯獲生口辭云河內有一神人宋金生令諸屯皆云鹿角不須守吾使狗為汝守不從其言者即夜聞有軍兵聲明日視屯下但見虎跡臣輒部武猛都尉呂納將兵掩捉得生口輒行軍法御覽三百三十七留荀彧表臣聞古之遣將上設監督之重下建副二之任所以尊嚴國命謀而鮮過者也臣今當濟江奉辭伐罪宜有大使肅將王命文武竝用自古有之使持節侍中守尚書令萬歲亭侯彧國之重臣德洽華夏既停軍所次便宜與臣俱進宣示國命威懷醜虜軍禮尚速不及先請臣輒留彧依以為重後漢荀彧傳讓九錫表臣功小德薄忝寵已過進爵益土非臣所宜九錫大禮臣所不稱惶悸征營心如炎灼歸情寫實冀蒙聽省不悟陛下復詔褒誘喻以伊周未見哀許臣聞事君之道犯而勿欺量能處位計功受爵苟所不堪有損無從加臣待罪上相民所具瞻而自過謬其謂臣何藝文類聚五十三上器物表臣祖騰有順帝賜器今上四石銅鋗四枚五石銅鋗一枚御物有純銀粉銚一枚藥杵臼一具御覽七百五十七七百六十二奏定制度三公列侯門施內外塾方三十畝御覽百八十五奏上九醞酒法臣縣故令南陽郭芝有九醞春酒法用麵三十斤流水五石臘月二日清麴正月凍解用好稻米漉去麴滓便釀法飲曰譬諸蟲雖久多完三日一釀滿九斛米止臣得法釀之常善其上清滓亦可飲若以九醞苦難飲增為十釀差甘易飲不病今謹上獻北堂書鈔一百四十八又文選南都賦注引魏武集奏事有警急輒露版插羽封氏聞見記四上雜物疏御物三十種有純銀參鏤帶漆畫書案一枚純銀參帶臺硯一枚純銀參帶圓硯大小各一枚書鈔一百三十三藝文類聚五十八初學記二十一御覽六百五御物有漆畫韋枕二枚貴人公主有黑漆韋枕三十枚書鈔一百三十四御物三十種有純金香爐一枚下盤自副貴人公主有純銀香爐四枚皇太子有純銀香爐四枚西園貴人銅香爐三十枚書鈔一百三十五藝文類聚七十御覽七百三八百十二御雜物用有純金唾壺一枚漆園油唾壺四枚貴人有純銀參帶唾壺三十枚御覽七百三御物三十種有上車漆畫重几大小各一枚書鈔一百三十三御覽七百八御物有純銀參鏤帶漆畫案一枚御覽七百十御物有尺二寸金錯鐵鏡一枚皇后雜物用純銀錯七寸鐵鏡四枚貴人至公主九寸鐵鏡四十枚書鈔一百三十六初學記二十五御覽七百一十七御物中宮貴人公主皇子純銀漆帶鏡一枚西園貴人純銀參帶五皇子銀匣皇子雜用物十六種純金參帶方嚴四具御覽八百十二鏡臺出魏宮中有純銀參帶鏡臺一枚又純銀七貴人公主銀鏡臺四書鈔一百三十六初學記二十五御覽七百一十七純銀澡豆奩純銀括鏤奩書鈔一百三十五御覽七百一十七銀鏤漆匣四枚書鈔一百三十五御覽七百一十三油漆畫嚴器一純金參帶畫方嚴器一御覽七百十七御雜物之所得孝順皇帝賜物有容五石銅澡盤一枚書鈔一百三十五銀畫象牙盤五具御覽七百五十九中宮用物雜畫象列尺一枚貴人公主有象牙尺三十枚宮人有象牙尺百五十枚骨尺五十枚御覽八百三十中宮雜物雜象牙管鍼管一枚御覽八百三十上書理竇武陳蕃武等正直而見陷害姦邪盈朝善人壅塞魏志武帝紀注引魏書兗州牧上書山陽郡有美梨謹上縫帳二絲縷十斤甘梨二箱椑棗二箱初學記二十御覽八百三十又九百六十九九百七十一上書讓增封建安元年建安元年上書讓增封建安元年無非常之功而受非常之福是用憂結比章歸聞天慈無已未即聽許臣雖不敏猶知讓不過三所以仍布腹心至于四五上欲陛下爵不失實下為臣身免于苟取藝文類聚五十一又上書讓封建安元年建安元年又上書讓封建安元年臣誅除暴逆克定二州四方來貢以為臣之功蕭相國以關中之勞一門受封鄧禹以河北之勤連城食邑考功效實非臣之勳臣祖父中常侍侯時但從輦扶翼左右既非首謀又不奮戟並受爵封暨臣三葉臣聞易豫卦曰利建侯行師有功乃當進立以為諸侯也又訟卦六三曰食舊德或從王事謂先祖有大德若從王事有功者子孫乃得食其祿也伏惟陛下垂乾坤之仁降雲雨之潤遠錄先臣扶掖之節採臣在戎犬馬之用優策褒崇光曜顯量非臣尩頑所能克堪藝文類聚五十一上書讓費亭侯臣伏讀前後策命既錄臣庸才微功乃復追述先臣幽讚顯揚見得思義屏營怖懼未知首領所當所授故古人忠臣或有連城而不辭或有一邑而違命所以然者欲必正其名也又禮制諸侯國土以絕子孫有功者當更受封不得增襲其有所增者謂國未絕也或有所襲者謂先祖功大也數未極無故斷絕故追紹之也臣自三省先臣雖有扶輦微勞不應受爵豈逮臣三葉若錄臣關東微功皆祖宗之靈祐陛下之聖德豈臣愚陋何能克堪藝文類聚五十一上書讓增封武平侯及費亭侯伏自三省姿質頑素材志鄙下進無匡輔之功退有拾遺之美雖有犬馬微勞非獨臣力皆由部曲將校之助陛下前追念先臣微功使臣續襲爵土祖考蒙光照之榮臣受不貲之分未有絲髮以自報效昔齊侯欲更晏嬰之宅嬰曰臣之先容焉臣不足以繼之卒違公命以成私志臣自顧省不克負荷食舊為幸雖上德在弘下有因割臣三葉累寵皆統極位義在殞越豈敢飾辭藝文類聚五十一上書謝策命魏公建安十八年五月建安十八年五月上書謝策命魏公建安十八年五月臣蒙先帝厚恩致位郎署受性疲怠意望畢足非敢希望高位庶幾顯達會董卓作亂義當死難故敢奮身出命摧鋒率眾遂值千載之運奉役目下當二袁炎沸侵侮之際陛下與臣寒心同憂顧瞻京師進受猛敵常恐君臣俱陷虎口誠不自意能全首領賴祖宗靈祐醜類夷滅得使微臣竊名其間陛下加恩授以上相封爵寵祿豐大弘厚生平之願實不望也口與心計幸且待罪保持列侯遺付子孫自托聖世永無憂責不意陛下乃發盛意開國備錫以貺愚臣地比齊魯禮同藩王非臣無功所宜膺據歸情上聞不蒙聽許嚴詔切至誠使臣心俯仰逼迫伏自惟省列在大臣命制王室身非己有豈敢自私遂其愚意亦將黜退令就初服今奉疆土備數藩翰非敢遠期慮有後世至于父子相誓終身灰軀盡命報塞厚恩天威在顏悚懼受詔魏志武帝紀注引魏略上言破袁紹建安五年十月建安五年十月上言破袁紹建安五年十月大將軍鄴侯袁紹前與冀州牧韓馥立故大司馬劉虞刻作金璽遣故任長畢瑜詣虞為說命祿之數又紹與臣書云可都甄城當有所立擅鑄金銀印孝廉計吏皆往詣紹從弟濟陰太守敘與紹書云今海內喪敗天意實在我家神應有徵當在尊兄南兄臣下欲使即位南兄言以年則北兄長以位則北兄重便欲送璽會曹操斷道紹宗族累世受國重恩而凶逆無道乃至于此輒勒兵馬與戰官渡乘聖朝之威得斬紹大將淳于瓊等八人首遂大破潰紹與子譚輕身迸走凡斬首七萬餘級輜重財物巨億魏志武帝紀注引獻帝起居注破袁尚上事臣前上言逆賊袁尚還即厲精銳討之今尚人徒震蕩部曲喪守引兵遁亡臣陳軍被堅執銳朱旗震燿虎士雷譟望旗眩精聞聲喪氣投戈解甲翕然沮壞尚單騎遁走捐棄偽節鉞鈇大將軍邟鄉侯印各一枚兜鍪萬九千六百二十枚其矛楯弓戟不可勝數御覽三百五十六授崔琰東曹教君有伯夷之風史魚之直貪夫慕名而清壯士尚稱而厲斯可以率時者已故授東曹往踐厥職魏志崔琰傳決議田疇讓官教昔夷齊棄爵而譏武王可謂愚闇孔子猶以為求仁得仁疇之所守雖不合道但欲清高耳使天下悉如疇志即墨翟兼愛尚同之事而老聃使民結繩之道也外議雖善為復使令司隸以決之魏志田疇傳注引魏略與韓遂教建安十六年建安十六年與韓遂教建安十六年謝文約卿始起兵時自有所逼我所具明也當早來共匡輔國朝魏志張既傳注引魏略征吳教今孤戒嚴未知所之有諫者死魏志賈逵傳原賈逵教逵無惡意原復其職魏志賈逵傳合肥密教若孫權至者張李將軍出戰樂將軍守護軍勿得與戰魏志張遼傳賜袁渙家穀教以太倉穀千斛賜郎中令之家以垣下穀千斛與曜卿家以太倉穀者官法也以垣下穀者親舊也已上三教竝魏志袁渙傳
