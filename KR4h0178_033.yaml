body:
  text: 蔣濟為畢軌擊鮮卑失利表畢軌前失既往不咎但恐是後難可以再凡人材有長短不可彊成軌文雅志意自為美器今失并州換置他州若入居顯職不毀其德于國事實善此安危之要唯聖恩察之魏志曹爽傳注引魏略論曹休帥軍向皖表深入虜地與權精兵對而朱然等在上流乘休後臣未見其利也魏志蔣濟傳注軍至皖吳出兵安陵又上疏今賊示形于西必欲并兵圖東宜急詔諸軍往救之魏志蔣濟傳諫專任中書監令疏大臣太重者國危左右太親者身蔽古之至戒也往者大臣秉事外內扇動陛下卓然自覽萬機莫不祗肅夫大臣非不忠也然威權在下者則衆心慢上勢之常也陛下既已察之于大臣願無忘于左右左右忠正遠慮未必賢于大臣至于便辟取舍或能工之今外所言輒云中書雖使恭慎不敢外交但有此名猶惑世俗況實握事要日在目前儻因疲倦之間有所割制衆臣見其能推移于事即亦回附而向之一有此端因當內設自完以此衆語私招所交為之內援若此臧否毀譽必有所興功負賞罰必有所易直道而上者或壅曲附左右者反達因微而入緣形而出意所狎信不復猜覺此宜聖智所當早聞外以經意則形際自見或恐朝臣畏言不合而受左右之怨莫適以聞臣竊亮陛下潛神默思公聽竝觀若事有未盡于理而物有未周于用將改曲易調遠與黃唐角功近昭武文之迹豈近習而已哉然人君猶不可悉天下事以適己明當有所付三官任一臣非周公旦之忠又非管夷吾之公則有弄機敗官之弊當今柱石之士雖少至于行稱一州智效一官忠信竭命各奉其職可竝驅策不使聖明之朝有專吏之名也魏志蔣濟傳又通典二十一諫遣田豫王雄攻遼東凡非相吞之國不侵叛之臣不宜輕伐伐之而不制是驅使為賊故曰虎狼當路不治狐貍先除大害小害自己今海表之地纍世委質歲選計考不乏職貢議者先之正使一舉便克得其民不足益國得其財不足為富儻不如意是為結怨失信也魏志明帝紀注引司馬彪戰略太和六年遣田豫王雄攻遼東濟諫帝不聽諫外勤征役內務宮室疏陛下方當恢崇前緒光濟遺業誠未得高枕而治也今雖有十二州至于民數不過漢時一大郡二賊未誅宿兵邊陲且耕且戰怨曠積年宗廟宮室百事草創農桑者少衣食者多今其所急務唯當息耗百姓不至甚弊弊㩻之民儻有水旱百萬之衆不為國用凡使民必須農隙不奪其時夫欲大興之君先料其民力而燠休之句踐養胎以待用昭王恤病以雪仇故能以弱燕服彊齊羸越滅徑吳今二敵不攻不滅不事即侵當身不除百世之責也以陛下聖明神武之略舍其緩者專心討賊臣以為無難矣又歡娛之耽害于精爽神太用則竭形太勞則弊願大𥳑賢妙足以充百斯男者其冗散未齒且悉分出務在清靜魏志蔣濟傳日蝕詔群臣問得失上疏日蝕詔群臣問得失上疏昔大舜佐治戒在比周周公輔政慎于其朋齊侯問災晏嬰對以布惠魯君問異臧孫答以緩役應天塞變乃實人事今二賊未滅將士暴露已數十年男女怨曠百姓貧苦夫為國法度惟命世大才乃能張其綱維以垂于後豈中下之吏所宜改易哉終無益于治適足傷民望宜使文武之臣各守其職率以清平則和氣祥瑞可感而致也漢志蔣濟傳又宋書五行志五誅曹爽辭封邑疏臣忝寵上司而爽敢包藏禍心此臣之無任也太傅奮獨斷之策陛下明其忠節罪人伏誅社稷之福也夫封寵慶賞必加有功今論謀則臣不先知語戰則非臣所率而上失其制下受其弊臣備宰司民所具瞻誠恐冒賞之漸自此而興推讓之風由此而廢魏志蔣濟傳奏太學規條大學堂上官為置鼓禮曰入學鼓篋遜其業也凡學受業當皆須十五以上公卿大夫子弟在學者以年齒長幼相次不得以父兄位也學者不恭肅慢師酗酒好訟罰飲水二升御覽五百三十四引魏名臣奏奏會喪不宜去冠會喪不宜去冠奏事者上言前會故鎮軍朱鑠喪自卿以下皆去冠以布巾帕額使者侍中散騎則不皆非舊法夫冠成德之表于服為尊唯君親之喪小斂之前與服罪之人去冠其餘禮儀雖齊縗之痛有變無廢今為弔去冠甚違禮意通典八十一又八十三奏請封禪夫帝王大禮巡狩為先昭祖揚禰封禪為首是以自古革命受符未有不蹈梁父登泰山刊無竟之名紀天人之際者也故司馬相如謂有文以來七十二君或順所繇于前謹遺迹于後太史公曰主上有聖明而不宣布有司之過也然則元功懿德不刊梁山之石無以顯帝王之功布生民不朽之觀也語曰當君而歎堯舜之美譬猶人子對厥所生而譽他人之父今大魏振前王之弊亂拯流遁之難危接千載之衰緒繼百世之廢業始自武文至于聖躬所以參成天地之道綱維人神之化上天報應嘉瑞顯祥以比往古其優衍豐隆無所取喻至干歷世迄今未發大禮雖志在掃盡殘盜蕩滌餘穢未遑斯事若爾三苗堀彊千江海大舜當廢東巡之儀徐夷跳梁于淮泗周成當止岱嶽之禮也且昔歲破吳虜于江漢今茲屠蜀賊于隴右其震蕩內潰在不復淹就當探其窟穴無纍于封禪之事也此儀久廢非倉卒所定宜下公卿廣纂其禮卜年考時昭告上帝以副天下之望臣待罪軍旅不勝大願冒死以聞晉書禮志下宋書禮志三合肥移城議既示天下以弱且望賊煙火而壞城此為未攻而自拔一至干此劫掠無限必以淮北為守魏志滿寵傳郊議曹騰碑文云曹氏族出自邾魏志蔣濟傳注案直稱曹騰當是裴所追改魏非舜後而橫祀非族降黜太祖不配正天皆為繆妄魏志蔣濟傳注遺衛臻書漢祖遇亡虜為上將周武拔漁父為太師布衣廝養可登王公何必守文試而後用魏志衛臻傳難鄭玄注祭法鄭玄注祭法云有虞以上尚德禘郊祖宗配用有德自夏以下稍用其姓氏濟曰夫虯龍神于獺獺自祭其先不祭虯龍也騏驎白虎仁于豺豺自祭其先不祭騏虎也如玄之說有虞已上豺獺之不若邪魏志蔣濟傳注答何晏夏侯玄叔嫂服難記云小功無位是委巷之禮也子思哭嫂有位蓋亦謂知禮制禮者小功當有位也然則嫂叔服文統見于經而明之可謂微而著婉而成章也通典九十二三州論淮湖紆遠水陸異路水經淮水注政略蔣子萬機論夫君正之治必須賢佐然後為泰故君稱元首臣為股肱譬之一體相須而行也是以陶唐欽明羲氏平秩有虞明目元愷敷教皆此君唱臣和同亮天功故能天成地平咸熙于和穆盛德之治也夫隨俗樹化因世建業慎在三而已一曰擇人二曰因民三曰從時時移而不移違天之祥也民望而不因違人之咎也好善而不能擇人敗官之患也三者失則天人之事悖矣夫人乖則時逆時逆則天違天違而望國安未有也刑論患之巨者狡猾之獄焉狡黠之民不事家事煩貸鄉黨以見厭賤因反忿恨看國家忌諱造誹謗崇飾戲言以成醜語被以叛逆告白長吏或內利疾惡盡節之名外以為功遂使無罪并門滅族父子孩耄肝腦塗地豈不劇哉求媚之臣側人取舍雖蒸子啖君孤已悅主而不憚也況因捕叛之時無悅親之民必獲盡節之稱乎夫妄造誹謗虛書叛逆狡黠之民也而詐忠者知而族之此國之大殘不可不察也用奇或曰官人用士纍功積效以次相敘明主之法忠臣之節盡矣若拔奇求異超等踰第非臣之事也應之曰顧當憂世無奇人儻有又不能識耳明法忠節未必已盡也自昔五帝之冠固有黜陟之謨矣復勤揚側陋殷有考誡之誥矣復力索巖穴西伯有呈效之誓矣復旁求魚釣小白有督課之法矣復遽求囚俘漢祖有賞爵之約矣復急追亡信若修敘為明法拔奇為非事是兩帝三君非聖誓而鮑蕭非忠吏也然則考功案第守成之法也拔奇取異定社稷之事也當多事之世而論無事之法處用奇之時而必效一官之智此所以上古多無嚴之國也是以高世之主成功之臣張法以御常人厚禮以延奇逸求之若不及索之若骨肉故能消災除難君臣同烈也曩使五主二臣牽于有司束于修常不念疇咨則唐民康哉之歌不作殷無高宗之號周無殪商雅頌之美齊無九合功漢殲于京索而不帝矣故明君良臣垂意于奇異誠欲濟其事也使奇異填于溝壑有國者將不興其治矣漢元帝為太子時諫持法太深求用儒生宣帝作色怒之云俗儒不達不足任亂吾家者太子也據如斯言漢之中滅職由宣帝非太子也乃知班固步驟盛衰發明是非之理弗逮古史遠矣昔秦穆公近納英儒招致智辨知富國強兵至于始皇乘歷世餘滅吞六國建帝號而坑儒任刑疏扶蘇之諫外蒙恬之直受胡亥之曲信趙高之諛身沒三歲秦無噍類矣前史書二世之禍始皇所起也夫漢祖初以二章結黔首之心竝任儒辨以并諸侯後然後罔漏吞舟之魚蒸民朴謹天下大治宣帝受六世之洪業繼武昭之成法四夷怖征伐之威生民厭兵革之苦海內歸勢適當安樂時也而以峻法繩下賤儒貴刑名是時名則石顯弘恭之徒便僻危嶮杜塞公論專制于事使其君負無窮之謗也如此誰果亂宣帝家哉向使宣帝豫料柱石之士骨鯁之臣屬之社稷不令宦豎秉持天機豈近于元世棟橈榱崩三十年間漢為新家哉推計之始皇任刑禍近及身宣帝好刑短喪天下不同于秦禍少者耳許子將褒貶不平以拔樊子昭而抑許文休劉曄難曰子昭拔自賈豎年至耳順退能守靜進不苟競濟答曰子昭誠自幼至長容貌完潔然觀其臿齒牙樹頰胲吐脣吻自非文休之敵也三國志龐統傳注世說品藻篇注御覽三百六十七許文休者大較廊廟器也而子將貶之若實不貴之是不明也誠令知之蓋善人也三國志許靖傳評注許文休東渡江乃在障氣之南文選廣絶交論注翔字元鳳三國志許靖傳評注黃帝威四盜北堂書鈔十三據御覽疑當作四道黃帝之初養性養民不好戰伐而四帝各以方色稱號交共謀之邊城日驚介胄不釋黃帝歎曰君危于上民安于下主失于國其臣再嫁厥疾之由非養寇邪今取民萌之上而四道亢衡遞震于師于是遂師營壘以滅四帝向令黃帝若不龍驤虎變而與俗同道則其民臣亦嫁于四帝矣御覽七十九夫虎之為獸水牛之為畜殆其兵矣夫虎爪牙既鋒膽力無伍至于即豕也卑俯而下之必有扼喉之獲夫水牛不便速角又喬竦然處郊之野朋游屯行部隊相伍及其寢宿宿因陳反禦若見哯虎抵角牛希見害矣若用兵恃強必鑒于虎居弱必誡水牛可謂攻取屠城而守必能全者也御覽二百七十一夫兵者變化之物而遷移倚伏之事也或守法而得用故知兵者性知者也用兵者性能用之也北堂書鈔一百十三知兵之將國之衡主民之司命古者重之後世無逮焉呂望雖智孫武雖驍樂毅雖賢白起雖武齊之天齊朽骨吳之糜駭消骼燕之田單腐肉豈可餔其糟粕復得生而使之哉固當出我民之最擇其智勇之長者用其修略其短也北堂書鈔一百十五御覽二百七十三雖有百萬之師臨時受敵在將也長短經將體御覽二百七十三秦穆公伐晉及河將軍勞之醪唯一鍾蹇叔乃曰一柸可以投河而釀也穆公乃一醪投河三軍者下缺陳本作皆取飲之北堂書鈔一百十五士有一飧而倒戟義所驅也御覽三百五十三魚麗鵝鸛之陳金金鼓鼓節數進退之事什伯所職也北堂書鈔未改本一百十七夫土地者百姓之所蹈也殊無兩形之政矣而談者強為之異體也云地者都大之名土者細屬之號乃國語一句之言及龜旁之說有地數五五謂地為明壤彼而是之據令共視焉何者謂土哉天下州國寧有有地無土有土無地之處乎北堂書鈔未改本一百五十七莊周婦死而歌夫通性命者以卑及尊死生不悼周不可論也夫象見死皮無遠近必泣周何忍哉初學記二十九御覽八百九十禮記嫂叔無服誤據小功章娣姒婦三字嫂叔之文也古者有省文互體言弟及兄并嫂矣娣姒者兄弟之妻相名也蓋云夫之昆弟昆弟之妻相與皆小功者通典九十二項羽若聽范增之前策則平步取天下也御覽八十七語曰兩目不相為視昔吳有二人共評主者一人曰好一人曰醜久之不決二人各曰爾可求入吳目中則好醜分矣士有定形二人察之有得失非苟相反眼睛異耳御覽三百六十六聖不獨立智不獨治神武之王亦須佐輔御覽四百一太史遷云顏回雖篤行不遇仲尼不能彰其名也故五尺之童德擬大聖使在他門未或及此也夫甘羅少回六歲獲河東五城萬乘郊迎而佩印雖所弘非道義然當秦之時染詐諼之風也使羅在孔門治丘之訓亦可聞一知十孚曰未必也昔齊欲伐魯回求說陳常而孔子不許遂使子貢子貢一出破齊彊晉亡吳霸越存魯也夫顏子與賜程智比才相校以十至于此事而丘不使也御覽四百四十七諺曰學者如牛毛成者如麟角言其少也御覽四百九十六又六百八猛虎不處卑勢徑鷹不立垂枝御覽四百九十六又八百九十一
