body:
  text: 許靖奔孔胄自表奔孔胄自表黨賊求生情所不忍守官自危死不成義竊念古人當難詭常權以濟其道蜀志許靖傳注引蜀記因衆瑞上言太傅許靖安漢將軍糜竺軍師將軍諸葛亮太常賴恭光祿勳黃權少府王謀等上言曹丕篡弒湮滅漢室竊據神器劫迫忠良酷烈無道人鬼忿毒咸思劉氏今上無天子海內惶惶靡所式仰群下前後上書者八百餘人威稱述符瑞圖讖明徵間黃龍見武陽赤水九日乃去孝經援神契曰德至淵泉則黃龍見龍者君之象也易乾九五飛龍在天大王當龍升登帝位也又前關羽圍樊襄陽襄陽男子張嘉王休獻玉璽璽潛漢水伏于淵泉暉景燭耀靈光徹天夫漢者高祖本所起定天下之國號也大王襲先帝軌迹亦興于漢中也今天子玉璽神光先見璽出襄陽漢水之末明大王承其下流授與大王以天子之位瑞命符應非人力所致昔周有烏魚之瑞咸曰休哉二祖受命圖書先著以為徵驗今上天告祥群儒英俊並進河洛孔子讖記咸悉具至伏為大王出自孝景皇帝中山靖王之胄本枝百世乾祇降祚聖姿碩茂神武在躬仁覆積德愛人好士是以四方歸心焉考省靈圖啓發讖緯神明之表名諱昭著宜即帝位以纂二祖紹嗣昭穆天下幸甚臣等謹與博士許慈議郎孟光建立禮儀擇令辰上尊號即皇帝位于成都武擔之南蜀志先主傳與曹公書世路戎夷禍亂遂合駑怯偷生自竄蠻貊成闊十年吉凶禮廢昔在會稽得所貽書辭旨款密久要不忘迫于袁術方命圮族扇動群逆津塗四塞雖縣心北風欲行靡由正禮師退術兵前進會稽傾覆景興失據三江五湖皆為虜庭臨時困厄無所控告便與袁沛鄧子孝等浮涉滄海南至交州經歷東歐閩越之國行經萬里不見漢地漂薄風波絶糧茹草飢殍薦臻死者大半既濟南海與領守兒孝德相見知足下忠義奮發整敕元戎西迎大駕巡省中嶽承此休問且悲且喜即與袁沛及徐元賢復共嚴裝欲北上荊州會蒼梧諸縣夷越蜂起州府傾覆道路阻絶元賢被害老弱並殺靖尋循渚岸五千餘里復遇疾癘伯母殞命并及群從自諸妻子一時略盡復相扶侍前到此郡計為兵害及病亡者十遺一二生民之艱辛苦之甚豈可具陳哉懼卒顛仆永為亡虜憂瘁慘慘忘寢與食欲附奉朝貢使自獲濟通歸死闕庭而荊州水陸無津交部驛使斷絶欲上益州復有峻防故官長吏一不得入前令交址太守士威彥深相分託于益州兄弟又靖亦自與書辛苦懇惻而復寂寞未有報應雖仰瞻光靈延頸企踵何由假翼自致哉知聖主允明顯授足下專征之任凡諸逆節多所誅討想力競者一心順從者同規矣又張子雲昔在京師志匡王室今雖臨荒域不得參與本朝亦國家之藩鎮足下之外援也若荊楚平和王澤南至足下忽有聲命于子雲勤見保屬令得假途由荊州出不然當復相紹介于益州兄弟使相納受倘天假其年人緩其禍得歸死國家解逋逃之負泯軀九泉將復何恨若時有險易事有利鈍人命無常隕沒不達者則永銜罪責入于裔土矣昔營丘翼周杖鉞專征博陸佐漢虎貢警蹕今日足下扶危持傾為國柱石秉師望之任兼霍光之重五侯九伯制御在手自古及今人臣之尊未有及足下者也夫爵高者憂深祿厚者責重足下據爵高之任當貴重之地言出于口即為賞罰意之所存便為禍福行之得道即社稷用寧行之失道即四方散亂國家安危在于足下百姓之命縣于執事自華及夷顒顒注望足下任此豈可不遠覽載籍廢興之由榮辱之機棄忘舊惡寬和群司審量五材為官擇人苟得其人雖讎必舉苟非其人雖親不授以寧社稷以濟下民事立功成則繫音于管弦勒勳于金石願君勉之為國自重為民自愛蜀志許靖傳八濛摩崖漢將軍飛率精卒萬人大破賊首張郃于八濛立馬勒銘碑本又四川總志題作流江縣題名軍作張銘作名與拓本異闕鐵刀銘新亭侯陶宏景刀劍録立漢中王上表漢帝乎西將軍都亭侯臣馬超左將軍領長史鎮軍將軍臣許靖營司馬臣龐羲議曹從事中郎軍議中郎將臣射援軍師將軍臣諸葛亮蕩寇將軍漢壽亭侯臣關羽征虜將軍新亭侯臣張飛征西將軍臣黃忠鎮遠將軍臣賴恭揚武將軍臣法正興業將軍臣李嚴等一百二十人上言曰昔唐堯至聖而四凶而朝周成仁賢而四國作難高后稱制而諸呂竊命孝昭幼沖而上官逆謀皆馮世寵藉履國權窮凶極亂社稷幾危非大舜周公朱虛博陸則不能流放禽討安危定傾伏惟陛下誕姿聖德統理萬邦而遭厄運不造之艱董卓首難蕩覆京畿曹操階禍竊執天衡皇后太子鴆殺見害剝亂天下殘毀民物久令陛下蒙塵憂厄幽處虛邑人神無主遏絶王命厭昧皇極欲盜神器左將軍領司隸校尉豫荊益三州牧宜城亭侯備受朝爵秩念在輸力以殉國難覩其機兆赫然憤發與車騎將軍董承同謀誅操將安國家克寧舊都會承機事不密令操遊魂得遂長惡殘泯海內臣等每懼王室大有閻樂之禍小有定安之變夙夜惴惴戰栗纍息昔在虞書敦序九族周監二代封建同姓詩著其義歷載長久漢興之初割裂疆土尊王子弟是以卒折諸呂之難而成大宗之基臣等以備肺腑枝葉宗子藩翰心存國家念在弭亂自操破于漢中海內英雄望風蟻附而爵號不顯九錫未加非所以鎮衛社稷光昭萬世也奉辭在外禮命斷絶昔河西太守梁統等直漢中興限于山河位同權均不能相率咸推竇融以為元帥卒立效績摧破隗囂今社稷之難急于隴蜀操外吞天下內殘群寮朝廷有蕭牆之危而禦侮未建可為寒心臣等輒依舊典封備漢中王拜大司馬董齊六軍糾合同盟掃滅凶逆以漢中巴蜀廣漢犍為為國所署置依漢初諸侯王故典夫權宜之制苟利社稷專之可也然後功成事立臣等退伏矯罪雖死無恨蜀志先主傳又見袁宏後漢紀三十以為諸葛亮等上言臨沒上疏臣門宗二百餘口為孟德所誅略盡惟有從弟岱當為微宗血食之繼深託陛下餘無復言蜀志馬超傳又見華陽國志六駁成都屋舍園田分賜諸將議霍去病以胸奴未滅無用家為今國賊非但胸奴未可求安也須天下都定各反桑梓歸耕本土乃其宜耳益州人民初罹兵革田宅皆可歸還令安居復業然後可役調得其歡心蜀志趙雲傳注引雲別傳與劉璋箋與劉璋箋正受性無術盟好違損懼左右不明本末必並歸咎蒙恥沒身辱及執事是以捐身于外不敢反命恐聖聽穢惡其聲故中間不有箋敬顧念宿遇瞻望悢悢然惟前後披露腹心自從始初以至于終實不藏情有所不盡但愚暗策薄精誠不感以致于此耳今國事已危禍害在速雖捐放于外言足憎尤猶貪極所懷以盡餘忠明將軍本心正之所知也實為區區不欲失左將軍之意而卒至于是者左右不達英雄從事之道謂可違信黷誓而以意氣相致日月相選趨求順耳悅目隨阿遂指不圖遠慮為國深計故也事變既成又不量強弱之勢以為左將軍縣遠之衆糧穀無儲欲得以多擊少曠日相持而從關至此所歷輒破離宮別屯日自零落雒下雖有萬兵皆壞陳之卒破軍之將若欲爭一旦之戰則兵將勢力實不相當各欲遠期計糧者今此營守已固穀米已積而明將軍土地日削百姓日困敵對遂多所供遠曠愚意計之謂必先竭將不復以持久也空爾相守猶不相堪今張益德數萬之衆已定巴東入犍為界分平資中德陽三道並侵將何以禦之本為明將軍計者必謂此軍縣遠無糧饋運不及兵少無繼今荊州道通衆數十倍加孫車騎遣弟及李異甘寧等為其後繼若爭客主之勢以土地相勝者今此全有巴東廣漢犍為過半已定巴西一郡復非明將軍之有也計益州所仰惟蜀蜀亦破壞三分亡二吏民疲困思為亂者十戶而八若敵遠則百姓不能堪役敵近則一旦易主矣廣漢諸縣是明比也又魚復與關頭實為益州福禍之門今二門悉開堅城皆下諸軍並破兵將俱盡而敵家數道並進已入心腹坐守都雒存亡之勢昭然可見斯乃大略其外較耳其餘屈曲難以辭極也以正下愚猶知此事不可復成況明將軍左右明智用謀之士豈當不見此數哉旦夕偷幸求容取媚不慮遠圖莫肯盡心獻良計耳若事窮勢迫將各索生求濟門戶展轉反覆與今計異不為明將軍盡死難也而尊門猶當受其憂正雖獲不忠之謗然心自謂不負聖德顧惟分義實竊痛心左將軍從本舉來舊心依依實無薄意愚以為可圖變化以保尊門蜀志法正傳本蜀論荊人鄨令死其尸隨水土荊人求之不得令至汶山下復生起見望帝望帝者杜宇也從天下女子朱利自江源出為宇妻遂王于蜀號曰望帝望帝立以為相時巫山峽而蜀水不流帝使令鑿巫峽通水蜀得陸處望帝自以德不若遂以國禪號曰開明水經二十三江水一注劉豹因衆瑞上言故議郎陽泉侯劉豹青衣侯向舉偏將軍張裔黃權大司馬屬殷純益州別駕從事趙莋治中從事楊洪從事祭酒何宗議曹從事杜瓊勸學從事張爽尹默譙周等上言臣聞河圖洛書五經讖諱孔子作甄驗應自遠謹案洛書甄曜度曰赤三日德昌九世會備合為帝際洛書寶號命曰天度帝道備稱皇以統握契百成不敗洛書録運期曰九侯七傑爭命民炊骸道路籍籍履人頭誰使主者玄且來孝經鉤命決録曰帝三建九會備周群父末亡時言西南數有黃氣直立數丈見來積年時時有景雲祥風從璿璣干來應之此為異瑞又二十二年中數有氣如旗從西竟東中天而行圖書曰必有天子出其方加是年太白熒惑填星常從歲星相追近漢初興五星從歲星謀歲星主義漢位在西義之上方故漢法常以歲星侯人主當有聖主起于此州以致中興時許帝尚存故群下不敢漏言頃者熒惑復追歲星見在胃昴畢昴畢為天綱經曰帝星處之衆邪消亡聖諱豫覩推揆期驗符合數至若此非一臣聞聖王先天而天不違後天而奉天時故應際而生與神合契願大王應天順民速即洪業以寧海內蜀志先主傳劉巴策丞相亮朕遭家不造奉承大統兢兢業業不敢康寧思靖百姓懼未能綏於戲丞相亮其悉朕意無怠輔朕之闕助宣重光以照明天下君其勗哉蜀志諸葛亮傳案劉巴傳云先主稱尊號昭告于皇天上帝后土神祇凡諸文誥策命皆巴所作也策許靖為大傅朕獲奉洪業君臨萬國夙宵惶惶懼不能綏百姓不親五品不遜汝作司徒其敬敷五教在寬君其勗哉秉德無怠稱朕意焉蜀志許靖傳策張飛為車騎將軍朕承天序嗣奉洪業除殘靖亂未燭厥理今寇虜作害民被荼毒思漢之士延頸鶴望朕用怛然坐不安席食不甘味整軍誥誓將行天罰以君忠毅侔蹤召虎名宣遐邇故特顯命高墉進爵兼司于京其誕將天威柔服以德伐叛以刑稱朕意焉詩不云乎匪疚匪棘王國來極肇敏戎功用錫爾祉可不勉歟蜀志張飛傳策馬超領涼州牧朕以不德獲繼至尊奉承宗廟曹操父子世載其罪朕用慘怛疢如疾首海內怨憤歸正反本暨于氐羌率服獯粥慕義以君信著北土威武並昭是以委任授君抗揚虓虎兼董萬里求民之瘼其明宣朝化懷保遠邇肅慎賞罰以篤漢祜以對于天下蜀志馬超傳策穆皇后朕承天命奉至尊臨萬國今以后為皇后遺使持節丞相亮授璽綬承宗廟母天下皇后其敬之哉蜀志穆皇后傳册皇太子禪惟章武元年五月辛已皇帝若曰太子禪朕遭漢運艱難賊臣篡盜社稷無主格人群正以天明命朕繼大統今以禪為皇太子以承宗廟祗肅社稷使使持節丞相亮授印綬敬聽師傅行一物而三善皆得焉可不勉歟蜀志後主傳策立魯王小子永受茲青社朕承天序繼統大業遵修稽古建爾國家封于東土奄有龜蒙世為藩輔鳴呼恭朕之詔惟彼魯邦一變適道風化存焉人之好德世茲懿美王其秉心率禮綏爾士民是饗是宜其戒之哉蜀志劉永傳策立梁王小子理朕統承漢序祇順天命遵修典秩建爾于東為漢藩輔惟彼梁土畿甸之邦民狎教化易導以禮往悉乃心懷保黎庶以永爾國王其敬之哉蜀志劉理傳答先主昔遊荊北時涉師門記問之學不足紀名內無楊朱守靜之術外無墨翟務時之風猶天之南箕虛而不用賜書乃欲令賢甥摧鸞鳳之豔遊燕雀之宇將何以啓明之哉愧于有若無實若虛何以堪之蜀志劉巴傳注引零陵先賢傳與諸葛亮書乘危歷險到值思義之民自與之衆承天之心順物之性非余身謀所能勸動若道窮數盡將託命于滄海不復顧荊州矣蜀志劉巴傳為先主即皇帝位告天文惟建安二十六年四月丙午皇帝臣備敢用玄牡昭皇天上帝后土神祇漢有天下曆數無疆曩者王莽篡盜光武皇帝震怒致誅社稷復存今曹操阻兵安忍戮殺主后滔天泯夏罔顧天顯操子丕載其凶逆竊居神器群臣將士以為社稷隳廢備宜修之嗣武二祖龔行天罰備雖否德懼忝帝位詢于庶民外及蠻夷君長僉曰天命不可以不答祖業不可以久替四海不可以無主率土式望在備一人備畏天明命又懼漢邦將湮于地謹擇元日與百寮登壇受皇帝璽綬修燔瘞告類于天神惟天神尚饗祚于漢家永綏四海蜀志先主傳又見宋書禮志三
