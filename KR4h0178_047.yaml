body:
  text: 魏卷四十七嵇康琴賦一首并序一首并序琴賦一首并序余少好音聲長而翫之以為物有盛衰而此無變滋味有厭而此不勌可以導養神氣宣和情志處窮獨而不悶者莫近於音聲也是故復之而不足則吟詠以肆志吟詠之不足則寄言以廣意然八音之器歌舞之象歷世才士並為之賦頌其體制風流莫不相襲稱其材幹則以危苦為上賦其聲音則以悲哀為主美其感化則以垂涕為貴麗則麗矣然未盡其理也推其所由似元不解音聲覽其旨趣亦未達禮樂之情也眾器之中琴德最優故綴敘所懷以為之賦其辭曰惟椅梧之所生兮託峻嶽之崇岡披重壤以誕載兮參辰極而高驤含天地之醇和兮吸日月之休光鬱紛紜以獨茂兮飛英蕤於昊蒼夕納景於虞淵兮旦晞幹於九陽經千載以待價兮寂神跱而永康且其山川形勢則盤紆隱深磪嵬岑嵓互嶺巉巖岞崿嶇崟丹崖嶮巇青壁萬尋若乃重巘增起偃蹇雲覆邈隆崇以極壯崛巍巍而特秀蒸靈液以播雲據神淵而吐溜爾乃顛波奔突狂赴爭流觸巖觝隈鬱怒彪休洶涌騰薄奮沫揚濤瀄汨澎湃蜿蟺相糾放肆大川濟乎中州安回徐邁寂爾長浮澹乎洋洋縈抱山丘詳觀其區土之所產毓奧宇之所寶殖珍怪琅玕瑤瑾翕赩叢集累積奐衍於其側若乃春蘭被其東沙棠殖其西涓子宅其陽玉醴涌其前玄雲蔭其上翔鸞集其巔清露潤其膚惠風流其間竦肅肅以靜謐密微微其清閑夫所以經營其左右者固以自然神麗而足思願愛樂矣於是遯世之士榮期綺季之疇乃相與登飛梁越幽壑援瓊枝陟峻崿以遊乎其下周旋永望邈若凌飛邪睨崑崙俯闞海湄指蒼梧之迢遞臨迴江之威夷悟時俗之多累仰箕山之餘輝羨斯嶽之弘敞心慷慨以忘歸情舒放而遠覽接軒轅之遺音慕老童于騩隅欽泰容之高吟顧茲梧而興慮思假物以託心乃斲孫枝準量所任至人攄思制為雅琴乃使離子督墨匠石奮斤夔襄薦法般倕騁神鎪會裛廁朗密調均華繪彫琢布藻垂文錯以犀象籍以翠綠絃以園客之絲徽以鍾山之玉爰有龍鳳之象古人之形伯牙揮手鍾期聽聲華容灼爚發采揚明何其麗也伶倫比律田連操張進御君子新聲熮亮何其偉也及其初調則角羽俱起宮徵相證參發並趣上下累應踸踔𨄱硌美聲將興固以和昶而足躭矣爾乃理正聲奏妙曲揚白雪發清角紛淋浪以流離奐淫衍而優渥粲奕奕而高逝馳岌岌以相屬沛騰遌而競趣翕韡曄而繁縟狀若崇山又象流波浩兮湯湯鬱兮峨峨怫㥜煩冤紆餘婆娑陵縱播逸霍濩紛葩檢容授節應變合度兢名擅業安軌徐步洋洋習習聲烈遐布含顯媚以送終飄餘響乎泰素若乃高軒飛觀廣夏閑房冬夜肅清朗月垂光新衣翠粲纓徽流芳於是器泠絃調心閑手敏觸批如志唯意所擬初涉淥水中奏清徵雅昶唐堯終詠微子寬明弘潤優遊躇跱拊絃安歌新聲代起歌曰凌扶搖兮憩瀛洲要列子兮為好仇餐沆瀣兮帶朝霞眇翩翩兮薄天遊齊萬物兮超自得委性命兮任去留激清響以赴會何絃歌之綢繆於是曲引向闌眾音將歇改韻易調奇弄乃發揚和顏攘皓腕飛纖指以馳騖紛㒊譶以流漫或徘徊顧慕擁鬱抑按盤桓毓養從容秘翫闥爾奮逸風駭雲亂牢落凌厲布濩半散豐融披離斐韡奐爛英聲發越采采粲粲或間聲錯糅狀若詭赴雙美並進駢馳翼驅初若將乖後卒同趣或曲而不屈直而不倨或相凌而不亂或相離而不殊時劫掎以慷慨或怨㜘而躊躇忽飄颻以輕邁乍留聯而扶疏或參譚繁促複疊攢仄從橫駱驛奔遯相逼拊嗟累讚間不容息瓌豔奇偉殫不可識若乃閑舒都雅洪纖有宜清和條昶案衍陸離穆溫柔以怡懌婉順敘而委蛇或乘險投會邀隙趨危譻若離鵾鳴清池翼若浮鴻翔曾崖紛文斐尾慊縿離纚微風餘音靡靡猗猗或摟批擽捋縹繚潎冽輕行浮彈明嫿𥉻慧疾而不速留而不滯翩緜飄邈微音迅逝遠而聽之若鸞鳳和鳴戲雲中迫而察之若眾葩敷榮曜春風既豐贍以多姿又善始而令終嗟姣妙以弘麗何變態之無窮若夫三春之初麗服以時乃攜友生以邀以嬉涉蘭圃登重基背長林翳華芝臨清流賦新詩嘉魚龍之逸豫樂百卉之榮滋理重華之遺操慨遠慕而長思若乃華堂曲宴密友近賓蘭肴兼御旨酒清醇進南荊發西秦紹陵陽度巴人變用雜而並起竦眾聽而駭神料殊功而比操豈笙籥之能倫若次其曲引所宜則廣陵止息東武太山飛龍鹿鳴鵾鷄遊絃更唱迭奏聲若自然流楚窈窕懲躁雪煩下逮謠俗蔡氏五曲王昭楚妃千里別鶴猶有一切承間簉乏亦有可觀者焉然非夫曠遠者不能與之嬉遊非夫淵靜者不能與之閑止非夫放達者不能與之無𠫤非夫至精者不能與之析理也若論其體勢詳其風聲器和故響逸張急故聲清間遼故音痺絃長故徽鳴性絜靜以端理含至德之和平誠可以感盪心志而發洩幽情矣是故懷慼者聞之莫不憯懍慘悽愀愴傷心含哀懊咿不能自禁其康樂者聞之則欨愉懽釋抃舞踊溢留連瀾漫嗢噱終日若和平者聽之則怡養悅愉淑穆玄真恬虛樂古棄事遺身是以伯夷以之廉顏回以之仁比干以之忠尾生以之信惠施以之辯給萬石以之訥慎其餘觸類而長所致非一同歸殊塗或文或質總中和以統物咸日用而不失其感人動物蓋亦弘矣于時也金石寢聲匏竹屏氣王豹輟謳狄牙喪味天吳踊躍於重淵王喬披雲而下墜舞鸑鷟於庭階游女飄焉而來萃感天地以致和況蚑行之眾類嘉斯器之懿茂詠茲文以自慰永服御而不厭信古今之所貴亂曰愔愔琴德不可測兮體清心遠邈難極兮良質美手遇今世兮紛綸翕響冠眾藝兮識音者希孰能珍兮能盡雅琴唯至人兮酒賦重酎至清淵凝冰潔滋液兼備芬芳澂澈北堂書鈔一百四十八蠶賦食桑而吐絲前亂而後治御覽八百十四懷香賦序余以太簇之月登于歷山之陽仰眺崇岡俯察幽坂及覩懷香生蒙楚之閒曾見斯草植于廣廈之庭或被帝王之囿怪其遐棄遂遷而樹于中堂華麗則殊采婀娜芳實則可以藏之書又感其棄本高崖委身階庭似傅說顯殷四叟歸漢故因事義賦之十疑有弘達先生者恢廓其度寂寥疏闊方而不制廉而不割超世獨步懷玉被褐交不苟合仕不期達常以為忠信篤敬直道而行之可以居九夷遊八蠻浮滄海踐河源甲兵不足忌猛獸不為患是以機心不存泊然純素從容縱肆遺忘好惡以天道為一指不識品物之細故也然而大道既隱智巧滋繁世俗膠加人情萬端利之所在若鳥之追鸞富為積蠹貴為聚怨動者多累靜者鮮患爾乃思丘中之隱士樂川上之執竿也于是遠念長想超然自失郢人既沒誰為吾質聖人吾不得見冀聞之于數術乃適太史貞父之廬而訪之曰吾有所疑願子卜之貞父乃危坐操蓍拂几陳龜曰君何以命之先生曰吾寍發憤陳誠讜言帝庭不屈王公乎將卑懦委隨承旨倚靡為面從乎寍愷悌弘覆施而不德乎將進趣世利苟容偷合乎寍隱居行義推至誠乎將崇飾矯誣養虛名乎寍斥逐凶佞守正不傾明否臧乎將傲倪滑稽挾智任術為智囊乎寍與王喬赤松為侶乎將進伊摰而友尚父乎寍隱鱗藏彩若淵中之龍乎寍舒翼揚聲若雲閒之鴻乎寍外化其形內隱其情屈身隨時陸沈無名雖在人閒實處冥冥乎將激昂為清銳思為精行與世異心與俗并所在必聞恆營營乎寍寥落閒放無所矜尚彼我為一不爭不讓遊心晧素忽然坐忘追義農而不及行中路而惆悵乎將慷慨以為壯感慨以為亮上干萬乘下淩將相尊嚴其容高自矯抗常如失職懷恨怏怏乎寍聚貨千億擊鍾鼎食枕藉芬芳婉孌美色乎將苦身竭力翦除荊棘山居谷飲倚巖而息乎寍如伯奮仲堪二八為偶排擯共鯀令失所乎將如箕山之夫穎水之父輕賤唐虞而笑大禹乎寍如泰伯之隱德潛讓而不揚乎將如季札之顯節義慕為子臧乎寍如老聃之清淨微妙守玄抱一乎將如莊周之齊物變化洞達而放逸乎寍如夷吾之不𠫤束縛而終成霸功乎將如魯連之輕世肆志高談從容乎寍如市南子之神勇內固山淵其志乎將如毛公藺生之龍驤虎步慕為壯士乎此誰得誰失何凶何吉時移俗易好貴慕名臧文不讓位于柳季公孫不歸美于董生賈誼一當于明主絳灌作色而揚聲況今千龍竝馳萬驥徂征紛紜交競逝若流星敢不惟思謀于老成哉太史貞父曰吾聞至人不相達人不卜若先生者文明在中見素表璞內不愧心外不負俗交不為利仕不謀祿鑒乎古今滌情蕩欲夫如是呂梁可以遊湯谷可以浴方將觀大鵬于南溟又何憂于人閒之委曲與山巨源絕交書一首康白足下昔稱吾于潁川吾常謂之知言然經怪此意尚未熟悉於足下何從便得之也前年從河東還顯宗阿都說足下議以吾自代事雖不行知足下故不知之足下傍通多可而少怪吾直性狹中多所不堪偶與足下相知耳間聞足下遷惕然不喜恐足下羞庖人之獨割引尸祝以自助手薦鸞刀漫之羶腥故具為足下陳其可否吾昔讀書得并介之人或謂無之今乃信其真有耳性有所不堪真不可強今空語同知有達人無所不堪外不殊俗而內不失正與一世同其波流而悔吝不生耳老子莊周吾之師也親居賤職柳下惠東方朔達人也安乎卑位吾豈敢短之哉又仲尼兼愛不羞執鞭子文無欲卿相而三登令尹是乃君子思濟物之意也所謂達能兼善而不渝窮則自得而無悶以此觀之故堯舜之君世許由之巖栖子房之佐漢接輿之行歌其揆一也仰瞻數君可謂能遂其志者也故君子百行殊塗而同致循性而動各附所安故有處朝廷而不出入山林而不反之論且延陵高子臧之風長卿慕相如之節志氣所託不可奪也吾每讀尚子平臺孝威傳慨然慕之想其為人少加孤露母兄見驕不涉經學性復疏嬾筋駑肉緩頭面常一月十五日不洗不大悶癢不能沐也每常小便而忍不起令胞中略轉乃起耳又縱逸來久情意傲散簡與禮相背嬾與慢相成而為儕類見寬不攻其過又讀莊老重增其放故使榮進之心日頹任實之情轉篤此由禽鹿少見馴育則服從教制長而見羈則狂顧頓纓赴蹈湯火雖飾以金鑣饗以嘉肴逾思長林而志在豐草也阮嗣宗口不論人過吾每師之而未能及至性過人與物無傷唯飲酒過差耳至為禮法之士所繩疾之如讎幸賴大將軍保持之耳吾不如嗣宗之賢而有慢弛之闕又不識人情闇於機宜無萬石之慎而有好盡之累久與事接疵釁日興雖欲無患其可得乎又人倫有禮朝廷有法自惟至熟有必不堪者七甚不可者二臥喜晚起而當關呼之不置一不堪也抱琴行吟弋釣草野而吏卒守之不得妄動二不堪也危坐一時痺不得搖性復多蝨把搔無已而當裹以章服揖拜上官三不堪也素不便書又不喜作書而人間多事堆案盈机不相酬答則犯教傷義欲自勉強則不能久四不堪也不喜弔喪而人道以此為重己為未見恕者所怨至欲見中傷者雖瞿然自責然性不可化欲降心順俗則詭故不情亦終不能獲無咎無譽如此五不堪也不喜俗人而當與之共事或賓客盈坐鳴聲聒耳囂塵臭處千變百伎在人目前六不堪也心不耐煩而官事鞅掌機務纏其心世故繁其慮七不堪也又每非湯武而薄周孔在人間不止此事會顯世教所不容此甚不可一也剛腸嫉惡輕肆直言遇事便發此甚不可二也以促中小心之性統此九患不有外難當有內病寧可久處人間邪又聞道士遺言餌朮黃精令人久壽意甚信之遊山澤觀魚鳥心甚樂之一行作吏此事便廢安能舍其所樂而從其所懼哉夫人之相知貴識其天性因而濟之禹不偪伯成子高全其節也仲尼不假蓋於子夏護其短也近諸葛孔明不偪元直以入蜀華子魚不強幼安以卿相此可謂能相終始真相知者也足下見直木必不可以為輪曲者不可以為桷蓋不欲以枉其天才令得其所也故四民有業各以得志為樂唯達者為能通之此足下度內耳不可自見好章甫強越人以文冕也己嗜臭腐養鴛雛以死鼠也吾頃學養生之術方外榮華去滋味游心於寂寞以無為為貴縱無九患尚不顧足下所好者又有心悶疾頃轉增篤私意自試不能堪其所不樂自卜已審若道盡塗窮則已耳足下無事冤之令轉於溝壑也吾新失母兄之歡意常悽切女年十三男年八歲未及成人況復多病顧此悢悢如何可言今但願守陋巷教養子孫時與親舊敘闊陳說平生濁酒一杯彈琴一曲志願畢矣足下若嬲之不置不過欲為官得人以益時用耳足下舊知吾潦倒麤疏不切事情自惟亦皆不如今日之賢能也若以俗人皆喜榮華獨能離之以此為快此最近之可得言耳然後使長才廣度無所不淹而能不營乃可貴耳若吾多病困欲離事自全以保餘年此真所乏耳豈可見黃門而稱貞哉若趣欲共登王塗期於相致時為歡益一旦迫之必發其狂疾自非重怨不至於此也野人有快炙背而美芹子者欲獻之至尊雖有區區之意亦已疏矣願足下勿似之其意如此既以解足下并以為別嵇康白與呂長悌絕交書一首一首與呂長悌絕交書一首康白昔與足下年時相比以故數面相親足下篤意遂成大好猶是許足下以至交雖出處殊塗而歡愛不衰也及中間少知阿都志力開悟每喜足下家復有此弟而阿都去年向吾有言誠忿足下意欲發舉吾深抑之亦自恃每謂足下不足迫之故從吾言間令足下因其順吾與之順親蓋惜足下門戶欲令彼此無恙也又足下許吾終不擊都以子父交為誓吾乃慨然感足下重言慰解都都遂釋然不復興意足下陰自阻疑密表擊都先首服誣都此為都故信吾又無言何意足下苞藏禍心耶都之含忍足下實由吾言今都獲罪吾為負之吾之負都由足下之負吾也悵然失圖復何言哉若此無心復與足下交矣古之君子絕交不出醜言從此別矣臨別恨恨嵇康白琴讚懿吾雅器載璞靈山體具德真清和自然澡以春雪澹若洞泉溫乎其仁玉潤外鮮昔在黃農神物以臻穆穆重華託心五絃閑邪納正亹亹其僊宣和養氣介乃遐年北堂書鈔一百九
