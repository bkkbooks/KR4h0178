body:
  text: 高堂隆詔問崇華殿災咎對崇華殿災詔問隆此何咎于禮寧有祈禳之義乎隆對曰夫災變之發皆所以明教戒也惟率禮修德可以勝之易傳曰上不儉下不節孽火燒其室又曰君高其臺天火為災此人君苟飾宮室不知百姓空竭故天應之以旱火從高殿起也上天降鑒故譴告陛下陛下宜增崇人道以答天意昔太戊有桑穀生于朝武丁有雊雉登于鼎皆聞災恐懼側身修德三年之後遠夷朝貢故號曰中宗高宗此則前代之明鑒也今案舊占災火之發皆以臺榭宮室為誡然今宮室之所以充廣者實由宮人猥多之故宜簡擇留其淑懿如周之制罷省其餘此則祖己之所以訓高宗高宗之所以享遠號也魏志高堂隆傳又見續漢五行志二注詔問漢武厭災對詔問隆吾聞漢武帝時柏梁災而大起宮殿以厭之其義云何隆對曰臣聞西京柏梁既災越巫陳方建章是營以厭火祥乃夷越之巫所為非聖賢之明訓也五行志曰柏梁災其後有江充巫蠱衛太子事如志之言越巫建章無所厭也孔子曰災者修類應行精祲相感以戒人君是以聖主覩災責躬退而修德以消復之今宜罷散民役宮室之制務從約節內足以待風雨外足以講禮儀清掃所災之處不敢于此有所立作萐莆嘉禾必生此地以報陛下虔恭之德豈可疲民之力竭民之財實非所以致符瑞而懷遠人也魏志高堂隆傳又見續漢五行志二注詔問鵲巢陵霄闕對陵霄闕始搆有鵲巢其上帝以問隆對曰詩云惟鵲有巢惟鳩居之今興宮室起陵霄闕而鵲巢之此宮室未成身不得居之象也天意若曰宮室未成將有他姓制御之斯乃上天之戒也夫天道無親惟與善人不可不深防不可不深慮夏商之季皆繼體也不欽承上天之明命惟讒諂是從廢德適欲故其亡也忽焉太戊武丁覩災竦懼祗承天戒故其興也勃焉今若休罷百役儉以足用增崇德政動遵帝則除普天之所患興兆民之所利三王可四五帝可六豈惟殷宗轉禍為福而已哉臣備腹心苟可以繁祉聖躬安存社稷臣雖灰身破族猶生之年也豈憚忤逆之災而令陛下不聞至言乎魏志高堂隆傳詔問未祖丑臘對詔問何以用未祖丑臘臣隆對曰按月令孟冬十月臘先祖五祀謂薦田獵得禽獸謂之臘左傳曰虞不臘矣唯見此二者而皆不書日聞先師説曰王者各以其行之盛而祖以其終而臘水始生于申盛于子終于辰故水行之君以子祖以辰臘火始生于寅盛于午終于戌故火行之君以午祖以戌臘木始生于亥盛于卯終于未故木行之君以卯祖以未臘金始生于已盛于酉終于丑故金行之君以酉祖以丑臘土始生于午盛于戌終于寅故土行之君以戌祖以寅臘今魏據土德宜以戌祖寅臘也北堂書鈔一百五十五通典四十四御覽三十三引魏臺訪議又略見續漢禮儀志中注補地震對地震者臣下強盛地故震動冀所以警懼人主不可不深思是災御覽八百八十引晉書陳災異表石氏星占曰天棓五五星之杖也主撾棓亂兵客星彗茀干犯棓兵大起二年消復之宜罷省百役勿使士卒怨于勤苦而為亂足其廩食度其劬勞然後用之則士卒安而無亂兵矣御覽三百五十七后妃配郊表古來娥英薑姒盛德之妃未有配食于郊者也漢文初祭地祗于渭陽以高帝配孝武立后土于汾陰亦以高帝配唯王莽引周禮享先妣為配北郊夏至以高后配地自此始也臣謂宜依古典以武皇配天地也通典四十二引末二語諫取長安大鐘疏昔周景王不儀刑文武之明德忽公旦之聖制既鑄大錢又作大鐘單穆公諫而弗聽冷州鳩對而弗從遂迷不反周德以衰良史記焉以為永鑒然今之小人好説秦漢之奢靡以蕩聖心求取亡國不度之器勞役費損以傷德政非所以興禮樂之和保神民之休也魏志高堂隆傳星孛于大辰上疏凡帝王徙都立邑皆先定天地社稷之位敬恭以奉之將營宮室則宗廟為先廄庫為次居室為後今圜丘方澤南北郊明堂社稷神位未定宗廟之制又未如禮而崇飾居室士民失業外人咸云宮人之用與興戎軍國之費所盡略齊民不堪命皆有怨怒書曰天聰明自我民聰明天明畏自我民明威輿人作頌則嚮以五福民怒吁嗟則威以六極言天之賞罰隨民言順民心也是以臨政務在安民為先然後稽古之化格于上下自古及今未嘗不然也夫采掾卑宮唐虞大禹之所以垂皇風也玉臺瓊室夏癸商辛之所以犯昊天也今之宮室實違禮度乃更建立九龍華飾過前天慧章灼始起于房心犯帝坐而干紫微此乃皇天子愛陛下是以發教戒之象始卒皆于尊位殷勤鄭重欲必覺寤陛下斯乃慈父懇切之訓宜崇孝子祗聳之禮以率先天下以昭示後昆不宜有忽以重天怒魏志高堂隆傳諫用法深重疏夫拓迹垂統必俟聖朝輔世匡治亦須良佐用能庶績其凝而品物康乂也夫移風易俗宣明道化使四表同風回首面內德教光熙九服慕義固非俗吏之所能也今有司務糾刑書不本大道是以刑用而不措俗弊而不敦宜崇禮樂班敘明堂修三雍大射養老營建郊廟尊儒士舉逸民表章制度改正朔易服色布愷悌尚儉素然後備禮封禪歸功天地使雅頌之聲盈于六合緝熙之化混于後嗣斯蓋至治之美事不朽之貴業也然九域之丙可揖讓而治尚何憂哉不正其本而救其末譬猶棼絲非政理也可命群公卿士通儒造具其事以為典式魏志高堂隆傳切諫增崇宮室疏蓋天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財然則士民者乃國家之鎮也穀帛者乃士民之命也穀帛非造化不育非人力不成是以帝耕以勸農后桑以成服所以昭事上帝告虔報施也昔在伊唐世值陽九厄運之會洪水滔天使鯀治之績用不成乃舉文命隨山刊木前後歷年二十二載災眚之甚莫過于彼力役之興莫久于此堯舜君臣南面而已禹敷九州庶士庸勳各有等差君子小人物有服章今無若時之急而使公卿大夫並與廝徒共供事役聞之四夷非嘉聲也垂之竹帛非令名也是以有國有家者近取諸身遠取諸物嫗煦養育故稱愷悌君子民之父母今上下勞役疾病凶荒耕稼者寡飢饉荐臻無以卒歲宜加愍恤以救其困臣觀在昔書籍所載天人之際未有不應也是以古先哲王畏上天之明命循陰陽之逆順矜矜業業惟恐有違然後治道用興德與神符災異既發懼而修政未有不延期流祚者也爰及末葉暗君荒主不崇先王之令軌不納正士之直言以遂其情志恬忽變戒未有不尋踐禍難至于顛覆者也天道既著請以人道論之夫六情五性同在于人嗜欲廉貞各居其一及其動也交爭于心欲強質弱則縱濫不禁精誠不制則放溢無極夫情之所在非好則美而美好之集非人力不成非穀帛不立情苟無極則人不堪其勞物不充其求勞求並至將起禍亂故不割情無以相供仲尼云人無遠慮必有近憂由此觀之禮義之制非苟拘分將以遠害而興治也今吳蜀二賊非徒白地小虜聚邑之寇乃據險乘流跨有士衆僭號稱帝欲與中國爭衡今若有人來告權備並修德政復履清儉輕省租賦不治玩好動咨耆賢事遵禮度陛下聞之豈不惕然惡其如此以為難卒討滅而為國憂乎若使告者曰彼二賊並為無道崇侈無度役其士民重其徵賦下不堪命吁嗟日甚陛下聞之豈不勃然忿其困我無辜之民而欲速加之誅其次豈不幸彼疲弊而取之不難乎苟如此則可易心而度事義之數亦不遠矣且秦始皇不築道德之基而築阿房之宮不憂蕭牆之變而修長城之役當其君臣為此計也亦欲立萬世之業使子孫長有天下豈意一朝匹夫大呼而天下傾覆哉故臣以為使先代之君知其所行必將至于敗則弗為之矣是以亡國之主自謂不亡然後至于亡賢聖之君自謂將亡然後全于不亡昔漢文帝稱為賢主躬行約儉惠下養民而賈誼方之以為天下倒縣可為痛哭者一可為流涕者二可為長歎息者三況今天下凋弊民無儋石之儲國無終年之畜外有強敵六軍暴邊內興土工州郡騷動若有寇警則臣懼版築之士不能投命虜庭矣又將吏奉祿稍見折減方之于昔五分居一諸受休者又絶廩賜不應輪者今皆出半此為宮人兼多于舊其所出與參少于昔而度支經用更每不足牛肉小賦前後相繼反而推之凡此諸費必有所在且夫祿賜穀帛人主所以惠養吏民而為之司命者也若今有廢是奪其命矣既得之而又失之此生怨之府也周禮天府掌九伐之則以給九式之用入有其分出有其所不相干乘而用各足各足之後乃以式貢之餘供王玩好又上用財必考于司會今陛下所與共坐廊廟治天下者非三司九列則臺閣近臣皆腹心造膝宜在無諱若見豐省而不敢以告從命奔走惟恐不勝是則具臣非鯁輔也昔李斯教秦二世曰為人主而不恣睢命之曰天下桎梏二世用之秦國以覆斯亦滅族是以史遷議其不正諫而為世誡魏志高堂隆傳疾篤口占上疏曾子有疾孟敬子問之曾子曰鳥之將死其鳴也哀人之將死其言也善臣寢疾病有增無損常懼奄忽忠款不昭臣之丹誠豈惟曾子願陛下少垂省覽渙然改往事之過謬勃然興來事之淵塞使神人嚮應殊方慕義四靈效珍玉衡曜精則三王可邁五帝可越非徒繼體守文而已也臣常疾世主莫不思紹堯舜湯武之治而蹈踵桀紂幽厲之迹莫不嗤笑季世惑亂亡國之主而不登踐虞夏殷周之軌悲夫以若所為求若所致猶緣木求魚煎水作冰其不可得明矣尋觀三代之有天下也聖賢相承歷載數百尺土莫非其有一民莫非其臣萬國咸寧九有有截鹿臺之金巨橋之粟無所用之仍舊南面夫何為哉然癸辛之徒恃其旅力知足以拒諫才足以飾非諂諛是尚臺觀是崇淫樂是好倡優是説作靡靡之樂安濮上之音上天不蠲眷然回顧宗國為墟不夷于隸紂縣白旗桀放鳴條天子之尊湯武有之豈伊異人皆明王之胄也且當六國之時天下殷熾秦既兼之不修聖道乃構阿房之宮築長城之守矜夸中國威服百蠻天下震竦道路以目自謂本枝百葉永垂洪暉豈悟二世而滅社稷崩圮哉近漢孝武乘文景之福外攘夷狄內興宮殿十餘年間天下囂然乃信越巫懟天遷怒起建章之宮千門萬戶卒致江充妖蠱之變至于宮室乖離父子相殘殃咎之毒禍流數世臣觀黃初之際天兆其戒異類之鳥育長燕巢口爪胸赤此魏室之大異也宜防鷹揚之臣于蕭牆之內可選諸王使君國典兵往往棊跱鎮撫皇畿翼亮帝室昔周之東遷晉鄭是依漢呂之亂實賴朱虛斯蓋前代之明鑒夫皇天無親惟德是輔民詠德政則延期過歷下有怨歎則掇録授能由此觀之天下之天下非獨陛下之天下也臣百疾所鍾氣力稍微輒自輿出歸還里舍若遂沈淪魂而有知結草以報魏志高堂隆傳上韋抱事太史許芝所舉韋抱遠不度于古近不儀于今每祭與吏爭肉自取百斤猶恨其少也書鈔五十五上言張掖瑞石事古皇聖帝所未嘗蒙實有魏之禎命東序之世寶魏志管寧傳諫殺鹿抵罪近日有司宣令有殺禁地鹿者身死財産歿官有能先覺白者厚賞賜之此為重禽獸而賤人同于齊宣王矣御覽九百六引高堂隆集奏事陽符一名陽燧取火于日陰符一名陰燧取水于月並入銅作鏡名曰陰陽之鏡御覽七百一十七引魏名臣奏五祀議國行中霤門井竈多不遍唯祀在者故曰祭五祀在于廟今每門戶輒祭之自漢以來非舊典也祭井自漢從水類不列五祀宜除之祭井祀行世本曰微作傷五祀漢書儀曰祠五祀謂五行金木水火土也木正曰句芒火正曰祝融金正曰蓐收水正曰玄冥土正曰后土皆古賢能治成五行有功者也主其神祀之御覽五百二十九引魏名臣奏薦新議按舊典天豫諸侯月有祭事其孟則四時之祭也三牲黍稷時物咸備其仲月季月皆薦新之祭也大夫以上將之以羔或加以犬而已不備三牲也士以豚庶人則唯其時宜魚雁可也皆有黍稷禮器曰羔豚而祭百官皆足太牢而祭不必有餘羔豚則薦新之禮也太牢則時祭之禮也詩云四之日其蚤獻羔祭韭周之四月則夏之二月也月令仲春天子乃獻羔開冰季春之月天子始乘舟薦鮪仲夏之月天子乃嘗魚咸薦之寢廟此則仲春季月薦新之禮也通典四十九祀功臣議按先典祭祀之禮皆依生前尊卑之敘以為位次功臣配食于先王象生時侍宴燕禮大夫以上皆升堂以下則位于庭其餘則與君同牢至于俎豆薦羞唯君備公降于君卿大夫降于公士降于大夫使功臣配食于蒸祭所以尊崇其德明其勳以勸嗣臣也議者欲從漢氏祭之于庭此為貶損非寵異之謂也貴者取貴骨賤者取賤骨今使配食者因君之牢以貴賤為俎庶合事宜周志曰勇則害上不登于明堂共用謂之勇言有勇而無義死不登堂而配食此即配食之義位在堂之明審也下為北面三公朝立之位耳宴則脫屨升堂在庭也凡獻爵有十二九七五三之差君禮大夫三獻太祝令進三爵于配食者可也通典五十告瑞璽議案典瑞天子有事必告宗廟以象生也凡宗廟祖尊而禰親祭祀告事皆先尊而後親往者得瑞璽以告宗廟而奠于親廟此則告于尊奠于親故事明比文皇帝文思皇后其為慈親一體也告之曰質明守官筵于廟堂之奧設玉几近南設洗于阼階東南酒人設醴酒于堂脯人醢人執籩脯豆醢于洗北西面公位于阼階西南北面太常位于阼階北面差出公後百執事敘立于卿後執璽使者立公西北東面諸博士差退唯籩人豆人不拜餘皆拜拜訖解劍納履博士引公祝道盥升自阼階博士立于高皇廟室戶外西東面祝先入室南面入戶內西面博士並引卿與從公籩人醢人百執事皆從升博士引使者升階如在廷之位卿受脯于戶外入于筵前醢人以醢授卿卿拜興受設于籩北興出俟事于大皇帝室南面祝酌酒奠籩南祝道公博士引使者執邸受瑞璽于戶祝西面立于戶外東使者還復位公奠璽于几東興復位祝入公再拜稽首興立漏移一刻公執璽邸授使者戶外遂造太皇帝武皇帝文皇帝皆如高皇出禮畢之後可使都督黃門兼諸官告瑞于文思皇后寢堂如廟之禮通典五十五告瑞璽又議往者得瑞璽祝文曰於惟往者神靈吐耀天球玉璽見于宗廟之宮今則西嶽之精神天意重出瑞璽王國之域實為皇天后土明報皇高曾祖武文之德德祚洋溢光潤萬國孝皇帝諱謹使上公臣某敢用嘉薦醴酒奉呈瑞璽以告先靈尚饗通典五十五改正朔議按自古有文章以來帝王之興受禪之與干戈皆改正朔所以明天道定民心也易曰革元亨利貞有孚改命吉湯武革命應乎天從乎人其義曰水火更用事猶王者必改正朔易服色也易通卦驗曰王者必改正朔易服色以應天地三氣三色書曰若稽古帝舜曰重華建皇授政改朔初高陽氏以十一月為正薦玉以赤繒高辛氏以十三月為正薦玉以白繒尚書傳曰舜定鍾石論人聲乃及鳥獸咸變于前故更四時改堯正詩曰一之日觱發二之日栗烈三之日于耜傳曰一之日周正月二之日殷正月三之日夏正月詩推度災曰如有繼周而王者雖百世可知以前檢後文質相因法度相改三而復者正色也二而復者文質也以前檢後謂軒轅高辛夏后氏漢皆以十三月為正少昊有唐有殷皆以十二月為正高陽有虞有周皆以十一月為正後雖百世皆以前代三而復也禮大傳曰聖人南面而治天下必正度量考文章改正朔易服色殊徽號樂稽曜嘉曰禹將受位天意大變迅風雷雨以明將去虞而適夏也是以舜禹雖繼平受禪猶制禮樂改正朔以應天從民夏以十三月為正法物之始其色尚黑殷以十二月為正法物之牙其色尚白周以十一月為正法物之萌其色尚赤能察其類能正其本則嶽瀆致雲雨四時和五稼成麟皇翔集春秋十七年夏六月甲子朔日有蝕之傳曰當夏四月是謂孟夏春秋元命苞曰王者受命昭然明于天地之理故必移居處更稱號改正朔易服色以明天命聖人之寶質文再而改窮明相承周則復始正朔改則天命顯凡典籍所記不盡于此略舉大較亦足以明也宋書禮志一瑞贄議按周禮公執桓圭公謂上公九命分陝而理及二王後也今大司馬公大將軍實分征東西可謂上公矣山陽公衛國公則二王後也侯執信圭謂地方四百里伯執躬圭謂地方三百里皆七命也今郡王戶數多者可知侯少者可如伯子執穀璧謂地方二百里男執蒲璧謂地方百里皆五命也今縣主戶數多者可如子少者可如男上公禮其率諸侯以朝則執桓圭自非朝宗則如八命之公與王論道有事而進則執璧今二王後諸王若入朝覲二公率以進退則執桓圭其朝王則與群公執璧按周禮王官唯公執璧漢大將軍驃騎車騎衛將軍開府辟召掾屬與公同儀則執璧可也孤皮帛卿羔孤謂天子七命之孤及大國四命之孤副公與王論道尊于六卿其執贄以虎皮表束帛今九卿之列太常光祿勳衛尉尊于六卿其執贄如孤也其朝王執皮帛可也三府長史亦公之副雖有似于孤實卑于卿大夫之禮可也公之孤俯聘于天子及見于其君其贄以豹皮表束帛今未有其官意謂山陽公之上卿可以當之卿謂六官六命之卿及諸侯三命再命之卿也今六卿及命永壽永安長秋城門五校皆執羔可也諸侯之卿自于其君亦如之天子卿大夫飾羔雁以繢諸侯卿大夫飾羔雁以布州牧郡守以功德賜勞秩比中二千石者其朝覲宜依卿執羔金紫將軍秩比中二千石與卿同大夫執雁謂天子中下大夫四命及諸侯再命一命之大夫也其位卑于卿今王府長史及五命二千石之著者也博士儒官歷代禮服從大夫如前執雁可也州牧郡守未賜者宜依大夫執雁皆飾以繢諸縣千石六百石今士大夫若或會覲宜執雁飾以布士執雉謂天子三命之士及諸侯一命再命之士也府史以下至于比長庶人在官亦謂之士諸縣四百石三百石長從士禮執雉可也通典七十五服黃讀令議黃屬土也土王四季各十八日土生于火故于火用事之末服黃二季則不其令則隨四時不以五行為令也是以服黃無令通典七十景初元年通事奏曰前後但見讀四時令至于服黃之時獨闕太令史高堂隆以為諸侯稱薨議諸侯曰薨亦取隕墜之聲也禮王者之後公及王之上公九命為二伯者侯伯皆執圭子男及王之公皆執璧其卒皆曰薨今可使二王後公及諸國王執圭大將軍縣亭侯有爵土者車騎衛將軍辟召掾屬與三公俱執璧者卒皆稱薨禮大夫曰卒者言陳力展志功成事卒無遺恨也今太中大夫秩千石諫議中散大夫秩皆六百石此正天子之大夫也而使下與二百石同列稱不祿為大夫死貶從事殆非先聖制禮之意也士不祿者言士業未卒不終其祿也通典八十三答卞蘭難取鐘夫禮樂者為治之大本也故簫韶九成鳳凰來儀雷鼓六變天神以降政是以平刑是以錯和之至也新聲發響商辛以隕大鐘既鑄周景以弊存亡之機恆由斯作安在廢興之不階也君舉必書古之道也作而不法何以示後聖王樂聞其闕故有針規之道忠臣願竭其節故有匪躬之義也魏志高堂隆傳對或問藏主或問高堂隆曰昔受訓云馮君八萬言章句設正廟之主各藏太室西壁之中遷廟之主于太室北壁之中按逸禮藏主之處似在堂上壁中答曰章句但言藏太祖北壁中不別堂室愚意以堂上無藏主當室之中也通典四十八對尚書曹訪物故尚書曹訪云官寮終卒依禮各有至于其間令長以下通言物故不知物故之名本何所出高堂隆答曰聞之先師物無也故事也言無復所能于事也通典八十三又蜀志劉璋傳注對尚書祠部問同母異父昆弟服景初中尚書祠郎問曰同母異父昆弟服應幾月太常曹毗述博士趙怡據子遊鄭注大功九月高堂隆云聖人制禮外親正服不過緦麻異外內之明理也外祖父母以尊加從母以名加皆小功舅緦服而已外兄弟異族無屬疏于外家遠矣故于禮序不得有服若以同居從同爨服無緣章云大功乃重于外祖父母皆實先賢之過也通典九十一
