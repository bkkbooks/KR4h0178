body:
  text: 楊泉五湖賦并序并序五湖賦并序余觀夫主五湖而察其雲物皇哉大矣以為名山大澤必有記頌之章故梁山有奕奕之詩雲夢有子虛之賦夫具區者揚州之澤藪也有大禹之遺迹疏川導滯之功而獨闕然未有翰墨之美余竊憤焉敢忘不才述而賦之其辭曰濬矣大哉於此五湖乃天地之玄源陰陽之所徂上值箕斗之精與雲漢乎同模受三方之灌溉為百川之巨都居揚州之大澤苞吳越之具區底功定績蓋寓令圖南與長江分體東與巨海合流太陰之所毖玄靈之所遊追潮水而往還通蓬萊與瀛洲爾乃詳觀其廣深之所極延袤之規方邈乎浩浩漫乎洋洋西合乎濛氾東苞乎扶桑日月於是出入與天漢乎相望頭首無錫足蹏松江負烏程於背上懷大吳以當胸左有苞山連以醴瀆岝嶺崔巍穹隆紆曲大雷小雷湍波相逐右有平原廣澤曼延旁薄原隰陂坂各有條格茹蘆菼薍隱軫肴錯衝風之所去零雨之所薄蓺文類聚九初學記七赤檜升棹檀槳細堅御覽七百七十一鹹鹽白糝雜以菜菓連堈柳鮓積如林丘書鈔一百四十六引兩條爾乃陳列勍力葅擗是屑方縳直截書鈔一百四十六贊善賦伊善惡之所施乃禍福之為階行德安而保身忘為害而自危故先民之有作執溫恭而不虧云顏冉之遭命怪禍福之參差夫二賢之履道歷千載而見知身既沒而名存厥復戚乎何為夫死生之有命非神明之所規故積善之家厥福惟昌積惡之門必有餘殃是以趙武好善厥胤以長二郄好勝厥身以亡古人從善如不及去惡如探湯何福德而難值而禍惡之易當蓺文類聚二十三養性賦況性命之幾微如鴻毛之漂輕文選任昉為齊明帝讓宣城郡公表注蠶賦并序并序蠶賦并序古人作賦者多矣而獨不賦蠶乃為蠶賦金樓子立言篇下御覽八百二十五惟陰陽之產物氣陶化而播流物受氣而含生皆纏綿而自周伊夫蠶之為物功巨大而弘優成天子之袞冕著皇后之盛服昭五色之玄黃作四時之單復是以王者貴此功焉使皇后命三宮之夫人又世婦之吉者親桑于北宮二月初吉遂布令於天下百辟兆民使咸務焉是以仲春之月吉日庚午既差我馬惟蠶之祖編使童男作以童女溫室既調蠶母入處陳布說種柔和得所晞用清明浴用穀雨爰求柔桑切若細縷起止得時燥溼是候逍遙偃仰進止自如仰似龍騰伏似虎趺員身方腹列足雙俱昏明相推日時不居粵召役夫築室于房于房伊何在庭之東東愛日景西望餘陽既酌以酒又挹以漿壼飱在側敷修在旁我鄰我黨我助我康於是乎蠶事畢矣大務時成閣紆卷薄灑埽宮庭蠶母須飾從容自寍至於宿三日乃開闔啟房是瞻是觀方者四張員者紆盤縱者相屬橫者交連分薪柴而解著繭絲互而相攀競以挐攫再笑再言惰者悅而忘懈劣者勉以增勤是月也天子以太牢之禮獻繭于寢廟皇后親繰三盆然後辨於夫人世婦至于百辟卿士下及兆民咸趨繰事爾乃絲如凝膏其白伊雪以為衣裳冠冕服飾禮神納賓各有分職以給百禮罔不斯服夫功也起於綿綿成於翼翼頌之難周論之罔極殷斯勤斯如何勿憶蓺文類聚六十五織機賦伊百工之為技莫機巧之最長似人君之列位象百官之設張立匡廓之制度如城隔之員方應萬機以布錯實戀態之有章是以孟秋之月首殺庶物工民呈材取彼椅梓貞幹修枝名匠騁工美乎利器心暢體通膚合理同規矩盡法因事作容好無不媚事無不供于是乎女工就素絲輕貫綜紀簡姦清織女揚翬美乎如芒麗姿妍雅動有令光足閑蹈躡手習檻匡節奏相應五聲激揚濁者含宮清者應商和聲成柔慷慨成剛屈申舒縮沈浮抑揚開以厭間闔以高梁進以懸魚退以俠強氣變相應陰感乎陽僶俛不及進卻頡頏事物之宜法天之常既合利用得道之方蓺文類聚六十五草書賦惟六書之為體美草法之最奇杜垂名於古昔皇著法乎今斯字要妙而有好勢奇綺而分馳解隸體之細微散委曲而得宜乍楊柳而奮發似龍鳳之騰儀應神靈之變化象日月之盈虧書縱竦而值立衡平體而均施或斂束而相抱或婆娑而四垂或攢翦而齊整或上下而參差或陰岑而高舉或落籜而自披其布好施媚如明珠之陸離發翰攄藻如春華之楊枝提墨縱體如美女之長眉其滑澤肴易如長溜之分歧其骨梗強壯如柱礎之不基斷除弓盡如工匠之盡規其芒角吟牙如嚴霜之傅枝眾巧百態無不盡奇宛轉翻覆如絲相持蓺文類聚七十四請辭古不墓祭葬于中原而廟在大門裏不敢外其親平明出葬日中反虞不敢一日使神無依也迨周衰禮廢立寢於墓漢興而不改以先帝衣冠四時與水進果實而禘祫祭祀皆于宗廟及其末因寢之在墓咸往祭焉蓋由京師三輔酋豪大姓力強財富婦女贍侈車兩相追宿止墓下連日厭飫遂以成俗迄于今日夫死者骨肉歸乎土神而有靈豈肯守夫敗壞而在草莽哉御覽二百五十六答陸士龍書奉詠美旨流風綽遠復禮興仁命世之作獲尚齒之況無高賢之報抱此永懷愧歎何有君子弘道厚文無施是用釋筆歸于神要陸雲集嚴宛陵答臨亡書鏡與粉盆與郎香簽與若欲其行身如明鏡純如粉譽如香御覽七百十七上言臨平湖開通臨平湖自漢末穢塞今更開通又于湖邊得石圅圅中有小石青白色長四寸廣二寸餘刻作皇帝字水經漸江水注天璽元年吳郡上言于是改天冊為天璽元年奏改年昔武王伐紂有赤烏之祥君臣觀之遂有天下聖人書策載述最詳者以為近事既嘉親見又明也吳志大帝傳群臣奏奏修郊祀議頃者嘉瑞屢徵遠國慕義天意人事前後備集宜修郊祀以承天意吳志大帝傳注引江表傳曰群臣以權末郊祀奏議云云重奏普天之下莫非王土王者以天下為家昔周文武郊於酆鎬非必中土吳志大帝傳注引江表傳又見宋書禮志三復奏伏見漢書郊祀志匡衡奏徙甘泉河東郊於長安言文王郊於酆同上奏武昌宮材不堪用武昌宮已二十八歲恐不堪用宜下所在通更伐致同上注引江表傳有司奏云奏撿察胡人有胡人入境自稱沙門容服非恆事應撿察高僧傳一赤烏中有司奏玉匱針經序呂博少以醫術知名善診脈論疾多所著述吳赤烏二年為太醫令撰玉匱針經及注八十一難經大行於代御覽七百二十四柑頌厥苞甘橘精者曰柑削彼金衣咽茲玉液甘踰萍實冷亞冰壼近嗤齊相進不剖之實遠笑魏君逢裂牙之味頌曰宗炳煌煌嘉實磊如景星南金其形隨珠蓺文類聚八十六廣志曰陽由為成都郡文學掾云吳有餘甘金衣包品之讚云云曹瞞傳嵩夏侯氏之子夏侯惇之叔父太祖於惇為從父兄弟太祖少好飛鷹走狗游蕩無度其叔父數言之於嵩太祖患之後逢叔父於路乃陽敗面喎日叔父怪而問其故太祖曰卒中惡風叔父以告嵩嵩驚愕呼太祖太祖口貌如故嵩問曰叔父言汝中風已差乎太祖曰初不中風但失愛於叔父故見罔耳嵩乃疑焉自後叔父有所告嵩終不復信太祖於是益得肆意矣太祖初入尉廨繕治四門造五色棒縣門左右各十餘枚有犯禁者不避豪強皆棒殺之後數月靈帝愛幸小黃門蹇碩叔父夜行即殺之京師斂迹莫敢犯者近習寵臣咸疾之然不能傷於是共稱薦之故遷為頓丘令公聞攸來跣出迎之撫掌笑曰子卿遠來吾事濟矣既入坐謂公曰袁氏軍盛何以待之今有幾糧乎公曰尚可支一歲攸曰無是更言之又曰可支半歲攸曰足下不欲破袁氏耶何言之不實也公曰向言戲之耳其實可一月為之柰何攸曰公孤軍獨守外無救援而糧穀已盡此危急之日也今袁氏輜重有萬餘乘在故市烏巢屯軍無嚴備今以輕兵襲之不意而至燔其積聚不過三日袁氏自敗也公大喜乃選精銳步騎皆用袁軍旗幟銜枚縛馬口夜從間道出人抱束薪所歷道有問者語之曰袁公恐曹操鈔略後軍遣兵以益備聞者信以為然皆自若既至圍屯大放火營中驚亂大破之盡燔其糧穀寶貨斬督將眭元進騎督韓莒子呂威璜趙叡等首割得將軍淳于仲簡鼻未死殺士卒千餘人皆取鼻牛馬割脣舌以示紹軍將士皆怛懼時有夜得仲簡將以詣麾下公謂曰何為如是仲簡曰勝負自天何用為問乎公意欲不殺許攸曰明旦鑒于鏡此益不忘人乃殺之遣候者數部前後參之皆曰定從西道已在邯鄲公大喜會諸將曰孤已得冀州諸君知之乎皆曰不知公曰諸君方見不久也時寒且旱二百里無復水軍又乏食殺馬數千匹以為糧鑿地入三十餘丈乃得水既還科問前諫者眾莫知其故人人皆懼公皆厚賞之曰孤前行乘危以僥倖雖得之天所佐也故不可以為常諸君之諫萬安之計是以相賞後勿難言之公將過河前隊適渡超等奄至公猶坐胡床不起張郃等見事急其引公入船河水急比渡流四五里超等騎追射之矢如雨下諸將見軍敗不知公所在皆惶懼至見乃悲喜或流涕公大笑曰今日幾為小賊所困乎時公軍每渡渭輒為超騎所衝突營不得立地又多沙不可築壘婁子伯說公曰今天寒可起沙為城以水灌之可一夜而成公從之乃多作縑囊以運水夜渡兵作城比明城立由是公軍盡得渡渭公遣華歆勒兵入宮收后后閉戶匿壁中歆廢戶發壁牽后出帝時與御史大夫郗慮坐后被髮徒跣過執帝手曰不能復相活邪帝曰我亦不自知命在何時也帝謂慮曰郄公天下寍有是乎遂將后殺之完及宗族死者數百人為尚書右丞司馬建公所舉及公為王召建公到鄴與歡飲謂建公曰孤今日可復作尉否建公曰昔舉大王時適可尉耳王大笑建公名防司馬宣王之父是時南陽間苦繇役侯音於是執太守東里襃與吏民共反與關羽連和南陽功曹宗子卿往說音曰足下順民心舉大事遠近莫不望風然執郡將逆而無益何不遣之吾與子共勠力比曹公軍來關羽兵亦至矣音從之即釋遣太守子卿因夜踰城亡出遂與太守收餘民圍音會曹仁軍至共滅之桓階勸王正位夏侯惇以為宜先滅蜀蜀亡則吳服二方既定然後遵舜禹之軌王從之及至王薨惇追恨前言發病卒王使工蘇越徙美梨掘之根傷盡出血越白狀王躬自視而惡之以為不祥還遂寢疾太祖為人佻易無威重好音樂倡優在側常以日達夕被服輕綃身自佩小鞶囊以盛手巾細物時或冠帢帽以見賓客每與人談論戲弄言誦盡無所隱及歡悅大笑至以頭沒杯案中肴膳皆沾洿巾幘其輕易如此然持法峻刻諸將有計畫勝出已者隨以法誅之及故人舊怨亦皆無餘其所刑殺輒對之垂涕嗟痛之終無所活初袁忠為沛相嘗欲以法治太祖沛國桓邵亦輕之及在兗州陳留邊讓言議頗侵太祖太祖殺讓族其家忠邵俱避難交州太祖遣使就太守士燮盡族之桓邵得出首拜謝於庭中太祖謂曰跪可解死邪遂殺之常出軍行經麥中令士卒無敗麥犯者死騎士皆下馬付麥以相持於是太祖馬騰入麥中敕主簿議罪主簿對以春秋之義罰不加於尊太祖曰制法而自犯之何以帥下然孤為軍帥不可自殺請自刑因援劍割髮以置地又有幸姬常從晝寢枕之臥告之曰須臾覺我姬見太祖臥安未即寤及自覺棒殺之常討賊廩穀不足私謂主者曰如何主者曰可以小斛以足之太祖曰善後軍中言太祖欺眾太祖謂主者曰特當借君死以厭眾不然事不解乃斬之取首題徇曰行小斛盜官穀斬之軍門其酷虐變詐皆此類也歷陽山石文楚九州渚吳九州都揚州士作天子四世治大平始吳志孫皓傳吳九真太守谷朗碑府君諱朗字義先桂陽耒陽人豫章府君之曾孫公府君之孫郎中君之子也其先世自顓頊益為舜虞賜姓嬴氏至于扉子封於秦谷因而氏焉君承洪原之清流稟奕世之高素履道思順德行純備三歲喪母十一亡父獨與弟居承奉繼親和顏悅色孝友溫恭曾閔之操君其蹈焉弱冠仕郡歷右職守陽安長淑問宣流遂升王府除郎中尚書令史郡中正遷長沙劉陽令播渥惠以育物垂仁恩以布化莅政未期徵拜立忠都尉尚書郎靖密樞機名冠眾僚遷部廣州督軍校尉正身率下不畏彊禦流清蕩濁萬里肅威功成辭退拜五官郎中遷大中正平衡清格彝倫攸敘于時交州竊邑叛國戎車婁喪干戈未戢帝思俾乂詶咨群司僉以君往部南州威恩素著遷九真太守君稟明德所歷垂勳宜延遐紀光讚皇家如何不永春秋五十有四鳳皇元年四月乙未寢疾而卒嗚呼哀哉凡百君子莫不嗟痛乃立碑作頌以顯行績其詞曰於鑠府君稟性玄通積行閨閾九族睦壅羽儀上京德與雲騰入蹈丹墀夙夜靖恭出撫黎民風移俗興名參豹產勳齊往蹤當永黃耇翼佐帝庸昊天不弔哲人其終濟濟縉紳靡瞻靡宗勒茲玄石永光無窮碑本上天帝言天下步于日月下闕帝曰大吳一萬方甲午丙日才仁中采予人元示于山川下闕天發神讖文天璽元年桼月己酉朔十四日壬武中郎將丹陽然發刻廣省乃是天讖廣多未解解者十二字以桼月廿三日遣解文字令史建忠中郎將會稽陳治解十三字治復有未解以八月一日詔遣中書郎行大將軍裨將軍關內侯九江費宇行視更得二字合五十桼字宇與西部校尉姜絡典校皋儀備梅允章咸李楷賀吳寵建業丞許尉番約等十二人吏從並共觀視深甄歷永歸大吳上天宣命昭太平文字炳朗天在諸石上故就刊銘敷垂億下闕蘭臺東觀令吳郡巧工九江朱江東功東海夏侯下闕上闕之子茲格于上下光被八幽蠉飛蝡動無不歸仁是故賂上尊靡不遑假民用不犯於是丞相沇率禮備儀尊敬大宮所臨徘徊于此遂基大宮玉燭澤清萬民子來不日延頸跂足率土來庭柔服百神經緯庶務日昃不暇觀六經旁貫百家思該道根數世陵遲大繇未光闓立東觀紀實言建設墳典采詢微間窮神極化無幽不闡舉逸遠佞寬罪宥刑守道尚功嘉善矜弱哀賤愍凶朽枯上天感應踐阼初升特發神夢膺受籙圖玉璽啟自神匱神人指授金冊青玉符者四日月抱戴老人星見者一十有一五帝瑞氣黃𣗍紫蓋覆擁宮闕顯著斗牛者一十有九麟鳳龜龍銜圖負書卅有九青猊白虎丹鸞彩鳳廿有二白鹿白麢白麂白兔卅有二白雉白烏白鵲白鳩一十有九赤烏赤雀廿有四白雀白燕廿有桼神魚吐書白鯉騰舡者二靈絮神蠶彌被原野者三嘉禾秀穎甘露凝液六十有五殊榦連理六百八十有三明月火珠璧流離卅有六大貝餘蚔餘泉桼十有五大寶神璧水青瑴璧卅有八玉燕玉羊玉鳩者三寶鼎神鐘神壅夏柷神鬲卅有六石室山石闓石印封啟九州吉發顯天讖彰石鏡光者一十有一神頌歌廟靈示者三畿民惟紀湖澤闓通應讖合謠者五神翁神僮靈母神女告徵表祥者卅有桼靈夢啟讖神人授書著驗者十祕記讖文玉版紀德者三玉人玉印文采明發者八玉玉琯玉琨玉玦玉鉤玉稱殊輝異色者卅有三玉尊玉盌玉盤玉罌清絜光㫰者九孔子河伯子胥王宣言天平地成天子出東門鄂者四大賢司馬微虞翻推步圖緯甄匱啟緘發事與運會者二其餘飛行之類植生之倫希古所覿命世殊奇不在瑞命之篇者不可稱而數也於是旃蒙協洽之歲月次陬訾之以惟重光大淵獻行年所值實惟茲歲帝出虖震周易實著遂受上天玉璽文曰吳真帝玉質青黃鰓理洞徹拜受祗筵夙夜惟寅夫大德宜報大命宜彰乃以柔兆涒灘之歲欽若上天月正革元郊天祭地紀號天璽用彰明命于是丞相沇太尉璆大司徒燮大司空朝執金吾脩城門校尉歆屯騎校尉悌尚書令忠尚書昏直晃昌國史瑩覈等僉以為天道元嘿以瑞表真今眾瑞畢至三表納貢幽荒百蠻浮海慕化九垓八埏罔不被澤率按典繇宜先行禪禮紀勒天命遂於吳興國山之陰告祭刊石以對揚乾命廣報坤德副慰天下喁喁之望焉中書東觀令史立信中郎將臣蘇建所書碑本又雲麓漫鈔又荊溪外紀合微密持經記此經凡有四本三本並各二名一本三名備如後列其中文句參差或梵或漢音殊或隨義制語各有左右依義順文皆可符同所為異處後列得法利三乘階級人數及動地雨華諸天妓樂供養多不悉備意所未詳一本一名無量門微密之持二名成道隆魔得一切智此一本名行於世為常舊本一本一名阿難陀目佉尼呵離陀羅尼二名疾使人民得一切智一本一名無端底門總持之行二名菩薩降卻諸魔堅固於一切智一本一名出生無量門持二名一生補處道行三名成道降魔得一切智此本備明法利及動地妓樂事四本皆各標前一名於經首第二第三名不以題經也後舍利弗請名佛說名皆備如前列釋藏跡七法句經序曇鉢偈者眾經之要義曇之言法鉢者句也而法句經別有數部有九百偈或七百偈及五百偈偈者經語猶詩頌也是佛見事而作非一時言各有本末布在諸經佛一切智厥性大仁愍傷天下出興于世開現道義所以解人凡十二部經總括其要別為數部四部阿鋡佛去世後阿難所傳卷無大小皆稱聞如是處佛所在究暢其說是後五部沙門各自鈔眾經中四句六句之偈比次其義條別為品于十二部經靡不斟酌無所適名故曰法句夫諸經為法言法句者猶法言也近世葛氏傳七百偈偈義致深譯人出之頗使其渾惟佛難值其法難聞又諸佛興皆在天竺天竺言語與漢異音云其書為天書語為天語名物不同傳實不易唯昔安調安侯世高都尉佛調釋梵為漢實得其體斯已難繼後之傳者雖不能審猶尚貴其實粗得大趣始者維祇難出自天竺以黃武三年來適武昌僕從受此五百偈本請其同道竺將炎為譯將炎雖善天竺語未備曉漢其所傳言或得梵語或以義出音近於質直僕初嫌其為詞不雅維祇難曰佛言依其義不用飾取其法不以嚴其傳經者令易曉勿失厥義是則為善座中咸曰老氏稱美言不信信言不美仲尼亦云書不盡言言不盡意明聖人意深邃無極今傳梵議實宜徑達是以自偈受譯人口因順本旨不加文飾譯所不解即闕不傳故有脫失多不出者然此雖詞朴而旨深文約而義博事均眾經章有本故句有義說其在天竺始進業者不學法句謂之越序此乃始進者之鴻漸深入者之奧藏也可以啟蒙辯惑誘人自立學之功微而所包者廣實可謂妙要也哉昔傳此時有所不出會將炎來更從諮問受此偈等復得十三品并校往古有所增定第其品目合為一部三十九篇大几偈七百五十二章都凡一萬四千五百八十字庶有補益共廣聞焉釋藏所九又跡七案此序無撰人名據僧祐出三藏記集嚴佛調傳知是支謙所作法鏡經序夫心者眾法之原臧否之根同出異名禍福分流以身為車以家為國周旋十方稟無勌息家欲難足猶海吞流火之獲薪六邪之殘已甚于蒺藜網之賦魚矣女人佞等三魅其善偽而信寡斯家之為禍也尊邪穢賤清真連叢瑣謗聖賢興獄訟喪九親斯家之所由矣是以上士恥其穢懼其厲為之懾懾如也默思遁邁猶明哲之避無道矣鬄髮毀容法服為珍靖處廟堂練情攘穢懷道宣德開導聾瞽或有隱處山澤漱石沈流專心滌垢神與道俱志寂齊乎無名明化周乎群生賢聖競乎清淨稱斯道曰大明故曰法鏡騎都尉安玄臨淮嚴浮調斯二賢者年在束齔弘志聖業鉤深致遠窮神達幽愍世蒙惑不覩大雅竭思譯傳斯經景謨都尉口陳嚴調筆受言既稽古義又微妙然時干戈未息志士莫敢或遑大道陵遲內學者寡聞覩其景化可以拯塗炭之尤險然義壅而不達因閑竭愚為之注義喪師歷載莫由重質心憤口悱停筆愴如追遠慕聖涕泗并流今記識闕疑俟後明哲庶有暢成以顯三寶矣釋藏服八又跡六安般守意經序夫安般者諸佛之大乘以濟眾生之漂流也其事有六以治六情情有內外眼耳鼻舌身心謂之內矣色聲香味細滑邪念謂之外也經曰諸海十二事謂內外六情之受邪行猶海受流餓夫受飯蓋無滿足也心之溢盪無微不浹恍惚髣髴出入無間視之無形聽之無聲逆之無前尋之無後深微細好形無絲髮梵釋僊聖所不能照明默種子此化生乎彼非凡所覩謂之陰也猶以晦曀種夫粢芬闓手覆種孳有萬億旁人不覩其形種家不知其數也一朽乎下萬生乎上彈指之閒心九百六十轉一日一夕十三億意意有一身心不自知猶彼種夫也是以行寂繫意著息數一至十十數不誤意定在之小定三日大定七日寂無他念怕然若死謂之一禪禪棄也棄十三億穢念之意已獲數定轉念著隨蠲除其八正有二意意定在隨由在數矣垢濁消滅心稍清淨謂之二禪也又除其一注意鼻頭謂之止也得止之行三毒四走五陰六冥諸穢滅矣臩然心明踰明月珠婬邪汙心猶鏡處泥穢垢汙焉偃以照天覆以臨土聰叡聖達萬土臨照雖有天地之大靡一夫而能覩所以然者由其垢濁眾垢汙心有踰彼鏡矣若得良師剗刮瑩磨薄塵微曀蕩使無餘舉之以照毛髮面理無微不察垢退明存使其然矣情溢意散念萬不識一矣猶若於市馳心放聽廣采眾音退宴存思不識一夫之言心逸意散濁翳其聰也若自閑處心思寂寞志無邪欲側耳靖聽萬句不失片言斯著心靖意清之所由也行寂止意懸之鼻頭謂之三禪也還觀其身自頭至足反覆微察內體惡露森楚毛豎猶覩膿涕於斯具照天地人物其盛若衰無存不亡信佛三寶眾冥皆明謂之四禪也攝心還念諸陰皆滅謂之還也穢欲寂盡其心無想謂之淨也得安般行者厥心即明舉明所觀無幽不覩往無數劫方來之事人物所更現在諸剎其中所有世尊法化弟子誦習無遐不見無聲不聞恍惚髣髴存亡自由大彌八極細貫毛氂制天地住壽命猛神德壞天兵動三千移諸剎入不思議非梵所測神德無限六行之由也世尊初欲說斯經時大千震動人天易色三日安般無能質者于是世尊化為兩身一曰何等一曰尊主演于斯義出矣大士上人六雙十二輩靡不執行有菩薩者安清字世高安息王嫡后之子讓國與叔馳避本土翔而後集遂處京師其為人也博學多識貫綜神模七正盈縮風氣吉凶山崩地動針脈諸術覩色知病鳥獸鳴啼無音不照懷二儀之弘行愍黎庶之頑闇先挑其耳卻啟其目欲視聽之明也徐乃陳演正真之六度譯安般之祕奧學者塵興靡不去穢濁之操就清白之德者也余生末蹤始能負薪考妣徂落三師凋喪仰瞻雲日悲無質受睠言顧之潸然出涕宿祚未沒會見南陽韓林潁川皮業會稽陳慧此三賢者信道篤密執德弘正烝烝進進志道不倦余從之請問規同矩合義無乖異陳慧注義余助勘酌非師不傳不敢自由也言多鄙拙不究佛意明哲眾賢願共臨察義有肬腨加聖刪定共顯神融矣釋藏敬一又跡六又略見輦四道德經序老子體自然而然生乎太無之先起乎無因經歷天地終始不可稱載終乎無終窮乎無窮極乎無極故無極也與大道而淪化為天地而立根布氣于十方抱道德之至淳浩浩蕩蕩不可名也煥乎其有文章巍巍乎其有成功淵乎其不可量堂堂乎為神明之宗三光恃以朗照天地稟以得生乾坤運以吐精高而無民貴而無位覆載無窮闡教八方諸天普弘大道開闢以前復下為國師代代不休人莫能知之匠成萬物不言我為玄之德也故眾聖所共尊道尊德貴夫莫之命而常自然惟老氏乎周時復託神李母剖左腋而生生即皓然號曰老子老子之號因玄而出在天地之先無衰老之期故曰老子世人謂老子當始於周代老子之號始於無數之劫其窈窈冥冥眇邈久遠矣世衰大道不行西遊天下關令尹喜曰大道將隱乎願為我著書於是作道德二篇五千文上下經焉夫五千文宣道德之源大無不包細無不入天人自然經也余先師有言精進研之則聲參太極高上遙唱諸天歡樂則攜契玄人靜思期真則眾妙感會內觀形影則神氣長存體洽道德則萬神震伏御覽作百神震服禍滅九陰福生十方安國寍家孰能知乎無為之文洿之不辱飾之不榮撓之不濁澄之不清自然也應道而見傳告無窮常者也故知常曰明大道何為哉弘之由人所以尊妙可不極精乎粗述一篇唯有道者寶之老子河上公注本又略見御覽六百六十譴責陳敏教陳敏許我銀杖今以塗杖見與便投杖水中當送以還之欺蔑之罪不可容御覽七百十引述異記陳敏孫皓之世為江夏太守過宮亭廟乞在任安穩當上銀杖一枚年限既滿作杖擬以還廟捶鐵為幹以銀塗之尋徵為散騎常侍往宮中送杖巫宣神教曰云云敏舟遂覆又見太平廣記二百九十三
