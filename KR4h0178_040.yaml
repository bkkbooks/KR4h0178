body:
  text: 鄭小同日蝕考負議史官不務審察晷度謹綜疏密謬準交會以為其兆至乃虛設疑日大警外內其有不效則委于差晷度禁縱自由皆非其義案春秋昭公三十一年十二月辛亥日蝕晉史墨以庚午之日日始有謫自庚午至辛亥四十二日日蝕之兆固形于前矣此為古有其法而今不察是守官惰職考察無效此有司之罪通典七十八上廣雅表博士臣揖言臣聞昔在周公纘述唐虞宗翼文武剋定四海勤相成王踐阼理政日昊不食坐而待旦德化宣流越裳徠貢嘉禾貫桑六年制禮以導天下箸爾雅一篇以釋其意義傳于後嗣歷載五百墳典散𩂣唯爾雅恆存禮三朝記哀公曰寡人欲學小辨以觀于政其可乎孔子曰爾雅以觀于古足以辨言矣春秋元命包言子夏問夫子作春秋不以初哉首基為始何是以知周公所造也率斯以降超絶六國越踰秦楚爰暨帝劉魯人叔孫通撰置禮記文不違古今俗所傳三篇爾雅或言仲尼所增或言子夏所益或言叔孫通所補或言𨙶郡梁文所考皆解家所說先師口傳既無正譣聖人所言是故疑不能明也夫爾雅之為書也文約而義固其敶道也精研而無誤真七經之檢度學問之階路儒林之楷素也若其包羅天地綱紀人事權揆制度發百家之訓詀未能悉備也臣揖體質蒙蔽學淺詞頑言無尼取竊以所識擇撢群藝文同義異音轉失讀八方殊語庶物易名不在爾雅者詳録品核以箸于篇凡萬八千一百五十文分為上中下以䇓方徠俊哲洪秀偉彥之倫扣其兩端摘其過謬今得用諝亦所企想也臣揖誠惶誠恐頓首頓首死罪死罪三公山下神祠賦趙國元氏縣西界有六神祠吾觀其一焉在陘山之陽即三公祠焉崇堂既峻危閣造雲櫺軒臨萬仞之壑土木被丹藻之華是時寓目永日夕宿東序召彼故老訊之舊典云棟宇初興七十載三台耀靈實降甘雨夫山以有形為神神以無形為主若乃歊蒸于上雷動于下公田禳于多黍嫠婦利其滯穗亦茲邦之所以報歷葉不輟也于是援筆作賦昭神靈之有憑壯夏屋之弘麗南極鬱紆飛龍在天太一白石巨靈據山二后殊位惟公在焉下則歸雲蓬勃緑水流離爭湍趣戾衝石會溪高岸為谷嶢𡸣阻卼梗林奈條逼塗迮蹊行者息駕步趾于斯陟大登岑岡踰爽塏歷朝陽曄華殿之顯敞覩應門之嶈嶈神衣鬱蓊百堵周乎洞房進排閶闔顧眄靈堂聚楹列峙丹飾煌煌千櫨浮跂夭蹻騰驤纍層岌嶪齊載長梁敷山藻于前梲綴榱槁以采章文綺臒其紛鱗洪葩曄以披揚爾乃逡巡降趾遊坐東廂日不逮昏炎燎已光縣宰致祀嘉旨備詳陰祚顯應遍澤坼疆普此士女樂彼豐穰其亂曰坤作地勢恆嶽吐精布濩磊硌上秀太清三后讚事兩師不寧有淹淒淒潤我群生先人諒德圖象垂形考之舊史典謨無聲藝文類聚七十九初學記十二白孔六帖案書鈔一百四十八引孫詵三公山下禊賦云九醞白醝未知即孫該之誤否三公山在燕地而孫詵劉宋人豈江南亦有此山邪附記于此俟考琵琶賦惟嘉桐之奇生于丹澤之北垠下修條以迥固上糾紛而干雲開黃鍾以挺幹表素質于蒼春然後託乎公班妙意橫施四分六合廣袤應規回風臨樂刻飾流離弦則岱谷檿絲篚貢天府伯奇執軛杞妻抽緒大不過宮細不過羽清朗緊徑絶而不茹伶人鼓焉景響豐硠操畼駱驛遊乎風揚抑揚案捻拰搦摧藏爾乃叩少宮騁明光發下柱展上腔儀蔡氏之繁弦放莊公之倍簧于是酒酣曰晚改為秦聲壯諒抗愾土風所生延年度曲六彈俱成絀邪存正疏密有程離而不散滿而不盈沈而不重浮而不輕綿駒遺謳岱宗梁父淮南廣陵郢中激楚每至曲終歌闋亂以衆契上下奔騖鹿奔猛厲波勝雨注飄飛電逝舒疾無方下闕藝文類聚四十四又初學記十六引三條又文選稽叔夏贈秀才入軍詩注又曹子建七啓注又御覽八百八緩調平絃原本反始溫雅沖泰弘畼通理初學記十六殺樂綝表臣受國重任統兵在東揚州刺史樂綝專詐說臣與吳交通又言被詔當代臣位無狀日久臣奉國命以死自立終無異端忿綝不忠輒將步騎七百人以今月六日討綝即日斬首函頭驛馬傳送若聖朝明臣臣即魏臣不明臣臣即吳臣不勝發憤有日謹拜表陳愚悲感泣血哽咽斷絶不知所如乞朝廷察臣至誠魏志諸葛誕傳注引魏末傳承露盤賦偉神盤之殊異邈迢迢以秀峙樹根芳林濯景天池嘉木靈草緑葉素枝飛閣鱗接而從連層臺偃蹇以橫施龜龍怪獸嬉遊乎其中詭類壯觀雜遝衆多若乃肇制模鎔應變入神窮數極理究盡物倫命班爾召淳均栚蘭籍𥳑良辰采名金于崑丘斬扶桑以為薪詔燭龍使吐火運混元以陶甄驅陰陽而役神物豈取力于蒸民用能弗經弗營不日而成匪雕匪斫天挻之靈雄幹碣以高立干雲霧而上征蓋取象于蓬萊實神明之所憑峻極過于閬風鳳高翔而弗升遠而望之若紫霓下鄰雙鵾集焉即而視之若璆琳之柱華蓋在端上際辰極下通九原中承仙掌既平且安越古今而無匹信奇異之可觀又能致休徵以輔性豈徒虛設于芳園采和氣之精液承清露于飛雲藝文類聚七十三罪狀司馬師表故相國懿匡輔魏室歷事忠貞故烈祖明皇帝授以寄託之任懿戮力盡節以寧華夏又以齊王聰明無有穢德乃心勤盡忠以輔上天下賴之懿欲討滅二虜以安宇內始分軍糧克時同舉未成而薨齊王以懿有輔已大功故遂使師承統懿業委以大事而師以盛年在職無疾託病坐擁彊兵無有臣禮朝臣非之義士譏之天下所聞其罪一也懿造計取賊多舂軍糧克期有日師為大臣當除國難又為人子當卒父業哀聲未絶而便罷息為臣不忠為子不孝其罪二也賊退過東關坐自起衆三征同進喪衆敗績歷年軍實一旦而盡致使賊來天下騷動死傷流離其罪三也賊舉國悉衆號五十萬來向壽春圖詣洛陽會太尉孚與臣等建計乃杜塞要險不與爭鋒還固新城淮南將士衡鋒履刃晝夜相守勤瘁百日死者塗地自魏有軍已來為難苦甚莫過于此而師遂意自由不論封賞權勢自在無所領録其罪四也故中書令李豐等以師無人臣節欲議退之師知而請豐其夕拉殺載尸埋棺豐等為大臣帝王腹心擅加酷暴死無罪名師有無君之心其罪五也懿每歎說齊王自堪人主君臣之義定奉事以來十有五載始欲歸政按行武庫詔問禁兵不得妄出師自知姦慝人神所不佑矯發君主加之以罪孚師之叔父性甚仁孝追送齊王悲不自勝群臣皆怒而師懷忍不顧大義其罪六也又故光祿大夫張緝無罪而誅夷其妻子并及母后逼恐至尊彊催督遣臨時哀愕莫不傷痛而師稱慶反以歡喜其罪七也陛下踐阼聰明神武事經聖心欲崇省約天下聞之莫不歡慶而師不自改悔修復臣禮而方徵兵募士毀壞宮內列侯自衛陛下即阼初不朝覲陛下欲臨幸師舍以省其疾復拒不通不奉法度其罪八也近者領軍許允當為鎮北以廚錢給賜而師舉奏加辟雖云流徙道路餓殺天下聞之莫不哀傷其罪九也三方之守一朝闕廢多選精兵以自營衛五營領兵闕而不補多載器杖充聚本營天下所聞人懷憤怨訛言盈路以疑海內其罪十也多休守兵以占高第以空虛四表欲擅彊勢以逞姦心募取屯田加其復賞阻兵安忍壞亂舊法合聚諸藩王公以著鄴欲悉誅之一旦舉事廢主天不長惡使日腫不成其罪十一也臣等先人皆隨從太祖武皇帝征討凶暴獲成大功與高祖文皇帝即受漢禪開國承家猶堯舜相傳也臣與安豐護軍鄭翼廬江護軍呂宣太守張休淮南太守丁尊督守合肥護軍王休等議各以纍世受恩千載風塵思盡軀命以完全社稷安主為效斯義苟立雖焚妻子吞炭漆身死而不恨也案師之罪宜加大辟以彰姦慝春秋之義一世為善十世宥之懿有大功海內所書依古典議廢師以侯就第弟昭忠肅寬明樂善好士有高世君子之度忠誠為國不與師同臣等碎首所保可以代師輔導聖躬太尉孚忠孝小心所宜親寵授以保傅護軍散騎常侍望忠公親事當官稱能奉迎乘輿有宿衛之功可為中領軍春秋之義大義滅親故周公誅弟石碏戮子季友鴆兄上為國計下全宗族殛鯀用禹聖人明典古今所稱乞陛下下臣等所奏朝堂博議臣言當道使師遜位避賢者罷兵去備如三皇舊法則天下協同若師負勢恃衆不自退者臣等率將所領晝夜兼行惟命是授臣等今日所奏惟欲使大魏永存使陛下得行君意遠絶亡之禍百姓安全六合一體使忠臣義士不愧于三皇五帝耳臣恐兵起天下擾亂臣輒上事移三征及州郡國典農各安慰所部吏民不得妄動謹具以狀聞惟陛下愛養精神明慮危害以寧海內師專權用勢賞罪自由聞臣等舉衆必下詔禁絶關津使驛書不通擅復徵調有所收捕此乃師詔非陛下詔書在所皆不得復承用臣等道遠懼文書不得皆通輒臨時賞罰以便宜從事須定集上也魏志毋丘險傳注表禹偰之朝不畜庸才文選任昉為齊明帝讓宣城郡公第一表注諫明帝治宮室疏臣愚以為天下所急除者二賊所急務者衣食誠使二賊不滅士民飢凍雖崇美宮室猶無益也魏志毋丘儉傳時為洛陽典農上疏請定遼東陛下即位已來未有可書吳蜀恃險未可卒平聊可以此方無用之士克定遼東魏志衛臻傳上言劉整鄭像宜差異子弟上言劉整鄭像宜差異子弟昔諸葛恪圍合肥新城城中遣士劉整出圍傳消息為賊所得考問所傳語整曰諸葛公欲活汝汝可具服整罵曰死狗此何言也我當必死為魏國鬼不苟求活逐汝去也欲殺我者便速殺之終無他辭又遣士鄭像出城傳消息或以語恪恪遣馬騎尋圍跡索得像還四五人的頭面縛將繞城表敕語像使大呼言大軍已還洛不如早降像不從其言更大呼城中曰大軍近在圍外壯士努力賊以刀築其口使不得言像遂大呼令城中聞知整像為兵能守義執節子弟宜有差異魏志齊王芳紀嘉平六年鎮東將軍毋丘險上言與大將軍曹爽書薦裴秀生而岐嶷長蹈自然玄靜守真性入道奧博學強記無文不該孝友著于鄉黨高聲聞于遠近誠宜弼佐謨明助和鼎味毗贊大府光昭盛化非徒子奇甘羅之儔兼包游夏顏冉之美晉書裴秀傳時儉為度僚將軍報弟書今別致絳二百匹可以供送葬之事北堂書鈔御覽八百十四承露盤銘赫赫聖魏紹天惟則承露瑰生爰詔懿德下有蛟龍偃蹇虬紛上有層盤厲彼青雲修莖擢擢高弗可及仙掌岧岧零露是集有直其體有固斯基休徵攸降神明攸持少昊惟好我后斯同以近眉壽以保萬邦藝文類聚七十三祠祀不宜稱詔議祭法七祀有國行今月令謂行為井是俗廢行而祀井武帝始定天下興復舊祀造祭祀門戶井竈中霤文帝稱詔靜案凡諸祠祀所以尊敬神靈不宜稱詔御覽五百二十九引魏名臣奏臘用日議吉禮出行有祖祭歲終聚合百物祭宗廟謂之蠟皆有常日臨時造請而用之又無正月祖祭之禮漢氏以午祖以戍臘午者南方之象故以午祖正月為歲首故以寅始用午祖戌者歲之終萬物畢成故以戌臘而小數之學因就傳著五行以為說皆非典籍經義之文也尚書易經說五行水火金木土王相衍天地陰陽之義故易曰坤為土土位西南黃精之君盛德在未故大魏以未祖戍者歲終日窮之辰不宜以為歲初祖祭之行始也易曰坤利西南得朋東北喪朋丑者土之終故以丑臘終而復始乃終有慶宜如前以未祖丑臘通典四十四又略見續漢禮儀志中注補上瑞圖告廟議靈命瑞圖可祀天皇大帝五精之帝于洛陽祀南郊所祭祭訖奉誥冊文脯醢酒告太祖廟藏冊于石函通典五十五冕服議漢氏承秦改六冕之制俱玄冠絳衣而已宋書禮志五上告瑞祝文孝孫皇帝諱使太尉臣某以靈命瑞圖冊告于天郊事訖將納冊于石函謹使太常臣某帥有司以脯醢旨酒敢昭告于皇祖武皇帝以武皇后卞氏配尚饗通典五十五奏請瑞圖告廟涼州刺史所上靈命瑞圖當下洛陽留臺使太尉醮告太祖文昭皇后廟通典五十五祀天樂用宮懸議古無四懸自周始耳未有作古樂而用近懸也案今天地之樂懸謂之上下管與虞舜笙鏞同不言二懸宜如故事但設上下管而已通典一百四十七皇后銘旌議祖號所以稱廟不宜以題旌禮未有主作重既葬而埋之故銘旌宜與重俱埋廟門外之左通典八十四祀天樂用宮懸議案周禮以雲門祀天咸池祀地又今宗廟用宮懸則祀天地宜用宮懸通典一百四十七時風不至奏宜節儉民稀耕少浮食者多國以民為本民以穀為命故費一時之農則失育命之本是以先王務蠲煩費以專耕農自春夏以來民窮于役農業有廢百姓囂然時風不至未必不由此也消復之術莫大于節儉太祖建立洪業奉師徒之費供軍賞之用吏士豐于資食倉府衍于穀帛由不飾無用之宮絶浮華之費方今之要固在息省勞煩之役捐除他餘之務以為軍戎之儲三邊守禦宜在備豫料賊虛實蓄士養衆算廟勝之策明攻取之謀詳詢衆庶以求厥中若謀不素定輕弱小敵軍人數舉舉而無庸所謂悅武無震古人之誡也魏志和洽傳奏諫興作臣咨言今作洛陽宮殿取白石之人鑽山索異石繄石求雲母口役之事莫過于此也書鈔一百六十引魏名臣奏奏論賜諡其諸襲爵守嗣無殊才異勳于國及未冠成人皆不應賜諡通典一百四奏明帝外祖母服哭敬侯夫人張帷幕端門外之左群臣位如朝皇帝黑介幘進賢冠皂服十五舉聲則罷通典八十一答詔問管寧寧有族人管貢為州吏與寧鄰比臣常使經營消息貢說寧常著皂帽布襦褲布裙隨時單復出入閨庭能自任杖不須扶持四時祠祭輒自力強改加衣服著絮巾故在遼東所有白布單衣親薦饌饋跪拜成禮寧少而喪母不識形象常特加觴泫然流涕又居宅離水七八十步夏時詣水中澡灑手足窺于園圃臣揆寧前後辭讓之意獨自以生長潛逸耆艾智衰是以棲遲每執謙退此寧志行所欲必全不為守高魏志管寧傳上書諫明帝奪士女以配戰士臣伏見詔書諸士女嫁非士者一切録奪以配戰士斯誠權時之宜然非大化之善者也臣請論之陛下天之子也百姓吏民亦陛下之子也禮賜君子與小人不同日所以殊貴賤也吏屬君子士為小人今奪彼以與此亦無以異于奪兄之妻妻弟也于父母之恩偏矣又詔書聽得以生口年紀顏色與妻相當者自代故富者則傾家盡産貧者舉假貸貰貴買生口以贖其妻縣官以配士為名而實內之掖庭其醜惡者乃出與士得婦者未必有歡心而失妻者必有憂色或窮或愁皆不得志夫君有天下而不得萬姓之歡心者鮮不危殆且軍師在外數千萬人一日之費非徒千金舉天下之賦以奉此役猶將不給況復有宮庭非員無録之女椒房母后之家賞賜橫興內外交引其費半軍昔漢武帝好神仙信方士掘地為海封土為山賴是時天下為一莫敢與爭者耳自衰亂以來四五十載馬不捨鞍士不釋甲每一交戰血流丹野創痍號痛之聲于今未已猶彊寇在疆圖危魏室陛下不兢兢業業念崇節約思所以安天下者而乃奢靡是務中尚方純作玩弄之物炫耀後園建承露之盤斯誠快耳目之觀然亦足以騁寇讎之心矣惜乎舍堯舜之節儉而為漢武之侈事臣竊為陛下不取也願陛下沛然下詔萬機之事有無益而有損者悉除去之以所除無益之費厚賜將士父母妻子之飢寒者問民所疾而除其所惡實倉廩繕甲兵恪恭以臨天下如是吳賊面縛蜀虜輿襯不待誅而自服太平之路可計日而待也陛下可無勞神思于海表軍師高枕戰士備員今群公皆結舌而臣所以不敢不獻瞽言者臣昔上要言散騎奏臣書以聽諫篇為善詔曰是也擢臣為太子舍人且臣作書譏為人臣不能諫諍今有可諫之事而臣不諫此為作書虛妄而不能言也臣年五十常恐至死無以報國是以投軀沒命冒昧以聞惟陛下裁察魏志明帝紀注引魏略太子舍人張茂乃上書諫
