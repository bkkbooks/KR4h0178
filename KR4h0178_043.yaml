body:
  text: 李康髑髏賦幽魂髣佛忽有人形文選謝惠連祭古冢文注遊山九吟序蓋人生天地之間也若流電之過戶牖輕塵之栖弱草藝文類聚六運命論夫治亂運也窮達命也貴賤時也故運之將隆必生聖明之君聖明之君必有忠賢之臣其所以相遇也不求而自合其所以相親也不介而自親唱之而必和謀之而必從道合玄同曲折合符得失不能疑其志讒構不能離其交然後得成功也其所以得然者豈徒人事哉授之者天也告之者神也成之者運也夫黃河清而聖人生里社鳴而聖人出群龍見而聖人用故伊尹有莘氏之媵臣也而阿衡于商太公渭濱之賤老也而尚父于周百里奚在虞而虞亡在秦而秦霸非不才于虞而才于秦也張良受黃石之符誦三略之説以遊于群雄其言也如以水投石莫之受也及其遭漢祖其言也如以石投水莫之逆也非張良之拙説于陳項而巧言于沛公也然則張良之言一也不識其所以合離合離之由神明之道也故彼四賢者名載于籙圖事應乎天人其可格之賢愚哉孔子曰清明在躬氣志如神嗜欲將至有開必先天降時雨山川出雲詩云惟嶽降神生甫及申帷申及甫惟周之翰運命之謂也豈惟興主亂亡者亦如之焉幽王之惑褎女也祅始于夏庭曹伯陽之獲公孫強也徵發于社宮叔孫豹之昵豎牛也禍成于庚宗吉凶成敗各以數至咸皆不求而自合不介而自親矣昔者聖人受命河洛曰以文命者七九而衰以武興者六八而謀及成王定鼎于郲鄏卜世三十卜年七百天所命也故自幽厲之間周道大壞二霸之後禮樂陵遲文薄之斃漸于靈景辨詐之偽成于七國酷烈之極積于亡秦文章之貴棄于漢祖雖仲尼至聖顏冉大賢揖讓于規矩之內誾誾于洙泗之上不能遏其端孟軻孫卿體二希聖從容正道不能維其末天下卒至于溺而不可援夫以仲尼之才也而器不周于魯衛以仲尼之辨也而言不行于定哀以仲尼之謙也而見忌于子西以仲尼之仁也而取讎于桓魋以仲尼之智也而屈厄于陳蔡以仲尼之行也而招毀于叔孫夫道足以濟天下而不得貴于人言足以經萬世而不見信于時行足以應神明而不能彌綸于俗應騁七十國而不一獲其主驅驟于蠻夏之域屈辱于公卿之門其不遇也如此及其孫子思希聖備體而未之至封已養高勢動人主其所遊歷諸侯莫不結駟而造門雖造門猶有不得賓者焉其徒子夏升堂而未入于室者也退老于家魏文侯師之西河之人肅然歸德比之于夫子而莫敢間其言故曰治亂運也窮達命也貴賤時也而後之君子區區于一主歎息于一朝屈原以之沈湘賈誼以之發憤不亦過乎然則聖人所以為聖者蓋在乎樂天知命矣故遇之而不怨居之而不疑也其身可抑而道不可屈其位可排而名不可奪譬如水也通之斯為川焉塞之斯為淵焉升之于雲則雨施沈之于地則土潤體清以洗物不亂于濁受濁以濟物不傷于清是以聖人處窮達如一也夫忠直之忤于主獨立之負于俗理勢然也故木秀于林風必摧之堆出于岸流必湍之行高于人衆必非之前監不遠覆車繼軌然而志士仁人猶蹈之而弗悔操之而弗失何哉將以遂志而成名也求遂其志而冒風波于險塗求成其名而歷謗議于當時彼所以處之蓋有算矣子夏曰死生有命富貴在天故道之將行也命之將貴也則伊尹呂尚之興于商周百里子房之用于秦漢不求而自得不徼而自遇矣道之將廢也命之將賤也豈獨君子恥之而弗為乎蓋亦知為之而弗得矣凡希世苟合之士籧篨戚施之人俯仰尊貴之顏逶迆勢利之間意無是非讚之如流言無可否應之如響以窺看為精神以向背為變通勢之所集從之如歸市勢之所去棄之如脫遺其言曰名與身孰親也得與失孰賢也榮與辱孰珍也故遂潔其衣服矜其車徒昌其貨賄淫其聲色脈脈然自以為得矣蓋見龍逢比干之亡其身而不惟飛廉惡來之滅其族也蓋知伍子胥之屬鏤于吳而不戒費無忌之誅夷于楚也蓋譏汲黯之白首于主爵而不懲張湯牛車之禍也蓋笑蕭望之跋躓于前而不懼石顯之絞縊于後也故夫達者之算也亦各有盡矣曰凡人之所以奔競于富貴何為者哉若夫立德必須貴乎則幽厲之為天子不如仲尼之為陪臣也必須勢乎則王莽董賢之為三公不如楊雄仲舒之闃其門也必須富乎則齊景之千駟不如顏回原憲之約其身也其為實乎則執杓而飲河者不過滿腹棄室而灑雨者不過濡身過此以往弗能受也其為名乎則善惡書于史册毀譽流于千載賞罰懸于天道吉凶灼乎鬼神固可畏也將以娛耳目樂心意乎譬命駕而遊五都之市則天下之貨畢陳矣褰裳而涉汶陽之丘則天下之稼如雲矣椎紒而守敖庾海陵之倉則山坻之積在前矣扱衽而登鍾山藍田之上則夜光璵璠之珍可觀矣夫如是也為物甚衆為已甚寡不愛其身而嗇其神風驚塵起散而不止六疾待其前五刑隨其後利害生其左攻奪出其右而自以為見身名之親疏分榮辱之客主哉天地之大德曰生聖人之大寶曰位何以守位曰仁何以正人曰義故古之王者蓋以一人治天下不以天下奉一人也古之仕者蓋以官行其義不以利冒其官也古之君子蓋恥得之而弗能治也不恥能治而弗得也原乎天人之性核乎邪正之分權乎禍福之門終乎榮辱之算其昭然矣故君子舍彼取此若夫出處不違其時默語不失其人天動星回而辰極猶居其所璣旋輪轉而衡軸猶執其中既明且哲以保其身貽厥孫謀以燕翼子者昔吾先友嘗從事于斯矣文選藝文類聚二十一上書諫明帝臣聞古之直士盡言于國不避死亡故周昌比高祖于桀紂劉輔譬趙后于人婢天生忠直雖白刃沸湯往而不顧者誠為時主愛惜天下也建安以來野戰死亡或門殫戶盡雖有存者遺孤老弱若今宮室狹小當廣大之猶宜隨時不妨農務況乃作無益之物黃龍鳳皇九龍承露盤土山淵池此皆聖明之所不興也其功參倍于殿舍三公九卿侍中尚書天下至德皆知非道而不敢言者以陛下春秋方剛心畏雷霆今陛下既尊群臣顯以冠冕被以文繡載以華輿所以異于小人而使穿方舉土面目垢黑沾體塗足衣冠了鳥毀國之光以崇無益甚非謂也孔子曰君使臣以禮臣事君以忠無忠無禮國何以立故有君不君臣不臣上下不通心懷鬱結使陰陽不和災害屢降凶惡之徒因間而起誰當為陛下盡言事者乎又誰當千萬乘以死為戲乎臣知言出必死而臣自比于牛之一毛生既無益死亦何損秉筆流涕心與世辭臣有八子臣死之後纍陛下矣魏志明帝紀注御覽四百五十三並引魏略以武帝配天議昔后稷以功配天漢出自堯不以堯配天明不紹也且舜已越數代武皇肇創洪業宜以配天以先后配地通典四十二又四十五典略儒宗傳序從初平之元至建安之末天下分崩人懷苟且綱紀既衰儒道尤甚至黃初元年之後新主乃復始掃除太學之夾炭補舊石碑之缺壞備博士之員録依漢甲乙以考課申告州郡有欲學者皆遣詣太學太學始開有子弟數百人至太和青龍中中外多事人懷避就雖性非解學多求詣太學太學諸生有千數而諸博士率皆粗疏無以教弟子弟子本亦避役竟無能習學冬來春去歲歲如是又雖有精者而臺閣舉格太高加不念統其大義而問字指墨法點注之間百人同試度者未十是以志學之士遂復陵遲而末求浮虛者各競逐也正始中有詔議圜丘普延學士是時郎官及司徒領吏二萬餘人雖復分布見在京師者尚且萬人而應書與議者略無幾人又是時朝堂公卿以下四百餘人其能操筆者未有十人多皆相從飽食而退嗟夫學業沈隕乃至于此是以私心常區區貴乎數公者各處荒亂之際而能守志彌敦者也魏志王肅傳注儒宗傳論學之資于人也其猶藍之染于素乎故雖仲尼猶曰吾非生而知之者況凡品哉且世人所以不貴學者必見夫有誦詩三百而不能專對于四方故也余以為是則下科耳不當顧中庸以上材質適等而加之以文乎今此數賢者略余之所識也檢其事能誠不多也但以守學不輟乃上為帝皇所嘉下為國家名儒非繇學乎繇是觀之學其胡可以已哉魏志王肅傳注武諸王傳論諺言貧不學儉卑不學恭非人性分也勢使然耳此實然之勢信不虛矣假令大祖防遏植等在于疇昔此賢之心何緣有窺望乎彰之挾恨尚無所至至于植者乃令楊修以倚注遇害丁儀以希意族滅哀夫余每覽植之華采思若有神以此推之太祖之動心亦良有以也魏志任城陳蕭王傳評注王繁阮陳路傳論尋省往者魯連鄒陽之徒援譬引類以解締結誠彼時文辨之雋也今覽王繁阮陳路諸人前後文旨亦何昔不若哉其所以不論者時世異耳余又竊怪其不甚見用以問大鴻臚卿韋仲將仲將云仲宣傷于肥戇休伯都無格檢元瑜病于體弱孔璋實自粗疏文尉性頗忿鷙如是彼為非徒以脂燭自煎麋也其不高蹈蓋有由矣然君子不責備于一人譬之朱漆雖無楨幹其為光澤亦壯觀也魏志王粲傳注佞幸秦郎孔桂傳論為上者不虛授處下者不虛受然後外無伐檀之歎內無尸素之刺雍熙之美者太平之律顯矣而佞幸之徒但姑息人主至乃無德而榮無功而祿如是焉得不使中正日朘傾邪滋多乎以武皇帝之慎賞明皇帝之持法而猶有若此等人而況下斯者乎魏志明帝紀注許攸婁圭傳論古人有言曰得鳥者羅之一目也然張一目之羅終不得鳥矣鳥能遠飛遠飛者六翮之力也然無衆毛之助則飛不遠矣以此推之大魏之作雖有功臣亦未必非茲輩胥附之由也魏志崔琰傳注勇俠傳論昔孔子歎顏回以為三月不違仁者蓋觀其心耳孰如孫祝菜色于市里顛倒于牢獄據有實事哉且夫濮陽周氏不敢匿迹魯之朱家不問情實是何也懼禍之及耳心不安也而太史公猶貴其竟脫季布豈若二賢厥義多乎今故遠收孫祝而近録楊鮑既不欲其泯滅且敦薄俗至于鮑出不染禮教心痛意發起于自然迹雖在遍戶與篤烈君子何以異乎若夫楊阿若少稱任俠長遂蹈義自西徂東摧討逆節可謂勇力而有仁者也魏志閻溫傳注徐福等傳論世稱君子之德其猶龍乎蓋以其善變也昔長安市儈有劉仲始者一為市吏所辱乃感激踏其尺折之遂行學問經明行修流名海內後以有道徵不肯就衆人歸其高余以為前世偶有此耳而今徐嚴復參之若皆非似龍之志也其何能至于此哉李推至道張工度主韓見識異黃能拔萃各著根于石上而垂陰乎千里亦未為易也遊翁慷慨展布腹心全軀保郡見延帝王又放陸生優遊宴戲亦一實也梁趙及裴雖張楊不足至于檢已老而益明亦難能也魏志裴潛傳注外夷傳論俗以為營廷之魚不知江海之大浮遊之物不知四時之氣是何也以其所在者小與其生之短也余今泛覽外夷大秦諸國猶尚曠若發蒙矣況夫鄒衍之所推出大易太玄之所測度乎徒限處牛蹄之涔又無彭祖之年無緣託景風以迅遊載騕裊以遐觀但勞眺乎三辰而飛思乎八荒耳魏志烏桓鮮卑東夷傳注張昭傳論余曩聞劉荊州嘗自作書欲與孫伯符以示禰正平正平蚩之言如是為欲使孫策帳下兒讀之邪將使張子布見乎如正平言以為子布之才高乎雖然猶自蘊藉典雅不可謂之無筆迹也加聞吳中稱謂之仲父如此其人信一時之良幹恨其不于嵩嶽等資而乃播殖于會稽吳志張昭傳注薦朱儉表蓋聞虞書非俊乂無以光帝載西伯非髦士無以開王業是故高世之主必廣登命之禮有為之君務通賢者之路所以成大治也竊見同郡朱儉字文信天真清亮雅性忠篤純粹足以激清源美行足以廣風俗當仁不讓見得思義疏達之才強記博聞飛辭抗論駱驛奇逸誠當世之俊異一時之秀出也如得毗佐銓衡翼亮右曹濟濟之觀足用華國藝文類聚五十三誡子書夫道也者易尋而難窮易知而難行也故京房之徒考步吉凶之變而不能自見其禍更為姚平所誡此道之難知也省爾之才不及于房而吾之言過于平矣昔正考父三命滋恭晏平仲久而敬之曾顏之徒有若無實若虛也況爾析薪之智欲彈射世俗身為謗先怨禍並集使吾懷朝父之憂為范武子所歎亦非汝之美也若朝益暮習先人後已恂恂如也則吾聞音而識其曲食旨而知其甘永終吾餘年矣復何恨哉古人有言思不出其位爾其念之爾其念之藝文類聚二十三上疏諫畜鹿臣深思陛下所以不早取此鹿誠欲使極蕃息然後大取以為軍國之用也然臣竊以為畜鹿但有日耗終無得多也御覽九百六引魏名臣奏案魏志高柔傳注引魏名臣奏以此疏為高柔所上奏事今年麥苗雖好臨熟多雨而悉復偃壞小麥略盡惟穬麥大麥頗得半收耳藝文類聚八十五檄告公孫淵昔楚鄭列國而鄭伯猶肉袒牽羊而迎之孤為王人位則上公而建等欲孤解圍退舍豈楚鄭之謂邪二人老耄必傳言失旨已相為斬之若意有未已可更遣年少有明決者來晉書宣帝紀案魏志鍾會傳注松從征遼東宣王命作檄及破賊作露布忌月設樂議今因宜改之際還修舊則元首建寅于制為便宋書禮志一劉肇宜過正一日乃朝賀大會明令天下知崩亡之日不朝也宋書禮志一奏論選舉天下之任非吏部尚書所能獨辦令長以下可專付吏部守以上八座舉御覽二百十四引魏名臣奏奏請令尚書郎奏事處當漢時公卿皆奏事選尚書郎試然後得為之其在職自齎所發書詣天子前發省便處當事輕重口自決定或天子難問據案處正乃見郎之割斷材伎魏則不然然尚書郎皆天下之選材伎鋒出亦欲騁其能于萬乘之前宜如故事令郎口自奏事自處當御覽二百十五引魏名臣奏奏事其山居林澤有火耕畬種而平地平陸雖有往古耒耜區種之法就其收者適可蔬食不足實也御覽五十六引魏名臣奏難夏侯太初肉刑論且肉刑之作乃自上古書載五刑有服又曰天罰有罪而五刑五用哉割劓之屬也周官之制亦著五刑歷三代經至治周公行之孔子不議也今諸虐者唯以斷截為虐豈不輕于死亡耶云妖逆是翦以除大災此明治世之不能去就矣夫殺之與刑皆非天地自然之理不得已而用之也傷人者不改則刖劓可以改之何為疾其不改便當陷之于死地乎妖逆者懲之而已豈必除之耶刑一人而戒千萬人何取一人之能改哉盜斷其足淫而宮之雖欲不改復安所施而全其命懲其心何傷于大德今有弱子罪當大辟問其慈父必請以肉刑代之矣慈父猶施之于弱子況君加之百姓哉且蝮蛇螫手則壯士斷其腕系蹄在足則猛獸絶其蹯蓋毀支而全身者夫一人哀泣一堂為之不樂此言殺戮之不當也何事于肉刑之間哉赭衣滿道有鼻者醜當此時也長城之役死者相繼六經之儒填谷滿坑何恤于鼻之好醜乎此吾子故猶哀刑而不悼死也通典一百六十八又難易曰履校滅趾無咎仲尼解曰小懲而大戒此小人之福也滅趾謂去足為小懲明矣通典一百六十八又難暴之取死亦有由來非自然也傷人不改亦治道未洽而刑輕不足以大戒若刑之與殺俱非自然而刑輕于殺何云殘酷哉夫刖趾不可報尸誠然髡輸固不足以償傷傷人一寸而斷其支體為罪已重夷人之面截其手足以髡輸償之不亦輕乎但慮其重不惟其輕不其偏哉孔氏之議恐非足為雅論也通典一百六十八
