body:
  text: 魏卷五十一嵇康答釋難宅無吉凶攝生論夫先王垂訓開制中人言之所樹賢愚不違事之所由古今不忒所以致教也若夫機神玄妙不言之化自非至精孰能與之故善求者觀物於微觸類而長不以己為度也按如所論甚有則愚甚無則誕今使小有便得不愚耶了無乃得離之也若小有則不愚吾未知小有其限所止也若了無乃得離之則甚無者無為謂之誕也又曰私神立則公神廢然則唯惡夫私之害公邪之傷正不為無神也向墨子立公神之情狀不甚有之說使董生託正忌之塗執不甚無之言二賢雅趣可得合而一兩無不失耶今之所辨欲求實有實無以明自然不詭持論有工拙議教有精粗也尋雅論之指謂河洛不誠借助鬼神故為之宗廟以神其本不答子貢以求其然則足下得不為託心無神鬼齊契於董生耶而復顧古人之言懼無鬼神之弊貌與情乖立從公廢私之論欲彌縫兩端使不愚不誕兩譏董墨謂其中央可得而居恐辭辨雖巧難可俱通又非所望於核論也故吾謂古人合德天地動應自然經世所立莫不有徵豈匿設宗廟以期後嗣空借鬼神以誷將來耶足下將謂吾與墨不殊今不辭同有鬼但不偏守一區明所當然使人鬼同謀幽明並濟亦所以求衷所以為異耳論曰聖人鈞疾而禱不同故於臣弟則周公請命親其身則尼父不禱所謂禮為情貌者也難曰若於臣子則宜修情貌未聞舜禹有請君父也若於身則否未聞武王閼禱之命也湯禱桑林復為君父耶推此而言宜以禱為益則湯周用之禱無所行則孔子不請此其殊塗同歸隨時之義也又曰時日先王所以誡不怠而勸從事足下前論云時日非盛王所有故吾問惟戊之事今不答惟戊果是非而曰所以誡勸此復兩許之言也縱令惟戊盡於誡勸尋論按名當言有日耶無日耶又曰俗之時日順妖忌而逆事理按此言以惡夫妖逆故去之未為盛王了無日也夫時日用於盛世而來代襲以妖惑猶先王制雅樂而季世繼以淫哇也今憤妖忌因欲去日何異惡鄭衛而滅韶武耶不思其本見其所弊輒疾而欲除得不為遇噎溺而遷怒耶足下既已善卜矣乾坤有六子支幹有剛柔統以陰陽錯以五行故吉凶可得而時日是其所由故古人順之焉有善其流而惡其源者吾未知其可也至於河洛宗廟則謂匿而不信類禡祈禱則謂僞而無實時日剛柔則謂假以為勸此聖人專造虛詐以欺天下匹夫之諒且猶恥之今議古人得無不可乃爾也凡此數事猶陷於誣妄冡宅之見伐不亦宜乎前論曰若許負之相條侯英布之黥而後王一欄之羊賓至而有死者皆性命之自然也今論曰隆準龍顏公侯之相不可假求此為相命自有一定相所當成人不能壞相所當敗智不能救陷當生於衆險雖可懼而無患抑當貴於廝養雖辱賤而必貴薄姬之困而後昌皆不可為不可求而暗自遇之全相之論必當若此乃一途得通本論不滯耳吾適以信順為難則便曰信順者成命之理必若所言命以信順成亦以不信順敗矣若命之成敗取足於信順故是吾前難壽夭成於愚智耳安得有性命自然也若信順果成相命請問亞夫由幾惡而得餓英布修何德以致王生羊積幾善以獲存死者負何罪以逢災耶既持相命復惜信順欲飾二論使得並通恐似矛楯無俱立之勢非辨言所能兩濟也論曰論相命當辨有無無疑衆寡苟一人有命則長平皆一矣又曰知命者不立巖牆之下吾謂知命者當無所不順乃畏巖牆知命有在立之何懼若巖牆果能為害不擇命之長短則知與不知立之有禍避之無患也則何知白起非長平之巖牆而云千萬皆命無疑衆寡耶若謂長平雖同於巖牆故是相命宜值之則命所當至期於必然不立之誡何所施耶若此果有相邪無相也此復吾之所疑也又曰長平不得係於命將係宅耶則唐虞之世宅何同吉吾本疑前論無非相命故借長平卒之異同以難相命之必然廣求異端以明事理豈必吉宅以質之耶又前論已明吉宅之不獨行今空抑此言欲以誰難又曰長平之卒宅何同凶苟泰同足以致則足下嫌多不愚於吾也適至守相便言千萬皆一校以至理負情之對於是乎見既虛立吉宅冀而無獲欲救相命而情以難顯故如此可謂善戰矣論曰卜之盡理所以成相命者也此復吾所疑矣前論以相命為主而尋益以信順此一離婁也今復以卜成之成命之具三而猶不知相命竟須幾箇為足也若唯信順於理尚少何以謂成命之理耶若是相濟則卜何所補於卜復曰成命耶請問卜之成命使單豹行卜知將有虎災則隱居深宮嚴備自衛若虎猶及之為卜無所益也若得無恙為相敗于卜何云成相耶若謂豹卜而得脫本無厄虎相也卜為妄語急在蠲除若謂凡有命皆當由卜乃成則世有終身不卜者皆失相夭命耶若謂卜亦相也然則卜是相中一物也安得云以成相耶若此不知卜筮故當與相命通相成為一不當各自行也論曰無故而居可占猶龍顏可相也設為吉宅而後居以幸福報無異假顏準而望公侯也然則人實徵宅非宅制人也按如所言無故而居可占者必謂當吉之人瞑目而前推遇任命以暗營宅自然遇吉也然則豈獨吉人凡有命者皆可以暗動而自得正是前論命有自然不可增減者也驟以可為之信順卜筮成不可增減之命矣奚獨禁可為之宅不盡相命唯有暗作乃是真宅耶若瞑目可以得相開目亦無所加也智者愈當識之周公營居何故躊躇於澗瀍問龜筮而食洛耶若龜筮果有助於為宅則知暗作可有不盡善之理矣苟暗作有不盡則不暗豈非求之術耶若必謂龜筮不能善相於暗往想亦不失相於考卜也則卜與不卜為與不為皆期於自得自得苟全則善占者所遇當識何得無故則能知有故則不知也今疾夫設為比之假顏貴夫無故謂之貞宅然貞宅之與設為其形不異同以功成俱是吉宅也但無故為設貞有故為設宅貞宅授吉於暗遇設為減福於用知爾然則吉凶之形果自有理可以有故而得故前論有占成之驗也然則占成之形何以言之必遠近得宜堂廉有制坦然殊觀可得而別利人以福故謂之吉害人以禍故謂之凶但公侯之相暗與吉會爾然則宅與性命雖各一物猶農夫良田合而成功也設公侯遷後方樂其吉而往居之吉宅豈選賢而後納擇善而後福哉苟宅無情於擇賢不惜吉於設為則屋不辭人田不讓耕其所以為吉凶薄厚何得不均前吉者不求而遇後聞吉而往同於居吉宅而有求與不求矣何言誕而不可為也由是言之非從人而徵宅亦成人明矣若挾顏狀則英布黥相不減其貴隆準見劓不減公侯是知顏準是公侯之摽識非所以為公侯也故標識者非公侯質也吉宅字與吉者宅實也善宅無吉徵而字吉宅以徵假見難可也若以非質之標識難有徵之吉宅此吾所不敢許也子陽無質而鏤其掌即知當字長耳巨君篡宅而運其魁既偏恃之禍非所以為難也至公侯之命稟之自然不可陶易宅是外物方圓由人有可為之理猶西施之潔不可為而西施之服可為也黼黻芳華所以助吉宅家所以成相故世無作人方而有卜宅說是以知人宅不可相喻也安得以不可作之人絶可作之宅耶至刑德皆同此自一家非本論占成居而得吉凶者也且先了此乃議其餘論曰獵夫從林所遇或禽或虎虎凶禽吉卜者筮而知之非能為安知所言地之善惡猶禽吉虎凶獵夫先筮故擇而從禽如擇居故避凶而從吉吉地雖不可為而可擇處猶禽虎雖不可變而可擇從苟卜筮所以成相虎可卜而地可擇何為半信而半不信耶又云地之吉凶有若禽虎不得宮姓則無害商則為災也案此為怪所不解而以為難似未察宮商之理也雖此地之吉而或長於養宮短於育商猶良田雖美而稼有所宜何以言之人姓有五音五行有相生故同姓不昏惡不殖也人誠有之地亦宜然故古人仰準陰陽俯協剛柔中識性理使三才相善同會於大通所以窮理而盡物宜也夫同聲相應同氣相求自然之分也音不和則比絃不動聲同則雖遠相應此事雖著而猶莫或識苟有五音各有宜土氣有相生則人宅猶禽虎之類豈可見宮商之不同而謂之地無吉凶也論曰天下或有能說之者子而不言誰與能之難曰足下前論以云有能占成居者此即能說之矣故吾曰天下當有能者今不求之於前論而復責吾難之於能言亦當知冡宅有吉凶也又曰藥之已病為一也實而宅之吉凶為一也誣既曰成居可占而復曰誣耶藥之已病其驗交見故君子信之宅之吉凶其報賒遙故君子疑之今若以交賒為虛實則恐所以求物之地鮮矣吾見溝澮不疑江海之大覩丘陵則知有泰山之高也若守藥則棄宅見交則非賒是海人所以終身無山山客白首無大魚也論曰智之所知未若所不知者衆此較通世之常滯然智所不知不可以妄求也難曰智所不知相必亦未知也今暗許便多於所知者何耶必生於本謂之無而強以驗有也強有之驗將不盈於數矣而并所成驗者謂之多於所知耳苟知然果有未還之理不因見求隱尋端究緒由而得卯未夫尋端之理猶獵師以得禽也縱使尋迹時有無獲然得禽曷嘗不由之哉今吉凶不先定則謂不可求何異獸不期則不敢舉足坐守無根也由此而言探賾索隱何謂為妄稽荀録一首亡一首亡太師針浩浩太素陽曜陰凝二儀陶化人倫肇興厥初冥昧不慮不營欲以物開患以事成犯機觸害智不救生宗長歸仁自然之情故君道自然必託賢明茫茫在昔罔或不寧赫胥既往紹以皇羲默靜無文大朴未虧萬物熙熙不夭不離爰及唐虞猶篤其緒體資易簡應天順矩絺褐其裳土木其宇物或失性懼若在豫疇咨熙載終禪舜禹夫統之者勞仰之者逸至人重身棄而不恤故子州稱疚石戶乘桴許由鞠躬辭長九州先王仁愛愍世憂時哀萬物之將頽然後蒞之下逮德衰大道沉淪智惠日用漸私其親懼物乖離攘臂立仁利巧愈競繁禮屢陳刑教爭施夭性喪真季世陵遲繼體承資憑尊恃勢不友不師宰割天下以奉其私故君位益侈臣路生心竭智謀國不吝灰沉賞罰雖存莫勸莫禁若乃驕盈肆志阻兵擅權矜威縱虐禍崇丘山刑本懲暴今以脅賢昔為天下今為一身下疾其上君猜其臣喪亂弘多國乃隕顛故殷辛不道首綴素旗周朝敗度彘人是謀楚靈極暴乾溪潰叛晉厲殘虐欒書作難主父棄禮鷇胎不宰秦皇荼毒禍流四海是以亡國繼踵古今相承醜彼摧滅而襲其亡徵初安若山後敗如崩臨刃振鋒悔何所增故居帝王者無曰我尊慢爾德音無曰我強肆于驕淫棄彼佞幸納此遌顏諛言順耳染德生患悠悠庶類我控我告唯賢是授何必親戚順乃造好民實胥效治亂之原豈無昌教穆穆天子思問其愆虛心導人允求讜言師臣司訓敢告在前家誡人無志非人也但君子用心所欲準行自當量其善者必擬議而後動若志之所之則口與心誓守死無二恥躬不逮期於必濟若心疲體解或牽於外物或纍於內欲不堪近患不忍小情則議於去就議於去就則二心交爭二心交爭則向所以見役之情勝矣或有中道而廢或有不成一匱而敗之以之守則不固以之攻則怯弱與之誓則多違與之謀則善泄臨樂則肆情處逸則極意故雖繁華熠耀無結秀之勳終年之勤無一旦之功斯君子所以歎息也若夫申胥之長吟夷齊之全潔展季之執信蘇武之守節可謂固矣故以無心守之安而體之若自然也乃是守志之盛者耳所居長吏但宜敬之而已矣不當極親密不宜數往往當有時其有衆人又不當獨在後又不當宿所以然者長吏喜問外事或時發舉則怨者謂人所說無以自免也宏行寡言慎備自守則怨責之路解矣其立身當清遠若有煩辱欲人之盡命託人之請求當謙言辭謝其素不預此輩事當相亮耳若有怨急心所不忍可外違拒密為濟之所以然者上遠宜適之幾中絶常人淫輩之求下全束修無玷之稱此又秉志之一隅也凡行事先自審其可若於宜宜行此事而人欲易之當說宜易之理若使彼語殊佳者勿羞折遂非也若其理不足而更以情求來守人雖復云云當堅執所守此又秉志之一隅也不須行小小束修之意氣若見窮乏而有可以賑濟者便見義而作若人從我有所求欲者先自思省若有所損廢多於今日所濟之義少則當權其輕重而拒之雖復守辱不已猶當絶之然大率人之告求皆彼無我有故來求我此為與之多也自不如此而為輕竭不忍面言強副小情未為有志也夫言語君子之機機動物應則是非之形著矣故不可不慎若於意不善了而本意欲言則當懼有不了之失且權忍之後視向不言此事無他不可則向言或有不可然則能不言全得其可矣且俗人傳吉遲傳凶疾又好議人之過闕此常人之議也坐中所言自非高議但是動靜消息小小異同但當高視不足和答也非義不言詳靜敬道豈非寡悔之謂人有相與變爭未知得失所在慎勿預也且默以觀之其是非行自可見或有小是不足是小非不是非至竟可不言以待之就有人問者猶當辭以不解近論議亦然若會酒坐見人爭語其形勢似欲轉盛便當無何舍去之此將鬭之兆也坐視必見曲直黨不能不有言有言必是在一人其不是者方自謂為直則謂曲我者有私於彼便怨惡之情生矣或便獲悖辱之言正坐視之大見是非而爭不了則仁而無武於義無可故當遠之也然大都爭訟者小人耳正復有是非共濟汗漫雖勝可足稱哉就不得遠取醉為佳若意中偶有所諱而彼必欲知者若守大不已或劫以鄙情不可憚此小輩而為所挽引以盡其言今正堅語不知不識方為有志耳自非知舊鄰比庶幾已下欲請呼者當辭以他故勿往也外榮華則少欲自非至急終無求欲上美也不須作小小卑恭當大謙裕不須作小小廉恥當全大讓若臨朝讓官臨義讓生若孔文舉求代兄死此忠臣烈士之節凡人自有公私慎勿強知人知彼知我知之則有忌於我今知而不言則便是不知矣若見竊語私議便舍起勿使忌人也或時逼迫強與我共說若其言邪險則當正色以道義正之何者君子不容僞薄之言故也一旦事敗便言某甲昔知吾事是以宜備之深也凡人私語無所不有宜預以為意見之而走者何哉或偶知其私事與同則可不同則彼恐事泄思害人以滅迹也非意所欽者而來戲調蚩笑人之闕者但莫應從小共轉至於不共而勿大冰矜趨以不言答之勢不得久行自止也自非所監臨相與無他宜適有壺榼之意束修之好此人道所通不須逆也過此以往自非通穆匹帛之饋車服之贈當深絶之何者常人皆薄義而重利今以自竭者必有為而作鬻貨徼歡施而求報其俗人之所甘願而君子之所大惡也又憒不須離摟強勸人酒不飲自已若人來勸己輒當為持之勿誚勿逆也見醉薰薰便止慎不當至困醉不能自裁也燈銘肅肅宵征造我友廬光燈吐輝華幔長舒家誡人無志非人也但君子用心所欲準行自當量其善者必擬議而後動若志之所之則口與心誓守死無二恥躬不逮期於必濟若心疲體解或牽於外物或纍於內欲不堪近患不忍小情則議於去就議於去就則二心交爭二心交爭則向所以見役之情勝矣或有中道而廢或有不成一匱而敗之以之守則不固以之攻則怯弱與之誓則多違與之謀則善泄臨樂則肆情處逸則極意故雖繁華熠耀無結秀之勳終年之勤無一旦之功斯君子所以歎息也若夫申胥之長吟夷齊之全潔展季之執信蘇武之守節可謂固矣故以無心守之安而體之若自然也乃是守志之盛者耳所居長吏但宜敬之而已矣不當極親密不宜數往往當有時其有衆人又不當獨在後又不當宿所以然者長吏喜問外事或時發舉則怨者謂人所說無以自免也宏行寡言慎備自守則怨責之路解矣其立身當清遠若有煩辱欲人之盡命託人之請求當謙言辭謝其素不預此輩事當相亮耳若有怨急心所不忍可外違拒密為濟之所以然者上遠宜適之幾中絶常人淫輩之求下全束修無玷之稱此又秉志之一隅也凡行事先自審其可若於宜宜行此事而人欲易之當說宜易之理若使彼語殊佳者勿羞折遂非也若其理不足而更以情求來守人雖復云云當堅執所守此又秉志之一隅也不須行小小束修之意氣若見窮乏而有可以賑濟者便見義而作若人從我有所求欲者先自思省若有所損廢多於今日所濟之義少則當權其輕重而拒之雖復守辱不已猶當絶之然大率人之告求皆彼無我有故來求我此為與之多也自不如此而為輕竭不忍面言強副小情未為有志也夫言語君子之機機動物應則是非之形著矣故不可不慎若於意不善了而本意欲言則當懼有不了之失且權忍之後視向不言此事無他不可則向言或有不可然則能不言全得其可矣且俗人傳吉遲傳凶疾又好議人之過闕此常人之議也坐中所言自非高議但是動靜消息小小異同但當高視不足和答也非義不言詳靜敬道豈非寡悔之謂人有相與變爭未知得失所在慎勿預也且默以觀之其是非行自可見或有小是不足是小非不是非至竟可不言以待之就有人問者猶當辭以不解近論議亦然若會酒坐見人爭語其形勢似欲轉盛便當無何舍去之此將鬭之兆也坐視必見曲直黨不能不有言有言必是在一人其不是者方自謂為直則謂曲我者有私於彼便怨惡之情生矣或便獲悖辱之言正坐視之大見是非而爭不了則仁而無武於義無可故當遠之也然大都爭訟者小人耳正復有是非共濟汗漫雖勝可足稱哉就不得遠取醉為佳若意中偶有所諱而彼必欲知者若守大不已或劫