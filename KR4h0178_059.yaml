body:
  text: 蜀卷五十九諸葛亮答關羽書孟起兼資文武雄烈過人一世之傑黥彭之徒當與益德並驅爭先猶未及髯之絶倫逸群也三國志卷三十六蜀志關羽傳又與孫權書所送白眊薄少重見辭謝益以增慚太平御覽卷三百四十一與兄瑾言子喬書喬本當還成都今諸將子弟皆得傳運思惟宜同榮辱今使喬督五六百兵與諸子弟傳於谷中蜀志本傳裴松之注兄嫌白帝兵非精練到所督則先帝帳下白眊西方上兵也嫌其少也當復部分江州兵以廣益之太平御覽卷三百四十一前趙子龍退軍燒壞赤崖以北閣道緣谷一百餘里其閣梁一頭入山腹其一頭立柱於水中今水大而急不得安柱此其窮極不可彊也水經注卷二十七沔水注頃大水暴出赤崖以南橋閣悉壞時趙子龍與鄧伯苗一戍赤崖屯田一戍赤崖口但得緣崖與伯苗相聞而已同前有綏陽小谷雖山崖絶重溪水縱橫難用行軍昔𨙀邏候往來要道通人今使前軍斫治此道以向陳倉足以扳連賊勢使不得分兵東行者也水經注卷十七渭水注殷德嗣秀才今之僑肸者也太平御覽卷一千孝起忠純之性老而益篤及其贊述東西歡樂和合有可貴者三國志卷三十九蜀志陳震傳既受東朝厚遇依依於子弟又子喬良器為之惻愴見其所與亮器物感用流涕三國志卷五十一吳志孫翊傳瞻今已八歲聰慧可愛嫌其早成恐不為重器耳蜀志本傳答司馬懿書使杜子緒宣意於公威也三國志卷十五魏志溫恢傳裴注引魏略與陸遜書家兄年老而恪性疏今使典主糧穀糧穀軍之要最僕雖在遠竊用不安足下特為啓至尊轉之三國志卷六十四吳志諸葛恪傳裴注引江表傳與杜微書服聞德行饑渴歷時清濁異流無緣咨覯王元泰李伯仁王文儀楊季休丁君幹李永南兄弟文仲寶等每歎高志未見如舊猥以空虛統領貴州德薄任重慘慘憂慮朝廷主公今年始十八天資仁敏愛德下士天下之人思慕漢室欲與君因天順民輔此明主以隆季興之功著勳於竹帛也以謂賢愚不相為謀故自割絶守勞而已不圖自屈也三國志卷四十二蜀志杜微傳答杜微書曹丕纂弒自立為帝是猶土龍芻狗之有名也欲與群賢因其邪僞以正道滅之怪君未有相誨便欲求還於山野丕又大興勞役以向吳楚今因丕多務且以閉境勤農育養民物並治甲兵以待其挫然後伐之可使兵不戰民不勞而天下定也君但當以德輔時耳不責君軍事何為汲汲欲求去乎同前與孟達書往年南征歲末乃還適與李鴻會於漢陽承知消息慨然永嘆以存足下平素之志豈徒空託名榮貴為乖離乎嗚呼孟子斯實劉封侵陵足下以傷先帝待士之義又鴻道王沖造作虛語云足下量度吾心不受沖說尋表明之言追平生之好依依東望故遣有書三國志卷四十一蜀志費詩傳答李嚴書吾與足下相知久矣可不復相解足下方誨以光國戒之以勿拘之道是以未得默已吾本東方下士誤用於先帝位極人臣祿賜百億今討賊未效知己未答而方寵齊晉坐自貴大非其義也若滅魏斬睿帝還故居與諸子並升雖十命可受況於九耶三國志卷四十蜀志李嚴傳裴注引諸葛亮集與張裔書君昔在陌下營壞吾之用心食不知味後流迸南海相為悲歎寢不安席及其來還委付大任同獎王室自以為與君古之石交也石交之道舉讎以相益割骨肉以相明猶不相謝也況吾但委意於元儉而君不能忍耶三國志卷四十一蜀志楊洪傳與張裔蔣琬書姜伯約忠勤時事思慮精密考其所有永南季常諸人不如也其人涼州上士也三國志卷四十四蜀志姜維傳與蔣琬董允書孝起前臨至吳為吾說正方腹中有鱗甲鄉黨以為不可近吾以為鱗甲者但不當犯之耳不圖復有蘇張之事出於不意可使孝起知之三國志卷三十九蜀志陳震傳與步騭書與步騭書僕前軍在五丈原原在武功西十里馬冢在武功東十餘里有高勢攻之不便是以留耳水經注卷十八渭水注師徒遠涉帖師徒遠涉道里甚艱自及褒斜幸皆無恙使還馳此不復旦太平御覽稱姚胄教稱姚胄教忠益者莫大於進人進人者各務其所尚今姚掾並存剛柔以廣文武之用可謂博雅矣願諸掾各希此事以屬其望三國志卷四十五蜀志楊戲傳注引誡外生書夫志當存高遠慕先賢絶情欲棄凝滯使庶幾之志揭然有所存惻然有所感忍屈伸去細碎廣咨問除嫌吝雖有淹留何損於美趣何患於不濟若志不彊毅意不慷慨徒碌碌滯於俗默默束於情永竄伏於凡庸不免於下流矣太平御覽卷四百五十九誡子書夫君子之行靜以修身儉以養德非淡薄無以明志非寧靜無以致遠夫學須靜也才須學也非學無以廣才非靜無以成學慆慢則不能研精險躁則不能治性年與時馳意與日去遂成枯落多不接世悲守窮廬將復何及太平御覽卷四百五十九夫酒之設合禮致情適體歸性禮終而退此和之至也主意未殫賓有餘倦可以至醉無致於亂太平御覽卷四百九十七論交勢利之交難以經遠士之相知溫不增華寒不改葉能貫四時而不衰歷險夷而益固太平御覽卷四百六引要覽正議昔在項羽起不由德雖處華夏秉帝者之勢卒就湯鑊為後永戒魏不審鑒今次之矣免身為幸刑在子孫而二三子各以耆艾之齒承僞指而進書有若崇竦稱莽之功亦將逼於元禍苟免者耶昔世祖之創跡舊基奮羸卒數千摧莽彊旅四十餘萬於昆陽之郊夫據道討淫不在衆寡及至孟德以其譎勝之力舉數十萬之師救張郃於陽平勢窮慮悔僅能自脫辱其鋒鋭之衆遂喪漢中之地深知神器不可妄獲旋還未至感毒而死子桓淫逸繼之以纂縱使二三子多逞蘇張詭靡之說奉進歡兜滔天之辭欲以誣毀唐帝諷解禹稷所謂徒喪文藻煩勞翰墨者矣夫大人君子之所不為也又軍誡曰萬人必死橫行天下昔軒轅氏整卒數萬制四方定海內況以數十萬之師據正道而臨有罪有可得而干擬者哉蜀志本傳裴注引諸葛亮集算計今荊州非少人也而著籍者寡平居發調則人心不悅可語鎮南令國中凡有游戶者皆使自實因録以益衆可也通典一百四十八御覽二百九十九今上縣之戰更在賊門戰地平如案書鈔一百五十七兵要枝葉強大比居同勢各結朋黨競進憸人有此不去是謂敗徵同前人之忠也猶魚之有淵魚失水則死人失忠則凶故良將守之志立而名揚太平御覽卷二百七十三不愛尺璧而愛寸陰者時難遭而易失也故良將之趨時也衣不解帶足不躡地同前責之而不驕委之而不專扶之而不隱免之而不懼故良將之動也猶璧之不朽同前良將之為政也使人擇之不自舉使法量功不自度故能者不可蔽不能者不可飾妄譽者不能進也同前軍已近敵羅落常平明以先發絶軍前十里內各案左右下道亦十里之內數里之外五人為部人持一白幡登高外向明看隱蔽之處軍至轉尋高而前第一見賊轉語後第二第一詣主者白之凡候見賊百人以下但舉幡指百人以上便舉幡大呼主者遣疾馬往視察之太平御覽卷三百三十一凡軍行營壘先使腹心及鄉導前覘審知各令候吏先行定得營地壁立軍分數立四表候視然後移營又先使候騎前行持五色旗見溝坑揭黃衢路揭白水澗揭黑林藪揭青野火揭赤以本鼓應之立旗鼓令相聞見若渡水踰山深邃林藪精驍勇騎投搜數里無聲四周絶跡高山樹頂令人遠視精兵四向要處防禦然後分兵前後以為鎮拓乃令輜重老小次步後馬切在整肅防敵至人馬無聲不失行列險地邪徑亦以部曲鱗次或須環回旋轉以後為前以左為右行則魚貫立則雁行到前止處游騎精鋭四向散列而立各依本方下營一人一步隨師多少咸表十二辰豎立旗長二丈八尺審子午卯酉地勿令邪僻以朱雀旗豎午地白虎旗豎酉地玄武旗豎子地青龍旗登卯地招搖旗豎中央其樵牧飲食不得出表外也太平御覽卷三百三十一兵法山陵之戰不仰其高水上之戰不逆其流草上之戰不涉其深平地之戰不逆其虛此兵之利也故戰鬭之利唯氣其形也軍有七禁一曰輕二曰慢三曰盜四曰欺五曰背六曰亂七曰誤此治軍之禁也若朝會不到聞鼓不行乘寬自留回避務止初近而後遠喚名而不應軍甲不具兵器不備此謂輕軍有此者斬之受令不傳傳之不審以惑吏士金鼓不聞旌旗不覩此謂慢軍有此者斬之食不廩糧軍不部兵賦賜不均阿私所親取非其物借貸不還奪人頭首以獲功名此謂盜軍有此者斬之若變易姓名衣服不鮮金鼓不具兵刃不磨器仗不堅矢不著羽弓弩無絃主者吏士法令不從此謂欺軍有此者斬之聞鼓不行叩金不止按旗不伏舉旗不起指麾不隨避前在後縱發亂行折兵弩之勢卻退不鬭或左或右扶傷舉死因託歸還此謂背軍有此者斬之出軍行將士卒爭先紛紛擾擾軍騎相連咽塞道路後不得前呼喚喧譁無所聽聞失行亂次兵刃中傷長將不理上下縱橫此謂亂軍有此者斬之屯營所止問其鄉里親近相隨共食相保呼召不得越入他位干誤次第不可呵止度營出入不由門戶不自啓白奸邪所起知者不告罪同一等合人飲食阿私所受大言驚語疑惑吏士此謂誤軍有此者斬之作木牛流馬法木牛者方腹曲頭一腳四足頭入頷中舌著於腹載多而行少宜可大用不可小使特行者數十里群行者二十里也曲者為牛頭雙者為牛腳橫者為牛領轉者為牛足覆者為牛背方者為牛腹垂者為牛舌曲者為牛肋刻者為牛齒立者為牛角細者為牛鞅攝者為牛鞦軸牛仰雙轅人行六尺牛行四步載一歲糧日行二十里而人不大勞流馬尺寸之數肋長三尺五寸廣三寸厚二寸二分左右同前軸孔分墨去頭四寸徑中二寸前腳孔分墨二寸去前軸孔四寸五分廣一寸前杠孔去前腳孔分墨二寸七分孔長二寸廣一寸後軸孔去前杠分墨一尺五分大小與前同後腳孔分墨去後軸孔三寸五分大小與前同後杠孔去後腳孔分墨二寸七分後載剋去後杠孔分墨四寸五分前杠長一尺八寸廣二寸厚一寸五分後杠與等板方囊二枚厚八分長二尺七寸高一尺六寸五分廣一尺六寸每枚受米二斛三斗從上杠孔去肋下七寸前後同上杠孔去下杠孔分墨一尺三寸孔長一寸五分廣七分八孔同前後四腳廣二寸厚一寸五分形制如象靬長四寸徑面四寸三分孔徑中三腳杠長二尺一寸廣一寸五分厚一寸四分同杠耳蜀志本傳裴注引諸葛亮集黃陵廟記黃陵廟可記僕躬耕南陽之畝遂蒙劉氏顧草廬勢不可卻計事善之於是情好日密相拉總師趨蜀道履黃牛因覩江山之勝亂石排空驚濤拍岸斂巨石於江中崔嵬巑岏列作三峰平治洚水順之其道非神扶助於禹人力奚能致此耶僕縱步環覽乃見江左大山壁立林麓峰巒如畫熟視於大江重復石壁間有神像景見焉鬢髮鬚眉冠裳宛然如采畫者前豎一旌旗右駐一黃犢猶有董工開導之勢古傳所載黃龍助禹開江治水九載而功成信不誣也惜乎廟貌廢去使人太息神有功助禹開江不事鑿斧順濟舟航當廟食茲土僕復而興之再建其廟號目之曰黃牛廟以顯神功陰符經序諸葛亮敘曰所謂命者性也性能命通故聖人尊之以天命愚其人而智其聖故曰天機張而不死地機弛而不生觀乎陰符造化在乎手生死在乎人故聖人藏之於心所以陶甄天地聚散天下而不見其跡者天機也故黃帝得之以登雲天湯武得之以王天下五霸得之以統諸侯夫臣易而主難不可以輕用太公九十非不遇蓋審其主焉若使哲士執而用之立石為主刻木為君亦可以享天下夫臣盡其心而主反怖有之不亦難乎嗚乎無賢君則義士自死而不仕莫若散志巖石以養其命待生於泰階世人以夫子為不遇以秦儀為得時不然志在立宇宙安能馳心下走哉丈夫所恥嗚乎後世英哲審而用之范蠡重而長文種輕而亡豈不為泄天機天機泄者沈三劫宜然故聖人藏諸名山傳之同好隱之金匱恐小人竊而弄之司馬季主墓碑銘玄漠太寂混合陰陽天地交判萬品滋彰先生理著分別柔剛鬼神以觀六度顯名真誥卷十四南中紀功碑陰銘萬歲之後勝我者過此柘東城石刻碑即仆蠻為漢奴夷畏誓常以右搘捂
