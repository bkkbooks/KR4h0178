body:
  text: 文帝五篇名缺典論堯崩舜避堯子于南河之南舜崩禹避舜子于陽城禹崩益避禹子于箕山之陰意林下有事見史記四字疑是後人校語如彼登山乃勤以求高如彼浮川乃勤以求遠惟心弗勤時亦靡剋意林應瑒云人生固有人心答云在親曰孝施物曰仁仁者有事之實名非無事之虛稱善者道之母群行之主意林姦讒佞邪穢政愛惡敗俗國有此二事欲不危亡不可得也何進滅于吳匡張璋袁紹亡于審配郭圖劉表昏于蔡瑁張允孔子曰佞人殆信矣古事已列于載籍聊復論此數子以為後之監誡作姦讒中平之初大將軍何進弟車騎苗並開府近士吳匡張璋各以異端有寵于進而苗惡其為人匡璋毀苗而稱進進聞而嘉之以為一于己後靈帝崩進為宦者韓悝等所害匡璋忌苗遂劫進之衆殺苗于北闕而何氏滅矣昔鄭昭公殺於渠彌魯隱公死于羽父苗也能無及此乎夫忠臣之事主也尊其父以重其子奉其兄以敬其弟故曰愛其人者及其屋烏況乎骨肉之間哉而進獨何嘉焉袁紹之子談長而慧尚少而美紹妻愛尚數稱其才紹亦雅奇其貌欲以為後未顯而紹死別駕審配護軍逢紀宿以驕侈不為談所善于是外順紹妻內慮私害矯紹之遺命奉尚為嗣潁川郭圖辛評與配紀有隙懼有後患相與依談盛陳嫡長之義激以絀降之辱勸其為亂而談亦素有意焉與尚親振干戈欲相屠裂王師承天人之符應以席卷乎河朔遂走尚梟談禽配馘圖二子既滅臣無餘紹遇因運得收英雄之謀假士民之力東苞巨海之實西舉全晉之地南阻白渠黃河北有徑弓胡馬地方二千里衆數十萬可謂威矣當此之時無敵于天下視霸王易于覆手而不能抑遏愚妻顯別嫡庶婉戀私愛寵子以貌其後敗績喪師身以疾死邪臣飾姦二子相屠墳土未乾而宗廟為墟其誤至矣劉表長子曰琦表始愛之稱其類己久之為少子琮納後妻蔡氏之姪至蔡氏有寵其弟蔡瑁表甥張允並幸于表憚琦之長欲圖毀之而琮日睦于蔡氏允瑁為之先後琮之有善雖小必聞有過雖大必蔽蔡氏稱美于內瑁允歎德于外表日然之而琦益疏矣出為江夏太守監兵于外瑁允陰司其過闕隨而毀之美無顯而不掩闕無微而不露于是表忿怒之色日發誚讓之書日至而琮堅為嗣矣故曰容刀生于身疏積愛出于近習豈謂是邪昔泄柳申詳無人乎穆公之側則不能安其身君臣則然父子亦猶是乎後表疾病琦歸省疾琦素慈孝瑁允恐其見表父子相感更有託後之意謂曰將軍命君撫臨江夏為國東藩其任至重今釋衆而來必見譴怒傷親之歡心以增其疾非孝敬也遂遏于戶外使不得見琦流涕而去士民聞而傷焉雖易牙杜宮豎牛虛器何以加此琦豈忘晨鳧北犬之獻乎隔戶牖而不達何言千里之中山嗟乎父子之間何至是也表卒琮竟嗣立以侯與琦琦怒投印偽辭奔喪內有討瑁允之意會王師已臨其郊琮舉州請罪琦遂奔于江南昔伊戾費忌以無寵而作讒江充焚豐以負罪而造蠱高斯之詐也貪權躬寵之罔也欲貴皆近取乎骨肉之間以成其凶逆悲夫匡璋配圖瑁允之徒固未足多怪以後監前無不烹葅夷滅為百世戮試然猶昧于一往者姦利之心篤也其誰離父子隔昆弟成姦于朝制事于須臾皆緣崖隙以措意託氣應以發事挾宜慍之成畫投必忿之常心勢如憞怒應若發機雖在聖智不能自免況乎中材之人若夫爰盎之諫淮南田叔之救梁孝杜鄴之紿二王安國之和兩主倉唐之稱詩史丹之引過周昌犯色以廷爭叔孫切諫以陳誡三老抗疏以理冤千秋託靈以寤主彼數公者或顯德于前朝或揚聲于上世或纍遷而登相或受金于帝室其言既酬福亦隨之斯可謂善處骨肉之間矣群書治要篇名缺桓靈之際閹寺專命于上布衣橫議于下干祿者殫貨以奉貴要名者傾身以事勢位成乎私門名定乎橫巷由是戶異議人殊論論無常檢事無定價長愛惡興朋黨意林篇名缺夫陰陽交萬物成君臣交邦國治士庶交德行光同憂樂共富貴而友道備矣易曰上下交而其志同由是觀之交乃人倫之本務王道之大義非特士友之志也初學記十八引魏文帝集論疑即典論之誤夷吾侈而鮑叔廉此其志不同也張竦潔而陳遵汙此其行不齊也意林篇名缺主與民有三求求其為己勞求其為己死求其為己生意林篇名缺法者主之柄吏者民之命法欲簡而明吏欲公而平意林內誡三代之亡由乎婦人故詩剌豔妻書誡哲婦斯已著在篇籍矣近事之若此者衆或在布衣細人其失不足以敗政亂俗至于二袁過竊聲名一世豪士而術以之失紹以之滅斯有國者所宜慎也是以録之庶以為誡于後作內誡古之有國有家者無不患貴臣擅朝寵妻專室故女無美惡入宮見妒士無賢愚入朝見嫉夫寵幸之欲專愛擅權其來尚矣然莫不恭慎于明世而恣睢于間時者度主以行志也故龍陽臨釣而泣以塞美人之路鄭袖偽隆其愛以殘魏女之貌司隸馮方女國色也世亂避地揚州袁術登城見而悅之遂納焉甚愛幸之諸婦害其寵紿言將軍以貴人有志節但見時宜數涕泣示憂愁也若如此必長見敬重馮氏女以為然後每見術輒垂涕術果以為有心志益哀之諸婦因是共絞殺懸之于廁梁言其哀怨自殺術誠以為不得志而死厚加殯斂袁紹妻劉氏甚妒忌紹死僵尸未殯寵妾五人妻盡殺之以為死者有知當復見紹于地下乃髡頭墨面以毀其形追妒亡魂戮及死人惡婦之為一至是哉其少子尚又為盡殺死者之家嬪説惡母蔑死先父行暴逆忘大義滅其宜矣紹聽順妻意欲以尚為嗣又不時決定身死而二子爭國舉宗塗地社稷為墟上定冀州屯鄴舍紹之第余親涉其庭登其堂遊其閣寢其房棟宇未墮陛除自若忽然而他姓處之紹雖蔽乎亦由惡婦治要上洛都尉王琰獲高幹以功封侯其妻哭于室以為琰富貴將更娶妾媵而奪己愛故也三國志袁紹傳注後漢袁紹傳注意林藝文類聚三十五御覽四百八十七酒誨酒以成禮過則敗德而流俗沈荒故作酒誨北堂書鈔未改本一百四十八孝靈之末朝政墮廢群官百司並湎于酒貴戚尤甚斗酒至千錢中常侍張讓子奉為太醫令與人飲酒輒掣引衣裳發露形體以為戲樂將罷又亂其舄履使小大差踦無不顛倒僵仆踒跌手足因隨而笑之北堂書鈔一百四十八御覽二百二十九又四百九十七又六百九十七又八百四十五雒陽令郭珍居財巨億每暑夏召客侍婢數十盛裝飾被羅縠袒裸其中使之進酒御覽四百七十二又八百四十五荊州牧劉表跨有南土子弟驕貴並好酒為三爵大曰伯雅次曰中雅小曰季雅伯雅受七勝中雅受六勝季雅受五勝又設大針于杖端客有醉酒寢地者輒以劖剌之驗其醉醒是酷于趙敬侯以筒酒灌人也大駕都許使光祿大夫劉松北鎮袁紹軍與紹子弟日共宴飲松常以盛夏三伏之際晝夜酣飲極醉至于無知云以避一時之暑二方化之故南荊有三雅之爵河朔有避暑之飲意林初學記三御覽四百九十七又七百六十又八百三十論郤儉等事夫生之必死成之必敗天地所不能變聖賢所不能免然而惑者望乘風雲冀與螭龍共駕適不死之國國即丹溪其人浮遊列缺翱翔倒景飢餐瓊蕊渴飲飛泉然死者相襲丘壟相望逝者莫反潛者莫形足以覺也文選郭景純遊仙詩注張孟陽七哀詩注然人形性同于庶類勞則早斃逸則晚死意林淳于意診趙章謂其命在五日後至七日乃死章嗜粥內臟充實故得延日也北堂書鈔未刪改本一百四十四潁川郤儉能辟穀餌伏苓甘陵甘始亦善行氣老有少容廬江左慈知補導之術並為軍吏初儉之至市伏苓價暴數倍議郎安平李覃學其辟穀餐伏苓飲水中寒泄利殆至殞命後始來衆人無不鴟視狼顧呼吸吐納軍謀祭酒弘農董芬為之過差氣閉不通良久乃蘇左慈到又競受其補導之術至寺人嚴峻往從問受閹豎真無事于斯術也人之逐聲乃至于是光和中北海王和平亦好道術自以當仙濟南孫雍少事之從至京師會和平病死雍因葬之東陶有書百餘卷藥數囊悉以送之後弟子夏榮言其尸解雍至今恨不取其寶書仙藥劉向惑于鴻寶之説君遊眩于子政之言古今愚謬豈唯一人哉三國志華他傳注連江葉氏本博物志七今本五陳思王辨道論云世有方士吾王悉招至之甘陵有甘始廬江有左慈陽城有郤儉始能行氣儉善辟穀悉號三百歲人自王與太子及余之兄弟咸以為調笑不全信之然嘗試郤儉辟穀百日猶與寢處行步起居自若也夫人不食七日則死而儉乃能如是左慈修房中之術差可以終命然非有志至精莫能行也甘始老而少容自諸術士咸共歸之王使郤孟節主領諸人連江葉氏本博物志七今本五一説皇甫隆遇青牛道士姓封名君達其餘養性法即可放用大略云體欲嘗少勞無過虛食去肥濃節酸鹹滅思慮損喜怒除馳逐慎房室春夏施寫秋冬閉藏詳別篇武帝行之有效王仲統云甘始左元放東郭延年行容成御婦人法並為丞相所録問行其術亦得其驗降就道士劉景受雲母九子丸方年三百歲莫知所在武帝恆御此藥亦云有驗劉德治淮南王獄得枕中鴻寶苑祕書及子向咸共奇之信黃白之術可成謂神仙之道可致卒亦無驗乃以罹罪也劉根不覺飢渴或謂能忍盈虛王仲都當盛夏之月十爐火炙之不熱當嚴冬之時裸之而不寒桓君山以為性耐寒暑君山以無仙道好奇者為之前者已述焉博物志同上自敘初平之元董卓殺主鴆后蕩覆王室是時四海既困中平之政兼惡卓之凶逆家家思亂人人自危山東牧守咸以春秋之義衛人討州吁于濮言人人皆得討賊于是大興義兵名豪大俠富室強族飄揚雲會萬里相赴兗豫之師戰于滎陽河內之甲軍于孟津卓遂遷大駕西都長安而山東大者連郡國中者嬰城邑小者聚阡陌以還相吞併會黃巾盛于海嶽山寇暴于并冀乘勝轉攻席卷而南鄉邑望煙而奔城郭覩塵而潰百姓死亡暴骨如莽余時年五歲上以四方擾亂教余學射六歲而知射又教余騎馬八歲而知騎射矣以時之多難故每征余常從建安初上南征荊州至宛張繡降旬日而反亡兄孝廉子修從兄安民遇害時余年十歲乘馬得脫夫文武之道各隨時而用生于中平之季長于戎旅之間是以少好弓馬于今不衰逐禽輒十里馳射常百步日多體健心每不厭建安十年始定冀州濊貊貢良弓燕代獻名馬時歲之暮春句芒司節和風扇物弓燥手柔草淺獸肥與族兄子丹獵于鄴西終日手獲麞鹿九雉兔三十後軍南征次曲蠡尚書令荀彧奉使犒軍見余談論之末彧言聞君善左右射此實難能余言執事未覩夫項發口縱俯馬蹄而仰月支也彧喜笑曰乃爾余曰埒有常徑的有常所雖每發輒中非至妙也若夫馳平原赴豐草要狡獸截輕禽使弓不虛彎所中必洞斯則妙矣時軍祭酒張京在坐顧彧拊手曰善余又學擊劍閲師多矣四方之法各異唯京師為善桓靈之間有虎賁王越善斯術稱于京師河南史阿言昔與越遊具得其法余從阿學之精熟嘗與平虜將軍劉勳奮威將軍鄧展等共飲宿聞展善有手臂曉五兵又稱其能空手入白刃余與論劍良久謂言將軍法非也余顧嘗好之又得善術因求與余對時酒酣耳熱方食芋蔗便以為杖下殿數交三中其臂左右大笑展意不平求更為之余言吾法急屬難相中面故齊臂耳展言願復一交余知其欲突以取交中也因偽深進展果尋前余郤腳鄛正截其顙坐中驚視余還坐笑曰昔陽慶使淳于意去其故方更授以祕術今余亦願鄧將軍捐棄故伎更受要道也一坐盡歡夫事不可自謂己長余少曉持復自謂無對俗名雙戟為坐鐵室鑲楯為蔽木戶後從陳國袁敏學以單攻復每為若神對家不知所出先日若逢敏于狹路直決耳余于他戲弄之事少所喜唯彈棊略盡其巧少為之賦昔京師先工有馬合鄉侯東方安世張公子常恨不得與彼數子者對上雅好詩書文籍雖在軍旅手不釋卷每定省從容常言人少好學則思專長則善忘長大而能勤學者唯吾與袁伯業耳余是以少誦詩論及長而備歷五經四部史漢諸子百家之言靡不畢覽所著書論詩賦凡六十篇至若智而能愚勇而能怯仁以接物恕以及下以付後之良史所著下三十四字依御覽九十三加三國志魏文帝紀注太子余蒙隆寵忝當上嗣憂惶踧踖上書自陳欲繁辭博稱則父子之間不文也欲略言直説則喜懼之心不達也里語曰汝無自譽觀汝作家書言其難也意林太子篇序劍銘昔者周魯寶赤刀孟勞雍狐之戟屈盧之矛孤父之戈楚越太阿純鉤徐氏匕首凡斯皆上世名器君子雖有文事必有武備矣余好擊劍善以短乘長選茲良金命彼國工精而煉之至于百辟其始成也五色充爐巨橐自鼓靈物髣佛飛鳥翔舞以為寶器九劍三一曰飛景二曰流采三曰華鋒刀三一曰靈寶二曰含章三曰素質匕首二一曰清剛二曰揚文露陌刀一曰龍鱗因姿定名以銘其柎工非歐冶子金非昆吾亦一時之良也銘曰惟建安草有四載二月甲午魏太子丕造百辟寶劍三長四尺二寸重一斤十有五兩淬以清漳厲以礛䃴飾以文玉表以通犀光似流星名曰飛景其二名流采色似采虹長四尺二寸重一斤十有四兩華鋒銘缺魏太子丕造百辟寶刀三其一長四尺三寸六分重三斤六兩文似靈龜名曰靈寶其二采似丹霞名曰含章長四尺三寸三分重三斤十兩其三鋒似霜刀身劍鋏名曰素質長四尺三寸重二斤九兩魏太子造百辟匕首二其一理似堅冰名曰清剛其二曜似朝日名曰揚文又造百辟露陌刀一長三尺二寸狀如龍文名曰龍鱗北堂書鈔未改本一百二十二引九條一百二十三引六條藝文類聚六十引六條文選七命注引三條初學記十引一條二十二引二條六帖二引一條十三引二條御覽三百四十三引二條三百四十六引一條合訂成篇論文夫文人相輕自古而然傅毅之于班固伯仲之間耳而固小之與弟超書曰武仲以能屬文為蘭臺令史下筆不能自休夫人善于自見而文非一體鮮能備善是以各以所長相輕所短里語曰家有斃帚享之千金斯不自見之患也今之文人魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐幹偉長陳留阮瑀元瑜汝南應瑒德槤東平劉楨公幹斯七子者于學無所遺于辭無所假咸以自騁驥騄于千里仰齊足而並馳以此相服亦良難矣蓋君子審己以度人故能免于斯纍乃作論文王粲長于辭賦徐幹時有齊氣然粲之匹也如粲之初征登樓槐賦征思幹之玄猿漏卮圓扇橘賦雖張蔡不過也然于他文未能稱是陳琳阮瑀之章表書記今之雋也應瑒和而不壯劉楨壯而不密孔融體氣高妙有過人者然不能持論理不勝詞以至乎雜以嘲戲及其時有所善楊班儔也常人貴遠賤近向聲背實又患暗于自見謂己為賢夫文本同而末異蓋奏議宜雅書論宜理銘誄尚實詩賦欲麗此四科不同故能之者偏也唯通才能備其體文以氣為主氣之清濁有體不可力強而致譬諸音樂曲度雖均節奏同檢至于引氣不齊巧拙有素雖在父兄不能以移子弟蓋文章經國之大業不朽之盛事年壽有時而盡榮樂止乎其身二者必至之常期未若文章之無窮是以古之作者寄身于翰墨見意于篇籍不假良史之辭不託飛馳之勢而聲名自傳于後故西伯幽而演易周旦顯而制禮不以隱約而弗務不以康樂而加思夫然則古人賤尺璧而重寸陰懼乎時之過已而人多不強力貧賤則懾于飢寒富貴則流于逸樂遂營目前之務而遺千載之功日月逝于上體貌衰于下忽然與萬物遷化斯志士之大痛也融等已逝唯幹著論成一家言或問屈原相如之賦孰愈曰優遊案衍屈原之尚也窮侈極妙相如之長也然原據託譬喻其意周旋綽有餘度矣長卿子雲意未能及已北堂書鈔一百余觀賈誼過秦論發周秦之得失通古今之制義洽以三代之風潤以聖人之化斯可謂作者矣御覽五百九十五李尤字伯宗年少有文章賈逵薦尤有相如楊雄之風拜蘭臺令史與劉珍等共撰漢記北堂書鈔六十二議郎馬融以永興中帝獵廣成融從是時北州遭水潦蝗蟲融撰上林頌以諷藝文類聚一百論太宗文帝慈孝寬仁弘厚躬修玄默以儉率下奉生送終事從約省美聲塞于宇宙仁風畼于四海御覽八十八文帝思賢甚于飢渴用人速于順流北堂書鈔十一御覽八十八論孝武孝武帝承纍世之遺業遇中國之殷阜府庫餘金錢倉廩畜腐粟因此有意乎滅胸奴而廓清邊境矣故即位之初從王恢之畫設馬邑之謀自元光以迄征和四五十載之間征胸奴四十餘舉盛餘踰廣漢絶梓嶺封狼居胥禪姑幕梁北河觀兵瀚海刈單于之旗剿閼氏之首探符離之窟掃五王之庭納休屠昆邪之附獲祭天金人之寶斬名王以千數馘酋虜以萬計既窮追其散亡又摧破其積聚虜不暇于救死扶傷疲困于孕重墮殞元封初躬秉武節告以天子自將懼以兩越之誅彼時號為威震胸奴矣藝文類聚十二御覽八十八論周成漢昭或有方周成王于漢昭帝者余以為周氏體聖考之淑氣稟賢妣之胎教周邵為保傅呂尚為太師故咳笑必含仁義之聲觀聽必覿禮義之容弘踐祚之義隆太平之化禮樂興于上頌聲作于下時成王年二十二享國三十年世永治長德與年豐夫孝昭父非武王母非邑薑體不承聖化不胎育保失仁義之德佐無隆平之治所謂生深宮中長婦人手矣德與體併智與性成孝昭之崩年二十有一承衰斃之世牧雕落之民臣無淑聖之智身有短折之期欲高隆周豈不謬哉御覽四百四十七終制黃初三年冬十月表首陽山東為壽陵作終制禮國君即位為椑存不忘亡也昔堯葬穀林通樹之禹葬會稽農不易畝故葬于山林則合乎山林封樹之制非上古也吾無取焉壽陵因山為體無為封樹無立寢殿造園邑通神道夫葬也者藏也欲人之不得見也骨無痛癢之知冢非棲神之宅禮不墓祭欲存亡之不黷也為棺槨足以朽骨衣衾足以朽肉而已故吾營此丘墟不食之地欲使易代之後不知其處無施葦炭無藏金銀銅鐵一以瓦器合古塗車芻靈之義棺但漆際會三過飯含無以珠玉無施珠襦玉匣諸愚俗所為也季孫以璵璠斂孔子歷級而救之譬之暴骸中原宋公厚葬君子謂華元樂莒不臣以為棄君于惡漢文帝之不發霸陵無求也光武之堀原陵封樹也霸陵之完功在釋之原陵之堀罪在明帝是釋之忠以利君明帝愛以害親也忠臣孝子宜思仲尼丘明釋之之言覽華元樂莒明帝之戒存于所以安君定親使魂靈萬載無危斯則賢聖之忠孝矣自古及今未有不亡之國亦無不堀之墓也喪亂以來漢氏諸陵無不發堀至乃燒取玉匣金縷骸骨并盡是焚如之刑也豈不重痛哉禍由乎厚葬封樹桑霍為我戒不亦明乎其皇后及貴人以下不隨王之國者有終沒皆葬澗西前又以表其處矣蓋舜葬蒼梧二妃不從延陵葬子遠在嬴博魂而有靈無不之也一澗之間不足為遠若違今詔妄有所變改造施吾為戮尸地下戮而重戮死而重死臣子為蔑死君父不忠不孝使死者有知將不福汝其以此詔藏之宗廟副在尚書祕書三府三國志魏文帝紀諸物相似亂者武夫怪石似美玉蛇床亂蘼無薺苨亂人參杜衡亂細辛雄黃似石留黃鯿魚相亂以有大小相異敵休亂門冬百步似門冬房葵似狼毒鉤吻堇與荇華相似拔楔與卑解相似一名狗脊菊有二種苗花如一唯味小異苦者不中食野葛食之殺人家葛種之三年不收後旅生亦不可食連江葉氏本博物志七以下篇名皆缺天下無切玉之刀火浣之布抱朴子內篇論仙火性酷烈無含生之氣搜神記十三火尚能鑠石銷金何為不燒其布法苑珠林四十七蘇林三國志王粲傳注引魏略曰林字孝友文帝作典論所稱蘇林者也踰長城之阻登單于之臺北堂書鈔十三結繩而治北堂書鈔十五北海鄭玄學之淵府北堂書鈔九十七君子謹乎約己弘乎接物文選陸士龍大將軍宴會詩注任彥升王文憲集序注欲得二女充備六宮佐宣陰陽聿修古義文選范蔚宗後漢皇后傳論注汝南許劭與族兄靖俱避地江東保吳郡爭論于太守許貢坐至于手足相及御覽四百九十六
