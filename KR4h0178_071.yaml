body:
  text: 僕射存請授孫慮為鎮軍大將軍疏帝王之興莫不褒崇至親以光群后故魯衛於周寵冠諸侯高帝五王封列于漢所以藩屏本朝為國鎮衛建昌侯慮稟性聰敏才兼文武於古典制宜正名號陛下謙光未肯如舊群寮大小咸用於邑方今姦寇恣雁金鼓未弭腹心爪牙惟親與賢輒與丞相雍等議咸以慮宜為鎮軍大將軍授任偏方以光大業吳志孫慮傳上疏請勿絶二宮賓客臣聞古之有天下者皆先顯別適庶封建子弟所以尊重祖宗為國藩表也二宮拜授海內稱宜斯乃大吳興隆之基頃聞二宮並絶賓客遠近悚然大小失望竊從下風聽採衆論咸謂二宮智達英茂自正名建號於今三年德行內著美稱外昭西北二隅久所服聞謂陛下當副順遐邇所以歸德勤命二宮賓延四遠使異國聞聲思為臣妾今既未垂意於此而發明詔省奪備衛抑絶賓客使四方禮敬不復得通雖實陛下敦尚古義欲令二宮專志於學不復顧慮觀聽小宜期於溫故博物而已然非臣下傾企喁喁之至願也或謂二宮不遵典式此臣所以寢息不寧就如所嫌猶宜補察密加斟酌不使遠近得容異言臣懼積疑成謗久將宣流而西北二隅去國不遠異同之語易以聞達聞達之日聲論當興將謂二宮有不順之愆不審陛下何以解之若無以解異國則亦無以釋境內境內守疑異國興謗非所以育巍巍鎮社稷也願陛下早發優詔使二宮周旋禮命如初則天清地晏萬國幸甚矣吳志孫霸傳與太常滕胤書與太常滕胤書鍾離子幹吾昔知之不熟定見其任南海威恩部伍智勇分明加操行清純有古人之風吳志鍾離牧傳注引會稽典録私改胡綜太子賓友目元遜才而疏子默精而很叔發辨而浮孝敬深而狹吳志孫登傳注引江表傳案諸葛恪字元遜顧談字子默謝景字叔發范慎字孝敬上言宜大舉伐魏今天棄曹氏喪誅纍見虎爭之際而幼童蒞事陛下身自御戎取亂侮亡宜滌荊揚之地舉強羸之數使強者執戟羸者轉運西命益州軍于隴右授諸葛瑾朱然大衆指事襄陽陸遜朱桓別征壽春大駕入淮陽歷青徐襄陽壽春困於受敵長安以西務對蜀軍許洛之衆勢必分離掎角瓦解民必內應將帥對向或失便益一軍敗績則三軍離心便當秣馬脂車陵蹈城邑乘勝逐北以定華夏若不悉軍動衆循前輕舉則不足大用易以屢退民疲威消時往力竭非出兵之策也吳志大帝傳注引漢晉春秋零陵太守殷禮言於權權弗能用之表請褒陸績女鬱生表請褒陸績女鬱生臣聞唐虞之政舉善而教旌德擢異三王所先是以忠臣烈士顯名國朝淑婦貞女表迹家閭蓋所以闡崇化業廣殖清風使苟有令性幽明俱箸苟懷懿姿士女同榮故王蠋建寒松之節而齊王表其里義姑立殊絶之操而魯侯高其門臣切見故鬱林太守陸績女子鬱生少履貞特之行幼立匪石之節年始十三適同郡張白侍廟三月婦禮未卒白遭罹家禍遷死異郡鬱生抗聲昭節義形於色冠蓋交橫誓而不許奉白姊妹嶮巇之中蹈履水火志懷霜雪義心固於金石體信貫於神明送終以禮邦士慕則臣聞昭德以行顯行以爵苟非名爵則勸善不嚴故士之有誄魯人志其勇杞婦見書齊人哀其哭乞蒙聖朝斟酌前訓上開天聰下垂坤厚褒鬱生以義姑之號以厲兩髦之節則皇風穆暢士女改視矣吳志陸績傳注引姚信集有表稱之日云云昕天論嘗覽漢書云冬至日在牽牛去極遠夏至日在東井去極近欲以推日之長短信以太極處二十八宿之中央雖有遠近不能相倍若使天裹地如卵含雞地何所倚立而自安固若有四維柱石則天之運轉將以相害使無四維因水勢以浮則非立性也若天經地行乎水中則日月星辰之行將不得其性是以兩地之説下地則上地之根也天行乎兩地之間矣今昕天之説以為地形立於下天象運乎上譬如人為靈蟲形最似天今人頤前侈臨胸而項不能覆背近取諸身故知天之體南低入地北則偏高也又冬至極低而天運近南故日去人遠而斗去人近北天氣至故冰寒也夏至極起而天運近北故斗去人遠日去人近南天氣至故蒸熱也極之高時日所行地中淺故夜短天去地高故晝長也極之低時日所行地中深故夜長天去地下淺故晝短也然則天行寒依于渾夏依於蓋也晉書天文志上宋書天文志一隋書天文志上御覽二誡子古人行善者非名之務非人之為心自甘之以為己度嶮易不虧始終如一進合神契退同人道故神明祐之衆人尊之而聲名自顯榮祿自至其勢然也又有內折外同吐實懷詐見賢則暫自新退居則縱所欲聞譽則驚自飾見尤則棄善端凡失名位恆多怨而害善怨一人衆則人疾之害一善則衆人怨之雖欲陷人而進己不可得也祗所以自毀耳顧真偽不可掩褒貶不可妄舍偽從實遺己察人可以通矣舍己就人去否適泰可以弘矣貴賤無常唯人所速苟善則匹夫之子可至王公苟不善則王公之子反為凡庶可不勉哉藝文類聚二十三贈孫奇詩序散騎侍郎武騎都尉孫奇字仲容年十七以秀才入侍帷幄余作詩一篇美而諷之御覽二百四十一引周紹新論即昭之誤新論論步騭嚴畯等古今賢士大夫所以失名喪身傾家害國者其由非一也然要其大歸總其常患四者而已急論議一也爭名勢二也重朋黨三也務欲速四也急論議則傷人爭名勢則敗友重朋黨則蔽主務欲速則失德此四者不除未有能全者也當世君子能不然者亦比有之豈獨古人乎然論其絶異未若顧豫章諸葛使君步丞相嚴侍衛張奮威之為美也論語言夫子恂恂然善誘人又曰成人之美不成人之惡豫章有之矣望之儼然即之也溫聽其言也厲使君體之矣恭而安威而不猛丞相履之矣學不求祿心無苟得衛尉奮威蹈之矣此五君者雖德實有差輕重不同至於趣舍大檢不犯四者俱一揆也昔丁諝出於孤家吾粲由於牧豎豫章揚其善以並陸全之列是以人無幽滯而風俗厚焉使君丞相衛尉三君昔以布衣俱以友善諸論者因各敘其優劣初先衛尉次丞相而後有使君也其後並事明主經營世務出處之才儀有不同先後之名須反其初此世常人所決勤薄也至於三君分好卒無虧損豈非古人交哉又魯橫江昔杖萬兵屯據陸口當世之美業也能與不能孰不願焉而橫江既亡衛尉應其選自以才非將帥深辭固讓終於不就後徙九列遷典八座榮不足以自曜祿不足以自奉至於二君皆位為上將窮富極貴衛尉既無求欲二君又不稱薦各守所志保其名好孔子曰君子矜而不爭群而不黨斯有風矣又奮威之名亦三君之次也當一方之戍受上將之任與使君丞相不異也然歷國事論功勞實有先後故爵位之榮殊焉而奮威將處此決能明其部分心無失道之欲事無充詘之求每升朝堂循禮而動辭氣謇謇罔不惟忠叔嗣雖親貴言憂其敗蔡文至雖疏賤談稱其賢女配太子受禮若弔慷慨之趣惟篤人物成敗得失皆如所慮可謂守道見機好古之士也若乃經國家當軍旅於馳騖之際立霸王之功此五君者未為過人至其純粹履道求不苟得升降當世保全名行邈然絶俗實有所師故粗論其事以示後之君子吳志步騭傳又見御覽四百四十五又論薛瑩等薛瑩王蕃器量綽異弘博多通樓玄清白節操文理條暢賀劭厲行貞潔機理清要韋曜篤學好古博觀群籍有記述之才胡沖以為玄劭蕃一時清妙略無優劣必不得已玄宜在先劭當次之華核詩賦之才有過於曜典誥不及也御覽四百四十五立交交之為道起自羲皇造化之初君臣始立而有人倫上下之敘象天地交泰以左右於民也唐虞三代莫不因之故交全情親則國安治強交敗情乖則國危治弱立交者欲其親也是故百姓不親禹作司徒疏者能睦廉頗相如忍忿以崇厚陳平周勃感陸生而相親所以安趙於強敵定漢於始幾此交接之大義帝王之極務聞之於易曰交乃人倫之本務王道之大義也御覽四百六引周昭新撰蓋新論之誤雲陽賦八鄉九市亭候二六列樹表塗路有廬宿御覽一百九十四甘蔗椑柿榛栗木瓜御覽九百七十一引韋曜靈陽武賦列于潘嶽間居賦之前知靈是雲字武即賦之重出上鼓吹鐃歌十二曲表當付樂官善歌者習歌宋書樂志一因獄吏上辭囚荷恩見哀無與為比曾無芒氂有以上報孤辱恩寵自陷極罪念當灰滅長棄黃泉愚情慺慺竊有所懷貪令上聞囚昔見世間有古曆注其所紀載既多虛無在書籍者亦復錯謬囚尋按傳記考合異同采托耳目所及以作洞紀起自庖犧至于秦漢凡為三卷當起黃武以來別作一卷事尚未成又見劉熙所作釋名信多佳者然物類衆多難得詳究故時有得失而爵位之事又有非是愚以官爵今之所急不宜乖誤囚自忘至微又作官職訓及辨釋名各一卷欲表上之新寫始畢會以無狀幽囚待命泯沒之日恨不上聞謹以先死列狀乞上言祕府於外料取呈內以聞追懼淺蔽不合天聽抱怖雀息乞垂哀省吳志韋曜傳國語解敘昔孔子發憤於舊史垂法於素王左丘明因聖言以攄意託王義以流藻其淵原深大沈懿雅麗可謂命世之才博物善作者也其明識高遠雅思未盡故復采録前世穆王以來下訖魯悼智伯之誅邦國成敗嘉言善語陰陽律呂天時人事逆順之數以為國語其文不主於經故號曰外傳所以包羅天地探測禍福發起幽微章表善惡者昭然甚明實與經藝並陳非特諸子之倫也遭秦之亂幽而復光賈生史遷頗綜述焉及劉光祿於漢成世始更考校是正疑謬至於章帝鄭大司農為之訓注解疑釋滯昭晰可觀至於細碎有所闕略侍中賈君敷而衍之其所發明大義略舉為已憭矣然於文間時有遺忘建安黃武之間故侍御史會稽虞君尚書僕射丹陽唐君皆英才碩儒洽聞之士也采托所見因賈為主而損益之觀其辭義信多善者然所理釋猶有異同昭以末學淺暗寡聞階數君之成訓思事義之是非愚心頗有所覺今諸家並行是非相貿雖聰明疏達識機之士知所去就然淺聞初學猶或未能袪過切不自料復為之解因賈君之精實採虞唐之信善亦以所覺增潤補綴參之以五經檢之以內傳以世本考其流以爾雅齊其訓去非要存事實凡所發正三百七事又諸家紛錯載述為煩是以時有所見庶幾頗近事情裁有補益猶恐人之多言未詳其故欲世覽者必察之也明道本國語博奕論蓋聞君子恥當年而功不立疾沒世而名不稱故曰學如不及猶恐失之是以古之志士悼年齒之流邁而懼名稱之不立也故勉精厲操晨興夜寐不遑寧息經之以歲月纍之以日力若寧越之勤董生之篤漸漬德義之淵棲遲道藝之域且以西伯之聖姬公之才猶有日昃待旦之勞故能隆興周道垂名億載況在臣庶而可以已乎歷觀古今立功名之士皆有纍積殊異之迹勞身苦體契闊勤思平居不墮其業窮困不易其素是以卜式立志於耕牧而黃霸受道於囹圄終有榮顯之福以成不朽之名故山甫勤於夙夜而吳漢不離公門豈有遊墯哉今世之人多不務經術好玩博奕廢事棄業忘寢與食窮日盡明繼以脂燭當其臨局交爭雌雄未決專精鋭意心勞體倦人事曠而不修賓旅闕而不接雖有太牢之饌韶夏之樂不暇存也至或賭及衣物徙棊易行廉恥之意弛而忿戾之色發然其所志不出一枰之上所務不過方罫之間勝敵無封爵之賞獲地無兼土之實技非六藝用非經國立身者不階其術徵選者不由其道求之於戰陳則非孫吳之倫也考之於道藝則非孔氏之門也以變詐為務則非忠信之事也以劫殺為名則非仁者之意也而空妨日廢業終無補益是何異設木而擊之置石而投之哉且君子之居室也勤身以致養其在朝也竭命以納忠臨事且猶旰食而何博奕之足耽夫然故孝友之行立貞純之名彰也方今大吳受命海內未平聖朝乾乾務在得人勇略之士則受熊虎之任儒雅之徒則處龍鳳之署百行兼苞文武並騖博選良才旌簡旄俊設程試之科垂金爵之賞誠千載之嘉會百世之良遇也當世之士宜勉思至道愛功惜力以佐明時使名書史籍勳在盟府乃君子之上務當今之先急也夫一木之枰孰與方國之封枯棊三百孰與萬人之將袞龍之服金石之樂足以兼棊局而貿博奕矣假令世士移博奕之力而用之於詩書是有顏閔之志也用之於智計是有良平之思也用之於資貨是猗頓之富也用之於射御是有將帥之備也如此則功名立而鄙賤遠矣吳志韋曜傳文選藝文類聚七十四
