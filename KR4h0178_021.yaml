body:
  text: 夏侯惇與石威則書授孫賁以長沙業張津以零桂吳志孫策傳注引虞喜志林景福殿賦周步堂宇東西眷眄綵色光明粲爛流延素壁皓養赫奕倩練爾乃察其奇巧觀其微形嶔岑紆曲盤牙欹傾或夭矯而雲起或詰曲而鐶縈衆木附枝以連注欒梧倚亞而相經若乃仰觀綺窗周覽菱荷流彩的皪微秀發華纖莖葳蕤順風揚波含光內耀婀嫋紛葩曾櫨外周榱桷內附或因勢以連接或邪詭以盤搆于是乎飛閣連延馳道四周高樓承雲列觀若浮挹朝露之華精漱醴泉之清流藝文類聚六十二乃造彼鞠室文選何晏景福殿賦注乃涉乎大陛以發華殿文選沈約齊安陸王碑文注案此二條選注作夏侯權當是夏侯稚權轉寫脫稚字耳薦劉劭伏見常侍劉劭深忠篤思體周于數凡所錯綜源流弘遠是以群才大小咸取所同而斟酌焉故性實之士服其平和良正清靜之人慕其玄虛退讓文學之士嘉其推步詳密法理之士明其分數精比意思之士知其沈深篤固文章之士愛其著論屬辭制度之士貴其化略較要策謀之士贊其明思通微凡此諸論皆取適已所長而舉其支流者也臣數聽其清談覽其篤論漸漬歷年服膺彌久實為朝廷奇其器量以為若此人者宜輔翼機事納謀幃幄當與國道俱隆非世俗所常有也惟陛下垂優游之聽使劭承清間之歡得自盡于前則德音上通輝耀日新矣魏志劉劭傳皇胤賦覽二儀之上體本人倫之大紀道莫崇于后辟統莫大于承祀伊皇衢之光赫享乾坤之元祉在太和之五載肇皇胤之盛始時惟孟秋和氣淑清良辰既啓皇子誕生爾乃發愷悌之明詔振湛恩之豐沛殊惠洽乎黎民崇施畼于無外爵群兆以布德赦殊死以示仁黔首詠而齊樂願皇祚之日新藝文類聚四十五初學記十時事議夫官才用人國之柄也故銓衡專于臺閣上之分也孝行存乎閭巷優劣任之鄉人下之敘也夫欲清教審選在明其分敘不使相涉而已何者上過其分則恐所由之不本而干勢馳騖之路開下踰其敘則恐天爵之外通而機權之門多矣夫天爵下通是庶人議柄也機權多門是紛亂之原也自州郡中正品度官才之來有年載矣緬緬紛紛未聞整齊豈非分敘參錯各失其要之所由哉若令中正但考行倫輩倫輩當行均斯可官矣何者夫孝行著于家門豈不忠恪于在官乎仁恕稱于九族豈不達于為政乎義斷行于鄉黨豈不堪于事任乎三者之類取于中正雖不處其官名斯任官可知矣行有大小比有高下則所任之流亦煥然明別矣奚必使中正干銓衡之機于下而執機柄者有所委仗于上上下交侵以生紛錯哉且臺閣臨下考功校否衆職之屬各有官長旦夕相考莫究于此閭閻之議以意裁處而使匠宰失位衆人驅駭欲風俗清靜其可得乎天臺縣遠衆所絶意所得至者更在側近孰不修飾以要所求所求有路則修已家門者已不如自達于鄉黨矣自達鄉黨者已不如自求之于州邦矣苟開之有路而患其飾真離本雖復嚴責中正督以刑罰猶無益也豈若使各帥其分官長則各以其屬能否獻之臺閣臺閣則據官長能否之第參以鄉閭德行之次擬其倫比勿使偏頗中正則唯考其行迹別其高下審定輩類勿使升降臺閣總之如其所𥳑或有參錯則其責負自在有司官長所第中正輩擬比隨次率而用之如其不稱責負在外然則內外相參得失有所互相形檢孰能相飾斯則人心定而事理得庶可以靜風俗而審官才矣古之建官所以濟育群生統理民物也故為之君長以司牧之司牧之主欲一而專一則官任定而上下安專則職業修而事不煩夫事𥳑業修上下相安而不治者未之有也先王建萬國雖其詳未可得而究然分疆畫界各守土境則非重纍羈絆之體也下考殷周五等之敘徒有小大貴賤之差亦無君官臣民而有二統互相牽制者也夫官統不一則職業不修職業不修則事何得而𥳑事之不𥳑則民何得而靜民之不靜則邪惡竝興而姦僞滋長矣先王達其如此故專其職司而一其統業始自秦世不師聖道私以御職姦以待下懼宰官之不修立監牧以董之畏督監之容曲設司察以糾之宰牧相纍監察相司人懷異心上下殊務漢承其緒莫能匡改魏室之隆日不暇及五等之典雖難卒復可粗立儀準以一治制今之長吏皆君吏民橫重以郡守纍以刺史若郡所攝唯在大較則與州同無為再重宜省郡守但任刺史刺史職存則監察不廢郡吏萬數還親農業以省煩費豐財殖穀一也大縣之才皆堪郡守是非之訟每生意異順從則安直已則爭夫和羹之美在于合異上下之益在能相濟順從乃安此琴瑟一聲也蕩而除之則官省事𥳑二也又幹郡之吏職監諸縣營護黨親鄉邑舊故如有不副而因公掣頓民之困弊咎生于此若皆并合則亂原自塞三也今承衰弊民人雕落賢才鮮少任事者寡郡縣良吏往往非一郡受縣成其劇在下而吏之上選郡當先足此為親民之吏專得底下吏者民命而常頑鄙今如并之吏多選清良者造職大化宣流民物獲寧四也制使萬戶之縣名之郡守五千以上名之都尉千戶以下令長如故自長以上考課遷用轉以能升所牧亦增此進才效功之敘也若經制一定則官才有次治功齊明五也若省郡守縣皆徑達事不擁隔官無留滯三代之風雖未可必𥳑一之化庶幾可致便民省費在于此矣文質之更用猶四時之迭興也王者體天理物必因弊而濟通之時彌質則文之以禮時泰侈則救之以質今承日王之末秦漢餘流世俗彌文宜大改之以易民望今科制自公列侯以下位從大將軍以上皆得服綾錦羅綺紈素金銀飾鏤之物自是以下雜綵之服通于賤人雖上下等級各示有差然朝臣之制已得侔至尊矣玄黃之采已得通于下矣欲使市不鬻華麗之色商不通難得之貨工不作雕刻之物不可得也是故宜大理其本準度古法文質之宜取其中則以為禮度車輿服章皆從質朴禁除末俗華麗之事使幹朝之家有位之室不復有錦綺之飾無兼采之服纖巧之物自上以下至于朴素之差示有等級而已勿使過一二之覺若夫功德之賜上恩所特加皆表之有司然後服用之夫上之化下猶風之靡草朴素之教興于本朝則彌侈之心自消于下矣魏志夏侯玄傳太傅司馬宣王問以時事玄議以為答司馬宣王書漢文雖身衣弋綈而不革正法度內外有僭擬之服寵臣受無限之賜由是觀之似指立在身之名非篤齊治制之意也今公侯命世作宰追蹤上古將隆至治抑末正本若制定于上則化行于衆矣夫當宜改之時留殷勤之心令發之日下之應也猶響尋聲耳猶垂謙謙曰待賢能此伊周不正殷姬之典也竊未喻焉魏志夏侯玄傳肉刑論夫天地之性人物之道豈自然當有犯何荀班論曰治則刑重亂則刑輕又曰殺人者死傷人者刑是百王之所同也夫死刑者殺妖逆也傷人者不改斯亦妖逆之類也如其可改此則無取于肉刑也如云死刑過制生刑易犯罪次于古當生今獨死者皆可募行肉刑及傷與盜吏受賕枉法男女淫亂死者皆復古刑斯罔之于死則陷之肉刑矣舍死折骸又何辜也猶稱以滿堂而聚飲有一人向隅而泣者則一堂為之不樂此亦願理其平而必以肉刑施之是仁于當殺而忍于斷割懼于易犯而安于為虐哀泣奚由而息堂上焉得泰耶仲尼曰既富且教又曰苟子之不欲雖賞之不竊何用斷截乎下愚不移以惡自終所謂翦妖也若飢寒流溝壑雖大辟不能制也而況肉刑哉赭衣滿道有鼻者醜終無益矣通典一百六十八答李勝難肉刑論聖賢之治也能使民遷善而自新故易曰小懲而大戒陷夫死者不戒者也能懲戒則無刻截刻截則不得反善矣通典一百六十八暴之取死此自然也傷人不改縱暴滋多殺之可也傷人而能改悔則豈須肉刑而後止哉殺人以除暴自然理也斷截之政末俗之所云耳孔少府曰殺人無所斫人有小瘡故刖趾不可以報尸而髡不足以償傷傷人一寸而斷其支體為罰已重不厭衆心也通典一百六十八樂毅論世人多以樂毅不時拔莒即墨為劣是以敘而論之夫求古賢之意宜以大者遠者先之必迂回而難通然後已焉可也今樂氏之趣或者其未盡乎而多劣之是使前賢失指于將來不亦惜乎觀樂生遺燕惠王書其殆庶乎機合乎道以終始者與其喻昭王曰伊尹放太甲而不疑太甲受放而不怨是存大業于至公而以天下為心者也夫欲極道之量務以天下為心者必致其主于盛隆合其趣于先王苟君臣同符斯大業定矣于斯時也樂生之志千載一遇也亦將行千載一隆之道豈其局蹟當時止于兼并而已哉夫兼并者非樂生之所屑彊燕而廢道又非樂生之所求也不屑苟得則心無近事不求小成斯意兼天下者也則舉齊之事所以運其機而動四海也夫討齊以明燕主之義此兵不興于為利矣圍城而害不加于百姓此仁心著于遐邇矣舉國不諜其功除暴不以威力此至德全于天下矣邁全德以率列國則幾于湯武之事矣樂生方恢大綱以縱二城牧民明信以待其弊使即墨莒人顧仇其上願釋干戈賴我猶親善守之智無所之施然則求仁得仁即墨大夫之義也仕窮則從微子適周之道也開彌廣之路以待田單之徒長容善之風以申齊士之志使夫忠者遂節通者義著昭之東海屬之華裔我澤如春下應如草道光宇宙賢者託心鄰國傾慕四海延頸思戴燕主仰望風聲二城必從則王業隆矣雖淹留于兩邑乃致速于天下不幸之變世所不圖敗于垂成時運固然若乃逼之以威劫之以兵則攻取之事求欲速之功使燕齊之士流血于二城之閒侈殺傷之殘示四國之人是縱暴易亂貪以成私鄰國望之其猶豺虎既大墮稱兵之義而喪濟弱之仁虧齊士之節廢廉善之風掩宏通之度棄王德之隆雖二城幾于可拔霸王之事逝其遠矣然則燕雖兼齊其與世主何以殊哉其鄰敵何以相傾樂生豈不知拔二城之速了哉顧城拔而業乖豈不知不速之致變顧業乖而與變同繇是言之樂生不屠二城其亦未可量也王右軍書帖本藝文類聚二十三辨樂論昔伏羲氏因時興利教民田漁天下歸之時則有網罟之歌神農繼之教民食穀時則有豐年之詠黃帝備物始垂衣裳則有龍袞之頌御覽五百七十一阮生云律呂協則陰陽和音聲適則萬物類天下無樂而欲陰陽和調災害不生亦以難矣此言律呂音聲非徒化治人物可以調和陰陽蕩除災害也夫天地定位刖柔相摩盈虛有時堯遭九年之水憂民阻饑湯遭七年之旱欲遷其社豈律呂不和音聲不通哉此乃天然之數非人道所協也御覽十六夏侯子一舟之覆無一毫不濕一馬之走無一毫不動故大同萬物不一也御覽八百九十七魯人有善相馬者與豫俱游夜方寐聞馬有行者魯人驚曰七百里也此暗中耳同上一蟻之行一蚊之飛聖人皆知之御覽九百四十五上明帝表公孫淵昔年敢違王命廢絶計貢者實挾兩端既恃阻險又怙孫權故敢跋扈恣睢海外宿舒親見賊權軍衆府庫知其弱少不足憑恃是以決計斬賊之使又高句麗濊貊與淵為仇竝為寇鈔今外失吳援內有胡寇心知國家能從陸道勢不得不懷惶懼之心因斯之時宜遣使示以禍福奉車都尉鬷弘武皇帝時始奉使命開通道路文皇帝即位欲通使命遣弘將妻子還歸鄉里賜其車牛絹百匹弘以受恩歸死國朝無有還意乞留妻子身奉使命公孫康遂稱臣妾以弘奉使稱意賜爵關內侯弘性果烈乃心于國夙夜拳拳念自竭效冠族子孫少好學問博通書記多所關涉口論速捷辨而不俗附依典誥若出胸臆加仕本郡常在人右彼方士人素所敬服若當遣使以為可使弘行弘乃自舊土習其國俗為說利害辨足以動其意明足以見其事才足以行之辭足以見信若其計從雖酈生之降齊王陸賈之說尉他亦無以遠過也欲進遠路不宜釋騏驥將已篤疾不宜廢扁鵲願察愚言也魏志公孫度傳注引魏名臣奏
