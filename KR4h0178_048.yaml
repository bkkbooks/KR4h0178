body:
  text: 魏卷四十八嵇康養生論一首一首養生論一首世或有謂神仙可以學得不死可以力致者或云上壽百二十古今所同過此以往莫非妖妄者此皆兩失其情請試粗論之夫神仙雖不目見然記籍所載前史所傳較而論之其有必矣似特受異氣稟之自然非積學所能致也至於導養得理以盡性命上獲千餘歲下可數百年可有之耳而世皆不精故莫能得之何以言之夫服藥求汗或有弗獲而愧情一集渙然流離終朝未餐則囂然思食而曾子銜哀七日不飢夜分而坐則低迷思寢內懷殷憂則達旦不暝徑刷理鬢醇醴發顏僅乃得之壯士之怒赫然殊觀植髮衝冠由此言之精神之於形骸猶國之有君也神躁於中而形喪於外猶君昏於上國亂於下也夫為稼於湯之世偏有一溉之功者雖終歸燋爛必一溉者後枯然則一溉之益固不可誣也而世常謂一怒不足以侵性一哀不足以傷身輕而肆之是猶不識一溉之益而望嘉穀於旱苗者也是以君子知形恃神以立神須形以存悟生理之易失知一過之害生故修性以保神安心以全身愛憎不棲於情憂喜不留於意泊然無感而體氣和平又呼吸吐納服食養身使形神相親表裏俱濟也夫田種者一畝十斛謂之良田此天下之通稱也不知區種可百餘斛田種一也至於樹養不同則功收相懸謂商無十倍之價農無百斛之望此守常而不變者也且豆令人重榆令人瞑合歡蠲忿萱草忘憂愚智所共知也薰辛害目豚魚不養常世所識也蝨處頭而黑麝食柏而香頸處險而癭齒居晉而黃推此而言凡所食之氣蒸性染身莫不相應豈惟蒸之使重而無使輕害之使暗而無使明薰之使黃而無使堅芬之使香而無使延哉故神農曰上藥養命中藥養性者誠知性命之理因輔養以通也而世人不察惟五穀是見聲色是耽目惑玄黃耳務淫哇滋味煎其府藏醴醪煮其腸胃香芳腐其骨髓喜怒悖其正氣思慮銷其精神哀樂殃其平粹夫以蕞爾之軀攻之者非一塗易竭之身而外內受敵身非木石其能久乎其自用甚者飲食不節以生百病好色不倦以致乏絶風寒所災百毒所傷中道夭於衆難世皆知笑悼謂之不善持生也至于措身失理亡之於微積微成損積損成衰從衰得白從白得老從老得終悶若無端中智以下謂之自然縱少覺悟咸歎恨於所遇之初而不知慎衆險於未兆是由桓侯抱將死之疾而怒扁鵲之先見以覺痛之日為受病之始也害成於微而救之於著故有無功之治馳騁常人之域故有一切之壽仰觀俯察莫不皆然以多自證以同自慰謂天地之理盡此而已矣縱聞養生之事則斷以所見謂之不然其次狐疑雖少庶幾莫知所由其次自力服藥半年一年勞而未驗志以厭衰中路復廢或益之以畎澮而泄之以尾閭欲坐望顯報者或抑情忍欲割棄榮願而嗜好常在耳目之前所希在數十年之後又恐兩失內懷猶豫心戰於內物誘於外交賒相傾如此復敗者夫至物微妙可以理知難以目識譬猶豫章生七年然後可覺耳今以躁競之心涉希靜之塗意速而事遲望近而應遠故莫能相終夫悠悠者既以未效不求而求者以不專喪業偏恃者以不兼無功追術者以小道自溺凡若此類故欲之者萬無一能成也善養生者則不然矣清虛靜泰少私寡欲知名位之傷德故忽而不營非欲而強禁也識厚味之害性故棄而弗顧非貪而後抑也外物以纍心不存神氣以醇白獨著曠然無憂患寂然無思慮又守之以一養之以和和理日濟同乎大順然後蒸以靈芝潤以醴泉晞以朝陽綏以五絃無為自得體妙心玄忘歡而後樂足遺生而後身存若此以往庶可與羡門比壽王喬爭年何為其無有哉答難養生論一首一首答難養生論一首答曰所以貴智而尚動者以其能益生而厚身也然欲動則悔吝生智行則前識立前識立則志開而物遂悔吝生則患積而身危二者不藏之於內而接於外秪足以災身非所以厚生也夫嗜欲雖出於人而非道德之正猶木之有蝎雖木之所生而非木之宜也故蝎盛則木朽欲勝則身枯然則欲與生不並立名與身不俱存略可知矣而世未之悟以順欲為得生雖有厚生之情而不識生生之理故動之死地也是以古之人知酒色為甘鴆棄之如遺識名位為香餌逝而不顧使動足資生不濫於物知正其身不營於外背其所害向其所利此所以用智遂生之道也故智之為美美其益生而不羡生之為貴貴其樂和而不交豈可疾智而輕身勤欲而賤生哉且聖人寶位以富貴為崇高者蓋謂人君貴為天子富有四海民不可無主而存主不能無尊而立故為天下而尊君位不為一人而重富貴也又曰富與貴是人之所欲者蓋為季世惡貧賤而好富貴也未能外榮華而安貧賤且抑使由其道而不爭不可令其力爭故許其心競中庸不可得故與其狂狷此俗談耳不言至人當貪富貴也聖人不得已而臨天下以萬物為心在宥群生由身以道與天下同於自得穆然以無事為業坦爾以天下為公雖居君位饗萬國恬若素士接賓客也雖建龍旗服華袞忽若布衣之在身故君臣相忘於上蒸民家足於下豈勸百姓之尊己割天下以自私以富貴為崇高心欲之而不已哉且子文三顯色不加悅柳惠三黜容不加戚何者令尹之尊不若德義之貴三黜之賤不傷沖粹之美二子嘗得富貴於其身終不以人爵嬰心故視榮辱如一由此言之豈云欲富貴之情哉請問錦衣繡裳不陳於暗室者何必顧衆而動以毀譽為歡戚也夫然則欲之患其得得之懼其失苟患失之無所不至矣在上何得不驕持滿何得不溢求之何得不苟得之何得不失耶且君子出其言善則千里之外應之豈在於多欲以貴得哉奉法循理不絓世網以無罪自尊以不仕為逸遊心乎道義偃息乎卑室恬愈無遌而神氣條達豈須榮華然後乃貴哉耕而為食蠶而為衣衣食周身則餘天下之財猶渴者飲河快然以足不羡洪流豈待積斂然後乃富哉君子之用心若此蓋將以名位為贅瘤資財為塵垢也安用富貴乎故世之難得者非財也非榮也患意之不足耳意足者雖耦耕甽畝被褐啜菽豈不自得不足者雖養以天下委以萬物猶未愜然則足者不須外不足者無外之不須也無不須故無往而不乏無所須故無適而不足不以榮華肆志不以隱約趨俗混乎與萬物並行不可寵辱此真有富貴也故遺貴欲貴者賤及之故忘富欲富者貧得之理之然也今居榮華而憂雖與榮華偕老亦所以終身長愁耳故老子曰樂莫大於無憂富莫大於知足此之謂也難曰感而思室飢而求食自然之理也誠哉是言今不使不室不食但欲令室食得理耳夫不慮而欲性之動也識而後感智之用也性動者遇物而當足則無餘智用者從感而求倦而不已故世之所患禍之所由常在於智用不在於性動今使瞽者遇室則西施與嫫母同情聵者忘味則糟粳與精稗等甘豈識賢愚好醜以愛憎亂心哉君子識智以無恆傷生欲以逐物害性故智用則收之以恬性動則糾之以和使智止於恬性足於和然後神以默醇體以和成去纍除害與彼更生所謂不見可欲使心不亂者也縱令滋味常染於口聲色已開於心則可以至理遣之多算勝之何以言之也夫欲官不識君位思室不擬親戚何者知其所不得則不當生心也故嗜酒者自抑於鴆醴貪食者忍飢於漏脯知吉凶之理故背之不惑棄之不疑也豈恨向不得酣飲與大嚼哉且逆旅之妾惡者以自惡為貴美者以自美得賤美惡之形在目而貴賤不同是非之情先著故美惡不能移也苟云理足於內乘一以御外何物之能默哉由此言之性氣自和則無所困於防間情志自平則無鬱而不通世之多纍由見之不明耳又常人之情遠雖大莫不忽之近雖小莫不存之夫何故哉誠以交賒相奪識見異情也三年喪不內御禮之禁也莫有犯者酒色乃身之讎也莫能棄之由此言之禮禁交雖小不犯身讎賒雖大不棄然使左手據天下之圖右手旋害其身雖愚夫不為明天下之輕於其身酒色之輕於天下又可知矣而世人以身殉之斃而不悔此以所重而要所輕豈非背賒而趣交耶智者則不然矣審輕重然後動量得失以居身交賒之理同故備遠如近慎微如著獨行衆妙之門故終始無虞此與夫耽欲而快意者何殊間哉難曰聖人窮理盡性宜享遐期而堯孔上獲百年下者七十豈復疏於導養乎案論堯孔雖稟命有限故導養以盡其壽此則窮理之致不為不養生得百年也且仲尼窮理盡性以至七十田父以六弊蠢愚有百二十者若以仲尼之至妙資田父之至拙則千歲之論奚所怪哉且凡聖人有損己為世表行顯功使天下慕之三徙成都者或菲食勤躬經營四方心勞形困趣步失節者或奇謀潛遘爰及干戈威武殺伐功利爭奪者或修身以明汙顯智以驚愚藉名高於一世取準的於天下又勤誨善誘聚徒三千口倦談議身疲磬折形若救孺子視若營四海神馳於利害之端心騖於榮辱之塗俯仰之間已再撫宇宙之外者若比之于內視反聽愛氣嗇精明白四達而無執無為遺世坐忘以寶性全真吾所不能同也今不言松柏不殊於榆柳也然松柏之生各以良殖遂性若養松于灰壤則中年枯隕樹之重崖則榮茂日新此亦育形之一觀也竇公無所服御而致百八十豈非鼓琴和其心哉此亦養神之一徵也火蠶十八日寒蠶三十日餘以不得踰時之命而將養有過倍之隆溫肥者早終涼瘦者遲竭斷可識矣圉馬養而不乘用皆六十歲體疲者速雕形全者難斃又可知矣富貴多殘伐之者衆也野人多壽傷之者寡也亦可見矣今能使目與瞽者同功口與聵者等味遠害生之具御益性之物則始可與言養性命矣難曰神農唱粒食之始鳥獸以之飛走生民以之視息今不言五穀非神農所唱也既言上藥又唱五穀者以上藥希寡艱而難致五穀易殖農而可久所以濟百姓而繼夭閼也並而存之唯賢者志其大不肖者志其小耳此同出一人至當歸止痛用之不已耒耜墾辟從之不輟何至養命蔑而不議此殆玩所先習怪於所未知且平原則有棗栗之屬池沼則有菱芡之類雖非上藥猶於黍稷之篤恭也豈云視息之具唯立五穀哉又曰黍稷惟馨實降神祗蘋蘩蘊藻非豐肴之匹潢汙行潦非重酎之對薦之宗廟感靈降祉是知神饗德之與信不以所養為生猶九土述職各貢方物以效誠耳又曰肴糧入體益不踰旬以明宜生之驗此所以困其體也今不言肴糧無充體之益但謂延生非上藥之偶耳請借以為難夫所知麥之善於菽稻之勝於稷由有效而識之假無稻稷之域必以菽麥為珍養謂不可尚矣然則世人不知上藥良於稻稷猶守菽麥之賢於蓬蒿而必天下之無稻稷也若能杖藥以自永則稻稷之賤居然可知君子知其若此故準性理之所宜資妙物以養身植玄根於初九吸朝霞以濟神今若以春酒為壽則未聞高陽有黃髮之叟也若以充悅為賢則未聞鼎食有百年之賓也且冉生嬰疾顏子短折穰歲多病飢年少疾故狄食米而生癩瘡得穀而血浮馬秣粟而足重雁食粒而身留從此言之鳥獸不足報功於五穀生民不足受德於田疇也而人竭力以營之殺身以爭之養親獻尊則唯菊苽粱稻聘享嘉會則唯肴饌旨酒而不知皆淖溺筋腋易糜速腐初雖甘香入身臭處竭辱精神染污六府鬱穢氣蒸自生災蠹叨淫所階百疾所附味之者口爽服之者短祚豈若流泉甘醴瓊蕊玉英金丹石菌紫芝黃精皆衆靈含英獨發奇生貞香難歇和氣充盈澡雪五臟疏徹開明吮之者體輕又練骸易氣染骨柔筋滌垢澤穢志淩青雲若此以往何五穀之養哉且螟蛉有子果裸負之性之變也橘渡江為枳易土而變形之異也納所食之氣還質易性豈不能哉故赤斧以練丹赬髮涓子以朮精久延偓佺以松實方目赤松以水玉乘煙務光以蒲韭長耳卭疏以石髓駐年方回以雲母變化昌容以蓬蔂易顏若此之類不可詳載也孰云五穀為最而上藥無益哉又責千歲以來目未之見謂無其人即問談者見千歲人何以別之欲校之以形則與人不異欲驗之以年則朝菌無以知晦朔蜉蝣無以識靈龜然則千歲雖在巿朝固非小年之所辨矣彭祖七百安期千年則狹見者謂書籍妄記劉根遐寢不食或謂偶能忍飢仲都冬倮而體溫夏裘而身涼桓談謂偶耐寒暑李少君識桓公玉碗則阮生謂之逢占而知堯以天下禪許由而楊雄謂好大為之凡若此類上以周孔為關鍵畢志一誠下以嗜欲為鞭策欲罷不能馳驟於世教之內爭巧於榮辱之間以多同自減思不出位使奇事絶於所見妙理斷於常論以言通變達微未之聞也久慍間居謂之無歡深恨無肴謂之自愁以酒色為供養謂長生為無聊然則子之所以為歡者必結駟連騎食方丈於前也夫俟此而後為足謂之天理自然者皆役身以物喪志於欲原性命之情有纍於所論矣夫渴者唯水之是見酌者唯酒之是求人皆知乎生於有疾也今若以從欲為得性則渴酌者非病淫湎者非過桀跖之徒皆得自然非本論所以明至理之意也夫至理誠微善溺於世然或可求諸身而後悟校外物以知之者人從少至長降殺好惡有盛衰或稚年所樂壯而棄之始之所薄終而重之當其所悅謂不可奪值其所醜謂不可歡然還成易地則情變於初苟嗜欲有變安知今之所耽不為臭腐曩之所賤不為奇美耶假令廝養暴登卿尹則監門之類蔑而遺之由此言之凡所區區一域之情耳豈必不易哉又飢餐者於將獲所欲則悅情注心飽滿之後釋然疏之或有厭惡然則榮華酒色有可疏之時蚺蛇珍於越土中國遇而惡之黼黻貴於華夏裸國得而棄之當其無用皆中國之蚺蛇裸國之黼黻也以大和為至樂則榮華不足顧也以恬淡為至味則酒色不足欽也苟得意有地俗之所樂皆糞土耳何足戀哉今談者不覩至樂之情甘減年殘生以從所願此則李斯背儒以殉一朝之欲主父發憤思調五鼎之味耳且鮑肆自玩而賤蘭茝猶海鳥對太牢而長愁文侯聞雅樂而塞耳故以榮華為生具謂濟萬世不足以喜耳此皆無主於內借外物以樂之外物雖豐哀亦備矣有主於中以內樂外雖無鍾鼓樂已具矣故得志者非軒冕也有至樂者非充屈也得失無以纍之耳且父母有疾在困而瘳則憂喜並用矣由此言之不若無喜可知也然則無樂豈非至樂耶故順天和以自然以道德為師友玩陰陽之變化得長生之永久任自然以託身並天地而不朽者孰享之哉養生有五難名利不滅此一難也喜怒不除此二難也聲色不去此三難也滋味不絶此四難也神慮轉發此五難也五者必存雖心希難老口誦至言咀嚼英華呼吸太陽不能不回其操不夭其年也五者無於胸中則信順日濟玄德日全不祈喜而有福不求壽而自延此養生大理之所效也然或有行踰曾閔服膺仁義動由中和無甚大之纍便謂人理已畢以此自臧而不蕩喜怒平神氣而欲卻老延年者未之聞也或抗志希古不榮名位因自高於馳騖或運智御世不嬰禍故以此自貴此於用身甫與鄉黨齒耆年同耳以言存生蓋闕如也或棄世不群志氣和粹不絶穀茹芝無益於短期矣或瓊糇既儲六氣並御而能含光內觀凝神復璞棲心於玄冥之崖含氣於莫大之涘者則有老可卻有年可延也凡此數者合而為用不可相無猶轅軸輪轄不可一乏於輿也然人若偏見各備所患單豹以營內忘外張毅以趣外失中齊以誡濟西取敗秦以備戎狄自窮此皆不兼之禍也積善履信世屢聞之慎言語節飲食學者識之過此以往莫之或知請以先覺語將來之覺者
