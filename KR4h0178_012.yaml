body:
  text: 元帝敕議燕王稱臣禮詔古之王者或有所不臣今王將宜依此義表不稱臣乎又當為報答夫係大宗者降其私親況所繼者重邪若便同之臣妾亦情所未安其皆依禮據典當務盡其宜魏志陳留王紀通典六十七伐蜀詔制詔蜀蕞爾小國土狹民寡而姜維虐用其衆曾無廢志往歲破敗之後猶復耕種沓中刻剝衆羌勞役無已民不堪命夫兼弱攻昧武之善經致人而不致于人兵家之上略蜀所恃賴唯維而已因其遠離巢窟用力為易今使征西將軍鄧艾督帥諸軍趣甘松沓中以羅取維雍州刺史諸葛緒督諸軍趣武都高樓首尾踧討若擒維便當東西竝進掃滅巴蜀也魏志陳留王紀文館詞林六百六十進鄧艾太尉詔艾曜威奮武深入虜庭斬將搴旗梟其鯨鯢使僭號之主稽首係頸歷世逋誅一朝而平兵不踰時戰不終日雲徹席卷蕩定巴蜀雖白起破強楚韓信克徑趙吳漢禽子陽亞夫滅七國計功論美不足比勳也其以艾為太尉增邑二萬戶封子二人亭侯各食邑千戶魏志鄧艾傳以鍾會為司徒詔會所向摧弊前無彊敵緘制衆城罔羅迸逸蜀之豪帥面縛歸命謀無遺策舉無廢功凡所降誅動以萬計全勝獨克有征無戰拓平西夏方隅清晏其以會為司徒進封縣侯增邑萬戶封子二人亭侯邑各千戶魏志鍾會傳下詔原鍾峻等峻等祖父繇三祖之世極位台司佐命立勳饗食廟庭父育歷職內外幹事有績昔楚思子文之治不滅關氏之祀晉録成宣之忠用存趙氏之後以會雍之罪而絶繇育之類吾有愍然峻辿兄弟特原有官爵者如故惟毅及雍息伏法魏志鍾會傳褒進夏侯和等不附鍾會詔前逆臣鍾會構造反亂聚集征行將士劫以兵威始吐姦謀發言桀逆逼脅衆人皆使下議倉卒之際莫不驚懾相國左司馬夏侯和騎士曹屬朱撫時使在成都中領軍司馬賈輔郎中羊琇各參會軍事和琇撫皆抗節不撓拒會凶言臨危不顧詞指正烈輔語散將王起說會姦逆凶暴欲盡殺將士又云相國已率三十萬衆西行討會欲以稱張形勢感激衆心起出以輔言宣語諸軍遂使將士益懷奮勵宜加顯寵以彰忠義其進和輔爵為鄉侯琇輔爵關內侯起宣傳輔言告令將士所宜賞異其以起為部曲將魏志陳留王紀褒封吳將呂興詔吳賊政刑暴虐賦斂無極孫休遣使鄧句敕交址太守鎖送其民發以為兵吳將以興因民心憤怒又承王師平定巴蜀即糾合豪傑誅除句等驅逐太守長吏撫和吏民以待國命九真日南郡聞興去逆即順太齊心響應與興協同興移書日南州郡開示大計兵臨合浦告以禍福遣都尉唐譜等詣進乘縣因南中都督護軍霍弋上表自陳又交址將吏各上表言興創造事業大小承命郡有山寇入連諸郡懼其計異各有攜二權時之宜以興為督交址諸軍事上大將軍定安縣侯乞賜褒獎以慰邊荒乃心款誠形于辭旨昔儀父朝魯春秋所美竇融歸漢待以殊禮今國威遠震撫懷六合方包舉殊裔混一四表興首向王化舉衆稽服萬里馳義請吏帥職宜加寵遇崇其爵位既使興等懷忠感悅遠人聞之必皆競勸其以興為使持節都督交州諸軍事南中大將軍封定安縣侯得以便宜從事先行後上魏志陳留王紀遣徐紹孫彧還吳詔昔聖帝明王靜亂濟世保大定功文武殊塗勳烈同歸是故或舞干戚以訓不庭或陳師旅以威暴慢至于愛民全國康惠庶類必先修文教示之軌儀不得已然後用兵此盛德之所同也往者季漢分崩九土顛覆劉備孫權乘間作禍三祖綏寧中夏日不暇給遂使遺寇僭逆歷世幸賴宗廟威靈宰輔忠武爰發四方拓定庸蜀役不浹時一征而克自頃江表衰弊政刑荒暗巴漢平定孤危無援交荊陽越靡然向風今交址僞將呂興已帥三郡萬里歸命武陵邑侯相嚴等糾合五縣請為臣妾豫章廬陵山民舉衆叛吳以助北將軍為號又孫休病死主帥改易國內乖違人各有心僞將施績賊之名臣懷疑自猜深見忌惡衆叛親離莫有固志自古及今未有亡徵若此之甚若六軍震曜南臨江漢吳會之域必扶老攜幼以迎王師必然之理也然興動大衆猶有勞費宜告喻威德開示仁信使知順附和同之利相國參軍徐紹水曹掾孫彧昔在壽春竝見虜獲紹本僞南陵督才質開壯彧孫權支屬忠良見事其遣紹南還以彧為副宣揚國命告喻吳人諸所示語皆以事實若其覺悟不損征伐之計蓋廟勝長算自古之道也其以紹兼散騎常侍加奉車都尉封都亭侯彧兼給事黃門侍郎賜爵關內侯紹等所賜妾及男女家人在此者悉聽自隨以明國恩不必使還以開廣大信魏志少帝紀以孫皓獻致歸晉王詔相國晉王誕敷神慮光被四海震耀武功則威蓋殊荒流風邁化則旁洽無外愍恤江表務存濟育戢武崇仁示以威德文告所加承風嚮慕遣使納獻以明委順方寶纖珍歡以效意而王謙讓之至一皆簿送非所以慰副初附從其款願也孫皓諸所獻致其皆還送歸之于王以協吉義魏志陳留王紀策命晉公九錫文朕以寡德獲承天序嗣我祖宗之洪烈遭家多難不明于訓曩者奸逆屢興方寇內侮大懼淪喪四海以墮三祖之弘業惟公經德履哲明允廣深迪宣武文世作保傅以輔乂皇家櫛風沐雨周旋征伐劬勞王室二十有餘載毗翼前人仍斷大政克厭不端維安社稷暨儉欽之亂公綏援有衆分命興師統紀有方用緝寧淮浦其後巴蜀屢侵西土不靖公奇畫指授制勝千里是以段谷之戰乘釁大捷斬將搴旗效首萬計孫峻猾夏致寇徐方戎車首路威靈先邁黃鉞未啓鯨鯢竄迹孫一搆隙自相疑阻幽鑒遠照奇策洞微遠人歸命作藩南夏爰授鋭卒畢力戎行暨諸葛誕滔天作逆稱兵揚楚欽咨逋罪同惡相濟帥其蟊賊以入壽春憑阻淮山敢拒王命公躬擐甲胄龔行天罰玄謀廟算遵養時晦奇兵震擊而朱異摧破神變應機而全琮稽服取亂攻昧而高墉不守兼九伐之弘略究五兵之正度用能戰不窮武而大敵殲潰旗不再麾而元憝授首收勍吳之雋臣係亡命之逋虜交臂屈膝委命下吏俘馘十萬積尸成京雪宗廟之滯恥拯兆庶之艱難掃平區域信威吳會遂戢干戈靖我疆土天地鬼神罔不獲乂乃者王室之難變起蕭牆賴公之靈弘濟艱險宗廟危而獲安社稷墜而復寧忠格皇天功濟六合是用疇咨古訓稽諸典籍命公崇位相國加于群后啓土參墟封以晉域所以方軌齊魯翰屏帝室而公遠蹈謙損深履沖讓固辭策命至于八九朕重違讓德抑禮虧制以彰公志于今四載上闕在昔建侯之典下違兆庶具瞻之望惟公嚴虔王度闡濟大猷敦尚純朴省繇節用務穡勤分九野康乂耆叟荷崇養之德鰥寡蒙矜恤之施仁風興于中夏流澤布于遐荒是以東夷西戎南蠻北狄狂狡貪悍世為寇讎者皆感義懷惠款塞內附或委命納貢或求置官司九服之外絶域之氓曠世所希至者咸浮海來享鼓舞王德前後至者八百七十餘萬口海隅幽裔無思不服雖西旅遠貢越裳九譯義無以踰維翼朕躬下匡萬國思靖殊方寧濟八極以庸蜀未賓蠻荊作猾潛謀獨斷整軍經武𥳑練將帥授以成策始踐賊境應時摧陷狂狡奔北首尾震潰禽其戎帥屠其城邑巴漢震疊江源雲徹地平天成誠在斯舉公有濟六合之勳加以茂德實總百揆允釐庶政敦五品以純仁恢六典以敷訓而靖恭夙夜勞謙昧旦雖尚父之左右文武周公之勤勞王家罔以加焉昔先生選建明德光啓諸侯體國經野方制五等所以藩翼王畿垂祚百世也故齊魯之封于周為弘山川土田邦畿七百官司典策制殊群后惠讓之難桓文以翼戴之勞猶受錫命之禮咸用光疇大德作範于後惟公功邁于前烈而賞闕于舊式百辟於邑人神同恨焉豈可以公謙沖而久淹弘典哉今以并州之太原上黨西河樂平新興雁門司州之河東平陽弘農雍州之馮翊凡十郡南至于華北于至陘東至于壼口西踰于河提封之數方七百里皆晉之故壤唐叔受之世作盟主實紀綱諸夏用率舊職爰胙茲士封公為晉公命使持節兼司徒司隸校尉陔即授印綬策書金獸符第一至第五竹使符第一至第十錫茲玄土苴以白茅建爾國家以永藩魏室昔在周召竝以公侯人作保傅其在近代酇侯蕭何實以相國光尹漢朝隨時之制禮亦宜之今進公位為相國加緑綟綬又加公九錫其敬聽後命以公思弘大猷崇正典禮儀刑作範旁訓四方是用錫公大輅戎輅各一玄牡二駟公道和陰陽敬授人時嗇夫反本農殖維豐是用錫公袞冕之服赤舄副焉公光敷顯德惠下以和敬信思順庶尹允諧是用錫公軒懸之樂六佾之舞公鎮靖宇宙翼播聲教海外懷服荒裔款附殊方馳義諸夏順軌是用錫公朱戶以居公𥳑賢料材營求俊逸爰升多士置彼周行是用錫公納陛以登公嚴恭寅畏底平四國式遏寇虐苛厲不作是用錫公武賁之士三百人公明慎用刑𥳑恤大中章厥天威以糾不虔是用錫公鈇鉞各一公爰整六軍典司征伐犯命淩正乃維誅殛是用錫公彤弓一彤矢百玈弓十玈矢千公饗祀蒸蒸孝思維則篤誠之至通于神明是用錫公秬鬯一卣圭瓚副焉晉國置官司以下率由舊式往欽哉祇服朕命弘敷訓典光澤庶方永終爾明德丕顯余一人之休命晉書文帝紀策命蜀後主惟景元五年三月丁亥皇帝臨軒使太常嘉命劉禪為安樂縣公於戲其進聽朕命蓋統天載物以咸寧為大光宅天下以時雍為盛故孕育群生者君人之道也乃順承天者坤元之義也上下交畼然後萬物協和庶類獲乂乃者漢氏失統六合震擾我太祖承運龍興弘濟八極是用應天順民撫有區夏于時乃考因群傑虎爭九服不靜爭閒阻遠保據庸蜀遂使西隅殊封方外壅隔自是已來干戈不戢元元之民不得保安其性幾將五紀朕永惟祖考遺志思在綏緝四海率土同軌故爰整六師耀威梁益公恢崇德度深秉大正不憚屈身委質以愛民全國為貴降心回慮應機豹變履信思順以享左右無疆之休豈不遠歟朕嘉與君公長饗顯祿用考咨前訓開國胙土率遵舊典錫茲玄牡苴以白茅永為魏藩輔往欽哉公其祗服朕命克廣德心以終乃顯烈食邑萬戶賜絹萬匹奴婢百人他物稱是子孫為三都尉封侯者五十餘人尚書令樊建侍中張紹光祿大夫譙周祕書令郤正殿中督張通竝封列侯蜀志後主傳案晉書武帝紀有禪晉策是朱整劉良所撰今編入晉文與楊彪夫人袁氏書卞頓首貴門不遺賢郎輔位每感篤念情在凝至賢郎盛德熙妙有蓋世文才闔門欽敬寶用無已方今騷擾戎馬屢動主簿股肱近臣征伐之計事須敬咨官立金鼓之節而聞命違制明公性急忿然在外輒行軍法卞姓當時亦所不知聞之心肝塗地驚愕斷絶悼痛酷楚情自不勝夫人多容即見垂恕故送衣服一籠文絹百匹房子官錦百斤私所乘香車一乘牛一頭誠知微細以達往意望為承納古文苑奏辭迎詣行在妾聞先代之興所以饗國久長垂祚後嗣無不由后妃焉故必審選其人以興內教今踐阼之初誠宜登進賢淑統理六宮妾自省愚陋不任粢盛之事加以寢疾敢守微志魏志文昭甄后傳注引魏書謝上表妾無皇英釐降之節又非姜任思齊之倫誠不足以假充女君之盛位處中饋之重任魏志文德郭皇后傳注引魏書敕外親劉斐諸親戚嫁娶自當與鄉里門戶匹敵者不得因勢彊與他方人婚也魏志文德郭皇后傳敕諸家今世婦女少當配將士不得因緣取以為妾也宜各自慎無為罰首魏志文德郭皇后傳敕戒郭表孟武等漢氏椒房之家少能自全者皆由驕奢可不慎乎魏志文德郭后傳注引魏書止孟武厚葬其母自喪亂以來墳墓無不發掘皆由厚葬也首陽陵可以為法魏志文德郭皇后傳廢帝歸藩詔皇帝芳春秋已長不親萬機耽淫內寵沈漫女德日延倡優縱其醜謔迎六宮家人留止內房毀人偷之敘亂男女之節恭孝日虧悖慠滋甚又為群小所迫將危社稷不可以承天緒奉宗廟使兼太尉高柔奉策用一元大武告于宗廟遣芳歸藩于齊以避皇位魏志齊王芳紀又晉書景帝紀出示大將軍讓表詔夫有功不隱周易大義成人之美古賢所尚今聽所執出表示外以章公之謙光焉魏志高貴鄉公紀聽收成濟詔夫五刑之罪莫大于不孝夫人有子不孝尚告治之此兒豈復成人主邪吾婦人不達大義以謂濟不得便為大逆也然大將軍志意懇切發言惻愴故聽如所奏當班下遠近使知本末也魏志高貴鄉公紀議改常道鄉公諱字詔古者人君之為名字難犯而易諱今常道鄉公諱字甚難避其令朝臣博議改易列奏魏志高貴鄉公紀冊府元龜三答太常請璽綬令我見高貴鄉公小時識之明日我自欲以璽綬手授之魏志齊王芳紀以高貴鄉公嗣位令東海王霖高祖文皇帝之子霖之諸子與國至親高貴鄉公髦有大成之量其以為明皇帝嗣魏志齊王芳紀追貶高貴鄉公令吾以不德遭家不造昔援立東海王子髦以為明帝嗣見其好書疏文章冀可成濟而情性暴戾日月滋甚吾數呵責遂更忿恚造作醜逆不道之言以誣謗吾遂隔絶兩宮其所言道不可忍聽非天地所覆載吾即密有令語大將軍不可以奉宗廟恐顛覆社稷死無面目以見先帝大將軍以其尚幼謂當改心為善殷勤執據而此兒忿戾所行益甚舉弩遙射吾宮祝當令中吾項箭親墮吾前吾語大將軍不可不廢之前後數次此兒具聞自知罪重便圖為弒逆賂遺吾左右人令因吾服藥密行鴆毒重相設計事己覺露直欲因際會舉兵入西宮殺吾出取大將軍呼侍中王沈散騎常侍王業尚書王經出懷中黃素詔示之言今日便當施行吾之危殆過于纍卵吾老寡豈復多惜餘命邪但傷先帝遺意不遂社稷顛覆為痛耳賴宗廟之靈沈業即馳語大將軍得先嚴警而此兒便將左右出雲龍門雷戰鼓躬自拔刃與左右雜衛共人兵陳閒為前鋒所害此兒既行悖逆不道而又自陷大禍重令吾悼心不可言昔漢昌邑王以罪廢為庶人此兒亦宜以民禮葬之當令內外咸知此兒所行又尚書王經凶逆無狀其收經及家屬皆詣廷尉魏志高貴鄉公紀
