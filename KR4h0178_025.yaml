body:
  text: 鍾會遺榮賦散髮抽簪永縱一壑文選沈約樂游苑餞呂僧珍詩注又張協詠史詩注作永絶一丘又張華答何劭詩注懷士賦記遠念于興波文選江淹雜體詩注菊花賦何秋菊之可奇兮獨華茂乎凝霜挺葳蕤于蒼春兮表壯觀乎金商延蔓蓊鬱緣坂被岡縹幹緑葉青柯紅芒華實離離暉藻煌煌規圓芳穎四張微風扇動照曜垂光于是季秋九月日數將并順陽應節爰鍾福靈置酒華堂高會娛情百卉雕瘁芳菊始榮紛葩曄曄或黃或青乃有毛嬙西施荊姬秦嬴妍姿妖豔一顧傾城擢纖纖之素手宣皓腕而露形仰撫雲髻俯弄芳榮藝文類聚八十一書鈔一百五十五初學記二十七御覽九百九十六掇以纖手承以輕巾揉以玉英納以朱脣服之者長生食之者通神初學記二十七故夫菊有五美焉圓花高懸準天極也純黃不雜后土色也早植晚登君子德也冒霜吐穎象徑直也流中輕體神仙食也藝文類聚八十一御覽九百九十六蒲萄賦并序并序蒲萄賦并序余植蒲萄于堂前嘉而賦之命荀勖并作御覽九百七十二美乾道之廣覆兮佳陽澤之至淳覽遐方之殊偉兮無斯果之獨珍託靈根于玄圃植昆山之高垠緑葉蓊鬱曖若重陰翳羲和秀房陸離混若紫英乘素波仰承甘液之靈露下歙豐潤于醴泉總衆和之淑美體至氣于自然珍味允備與物無儔清濁外畼甘旨內遒滋澤膏潤入口散流藝文類聚八十七孔雀賦有炎方之偉鳥感靈和而來儀稟麗精以挺質生丹穴之南垂戴翠旄以表辨垂緑蕤之森纚裁修尾之翹翹若順風而揚麾五色點注華羽參差鱗交綺錯文藻陸離丹口金輔玄目素規或舒翼軒峙奮迅洪姿或蹀足踟蹰鳴嘯郁咿藝文類聚九十一蜀平上言賊姜維張翼廖化董厥等逃死遁走欲趣成都臣輒遣司馬夏侯咸護軍胡烈等經從劍閣出新都大渡截其前參軍爰𩇕將軍句安等躡其後參軍皇甫闓將軍王買等從涪南出衝其腹臣據涪縣為東西勢援維等所統步騎四五萬人擐甲厲兵塞川填谷數百里中首尾相繼憑恃其衆方軌而西臣敕咸暗等令分兵據勢廣張羅罔南杜走吳之道西塞成都之路北絶越逸之徑四面雲集首尾竝進蹊路斷絶走伏無地臣又手書申喻開示生路群寇困逼知命窮數盡解甲投戈面縛委質印綬萬數資器山積昔舜舞干戚有苗自服牧野之師商旅倒戈有征無戰帝王之盛業全國為上破國次之全車為上破軍次之用兵之令典陛下聖德侔蹤前代翼輔忠明齊軌公旦仁育群生義征不譓殊俗向化無思不服師不踰時兵不血刃萬里同風九州共貫臣輒奉宣詔命導揚恩化復其社稷安其閭伍舍其賦調弛其征役訓之德禮以移其風示之軌儀以易其俗百姓欣欣人懷逸豫后來其蘇義無以過魏志鍾會傳與吳主書執笏之心載在名策文選袁宏三國名臣贊注與蔣斌書巴蜀賢智文武之士多矣至于足下諸葛思遠譬諸草木吾氣類也桑梓之敬古今所敦西到欲奉瞻尊大君公侯墓當灑掃墳塋奉祠致敬願告其所在蜀志蔣琬傳與姜維書公侯以文武之德懷邁世之略功濟巴漢聲畼華夏遠近莫不歸名每惟疇昔嘗同大化吳札鄭喬能喻斯好蜀志姜維傳移蜀將吏士民檄往者漢祚衰微率土分崩生民之命幾于泯滅我太祖武皇帝神武聖哲撥亂反正拯其將墜造我區夏高祖文皇帝應天順民受命踐阼烈祖明皇帝奕世重光恢拓洪業然江山之外異政殊俗率土齊民未蒙王化此三祖所以顧懷遺恨也今主上聖德欽明紹隆前緒宰輔忠肅明允劬勞王室布政垂惠而萬邦協和施德百蠻而肅慎致貢悼彼巴蜀獨為匪民愍此百姓勞役未已是以命授六師龔行天罰征西雍州鎮西諸軍五道竝進古之行軍以仁為本以義治之王者之師有征無戰故虞舜舞干戚而服有苗周武有散財發廩表閭之義今鎮西奉辭銜命攝統戎重庶弘文告之訓以濟元元之命非欲窮武極戰以快一朝之政故略陳安危之要其敬聽話言益州先主以命世英才興兵朔野困躓冀徐之郊制命紹布之手太祖拯而濟之與隆大好中更背違棄同即異諸葛孔明仍規秦川姜伯約屢出隴右勞動我邊境侵擾我氐羌方國家多故未遑修九伐之征也今邊境乂清方內無事畜力待時并兵一向而巴蜀一州之衆分張守備難以禦天下之師段谷侯和沮傷之氣難以敵堂堂之陳比年以來曾無寧歲征夫勤瘁難以當子來之民此皆諸賢所親見也蜀相牡見禽于秦公孫述授首于漢九州之險是非一姓此皆諸賢所備聞也明者見危于無形智者窺禍于未萌是以微子去商長為周賓陳平背項立功于漢豈晏安鴆毒懷祿而不變哉今國朝隆天覆之恩宰輔弘寬恕之德先惠後誅好生惡殺往者吳將孫一舉衆內附位為上司寵秩殊異文欽唐咨為國大害叛主讎賊還為戎首咨困逼禽獲欽二子還降皆將軍封侯咨與聞國事一等窮踧歸命猶加盛寵況巴蜀賢知見機而作者哉誠能深鑒成敗邈然高蹈投跡微子之蹤錯身陳平之軌則福同古人慶流來裔百姓士民安堵樂業農不易畝市不回肆去纍卵之危就永安之福豈不美與若偷安旦夕迷而不反大兵一放玉石俱碎雖欲悔之亦無及已其詳擇利害自求多福各具宣布咸使聞知魏志鍾會傳又見文選太極東堂夏少康漢高祖論甘露元年二月丙辰帝宴群臣于太極東堂與侍中荀顗尚書崔贊袁亮鍾育給事中中書令虞松等竝講述禮典遂言帝王優劣之差帝慕夏少康因問顗等曰有夏既衰后相殄滅少康收集夏衆復禹之績高祖拔起隴畝驅帥豪俊芟夷秦項包舉㝢內斯二主可謂殊才異略命世大賢者也考其功德誰宜為先顗等對曰夫天下重器王者天授聖德應期然後能受命創業至于階緣前緒興復舊績造之與因難易不同少康功德雖美猶為中興之君與世祖同流可也至如高祖臣等以為優帝曰自古帝王功德言行互有高下未必創業者皆優紹繼者咸劣也湯武高祖雖俱受命賢聖之分所覺縣殊少康殷宗中興之美夏啓周成守文之盛論德較實方諸漢祖吾見其優未聞其劣顧所遇之時殊故所名之功異耳少康生于滅亡之後降為諸侯之隸崎嶇逃難僅以身免能布其德而兆其謀卒滅過戈克復禹績祀夏配天不失舊物非至德弘仁豈濟斯勳漢祖因土崩之勢杖一時之權專任智力以成功業行事動靜多違聖檢為人子則數危其親為人君則囚繫賢相為人父則不能衛子身沒之後社稷幾傾若與少康易時而處或未能復大禹之績也推此言之宜高夏康而下漢祖矣諸卿具論詳之翌日丁巳講業既畢顗亮等議曰三代建國列土而治當其衰弊無土崩之勢可懷以德難屈以力逮至戰國強弱相兼去道德而任智力故秦之弊可以力爭少康布德仁者之英也高祖任力智者之俊也仁智不同二帝殊矣詩書述殷中宗高宗皆列大雅少康功美過于二宗其為大雅明矣少康為優宜如詔旨贊育松等議曰少康雖積德纍仁然上承大禹遺澤餘慶內有虞仍之援外有靡艾之助寒浞讒慝不德于民澆𤡬無親外內棄之以此有國蓋有所因至于漢祖起自布衣率烏合之士以成帝者之業論德則少康優課功則高祖多語資則少康易校時則高祖難帝曰諸卿論少康因資高祖創造誠有之矣然未知三代之世任德濟勳如彼之難秦項之際任力成功如此之易且太上立德其次立功漢祖功高未若少康盛德之茂也且夫仁者必有勇誅暴必用武少康武烈之威豈必降于漢祖哉但夏書淪亡舊文殘缺故勳美闕而罔載唯有伍員粗述大略其言復禹之績不失舊物祖述聖業舊章不愆自非大雅兼才孰能與于此向令墳典具存行事詳備亦豈有異同之論哉于是群臣咸悅服中書令松進曰少康之事去世久遠其文昧如是以自古及今議論之士莫有言者德美隱而不宣陛下既垂心遠鑒考詳古昔又發德音贊明少康之美使顯于千載之上宜録以成篇永垂于後帝曰吾學不博所聞淺狹懼于所論未獲其宜縱有可采億則屢中又不足貴無乃致笑後賢彰吾暗昧乎于是侍郎鍾會退論次焉魏志高貴鄉公紀注引魏氏春秋又見藝文類聚十二御覽八十二四百四十五論程盛丹霄之鳳青冥之龍文選任昉王文憲集序注引鍾會集母夫人張氏傳夫人張氏字昌蒲太原茲氏人太傅定陵成侯之命婦也世長吏二千石夫人少喪父母充成侯家修身正行非禮不動為上下所稱述貴妾孫氏攝嫡專家心害其賢數讒毀無所不至孫氏辨博有智巧言足以飾非文過然竟不能傷也及妊娠愈更嫉妬乃置藥食中夫人中食覺而吐之暝眩者數日或曰何不向公言之答曰嫡庶相害破家危國古今以為鑒誡假如公信我衆誰能明其事彼以心度我謂我必言固將先我事由彼發顧不快邪遂稱疾不見孫氏果謂成侯曰妾欲其得男故飲以得男之藥反謂毒之成侯曰得男藥佳事暗于食中與人非人情也遂訊侍者具服孫氏由是得罪出成侯問夫人何能不言夫人言其故成侯大驚益以此賢之黃初六年生會恩寵愈隆成侯既出孫氏更納正嫡賈氏夫人性矜嚴明于教訓會雖童稚勤見規誨年四歲授孝經七歲誦論語八歲誦詩十歲誦尚書十一誦易十二誦春秋左氏傳國語十三誦周禮禮記十四誦成侯易記十五使入太學問四方奇文異訓謂會曰學猥則倦倦則意怠吾懼汝之意怠故以漸訓汝今可以獨學矣雅好書籍涉歷衆書特好易老子每讀易孔子說鳴鶴在陰勞謙君子藉用白茅不出戶庭之義每使會反覆讀之曰易三百餘爻仲尼特說此者以謙恭慎密樞機之發行己至要榮身所由故也順斯術以往足為君子矣正始八年會為尚書郎夫人執會手而誨之曰汝弱冠見敘人情不能不自足則損在其中矣勉思其戒是時大將軍曹爽專朝政日縱酒沈醉會兄侍中育宴還言其事夫人曰樂則樂矣然難久也居上不驕制節謹度然後乃無危溢之患今奢僭若此非長守富貴之道嘉平元年車駕朝高平陵會為中書郎從行相國宣文侯始舉兵衆人恐懼而夫人自若中書令劉放侍郎衛瓘夏侯和等家皆怪問夫人一子在危難之中何能無憂答曰大將軍奢僭無度吾常疑其不安太傅義不危國必為大將軍舉耳吾兒在帝側何憂聞且出兵無他重器其勢必不久戰果如其言一時稱明會歷機密十餘年頗豫政謀夫人謂曰昔范氏少子為趙𥳑子設伐邾之計事從民悅可謂功矣然其母以為乘僞作詐末業鄙事必不能久其識本深遠非近人所言吾常樂其為人汝居心正吾知免矣但當修所志以輔益時化不忝先人耳常言人誰能皆體自然但力行不倦抑亦其次雖接鄙賤必以言信取與之閒分畫分明或問此無乃小乎答曰君子之行皆積小以致高大若以小善為無益而弗為此乃小人之事耳希通慕大者吾所不好會自幼小衣不過青紺親營家事自知恭儉然見得思義臨財必讓會前後賜錢帛數百萬計悉送供公家之用一無所取年五十有九甘露二年二月暴疾薨比葬天子有手詔命大將軍高都侯厚加賵贈喪事無巨細一皆供給議者以為公侯有夫人有世婦有妻有妾所謂外命婦也依春秋成風定姒之義宜崇典禮不得總稱妾名于是稱成侯命婦殯葬之事有取于古制禮也魏志鍾會傳注此篇張溥誤分為二又略見御覽二百二十又六百十三四本論世說文學篇注云論才性同異合離傅嘏論同李豐論異鍾會論合王廣論離芻蕘論國之稱富者在乎豐民非獨謂府庫盈倉廩實也且府庫盈倉廩實非上天所降皆取之于民民困則國虛矣初學記二十四御覽一百九十一吳之玩水若魚鱉蜀之便山若鳥獸文選魏都賦注螢光增曜于日月白孔六帖九十五賢者之處世猶金玉之生于沙礫豫章之産乎幽谷下不進之于上則無由而至矣御覽四百二凡人之結交誠宜盛不忘衰達不棄窮不疑惑于讒搆不信受于流言經長歷遠久而逾固而人多初隆而後薄始密而終疏斯何故也皆由交情不發于神氣道數乖而不同權以一時之術取倉卒之利有貪其財而交有慕其勢而交有愛其色而交三者既衰疏薄由生御覽四百六夫莠生似禾鍮石像金御覽八百十三焚林成烟其似如雲御覽八百七十一上言合朔有違錯光祿大夫領太史令雍言典曆者案曆術推交會之期候者伺遲疾之度當朔事無有違錯耳通典七十八高貴鄉公正元二年太史奏三月一日寅時合朔去交二度恐相附近主者奏宣敕有司為救日蝕備既時過而不蝕大將軍司馬昭推史官不驗之實空設合朔之期以疑上下光祿大夫領太史令雍言云云重問典曆周晃等對鄭小同議乃止與太傅司馬宣王書卒聞神軍密發已在百尺雖知命窮盡遲于相見身首分離不以為恨前後遣使有書未得還報企踵西望無物以譬昨遣書之後便乘船來相迎宿丘頭旦發于浦口奉被露布赦書又得二十三日況纍紙誨示聞命驚愕五內失守不知何地可以自處僕久忝朝恩歷試無效統御戎馬董齊東夏事有闕廢中心犯義罪在二百妻子同縣無所禱矣不圖聖恩天覆地載橫蒙視息復覩日月亡甥令狐愚攜惑群小之言僕即時呵抑使不得竟其語既人已知神明所鑒夫非事無陰卒至發露知此梟夷之罪也生我者父母活我者子也魏志王淩傳注引魏略身陷刑罪謬蒙赦宥今遣掾送印綬頃至當如詔書自縛歸命雖足下私之官法有分同上子貢畫贊口口端木英辨才清吐口敷華發音揚馨御覽四百六十四上明帝表武皇帝承涼州從事及武都降人之辭說張魯易攻陽平城下南北山相遠不可守也信以為然及往臨履不如所聞乃歎曰他人商度少如人意攻陽平山上諸屯既不時拔士卒傷夷者多武皇帝意沮便欲拔軍截山而還遣故大將軍夏侯惇將軍許褚呼山上兵還會前軍未還夜迷惑誤入賊營賊便退散侍中辛毗劉曄等在兵後語惇褚言官兵已據得賊要屯賊已散走猶不信之惇前自見乃還白武皇帝進兵定之幸而克獲此近事吏士所知魏志張魯傳注引魏名臣奏諫屯渚中作浮橋疏武皇帝智勇過人而用兵畏敵不敢輕之若此也夫兵好進惡退常然之數平地無險猶尚艱難就當深入還道宜利兵有進退不可意今屯渚中至深也浮橋而濟至危也一道而行至狹也三者兵家所忌而今行之賊頻攻橋誤有漏失渚中精鋭非魏之有將轉化為吳矣臣私戚之忘寢與食而議者怡然不以為憂豈不惑哉加江水向長一旦暴增何以防禦就不破賊尚當自完奈何乘危不以為懼事將危矣惟陛下察之魏志董昭傳陳末流之弊疏凡有天下者莫不貴尚敦朴忠信之士深疾虛僞不真之人者以其毀教亂治敗俗傷化也近魏諷則伏誅建安之末曹偉則斬戮黃初之始伏惟前後聖詔深疾浮僞欲以破散邪黨常用切齒而執法之吏皆畏其威勢莫能糾擲毀壞風俗侵欲滋甚竊見當今年少不復以學問為本專更以交游為業國士不以孝悌清修為首乃以趨勢游利為先合黨連群互相褒歎以毀訾為罰戮用黨譽為爵賞附已者則歎之盈言不附者則為作瑕釁至乃相謂今世何憂不度邪但求人道不勤羅之不博耳又何患其不知已矣但當吞之以藥而柔調耳又聞或有使奴客名作在職家人冒之出入往來禁奧交通書疏有所探問凡此諸事皆法之所不取刑之所不赦雖諷偉之罪無以加也魏志董昭傳作曹公書與楊奉吾與將軍聞名慕義便推赤心今將軍拔萬乘之艱難反之舊都翼佐之功超世無疇何其休哉方今群凶猾夏四海未寧神器至重事在維輔必須衆賢以清王軌誠非一人所能獨建心腹四支實相恃賴一物不備則有闕焉將軍當為內主吾為外援今吾有糧將軍有兵有無相通足以相濟死生契闊相與共之魏志董昭傳與袁春卿書蓋聞孝者不背親以要利仁者不忘君以徇私志士不探亂以徼幸智者不詭道以自危足下大君昔避內難南游百越非疏骨肉樂彼吳會智者深識獨或宜然曹公愍其守志清恪離群寡儔故特遣使江東或迎或送今將至矣就令足下處偏平之地依德義之主居有泰山之固身為喬松之偶以義言之猶宜背彼向此舍民趣父也且邾儀父始與隱公盟魯人嘉之而不書爵然則王所未命爵尊不成春秋之義也況足下今日之所託者乃危亂之國所受者乃矯誣之命乎苟不逞之與群而厥父之不恤不可以言孝忘祖宗所居之本朝安非正之奸職難可以言忠忠孝竝替難以言智又足下昔日為曹公所禮辟夫戚族人而疏所生內所寓而外王室懷邪祿而叛知己遠福祚而近危亡棄明義而收大恥不亦可惜邪若能翻然易節奉帝養父委身曹公忠孝不墜榮名彰矣宜深留計早決良圖魏志董昭傳袁紹同族春卿為魏郡太守在鄴城中其父元長在揚州太祖遣人迎之昭書與春卿議丞相進爵九錫與荀彧書昔周旦呂望當姬氏之盛因二聖之業輔翼成王之幼功勳若彼猶受上爵錫土開宇末世田單驅彊齊之衆報弱燕之怨收城七十迎復襄王襄王加賞于單使東有掖邑之封西有菑上之虞前世録功濃厚如此今曹公遭海內傾覆宗廟焚滅躬擐甲胄周旋征伐櫛風沐雨且三十年芟夷群凶為百姓除害使漢室復存劉氏奉祀方之曩者數公若泰山之與丘垤豈同日而論乎今徒與列將功臣竝侯一縣此豈天下所望哉魏志董昭傳注引獻帝春秋僞作袁紹檄告郡得賊羅候安平張吉辭當攻巨鹿賊故孝廉孫伉等為應檄到收行軍法惡止其身妻子勿坐魏志董昭傳薦胡昭天真高潔老而彌篤玄虛靜素有夷皓之節宜蒙徵命以勵風俗魏志管寧傳正始中驃騎將軍趙儼尚書黃休郭彝散騎常侍荀顗鍾育太僕庾嶷弘農太守何楨等遞薦昭與荀彧書今陽安郡當送綿絹道路艱阻必致寇害百姓困窮鄰城竝叛易用傾蕩乃一方安危之機也且此郡人執守忠節在險不二微善必賞則為義者勸善為國者藏之于民以為國家宜垂慰撫所斂綿絹皆俾還之魏志趙儼傳
