body:
  text: 應璩與曹公箋昔漢光武與戴子高有撫塵之好藝文類聚六薦和慮則箋璩聞唐堯因群士以興治齊桓假衆能以定業是故八元進則太平之化成六賢用則九合之功立切見同郡和模字慮則質性純粹體度貞正履仁蹈義動循軌禮方今海內企踵欣慕捉髮之德山林投褐思望旌弓之招實英奇敘用之時貢達進致之良秋也令夜光之璧顯價于和氏之肆千里之足定功于伯樂之庭庶有以宣明大道光益時化藝文類聚五十三薦賁伯偉箋璩聞景雲浮則應龍翔治道明則雋乂臻是故良哉之歌興于唐堯之世多士之頌起于周文之朝竊見太子舍人賁琳字伯偉稟性純和體素清愨宜授以千里之塗任以列曹之職藝文類聚五十三御覽六百三十二與曹昭伯箋空城寥廓所聞者悲風所見者鳥雀昔陳司空為邑宰所在幽間獨坐愁思幸賴遊蟻以娛其意以今況之知不虛矣御覽九百四十七與劉文達書入作納言出臨京任富民之術日引月長藩落高峻絶穿窬之心五種別出遠水火之災農器必具無失時之闕蠶麥有苫備之用無雨溼之虞封符指期無流連之吏鰥寡狐獨蒙廩振之實加之以明擲幽微重之以秉憲不撓有司供承王命百里垂拱仰辦雖昔趙張三王之治未足以方也魏志劉馥傳僕頃倦遊談之事欲修無為之術不能與足下齊鑣騁轡爭千里之表也御覽三百五十八與滿公琰書璩白昨者不遺猥見照臨雖昔侯生納顧于夷門毛公受眷于逆旅無以過也外嘉郎君謙下之德內幸頑才見誠知己歡欣踴躍情有無量是以奔騁御僕宣命周求陽書喻于詹何楊倩説于范武故使鮮魚出于潛淵芳旨發自幽巷繁俎綺錯羽爵飛騰牙曠高徽義渠哀激當此之時仲孺不辭同産之服孟公不顧尚書之期徒恨宴樂始酣白日傾夕驪駒就駕意不宣展追惟耿介迄于明發適欲遣書會承來命知諸君子復有漳渠之會夫漳渠西有伯陽之館北有曠野之望高樹翳朝雲文禽蔽緑水沙場夷敞清風肅穆是京臺之樂也得無流而不反乎適有事務須自經營不獲侍坐良增邑邑因白不悉璩白文選藝文類聚二十八與從弟君苗君胄書璩報間者北遊喜歡無量登芒濟河曠若發矇風伯掃途雨師灑道案轡清路周望山野亦既至止酌彼春酒接武茅茨涼過大夏扶寸肴修味踰方丈逍遙陂塘之上吟詠菀柳之下結春芳以崇佩折若華以翳日弋下高雲之鳥餌出深淵之魚蒲且讚善便嬛稱妙何其樂哉雖仲尼忘味于虞韶楚人流遁于京臺無以過也班嗣之書信不虛矣來還京都塊然獨處營宅濱洛困于囂塵思樂汶上發于寤寐昔伊尹輟耕郅惲投竿思致君于有虞濟蒸人于塗炭而吾方欲秉耒耜于山陽沈鉤緡于丹水知其不如古人遠矣然山父不貪天下之樂曾參不慕晉楚之富亦其志也前者邑人念弟無已欲州郡崇禮師官授邑誠美意也歷觀前後來入軍府至有皓首猶未遇也徒有飢寒駿奔之勞俟河之清人壽幾何且宦無金張之援遊無子孟之資而圖富貴之榮望殊異之寵是隴西之遊越人之射耳幸賴先君之靈免負擔之勤追蹤丈人畜雞種黍潛精墳籍立身揚名斯為可矣無或遊言以增邑邑郊牧之田宜以為意廣開土宇吾將老焉劉杜二生想數往來朱明之期已復至矣相見在近故不復為書慎夏自愛璩白文選文類聚二十八與侍郎曹長思書璩白足下去後甚相思想叔田有無人之歌闉闍有匪存之思風人之作豈虛也哉王肅以宿德顯授何曾以後進見拔皆鷹揚虎視有萬里之望薄援助者不能追參于高妙復斂翼于故枝塊然獨處有離群之志汲黯樂在郎署何武恥為宰相千載揆之知其有由也德非陳平門無結駟之迹學非楊雄堂無好事之客才劣仲舒無下帷之思家貧孟公無置酒之樂悲風起于閨闥紅塵蔽于機榻幸有袁生時步玉趾樵蘇不爨清談而已有似周黨之過閔子夫皮朽者毛落川涸者魚逝春生者繁華秋榮者零悴自然之數豈有恨哉聊為大弟陳其苦懷耳相還在近故不益言璩白文選與廣川長岑文瑜書璩白頃者炎旱日更增甚沙礫銷鑠草木焦卷處涼臺而有鬱蒸之煩浴寒水而有灼爛之慘宇宙雖廣無陰以憩雲漢之詩何以過此土龍矯首于玄寺泥人鶴立于闕里修之歷旬靜無徵效明勸教之術非致雨之備也知恤下民躬自暴露拜起靈壇勤亦至矣昔夏禹之解陽旴殷湯之禱桑林言未發而水旋流辭未卒而澤滂沛今者雲重積而復散雨垂落而復收得無賢聖殊品優劣異姿割髮宜及膚翦爪宜侵肌乎周征殷而年豐衛伐邢而致雨善否之應甚于影響未可以為不然也想雅思所未及謹書起豫應璩白文選藝文類聚一百與劉公幹書鶉鷃棲翔鳳之條黿鼉遊升龍之淵識真者所為憤結也文選陸機吳王郎中時從梁陳作詩注與韋仲將書夫以原憲縣罄之居而值皇天無已之雨室宇漸而作漏堂館洽而為泥薪芻既盡舊穀亦傾匱屠蘇發撤機㯓見謀進無顏子不改之志退無楊雄晏然之情是以懷蹙良不可堪人非神仙須仰衣食方今體寒心飢憂在旦夕而欲東希誅昌治生之物西望陵縣廚食之祿誠恐將為牛蹄中魚卒鮑氏之肆矣藝文類聚三十五初學記十八御覽十一與董仲連書穀糴驚踊告求周鄰日獲數斗猶復無薪可以熟之雖孟軻困于梁宋宣尼飢于陳蔡無以過此夫挾管晏之智者不有廝役之勞懷陶朱之慮者不居貧賤之地出蒙誚于臧獲入見謫于嬪息忽使己憤不知處世之為樂也藝文類聚三十五初學記十八與尚書諸郎書夫秋節涼和霖雨清間正高會之盛時飲宴之良日也而陋巷之居無高密之宇壁立之室無旬朔之資流潦浸于北堂隙漏霑于衣服藁蒸單竭簷石傾罄中饋告乏役者莫興飯玉炊桂猶尚優泰雖欣皇天之降潤亮水車之思雨私懷蹙額良不可言想諸夫子亦斯困也夫否泰潛升蓋由昏明二三執事以龍虎之姿遭風雲之會方將飛騰閶闔振翼紫微運籌帷幄顯揚豐績豈久沈滯于下職契闊于貧悴哉藝文類聚三十五檀氏園葵菜繁茂薯蔗瓜芋亦離離尚萌未知三生復何種植御覽九百七十四與劉孔才書聽廣陵之清散文選嵇康琴賦注又謝靈運道路憶山中詩注又夢溪筆談五與梁州刺史劉文爽書足下內挹叔夷之清節外播二南之惠政德教加于百姓要道過于侏國之卿也書鈔與夏侯孝智書遭值有道之世免致貧賤之患援鑒自照鬢已半白良可懼也北堂書鈔一百三十六與洛陽令杜偉忠書羊寄虎穴鵲托鷹巢心懷怵惕豈其任哉北堂書鈔一百五十八與王子雍書卿校之從有職之事足下著書不起草占授數萬言言不改定事合古典莫不歎息之矣書鈔與母丘仲恭書客館不留賓官曹無停事書鈔與趙叔潛書入侍華幄出典禁闈文選陸機贈馮文羆遷斥丘令詩注與王將軍書雀鼠雖微猶知徽烈文選劉孝標廣絶交論注又任昉為范始興求立太宰碑表注劉峻廣絶交論注並作雖愚與龐惠恭書頻見所上利民之術植濟南之榆栽漢中之漆藝文類聚八十八御覽九百五十六與西陽令孔德琰書嘉麥禎祥唯日未久不圖飛蝗一旦至止知恤蒸庶念存良苗親發赫斯爰整其旅鮐背之叟皓首之黎莫不負戈奔走于道路旌表曜于白日黿鼉震于雷動以此掃敵必將席卷況于微蟲能無驚駭卓茂治密恭在中牟時雖有災未若斯勤亦猶子賤鳴琴巫馬出入勞逸有殊立功惟一重雲比興不降靈雨麗此二災憂心忡惙逐蝗之道謹聞教矣不審致禳將以何物文王修德以厭地震湯禱桑林致克豐雨宜修善政以慰民望藝文類聚一百與楊生書知楊生翻然遂登納言雖有所越亦其宜也傅説棄板築而為殷相呂望投釣竿而為周師卓茂起閭里而為漢宰若此貧者乃奇才耳璅璅尚書執憲之吏曷以為異哉御覽二百一十二與許子俊書前別倉卒情意不悉追懷萬恨文選任昉出郡傳舍哭范僕射詩注足下以方剛之盛年應不霸之徑勇將發虓虎之威致霜雪之誅擒吳梟蜀定功萬里而劉備不下山孫權不出水武力不奮猛氣畜勇其毒如何御覽四百三十七與崔元書豈有亂首抗巾以入都城衣不在體而以適人乎昔戴叔鸞箕坐見邊文禮此皆衰世之慢行也御覽四百九十八與陰中夏書從田來見南野之中有徒步之士怪而問之乃知郎君頃有微疴告祠社神將以祈福聞之悵然以增歎息虛社高樹能有靈應哉御覽五百三十二體正者則檢于人質弱者則陋于衆文選謝靈運還舊園作見顏范二中書詩注答韓文憲書昔公孫宏皓首入學顏涿聚五十始涉師門朝聞道夕殞聖人所貴足下之年甫在不惑如以學藝何晚之有若能上逮南榮忘食之樂下踵寧子黑夜之勤窮文盡義無微不綜規富貴之榮取金紫之爵是夏侯勝拾芥之謂也御覽六百一十四報燕中尉樊彥皇書攬袪登輿北踐燕路方當化銀龜以為黃變青組以為紫御覽八百十九報平陸長賁伯瑋書從此辭矣何敢復飛蟬于惠文鳴玉于縞組哉御覽八百一十九與程文信書是以忽此蘇子帶郭之業永彼孫叔寢丘之地故求遠田在關之西南臨洛水北據芒山託崇岫以為宅因茂林以為蔭宋書謝靈運傳山居賦注文選齊竟陵王行狀注別作應瑒御覽八百二十一報東海相梁季然書足下頓彌天之網收萬仞之魚量之以溪谷數之以陔兆何其壯乎觀夫任公子之所釣此謂鰌蝦未足為吾子之道御覽八百三十四書左執屈盧之徑矛右秉干將之雄戟高冠拂雲長劍耿介蕭管振音厥聲載路馮軾虎視清風震疊可謂堂堂乎難與並為仁矣御覽三百三十九清猿與壺人爭旦海録碎事文選任彥升齊竟陵王行狀有此語注不云應璩書張溥百三家集引海録碎事當考與桓元則書敢不策馳敬尋後塵文選七命注魏都賦我太祖鴻飛兗豫文選沈約齊安陸王碑文注英雄響附文選陸倕石闕銘注答魏太子箋二月八日庚寅臣質言奉讀手命追亡慮存恩哀之隆形于文墨日月冉冉歲不我與昔侍左右廁坐衆賢出有微行之遊入有管絃之歡置酒樂飲賦詩稱壽自謂可終始相保並騁材力效節明主何意數年之間死喪略盡臣獨何德以堪久長陳除劉應才學所著誠如來命惜其不遂可為痛切凡此數子于雍容侍從實其人也若乃邊境有虞群下鼎沸軍書輻至羽檄交馳于彼諸賢非其任也往者孝武之世文章為盛若東方朔枚皋之徒不能持論即阮陳之儔也其唯嚴助壽王與聞政事然皆不慎其身善謀于國卒以敗亡臣竊恥之至于司馬長卿稱疾避事以著書為務則徐生庶幾焉而今各逝已為異物矣後來君子實可畏也伏惟所天優遊典籍之場休息篇章之囿發言抗論窮理盡微摛藻下筆鸞龍之文奮矣雖年齊蕭王才實百之此衆議所以歸高遠近所以同聲然年歲若墜今質已四十二矣白髮生鬢所慮日深實不復若平日之時也但欲保身敕行不蹈有過之地以為知己之纍耳遊宴之歡難可再遇盛年一過實不可追臣幸得下愚之才值風雲之會時邁齒臷猶欲觸胸奮首展其割裂之用也不勝慺慺以來命備悉故略陳至情質死罪死罪文選在元城與魏太子箋臣質言前蒙延納侍宴終日耀靈匿景繼以華燈雖虞卿適趙平原入秦受贈千金浮觴旬日無以過也小器易盈先取沈頓醒寤之後不識所言即以五日到官初至承前未知深淺然觀地形察土宜西帶恆山連岡平代北鄰柏人乃高帝之所忌也重以泜水漸漬疆宇喟然歎息思淮陰之奇譎亮成安之失策南望邯鄲想廉藺之風東接巨鹿存李齊之流都人士女服習禮教皆懷慷慨之節包左車之計而質暗弱無以蒞之若乃邁德種恩樹之風聲使農夫逸豫于疆畔女工吟詠于機杼固非質之所能也至于奉遵科教班揚明令下無威福之吏邑無豪俠之傑賦事行刑資于故實抑亦懍懍有庶幾之心往者嚴助釋承明之歡受會稽之位壽王去侍從之娛統東郡之任其後皆克復舊職追尋前軌今獨不然不亦異乎張敞在外自謂無奇陳咸憤積思入京城彼豈虛談夸論誑耀世俗哉斯實薄郡守之榮顯左右之勤也古今一揆先後不貿焉知來者之不如今聊以當覲不敢多云質死罪死罪文選答文帝箋曹烈曹丹加以公室支庶骨肉舊恩其龍飛鳳翔實其分也文選傅咸贈何劭王濟詩注與文帝書雖云幽深視險若夷文選張季鷹雜詩注答東阿王書質白信到奉所惠貺發函伸紙是何文采之巨麗而慰喻之綢繆乎夫登東嶽者然後知衆山之邐迤也奉至尊者然後知百里之卑微也自旋之初伏念五六日至于旬時精散思越惘若有失非敢羡寵光之休慕猗頓之富誠以身賤犬馬德輕鴻毛至乃歷玄闕排金門升玉堂伏虛檻于前殿臨曲池而行觴既威儀虧替言辭漏泄雖恃平原養士之懿愧無毛遂耀穎之才深蒙辥公折節之禮而無馮諼三窟之效屢獲信陵虛左之德又無侯生可述之美凡此數者乃質之所以憤積于胸臆懷眷而悁邑者也若追前宴謂之未究傾海為酒并山為肴伐竹雲夢斬梓泗濱然後極雅意盡歡情信公子之壯觀非鄙人之所庶幾也若質之志實在所天思投印釋黻朝夕侍坐鑽仲父之遺訓覽老氏之要言對清酤而不酌抑嘉肴而不享使西施出帷嫫母侍側斯盛德之所蹈明哲之所保也若乃近者之觀實蕩鄙心秦箏發徽二八迭奏塤簫激于華屋靈鼓動于座右耳嘈嘈于無聞情踴躍于鞍馬謂可北懾肅慎使貢其楛矢南震百越使獻其白雉又況權備夫何足視乎還治諷采所著觀省英偉實賦頌之宗作者之師也衆賢所述亦各有志昔趙武過鄭七子賦詩春秋載列以為美談質小人也無以承命又所答貺辭醜義陋申之再三赧然汗下此邦之人間習辭賦三事大夫莫不諷誦何但小吏之有乎重惠苦言訓以政事惻隱之恩形乎文墨墨子回車而質四年雖無德與民式歌且舞儒墨不同固以久矣然一旅之衆不足以揚名步武之間不足以騁迹若不改轍易御將何以效其力哉今處此而來大功猶絆良驥之足而責以千里之任檻猿猴之勢而望其巧捷之能者也不勝見恤謹附遣白答不敢繁辭吳質白文選藝文類聚二十六將論將者國之命也不可不詳擇不可不審授也書鈔一百一十五贊述太子賦伏惟太子研精典籍留意篇章覽照幽微才不世出稟聰睿之絶性體明達之殊風慈孝發于自然仁恕洽于無外是以武夫懷恩文士歸德竊見所作典論及諸賦頌逸句爛然沈思泉涌華藻雲浮聽之忘味奉讀無倦正使聖人復存猶稱善不暇所不能間也昔舜以蒸蒸顯其德周旦不驕成其名豈因南面之尊以發稱假鼎足之盛以取譽哉夫至尊至貴能令人畏不能令人譽故桀不能變龍逢之心紂不能易三仁之意懷近服遠非德無施今太子博納多容海渟嶽峙學無常師惟德所在恩無所私唯德所親觀士察人秋毛無失望色則知其情覽始則達其終遏偽辨于未言絶讒巧于未形其所以包羅殊類鑑觀成敗德生于性明出自然太子所行晏然休著皆群下所常吟詠誠不復須臣贊揚懿美褒稱盛行然後令夜光之璧顯于金匱隋侯之珠彰于韞櫝者也今相鍾繇大理王朗海內英儒國家柱臣博物多識通洽君子年耆德茂所更多矣若遊海者難與論水覩前世者不可為言然咸歸太子巍巍之美敘述清風言之有永聽者欣欣忘日之夕流景耀于無窮布芳陰于四遠譬若麟龍發足群獸追蹤鸞鳳舉翼衆鳥隨風小臣區區嘉樂無已竊怡綿綿之屬忘愚戇之言謹觸冒上賦一篇以攄狂狷之思超古人之遐迹崇先聖之弘基耽八素之祕奧遵二儀于大猷正往昔之常斃定當世之舊儀稟休和之上性應五百之運期著典憲之高論作敘歡之麗詩越文章之常檢揚不學之妙辭蹈布衣之所難闡善道而廣之道無深而不測術無細而不敷論古賢以歎息覿懿德以歡娛歷精思于訓籍忽日移而忘劬雖明略而無上猶博納以自扶賓故老以勸俗諷六經以崇儒嘉通人之達節笑俗士之守株匿天威之嚴厲揚愷悌之和舒惟凡百之詠德感恩惠之有餘信清風之休著非臣下之敢虛乃作頌曰明明太子既睿且聰博聞強記聖思無雙猗猗左右如虎如龍八俊在側旁無諛凶富不忘施尊而益恭研精書籍留思異同建計立議廓然發蒙天下延頸歌頌德音聞之于古見之于今深不可測高不可尋創法萬載垂此休風藝文類聚十六初學記十兩引許昌宮賦入南端以北眺望景福之嵯峨飛棟列以山峙長途邈以委蛇見欒櫨之交錯覩陽馬之承阿轉挾轕以相因若流水之揚波木無小而不礲材靡隱而不華懿采色而發越瑋巧飾之繁多雙轅承枌丹梁端直明窗列布綺井崱嶷其陰則有望舒涼室羲和溫房隆冬御絺盛夏重裳同一宇之深邃致寒暑于陰陽修欄蔭于階砌崇棟拂乎是倉綺組發華翡翠生光丹草周隅靈木成行非窈窕之至貴孰能升于斯堂坐金人于闈闥列鍾虡于廣庭天鹿軒翥以揚怒師子鬱拂而負楨珍果敷華蘭芷垂榮百璧照曜飛響應聲扣角則春風至彈商則秋風征歷神芝之峻觀幸安昌之巍巍設御座于鞫城觀奇材之曜暉二六對而講功體便捷其若飛進鼓舞之祕伎絶世俗而入微興七盤之遞奏觀輕捷之翾翾振華足以卻蹈若將絶而復連鼓震動而不亂足相續而不并婉轉鼓側蜲蛇丹庭或遲或速乍止乍旋似飛鳧之迅疾若翔龍之遊天趙女撫琴楚媛清謳秦箏慷慨齊舞絶殊衆技並奏捔巧騁奇千變萬化不可勝知樂戲闋遊觀足登承光坐華幄論稽古反流俗退虛偽進敦朴寶賢良賤珠玉豈必世而後仁在時主之所欲藝文類聚六十二七牧翻放袂而赴節文選陸機日出東南隅行注座右銘重階連棟必濁汝真金寶滿室將亂汝神厚味來殃豔色危身求高反墜務厚更貧閉情塞欲老氏所珍周廟之銘仲尼是遵審慎汝口戒無失人從容順時和光同塵無謂冥漠人不汝聞無謂幽冥處獨若群不為福先不與禍鄰守玄執素無亂大倫常若臨深終始惟純藝文類聚二十二
