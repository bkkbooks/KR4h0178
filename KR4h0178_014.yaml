body:
  text: 陳王植二寶刀賦并序并序寶刀賦并序建安中魏王命有司造寶刀五枚三年乃就以龍虎熊馬雀為識太子得一余及余弟饒陽侯各得一焉其餘二枚家王自杖之賦曰有皇漢之明后思明達而玄通飛文藻以博致揚武備以禦凶乃熾火炎爐融鐵挺英烏獲奮椎歐冶是營扇景風以激氣飛光鑑於天庭爰告祠於太乙乃感夢而通靈然後礪以五方之石鑒以中黃之壤規圓景以定環攄神思而造象垂華紛之葳蕤流翠采之滉漾故其陸斷犀革水斷龍角輕擊浮截刃不纖流踰南越之巨闕超西楚之泰阿實真人之攸御永天祿而是荷九華扇賦并序并序九華扇賦并序昔吾先君常侍得幸漢桓帝賜尚方竹扇其扇不方不圓其中結成文名曰九華故為此賦其辭曰有神區之名竹生不周之高岑對緑水之素波背玄澗之重深體虛暢以立幹播翠葉以成林形五離而九華篾黧解而縷分效虬龍之蜿蟬法虹霓之氤氳攎微妙以歷時絢九層之華文爾乃浸以芷若拂以江蘺搖以五香濯以蘭池因形致好不常厥儀方不應矩圓不中規隨皓腕以徐轉發惠風之寒微時氣清以方厲紛飄動兮紈綺扇賦情駘蕩而外得心悅豫而內安增吳氏之姣好發西子之玉顏初學記十九御覽三百八十一酒賦并序并序酒賦并序余覽楊雄酒賦辭甚瑰瑋頗戲而不雅聊作酒賦粗究其終始賦曰嘉儀氏之造思亮茲美之獨珍嗟麯糵之殊味仰酒旗之景曜協嘉號於天辰穆公酣而興霸漢祖醉而蛇分穆生以醴而辭楚侯嬴感爵而增深諒千鍾之可慕何百觚之足云其味有亮沂久載休名宜城醪醴蒼梧縹清或秋藏冬發或春醞夏成或雲拂潮涌或素蟻浮萍爾乃王孫公子遊俠翱翔將承芬以接意會陵雲於朱堂獻酬交錯宴笑無方於是飲者並醉縱橫喧譁或揚袂屢舞或扣劍清歌或嚬噈辭觴或奮爵橫飛或歎驪駒既駕或稱朝露未晞於斯時也質者或文剛者或仁卑者忘賤寠者忘貧和睚眥之宿憾雖怨讎其必親於是矯俗先生聞之而歎曰噫夫言何容易此乃淫荒之源非作者之事若耽于觴酌流情縱逸先王所禁君子所斥敘嘉賓之歡會惟耽樂之既闋日暗暗於桑榆兮命僕夫而皆逝韻補四引酒賦安沈湎而為娛非往聖之所述闢酒誥之明戒同元凶於三季韻補四引酒賦車渠碗賦惟斯碗之所生于涼風之浚濱采金光之定色擬朝陽而發輝豐玄素之暐暐帶朱榮之葳蕤縕絲綸以肆采藻繁布以相追翩飄颻而浮景若驚鵠之雙飛隱神璞於西野彌百葉而莫希于時乃有明篤神后廣被仁聲夷慕義而重使獻茲寶於斯庭命公輸使制匠窮妍麗之殊形華色粲爛文若點成鬱蓊雲蒸蜿蟬龍征光如激電影若浮星何神怪之巨偉信一覽而九雖離珠之聰目內炫耀而失精何明麗之可悅超群寶而特章俟君子之間燕酌甘醴於斯觥既娛情而可貴故求御而不忘迷迭香賦播西都之麗草兮應青春而凝暉流翠葉於纖柯兮結微根於丹墀信繁華之速實兮弗見凋於嚴霜芳莫秋之幽蘭兮麗崑崙之英芝既經時而收采兮遂幽殺以增芳去枝葉而持御兮入綃穀之霧裳附玉體以行止兮順微風而舒光芙蓉賦覽百卉之英茂無斯華之獨靈結修根於重壤泛清流而擢莖退潤王宇進文帝庭竦芳柯以從風奮纖枝之璀璨其始榮也皎若夜光尋扶桑其揚暉也晃若九陽出暘谷芙蓉蹇産菡萏星屬絲條垂珠丹榮吐緑焜焜韡韡爛若龍燭觀者終朝情猶未足於是狡童媛女相與同遊擢素手於羅袖接紅葩於中流植橘賦有朱橘之珍樹于鶉火之遐鄉稟太陽之烈氣嘉杲日之休光體天然之素分不遷徙于殊方播萬里而遙植列銅爵之園廷背江川之暖氣處玄朔之肅清邦換壤別爰用喪生處彼不凋在此先零朱實不凋焉得素榮惜寒暑之不均嗟華實之永乖仰凱風以傾葉冀炎氣之所懷揚鳴條以流響晞越鳥之來栖夫靈德之所感物無微而不和神蓋幽而易激信天道之不訛既萌根而弗幹諒結葉而不華漸玄化而弗變非彰德於邦家附微條以歎息哀草木之難化槐賦羡良木之華麗爰獲貴於至尊憑文昌之華殿森列峙乎端門觀朱欀之振條據文陛而結根楊沈陰以博覆似明后之垂恩在季春以初茂踐朱夏而乃繁覆陽精之炎景散流耀以增鮮白鶴賦嗟皓麗之素鳥兮含奇氣之淑祥薄幽林以屏處兮蔭重景之餘光狹單巢於弱條兮懼衝風之難當無沙棠之逸志兮欣六翮之不傷承邂逅之僥幸兮得接翼於鸞凰同毛衣之氣類兮信休息之同行痛美會之中絶兮遘嚴災而逢殃拜太息而祗懼兮抑吞聲而不揚傷本規之違忤悵離群而獨處恆竄伏以窮栖獨哀鳴而戢羽冀大綱之難結得奮翅而遠遊聆雅琴之清韻記六翮之末流鶡賦并序并序鶡賦并序鶡之為禽猛氣其鬭終無勝負期於必死遂賦之焉美遐圻之偉烏生大行之嵓阻體貞剛之烈性亮乾德之所輔戴毛角之雙立揚玄黃之徑羽甘沈隕而重辱有節士之儀矩降居擅澤高處保岑遊不同嶺棲必異林若有翻雄駭遊孤雌驚翔則長鳴挑敵鼓翼專場踰高越壑雙戰隻僵階侍斯珥俯耀文墀成武官之首飾增庭燎之高暉鸚鵡賦美中州之令鳥越衆類之殊名感陽和而振翼遁太陰以存形遇旅人之嚴網殊六翮之無遺身挂滯於重籠孤雌鳴而獨歸豈豫身之足惜憐衆雛之未飛分靡軀以潤鑊何全濟之敢希蒙含育之厚德奉君子之光輝怨身輕而施重恐往惠之中虧常戢心以懷懼雖處安其若危永哀鳴其報德庶終來而不疲離繳雁賦并序并序離繳雁賦并序余遊於武陵中有雁離繳不能復飛顧命舟人追而得之故憐而賦焉憐孤雁之偏特兮情惆焉而內傷尋淑類之殊異兮稟上天之休祥含中和之純氣兮赴四節而征行遠玄冬於南裔兮避炎夏於朔方白露淒以飛揚兮秋風發乎西商感節運之復至兮假魏道而翱翔接羽翮以南北兮情逸豫而永康望范氏之發機兮播纖繳以凌雲挂微軀之輕翼兮忽頽落而離群旅暗驚而鳴遠兮徒矯首而莫聞甘充君之下廚膏函牛之鼎鑊蒙生全之顧覆何恩施之隆博於是縱軀歸命無慮無求飢食稻粱渴飲清流射雉賦暮春之月宿麥盈野野雊群飛初學記三鷂雀賦鷂雀賦鷂欲取雀雀自言雀微賤身卑些少肌肉瘠瘦所得蓋少君欲相噉實不足飽鷂得雀言初不敢語頃來轗軻資糧乏旅三日不食略思死鼠今日相得寧復置汝雀得鷂言意甚征營性命至重雀鼠貪生君得一食我命是傾皇天降鑑賢者是聽鷂得雀言意甚怛惋當死斃雀頭如果蒜不早首服烈頸大喚行人聞之莫不往觀雀得鷂言意甚不移依一棗樹藂蕽多刺目如擘椒跳蕭二翅我當死矣略無可避鷂乃置雀良久方去二雀相逢似是公嫗相將入草共上一樹仍敘本末辛苦相語向者共出為鷂所捕賴我翻捷體素便附説我辨語千條萬句欺恐舍長令兒大怖我之得免復勝於兔自今徙意莫復相妬言雀者但食牛矢中豆馬矢中粟御覽八百四十一引鷂雀賦此疑自言雀微賤句下脫文神龜賦并序并序神龜賦并序龜壽千歲時有遺余龜者數日而死肌肉消盡唯甲存焉余感而賦之曰嘉四靈之建德各潛位乎一方蒼龍虬於東嶽白虎嘯於西岡玄武集於寒門朱雀棲於南鄉順仁風以消息應聖時而后翔嗟神龜之奇物體乾坤之自然下夷方以則地上規隆而法天順陰陽以呼吸藏景曜於重泉餐飛塵以實氣飲不竭於朝露步容趾以俯仰時鸞回而鶴顧忽萬載而不恤周無疆於太素感白靈之翔翥卒不免乎豫且雖見珍於宗廟罹刳剝之重辜欲訴怨於上帝將等愧乎遊魚懼沉泥之逢殆赴芳蓮以巢居安玄雲而好靜不淫翔而改度昔嚴周之抗節援斯靈而托喻嗟祿運之屯蹇終遇獲於江濱歸籠檻以幽處遭淳美之仁人晝顧瞻以終日夕撫順而接晨遘淫災以殞越命勦絶而不振天道昧而未分神明幽而難燭黃氏沒於空澤松喬化於扶木蛇折鱗於平皋龍脫骨於深谷亮物類之遷化疑斯靈之解殼蟬賦唯夫蟬之清素兮潛厥類乎太陰在盛陽之仲夏兮始遊豫乎芳林實淡泊而寡欲兮獨咍樂而長吟聲皎皎而彌厲兮似貞士之介心內含和而弗食兮與衆物而無求棲高枝而仰首兮賴朝露之清流隱柔桑之稠葉兮快間居而遁暑苦黃雀之作害兮患螂螳之徑斧冀飄翔而遠托兮毒蜘蛛之網罟欲降身而卑竄兮懼草蟲之襲豫免衆難而弗獲兮遙遷集乎宮宇依名果之茂陰兮托修幹以靜處有翩翩之狡童兮步容與於園圃體離朱之聰視兮姿才捷於猴猿條罔葉而不挽兮樹無幹而不緣翳輕驅而奮進兮跪側足以自間恐余身之驚駭兮精曾睨而目連持柔竿之冉冉兮運微黏而我纏欲翻飛而愈滯兮知性命之長捐委厥體於膳夫歸炎炭而就燔秋霜紛以宵下晨風裂其過庭氣憯怛而薄軀足攀木而失莖吟嘶啞以沮敗狀枯稿以喪形辭曰詩歎鳴蜩聲嘒嘒兮盛陽則來大陰逝兮皎皎貞素侔夷節兮帝臣是戴尚其潔兮蝙蝠賦吁何姦氣生茲蝙蝠形殊性詭每變常式行不由足飛不假翼明伏暗動盡似鼠形謂鳥不似二足為毛飛而含齒巢不哺鷇空不乳子不容毛群斥逐羽族下不蹈陸上不馮木九詠芙蓉車兮桂衡結萍蓋兮翠旌四蒼虬兮翼轂駕陵魚兮驂鯨菌薦兮席蕙幬兮苓床抗南箕兮簸瓊蕊挹天河兮滌玉觴靈既降兮泊靜默登文階兮坐紫房服春榮兮猗靡雲裾繞兮容裔冠北辰兮岌峨帶虹兮陵厲蘭肴御兮玉俎陳雅音奏兮文虞羅感漢廣兮羡遊女揚激楚兮詠湘娥臨回風兮浮漢渚目牽牛兮眺織女交有際兮會有期嗟痛吾兮來不時來無見兮進無聞泣下雨兮嘆成雲先后悔其靡及冀后土之一悟猶搦轡而繁策馳覆車之危路群乘舟而無揖將何川而能度何世俗之蒙昧悼邦國之未靜椒蘭其望治由倒裳而求領尋湘漢之長流採芳岸之靈芝遇遊女於水裔採菱花而結詞野蕭條以極望曠千里而無人民生期於必死何自苦以終身寧作清水之沉泥不為濁路之飛塵蔓葛滋兮冒神宇文選潘安仁寡婦賦李注引九詠何孤客之可悲文選謝靈運七里瀨詩李注引九詠皇祇降兮潛靈舞文選顏延年三月三日曲水詩序李注引九詠靈龍兮銜組流羽兮交橫文選顏延年三月三日曲水詩序李注引九詠停舟兮焉待舉帆兮安追書鈔一百三十八引九詠溫風翕兮煎沙石鳥罔竄兮獸無跖御覽三十四引九詠乘逸嚮兮執電鞭忽而往兮恍而旋御覽三百五十九引九詠越江兮刈蘭暮秋兮薄寒被簑兮戴笠置露兮踐雚御覽七百六十五引九詠徒勤躬兮苦心文選王簡栖頭陀寺碑文李注引擬九詠抗玉手吹簫書鈔一百十一引九歌詠瞍文詳素箏抗玉桴兮駭鼉鼓書鈔一百八引九歌詠又一百二十一引作楚辭過穴兮清泠木鳴條兮動心書鈔一百五十八引七詠踐丹穴兮觀鸞居通朱雀兮息南巢書鈔一百五十八引七詠運蘭棹以速往回波之容與書鈔一百三十八引擬楚辭建五旗兮華采占揚雲麾兮龍鳳書鈔一百二十引擬辭訴流風兮上邁貝船兮荷蓋書鈔一百三十七引擬辭遙逝遙逝哀秋氣之可悲兮涼風肅其嚴厲神龍盤於重泉兮騰蛇蟄於幽穴書鈔一百五十八寫灌均上事令孤前令寫灌均所上孤章三臺九府所奏事及詔書一通置之坐隅孤欲朝夕諷詠以自警誡也毀鄄城故殿令令鄄城有故殿名漢武帝殿昔武帝好遊行或所幸處也梁桷傾頓棟宇零落修之不成良宅置之終於毀壞故頗撤取以備宮舍余時獲疾望風乘虛卒得恍惚數日後瘳而醫巫妄説以為武帝魂神生茲疾病此小人之無知愚惑之甚者也昔湯之隆也則夏館無餘迹武之興也則殷臺無遺基周之亡也則伊洛無隻椽秦之滅也則阿房無尺梠漢道衰則建章撤靈帝崩則兩宮燔高祖之魂不能未央孝明之神不能救德陽天子之存也必居名邦土則死有知亦當逍遙于華都留神於舊室則甘泉通天之臺雲陽九層之閣足以綏神育靈夫何戀於下縣而居靈於朽宅哉以生喻死則不然也況於死者之無知乎且聖帝明王顧宮闕之泰苑囿之侈有妨於時者或省以惠人況漢氏絶業大魏龍興隻人尺土非復漢有是以咸陽則魏之西都伊洛為魏之東京故夷朱雀而樹閶闔平德陽而建泰極況下縣腐殿為狐貍之窟藏者乎今將撤壤以修殿舍恐無知之人坐自生疑故為此令亦足以反惑而解迷焉黃初五年令令夫遠不可知者天也近不可知者人也傳曰知人則哲堯猶病諸諺曰人心不同若其面焉唯女子與小人為難養也近之則不遜遠之則怨詩云憂心悄悄慍于群小自世間人從或受寵而背恩或無故而入叛違顧左右曠然無信大嚼者咋斷其舌右手執斧左手執鉞傷夷一身之中尚有不可信況於人乎唯無深瑕潛釁隱過匿愆乃可以為人君上行刀鋸於左右耳前後無其人也諺曰穀千駑不如養一驢又曰穀駑養虎大無益也乃知韓昭侯之使藏弊袴良有以也使臣有三品有可以仁義化者有可以恩惠驅者此二者不足以導之則當以刑罰使之刑罰復不足以率之則明聖所以不畜故唐堯至仁不能容無益之子湯武至聖不能養無益之臣九折臂知為良醫吾知所以待下矣諸吏各敬爾在位孤推一概之平功之宜賞於疏必與罪之宜戮在親不赦此令之行有若皎日於戲群臣其覽之哉又黃初六年令曰吾昔以信人之心無忌於左右深為東郡太守王機防輔吏倉輯等任所誣白獲罪聖朝身輕於鴻毛而謗重於泰山賴蒙帝主天地之仁違百師之典議舍三千之首戾反我舊居襲我初服雲雨之施焉有量哉反旋在國揵門退掃形景相守出入二載機等吹毛求瑕千端萬緒然終無可言者及到雍又為監官所舉亦以紛若於今復三年矣然卒歸不能有病於孤者信心足以貫於神明也昔熊渠李廣武發石開鄒子囚燕中夏霜下杞妻哭梁山為之崩固精神可以動天地金石何況於人乎今皇帝遙過鄙國曠然大赦與孤更始欣笑和樂以歡孤隕涕咨嗟以悼孤豐賜光厚訾重千金損乘輿之副竭中黃之府名馬充廄驅牛塞路孤以何德而當斯惠孤以何功而納斯貺富而不吝寵至不驕者則周公其人也孤小人爾身更以榮為戚何者將恐簡易之尤出於細微脫爾之愆一朝復露也故欲修吾往業守吾初志欲使皇帝恩在摩天使孤心常存入地將以全陛下厚德究孤犬馬之年此難能也然孤固欲行衆人之所難詩曰德輶如毛人鮮克舉之此之謂也故為此令著於宮門欲使左右共觀志焉
