body:
  text: 王肅格虎賦羽騎雲布蘭車星陳文選謝靈運擬魏太子鄴中集詩注請為大司馬曹真臨弔表在禮大臣之喪天子臨弔諸侯之薨又庭哭焉同姓之臣崇于異姓自秦逮漢多闕不修暨光武頗遵其禮于時群臣莫不競勸博士范升上疏稱揚以為美可依舊禮為位而哭之敦睦宗族通典八十一奉詔為瑞表太和六年上將幸許昌過繁昌詔問受禪碑生黃金白玉應瑞不肅奏以始改之元年嘉瑞見于踐祚之壇宜矣御覽五百八十九論祕書丞郎表青龍中議祕書丞郎與博士議郎同職近日月宜在三臺上肅表曰臣以為祕書職于三臺為近密中書郎在尚書丞郎上祕書丞郎宜次尚書郎下不然則宜次侍御史下祕書丞郎俱四百石遷宜比尚書郎出亦宜為郡此陛下崇儒術之盛旨也昔時祕書掌國祕密祕書丞郎儀宜比尚書郎侍御史今尚書郎侍御史皆乘犢車奏事用尺一而祕書丞郎獨乘鹿車猶用尺奏不得朝服又恐非陛下轉臺郎以為祕書丞郎之本意也通典二十六初學記十二兩引又御覽二百三十三兩引祕書不應屬少府表青龍之末主者啓選祕書監詔祕書騶吏以上三百餘人非但學問義理當用有威嚴能檢下者詔肅以常侍領焉肅表曰魏之祕書即漢之東觀郡國稱敢言之上東觀且自大魏分祕書而為中書以來傳緒相繼于今三監未有隸名于少府者也今欲使臣編名于騶隸言事于外府不亦隳朝章而辱國典乎太和之中蘭臺祕書爭議三府奏議祕書司先王之載籍掌制書之典謨與中書相亞宜與中書為官聯御覽二百三十三表夫城之有郭猶裏之有表骨之有皮表裏各異則保障不完皮骨分離則一體不具初學記二十四御覽一百九十三賀瑞應表伏承祖廟文昭廟魚生于鼎臣聞易中孚彖曰信及豚魚言中和誠信之德下及豚魚則無所不及藝文類聚九十九諫征蜀疏前志有之千里饋糧士有飢色樵蘇後爨師不宿飽此謂平塗之行軍者也又況于深入阻險鑿路而前則其為勞必相百也今又加之以霖雨山坂峻滑衆逼而不展糧縣而難繼實行軍者之大忌也聞曹真發已踰月而行裁半谷治道功夫戰士悉作是賊偏得以逸而待勞乃兵家之所憚也言之前代則武王伐紂出關而復還論之近事則武文征權臨江而不濟豈非所謂順天知時通于權變者哉兆民知聖上以水雨艱劇之故休而息之日後有釁乘而用之則所謂悅以犯難民忘其死者矣魏志王肅傳陳政本疏除無事之位損不急之祿止浮食之費并從容之官使官必有職職任其事事必受祿祿代其耕乃往古之常式當今之所宜也官寡而祿厚則公家之費鮮進仕之志勸各展才力莫相倚杖敷奏以言明試以功能之與否簡在帝心是以唐虞之設官分職申命公卿各以其事然後惟龍為納言猶今尚書也以出內帝命而已夏殷不可得而詳甘誓曰六事之人明六卿亦典事者也周官則備矣五日視朝公卿大夫並進而司士辨其位焉其記曰坐而論道謂之三公作而行之謂之士大夫及漢之初依擬前代公卿皆親以事升朝故高祖躬追反走之周昌武帝遙可奉奏之汲黯宣帝使公卿五日一朝成帝始置尚書五人自是陵遲朝禮遂闕可復五日視朝之儀使公卿尚書各以事進廢禮復興光宣聖緒誠所謂名美而實厚也魏志王肅傳請山陽公稱皇配諡疏昔唐禪虞虞禪夏皆終三年之喪然後踐天子之尊是以帝號無虧君禮猶存今山陽公承順天命允答民望進禪大魏退處賓位公之奉魏不敢不盡節魏之待公優崇而不臣既至其薨櫬斂之制輿徒之飾皆同之于王者是故遠近歸仁以為盛美且漢總帝皇之號曰皇帝有別稱帝無別稱皇則皇是其差輕者也故當高祖之時土無二王其父見在使稱皇明非二王之嫌也況今以贈終可使稱皇以配其諡魏志王肅傳上疏請恤役平刑大魏承百王之極生民無幾干戈未戢誠宜息民而惠之以安靜遐邇之時也夫務畜積而息疲民在于省徭役而勤稼穡今宮室未就功業未訖運漕調發轉相供奉是以丁夫疲于力作農者離其南畝種穀者寡食穀者衆舊穀既沒新穀莫繼斯則有國之大患而非備豫之長策也今見作者三四萬人九龍可以安聖體其內足以列六宮顯陽之殿又向將畢惟泰極已前功夫尚大方向盛寒疾疢或作誠願陛下發德音下明詔深愍役夫之疲勞厚矜兆民之不贍取常食廩之士非急要者之用選其丁壯擇留萬人使一期而更之咸知息代有日則莫不悅以即事勞而不怨矣計一歲有三百六十萬夫亦不為少當一歲成者聽且三年分遣其餘使皆即農無窮之計也倉有溢粟民有餘力以此興功何功不立以此行化何化不成夫信之于民國家大寶也仲尼曰自古皆有死民非信不立夫區區之晉國微微之重耳欲用其民先示以信是故原雖將降顧信而歸用能一戰而霸于今見稱前車駕當幸洛陽發民為營有司命以營成而罷既成又利其功力不以時遣有司徒營其目前之利不顧經國之體臣愚以為自今以後儻復使民宜明其令使必如期若有事以次寧復更發無或失信凡陛下臨時之所行刑皆有罪之吏宜死之人也然衆庶不知謂為倉卒故願陛下下之于吏而暴其罪鈞其死也無使汙于宮掖而為遠近所疑且人命至重難生易殺氣絶而不續者也是以聖賢重之孟軻稱殺一無辜以取天下仁者不為也漢時有犯蹕驚乘輿馬者廷尉張釋之奏使罰金文帝怪其輕而釋之曰方其時上使誅之則已今下廷尉廷尉天下之平也一傾之天下用法皆為輕重民安所措其手足臣以為大失其義非忠臣所宜陳也廷尉者天子之吏也猶不可以失平而天子之身反可以惑謬乎斯重于為已而輕于為君不忠之甚也周公曰天子無戲言言則史書之工誦之士稱之言猶不戲而況行之乎故釋之之言不可不察周公之戒不可不法也魏志王朗傳禘祭議武宣皇后太和四年六月崩至六年三月有司以今年四月禘告王肅議曰今宜以崩年數案春秋魯閔公二年夏禘于莊公是時縗絰之中至二十五月大祥便禘不復禫故譏其速也去四年六月武宣皇后崩二十六日晚葬除服即吉四時之祭皆親行事今當計始除服日數當如禮須到禫月乃禘通典四十九又奏趙怡等以為皇帝崩二十七月之後乃得禘祫王肅又奏如鄭玄言各于其廟則無以異四時常祀不得謂之殷祭以粢盛百物豐衍備具為殷之者夫孝子盡心于事親致敬于四時比時具物不可以不備無緣儉于其親纍年而後一豐其饌也夫謂殷者因以祖宗並陳昭穆皆列故也設以為毀廟之主皆祭謂殷者夫毀廟祭于太祖而六廟獨在其前所不合宜非事之理近尚書難臣以曾子問唯祫于太祖群主皆從而不言禘知禘不合食臣答以為禘祫殷祭群主皆合舉祫則禘可知也論語孔子曰禘自既灌而往者吾不欲觀之矣所以特禘者以禘大祭故欲觀其盛禮也禘祫大祭獨舉禘則祫亦可知也于禮記則以祫為大于論語則以禘為盛進退未知其可也漢光武時下祭禮以禘者毀廟之主皆合于太祖祫者唯未毀之主合而已矣鄭玄以為禘者各于其廟原其所以夏商夏祭曰禘然其殷祭亦名大禘商頌長發是大禘之歌也至周改夏祭曰礿以禘唯為殷祭之名周公以聖德用殷之禮故魯人亦遂以禘為夏之名是以左傳所謂禘于武宮又曰蒸嘗禘于廟是四時祀非祭之禘也鄭斯失矣至于經所謂禘者則殷祭之謂鄭據春秋與大義乖通典四十九議祀圓丘方澤宜宮縣樂八佾舞王者各以其禮制事天地今説者據周官單文為經國大體懼其局而不知弘也漢武帝東巡封禪還祠太一于甘泉祭后土于汾陰皆盡用其樂言盡用者謂盡用宮縣之樂也天地之性貴質者蓋謂其器之不文爾不謂庶物當復減之也禮天子宮縣舞八佾今祀圓丘方澤宜以天子制設宮縣之樂八佾之舞宋書樂志一通典一百四十七又議説者以為周家祀天唯舞雲門祭地唯舞咸池宗廟唯舞大武侶失其義矣周禮賓客皆作備樂左傳王子頽享五大夫樂及遍舞六代之樂也然則一會之日具作六代之樂矣天地宗廟事之大者賓客燕會比之為細王制曰庶羞不踰牲燕衣不踰祭服可以燕樂而踰天地宗廟之樂乎周官以六律六呂同五聲八音六舞大合樂以致鬼神以和邦國以諧萬民以安賓客以説遠人夫六律六呂五聲八音皆一時而作之至于六舞獨分擘而用之所以懕人心也又周官韎師掌教𩎟樂祭祀則帥其屬而舞之大享亦如之𩎟東夷之樂也又鞮鞻氏掌四夷之樂與其聲歌祭祀則次而歌之燕亦如之四夷之樂乃入宗廟先代之典獨不得用大享及燕日如之者明古今夷夏之樂皆主之于宗廟而後播及其餘也夫作先王樂者貴能包而用之也納四夷之樂者美德廣之所及也高皇大皇帝太祖高祖文昭廟皆宜兼用先代及武始太鈞之舞宋書樂志一通典一百四十七郊廟樂舞議周官以六律五聲八音六舞大合樂以致鬼神以和邦國以諧兆庶以安賓客以悅遠人是謂六同一時皆作今六代舞獨分用之不懕人心隋書音樂志上任昉據王肅議告瑞祀天宜以地配議禮有事于王父則以王母配不降于四時常祀而不配也且夫五精之帝非重于地今奉嘉瑞以告而地獨闕于義未通以地配天于義正宜通典五十五祀社議太尉等祭祀但稱名不稱臣每有事須告皆遣祝史通典四十五祀五郊六宗及厲殃議厲殃漢之淫祠耳日月有常位五帝有常典師曠自是樂祖無事于厲殃厲殃同人非禮器雄黃等非禮飾漢文除祕祝所以稱仁明也通典五十五已遷主諱議高皇諱明皇帝既祔儒者遷高皇主尚書來訪宜復諱不及引殷家乃或同名答曰殷家以甲乙為字既二名不偏諱且殷質故也禮所謂捨故而諱新諸侯則五代不諱天子之制恐不得與諸侯同五代則不諱也春秋魯諱具敖二山五代之後可不復為諱然已易其名則故名不復諱也猶漢元后父名禁改禁中為省中至今遂以省中為稱非能為元后諱徒以名遂行故也春秋時晉范獻子適魯名其二山自以為不學當獻子時魯不復為二名諱而獻子自以為犯其諱直所謂不學者也禮曰詩書臨文廟中皆不諱此乃謂不諱見在之廟不謂已毀者也文王名昌武王名發成王時頌曰克昌厥後駿發爾私箕子為武王陳洪範曰使羞其行而邦其昌厲王名胡其子宣王時詩曰胡不相畏先祖于摧其孫幽王時詩曰哀今之人胡為虺蜴此則詩書不諱明驗也案漢氏不名諱常曰臣妾不得以為名字其言事不諱蓋取諸此也然則周禮其不諱時則非唯詩書臨文廟中其餘皆不諱矣今可太祖以上去墠乃不諱諱三祖以下盡親如禮唯詩書臨文廟中不諱自此以後雖百代如漢氏故事臣妾唯不得以為名字其言事不諱所謂魏國于漢禮有損益質文隨時亦合尊之大義也通典一百四諸王國相宜為國王服斬縗議尚書左丞王焸除陳相未到國而王薨議者或以為宜齊縗或以為宜無服王肅云王國相本王之丞相案漢景帝時貶為相成帝時使理人王則國家所以封王相則國家使為王臣但王不與理人之事耳而云相專為理人不純臣于王非其義也今焸至許昌而聞王薨姓名未通恩紀未交君臣未禮不責人之所不能于義未正服君臣之服傳曰策名委質二乃辟也若夫未策名未委質不可以純君臣之義也禮婦人入門未三月廟見死猶歸葬于其黨不得以六禮既備又以入室遂成其婦禮也則臣之未委質者亦不得備其臣禮也曾子問曰娶女有吉日而女死如之何孔子曰壻齊縗而弔既葬而除之夫死亦如之各以其服如服斬縗斬縗而弔之既葬而除之也今焸為王相未入國而王薨義與女未入門夫死同則焸宜服斬縗既葬而除之此禮之明文也禮曰與諸侯為親者服斬雖有親為臣則服斬縗也臣為其君服之或曰宜齊縗不亦遠于禮乎通典八十八王侯在喪襲爵議魏尚書奏以故漢獻帝嫡孫杜氏鄉侯劉康襲爵假授使者拜授康素服奪情議案周禮天子公卿諸侯吉服皆玄冕朱裏玄衣纁裳有喪凶則變之麻冕黼裳邦君麻冕蟻裳云麻冕者則素冕麻不加采色又變其裳亦非純吉亦不純凶漢氏承秦改六冕之制以玄冠絳衣一服而己有喪凶之事則變吉服以從簡易故諸王薨遣使者拜嗣子為王則玄冠縗絰服素以承詔命事訖然後反喪服考之前典則差周書論之漢室則合常制王肅議尊者臨卑不制縗麻故為之素服今康處三年喪在縗絰之中若因喪以命之則無復素服若以尊崇王命則吉服以拜授案尚書康王受策命吉服而受之事畢又以吉服出應門內以命諸侯皆出然後王釋冕服故臣以為諸侯受天子之命宜以吉服又禮處三年之喪而當除父兄之喪服除服卒事然後反喪服則受天子命者亦宜服其命服使者出反喪服即位而哭即合于禮又合人情詔從之通典七十二弔陳群母議臣有父母之喪計君弔之弔諸臣之母當從夫爵通典八十三臘議季冬大儺旁磔雞出土牛以送寒氣即今之臘除逐疫磔雞葦絞桃梗之屬御覽三十三答尚書難太和六年尚書難王肅以曾子問唯祫于太祖群主皆從而不言禘知禘不合食肅答曰以為祫禘殷祭群主皆合舉祫則禘可知也通典四十九答劉氏弟子問司徒廣陵陳矯字季弼本劉氏養于陳氏及其薨劉氏弟子疑所服以問王肅答曰昔陳司徒喪母諸儒陳其子無服甚失禮矣為外祖父母小功此以異姓而有服者豈不以母之所生反重于父之所生不亦左乎為人後者其婦為舅姑大功婦他人也猶為夫故父母降一等祖至親也而可以無服乎推婦降一等則子孫宜依本親而降一等通典六十九答尚書訪景初中明帝崩于建始殿殯于九龍殿尚書訪曰當以明皇帝諡告四祖祝文于高皇稱玄孫之子云何王肅曰禮稱曾孫某謂國家也荀爽鄭玄説皆云天子諸侯事曾祖以上皆稱曾孫又訪案漢既葬容衣還儒者以為宜如文皇帝故事以存時所服王肅曰禮雖無容衣之制今須容衣還而後虞祭宜依尸服卒者上服之制生時褻服可隨所存至于制度則不如禮孔子曰祭之以禮亦為此也諸侯之上服則今服也天子不為命服然亦所以命服之上也案漢氏西京故事月遊衣冠則容衣也言冠以正服不以褻衣也尚書又訪容衣還群臣故當在帳中常填衛見王肅曰禮不墓祭而漢氏正月上陵神座在西序東向百辟計吏前告郡之穀價人之疾苦欲先帝魂靈聞知時蔡雍以為禮有煩而不可去事亡如存況今無填衛之禁而合于如事存之意可見于門內拜訖入帳臨乃除服通典七十九答武竺訪尚書郎武竺有同母異父昆弟之喪以訪王肅肅據子思書曰言氏之子達于禮乎禮父同居服周則子宜大功也通典九十一廣平太守下教問張臻家前在京都聞張子明來至問之會其已亡致痛惜之此君篤學隱居不與時競以道樂身昔絳縣老人屈在泥塗趙孟升之諸侯用睦愍其耄勤好道而不蒙榮寵書到遣吏勞問其家顯題門戶務加殊異以慰既往以勸將來魏志管寧傳與廣陵太守書昔瓠巴鼓瑟六馬仰秣書鈔一百九孔子家語解序鄭氏學行五十載矣自肅成童始志于學而學鄭氏學矣然尋文責實考其上下義理不安違錯者多是以奪而易之世未明其款情而謂其苟駮前師以見異于人乃慨然而歎曰豈好難哉豫不得已也聖人之門方壅不通孔氏之路枳棘充焉豈得不開而辟之哉若無由之者亦非豫之罪也是以撰經禮申明其義及朝論制度皆據所見而言孔子二十二世孫有孔猛者家有其先人之書昔相從學頃還家方取以來與豫所論有若重規疊矩昔仲尼曰文王既沒文不在茲乎天之將喪斯文也後死者不得與于斯文也天之未喪斯文匡人其如豫何言天喪斯文故令已傳斯文于天下今或者天未欲亂斯文故令從豫學而豫從猛得斯論己明相與孔氏之無違也斯皆聖人實事之論而恐其將絶故特為解以貽好事之君子語云牢曰子云吾不試故藝談者不知為誰多妄為之説孔子家語弟子有琴張一名牢字子開亦字張衛人也宗魯死將往弔孔子止焉春秋外傳曰昔堯臨民以五説者曰堯五載一巡狩五載一巡狩不得稱臨民以五經曰五載一巡狩此乃説舜之文非説堯孔子説論五帝各道其異事于舜云巡狩天下五載一始則堯之巡狩年數未明周十二歲一巡寧可言周臨民以十二乎孔子曰堯以土德王天下而色尚黃黃土德五土之數故曰臨民以五此其義也毛晉重刻北宋本家語宗廟頌明德惟馨昊天子之眷祐我魏薄言起之起之伊何黎元時雍子之伊何曆數在躬於乎盛哉神明是通初學記十三湛湛甘露濟濟醴泉或涌于地或降于天天地交泰品類蕃蕪祥瑞嘉應其集如雨屢獲豐年穀我士女祖考既饗於惟樂胥初學記十三賀正儀元正首祚琁機改度伏稱萬壽初學記四納徵辭玄纁束帛儷皮鴈羊晉書禮志下家誡夫酒所以行禮養性命歡樂也過則為患不可不慎是故賓主百拜終日飲酒而不得醉先王所以備酒禍也凡為主人飲客使有酒色而已無使至醉若為人所強必退席長跪稱父戒以辭之敬仲辭君而況于人乎為客又不得唱造酒史也若為人所屬下坐行酒隨其多少犯令行罰示有酒而已無使多也禍變之興常于此作所宜深慎藝文類聚二十三
