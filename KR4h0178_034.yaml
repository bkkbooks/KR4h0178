body:
  text: 劉廙論治道表昔者周有亂臣十人有婦人焉九人而已孔子稱才難不其然乎明賢者難得也況亂斃之後百姓凋盡士之存者蓋亦無幾股肱大職及州郡督司邊方重任雖備其官亦未得人也此非選者之不用意蓋才匱使之然耳況于長吏以下群職小任能皆簡練備得其人也其計莫如督之以法不爾而數轉易往來不已送迎之煩不可勝計轉易之間輒有姦巧既于其事不省而為政者亦以其不得久安之故知惠益不得成于己而苟且之可免于患皆將不念盡心于恤民而夢想于聲譽此非所以為政之本意也今之所以為黜陟者近頗以州郡之毀譽聽往來之浮言耳亦皆得其事實而課其能否也長吏之所以為佳者奉法也憂公也恤民也此三事者或州郡有所不便往來者有所不安而長吏執之不已于治雖得計其聲譽未為美闕而從人于治難失計其聲譽必集也長吏皆知黜陟之在于此也亦何能不去本而就末哉以為長吏皆宜使小久足使自展歲課之能三年總計乃加黜陟課之皆當以事不得依名事者皆以戶口率其墾田之多少及盜賊發興民之亡叛者為得負之計如此行之則無能之吏修名無益有能之人無名無損法之一行雖無部司之監姦譽妄毀可得而盡魏志劉廙傳注引廙別傳上疏諫曹公親征蜀聖人不以智輕俗王者不以人廢言故能成功于千載者必以近察遠智周干獨斷者不恥于下問亦欲博采必盡于衆也且韋弦非能言之物而聖賢引以自匡臣才智暗淺願自比于韋弦昔樂毅能用弱燕破大齊而不能以輕兵定即墨者夫自為計者雖弱必固欲自潰者雖強必敗也自殿下起軍以來三十餘年敵無不破強無不服今以海內之兵百勝之威而孫權負險于吳劉備不賓于蜀夫夷狄之臣不當冀州之卒權備之籍不比袁紹之業然本初以亡而二寇未捷非暗弱于今而智武于昔也斯自為計者與欲自潰者異勢耳故文王伐崇三駕不下歸而修德然後服之秦為諸侯所征必服及兼天下東向稱帝匹夫大呼而社稷用隳是力斃于外而不恤民于內也臣恐邊寇非六國之敵而世不乏才土崩之勢此不可不察也天下有重得有重失勢可得而我勤之此重得也勢不可得而我勤之此重失也于今之計莫若料四方之險擇要害之處而守之選天下之甲卒隨方面而歲更焉殿下可高枕于廣廈潛思于治國廣農桑事從節約修之旬年則國富民安矣魏志劉廙傳上疏謝徙署丞相倉曹屬臣罪應傾宗禍應覆族遭乾坤之靈值時來之運揚湯止沸使不燋爛起煙于寒灰之上生華于已枯之木物不答施于天地子不謝生于父母可以死效難用筆陳魏志劉廙傳上言符讖侍中劉廙辛毗劉曄尚書令桓階尚書陳矯陳群給事黃門侍郎王毖董遇等言臣伏讀左中郎將李伏上事考圖緯之言以效神明之應稽之古代未有不然者也故堯稱曆數在躬璇璣以明天道周武未戰而赤烏銜書漢祖未兆而神母告符孝宣仄微字成木葉光武布衣名已勒讖是天之所命以著聖哲非有言語之聲芬芳之臭可得而知也徒縣象以示人微物以效意耳自漢德之衰漸染數世桓靈之末皇極于建暨于大亂二十餘年天之不泯誕生明聖以濟其難是以符讖先著以彰至德殿下踐阼未期而靈象變于上群瑞應于下四方不羈之民歸心向義唯懼在後雖典籍所傳未若今之盛也臣妾遠近莫不鳧藻魏志文帝紀注引獻帝傳奏議治受禪壇場漢氏遵唐堯公天下之議陛下以聖德膺曆數之運天人同欣靡不得所宜順靈符速踐皇阼問太史丞許芝今月十七日己未宜成可受禪命輒治壇場之處所當施行別奏魏志文帝紀注引獻帝傳奏具章拒禪伏惟陛下以大聖之純懿當天命之曆數觀天象則符瑞著明考圖緯則文義煥炳察人事則四海齊心稽前代則異世同歸而固拒禪命未踐尊位聖意懇惻臣等敢不奉詔輒具章遣使者魏志文帝紀注引獻帝傳奏請受禪臣等聞聖帝不違時明主不逆人故易稱通天下之志斷天下之疑伏惟陛下體有虞之上聖承土德之行運當亢陽明夷之會應漢氏祚終之數合契皇極同符兩儀是以聖瑞表徵天下同應曆運去就深切著明論之天命無所與議比之時宜無所與爭故受命之期時清日晏曜靈施光休氣雲蒸是乃天道悅懌民心欣戴而仍見閉拒于禮何居且群生不可一日無主神器不可以斯須無統故臣有違君以成業下有矯上以立事臣等敢不重以死請魏志文帝紀注引獻帝傳謝劉表箋謝劉表箋考掬過蒙分遇榮授之顯未有管狐桓文之烈孤德隕命精誠不遂兄望之見禮在昔既無堂構昭前之績中規不密用墜禍辟斯乃明神弗祐天降之災悔吝之負哀號靡及廙之愚淺言行多違懼有浸潤三至之間考掬之愛已衰望之之責猶存必傷天慈既往之分門戶殪滅取笑明哲是用迸竄永涉川路即日到廬江尋陽昔鍾儀有南音之操椒舉有班荊之思雖遠猶邇敢忘前施魏志劉廙傳注引廙別傳答太子命通草書書初以尊卑有踰禮之常分也是以貪守區區之節不敢修草必如嚴命誠知勞謙之素不貴殊異若彼之高而惇白屋如斯之好苟使郭隗不輕于燕九九不忽于齊樂毅自至霸業以隆虧匹夫之節成巍巍之美雖愚不敏何敢以辭魏志劉廙傳答丁儀刑禮書崇飾侈言欲其往來文選左思三都賦序注難丁廙夫以禮興刑以徑理人情也北堂書鈔四十三戒弟偉夫交友之美在于得賢不可不詳而世之交者不審擇人務合黨衆違先聖人交友之義此非厚己輔仁之謂也吾觀魏諷不修德行而專以鳩合為務華而不實此直攪世沽名者也卿其慎之勿復與通魏志劉廙傳注引廙別傳政論夫為政者譬猶工匠之造屋也廣廈既成衆梲不安則梁棟為之斷折一物不備則千柱為之並廢善為屋者知深梲之不可以不安故棟梁常存知一物之不可以不備故衆榱與之共成也善為政者知一事之不可闕也故無物而不備知一是之不可失也故衆非與之共得其不然者輕一事之為小忽而闕焉不知衆物與之共多也覩一非之為小也輕而蹈焉不知衆是與之共失也夫政之相須猶輗轄之在車無輗轄猶可以小進也謂之歷遠而不頓躓者未之有也夫為政者輕一失而不矜之猶乘無轄之車安其少進而不覩其頓躓之患也夫車之患近故無不覩焉國之患遠故無不忽焉知其體者夕惕若厲慎其愆矣夫為政者莫善于清其吏也故選託于由夷而又威之以篤罰欲其貪之必懲令之必從也而姦益多巧彌大何也知清之為清而不知所以清之故免而無恥也日欲其清而薄其祿祿薄所以不得成其清夫飢寒切于肌膚固人情之所難也其甚又將使其父不父子不子兄不兄弟不弟夫不夫婦不婦矣貧則仁義之事狹而怨望之心篤從政者捐私門而委身于公朝榮不足以光室族祿不足以代其身骨肉飢寒離怨于內朋友離叛衰捐于外虧仁孝損名譽能守之而不易者萬無一也不能原其所以然又將佐其室族之不和合門之不登也疑其名必將忘其實因而下之不移之士雖苦身于內冒謗于外捐私門之患畢死力于國然猶未獲見信之衷不免黜放之罪故守清者死于溝壑而猶有遺謗于世也為之至難其罰至重誰能為之哉人知守清之必困于終也違清而又懼卒罰之及其身也故不為昭昭之行而咸思暗昧之利姦巧機于內而虛名逸于外人主貴其虛名而不知賤其所以為名也虛名彰于世姦實隱于身人主眩其虛必有以暗其實矣故因而貴之敬而用之此所謂惡貪而罰于由夷好清而賞于盜跖也名實相違好惡相錯此欲清而不知重其祿之故也不知重其祿非徒失于清也又將使清分于私而知周于欺推此一失以至于欺苟欺之行何事而不亂哉故知清而不知所以重其祿者則欺而濁知重其祿而不知所以少其吏者則竭而不足知少其吏而不知所以盡其力者則事繁而職闕凡此數事相須而成偏廢則有者不為用矣其餘放欺無事而不若此者也不可得一二而載之耳故明君必須良佐而後致治非良佐能獨治也必須善法有以用之夫君猶醫也臣猶針也法陰陽補瀉也針非人不入人非針不徹千病二者既備而不知陰陽補瀉則無益于疾也又況逆失之哉今用針而不存于善術使所針必死夫然也欲其疾之療亦遠良醫急于速療而不恃針入之無恙也明君急于治平而不恃亡失之不便亡也正名夫名不正則其事錯矣物無制則其用淫矣錯則無以知其實淫則無以禁其非故王者必正名以督其實制物以息其非名其何以正之哉曰行不美則名不得稱稱必實所以然效其所以成故實無不稱于名名無不當于實也曰物又何以制之哉曰物可以養生不可廢之于民者富之備之無益于養生而可以寶于世者則隨尊卑而為之制使不為此官不得服此服不得備此飾故其物甚可欲民不得服雖捐之曠野而民不敢取也雖簡于禁而民皆無欲也是以民一于業本務而末息有益之物阜而賤無益之寶省而貴矣所謂貴者民貴願之也匪謂賈貴于市也故其政惠其民潔其法易其業大昔人曰唯器與名不可以假人其此之謂與慎愛夫人主莫不愛愛己而莫知愛已者之不足愛也故惑小臣之佞而不能廢也忘違己之益已而不能用也夫犬之為猛也莫不愛其主矣見其主則騰踊而不能自禁此歡愛之甚也有非則鳴吠而不遑于夙夜此自效之至也昔宋人有沽酒者酒酸而不售何也以其有猛犬之故也夫犬知愛其主而不能為其主慮酒酸之患者不噬也夫小臣之欲忠其主也知愛之而不能去其嫉妬之心又安能敬有道為己願稷契之佐哉此養犬以求不貧愛小臣以喪良賢也悲夫為國者之不可不察也審愛為人君者莫不利小人以廣其視聽謂視聽之可以益于己也今彼有惡而己不見無善而己愛之者何也智不周其惡而義不能割其情也己不能割情于所愛慮不能覩其得失之機彼亦能見己成敗于所暗割私情以事其上哉其勢適足以厚姦人之資此朋黨者之所以日固獨善之所以孤弄也故視聽日多而暗蔽日甚豈不詭哉欲失夫人君莫不願衆心之一于己也而疾姦黨之比于人也欲得之而不知所以得之故欲之益甚而不可得亦甚疾之益力而為之者亦益勤矣何也彼將恐其黨也任之而不知所以信之朝任其身夕訪于惡惡無毀實善無賞分事無大小訪而後知彼衆之不必同于道也又知訪之不能于己也雖至誠至忠俾曾參以事其親借龍逢以貫其忠猶將屈于私交況世俗之庸臣哉故為君而欲使其臣之無黨者得其人也得其人而使必盡節于國者信之于己也疑賢自古人君莫不願得忠賢而用之也既得之莫不訪之于衆人也忠于君者豈能必利于人苟無利于人又何能保譽于人哉故常願之于心而常先之于人也非願之之不篤而失之也所以定之之術非也故為忠者獲小賞而大乖違于人恃人君之獨知之耳而獲訪之于人此為忠者福無幾而禍不測于身也得于君不過斯須之歡失于君而終身之故患荷賞名而實窮于罰也是以忠者逝而遂智者慮而不為為忠者不利則其為不忠者利矣凡利之所在人無不欲人無不欲故無不為不忠矣為君者以一人而獨慮于衆姦之上雖至明而猶困于見暗又況庸君之能覩之哉庸人知忠之無益于己而私名之可以得于人得于人可以重于君也故篤私交薄公義為已者殖而長之為國也抑而割之是以真實之人黜于國阿欲之人盈于朝矣由是田季之恩隆而齊魯之政衰也雖成之市朝示之刀鋸私欲益盛齊魯日困何也誠威之以言而賞之以實也好惡相錯政令日斃昔人曰為君難不其然哉任臣人君所以尊敬人臣者以其知任人臣委所信而保治于己也是以其聽察其明昭身日高而視日下事日遠而聽日近業至難而身至易功至多而勤至少也若多疑而自任也則其臣不思其所以為國而思其所以得于君深其計而淺其事以求其指撝人主淺之則不陷于之難人主深之則進而順之以取其心所闕者忠于國而難明于君者也所修者不必忠于國而易行于時者也因其所貴者貴之故能同其貴因其所賤者賤之故能殊于賤其所貴不必賢所賤者不必愚也家懷因循之術人為悅心易見之行夫美大者深而難明利長者不可以倉卒形也故難明長利之事廢于世阿易見之行塞于側為非不知過知困不知其乏此為天下共一人之智以一人而獨治于四海之內也其業大其智寡豈不蔽哉以一蔽主而臨不量之阿欲能不惑其功者未之有也苟惑之則人得其志矣人得其志則君之志失矣君勞臣逸上下易所是一君為臣而萬臣為君也以一臣而事萬君鮮不用矣有不用人之名而終為人所用也是以明主慎之不貴知所用于己而貴知所用于人能用人故人無不為己用也昔舜恭己正南面而已天下不多皋陶稷契之數而貴聖舜獨治之功故曰為之者不必名其功獲其業者不必勤其身也其舜之謂與下視夫自足者不足自明者不明日月至光至大而有所不遍者以其高于衆之上也燈燭至微至小而無不可之者以其明之下能照日月之所蔽也聖人能覩往知來不下堂而知四方蕭牆之表有所不喻焉誠無所以知之也夫有所以知之無遠而不覩無所以知之雖近不如童昏之履之也人豈踰于日月而皆賢于聖哉故高于人之上者必有以應于人其察之也視下視下者見之詳矣人君誠能知所不知不遺燈燭童昏之見故無不可知而不知也何幽冥之不盡況人情之足蔽哉
