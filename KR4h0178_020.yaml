body:
  text: 中山王袞疾困敕令官屬疾困敕令官屬吾寡德忝寵大命將盡吾既好儉而聖朝著終誥之制為天下法吾氣絶之日自殯及葬務奉詔書昔衛大夫蘧瑗葬濮陽吾望其墓常想其遺風願託賢靈以弊髮齒營吾兆域必往從之禮男子不卒婦人之手亟以時成東堂堂成名之曰遂志之堂輿疾往居之魏志中山恭王袞傳令世子汝幼少未聞義方早為人君但知樂不知苦不知苦必將以驕奢為失也接大臣務以禮雖非大臣老者猶宜答拜事兄以敬恤弟以慈兄弟有不良之行當造膝諫之諫之不從流涕喻之喻之不改乃白其母若猶不改當以奏聞并辭國土與其守寵罹禍不若貧賤全身也此亦謂大罪惡耳其微過細故當掩覆之嗟爾小子慎修乃身奉聖朝以忠貞事太妃以孝敬閨闈之內奉令于太妃閫閾之外受教于沛王無怠乃心以慰豫靈魏志中山恭王袞傳與魏文帝書漢中地形實為險固四嶽三塗皆不及也張魯有精鉀數萬臨高守要一夫揮戟千人不得進而我軍過之若駭鯨之決細網奔兕之觸魯縞未足以喻其易也御覽三百五十三八百十九上書謝原罪臣少不由道過在人倫長竊非任遂蒙含貸性無檢度知足之分而有豺狼無厭之質老惛倍貪觸突國網罪迫三千不在赦宥當就辜誅棄諸市朝猶蒙天恩骨肉更生臣仰視天日愧負靈神俯惟愆闕慚愧怖悸不能雉經以自裁割謹塗顏闕門拜章陳情魏志曹洪傳注引魏略六代論臣聞古之王者必建同姓以明親親必樹異姓以明賢賢故傳曰庸勳親親昵近尊賢書曰克明俊德以親九族詩云懷德維寧宗子維城由是觀之非賢無與興功非親無與輔治夫親親之道專用則其漸也微弱賢賢之道偏任則其弊也劫奪先聖知其然也故博求親疏而竝用之近則有宗盟藩衛之固遠則有仁賢輔弼之助盛則有與共其治衰則有與守其土安則有與享其福危則有與同其禍夫然故能有其國家保其社稷曆紀長久本枝百世也今魏尊尊之法雖明親親之道未備詩不云乎鶺鴒在原兄弟急難以斯言之明兄弟相救于喪亂之際同心于憂禍之閒雖有鬩牆之忿不忘禦侮之事何則憂患同也今則不然或任而不重或釋而不任一旦疆場稱警關門反拒股肱不扶胸心無衛臣竊惟此寢不安席思獻丹誠貢策朱闕謹撰合所聞敘論成敗論曰昔夏殷周歷世數十而秦二世而亡何則三代之君與天下共其民故天下同其憂秦王獨制其民故傾危而莫救夫與民共其樂者人必憂其憂與民同其安者人必拯其危先王知獨治之不能久也故與人共治之知獨守之不能固也故與人共守之兼親疏而兩用參同異而竝建是以輕重足以相鎮親疏足以相衛并兼路塞逆節不生及其衰也桓文帥禮苞茅不貢齊師伐楚宋不城周晉戮其宰王綱弛而復張諸侯慠而復肅二霸之後浸以陵遲吳楚憑江負固方城雖心希九鼎而畏迫宗姬姦情散于胸懷逆謀消于脣吻斯豈非信重親戚任用賢能枝葉碩茂本根賴之與自此之後轉相攻伐吳并不越晉分為三魯滅于楚鄭兼于韓暨于韓國諸姬微矣惟燕衛獨存然皆弱小西迫彊秦南畏齊楚憂懼滅亡匪遑相恤至于王赧降為庶人猶枝幹相持得居虛位海內無主四十餘年秦據勢勝之地騁譎詐之術征伐關東蠶食九國至于始皇乃定天位曠日若彼用力若此豈非深固根蒂不拔之道乎易曰其亡其亡繫于苞桑周德其可謂當之矣秦觀周之弊將以為小弱見奪于是廢五等之爵立郡縣之官棄禮樂之教任苛刻之政子弟無尺寸之封功臣無立錐之地內無宗子以自毗輔外無諸侯以為藩衛仁心不加于親戚惠澤不流于枝葉譬猶芟刈股肱獨任胸腹浮舟江海捐棄楫櫂觀者為之寒心而始皇晏然自以為關中之固金城千里子孫帝王萬世之業也豈不悖哉是時淳于越諫曰臣聞殷周之王分子弟功臣千有餘城今陛下君有海內而子弟為匹夫卒有田常六卿之臣而無輔弼何以相救事不師吉而能長久者非所聞也始皇聽李斯偏說而絀其議至于身死之日無所寄付委天下之重于凡夫之手託廢立之命于奸臣之口至令趙高之徒誅鉏宗至胡亥少習刻薄之教長遭凶父之業不能改制易法寵任兄弟而乃師謨申商咨謀趙高自幽深宮委政讒賊身殘望夷求為黔首豈可得哉遂乃郡國離心衆庶潰叛勝廣倡之于前劉項弊之于後向使始皇維納淳于之策抑李斯之論割裂州國分王子弟封三代之後報功臣之勞士有常君民有定主枝葉相夫首尾為用雖使子孫有失道之行時人無湯武之賢奸謀未發而身已屠戮何區區之陳項而復得措其手足哉故漢祖奮三尺之劍驅烏集之衆五年之中遂成帝業自開闢以來其興立功勳未有若漢祖之易也夫伐深根者難為功摧枯朽者易為力理勢然也漢監秦之失封殖子弟及諸呂擅權圖危劉氏而天下所以不傾動百姓所以不易心者徒以諸侯彊大盤石膠固東牟朱虛授命于內齊代吳楚作衛于外故也向使高祖踵亡秦之法忽先王之制則天下已傳非劉氏有也然高祖封建地過古制大者跨州兼郡小者連城數十上下無別權牟京室故有吳楚七國之患賈誼曰諸侯彊盛長亂起奸夫欲天下之治安莫若衆諸侯而少其力令海內之勢若身之使臂臂之使指則下無背叛之心上無誅伐之事文帝不從至于孝景猥用朝錯之計削黜諸侯親者怨恨疏者震恐吳楚倡謀五國從風兆發高帝釁鍾文景由寬之過制急之不漸故也所謂末大必折尾大難掉尾同于體猶或不從況乎非體之尾其可掉哉武帝從主父之策下推恩之令自是之後齊分為七趙分為六淮南三割梁代五分遂以陵遲子孫微弱衣食租稅不預政事或以酎金免削或以無後國除至于成帝王氏擅朝劉向諫曰臣聞公族者國之枝葉枝葉落則本根無所庇蔭方今同姓疏遠母黨專政排擯宗室孤弱公族非所以保守社稷安固國嗣也其言深切多所稱引成帝雖悲傷歎息而不能用至于哀平異姓秉權假周公之事而為田常之亂高拱而竊天位一朝而臣四海漢宗室王侯解印釋紱貢奉社稷猶懼不得為臣妾或乃為之符命頌莽恩德豈不哀哉由斯言之非宗子獨忠孝于惠文之閒而叛逆于哀平之際也徒以權輕勢弱不能有定耳賴光武皇帝挻不世之姿禽王莽于已成紹漢嗣于既絶斯豈非宗子之力邪而曾不監秦之失策襲周之舊制踵亡國之法而徼幸無疆之期至于桓靈閹豎執衡朝無死難之臣外無同憂之國君孤立于上臣弄權于下本末不能相御身首不能相使由是天下鼎沸奸凶竝爭宗廟焚為灰燼宮室變為榛藪居九州之地而身無所安處悲夫魏太祖武皇帝躬聖明之資兼神武之略恥王綱之廢絶愍漢室之傾覆龍飛譙沛鳳翔兗豫掃除凶逆翦滅鯨鯢迎帝西京定都潁邑德動天地義感人神漢氏奉天禪位大魏大魏之興于今二十有四年矣觀五代之存亡而不用其長策覩前車之傾覆而不改其轍迹子弟王空虛之地君有不使之民宗室竄于閭閻不聞邦國之政權均匹夫勢齊凡庶內無深根不拔之固外無磐石宗盟之助非所以安社稷為萬世之業也且今之州牧郡守古之方伯諸侯皆跨有千里之土兼軍武之任或比國數人或兄弟竝據而宗室子弟曾無一人閒廁其閒與相維持非所以彊幹弱枝備萬一之虞也今之用賢或超為名都之主或為偏師之帥而宗室有文者必限以小縣之宰有武者必置于百人之上使夫廉高之士畢志于衡軛之內才能之人恥與非類為伍非所以勸進賢能褒異宗室之禮也夫泉竭則流涸根朽則葉枯枝繁者蔭根條落者本孤故語曰百足之蟲至死不僵以扶之者衆也此言雖小可以譬大且墉基不可倉卒而成威名不可一朝而立皆為之有漸建之有素譬之種樹久則深固其本根茂盛其枝葉若造次徙于山林之中植于宮闕之下雖壅之以黑墳暖之以春日猶不救于枯槁而何暇繁育哉夫樹猶親戚土猶士民建置不久則輕下慢上平居猶懼其離叛危急將若之何是以聖王安而不逸以慮危也存而設備以懼亡也故疾風卒至而無摧拔之憂天下有變而無傾危之患矣魏志武文世王公傳注引魏氏春秋又見文選以昔夏殷周已下為六代論與司馬宣王書賤子爽哀惶恐怖無狀招禍分受屠滅前遣家人迎糧于今未反數日乏匱當煩見餉以繼旦夕魏志曹爽傳注引魏未傳為兄爽表司馬懿為太傅大司馬臣亡父真奉事三朝入備冢宰出為上將先帝以臣肺腑遺緒獎飾拔擢典兵禁省進無忠恪積纍之行退無羔羊自公之節先帝聖體不豫臣雖奔走侍疾嘗藥曾無精誠翼日之應猥與太尉懿俱受遺詔且慚且懼靡所底告臣聞虞舜序賢以稷契為先成湯褒功以伊呂為首審選博舉優劣得所斯誠輔世長民之大經録勳報功之今典自古以來未之或闕今臣虛暗位冠朝首顧惟越次中心愧惕敢竭愚情陳寫至實夫天下之達道者三謂德爵齒也懿本以高明中正處上司之位名足鎮衆義足率下一也包懷大略允文允武仍立征伐之勳遐邇歸功二也萬里旋旆親受遺詔翼亮皇家內外所向三也加之耆艾紀綱邦國體練朝正論德則過于吉甫樊仲課功則踰于方叔召虎凡此數者懿實兼之臣抱空名而處其右天下之人將謂臣以宗室見私知進而不知退陛下岐嶷克明克類如有以察臣之言臣以為宜以懿為太傅大司馬上昭陛下進賢之明中顯懿身文武之實下使愚臣免于謗誚魏志曹爽傳注引魏書爽使弟羲為表申蔣濟叔嫂服議敵體可服不必尊卑緣情制禮不必同族兄弟親而伯叔疏周服者何以尊服也伯叔母無有骨肉之親有緣尊之義故亦服周何獨不可緣親而服嫂乎苟以交報數然後服則妻母異域交亦疏矣緣愛制服恩亦微矣豈若嫂叔共在一門之內同統先人之祀有相奉養之義而無服紀之制豈不詭哉且防嫌之道推而遠之孰與制服引而重之推之則同他人引之則親親者矣通典九十二九品議伏見明論欲除九品而置中正以檢虛實一州闊遠略不相識訪不得知會復轉訪本郡先達者此為問州中正而實決于郡人御覽二百六十五引曹羲集至公議夫世人所謂掩惡揚善者君子之大義保明同好者朋友之至交斯言之作蓋閭閻之日談所以救愛憎之相謗崇居厚之大分耳非篤正之至理折中之公議也世士不斷其數而係其言故善惡不分以覆過為弘朋友忽義以雷同為美善惡不分亂實由之朋右雷同敗必從焉談論者以當實為清不以過難為貴相知者以等分為交不以雷同為固是以達者存其義不察于文識其心不求于言且在私論猶行之有節明處公議則無所固之矣凡智者之處世咸欲興化致治者也興化致治不崇公抑口割口情以順理厲清議以督俗明是非以宣教者吾未見其功也清議非臧否不顯是非非賞罰不明故臧否不可以遠實賞罰不可以失中若乃背清議違是非雖堯不能一日以治審臧否詳賞罰故中王可以萬世安是以君子知私情之難統至公之易行故季友鴆兄而不疑叔向戮弟而不悔斯二士者皆前世之通士晉魯之忠臣也亦豈無慈愛骨肉之心愍恤同生之仁哉夫至公者天之經也地之義也理之要也人之用也昔鯀者親禹之父也舜則殛鯀而興禹禹知舜之殛其父無私故受命而不辭舜明禹知已之至公故用之而無疑無私者雖父黜而子不言況用之于他哉藝文類聚二十二御覽四百二十九肉刑刑夫言肉刑之濟治者荀卿所唱班固所述隆其趣則曰像天地為之惟明察其用則曰死刑重而生刑輕其所馳騁極于此矣治則刑重亂則刑輕藝文類聚五十四殺人者死傷人者刑是百王之所同固未達夫用刑之本矣夫死刑者不唯殺人妖逆是除天地之道也傷人者不改斯亦妖逆之類也如其可改此則無取于肉刑也且傷人殺人皆非人性之自然也必有由然者也夫有由而然者激之則淫敦之則一激之也者動其利路敦之也者篤其質朴故在上者議茲本要不營奇思行之以𥳑守之以靜大則其隆足以牟天地中則其理可以厚民萌下則刑罰可以無殘虐民靜理則其化為惡之尤者衆之所棄衆之所棄則無改之驗著矣夫死之可以有生而欲增淫刑以利暴刑暴刑所加雖云懲慢之由興有使之然謂之宜生生之可也舍死折骸又何辜耶猶稱以滿堂而飲有向隅哀泣則一堂為之不樂在上者洗濯其心靜而民足各得其性何懼乎姦之不勝乃欲斷截防轉而入死乎藝文類聚五十四議復肉刑嚴刑以殺犯之者寡刑輕易犯蹈惡者多臣謂玩常苟免犯法乃衆鯨刖彰刑而民甚恥且創黥刖見者知禁彰罪表惡亦足以畏所以易曰小懲大戒豈蹈惡者多耶假使多惡尚不至死無妨産育苟必行殺為惡縱害而不已將至死無人天無以人君無以尊矣故人寧過不殺是以為上寧寬得衆若乃于張聽訟刑以止刑不可革舊過此以往肉刑宜復肉刑于死為輕減死五百為重重不害生足以懲姦輕則知禁禁民為非所謂相濟經常之法議云不可或未知之也御覽六百四十八引王隱晉書
