body:
  text: 長沙桓王獲太史慈教龍欲騰翥先階尺水且今署慈為門下督須軍還當更議初學記三十引獻帝春秋詐令軍中頃連雨水濁兵飲之多腹痛令促具甖缶數百口澄水吳志宗室孫靜傳給周瑜鼓吹令周公瑾英儁異才與孤有總角之好骨肉之分如前在丹陽發眾及船糧以濟大事論德酬功此未足以報者也吳志周瑜傳注引江表傳又見文選袁宏三國名臣序贊注御覽五百六十七明漢將軍謝表臣以固陋孤持邊陲陛下廣播高澤不遺細節以臣襲爵兼典名郡仰榮顯顧所不克堪興平二年十二月二十日于吳郡曲阿得袁術所呈表以臣行殄寇將軍至被詔書乃知詐擅雖輒捐廢猶用悚悸臣年十七喪失所怙懼有不任堂構之鄙以忝析薪之戒誠無去病十八建功世祖列將弱冠佐命臣初領兵年未弱冠雖駑懦不武然思竭微命惟術狂惑為惡深重臣憑威靈奉辭罰罪庶必獻捷以報所授吳志孫討逆傳注引吳錄策上表謝討黃祖表臣討黃祖以十二月八日到祖所屯沙羨縣劉表遣將助祖並來趣臣臣以十一日平旦部所領江夏太守行建威中郎將周瑜領桂陽太守行征虜中郎將呂範領零陵太守行蕩寇中郎將程普行奉業校尉孫權行先登校尉韓當行武鋒校尉黃蓋等同時俱進身跨馬擽陳手擊急鼓以齊戰勢吏士奮激踊躍百倍心精意果各競用命越渡重壍迅疾若飛火放上風兵激煙下弓弩並發流矢雨集日加辰時祖乃漬爛鋒刃所截猋火所焚前無生寇惟祖迸走獲其妻息男女七人斬虎狼韓晞已下二萬餘級其赴水溺者一萬餘口船六千餘艘財物山積雖表未禽祖宿狡猾為表腹心出作爪牙表之鴟張以祖氣息而祖家屬部曲掃地無餘表孤特之虜成鬼行尸誠皆聖朝神武遠振臣討有罪得效微勤吳志孫討逆傳注引吳錄答記呂布海產明珠所在為寶楚雖有才晉實用之英偉君子所游見珍何必本州哉吳志張紘傳注引吳書說劉勳書說劉勳書海昏上繚宗人數欺下國患之有年矣擊之路繇不便幸因將軍之神武而臨之且上繚國富廩實吳娃越姬充于後庭明珠大貝被于帑藏取之可以資軍雖蜀郡成都金碧之府未能過也策願舉敝邑士卒以為外援上繚宗民數欺下國忿之有年矣擊之路不便願因大國伐之上繚甚實得之可以富國請出兵為外援魏志劉曄傳與吳景等書今征江東未知二三君意云何耳吳志宗室孫賁傳注引江表傳與虞翻書今日之事當與卿共之勿謂孫策作郡吏相待也吳志虞翻傳注引江表傳使詰降人王朗問逆賊故會稽大守王朗朗受國恩當官云何不惟報德而阻兵安忍大軍征討幸免梟夷不自掃屏復聚黨眾屯住郡境遠勞王誅卒不悟順捕得云降庶以欺詐用全首領得爾與不具以狀對魏志王朗傳注引獻帝春秋詔孫慮假節開府治半州期運擾亂凶邪肆虐威罰有序干戈不戢以慮氣志休懿武略夙昭必能為國佐定大業故授以上將之位顯以殊特之榮寵以兵馬之勢委以偏方之任外欲威振敵虜厭難萬里內欲鎮撫遠近慰卹將士誠慮建功立事竭命之秋也慮其內修文德外經武訓持盈若沖則滿而不溢敬慎乃心無忝所受吳志孫慮傳注引吳書夏口議還都建業詔諸將吏勿拘位任其有計者為國言之吳志孫奐傳注引江表傳大赦天下詔朕以不德肇受元命夙夜兢兢不遑假寢思平世難救濟黎庶上答神祇下慰民望是以眷眷勤求俊傑將與戮力共定海內苟在同心與之偕老今使持節督幽州領青州牧遼東太守燕王久嗋賊虜隔在一方雖乃心于國其路靡緣今因天命遠遣二使款誠顯露章表殷勤朕之得此何喜如之雖湯遇伊尹周獲呂望世祖未定而得河右方之今日豈復是過普天一統於是定矣書不云乎一人有慶兆民賴之其大赦天下與之更始其明下州郡咸使聞知特下燕國奉宣詔恩令普天率土備聞斯慶吳志大帝傳封公孫淵為燕王詔故魏使持節車騎將軍遼東太守平樂侯天地失序皇極不建元惡大憝作害于民海內分崩群生堙滅雖周餘黎民靡有孑遺方之今日亂有甚焉朕受厤數君臨萬國夙夜戰戰念在弭難若涉淵水罔知攸濟是以把旄杖鉞翦除凶虐自東徂西靡遑寍處苟力所及民無災害雖賊虜遺種未伏辜誅猶繫囚枯木待時而斃惟將軍天姿特達兼包文武觀時覩變審於去就踰越險阻顯致赤心肇建大計為天下先元勳巨績侔于古人雖昔竇融背棄隴右卒占西河以定光武休名美實豈復是過欽嘉雅尚朕實欣之自古聖帝明王建化垂統以爵襃德以祿報功功大者祿厚德盛者禮崇故周公有夾輔之勞太師有鷹揚之功並啟土宇兼受備物今將軍規萬年之計建不世之略絕僭逆之虜順天人之肅濟成洪業功無與比齊魯之事奚足言哉詩不云乎無言不讎無德不報今以幽青二州十七郡七十縣封君為燕王使持節守太常張彌授君璽綬策書金虎符第一至第五竹使符第一至第十錫君玄土苴以白茅爰契爾龜用錫冢社方有戎事典統兵馬以大將軍曲蓋麾幢督幽州青州牧遼東太守如故今加君九錫其敬聽後命以君三世相承保綏一方寍集四郡訓及異俗民夷安業無或攜貳是用錫君大輅戎輅玄牡二駟君務在勸農嗇人成功倉庫盈積官民俱豐是用錫君袞冕之服赤舄副焉君正化以德敬下以禮敦義崇謙內外咸和是用錫君軒縣之樂君宣導休風懷保邊遠遠人迴面莫不影附是用錫君朱戶以居君運其才略官方任賢顯直錯枉群善必舉是用錫君虎賁之士百人君戎馬整齊威震遐方糾虔天刑彰厥有罪是用錫君鈇鉞各一君文和于內武信于外禽討逆節折衝掩難是用錫君彤弓一彤矢百玈弓十玈矢千君忠勤有效溫恭為德明允篤誠感于朕心是用錫君秬鬯一卣珪瓚副焉欽哉敬茲訓典寅亮天工相我國家永終爾休吳志大帝傳注引江表傳寬逋詔兵久不輟民困于役歲或不登其寬諸逋勿復督課吳志大帝傳答陳表詔先將軍有功于國國家以此報之卿何得辭焉吳志陳武傳嘉禾三年以表領新安都尉初表所受賜復人得二百家在會稽新安縣表𥳑視其人皆堪好兵乃上疏陳讓乞以還官充足精銳詔曰云云呂岱平賊詔厲負險作亂自致梟首桓凶狡反覆已降復叛前後討伐歷年不禽非君規略誰能梟之忠武之節于是益箸元惡既除大小震懾其餘細類埽地族矣自今已去國家永無南顧之虞三郡晏然無怵惕之驚又得惡民以供賦役重用歎息賞不踰月國之常典制度所宜君其裁之吳志呂岱傳詔議奔喪夫三年之喪天下之達制人情之極痛也賢者割哀以從禮不肖者勉而致之世治道泰上下無事君子不奪人情故三年不逮孝子之門至于有事則殺禮以從宜要絰而處事故聖人制法有禮無時則不行遭喪不奔非古也蓋隨時之宜以義斷恩也前故設科長吏在官當須交代而故犯之雖隨糾坐猶已廢曠方事之殷國家多難凡在官司宜各盡節先公後私而不恭承甚非謂也中外群僚其更平議務令得中詳為節度吳志大帝傳又見御覽五百五十二改年號詔間者赤烏集于殿前朕所親見若神靈以為嘉祥者改年宜以赤烏為元吳志大帝傳詔責諸葛瑾步騭朱然呂岱等袁禮還云與子瑜子山義封定公相見並以時事當有所先後各自以不掌民事不肯便有所陳悉推之伯言承明伯言承明見禮泣涕懇惻辭旨辛苦至乃懷執危怖有不自安之心聞此悵然深自刻怪何者夫惟聖人能無過行明者能自見耳人之舉措何能悉中獨當已有以傷拒眾意忽不自覺故諸君有嫌難耳不爾何緣乃至于此乎自孤興軍五十年所役賦凡百皆出于民天下未定孼類猶存士民勤苦誠所貫知然勞百姓事不得已耳與諸君從事自少至長髮有二色以謂表裏足以明露公私分計足用相保盡言直諫所望諸君拾遺補闕孤亦望之昔衛武公年過志壯勤求輔弼每獨歎責且布衣韋帶相與交結分成好合尚污垢不異今日諸君與孤從事雖君臣義存猶謂骨肉不復是過榮福喜戚相與共之忠不匿情智無遺計事統是非諸君豈得從容而已哉同船濟水將誰與易齊桓諸侯之霸者耳有善管子未嘗不歎有過未嘗不諫諫而不得終諫不止今孤自省無桓公之德而諸君諫諍未出于口仍執嫌難以此言之孤于齊桓良優未知諸君于管子何如耳久不相見因事當陳共定大業整齊天下當復有誰凡百事要所當損益樂聞異計匡所不逮吳志大帝傳權使中郎將袁禮告謝諸大將因問時事所當損益禮還復有詔責數諸葛瑾步騭朱然呂岱等云云天下無粹白之狐而有粹白之裘眾之所積也夫能以駁致純不惟積乎故能用眾力則無敵于天下矣能用眾智則無畏于聖人矣吳志大帝傳注引江表傳選郎吏詔郎吏者宿衛之臣古之命士也閒者所用頗非其人自今選三署皆依四科不得以虛辭相飾吳志大帝傳注引江表傳載權正月記詔禁農桑時役事蓋君非民不立民非穀不生頃者以來民多征役歲又水旱年穀有損而吏不良侵奪民時以致饑困自今以來督軍郡守其謹察非法當農桑時以役事擾民者舉正以聞吳志大帝傳詔止議立皇后四王今天下未定民物勞瘁且有功者或未錄饑寒者尚未恤割土壤以豐子弟崇爵位以寵妃妾孤甚不取其釋此議吳志大帝傳百官奏請立皇后及四王詔曰云云詔陸遜代顧雍為丞相朕以不德應期踐運王塗未一姦宄充路夙夜戰懼不遑鑒寐惟君天資聰叡明德顯融統任上將匡國弭難夫有超世之功者必膺光大之寵懷文武之才者必荷社稷之重昔伊尹隆湯呂尚翼周內外之任君實兼之今以君為丞相使使持節守太常傅常授印綬君其茂昭明德脩乃懿績敬服王命綏靖四方於乎總司三事以訓群寮可不敬與君其勖之其州牧都護領武昌事如故吳志陸遜傳詔勿殺叛將妻子督將亡叛而殺其妻子是使妻去夫子棄父甚傷義教自今勿殺也吳志大帝傳注引江表傳論步騭表言防魏詔呂岱諸葛恪道步騭說北人欲以布囊盛土塞江每讀此表令人連日失笑此江自天地以來寍有可塞者乎初學記六引環濟吳紀詔息鑄大錢謝宏往日陳鑄大錢云以廣貨故聽之今聞民意不以為便其省息之鑄為器物官勿復出也私家有者勑以輸藏計畀其直勿有所枉也吳志大帝傳注引江表傳詔作太初宮建業宮乃朕從京來所作將軍府寺耳材柱率細皆以腐朽常恐損壞今未復西可徙武昌宮材瓦更繕治之吳志大帝傳改作太初宮注引江表傳大禹以卑宮為美今軍事未己所在多賦若更通伐妨損農桑徙武昌材瓦自可用也同上地震詔朕以寡德過奉先祀莅事不聰獲譴靈祇夙夜祗戒若不終日群僚其各厲精思朕過失勿有所諱吳志大帝傳注引江表傳黃龍見白虎仁詔古者聖王積行累義脩行道以有天下故符瑞應之所以表德也朕以不明何以臻茲書云雖休勿休公卿百司其勉脩所職以匡不逮吳志大帝傳赤鳥十一年四月雲陽言黃黃龍見五月鄱陽言白虎仁詔曰云云詔朱異迎降文欽方今北土未一欽云欲歸命宜且迎之若嫌其有譎者但當設計網以羅之盛重兵以防之耳吳志朱桓傳詔諸葛恪吾疾困矣恐不復相見諸事一以相委吳志諸葛恪傳注引吳書追贈步皇后策命惟赤烏元年閏月戊子皇帝曰嗚呼鳴后惟后佐命共承天地虔恭夙夜與朕均勞內教脩整禮儀不愆寬容慈惠有淑懿之德民臣懸望遠近歸心朕以世難未夷大統未一緣后雅志每懷謙損是以于時未授名號亦必謂后降年有永永與朕躬對揚天休不寤奄忽大命近止朕恨本意不早昭顯傷后殂逝不終天祿愍悼之至痛于厥心今使使持節丞相醴陵亭侯雍奉策授號配食先后魂而有靈嘉其寵榮嗚呼哀哉吳志妃嬪步夫人傳賜丞相顧雍書貴孫子直令問休休至與相見過于所聞為君嘉之吳志顧雍傳周瑜卒後下令故將軍周瑜程普其有人客皆不得問吳志周瑜傳答是儀令孤雖非趙簡子卿安得不自屈為周舍邪吳志是儀傳城武昌下令諸將夫存不忘亡安必慮危古之善教昔雋不疑漢之名臣于安平之世而刀劍不離于身蓋君子之于武備不可以已況今處身疆畔豺狼交接而可輕忽不豫思變難哉頃聞諸將出入各尚謙約不從人兵甚非備慮愛身之謂夫保已遺名以安君親孰與危辱宜深警戒務崇其大副孤意焉吳志大帝傳卿覽六百三十七寬息令軍興日久民離農畔父子夫婦不能相卹孤甚愍之今北虜縮竄方外無事其下州郡有以寬息吳志大帝傳斥張溫令昔令召張溫虛已待之既至顯授有過舊臣何圖凶醜專挾異心昔暨豔父兄附于惡逆寡人無忌故進而任之欲觀豔何如察其中閒形態果見而溫與之結連死生豔所進退皆溫所為頭角更相表裏共為腹背非溫之黨即就疵瑕為之生論又前任溫董督三郡指為吏客及殘餘兵時恐有事欲令速歸故授棨戟獎以威柄乃便到豫章表討宿惡寡人信受其言特以繞帳帳下解煩兵五千凡付之後聞曹丕自出淮泗故豫敕溫有急便出而溫悉內諸將布于深山被命不至賴丕自退不然已往豈可深計又殷禮者本占候召而溫先後乞將到蜀扇揚異國為之譚論又禮之還當親本職而令守尚書戶曹部如此署置在溫而己又溫語賈原當薦卿作御史語蔣康當用卿代賈原專衒賈國恩為已形勢揆其奸心無所不為不忍暴于市朝令斥還本郡以給厮吏嗚呼溫也免罪為幸吳志張溫傳令交州給送虞翻昔趙𥳑子稱諸君之唯唯不如周舍之諤諤虞翻亮直善于盡言國之周舍也前使翻在此此役不成促下問交州翻若尚存者給其人船發遣還都若以亡者送喪還本郡使兒子仕宦吳志虞翻傳注引江表傳白曹公狀嚴刺史昔為公所用又是州舉將而李術凶惡輕犯漢制殘害州司肆其無道宜速誅滅以懲醜類今欲討之進為國朝掃除鯨鯢退為舉將報塞怨讎此天下達義夙夜所甘心術必懼誅復詭說求救明公所居阿衡之任海內所瞻願敕執事勿復聽受吳志大帝傳注引江表傳報劉備報劉備米賊張魯居王巴漢為曹操耳目規圖益州劉璋不武不能自守若操得蜀則荊州危矣今欲先攻取璋進討張魯首尾相連一統吳楚雖有十操無所憂也蜀志先主傳注引獻帝春秋與曹公牋春水方生公宜速去吳志大帝傳注引吳厤別紙與曹公足下不死孤不得安吳志大帝傳注引吳厤上魏王牋昔討關羽獲于將軍即白先王當發遣之此乃奉款之心不言而發先王未深留意而謂權中間復有異圖愚情慺慺用未果決遂值先王委離國祚殿下承統下情始通公私契闊未獲備舉是令本誓未即昭顯梁寓傳命委曲周至深知殿下以為意望權之赤心不敢有他願垂明恕保權所執謹遣浩周東里袞至情至實皆周等所具吳志大帝傳注引魏略文帝即王位權乃遣浩周為牋魏王權本性空薄文武不昭昔承父兄成軍之緒得為先王所見獎飾遂因國恩撫綏東土而中間寡慮庶事不明畏威忘德以取重戾先王仁恩不忍遐棄既釋其宿罪且開明信雖致命虜廷梟獲關羽功效淺薄未報萬一事業未究先王即世殿下踐祚威仁流邁私懼情願未蒙昭察梁寓來到具知殿下不遂疏遠必欲撫錄追本先緒權之得此欣然踴躍心開目明不勝其慶權世受寵遇分義深篤今日之事永執一心惟察慺慺重垂含覆同上先王以權推誠己驗軍當引還故除合肥之守著南北之信令權長驅不復後顧近得守將周泰全琮等白事過月六日有馬步七百徑到橫江又督將馬和復將四百人進到居巢琮等聞有兵馬渡江視之為兵馬所擊臨時交鋒大相殺傷卒得此問情用恐懼權實在遠不豫聞知約勑無素敢謝其罪又聞張征東朱橫海今復還合肥先王盟要繇來未久且權自度未獲罪釁不審今者何以發起牽軍遠次事業未訖甫當為國討除賊備重聞斯問深使失圖凡遠人所恃在于明信願殿下克卒前分開示坦然使權誓命得卒本規凡所願言周等所當傳也同也上魏文帝書劉備支黨四萬人馬二三千匹出秭歸請往掃撲以克捷為效魏志文帝紀注引魏書卑辭上魏文帝書求自改厲若罪在難除必不見置當奉還土地民人乞寄命交州以終餘年吳志大帝傳與浩周書自道路開通不忘脩意既新奉國命加知起居假歸河北故使情問不獲果至望想之勞曷云其已孤以空闇分信不昭中間招罪以取棄絕幸蒙國恩復見赦宥喜乎與君克卒本圖傳不云乎雖不能始善終可也昔君之來欲令遣子入侍于時傾心歡以承命徒以登年幼欲假年歲之間耳而赤情未蒙昭信遂見討責常用慚怖自頃國恩復加開導忘其前愆取其後效喜得因此尋竟本誓前已有表具說遣子之意想君假還已知之也今子當入侍而未有妃耦昔君念之以為可上連綴宗室若夏侯氏雖中間自棄常奉戢在心當垂宿念為之前後使獲攀龍附驥永自固定其為分惠豈有量哉如是欲遣孫長緒與小兒俱入奉行禮聘成之在君小兒年弱加教訓不足念當與別為之緬然父子恩情豈有已邪又欲遣張子布追輔護之孤性無餘凡所欲為今盡宣露惟恐赤心不先暢達是以具為君說之宜明所以吳志大帝傳注引魏略與諸葛亮書丁厷掞張陰化不盡和合二國唯有鄧芝蜀志鄧芝傳讓孫皎書自吾與北方為敵中間十年初時相持年小今者且三十矣孔子言三十而立非但謂五經也授卿以精兵委卿以大任都護諸將于千里之外欲使加楚任昭奚恤揚威于北境非徒相使逞私志而已近聞卿與甘興霸飲因酒發作侵陵其人其人求屬呂蒙督中此人雖麤豪有不如人意時然其較略大丈夫也吾親之者非私之也吾親愛之卿疏憎之卿所為每與吾違其可久乎夫居敬而行簡可以臨民愛人多容可以得眾二者尚不能知安可董督在遠禦寇濟難乎卿行長大特受重任上有遠方瞻望之視下有部曲朝夕從事何可恣意有盛怒邪人誰無過貴其能改宜追前愆深自咎責今故煩諸葛子瑜重宣吾意臨書摧愴心悲淚下吳志宗室孫皎傳報陸遜表保明諸葛瑾事子瑜與孤從事積年恩如骨肉深相明究其為人非道不行非義不言玄德昔遣孔明至吳孤嘗與子瑜曰卿與孔明同產且弟隨兄于義為順何以不留孔明孔明若留從卿者孤當以書解玄德意自隨人耳子瑜答孤言弟亮以失身于人委質定分義無二心弟之不留猶瑾之不往也其言足貫神明今豈當有此乎孤前得妄語文疏即封示子瑜并手筆與子瑜即得其報論君臣大節一定之分孤與子瑜可謂神交非外言所間也知卿意至輒封來表以示子瑜使知卿意吳志諸葛瑾傳注引江表傳別咨諸葛瑾近得伯言表以為曹丕已死毒亂之民當望旌瓦解而更靜然聞皆選用忠良寬刑罰布恩惠薄賦省役以悅民心其患更深于操時孤以為不然操之所行其惟殺伐小為過差及離間人骨肉以為酷耳至于御將自古少有此之于操萬不及也今叡之不如丕猶丕不如操也其所以務崇小惠必以其父新死自度衰微恐困苦之民一朝崩沮故彊屈曲以求民心欲以自安住耳寍是興隆之漸邪聞任陳長文曹子丹輩或文人諸生或宗室戚臣寍能御雄才虎將以制天下乎夫威柄不專則其事乖錯如昔張耳陳餘非不敦睦至于秉勢自還相賊乃事理使然也又長文之徒昔所以能守善者以操笮其頭畏操威嚴故竭心盡意不敢為非耳逮不繼業年已長大承操之後以恩情加之用能感義今叡幼弱隨人東西此曹等輩必當因此弄巧行態阿黨比周各助所附如此之日奸讒並起更相陷懟轉成嫌貳自爾已往群下爭利主幼不御其為敗也焉得久乎所以知其然者自古至今安有四五人把持刑柄而不離刺轉相蹄齧者也彊當陵弱弱當求援此亂亡之道也子瑜卿但側耳聽之伯言常長于計校恐此一事小短也吳志諸葛瑾傳答諸葛瑾等腹心舊勳與孤協事公瑾有之誠所不忘昔胤年少初無功勞橫授精兵爵以侯將蓋念公瑾以及于胤也而胤恃此酗淫自恣前後告喻曾無悛改孤于公瑾義猶二君樂胤成就豈有已哉迫胤罪惡未宜便還且欲苦之使自知耳今二君勤勤援引漢高河山之誓孤用恧然雖德非其疇猶欲庶幾事亦如爾故未順旨以公瑾之子而二君在中間苟使能改亦何患乎吳志周瑜傳答群臣奏議郊祀答群臣奏議郊祀郊祀當于土中今非其所于何施此吳志大帝傳注引江表傳又見宋書禮志三武王伐紂即阼于鎬京而郊其所也文王未為天子立郊于酆見何經典同上文王德性謙讓處諸侯之位明未郊也經傳無明文匡衡俗儒意說非典籍正義不可用也同上答步騭朱然等疏請備蜀答步騭朱然等疏請備蜀吾侍蜀不薄聘享盟誓無所負之何以致此又司馬懿前來入舒旬日便還蜀在萬里何知緩急而便出兵乎昔魏欲入漢川此間始嚴亦未舉動會聞魏還而止蜀寍可復以此有疑邪又人家治國舟船城郭何得不獲今此間治軍寍復欲以禦蜀邪人言若不可信朕為諸君破家保之吳志大帝傳答步騭表言防魏此曹衰弱何能有圖必不敢來若不如孤言當以牛干頭為君作主人吳志步騭傳注引吳錄報陸遜表令諸將增廣農畝甚善今孤父子親自受田車中八牛以為四耦雖未及古人亦欲與眾均等其勞也吳志大帝傳報陸遜夫法令之設欲以遏惡防邪儆戒未然也焉得不有刑罰以威小人乎此為先令後誅不欲使有犯者耳君以為太重者孤亦何利其然但不得已而為之耳今承來意當重諮謀務從其可且近臣有盡規之諫親戚有補察之箴所以匡君正主明忠信也書載予違汝弼汝無面從孤豈不樂忠言以自裨補邪而云不敢極陳何得為忠讜哉若小臣之中有可納用者寍得以人廢言而不採擇乎假但諂媚取容雖闇亦所明識也至于發調者徒以天下未定事以眾濟若徒守江東脩崇寬政兵自足用復用多為顧坐自守可陋耳若不豫調恐臨時未可便用也又孤與君分義特異榮戚實同來表云不敢隨眾容身苟免此實甘心所望于君也吳志大帝傳陸遜陳便宜勸以施德緩刑寬賦息調又云忠讜之言不能極陳求容小臣數以利聞權報曰遺公孫淵書司馬公善用兵變化若神所向無前深為弟憂之晉書宣帝紀又魏志公孫淵傳注引漢晉春秋有末二語云司馬懿所向無前深為弟憂也不云遺書告天文皇帝臣權敢用玄牡昭告于皇皇后帝漢享國二十有四世歷年四百三十有四行氣數終祿祚運盡普天弛絕率土分崩孼臣曹丕遂奪神器丕子叡繼世作慝淫名亂制權生于東南遭值期運承乾秉戎志在平世奉時行罰舉足為民群臣將相州郡百城執事之人咸以為天意已去于漢漢氏已絕祀于天皇帝位虛郊祀無主休徵嘉瑞前後雜沓厤數在躬不得不受權畏天命不敢不從謹擇元日登壇燎祭即皇帝位惟爾有神饗之左右有吳永終天祿吳志大帝傳注引吳錄又見宋書禮志三淫名作竊名平世作拯世燎祭作祡燎末句作永綏天極沈彭蠡鼎文百神助陽侯伏鼎錄黃武中
