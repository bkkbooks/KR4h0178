body:
  text: 公孫淵表吳主權臣伏惟遭天地反易遇無妄之運王路未夷傾側擾攘自先人以來歷事漢魏階緣際會為國效節繼世享任得守藩表猶知符命未有攸歸每感厚恩頻辱顯使退念人臣交不越境是以固守所執拒違前使雖義無二信敢忘大恩陛下鎮撫長存小國前後裴校尉葛都尉等到奉被敕誡聖旨彌密重紈纍表幽明備著所以申示之事言提其耳臣晝則謳吟宵則發夢終身誦之志不知足季末凶荒乾坤否塞兵革未戢人民蕩析仰此天命將有眷顧私從一隅永瞻雲日今魏家不能採録忠善褒功臣之後乃令讒諂得行其志聽幽州刺史東萊太守誑誤之言猥興州兵圖害臣郡臣不負魏而魏絶之蓋聞人臣有去就之分田饒適齊樂毅走趙以不得事主故保有道之君陳平耿況亦覩時變卒歸于漢勒名帝籍伏惟陛下德不再出時不世遇是以慺慺懷慕自納望遠視險有如近易誠願神謨蚤定洪業奮六師之勢收河洛之地為聖代宗天下幸甚魏志公孫度傳注引吳書上魏明帝表臣前遣校尉宿舒郎中令孫綜甘言厚禮以誘吳賊幸賴天道福助大魏使此賊虜暗然迷惑違戾群下不從衆諫承信臣言遠遣船使多將士卒來致封拜臣之所執得如本志雖憂罪釁私懷幸甚賊衆本號萬人舒綜伺察可七八千人到沓津僞使者張彌許晏與中郎將萬泰校尉裴潛將吏兵四百餘人齎文書命服什物下到臣郡泰潛別齎致遺貨物欲因市馬軍將賀逵虞咨領餘衆在船所臣本欲須涼節乃取彌等而彌等人兵衆多見臣不便承受吳命意有猜疑懼其先作變態妄生即進兵圍取斬彌晏泰潛等首級其吏從兵衆皆士伍小人給使東西不得自由面縛乞降不忍誅殺輒聽納受徒充邊城別遣將韓起等率將三軍馳行至沓使領長史柳遠設賓主禮誘請達咨三軍潛伏以待其下又驅群馬貨物欲與交市達咨懷疑不下使諸市買者五六百人下欲交市起等金鼓始震鋒矢亂發斬首三百餘級被創赴水沒溺者可二百餘人其散走山谷來歸降及藏竄飢餓死者不在數中得銀印銅印兵器資貨不可勝數謹遣西曹掾公孫珩奉送賊權所假臣節印綬符策九錫什物及彌等僞節印綬首級宿舒孫綜前到吳賊權問臣家內小大舒綜對臣有三息修別屬亡弟權敢姦巧便擅拜命謹封送印綬符策臣雖無昔人洗耳之風慚為賊權污損所加既行天誅猶有餘忿同上權待舒綜契闊委曲君臣上下畢歡竭情而令四使見殺梟示萬里士衆流離屠戮津渚慚恥遠布痛辱彌天權之怨疾將刻肌骨若天衰其業使至喪隕權將內傷憤激而死若期運未訖將播毒螫必恐長蛇來為寇害徐州諸屯及城陽諸郡與相接近如有船衆後年向海門得其消息乞速告臣使得備豫同上臣父康昔殺權使結為讎隙今乃譎欺遣使誘致令權傾心虛國竭祿遠命上卿寵授極位震動南土備盡禮數又臣門戶受恩實深實重自臣承攝即事以來連被榮寵殊特無量分當隕越竭力致死而臣狂愚意計迷暗不即禽賊以至見疑前章表所陳情趣事勢實但欲罷弊此賊使困自絶誠不敢背纍世之恩附僭盜之虜也而後愛憎之人緣事加誣僞生節目卒令明聽疑于市虎移恩改愛興動威怒幾至沈沒長為負忝幸賴慈恩猶垂三宥使得補過解除愆責如天威遠加不見假借早當糜碎辱先廢祀何緣自明建此微功臣既喜于事捷得自申展悲于疇昔至此變故餘怖踴躍未敢便寧唯陛下既崇春日生全之仁除忿塞隙抑弭纖介推今亮往察臣本心長令抱戴銜分三泉同上臣被服光榮恩情未報而以罪釁自招譴怒分當即戮為衆社戒所以越典詭常僞通于吳誠自念窮迫報效未立而為天威督罰所加長恐奄忽不得自洗故敢自闕替廢于一年遣使誘吳知其必來權之求郡積有年歲初無倡答一言之應今權得使來必不疑至此一舉果如所規上卿大衆翕赫豐盛財貨賂遺傾國極位到見禽取流離死亡千有餘人滅絶不反此誠暴猾賊之鋒摧矜夸之巧昭示天下破損其業足以慚之矣臣之慺慺念效于國雖有非常之過亦有非常之功願陛下原其踰闕之愆采其毫毛之善使得國恩保全終始矣魏志公孫度傳注引魏略郭昕柳浦為公孫淵上書自直大司馬長史臣郭昕參軍臣柳浦等七百八十九人言奉被今年七月己卯詔書伏讀懇切精魄散越不知身命所當投措昕等伏自惟省螻蟻小醜器非時用遭值千載被受公孫淵祖考以來光明之德惠澤沾渥滋潤榮華無才尺之功有負乘之纍遂蒙褎獎登名天府竝以駑蹇附龍託驥紆青拖紫飛騰雲梯感恩惟報死不擇地臣等聞明君在上聽政采言人臣在下得無隱情是以因緣訴讓冒犯訴冤郡在藩表密邇不羈平昔三州轉輸費調以供賞賜歲用纍億虛耗中國然猶跋扈虔劉邊陲烽火相望羽檄相逮城門晝閉路無行人州郡兵戈奔散覆沒淵祖父度初來臨郡承受荒殘開日月之光建神武之略聚烏合之民掃地為業威震耀于殊俗德澤被于群生遼土之不壞實度是賴孔子曰微管仲吾其被髮左衽向不遭度則郡早為丘墟而民係于虜廷矣遺風餘愛永存不朽度既薨殂吏民感慕欣戴子康尊而奉之康踐統洪緒克壯徽猷文昭武烈邁德種仁乃心京輦翼翼虔恭佐國平亂效績紛紜功隆事大勳藏王府度康當值武皇帝休明之會合策明之計夾輔漢室隆身委質卑己事魏匪處小厭大畏而服焉乃慕託高風懷仰盛懿也武皇帝亦虛心接納待以不次功無巨細每不見忘又命之曰海北地土割以付君世世子孫實得有之皇天后土實聞德音臣庶小大豫在下風奉以周旋不敢失墜淵生有蘭石之姿少含愷悌之訓允文允武忠惠且直生民欽仰莫弗懷愛淵纂戎祖考君臨萬民為國以禮淑化流行獨見先覩羅結遐方勤王之義視險如夷世載忠亮不隕厥名孫權慕義不遠萬里連年遣使欲自結援雖見絶殺不念舊怨纖纖往來求成恩好淵執節彌固不為利回守志匪石確乎彌堅猶懼丹心未見保明乃卑辭厚幣誘致權使梟截獻馘以示無二吳雖在遠水道通利舉帆便至無所隔限淵不顧敵讎之深念存人臣之節絶彊吳之歡昭事魏之心靈祇明鑒普天咸聞陛下嘉美洪烈懿茲武功誕錫休命寵亞齊魯下及陪臣普受介福誠以天覆之恩當卒終始得竭股肱永保祿位不虞一旦橫被殘酷有育養之厚念積纍之效悲思不遂痛切見棄舉國號咷拊膺泣血夫三軍所伐蠻夷戎狄驕逸不虔于是致武不聞義國反受誅討蓋聖王之制五服之域有不供職則修文德而又不至然後征伐淵小心翼翼恪恭干位勤事奉上可謂勉矣盡忠竭節還被患禍小辨之作離騷之興皆由此也就或佞邪盜言孔甘猶當清覽憎而知善讒巧似直或亂聖聽尚望文告使知所由若信有罪當垂三宥若不改寤計功減降當在八議而潛軍伺襲大兵奄至舞戈長驅衝擊遼土犬馬惡死況于人類吏民昧死挫辱王師淵雖冤枉方臨危殆猶恃聖恩悵然重奔冀必姦臣矯制妄肆威虐乃謂臣等曰漢安帝建光元年遼東屬國都尉龐奮受三月乙未詔書曰收幽州刺史馮煥玄菟太守姚光推案無乙未詔書遣侍御史幽州牧考姦臣矯制者今刺史或儻謬承矯制乎臣等議以為刺史興兵搖動天下殆非矯制必是詔命淵乃俯仰歎息自傷無罪深惟土地所以養人竊慕古公杖策之岐乃欲投冠釋紱逝歸林麓臣等維持誓之以死屯守府門不聽所執而七營虎士伍部蠻夷各懷素飽不謀同心奮臂大呼排門遁出近郊農民釋其耨鎛伐薪制梃改案為櫓奔馳赴難軍旅行成雖蹈湯火死不顧生淵雖見孤棄怨而不怒比遣敕軍勿得干犯及手書告誥懇惻至誠而吏士凶悍不可解散期于畢命投死無悔淵懼吏士不從教令乃躬馳騖自往化解僅乃止之一飯之惠匹夫所死況淵纍葉信結百姓恩著民心自先帝初興爰暨陛下榮淵纍葉豐功懿德策名褒揚辨著廊廟勝衣舉履誦詠明文以為口實埋而掘之古人所恥小白重耳衰世諸侯猶慕著信以隆霸業詩美文王作孚萬邦論語稱仲尼去食存信信之為德固亦大矣今吳蜀共帝鼎足而居天下搖蕩無所統一臣等每為陛下懼此危心淵據金城之固仗和睦之民國殷兵彊可以橫行策名委質守死善道忠至義盡為九州表方今二敵窺𨵦未知孰定是之不戒而淵是害茹柔吐剛非王者之道也臣等雖鄙誠竊恥之若無天乎臣一郡吉凶尚未可知若云有天亦何懼焉臣等聞仕于家者二世則主之三世則君之臣等生于荒裔之土出于圭竇之中無大援于魏世隸于公孫氏報生與賜在于死力昔蒯通言直漢祖赦其誅鄭詹辭順晉文原其死臣等頑愚不達大節苟執一介披露肝膽言逆龍鱗罪當萬死惟陛下恢崇撫育亮其控告使疏遠之臣永有保恃魏志公孫度傳注引魏書與夫文惠書今奉總帢十枚組生履一緉織成襪一量御覽六百八十八又六百九十七又八百十六
