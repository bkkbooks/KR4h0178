body:
  text: 杜摯笳賦昔李伯陽避亂西入戎戎越之思有懷土風遂造斯樂美其出入戎貉之思有大韶夏音宋書樂志一文選西京賦注通典一百四十四御覽五百八十一唯葭蘆之為物諒潔徑之自然託妙體于阿澤歷百代而不遷于是秋節既至百物具成嚴霜告殺草木殞零賓鳥鼓翼蟋蟀悲鳴羈旅之士感時用情乃命狄人操笳揚清吹東角動南徵清羽發濁商起剛柔待用五音迭進倏爾卻轉忽焉前引或縕縕以和懌或悽悽以噍殺或漂淫以輕浮或遲重以沈滯藝文類聚四十四降吳表稟命不幸常隸魏國雨絶于天雖側伏隅都自知無路司馬師滔天作逆廢害二主辛癸高莽惡不足喻欽纍世受魏恩烏鳥之情竊懷憤踊在三之義期于弊仆前與毋丘儉郭淮等俱舉義兵當共討師掃除凶孽誠臣慺慺愚管所執智慮淺薄微節不騁進無所依悲痛切心退惟不能扶翼本朝抱愧俯仰靡所自厝冒緣古義固有所歸庶假天威得展萬一僵仆之日亦所不恨輒相率將歸命聖化慚偷苟生非辭所陳謹上還所受魏使持節前將軍山桑侯印綬臨表惶惑伏須罪誅魏志毋丘儉傳注與郭淮書大將軍昭伯與太傅伯俱受顧命登床把臂託付天下此遠近所知後以勢利乃絶其祀及其親黨皆一時之俊可為痛心奈何奈何公侯恃與大司馬公恩親分著義貫金石當此之時想益毒痛有不可堪也王太尉嫌其專朝潛欲舉兵事竟不捷復受誅夷害及楚王想甚追恨太傅既亡然其子師繼承父業肆其虐暴日月滋甚放主弒后殘戮忠良包藏禍心遂至篡弒此可忍也孰不可忍欽以名義大故事君有節忠憤內發忘寢與食無所吝顧也會毋丘子邦自與父書騰說公侯盡事主之義欲奮白髮同符太公惟須東問影響相應聞問之曰能不慷慨是以不顧妻孥之痛即與毋丘鎮東舉義兵三萬餘人西趨京師欲扶持王室掃除姦逆企踵西望不得聲問魯望高子不足喻急夫當仁不讓況救君之難度道遠艱故不果期要耳然同舟共濟安危勢同禍痛已連非言飾所解自公侯所明也共事曹氏積信魏朝行道之人皆所知見然在朝之士冒利偷生烈士所恥公侯所賤賈豎所不忍為也況當塗之士邪軍屯住項小人以閏月十六日別進兵就于樂嘉城討師師之徒衆尋時崩潰其所斬截不復訾原但當長驅徑至京師而流言先至毋丘不復詳之更謂小人為誤諸軍便爾瓦解毋丘還走追尋釋解無所及小人還項復遇王基等十二軍追尋毋丘進兵討之即時克破所向全勝要那後無繼何孤軍梁昌進退失所還據壽春壽春復走狼狽躓閡無復他計惟當歸命大吳借兵乞食繼踵伍員耳不若僕隸如何快心復君之讎永使曹氏少享血食此亦大國之所佑念也想公侯不使程嬰杵臼擅名于前代而使大魏獨無鷹揚之士與今大吳敦崇大義深見愍悼然僕干國大分連接遠同一勢日欲俱舉分分中國不願偏取以為已有公侯必欲共忍帥胸懷宜廣大勢恐秦川之卒不可孤舉今者之計宜屈己伸人託命歸漢東西俱舉爾乃可克定師黨耳深思鄙言若愚計可從宜使漢軍克制期要使六合校考與周召同封以託付兒孫此亦非小事也大丈夫寧處其落落是以遠呈忠心時望嘉應魏志毋丘儉傳注王淡母出還葬議春秋原心定罪仲尼稱父有爭子然則論罪不可以不原心為子不可以不義諍來書云尊親以不幸遘疾不任理喪禮疾飲酒食肉蓋急于性命而權正理也夫厚養忘哀禮之所許況尊親嬰沈篤疾而被七出之罰乎向使曩時家有壯子明證本末直道而爭豈令慈母以非罪受不哉考諸典禮稽之原情其昭告先靈還安域兆使嚴父無違禮之舉慈毋雪沒代之恥不亦可乎通典一百二上明帝表武笪帝始征張魯以十萬之衆身親臨履指受方略因就民麥以為軍糧張衛之守蓋不足言地險守易雖有精兵虎將勢不能施對兵三日欲抽軍還言作軍三十年一朝持與人如何此計已定天祚大魏魯守自壞因以定之魏志張魯傳注引魏名臣奏歸吳上書臣聞紂為無道微子先出高祖寬明陳平先人臣年二十二委棄封域歸命有道賴蒙天靈得自全致臣至止有日而主者同之降人未見精別使臣微言妙旨不得上達於邑三歎曷惟其己謹詣闕拜章乞蒙引見吳志胡綜傳肉刑論堯典曰象之典刑流宥五刑鞭作官刑朴成教刑金作贖刑怙終賊刑咎繇曰天討有罪五刑五用哉呂刑曰蚩尤惟始作亂延及于平人罔不寇賊鴟義姦宄寇攘矯虔苗人惟作五虐之刑曰法殺戮無辜爰始淫為刑劓斫黥案此肉刑在于蚩尤之代而堯舜以流放代之故黥劓之文不載唐虞之籍而立刑之數亦不具于聖人之旨也禹承舜禪與堯同治必不釋二聖而遠則凶頑固可知矣湯武之王獨將奚取于呂侯故叔向云三辟之興皆叔世也此則近君子有徵之言矣通典一百六十八會喪宜去冠議論語曰羔裘玄冠不以弔故周人去玄冠代以素辨漢去玄冠代以布巾亦王者相變之儀未必獨非也古禮野夫著巾古者軍禮韋辨冠今者赤幘此明轉相變易不可悉還及古今宜因漢氏故事又案漢儀注諸侯王薨天子遣使者往皆言使者素服又禮自天子下達于士臨殯斂之事去玄冠以素辨君子臨喪必有哀素之心是以去玄冠代之以素是以漢中興臨喪之事與禮合自是之後或言臨喪使者常吉服布巾以為使者亦宜去玄冠代以布巾示不純吉侍中散騎諸會喪亦宜去玄冠代以布巾通典八十一又八十三杜布作杜希薨卒不祿議諸王公大將軍縣亭侯以上有爵土者依諸侯禮皆稱薨關外侯無土銅印當古稱卒千石六百石下至二百石皆詣臺拜受與古士受命同依禮稱不祿通典八十三表韓觀王昶韓觀王昶信有兼才高官重任不但三州魏志徐邈傳注引魏名臣奏黃門侍郎杜恕表請令刺史專民事勿典兵疏帝王之道莫尚乎安民安民之術在于豐財豐財者務本而節用也方今二賊未滅戎車亟駕此自熊虎之士展力之秋也然搢紳之儒橫加榮慕扼腕抗論以孫吳為首州郡牧守咸共忽恤民之術修將率之事農桑之民競干戈之業不可謂務本帑藏歲虛而制度歲廣民力歲衰而賦役歲興不可謂節用今大魏奄有十州之地而承喪亂之斃計其戶口不如往昔一州之民然而二方僭逆北虜未賓三邊遘難繞天略匝以所統一州之民經營九州之地其為艱難譬策羸馬以取道里豈可不加意愛惜其力哉以武皇帝之節儉府藏充實猶不能十州雍兵郡且二十也今荊揚青徐幽并雍涼緣邊諸州皆有兵矣其所恃內充府庫外制四夷者惟兗豫司冀而已臣前以州郡典兵則專心軍功不勤民事宜別置將守以盡治理之務而陛下復以冀州寵秩呂昭冀州戶口最多田多墾闢又有桑棗之饒國家徵求之府誠不當復任以兵事也若以北方當須鎮守自可專置大將以鎮安之計所置吏士之費與兼官無覺然昭于人才尚復易中朝苟乏人兼才者勢不獨多以此推之知國家以人擇官不為官擇人也官得其人則政平訟理政平故民富實訟理故囹圄空虛陛下踐阼天下斷獄百數十人歲歲增多至五百餘人矣民不益多法不益峻以此推之非政教陵遲牧守不稱之明效歟往年牛死通率天下十能損二麥不半收秋種未下若二賊游魂于疆場飛芻挽粟千里不及究此之術豈在彊兵乎武士徑卒愈多愈多病耳夫天下猶人之體腹心充實四支雖病終無大患今兗豫司冀亦天下之腹心也是以愚臣慺慺實願四州之牧守獨修務本之業以堪四支之重然孤論難持犯欲難成衆怨難積疑似難分故纍載不為明主所察凡言此者類皆疏賤疏賤之言實未易聽若使善策必出于親貴固不犯四難以求忠愛此古今之所當患也魏志杜畿傳議考課疏書稱明試以功三考黜陟誠帝王之盛制使有能者當其官有功者受其祿譬猶烏獲之舉千鈞良樂之選驥足也雖歷六代而考績之法不著關七聖而課試之文不垂臣誠以為其法可粗依其詳難備舉故也語曰世有亂人而無亂法若使法可專任則唐虞可不須稷契之佐殷周無貴伊呂之輔矣今奏考功者陳周漢之云為掇京房之本旨可謂明考課之要矣于以崇揖讓之風興濟濟之治臣以為未盡善也其欲使州郡考士必由四科皆有事效然後察舉試辟公府為親民長吏轉以功次補郡守者或就增秩賜爵此最考課之急務也臣以為便當顯其身用其言使具為課州郡之法法具施行立必信之賞施必行之罰至于公卿及內職大臣亦當俱以其職考課之也古之三公坐而論道內職大臣納言補闕無善不紀無過不舉且天下至大萬機至衆誠非一明所能遍照故君為元首臣為股肱明其一體相須而成也是以古人稱廊廟之材非一木之枝帝王之業非一士之略由是言之焉有大臣守職辨課可以致雍熙者哉且布衣之交猶有務信誓而蹈水火感知己而披肝膽徇聲名而立節義者況于束帶立朝致位卿相所務者非特匹夫之信所感者非徒知己之惠所徇者豈聲名而已乎諸蒙寵祿受重任者不徒欲舉明主于唐虞之上而己身亦欲廁稷契之列是以古人不患于念治之心不盡患于自任之意不足此誠人主使之然也唐虞之君委任稷契夔龍而責成功及其罪也殛鯀而放四凶今大臣親奉明詔給事目下其有夙夜在公恪勤特立當官不撓貴勢執平不阿所私危言危行以處朝廷者自明主所察也若尸祿以為高拱默以為智當官苟在于免負立朝不忘于容身潔行遜言以處朝廷者亦明主所察也誠使容身保位無放退之辜而盡節在公抱見疑之勢公義不修而私議成俗雖仲尼為謀猶不能盡一才又況于世俗之人乎今之學者師商韓而上法術競以儒家為迂闊不周世用此最風俗之流斃創業者之所致慎也魏志杜畿傳又通典十五諫聽廉昭言事疏伏見尚書郎廉昭奏左丞曹璠以罰當關不依詔坐判問又云諸當坐者別奏尚書令陳矯自奏不敢辭罰亦不敢以處重為恭意至懇惻臣竊憫然為朝廷惜之夫聖人之擇世而興不易民而治然而生必有賢智之佐者蓋進之以道率之以禮故也古之帝王之所以能輔世長民者莫不遠得百姓之歡心近盡群臣之智力誠使今朝任職之臣皆天下之選而不能盡其力不可謂能使人若非天下之選亦不可謂能官人陛下憂勞萬機或親燈火而庶事不康刑禁日弛豈非股肱不稱之明效歟原其所由非獨臣有不盡忠亦主有不能使百里奚愚于虞而智于秦豫讓苟容中行而著節智伯斯則古人之明驗矣今臣言一朝皆不忠是誣一朝也然其事類可推而得陛下感帑藏之不充實而軍事未息至乃斷四時之賦衣薄御府之私穀帥由聖意舉朝稱明與聞政事密勿大臣寧有懇懇憂此者乎騎都尉王才幸樂人孟思所為不法振動京都而其罪狀發于小吏公卿大臣初無一言自陛下踐阼以來司隸校尉御史中丞寧有舉綱維以督姦宄使朝廷肅然者邪若陛下以為今世無良才朝廷乏賢佐豈可追望稷契之遐蹤坐待來世之俊乂乎今之所謂賢者盡有大官而享厚祿矣然而奉上之節未立向公之心不一者委任之責不專而俗多忌諱故也臣以為忠臣不必親親臣不必忠何者以其居無嫌之地而事得自盡也今有疏者毀人不實其所毀而必曰私報所憎譽人不實其所譽而必曰私愛所親左右或因之以進憎愛之說非獨毀譽有之政事損益亦皆有嫌陛下當思所以闡廣朝臣之心篤厲有道之節使之自同古人望與竹帛耳反使如廉昭者擾亂其閒臣懼大臣遂將容身保位坐觀得失為來世戒也昔周公戒魯侯曰無使大臣怨乎不以不言賢愚明皆當世用也堯數舜之功稱去四凶不言大小有罪則去也今者朝臣不自以為不能以陛下為不任也不自以為不智以陛下為不問也陛下何不遵周公之所以用大舜之所以去使侍中尚書坐則侍帷幄行則從華輦親對詔問所陳必達則群臣之行能否皆可得而知忠能者進暗劣者退誰敢依違而不自盡以陛下之聖明親與群臣論議政事使群臣人得自盡人自以為親人思所以報賢愚能否在陛下之所用以此治事何事不辨以此建功何功不成每有軍事詔書常曰誰當憂此者邪吾當自憂耳近詔又曰憂公忘私者必不然但先公後私即自辨也伏讀明詔乃知聖思究盡下情然亦怪陛下不知其本而憂其末也人之能否實有本性雖臣亦以為朝臣不盡稱職也明主之用人也使者不敢遺其力而不能者不得處非其任選舉非其人未必為有罪也舉朝共容非其人乃為怪耳陛下知其不盡力也而代之憂其職知其不能也而教之治其事豈徒主勞而臣逸哉雖聖賢竝世終不能以此為治也陛下又患臺閣禁令之不密人事請屬之不絶聽伊尹作迎客出入之制選司徒更惡吏以守寺門威禁由之實未得為禁之本也昔漢安帝時少府竇嘉辟廷尉郭躬無罪之兄子猶見舉奏章劾紛紛近司隸校尉孔羡辟大將軍狂悖之弟而有司默爾望風希指甚于受屬選舉不以實人事之大者也嘉有親戚之寵躬非社稷重臣猶尚如此以今況古陛下自不督必行之罰以絶阿黨之原耳伊尹之制與惡吏守門非治世之具也使臣之言少蒙察納何患于姦不削滅而養若昭等乎夫糾擲姦究忠事也然而世憎小人行之者以其不顧道理而苟求容進也若陛下不復考其終始必以違衆忤世為奉公密行白人為盡節焉有通人大才而更不能為此邪誠顧道理而弗為耳使天下皆背道而趨利則人主之所最病者陛下將何樂焉胡不絶其萌乎夫先意承旨以求容美率皆天下淺薄無行義者其意務在于適人主之心而已非欲治天下安百姓也陛下何不試變業而示之彼豈執其所守以違聖意哉夫人臣得人主之心安業也處尊顯之官榮事也食千鍾之祿厚實也人臣雖愚未有不樂此而喜于忤者也迫于道自彊耳誠以為陛下當憐而佑之少委任焉如何反録昭等傾側之意而忽若人者乎今者外有伺隙之寇內有貧曠之民陛下當大計天下之損益政事之得失誠不可以怠也魏志杜畿傳奏事漢故事人民疾病責之司徒御覽二百七引魏名臣奏黃門杜恕奏家事戒稱張閣張子臺視之如鄙朴人然其心中不知天地閒何者為美何者為惡毅然似與陰陽合德者作人如此自可不富貴然而患禍當何從而來世有高亮如子臺者皆多力慕體之不如也魏志邴原傳御覽五百九十三
