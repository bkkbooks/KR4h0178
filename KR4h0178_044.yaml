body:
  text: 趙孔曜薦管輅于冀州刺史裴徽輅雅性寬大與世無忌可為士雄仰觀天文則能同妙甘公石申俯覽周易則能思齊司馬季主遊步道術開神無窮可為士英抱荊山之璞懷夜光之寶而為清河郡所録北黌文學可為痛心疾首也使君方欲流精九皋垂神幽藪欲令明主不獨治逸才不久滯高風遐被莫不草靡宜使輅特蒙陰和之應得及羽儀之時必能翼宣隆化揚聲九圍也魏志管輅傳注引輅別傳案張采三國文梅鼎祚三國文紀載此並云出藝文類聚未知何據薦管寧臣聞龍鳳隱耀應德而臻明哲潛道俟時而動是以鸑鷟鳴岐周道隆興四皓為佐漢帝用康伏見太中大夫管寧應二儀之中和總九德之純懿含章素質冰潔淵清玄虛淡泊與道逍遙娛心黃老遊志六藝升堂入室宄其閫奧韜古今于胸懷包道德之機要中平之際黃巾陸粱華夏傾蕩玉綱弛頓遂避時難乘桴越海羈旅遼東三十餘年在乾之姤匿景藏光嘉遁養浩韜韞儒墨潛化傍流畼于殊俗黃初四年高祖文皇帝疇咨群公思求俊乂故司徒華歆舉寧應選公車特徵振翼遐裔翻然來翔行遇屯厄遭罹疾病即拜太中大夫烈祖明皇帝嘉美其德登為光祿勳寧疾彌留未能進道今寧舊疾已瘳行年八十志無衰倦環堵蓽門偃息窮巷飯鬻糊口并日而食吟詠詩書不改其樂困而能通遭難必濟經危蹈險不易其節金聲玉色久而彌彰揆其終始殆天所祚當贊大魏輔亮雍熙袞職有闕群下屬望昔高宗刻象營求賢哲周文啓龜以卜良佐況寧前朝所表名德已著而久棲遲未時引致非所以奉遵明訓繼成前志也陛下踐阼纂承洪緒聖敬日躋超越周成每發德音動咨師傅若繼二祖招賢故典賓禮俊邁以廣緝熙濟濟之化侔于前代寧清高恬泊擬迹前軌德行卓絶海內無偶歷觀前世玉帛所命申公枚乘周黨樊英之儔測其淵源覽其清濁未有厲俗獨行若寧者也誠宜束帛加璧備禮徵騁仍授几杖延登東序敷陳墳素坐而論道上正璇璣協和皇極下阜群生彝倫攸敘必有可觀光益大化若寧固執匪右守志箕山追亦洪崖參蹤巢許斯亦聖朝同符唐虞優賢揚歷垂聲千載雖出處殊塗俯仰異體至于興治美俗其揆一也魏志管寧傳太僕陶丘一永寧衛尉孟觀侍中孫雍中書侍郎王基薦寧奏諫齊王禮天子之宮有斫礱之制無朱丹之飾宜循禮復古今天下已平君臣之分明陛下但當不懈于位平公正之心審賞罰以使之可絶後園習騎乘馬出必御輦乘車天下之福臣子之願也魏志齊王芳紀上言宜割右賢王劉豹部為二國戎狄獸心不以義親強則侵暴弱則內附故周宣有玁狁之寇漢祖有平城之圍每胸奴一盛為前代重患自單于在外莫能牽制長卑誘而制之使來入侍由是羌夷失統合散無主以單于在內萬里順軌今單于之尊日疏外土之威寖重則胡虜不可不深備也聞劉豹部有叛胡可因叛割為二國以分其勢去卑功顯前朝而子不繼業宜加其子顯號使居鴈門離國弱寇追録前勳此御邊長計也魏志鄧艾傳又陳羌胡事羌胡與民同處者宜以漸出之使居民表崇廉恥之教塞姦宄之路魏志鄧艾傳上言積粟國之所急惟農與戰國富則兵強兵強則戰勝然農者勝之本也孔子曰足食足兵食在兵前也上無設爵之勸則下無財畜之功今使考績之賞在于積粟富民則交遊之路絶浮華之原塞矣魏志鄧艾傳上言攻劍閣未克宜走陰平道今賊摧折宜遂乘之從陰平由邪徑經漢德陽亭趣涪出劍閣西百里去成都三百餘里奇兵衝其腹心劍閣之守必還赴涪則會方軌而進劍閣之軍不還則應涪之兵寡矣軍志有之曰攻其無備出其不意今掩其空虛破之必矣魏志鄧艾傳上言平蜀後事宜兵有先聲而後實者今因平蜀之勢以乘吳吳人震恐席卷之時也然大舉之後將士疲勞不可便用且徐緩之留隴右兵二萬人蜀兵二萬人煮鹽興治為軍農要用並作舟船豫順流之事然後發使告以利害吳必歸化可不征而定也今宜厚劉禪以致孫休安士民以來遠人若便送禪于京都吳以為流徙則于向化之心不勸宜權停留須來年秋冬比爾吳亦足平以為可封禪為扶風王錫其資財供其左右郡有董卓塢為之宮舍爵其子為公侯食郡內縣以顯歸命之寵開廣陵城陽以待吳人則畏威懷德望風而從矣魏志鄧艾傳重言銜命征行奉指授之策元惡既服至于承制拜假以安初附謂合權宜今蜀舉衆歸命地盡南海東接吳會宜早鎮定若待國命往復道途延引日月春秋之義大夫出疆有可以安社稷利國家專之可也今吳未賓勢與蜀連不可拘常以失事機兵法進不求名退不避罪艾雖無古人之節終不自嫌以損于國也魏志鄧艾傳案已上二篇本傳作言于司馬文王不云為書然自蜀遠言當是箋記書誘諸葛瞻若降者必表封琅邪王華陽國志七報後主降書王綱失道群英並起龍戰虎爭終歸真主此蓋天命去就之道也自古聖帝爰逮漢魏受命而王者莫不在乎中土河出圖洛出書聖人則之以興洪業其不由此未有不顛覆者也隗囂憑隴而亡公孫述據蜀而滅此皆前世覆車之鑒也聖上明哲宰相忠賢將比隆黃軒侔功往代銜命來征思聞嘉響果煩來使告以德音此非人事豈天啓哉昔微子歸周實為上賓君子豹變義存大易來辭謙沖以禮輿櫬皆前哲歸命之典也全國為上破國次之自非通明智達何以見王者之義乎蜀後主傳注引王隱蜀記戲答荀融書夫明足以尋極幽微而不能去自然之性顏子之量孔父之所豫在然遇之不能無樂喪之不能無哀又常狹斯人以為未能以情從理者也而今乃知自然之不可革足下之量雖已定乎胸懷之內然而隔踰旬朔何其相思之多乎故知尼父之于顏子可以無大過矣魏志鍾會傳注引何劭為王弼傳難何晏聖人無喜怒哀樂論聖人茂于人者神明也同于人者五情也神明茂故能體沖和以通無五情同故不能無哀樂以應物然則聖人之情應物而無纍于物者也今以其無纍便謂不復應物失之多矣同上奏論鍾育為出母服禮出母與父母在為母周記曰為父後者無服案如記言蓋謂族別家異自有主後者無服非謂育出母無緦麻之親還育家者也禮姑姊妹女子子無主後者不惟降哀其無繼也通典九十四嘉平元年魏郡太守鍾育為父後以出母無主後迎還輒自制服郡丞武申奏成洽難吳商答正論裁國無利器猶以鉛刀而望其巧北堂書鈔二十七御覽三百四十六交遊之黨為馳騖之所廢文選廣絶交論注世多善弩而拙于弓弓無法準故任巧由意弩有法準故易為善御覽三百四十八夫交遊者儔黨結于家威權傾其國或以利厚而比或以名高相求同則譽廣異則毀深朝有兩端之議家有不協之論至令父子不同好兄弟異交友破和穆之道長爭訟之源御覽四百六漁人張網于淵以制吞舟之魚明主張法于天下以制強梁之人立法以隄民百姓不能干立防以隄水江河不能犯御覽六百三十八雖金玉滿堂明寶滿室飢不為飽非國之用御覽八百二阮籍東平賦夫九州有方圓九野有形勢區域高下物有其制開之則通塞之則否流之則行壅之則止崇之則成丘陵汙之則為藪澤逶迤漫衍繞以大壑及至分之國邑樹之表物四時儀其象陰陽畼其氣傍通回蕩有形有德雲升雷動一叫一默或由之安乃用期惑若觀夫隅隈之缺幽荒之塗忽漠之域窮野之都奇偉譎詭不可勝圖乃有遍遊之士浩養之雅凌驚飆躡浮霄清濁俱逝吉凶相招是以伶倫遊鳳于崑崙之陽鄒子吸溫于黍谷之陰伯高登降于尚季之上羡門逍遙于三山之岑上敖玄圃下遊鄧林鳳鳥自歌翔鸞自舞嘉穀蕃殖匪我稷黍其厄陋則有橫術之場鹿豕之墟匪修潔之攸麗于穢纍之所如西則首仰阿甄傍通戚蒲桑間濮上淫荒所廬三晉縱橫鄭衛紛敷豪俊凌屬徒屬留居是以強禦橫于戶牖怨毒奮于床隅仍鄉飲而作慝豈待久而發諸厥土惟中劉王是聚高危臨城窮川帶宇叔氏婚族實在其湄背險向水垢汙多私是以其州閭鄙邑莫言或非殪情戾慮以殖厥資其土田則原壤蕪荒樹藝失時疇畝不辟荊棘不治流潢餘溏洋溢靡之東當三齊西接鄒魯長塗千里受茲商旅力間為率師使以輔驕僕纖邑于焉斯處川澤捷徑洞庭荊楚遺風過焉是徑是宇由而紹俗靡則靡觀非夷罔式導斯作殘是以其唱和矜勢背理向姦向氣逐利因畏惟愆其居處壅翳蔽塞窕邃弗章倚以陵墓帶以曲房是故居之則心昏言之則志哀悸罔徙易靡所寤懷其外有濁河縈其溏清濟蕩其樊其北有連岡崺㠧崎𡼆山陵崔巍雲電相干長風振厲蕭條大原其南則浮汶湛湛行潦成池深林茂樹蓊鬱參差群鳥翔天百獸交馳雖黔首之不淑兮黨山澤之足彌古哲人之微貴兮好政教之有儀彼玄真之所寶兮樂寂寞之無知咨閭閻之散感兮因回風以揚聲瞻荒榛之蕪穢兮顧東山之蔥青甘丘里之舊言兮發新詩以慰情信嚴霜之未滋兮豈丹木之再榮北門悲于殷憂兮小辨哀于獨誠鷗端一而慕仁兮何淳朴之靡逞彼羽儀之感志兮矧伊人之匪靈時憋悃以遙思兮飆飄颻以欲歸欽丕遊于陵顛兮舉斯群而競飛物修化而神樂兮寧遐觀之可追乘松舟以載險兮雖無維而自縶騁驊騮于狹路兮顧蹇驢而弗及資章甫以遊越兮見犀光而先入被文繡而賈戎兮識旃裘之必襲奉淳德之平和兮孰斯邦之可集將言歸于美俗兮請王子與俱遊漱玉液之滋怡兮飲白水之清流遂虛心而後已兮又何懷乎患憂重曰嘉年時之淑清兮美春陽以肇夏託思飆而載行兮因形骸以成駕遵間維而長驅兮問迷罔于菀風玄雲興而四周兮寒雨淪而下降忽一寤而喪軌兮蹈空虛而遂征扶搖蔽于合墟兮咸池照乎增城欣煌熠之朝顯兮喜太陽之炎精測虛舟以遑思兮聊逍遙于清溟謹玄真之諶訓兮想至人之有形繡靡覩其紛錯兮慮彌遠而度逼並旋軫于畎澮兮若空桑之可即言淫衍而莫止兮心綿綿而未息集舒誥以鑒戒兮悵衆誨之難測神遙遙以抒歸兮畏雙環之在側咨禽鳥之不群兮悼悠悠之無極咸藜藿之易修兮攝左右之相譽懼從風而永去兮託顓頊于鮒隅雖琴瑟之畢存兮豈聲曲之復舒慮遨遊以覿奇兮彼上騰其焉如紛暗曖以亂錯兮漫浩漾而未靜理都繆而改據兮竦端委而自整制規矩以儀衡兮占我龜以觀省眺茲輿之所撤兮實斯近而匪遠豈三年之無問兮將一往而九反顧杲日之初開兮馳曲陵而飾容時零落之飄颻兮試枯菀之必從釋遼遙之闊度兮習約結之常契巡襄城之間收兮誦純一之遺誓被風雨之沾濡兮安敢軒翥而遊署竊悄悄之眷貞兮泰恬淡而永世豈淹留以為感兮將易貌乎殊方乃擇高以登栖兮永欣欣而樂康首陽山賦正元元年秋余尚為中郎在大將軍府獨往南牆下北首陽山賦曰在茲年之末歲兮端旬首而重陰風回以曲至兮雨旋轉而纖襟蟋蟀鳴乎東房兮鶗鴂號乎西林時將暮而無儔兮慮悽愴而感心振沙衣而出門兮纓委絶而靡尋步徙倚以遙思兮喟歎息而微吟將修飾而欲往兮衆齹齹而笑人靜寂寞而獨立兮亮孤植而靡因懷分索之情一兮穢群偽之射真信可實而弗離兮寧高舉而自儐聊仰首以廣俯兮瞻首陽之岡岑樹叢茂以傾倚兮紛蕭爽而揚音下崎嶇而無薄兮上洞徹而無依鳳翔過而不集兮鳴梟群而並棲揚遙逝而遠去兮二老窮而來歸實囚軋而處斯兮焉暇豫而敢誹嘉粟屏而不存兮故甘死而採薇彼背殷而從昌兮投危敗而弗遲此進而不合兮又何稱乎仁義肆壽夭而弗豫兮競毀譽以為度察前載之是云兮何美論之足慕苟道求之在細兮焉子誕而多辭且清虛以守神兮豈慷慨而言之鳩賦嘉平中得兩鳩子常食以黍稷後卒為狗所殺故為作賦伊嘉年之茂惠洪肇恍惚以發蒙有期緣之奇鳥以鳴鳩之攸同翔雕木以胎隅寄增巢于裔松吸雲霧以消息遊朝陽以相從曠逾旬而育類嘉七子之修容始戢翼而樹羽遭金風之蕭瑟既顛覆而靡救又振落而莫弼陵桓山以徘徊臨舊鄉而思入揚哀鳴以相送悲一往而不集終飄搖以流離傷弱子之悼栗何依恃以育養賴兄弟之親戚背草萊以求仁託君子之靜室甘黍稷之芳饎安戶牖之無疾潔文襟以交頸坑華麗之豔溢端妍姿以鑒飾好威儀之如一聊俯仰以逍遙求愛媚于今日何飛翔之羡慕願投報而忘畢值狂犬之暴怒加楚害于微軀欲殘沒以麋滅遂捐棄而淪失嗟薄賤之可悼豈有忘于須臾獼猴賦昔禹平水土而使益驅禽滌蕩川谷兮櫛梳山林是以神姦形于九鼎而異物來臻故豐狐文豹釋其表間尾騶虞獻其珍夸父獨鹿祓其豪青馬三騅棄其群此以其壯而殘其生者也若夫熊狚之遊臨江兮見厥功以乘危夔負淵以肆志兮楊震聲而衣皮處間曠而或昭兮何幽隱之罔隨鼷畏逼以潛身兮穴神丘之重深終或餌以求食兮焉鑿之而能禁誠有利而可欲兮雖希覿而為禽故近者不稱歲遠者不歷年大則有稱于萬年細者則為笑于目前夫獼猴直其微者也猶繫纍于下陳體多似而匪類形乖殊而不純外察慧而內無度兮故人面而獸心性褊淺而干進兮似韓非之囚秦揚眉額而驟眒兮似巧言而偽真藩從後之繁衆兮猶伐樹而喪鄰整衣冠而偉服兮懷項王之思歸耽嗜欲而眄視兮有長卿之妍姿舉頭吻而作態兮動可增而自新沐蘭湯而滋穢兮匪宋朝之媚人終蚩弄而處紲兮雖近習而不親多才伎其何為兮固受垢而貌侵姿便捷而好技兮超超騰躍乎岑巖既投林以東避兮遂中岡而被尋嬰徽纏以拘制兮顧西山而長吟緣榱桷以容與兮志豈忘乎鄧林庶君子之嘉惠設奇視以盡心且須臾以永日焉逸豫而自矜斯伏死于堂下長滅沒乎形神本集又略見藝文類聚九十五北堂書鈔一百五十八初學記二十九清思賦余以為形之可見非色之美音之可聞非聲之善昔黃帝登仙于荊山之上振咸池于南嶽之岡鬼神其幽而夔牙不聞其章女娃耀榮于東海之濱而翩翻于洪西之旁林石之隕從而瑤臺不照其光是以微妙無形寂寞無聽然後乃可以覩窈窕而淑清故白日麗光則季后不步其容鍾鼓閶鉿則延子不揚其聲夫清虛廖廓則神物來集飄颻恍惚則洞幽貫冥冰心玉質則激潔思存恬淡無欲則泰志適情伊衷慮之遒好兮又焉處而靡逞寒風邁于黍穀兮誨子而遊鶄申孺悲而母歸兮吳鴻哀而象生茲感激以達神豈浩漾而弗營志不覬而神正心不蕩而自誠固秉一而內修堪粵止之匪傾惟清朝而夕晏兮指濛汜以永寧是時羲和既頽玄夜始扃望舒整轡素風來征輕帷連揚華茵肅清彭蚌微吟螻蛄徐鳴望南山之崔巍兮顧北林之蔥青大陰潛乎後房兮明月耀乎前庭乃申展而缺寐兮忽一悟而自驚焉長靈以遂寂兮將有歙乎所之意流蕩而改慮兮心震動而有思若有來而可接兮若有去而不辭嗟博賤而失庚情散越而靡治豈覺察而明真兮誠雲夢其如茲驚奇聲之異造兮鑑殊色之在斯開丹桂之琴瑟兮聆崇陵之參差始徐唱而微響兮情悄慧以蜲蛇遂招雲以致氣兮乃振動而大駭聲飂飂以洋洋若登崑崙而臨西海超遙茫渺不能究其所在心漾漾而無所終薄兮思悠悠而未半鄧林殪于大澤兮欽邳悲于瑤岸徘徊夷由兮猗靡廣衍遊平圃以長望兮乘修水之華旗長思肅以永至兮滌平衢之大夷循路曠以徑通兮辟閨闥而洞闈羡要眇之飄遊兮倚東風以揚暉沐洧淵以淑密兮體清潔而靡譏厭白玉以為面兮披丹霞以為衣襲九英之曜精兮珮瑤光以發微服倏煜以繽紛兮綷衆采以相綏色熠熠以流爛兮紛雜錯以葳蕤象朝雲之一合兮似變化之相依麾常儀使先好兮命河女以胥歸步容與而特進兮眄兩楹而升墀振瑤溪而鳴玉兮播陵陽之婓婓蹈消漺之危迹兮躡離散之輕微釋安朝之朱履兮踐席假而集帷敷斯來之在室兮乃飄忽之所晞馨香發而外揚兮媚顏灼以顯姿清言竊其如蘭兮辭婉婉而靡違託精靈之運會兮浮日月之餘暉假淳氣之精微兮幸備嬿以自私願申愛于今夕兮尚有訪乎是非被芬芳之夕畼兮將暫往而永歸觀悅懌而未靜兮言未究而心悲嗟雲霓之可憑兮翻揮翼而俱飛棄中堂之局促兮遺戶牖之不處惟幕張而靡御兮几筵設而莫輔載雲輿之奄靄兮乘夏后之兩龍折丹木以蔽陽兮竦芝蓋之三重翩翼翼以左右兮紛悠悠以容容瞻朝霞之相承兮似美人之懷憂采色雜以成文兮忽離散而不留若將言之未發兮又氣變而飄浮若垂髦而失鬋兮飾未集而形消目流盻而自別兮心欲來而貌遼紛綺靡而未盡兮先列宿之規矩時黨莽而陰曀兮忽不識乎舊宇邁黃妖之崇臺兮雷師奮而下雨內英哲與長年兮笞離倫與膺賈摧魍魎而折鬼神兮直徑登乎所期歷四方而縱懷兮誰云顧乎或疑超高躍而疾騖兮至北極而放之援間維以相示兮臨寒門而長辭既不以萬物纍心兮豈一女子之足思亢父賦元亢父賦吾嘗遊亢父登其城使人愁思作賦以詆之言不足樂也亢父者九州之窮地先代之幽虛者也故其城郭卑小局促危隘不遐其土田則汙除漸淤泥涅槃汙方池邊屬兮容水滂沱穢菜惟産兮不食實多地下沈陰兮受氣匪和太陽不周兮殖物靡嘉故其人民頑嚚檮杌下愚難化其區域壅絶斷塞分迫旋淵終始同貫本末相牽疇昔訖今曠世歷年巨野瀦其後窮齊盡其前甽澮不畼垢濁實臻不肖群聚屋空無賢故其民放散肴亂藪竄澤居比迹麋鹿齊志豪貙是以其原壤不辟樹藝希疏莧葦彌皋蚊虻慘膚也于其遠險則右金鄉而左高平崇陵崔巍深溪崢嶸美類不處熊虎是生故人民被害嚼齧禽性獸情爾之近阻則鳴鳩蔭其前曲城發其後鴟梟群翔之可悼豈有志於須臾故其人民狼風豺氣盩電無厚南望春申東瞻孟嘗袤界薛邑境邊山陽逆旅行舍姦盜所藏北臨平陸齊之西封捷徑燕趙逃齒逍遙故其人民側匿頗僻隱蔽不公懷私抱詐爽匿是從禮義不設淳化匪同先哲遺言有昭有聾如何君子栖遲斯邦
