body:
  text: 陳王植七大饗碑序惟延康元年八月旬有八日辛未魏王龍興踐祚規恢鴻業構亮皇基萬邦統世忿吳夷之凶暴滅蜀虜之僭逆王赫斯怒順天致罰奮虓虎之校簡猛鋭之卒爰整六軍率胸怒暨單于烏桓鮮卑引弓之類持戟百萬控弦千隊玄甲曜野華旗蔽日天動雷震星流雷發戎備素辨役不更藉農夫安疇商不變肆是以士有拊譟之歡民懷惠康之德皇恩所漸無遠不至武師所加無強不服故寬令西飛則蜀將東馳六旆南徂則吳黨委質二虜震驚魚爛渚潰將泛舟三江之流方軌卭來之阪斬吳夷以染鉞血蜀虜以釁鼓曜天威于遐裔復九圻之疆寓除生民之災孽去聖皇之宿憤次于舊邑觀釁而動築壇壝之宮置表著之位大饗六軍爰及譙縣父老男女臨饗之日陳兵清涂慶雲垂覆乃備䟆禦整法駕設天宮之列衛乘金華之鸞路達升龍于太常張天狼之威弧千乘風舉萬騎龍驤威靈之飾震曜康衢既登高壇蔭九增之華蓋處流蘇之幄坐陳旅酬之高會行無算之酣飲旨酒波流肴蒸陵積瞽師設縣金奏讚樂六變既畢乃陳祕戲巴俞丸劍奇舞麗倒衝夾踰鋒上索踏高䚗鼎緣橦舞輪擲鏡騁狗逐兔戲馬立騎之妙技白虎青鹿辟非辟邪魚龍靈龜國鎮之怪獸瓌變屈出異巧神化自卿校將守以下下及陪臺隸圄莫不歆淫宴喜咸懷醉飽雖夏啓均臺之饗周成岐陽之獀高祖邑中之會光武舊里之宴何以尚茲是以刊石立銘光示來葉其辭曰赫王師征南裔奮靈威震天外吳夷讋蜀虜竄區夏清八荒艾幸舊邦設高會皇德洽洪恩邁刊金石光萬世承露盤銘并序并序承露盤銘并序夫形能見者莫如高物不朽者莫如金氣之清者莫如露盛之安者莫如盤明帝乃詔有司鑄銅建承露盤在芳林園中莖長十二丈大十圍上盤徑四尺九寸下盤徑五尺銅龍繞其根龍身長一丈背負兩子自立於芳林園甘露乃降使臣為頌銘銘曰岧岧承露峻極太清神君礧磈洪基嶽停下潛醴泉上受雲英和氣四充翔風所經匪我明君孰能經營近歷闡度三光朗明殊俗歸義祥瑞混并鸞鳳晨棲甘露宵零神物攸協高而不傾奉戴巍恭統神器固若露盤長存永貴賢聖繼跡奕世明德不忝先功保茲皇極垂祚億兆永荷天秩弊之天壤以顯元功文選沈休文安陸昭王碑文李注引露盤銘寶刀銘造茲寶刀既礱既礪匪以尚武豫身是衛麟角是觸鸞距匪蹶光祿大夫荀侯誄如冰之清如玉之潔法而不威和而不爇百寮欷歔霑纓機女投杼農夫輟耕輪結徹而不轉馬悲鳴而倚衡王仲宣誄并序并序王仲宣誄并序維建安二十二年正月二十四日戊申魏故侍中關內侯王君卒嗚呼哀哉皇穹神察哲人是恃如何靈祗殲我吉士誰謂不痛早世即冥誰謂不傷華繁中零存亡分流夭遂同期朝聞夕沒先民所思何用誄德表之素旗何以贈終哀以送之遂作誄曰猗歟侍中遠祖彌芳公高建業佐武伐商爵同齊魯邦嗣絶亡流裔畢萬勳續惟光晉獻賜封于魏之疆天開之祚末胄稱王厥姓斯氏條分葉散世茲芳烈揚聲秦漢會遭陽九炎光中矇世祖撥亂爰建時雍三台樹位履道是鍾寵爵之加匪惠惟恭自君二祖為光為龍僉曰休哉宜翼漢邦或統太尉或掌司空百揆惟敘五典克從天靜人和皇教遐通伊君顯考奕葉佐時入管機密朝政以治出臨朔岱庶績咸熙君以淑懿繼此洪基既有令德材技廣宣強記洽聞幽讚微言文若春華思若涌泉發言可詠下筆成篇何道不洽何藝不閒棊局逞巧博奕惟賢皇家不造京室隕顛宰臣專制帝用西遷君乃羈旅離此阻艱翕然鳳舉遠竄荊蠻身窮志達居鄙行鮮振冠南嶽濯纓清川潛處蓬室不干勢權我公奮鉞耀威南楚荊人或違陳戎講武君乃義發算我師旅高尚霸功投身帝宇斯言既發謀夫是與是與伊何響我明德投戈編鄀稽顙漢北我公實嘉表揚京國金龜紫綬以彰勳則勳則伊何勞謙靡已憂世忘家殊略卓峙乃署祭酒與君行止算無遺策畫無失理我王建國百司俊乂君以顯舉秉機省闥戴蟬珥貂朱衣皓帶入侍帷幄出擁華蓋榮耀當世芳風暗藹嗟彼東夷憑江阻湖騷擾邊境勞我師徒光光戎輅霆駭風徂君侍華轂輝輝王塗思榮懷附望彼來威如何不濟運極命衰寢疾彌留吉往凶歸嗚呼哀哉翩翩孤嗣號慟崩摧發軫北魏遠迄南淮經歷山河泣涕如頽哀風興感行雲徘徊游魚失浪歸鳥忘棲嗚呼哀哉吾與夫子義貫丹青好和琴瑟分過友生庶幾遐年攜手同征如何奄忽棄我夙零感昔宴會志各高厲豫戲夫子金石難弊人命靡常吉凶異制此歡之人孰先隕越何寤夫子果乃先逝又論死生存亡數度子猶懷疑求之明據儻獨有靈游魂泰素我將假翼飄颻高舉超登景雲要子天路喪柩既臻將及魏京靈輀回軌白驥悲鳴虛廓無見藏影蔽形孰云仲宣不聞其聲延首歎息雨泣交頸嗟乎夫子永安幽冥人誰不歿達士狥名生榮死哀亦孔之榮嗚呼哀哉武帝誄於惟我王承運之衰神武震發群雄戡夷拯民于下登帝太微德美旦奭功越彭韋九德光備萬國作師寢疾不興聖體長違華夏飲淚黎庶含悲神翳功顯身沈名飛敢揚聖德表之素旗乃作誄曰於穆我王胄稷胤周賢聖是紹元懿允休先侯佐漢實維平陽功成績著德昭二王民以寧一興詠有章我王承統天姿特生年在志學謀過老成奮臂舊邦翻身上京表與我王交兵若神張陳背誓傲帝虐民擁徒百萬虎視朔濱我王赫怒戎車列陳武卒虓闞如雷如電攙槍北掃舉不浹辰紹遂奔北河朔是賓振旅京師帝嘉厥庸乃位丞相總攝三公進受上爵臨君魏邦九錫昭備大路火龍玄鑑靈察探幽洞微下無僞情姦不容非敦儉尚古不玩珠玉以身先下民以純撲聖性嚴毅手修清一惟善是嘉靡疏靡昵怒過雷電喜踰春日萬國肅虔望風震肅既總庶政兼覽儒林躬著雅頌被之琴瑟茫茫四海我王康之微微漢嗣我王匡之群傑扇動我王服之喁喁黎庶我王育之光有天下萬國作君虔奉本朝德美周文以寬克衆每征必舉四夷賓服功夷聖武翼帝王世神武鷹揚左鉞右旄威凌伊呂年踰耳順體壯志肅乾乾庶事氣過方叔宜並南嶽君國無窮如何不弔禍鍾聖躬棄離臣子背世長終兆民號咷仰訴上穹既以約終令節不衰既即梓宮躬御綴衣璽不存身唯紼是荷明器無飾陶素是嘉既次西陵幽閨啓路群臣奉迎我王安厝窈窕玄宇三光不闥一扃尊靈永蟄聖上臨穴哀號靡及群臣陪臨佇立以泣去此昭昭於彼冥冥永棄兆民下君百靈千代萬乘曷時復形人事既關聰鏡神理文選謝靈運述祖德詩李注引武帝誄任城王誄昔二虢佐文旦奭翼武於休我王魏之元輔將崇懿跡等號齊魯如何奄忽命不是與仁者悼沒兼彼殊類矧我同生能不憯阻目想官墀心在平素倣佛魂神馳情陵墓凡夫愛命達著狥名王雖薨徂功著丹青人誰不沒德貴有遺乃作誄曰幼有令德光輝圭璋孝殊閔氏義達參商溫溫其恭爰柔克剛心存建業王室是匡矯矯元戎雷動雨徂橫行燕氏威懾北胡奔虜無竄還戰高柳王率壯士常為君首宜究長年永保皇家如何奄忽景命不遐同盟飲淚百寮咨嗟文帝誄惟黃初七年五月七日大行皇帝崩嗚呼哀哉于時天震地駭崩山隕霜陽精薄景五緯錯行百姓吁嗟萬國悲悼若喪考妣思慕過唐劈踊郊野仰想穹蒼僉曰何辜早世隕喪嗚呼哀哉悲夫大行忽焉光滅永棄萬民雲往雨絶承問荒忽惛懵哽咽袖鋒抽刃欲自僵斃追慕三良甘心同穴感惟南風惟以鬱滯終於偕沒指景自逝考諸先記尋之哲言生若浮寄惟德可論朝聞夕逝孔志所存皇雖一歿天祿永延何以述德表之素旃何以詠功宣之管絃乃作誄曰皓皓太素兩儀始分中和産物肇有人倫爰暨三皇實秉道真降逮五帝繼以懿純三代製作踵武立勳季嗣不維網漏于秦崩樂滅學儒坑禮焚二世而殲漢氏乃因弗求古訓嬴政是遵王綱帝典闃爾無聞末光幽昧道究運遷乾坤回歷簡聖授賢乃眷大行屬以黎元龍飛啓祚合契上玄五行定紀改號革年明明赫赫受命于天仁風偃物德以禮宣祥惟聖質嶷在幼妍研幾六典學不過庭潛心無妄抗志清冥才秀藻朗如玉之瑩聽察無響瞻覩未形其剛如金其貞如瓊如冰之潔如砥之平爵公無私戮違無輕心鏡萬機攬照下情思良股肱嘉昔伊呂搜揚側陋舉湯代禹拔才巖穴取士蓬戶唯聽是索弗拘禰祖宅土之表道義是圖弗營厥險六合是虞齊契共遵下以純民恢折規矩克紹前人科條品制褒貶以因乘殷之輅行夏之辰金根黃屋翠葆龍鱗紼冕崇麗衡紞維新尊肅禮容矚之若神方牧妙舉欽於恤民虎將荷節鎮彼四鄰朱旗所勦九壤被震疇克不若孰敢不臣縣旌海表萬里無塵虜備凶徹鳥殪江岷摧若涸魚乾鱗肅慎納貢越裳效珍條支絶域內賓德儕先王功侔太古上靈降瑞黃初叔祜河龍洛龜陵波遊下平均應繩神鸞翔舞數莢階除系風扇暑皓獸素禽飛走郊野神鍾寶鼎形自舊土雲英甘露瀸塗被宇靈芝冒沼朱華陰渚回回凱風祁祁甘雨稼穡豐登我稷我黍家佩惠君戶蒙慈父圖致太和洽德全義將登泰山先皇作儷鐫石紀勳兼録衆瑞方隆封禪歸功天地賓禮百靈勳命視規望祭四嶽燎封奉柴肅于南郊宗祀上帝三牲既供夏禘秋嘗元侯佐祭獻璧奉璋鸞輿幽藹龍旗太常爰迄太廟鐘鼓鍠鍠頌德詠功八佾鏘鏘皇祖既饗烈考來享神具醉止降茲福祥天地震蕩大行康之三辰暗昧大行光之皇紘惟絶大行綱之神器莫統大行當之禮樂廢弛大行張之仁義陸沉大行揚之潛龍隱鳳大行翔之疏狄遐康大行匡之在位七載元功仍舉將永大和絶迹三五宜作物師長為神主壽終金石等算東父如何奄息摧身后土俾我煢煢靡瞻靡顧嗟嗟皇穹胡寧忍務嗚呼哀哉明監吉凶體遠存亡深垂典制申之嗣王聖上虔奉是順是將乃創玄宇基為首陽擬迹穀林追堯慕唐合山同陵不樹不疆塗車芻靈珠玉靡藏百神警侍來賓幽堂耕禽田獸望魂之翔於是俟大隧之致力兮練元辰之淑禎潛華體於梓宮兮馮正殿以居靈顧望嗣之號咷兮存臨者之悲聲悼晏駕之既往兮感容車之速征浮飛魂於輕霄兮就黃墟以滅形背三光之昭晰兮歸玄宅之冥冥嗟一往之不返兮痛閟闥之長扃咨遠臣之眇眇兮感凶諱以怛驚心孤絶而靡告兮紛流涕而交頸思恩榮以橫奔兮閡闕塞之嶢崢顧衰絰以輕舉兮關防之我嬰欲高飛而遙憩兮憚天綱之遠經遙投骨於山足兮報恩養於下庭慨拊心而自悼兮懼施重而命輕嗟微軀之是效兮甘九死而忘生幾司命之役籍兮先黃髮而隕零天蓋高而察卑兮冀神明於我聽獨鬱伊而莫告兮追顧景而憐形奏斯文以寫思兮結翰墨以敷誠嗚呼哀哉大司馬曹休誄於穆公侯魏之宗室明德繼踵奕世純粹闡弘泛愛仁以接物藝以為華體斯亮實年沒弱冠志在雄英高揖名師發言有章東夏翕然稱曰龍光貧而無怨孔以為難嗟我公侯屢空是安不耽世祿親悅為歡好彼蓬樞甘彼瓢簞味道忘憂踰憲超顏矯矯公侯不橈其厄呵叱三軍躬奮雉戟足蹴白刃手按飛鏑終弭淮南保我疆埸卞太后誄率土噴薄三光改度陵頽谷踊五行牙錯皇室蕭條羽檄四布百姓欷歔嬰兒號慕若喪考妣天下縞素聖者知命殉道寶名義之攸在亦棄厥生敢揚后德表之旐旌光垂罔極以慰我情乃作誄曰我王之生坤靈是輔作合于魏亦光聖武篤生文帝紹虞之緒龍飛紫宸奄有九土詳惟聖善岐嶷秀出德配姜嫄不忝先哲玄覽萬機兼才備藝泛納容衆含垢藏疾仰奉諸姑降接儔列陰處陽潛外明內察及踐大位母養萬國溫溫其人不替明德悼彼邊氓未遑宴息恆勞庶事兢兢翼翼親桑蠶館為天下式樊姬霸楚書載其庸武王有亂孔嘆其功我后齊聖克暢丹聰不出房闥心照萬邦年踰耳順乾乾匪倦珠玉不玩躬御綈練日旰忘飢臨樂勿聽去奢即儉曠世作顯慎終如始蹈和履貞恭事神祗昭奉百靈局天蹐地祗畏神明敬惟慎獨報禮幽冥虔肅宗廟蠲薦三牲降福無疆祝云其誠宜享斯祜蒙祉自天何圖凶咎不勉斯年嘗禱盡禮有篤無痊豈命有終神食其言遺孤在疚承諱東藩劈踊郊甸灑淚中原追號皇妣棄我何遷昔垂顧復今何不然空宮寥廓棟宇無煙物省階塗髣佛櫺軒仰瞻帷幄俯察几筵物不毀故而人不存痛莫酷斯彼蒼者天遂臻魏都游魂舊邑大隧開塗靈魄斯戢歎息霧興揮淚雨集徘徊輀柩號咷弗及神光既幽佇立以泣容車飾駕以合北辰文選顏延年宋元皇后哀策文李注引上宣后誄表平原懿公主誄平原懿主公公主誄俯振地紀仰錯天文悲風激興霜猋雪氛凋蘭夭蕙良幹以泯於惟懿主瑛瑤其質協策應期含英秀出岐嶷之姿實朗實在生十旬察人識物儀同聖表聲協音律驤眉識往俯首知來求顏必笑和音則該阿保接手侍御充傍常在襁褓不停幃床專愛一宮取玩聖皇何圖奄忽罹天之殃魂神遷移精爽翱翔號之不應聽之不聆帝用吁嗟嗚呼失聲嗚呼哀哉憐爾早沒不逮陰光改封大郡惟帝舊疆建土開家邑移蕃王琨珮惟鮮朱紱斯煌國號既崇哀爾孤獨配爾名子華宗貴族爵以列侯銀艾優渥成禮于宮靈輀交轂生雖異室歿同山嶽爰構玄宮玉石交連朱房皓壁皓曜電鮮飾終備泣法生象存長埏繕修神閨掩扉二柩並降雙魂孰依人誰不歿憐爾尚微阿保激感上聖傷悲城闕之詩以日喻歲況我愛子神光長滅扃關一闔曷其復晰金瓠哀辭金瓠豫之首女雖未能言固已授色知心矣生十九旬而夭折乃作此辭辭曰在襁褓而撫育向孩笑而未言不終年而夭絶何見罰於皇天信吾罪之所招悲弱子之無愆去父母之懷抱滅微骸於糞土天長地久人生幾時先後無覺從爾有期行女哀辭行女生于季秋而終于首夏三年之中二子頻喪伊上帝之降命何短修之難裁或華髮以終年或懷妊而逢災感前哀之未闋復新殃之重來方朝華而晚敷比辰露而先晞感逝者之不追悵情忽而失度天蓋高而無階懷此恨其誰訴家王征蜀漢文選謝靈運擬魏太子鄴中詩李注引行女哀辭此疑哀辭序中脫文仲雍哀辭曹喈字仲雍魏太子之仲子也三月而生五月而亡昔后稷之在寒冰鬭穀之在楚澤咸依鳥馮虎而無風塵之災今之玄笫文茵無寒冰之慘羅幃綺帳暖於翔鳥之翼幽房間宇密於雲夢之野慈母良保仁乎鳥虎之情卒不能延期於朞載離六旬而夭殃彼孤蘭之眇眇亮成幹其畢榮哀綿綿之弱子早背世而潛形且四孟之未周將何願乎一齡陰雲回於素蓋悲風動其扶輪臨埏闥以欷歔淚流射而沾巾流塵飄蕩魂安歸文選劉休玄擬古詩李注引仲雍誄誄疑即此哀辭痛玄廬之虛廓文選陸士衡挽歌李注引仲雍哀辭詰紂文崇侯何功乃用為輔西伯何辜囚之囹圄囹圄既成負土既盈興立炮烙賊害忠貞封氏聞見記六誥咎文五行致災先史咸以為應政而作天地之氣自有變動未必政治之所興致也于時大風發屋拔木意有感焉聊假天帝之命以誥咎祈福辭曰上帝有命風伯雨師夫風以動氣雨以潤時陰陽協和庶物以滋亢陽害苗暴風傷條伊周是遇在湯斯遭桑林既禱慶雲克舉偃禾之復姬公去楚況我皇德承天統民禮敬川嶽祗肅百神享茲元吉釐福日新至若炎旱赫羲猋風扇發嘉卉以委良木以拔何谷宜填何山應伐何靈宜論何神宜謁於是五靈振悚皇祇赫怒招搖驚怯搶奮斧河伯典澤屏翳司風回呵飛厲顧叱風隆息猋遏暴元敕華嵩慶雲是興效厥豐年遂乃沈陰坱圠甘澤微微雨我公田爰暨于私黍稷盈疇芳草依依靈禾重穗生彼邦畿年登歲豐民無餒飢
