body:
  text: 魏卷五十二嵇康廣成子聖賢高士傳廣成子在崆峒之上黃帝問曰吾欲取天地之精以養萬物為之柰何廣成子蹶然而起曰至道之精窈窈冥冥無視無聽抱神以靜我守其一目處其和故千二百歲而形未嘗衰得吾道者上為皇下為王失吾道者上見光而下為土吾將去汝入無窮之閒遊無極之野與日月參光與天地為常蓺文類眾三十六襄城小童黃帝將見大隗于具茨之山方明為御昌寓參乘黃帝曰異哉請問天下小童曰子少遊六合之外適有瞀病有長者教子乘口車遊于襄城之野今病少損將復六合之外為天下者子奚事焉夫為天下亦奚異牧馬哉去其害馬而已黃帝再拜稱天師而還蓺文類聚三十六奇矣難測襄城小童倦遊六合來憩茲邦巢父巢父堯時隱人年老以樹為巢而寢其上故人號為巢父堯之讓許由也由以告巢父巢父曰汝何不隱汝形藏汝光非吾友也乃擊其膺而下之許由悵然不自得乃遇清泠之水洗其耳拭其目曰嚮者聞言負吾友遂去終身不相見蓺文類聚三十六許由許由字武仲堯舜皆師之與齧缺論堯而去隱于沛澤之中堯舜乃致天下而讓焉曰十日竝出而爝火不息其光也其光也不亦難乎夫子為天子則天下治我由尸之吾自視缺然許由曰吾將為名乎名者實之賓吾將為賓乎乃去宿于逆旅之家旦而遺其皮冠巢父聞由為堯所讓以為汙乃臨池水而洗其耳池主怒曰何目汙我水由乃退而遯耕于中岳潁水之陽箕山之下蓺文類聚三十六許由養神宅于箕阿德真體全擇日登遐御覽五十六壤父壤父者堯時人年五十而擊壤于道中觀者曰大哉帝之德也壤父曰吾日出而作日入而息鑿井而飲耕地而食帝何德于我哉蓺文類聚三十六子州支父子州支父者堯舜各以天下讓支父支父曰子適有幽憂之病方且治之未暇治天下也遂不知所之蓺文類聚三十六御覽五百九善卷善卷者古之賢人也舜以天下讓之善卷曰子立宇宙之中冬則衣皮毛夏則衣絺葛日出而作日入而息消搖天地之閒何以天下為哉遂入深山莫知其所終蓺文類聚三十六御覽二十六石戶之農石戶之農不知何許人與舜為友舜以天下讓之石戶夫負妻戴攜子以入海終身不反蓺文類眾三十六御覽五百九伯成子高伯成子高者不知何許人也唐虞之時為諸侯至禹復去而耕禹往趨而問之曰昔堯舜治天下吾子立為諸侯堯授舜舜授子吾子去而耕敢問其故何邪子高曰昔堯治天下至公無私不賞而民勸不罰而民畏今子賞而不勸罰而不畏德自此衰刑自此作夫子盍行乎無留吾事俋俋乎遂復耕而不顧蓺文類聚三十六御覽五百九卞隨務光卞隨務光者不知何許人湯將伐桀因卞隨而謀曰非吾事也湯遂伐桀以天下讓隨隨曰后之伐桀謀于我必以我為賊也而又讓我必以我為貪也吾不忍聞乃自投湘水又讓務光光曰廢上非義殺民非仁無道之世不踐其土況于尊我哉乃抱石而沈廬水庚市子庚市子者聖人無欲者也見人爭財而訟推千金之璧于其旁而訟者息御覽五百九小臣稷小臣稷者齊人抗厲希公桓公三往而不得見公曰吾聞士不輕爵祿無以易萬乘之主萬乘之主不好仁義無以下布衣之士于是五往乃得見焉御覽五百九涓子齊子涓子齊子不接賓客服食甚精至三百年後釣于河澤得鯉中魚符後隱于宕石山能致風雨告伯陽九仙法淮南王少得其文不能解其旨御覽五百九商容商容不知何許人也有疾老子問之曰先生無遺教以告弟子商容曰將語子過故鄉而下車知之乎老子曰非謂不忘故邪容曰過喬奔而趨知之乎老子曰非謂其敬老乎容張口曰吾舌存乎曰存吾齒存乎曰亡知之乎老子曰非為其剛亡而弱存商容曰嘻天下事盡矣蓺文類聚三十四御覽五百九老子良賈深藏外形若虛君子盛德容貌若不足關令尹喜關令君喜州大夫也善內學星辰服食老子西遊喜先見氣物色遮之果得老子老子為著書因與老子俱之流沙西服巨勝實莫知所終御覽五百九亥唐亥唐晉人也高恪寡素晉國憚之雖蔬菜羹平公每為之欣飽公與亥唐坐有閒亥唐出叔向入平公伸一足曰吾向時與亥子坐腳痛足痺不敢伸叔向浡然作色不悅公曰子欲貴乎吾爵子子欲富乎吾祿子夫亥先生乃無欲也非正坐無以養之子何不悅乎御覽五百九項橐孔子問項橐曰居何在曰萬流屋是也注曰言與萬物同流匹也狂接輿狂接輿楚人也耕而食楚王聞其賢使使者持金百鎰聘之曰願先生治江南接輿笑而不應使者去其妻從市來曰門外車馬迹何深也接輿具告之妻曰許之乎接輿曰貴富人之所欲子何惡之妻曰吾聞聖人樂道不以貧易操不為富改行受人爵祿何以待之接輿曰吾不許也妻曰誠然不如去之夫負釜甑妻戴紝器變姓名莫知所之嘗見仲尼歌而過之曰鳳兮鳳兮何德之衰往者不可諫來者猶可追後更姓名陸通養性在蜀峨嵋山上世世見之御覽五百九榮啟期榮啟期者不知何許人也披裘帶索鼓琴而歌孔子曰先生何樂也對曰天生萬物惟人為貴吾得為人一樂也以男為貴吾得為男二樂也人生有不全于繈緥吾行年九十五矣是三樂也貧者士之常死者民之終居常以待終何不樂也御覽五百九長沮桀溺長沮桀溺者不知何許人也耦而耕孔子過之使子路問津焉長沮曰夫執輿者是誰子路曰是孔子是魯孔丘歟曰是也是知津矣問于桀溺桀溺曰子為誰曰仲由孔丘之徒歟對曰然與其從避人之士豈若避世之士哉耰而不輟子路以告孔子孔子撫然曰鳥獸不可與同群吾非斯人之徒歟御覽五百九荷蓧丈人荷蓧丈人不知何許人也子路從而後問曰子見夫子乎丈人曰四體不勤五穀不分孰為夫子植其杖而耘子路行以告子曰隱者也使子反見之至則行矣御覽五百九太公任太公任者陳人孔子圍陳七日不火食太公任弔之曰子幾死乎夫直木先伐甘井先竭子其飾智以矜愚修身以明汙昭昭如揭日月而行故汝不免于患也孰能削迹捐勢不為功名者哉無責于人人亦無責焉孔子曰善辭其交遊巡于大澤入獸不亂群而況人也御覽五百九漢陰丈人漢陰丈人者楚人也子貢適楚見丈人為圃入井抱甕而灌用力甚多子貢曰有機于此後重前輕曰𣚃槔用力寡而見功多丈人作色曰聞之吾師有機事者必有機心機心存于胸則純白不備子貢愕然慚不對有閒丈人曰子奚為曰孔丘之徒也丈人曰子非博學以疑聖知獨絃歌以買聲名于天下者乎方且亡汝神氣墮汝形體何暇治天下乎子往矣勿妨吾事御覽五百九被裘公被裘公者吳人也延陵季子出遊見道中有遺金顧而謂公曰取彼金公投鎌瞋以拂手而言曰何子居之高而視之卑五月被裘而負薪豈取遺金者哉季子大驚既謝而問其姓名公曰吾子皮相之士何足語姓名哉蓺文類聚三十六御覽二十二延陵季子延陵季子名札吳王之子最少而賢使上國還會闔閭使專諸刺殺王僚致國于札札不受去之延陵終身不入吳國初適魯聽樂論眾國之風及過徐徐君欲其劍札心許之及還徐君已死即解帶挂樹而去御覽五百九原憲原憲味道財寡義豐栖遲蓽門安賤固窮絃歌自樂體逸心沖進應子貢邈有清風初學記十七范蠡范蠡者徐人也相越滅吳去之齊號鴟夷子治產數千萬去止陶為陶朱公後累巨萬一曰蠡事周師太公服飲桂水去越入海白餘年乃見于陶一旦棄資財賣藥于蘭陵世世見之御覽五百九屠羊說屠羊說者楚人隱于屠肆昭王失國說往從王王反國將欲賞說說曰大王失國說失屠羊大王反國說亦屠羊臣之爵祿復矣又何賞之有王使司馬子綦延之以三珪之位說曰願長反屠羊之肆耳遂不受御覽五百九市南宜僚市南宜僚楚人也姓熊白公為亂使石乞告之不從承以劍與僚弄丸不輟魯候問曰吾學先生之道勤而行之然不免于憂患何也僚曰君今能刳形洗心而遊無人之野則無憂矣御覽五百九周豐周豐魯人也潛居自貴哀公執贄請見之豐辭使人問曰有虞氏未施信于民而民信夏后氏未施敬于民而民敬何施而得此于民也對曰墟墓之閒未施哀于民而民哀宗廟社稷中未施敬于民而民敬殷人作誓而民始叛周人作會而民疑苟無禮義忠信誠愨之心以蒞之然雖固結之民其可不解乎御覽五百十顏閣顏閣者魯人也魯君聞其賢以幣聘焉閣方服布衣自飲牛使者問曰此顏閣家邪曰然使者致幣閣口恐聽誤而遺使者羞使者反復來求之閣乃鑿坯而遁御覽五百九段干木段干木者治清節游西河守道不仕魏文侯就造其門干木踰垣而避之文侯以客禮出過其廬則式其僕問之文侯曰干木不趣勢隱處窮巷聲馳千里敢勿式乎文侯所以名過齊桓公者能尊段干木敬卜子夏友田子方也蓺文類聚三十六莊周莊周少學老子梁惠王時為蒙縣漆園吏以卑賤不肯仕楚威王以百金聘周周方鈞于濮水之上曰楚有龜死三千歲矣今巾笥而藏之于廟堂之上此龜寍生而掉尾塗中耳子往矣吾方掉尾于塗中後齊桓王又以千金之幣迎周為相周曰子不見郊祭之犧牛乎衣以文繡食以芻菽及其牽入太廟欲為孤豚其可得乎遂終身不仕蓺文類聚三十六閭丘先生閭丘先生齊人也齊宣王獵于杜山杜山父老十三人相與勞王王賜父老衣服父老皆謝先生獨不拜王曰少也復賜無徭役先生復獨不拜王曰父老幸勞之故荅以二賜先生獨不拜何也閭丘曰聞王之來願得壽得富得貴于大王也王曰死生有命非寡人也倉廩備蓄無以富先生大官無闕無以貴先生閭丘曰非所敢望願選良吏平法度則臣得壽矣振之以時則臣得富矣令少敬長則臣得貴矣御覽五百九顏歇顏歇者齊人也宣王見之王曰歇前歇曰王前王不悅歇曰夫歇前為慕勢王前為趨士王作色曰士貴乎歇曰昔秦攻齊令曰敢近柳下惠壟樵者罪死不赦有能得齊王頭者封萬戶由是觀之生王之頭不如死士之壟齊王曰願先生與寡人遊食太牢乘安車歇曰願得蔬食以當肉安步以當輿無罪以當貴清淨以自娛遂辭而去御覽五百十魯連魯連者齊人好奇偉俶儻嘗遊趙秦圍邯鄲連難新垣衍以秦為帝秦軍為卻平原君欲封連連三辭不受平原君又置酒乃以千金為連壽連笑曰所貴天下之士者為人排患釋難而無取也即有取之是商賈之事爾不忍為也及燕將守聯城田單攻之不能下連乃為書射城中遺燕將燕將見書泣三日乃自殺城降田單欲爵連連曰吾與于富貴而詘于人寍貧賤輕世而肆意遂隱居海上莫知所在蓺文類聚三十六御覽五百十田生田生管床茅屋不肯仕宦惠帝親自往不出屋蓺文類聚三十六河上公河上公不知何許人也謂之丈人隱德無言無德而稱焉安丘先生等從之修其黃老業御覽五百十安丘生長靈安丘生病篤弟子公沙都來省之與安共至于庭樹下聞李香開以見雙赤著李枯枝自墮掌中安食之所苦盡愈御覽九百六十八司馬季玉司馬季玉者楚人也卜于長安漢文帝時朱忠賈誼為太中大夫誼曰吾聞聖人不居朝廷必在巫醫試觀卜數中見季玉閉中弟子侍而論陰陽之紀二人曰觀先生之狀見先生之辭世未嘗見也尊官高位賢者所處何業之卑何行之污季玉笑曰觀大夫類有道術何言之陋夫相引以勢相導以利所謂賢者乃可為羞耳夫內無飢寒之累外無劫奪之憂處上而有敬居下而無害君子道也卜之為業所謂上德也鳳凰不與燕雀為群公等喁喁何知長者二人忽忽不覺自失後不知季玉所在御覽五百十司馬相如司馬相如者蜀郡成都人字長卿初為郎事景帝梁孝主來朝從游說士鄒陽等相如說之因病免游梁後過臨邛富人卓王孫女文君新寡好音相如以琴心挑之文君奔之俱歸成都後居貧至臨邛買酒舍文君當壚相如著犢鼻㡓滌器市中為人口吃善屬文仕宦不慕高爵嘗託疾不與公卿大事終于家其贊曰長卿慢世越禮自放犢鼻居市不恥其狀託疾避官蔑此卿相乃賦大人超然莫尚韓福韓福者以行義修絜漢昭帝時以德行徵病不進元鳳元年詔賜帛五十匹遣長吏時以存問常以八月賜羊不幸死者賜複衾一祠以中牢自是至今為徵士之故事福終身不仕卒于家蓺文類聚三十六班嗣班嗣樓煩人也世在京師家有賜書內足于財好老莊之道不屑榮官恆居山父黨揚子雲以下莫不造門桓君山從借莊子嗣報曰若莊子著絕聖棄智修性保身清虛淡泊歸之自然釣漁于一壑則萬物不干其志棲遲于一丘則天下不易其樂今吾子關仁義之羈絆係聲名之繮鎖伏孔氏之軌躅馳顏閔之極蓺既擊攣于世教矣何用大道為自炫燿也昔有學步邯鄲者失其故步匍匐而歸耳恐似此類故不進也其行己持論如此遂終于家蓺文類聚三十六御覽五百十蔣詡蔣詡字元卿杜陵人為兗州刺史王莽為宰衡詡奏事到灞上稱病不進歸杜陵荊棘塞門舍中三徑終身不出時人諺曰楚國二龔不如杜陵蔣翁御覽五百十尚長禽慶尚長字子平禽慶字子夏二人相善慶隱避不仕王莽長通易老子安貧樂道好事者更饋遺輒受之自足還餘如有不取也舉措必于中和司空王邑辟之連年乃欲薦之于莽固辭乃止遂求退讀易至損益卦喟然歎曰吾知富貴不如貧賤未知存何如亡爾為子嫁娶畢敕家事斷之勿復相關當如我死矣是後肆意與同好游五岳名山遂不知所在蓺文類聚三十六逢貞李劭公逢貞字叔平杜陵人李劭公上邵人貞世二千石王莽辟不至嘗為杜陵門下椽終身不窺長安門但閉戶讀書未嘗問政不過農田之事劭公王莽時辟地河西建武中竇融欲薦之面辭乃止家累百金優游自樂御覽五百十六百十一嶭方嶭方齊人養德不仕王莽安車迎方因謝曰堯舜在上下有巢許今明王方欲隆唐虞之德亦猶小人臣欲守箕山之志莽說其言遂終于家御覽五百十龔勝龔勝楚人王莽時遣使徵聘義不事二姓遂不食而死有父老來弔甚哀既而曰嗟乎薰以香自燒膏以明自消龔先生竟夭天年非吾徒也趨而出終莫知其誰也御覽五百十逢萌徐房李雲王尊逢萌徐房李雲王尊同時相友世號之四子御覽五百九王尊字君公明易為郎數言事不用乃自汙與官婢通免歸詐狂儈牛口無二價井丹字大春扶風郿人博學高論京師為之語曰五經紛綸井大春未嘗書刺謁一人北宮五王更請莫能致新陽侯陰就使人要之不得已而行侯設麥飯蔥菜以觀其意丹推卻曰以君侯能供美膳故來相過何謂如此乃出盛饌侯起左右進輦丹笑曰聞桀紂駕人車此所謂人車者邪侯即去輦越騎梁松貴震朝廷請交丹丹不肯見後丹得時疾松自將醫視之疾愈久之松失大男磊丹一往弔之時賓客滿廷丹裘褐不完入門坐者皆竦望其顏色丹四向長揖前與松語客主禮畢後長揖徑坐莫得與語不肯為吏徑出後遂隱遁其贊曰井丹高潔不慕榮貴抗節五王不交非類顯譏輦車左右失氣被褐長揖義陵群萃世語品藻篇注又略見御覽四百十鄭仲虞鄭均字仲虞不知何許人也不仕漢朝章帝自往終不肯起曰陛下何惜不為上世君令臣得為偃息之民天子以尚書祿終其身世號之白衣尚書御覽五百十
