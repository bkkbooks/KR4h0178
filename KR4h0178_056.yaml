body:
  text: 魏卷五十六闕名橫海將軍呂君碑銘君諱博望人也其先四嶽出自炎帝內輔機衡外司方職是以族繁毓申呂竝興君其冑也君天姿果毅仍于武武而不害當值季末漢失其御群雄爭逸海內隔王塗穢塞君以中勇顯名州司試守雉長執戈秉戎慎守畺易兵不頓于敵國墜不侵于四鄰拜武猛都尉厲節中郎將裨將軍封關內侯王師南征與充軍從奄有江漢舍爵冊勳封陰德亭侯領郡鳩集荒散為民統紀三攷有成轉拜平狄將軍改封盧亭侯莅國賦政十有三年正身帥下儉以足用食不貳膳坐不重席廄無食粟之馬出無副車之從生不利家死不託孤可謂良大夫也雖叔敖相楚晏嬰在齊不能尚也行師御眾暑即不蓋寒即不裘其于戰也即履矢石之所及鋒刃之所先雖古良將不能踰也會水口關羽猖獗為寇蕩搖邊鄙虔劉民人而洪水播溢氾沒樊城平源十刃外瀆潛通猛將驍騎載沈載浮于是不逞作慝群凶鼎沸或保城而叛或率眾負旌自叩敵門中人以下竝生異心君威懷之信臨難益著故能桀然攘除姦逆獨存社稷連城十三民無虺蜴帝加其庸轉拜橫海將軍徙封西鄂都鄉侯食邑并七百戶將遂播聲于方表埽醜虜于南域建元功于大魏書洪于宗彝不弔昊天降茲災咎寢疾一旬大命隕隧年六十有一黃初二年正月子薨于帝主閔寮傷悼使謁者弔祠賻贈有加臣吏士庶莫不哀于是故郡吏楊向追惟惠君攀慕网極迺共刊石勒銘昭示來裔其辭曰炎靈降精嶽祚後昆膺期誕授實生我君桓桓口毅抑之以文整軍容入在惠民禦敵用威附下以仁義刑既著允濟口勳鑽功金石下缺隸釋十九豐都市古冢銘筮道若朝龜言近市五百年閒于斯見矣御覽一百九十一引西京記云東京豐都初築市掘得古冢銘云云當時達者參驗其文魏黃初二年所葬也唐君元巃西人太守先大饗記魏大饗記殘碑陳留謝渡舊樂孫有而仰廬一何過可閒章興足天趙宋岷東畢方承高范會東中山時亦童晉唐景寬安定反歷陶陽剔前僧山仲喜其夫堂廚眾將望曰刑庶時卒為氣維黃初三年月繇文為書千秋萬代主重居外天地始至里文王大饗之皇高徒集有之魁萬名一據東西南術復歌歎麗建起尚盤古羅天為感續于其樵室去殆冠獲不我是憤漢則瑞為至府隸續四伊闕左壁摩崖黃初四年六月二十四日辛巳大出水舉高四丈五尺齊此已下水經伊水注云蓋記水之漲減也自王氏之先出季下闕九世乃復聞聲下闕眾勝邯鄲之圍強下闕其爵者曰侯王景政下闕溺而濡足至孝昭二季下闕夏甫舉孝廉政令噲字叔恭博士徵陽下闕已後下闕京師者五世下闕陽太守自高平就學下闕宗直道者率困而後下闕子勃海府丞次子尚書郎下闕茂舉孝廉為譙令去官下闕仇牧之忿舊不顧難名下闕弱弟居荒亂之中鯨下闕為郡功曹去官家拜下闕令所宰莅馳化如神下闕辰也季卌有一黃初五下闕張氏祔于先姑仰堂宇下闕上闕念鼎足爰建時雝式不上闕魏后實天所授兆發毛如舊上闕周服從此龍光文好俎豆武侯鷹揚上闕十朱旗乃舉席卷三克成帝宇下闕路逸民逸民匪彫匪琢哲有處顯允君子或默或語上闕光隆前伊漢中葉皇極不建上闕我漢聘車束帛有琖上闕庶績咸喜咨爾陽維上闕亢允匪攸居王所上闕空彝倫攸沖質炎中微上闕人得剛克上闕有馥其馨時上闕哉宜帝庭內菅機密軌平出上闕赫如榮身歿名立永揚德顯上闕用康將和門剖符景上闕來世饗隸續十一劉鎮南碑劉鎮南碑君諱表字景升山陽高平人也君膺期誕生瑰偉大度黃中通理博物多識為郡功曹千里稱平上計吏辟大將軍府遷北軍中侯在位十旬以賢能特選拜荊州刺史初平元年十一月到官清風先驅莫不震肅奸軌改節不仁引頸君乃布愷悌流惠和慕唐叔之野棠思王遵之驅卬賦政造次德化宣行俄而漢室大亂禍起蕭牆賊臣專政豪雄虎爭縣邑閭里奸仇煙發州縣殘破天下土崩四海大壞當是時也雖有孔翟之聖賢育賁之勇勢無所措其智力君遇險而建略遭難而發權招命英俊援得驍雄謀臣武將合策明計出次北境遷屯漢陰因滄浪以為隍即春葉以為庸南撫衡陽東綏淄沂西靖巫山保乂四疆選才任良式序賢能𥳑將命卒棊布星陳備要塞之處戍八方之邊勸穡務農以田以漁稌粟紅腐年穀豐夥江湖之中無劫掠之寇沅湘之閒無攘竊之民郡守令長冠帶章服府寺亭鄉崇棟高門皆如其舊當世知名輻輳而至四方繈負自遠若歸窮山幽谷于是為邦百工集趣機巧萬端器械通變利民無窮鄰邦懷慕交揚益州盡遣驛使冠蓋相望下民有康哉之歌群后有歸功之緒莫匪嘉績克厭帝心即遷州牧又遷安南將軍領州如故于時諸州或失土流播或水潦沒害人民死喪百遺二三而君保完萬里至于滄海聖朝欽亮析圭授土俾揚武威遺御史中丞鍾繇即拜鎮南將軍錫鼓吹大車策命襃崇謂之伯父置長史司馬從事中郎開府辟召儀如三公上復遣左中郎將祝耽授節以增威重并督交揚益三州委以東南惟君所裁雖周召授分陝之任不過遠也交州殊遠王塗未夷夷民歸附大小受命其郡縣長吏有缺皆來請之君權為選置以安荒裔輒別上聞齊桓遷邢封衛之義也武功既亢廣開雍泮設俎豆陳罍彝親行鄉射躋彼公堂篤志好學吏子弟受祿之徒蓋以千計洪生巨儒朝夕講誨誾誾如也雖洙泗之閒學者所集方之蔑如也深愍未學遠本離質乃令諸儒改定五經章句刪剗浮辭芟除煩重贊之者用力少而探微知機者多又求遺書寫還新者留其故本于是古典墳集充滿州閭及延見武將文吏教令溫雅禮接優隆言不及軍旅之事辭不遷官曹之文上論三墳八索之典下陳輔世忠義之方內剛如秋霜外柔如春陽不伐其善不有其庸如彼川流每往茲通可謂道理丕才命世希有者已仁者壽宜享胡考昊天不弔年六十有七建安十三年八月遘疾殞薨耕夫罷耜織女投杼老幼哀號若喪父母時道路艱險留墳州土轉移葬歸立墓父勉其子妻勉其夫欲共扶送至于鄉里南鄉太守樂陽亭侯旻思等言及志在州里者自各發卒具送靈柩之資授徵拜五官中郎將乃共上歸本縣葬見聽許太和二年葬于先塋于是故臣懼淪休伐以為申伯甫侯之翼周室受輅車乘馬玄袞赤舄之賜詩人詠功列于大雅至今不朽況乎將軍牧二川二紀功載王府賜命優備賴而生者毓子孕孫能不歌歎乃作頌曰猗歟將軍膺期挺生桓桓其武溫溫其人初幹千里允顯使臣幕府禮命集于北軍督齊禁旅如羆如熊眷然南顧綏我荊衡將軍之來民安物豐江湖交壤刑清國興蔽芾甘棠召伯聽訟周人勿剗我賴其禎欲報之德胡不億年如何殂逝孤棄萬民鐫勒墓石以紀洪勳昭示來世垂芳後昆宋人所編蔡中郎集又略見世說輕詆篇注案邕死于初平三年而此碑有太和二年之語距邕死已三十六年今移歸魏闕名類千金堨石人腹上刻勒太和五年二月八日庚戌造築此堨更開溝渠此水衡渠上其水助其堅也必經年歷世是故部立石人以記之云爾水經穀水注張詹碑陰白楸之棺易朽之裳銅鐵不入丹器不藏嗟爾後人幸勿我傷水經湍水注蓺文類聚四十御覽五百五十一竝引盛宏之荊州記云冠軍縣東有魏征東軍司張詹墓魏太和時人也刻其碑背云云至元嘉六年民飢始被發金銀朱漆之器雕刻爛然李勝祠前石的銘百族欣戴咸推厥誠水經濟水注張廣碑銘位尊上將體極人臣五子十室榮竝爵均童年嬰稚抱拜王人命婚帝族或尚或嬪御覽漢廬江太守范式碑君諱式字巨功存有夏實曰御龍口胙商周世昭其隆晉主夏盟有士會者光演弘謨翼崇霸業錫邑命族實為范氏則其後也君稟靈醇之茂度體玄亮之殊高徽柔懿恭明允篤恕九德靡爽百行淵備弘道耽蓺恢韜墳籍探嘖研機罔深不入苦乃立德隆禮樹節寶真忠諒足以弼國篤友足輔仁用能昭其洪懿聲充宇甸接華彥于汝墳潤枯斃于荊漢超管鮑之遐蹤信靈評乎炳煥是以化泉流芳鴻奮燿仁闡于權輿濟俗侔乎皇訓群公偉焉弓旌盈路再讓考三府舉高第侍御史拜冀州刺史糾剔瑕慝六教允施翰飛肅于鷹揚典刑軌帝其勳遷廬江太守擬泰和以陶化昭八則以隆治彌弘略惠訓亡倦協齊清源之深閎寶疏氏之至順以疾告辭韜光潛燿詠琴書以寍其猶充洽外內實昭德之奧藪而儀民之淵表也未亮三事終常山相暨子氾孫而胤嗣罔繼粵青龍三年正月丙戌縣長汝南嶭感靈墠之不饗思隆懿模以紹奕世乃與縣之碩儒咨典謨之中同宗之冑昭告祖考俾守厥祀本支著宣融之祚人神協休茂之慶焉禮也于是鄉上計掾翟循州部泰山從事史翟邵等僉以為君雖煇名載籍光颺前列而靈墳亡口儀問靡述遂相與略依舊傳昭撰景行刊銘樹墓以聲百世其辭曰於昭上德實唐之胤誕表靈和蹈規履信窮神周覽祗道之訓邁德徽猶鴻漸奮穢彼夸毗寶此醇懿以文會友以仁翼敷化濟殖群生以遂永言孝思民之攸暨如何昊天不信其軌明德不報胤胙亡紀爰輯訓典詢爾髦士育茲赫以永遐祉詒厥孫謀燿于萬祀碑拓本又宋拓本又隸釋十九上闕子有成父者出仕于齊獲狄榮如孫湫違難為萊大夫遂下闕稟天素皓爾之質兼苞五才九德之茂慈和孝友既著于下闕景山林元本道化致思六經剖判群言綜析無形文辯贍下闕柔民忠正足以格非兼文武之上略懷濟世之弘規初下闕舉孝廉司徒辟州輒請留以自毗輔後辟大將軍府拜下闕國典惟新出為安平安豐太守敷崇惠訓典刑惟明四下闕躬以允帝命遷荊州刺史揚武將軍又遷使持節鎮南下闕穴朱旗所麾前無交兵克敵獲儁斬首萬計賜爵關內下闕無遺策舉無廢功故能野戰則飛虎摧翼圍城則鯨鯢下闕于九有也比進爵常樂亭安樂鄉東武侯增邑五千戶下闕之算征有獨克之威而忠勤之性乃心帝室屢奏封章下闕彌留年七十二景元二年四月辛丑薨公天姿高素與下闕亡則令儉斂以時服于是下闕將矩奉冊追位司空贈以東武侯蜜印綬送以輕車介下闕泰山之速頹恨元勳之未遂俯仰哀歎永懷慘悴以為下闕茦鐫石表墓光示來裔其辭曰上闕塞憲章墳素昭此物則居則利貞在公畢力化流二邦下闕寍民用是息升降順道德讓靡忒曾不憖遺我下闕乾隆閒新出土碑本玉璽文天子羨思慈親魏志文昭甄皇后傳又宋書禮志三張掖刪丹縣柳谷石文張掖刪丹縣柳谷石文上上三天王述大金討大曹金但取之金立中大金馬一匹中正大吉關壽此馬甲寅述水宋書天文志三又符瑞志上謗書謗書臺中有三狗二狗崖柴不可當一狗憑默作疽囊魏志曹爽傳注引魏略三狗謂何晏鄧颺丁謐也默者爽小字也曹爽之勢熱如湯太傅父子冷如漿李豐兄弟如游光魏志夏侯玄傳注引世語與輔國將軍鮮于輔書夷狄不識文字故校尉閻柔保我于天子我與素利為讎往年攻擊之而田校尉助素利我臨陣使瑣奴往聞使君來即便引軍退步度根數數鈔盜又殺我弟而誣我以鈔盜我夷狄雖不知禮義兄弟子孫受天子印綬牛馬尚知美水草況我有人心邪將軍當保明我于天子魏志軻比能傳致魏文帝書金胡缾歐登于明堂周鼎潛乎深泉御覽七百五十八引西域記
