body:
  text: 明帝二改正朔詔黃初以來諸儒共論正朔或以改之為宜或以不改為是意取駮異于今未決朕在東宮時聞之意常以為夫子作春秋通三統為後王法正朔各從色不同因襲自五帝三王以下或父子相繼同體異德或納大麓受終文祖或尋干戈從天行誅雖遭遇異時步驟不同然未有不改正朔用服色表明文物以章受命之符也由此言之何必以不改為是邪宋書禮志一改元景初以建丑月為正月詔昔在庖犧繼天而王始據木德為群代首自茲以降服物氏號開元箸統者既膺受命厤數之期握皇靈遷興之運承天改物序其綱紀雖炎黃少昊顓頊高辛唐虞夏后世系相襲同氣共祖猶豫昭顯所受之運箸明天人去就之符無不革易制度更定禮樂延群后班瑞信使之煥炳可述于後也至于正朔之事當明示變改以彰異代曷疑其不然哉文皇帝踐阼之初庶事草創遂襲漢正不革其統朕在東宮及臻在位每覽書籍之林總公卿之議夫言三統相變者有明文云虞夏相因者無其言也厤志曰天統之正在子物萌而赤地統之正在丑物化而白人統之正在寅物成而黑但含生氣以微成著故太極運三辰五星于上元氣轉三統五行于下登降周旋終則又始言天地與人所以相通也仲尼以大聖之才祖述堯舜範章文武制作春秋論究人事以貫百王之則故于三微之月每月稱王以明三正迭相為首夫祖述堯舜以論三正則其明義豈使近在殷周而已乎朕以眇身繼承洪緒既不能紹上聖之遺風揚先帝之休德又使王教之弛者不張帝典之闕者未補亹亹之德不箸亦惡可已乎今推三統之次魏得地統當以建丑之月為正月攷之群蓺厥義彰矣其改青龍五年春三月為景初元年孟夏四月服色尚黃犧牲用白戎事乘黑首之白馬建大赤之旗朝會建大白之旗春秋冬孟仲季月雖與歲不同至于郊祀迎氣礿祀蒸嘗巡狩蒐田分至啟閉班宣時令中氣晚早敬授民事諸若此者皆以正歲斗建為節此厤數之序乃上與先聖合符同契重規疊矩者也今遵其義庶可以顯祖考大造之基崇有魏惟新之命於戲王公群后百辟卿士靖康厥職帥意無怠以永天休司徒露布咸使聞知稱朕意焉宋書禮志一又略見魏志明帝紀注引魏書又冊府元龜四議牲色詔以建寅之月為正者其牲用玄以建丑之月為正者其牲用白以建子之月為正者其牲用騂此為牲色各從其正不隨所祀之陰陽也祭天不嫌于用玄則祭地不得獨疑于用白也天地用牲得無不宜異邪更議宋書禮志一荅議牲色詔諸議所依據各參錯若陽祀用騂陰祀用黝復云祭天用玄祭地用黃如此用牲之義未為通也天地至尊用牲當同以所尚之色不得專以陰陽為別也今祭皇皇天帝皇皇后地天地郊明堂宗廟皆宜用白其別祭五郊各隨方色祭日月星辰之類用騂社稷山川之屬用玄此則尊卑方色陰陽眾義畼俟宋書禮志一通典五十五郊禘詔蓋帝王受命莫不恭承天地以彰神明尊祀世統以昭功德故先代之典既著則禘郊祖宗之制備也昔漢氏之初承秦滅學之後采摭殘缺以備郊祀自甘泉后土雍宮五畤神祗兆位多不見經是以制度無常一彼一此四百餘年廢無禘祀古代之所更立者遂有闕焉曹氏世系出自有虞氏今祀圜丘以始祖帝舜配號圜丘曰皇皇帝天方丘所祭曰皇皇后地以舜妃伊氏配天郊所祭曰皇天之神以太祖武皇帝配地郊所祭曰皇地之祗以武宣皇后配宗祀皇考高祖文皇帝于明堂以配上帝魏志明帝紀注引魏書又見晉書禮志上宋書禮志三通典四十二議告瑞祀天詔每祀天輒以地配今不地配耶通典五十五告瑞祀天以地配詔祀天以地配此既正義今告瑞祭于五精之帝則地不得闕也通典五十五議告瑞冊文詔告皇天及五精今冊文中都不見五精之帝意何以耶通典五十五詔亭侯以上稱甍夫爵命等級貴賤之序非得偏制蓋禮關存亡諸侯大夫既終之稱以薨卒為別今縣鄉亭侯不幸稱卒非也禮大夫雖食菜不加爵即縣亭侯既受符策茅土名曰列侯非徒食菜之比也于通存亡之制豈得同稱卒邪其亭侯以上當改卒稱薨通典八十三遷盧毓吏尚書詔官人秩才聖帝所難必須良佐進可替否侍中毓稟性貞固心平體正可謂明試有功不懈于位者也其以毓為吏部尚書魏志盧毓傳又見蓺文類聚四十八科郎吏從高堂隆等受經詔昔先聖既沒而其遺言餘教著于六蓺六蓺之文禮又為急弗可斯須離者也末俗背本所由來久故閔子譏原伯之不學荀卿醜秦世之坑儒儒學既廢則風化曷由興哉方今宿生巨儒並各年高教訓之道孰為其繼昔伏生將老漢文帝嗣以鼂錯穀梁寡疇宣帝承以士郎其科郎吏高才解經義者三十人從光祿勳隆散騎常侍林博士靜分受四經三禮主者具為設課試之法夏侯勝有言士病不明經術經術苟明其取青紫如俯拾地芥耳今學者有能究極經道則爵祿榮寵不期而至可不勉哉魏志高堂隆傳報高堂隆疾篤上疏詔生廉侔伯夷直過史魚執心堅白謇謇匪躬如何微疾未除退身里舍昔邴吉以陰德疾除而延壽貢禹以守節疾篤而濟愈生其彊飯專精以自持魏志高堂隆傳高祖光武陵不得耕牧樵採詔昔漢高祖創業光武中興謀除殘暴功昭四海而墳陵崩頹童兒牧豎踐蹈其上非大魏尊崇所承代之意也其表高祖光武陵四面百步不得使民耕牧樵採魏志明帝紀注引魏書賜田滿寵詔君典兵在外專心憂公有行父祭遵之風賜田十頃穀五百斛錢二十萬以明清忠儉約之節焉魏志滿寵傳舉中書郎詔得其人與否在盧生耳選舉莫取有名名如畫地作餅不可啖也魏志盧毓傳又見後漢盧植傳注御覽八百六十案通典十六作魏文帝詔當誤以韓暨為司徒詔太中大夫韓暨澡身浴德志節高絜年踰八十守通彌固可謂純篤老而益劭者也其以暨為司徒魏志韓暨傳得韓暨遺表詔故司徒韓暨積德履行忠以立朝至于黃髮直亮不虧既登三事望獲毗輔之助如何奄忽天命不永曾參臨沒易簀以禮晏嬰尚儉遣車降制今司徒知命遺言卹民必欲崇約可謂善始令終者也其喪禮所設皆如故事勿有所闕特賜溫明祕器衣一稱五時朝服玉具劍佩魏志韓暨傳注引楚國先賢傳荅蔣濟詔微護軍吾弗聞斯言也魏志蔣濟傳追錄陳思王遺文詔陳思王昔雖有過失既克已慎行以補前闕且自少至終篇籍不離于手誠難能也其收黃初中諸奏植罪狀公卿已下議尚書中書祕書三府大鴻臚者皆削除之撰錄植前後所著賦頌詩銘雜論凡百餘篇副藏內外魏志陳思王植傳報倭女王詔制詔親魏倭王卑彌呼帶方太守劉夏遣使送汝大夫難升米次使都市牛利奉汝所獻男生口四人女生口六人班布二匹二丈以到汝所在踰遠乃遣使貢獻是汝之忠孝我甚哀汝今以汝為親魏倭王假金印紫綬裝封付帶方太守假授汝其綏撫種人勉為孝順汝來使難升米牛利涉遠道路勤勞今以難升米為率善中郎將牛利為率善校尉假銀印青綬引見勞賜遣還今以絳地交龍錦五匹絳地縐粟罽十張蒨絳五十匹紺青五十匹荅汝所獻貢直又特賜汝紺地句文錦三匹細班華罽五張白絹五十匹金八兩五尺刀二口銅鏡百枚真珠鉛丹各五十斤皆裝封付難升米牛利還到錄受悉可以示汝國中人使知國家哀汝故鄭重賜汝好物也魏志倭人傳欲得親人為射聲校尉問孫資詔吾年稍長又歷觀書傳中皆歎息無所不念圖萬年後計莫過使親人廣據職勢兵任又重今射聲校尉缺久欲得親人誰可用者魏志劉放傳注引資別傳然如卿言當為遠慮所圖今日可參平勃侔金霍雙玉章者其誰哉同上與司馬懿手詔閒側息望到到便直排閣入視吾面晉書宣帝紀削中山王縣戶璽書制詔中山王有司奏王乃者來朝犯交通京師之禁朕惟親親之恩用寢吏議然法者所與天下共也不可得廢今削王縣二戶七百五十夫克己復禮聖人稱仁朝過夕改君子與之王其誡諸無貳咎悔也魏志中山恭王袞傳引魏書載璽書誡誨趙王幹璽書易稱開國承家小人勿用詩著大車惟塵之誡自太祖受命創業深覩治亂之源鑒存亡之機初封諸侯訓以恭慎之至言輔以天下之端士常稱馬援之遺誡重諸侯賓客交通之禁乃使與犯妖惡同夫豈以此薄骨肉哉徒欲使子弟無過失之愆士民無傷害之悔耳高祖踐阼祗慎萬機申著諸侯不朝之令朕感詩人棠棣之作嘉采菽之義亦緣詔文曰若有詔得詣京都故命諸王以朝聘之禮而楚中山竝犯交通之禁趙宗載捷咸伏其辜近東平王復使屬官歐壽張吏有司舉奏朕裁削縣令有司以曹纂王喬等因九族時節集會王家或非其時皆違禁防朕惟王幼少有恭順之素加受先帝顧命欲崇恩禮延乎後嗣況近在王之身乎且自非聖人孰能無過己詔有司宥王之失古人有言戒慎乎其不覩恐懼乎其所弗聞莫見乎隱莫顯乎微故君子慎其獨焉叔父茲率先聖之典以纂乃先帝之遺命戰戰兢兢靖恭厥位稱朕意焉魏志趙王幹傳與彭城王璽書制詔彭城王有司奏王遣司馬董和齎珠玉來到京師中尚方多作禁物交通工官出入近署踰侈非度慢令違制繩王以法朕用憮然不寍于心王以懿親之重處藩輔之位典籍日陳于前勤誦不輟于側加雅素奉脩恭肅敬慎務在蹈道孜孜不衰豈忘率意正身考終厥行哉若然小疵或謬于細人忽不覺悟以斯為失耳書云惟聖罔念作狂惟狂克念作聖古人垂誥乃至于此故君子思心無斯須遠道焉常慮以累德者而去之則德明矣開心所以為塞者而通之則心夷矣慎行所以為尤者而修之則行全矣三者王之所能備也今詔有司宥王削縣二千戶以彰八柄與奪之法昔羲文作易著休復之語仲尼論行既過能改王其改行茂昭斯義率意無怠魏志彭城王據傳注引魏書載璽書報王朗夫忠至者辭篤愛重者言深君既勞思慮又手筆將順三復德音欣然無量朕繼嗣未立以為君憂欽納至言思聞良規魏志王朗傳報華歆君深慮國計朕甚嘉之賊憑山川二祖勞于前世猶不克平朕豈敢自多謂必滅之哉諸將以為不一探取無由自弊是以觀兵以闚其釁若天時未至周武還師乃前事之鑒朕敬不忘所戒魏志華歆傳報辛毗二虜未滅而治宮室直諫者立名之時也夫王者之都當及民勞兼辦使後世無所復增是蕭何為漢規摹之略也今卿為魏重臣亦宜解其大歸魏志辛毗傳報高柔知卿忠允乃心王室輒克昌言他復以聞魏志高柔傳荅陳群諫治宮室荅陳群諫治宮室王者宮室亦宜竝立滅賊之後但當罷守耳豈可復興役邪是故君之職蕭何之大略也魏志陳群傳露布天下并班告益州劉備背恩自竄巴蜀諸葛亮棄父母之國阿殘賊之黨神人被毒惡積身滅亮外務立孤之名而內貪專擅之實劉升之兄弟守空城而已亮又侮易益土虐用其民是以利狼宕渠高定青羗莫不瓦解為亮仇敵而亮反裘負薪裏盡毛殫刖趾適屨刻肌傷骨反更稱說自以為能行兵于并底游步于牛蹄自朕即位三邊無事猶哀憐天下數遭兵革且欲養四海之耆老長後生之孤幼先移風于禮樂次講武于農隙置亮畫外未以為虞而亮懷李熊愚勇之智不思荊邯度德之戒驅略吏民盜利祁山王師方振膽破氣奪馬謖高祥望旗奔敗虎臣逐北蹈尸涉血亮也小子震驚朕師猛銳踊躍咸思長驅朕惟率土莫非王臣師之所處荊棘生焉不欲使千室之邑忠信貞良與夫淫昏之黨共受塗炭故先開示以昭國誠勉思變化無滯亂邦巴蜀將吏士民諸為亮所劫迫公卿以下皆聽束手魏志明帝紀注引魏略赦遼東吏民公文告遼東玄菟將校吏民逆賊孫權遭遇亂階因其先人劫略州郡遂成群凶自擅江表含垢藏疾冀其可化故割地王權使南面稱孤位以上將禮以九命權親叉手北向稽顙假人臣之寵受人臣之榮未有如權者也狼子野心告令難移卒歸反覆背恩叛主滔天逆神乃敢僭號恃江湖之險阻王誅未加比年已來復遠遣船越渡大海多持貨物誑誘邊民邊民無知與之交關長吏以下莫肯禁止至使周賀浮舟百艘沈滯津岸貿遷有無既不疑拒齎以名馬又使宿舒隨賀通好十室之邑猶有忠信陷君于惡春秋所書也今遼東玄菟奉事國朝紆青拖紫以千百為數戴纚垂纓咸佩印綬曾無匡正納善之言龜玉毀于匱虎兕出于匣是誰之過歟國朝為子大夫羞之昔狐突有言父教子貳何以事君策名委質貳乃辟也今乃阿順邪謀脅從姦惑豈獨父兄之教不詳子弟之舉習非而已哉若苗穢害田隨風烈火芝艾俱焚安能白別乎且又此事固然易見不及鑒古成敗書傳所載也江南海北有萬里之限遼東君臣無怵惕之患利則義所不利貴則義所不貴此為厭安樂之居求危亡之禍賤忠貞之節重背叛之名蠻貊之長猶知愛禮以此示人亦難為顏且又宿舒無罪擠使入吳奉不義之使始與家訣涕泣而行及至賀死之日覆眾成山舒雖脫死魂魄離身何所逼迫乃至于此今忠臣烈將咸忿遼東反覆攜貳皆欲乘桴浮海期于肆意朕為天下父母加念天下新定既不欲勞動干戈遠涉大川費役如彼又悼邊陲遺餘黎民迷誤如此故遣郎中衛慎邵瑁等且先奉詔示意若股肱忠良能效節立信以輔時君反邪就正以建大功福莫大焉儻恐自嫌已為惡逆所見染污不敢倡言永懷伊戚其諸與賊使交通皆赦除之與之更始魏志公孫度傳注引吳書正朔論五帝三王雖同氣共祖禮不相襲正朔自宜改變以明受命之運魏志明帝紀景初元年注引魏書甄皇后哀策文維青龍二年三月壬申皇太后梓宮啟殯將葬于首陽之西陵哀子皇帝叡親奉冊祖載遂親遣奠叩心擗踊號咷仰訢痛靈魂之遷幸悲容車之向路背三光以潛翳就黃壚而安厝嗚呼哀哉昔二女妃虞帝道以彰三母嬪周聖善彌光既多受祉享國延長哀哀慈妣興化閨房龍飛紫極作合聖皇不虞中年暴離災殃愍予小子煢煢摧傷魂雖永逝定省曷望嗚呼哀哉魏志文德郭皇后傳注引魏書孝獻皇帝贈冊文嗚呼昔皇天降戾于漢俾逆臣董卓播厥凶虐焚滅京都劫遷大駕于時六合雲擾姦雄熛起帝自西京徂唯求定臻茲洛邑疇咨聖賢聿改乘轅又遷許昌武皇帝是依歲在元𢪶皇師肇征迄于鶉尾十有八載群寇殲殄九域咸乂惟帝念功祚茲魏國大啟土宇爰及文皇帝齊聖廣淵仁聲旁流柔遠能邇殊俗向義乾精承祚坤靈吐曜稽極玉衡允膺厤數度于軌儀克厭帝心乃仰欽七政俯察五典弗采四嶽之謀不俟師錫之舉幽贊神明承天禪位祚建朕躬統承洪業蓋聞昔帝堯元愷既舉凶族未流登舜百揆然後百揆時序內平外成授位明堂退終天祿故能冠德百王表功高嶽自往迄今彌歷七代歲暨三千而大運來復庸命底績纂我民主作建皇極念重光紹咸池繼韶夏超群后之遐蹤邈商周之慚德可謂高朗令終昭明洪烈之懿盛者矣非夫漢魏與天地令德與四時合信動和民神格于上下其孰能至于此乎朕惟孝獻享年不永欽若顧命攷之典謨恭述皇考先靈遺意闡崇弘諡奉成聖美以章希世同符之隆以傳億載不朽之榮魂而有靈嘉茲弘休嗚呼哀哉魏志明帝紀注引獻帝傳告祠文帝廟叡聞夫禮也者反本修古不忘厥初是以先代之君尊尊親親咸有尚焉今山陽公寢疾棄國有司建言喪紀之禮視諸侯王叡惟山陽公昔知天命永終于己深觀厤數允在聖躬傳祚禪位尊我民主斯乃陶唐懿德之事也黃初受終命公于國行漢正朔郊天祀祖禮樂制度率乃漢舊斯亦舜禹明堂之義也上考遂初皇極攸建允熙克讓莫朗于茲蓋子以繼志嗣訓為孝臣以配命欽述為忠故詩稱匪棘其猶聿追來孝書曰前人受命茲不忘大功叡敢不奉承徽典以昭皇考之神靈今追諡山陽公曰孝獻皇帝冊贈璽綬命司徒司空持節弔祭護喪光祿大鴻臚為副將作大匠復土將軍營成陵墓及置百官群吏車旗服章喪葬禮儀一如漢氏故事喪葬所供群官之費皆仰大司農立其後嗣為山陽公以通三統永為魏賓魏志明帝紀注引獻帝傳
