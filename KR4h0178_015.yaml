body:
  text: 陳王植三慶文帝受禪章陛下以聖德龍飛順天革命允答神符誕作民主乃祖先后積德纍仁世濟其美以暨於先王勤恤民隱劬勞勠力以除其害經營四方不遑啓處是用隆茲福慶光啓于魏下承統業贊戎前緒克廣德音綏靜內外紹先周之舊迹襲文武之懿德保大定功海內為一豈不休哉陛下以明聖之德受天顯命良辰即祚以臨天下洪化宣流洋溢宇內是以普天率土莫不承風欣慶執贄奔走奉賀闕下況臣親體至戚懷歡踊躍改封陳王謝恩章臣既弊陋守國無效自分出削以彰衆誡不意天恩滂霈潤澤橫流猥蒙加封茅土既優爵賞必重非臣虛淺所宜奉受非臣灰身所能報答封二子為公謝恩章詔書封臣息男苗為高陽鄉公志為穆鄉公臣伏自惟文無升堂廟勝之功武無摧鋒接刃之效天時運幸得生貴門遇以親戚少荷光寵竊位列侯榮曜當世顧影慚形流汗反側洪恩罔極雲雨增加既榮本幹枝葉并蒙苗志小豎既頑且稚猥荷列爵並佩金紫施崇所加惠及父子請祭先王表臣雖比拜表自計違遠以來有踰旬日垂竟夏節方到臣悲傷有心念先王公以夏至日終是以家俗不以夏日祭至於先王自可以今辰告祠臣雖卑鄙實稟體於先王自臣雖貧窶蒙陛下厚賜足供太牢之具臣欲祭先王於北河之上羊豬牛臣自能辦杏者臣縣自有先王喜食鰒魚臣前以表得徐州臧霸上鰒二百枚足以供事乞請水瓜五枚白奈二十枚計先王崩來未能半歲臣實欲告敬且欲復盡哀上九尾狐表黃初元年十一月二十三日於鄄城縣北見衆狐數十首在後大狐在中央長七八尺赤紫色舉頭樹尾尾甚長大林列有枝甚多然後知九尾狐斯誠聖王德政和氣所應也初封安鄉侯表臣抱罪即道憂惶恐怖不知刑罪當所限齊陛下哀愍臣身不聽有司所執待之過厚即日於延津受安鄉侯印綬奉詔之日且懼且悲懼于不修始違憲法悲於不慎速此貶退上增陛下垂念下遺太后見憂臣自知罪深責重受恩無量精魄飛散忘軀殞命封鄄城王謝表臣愚駑垢穢才質疵下過受陛下日月之恩不能摧身碎首以答陛下厚德而狂悖發露始干天憲自分放棄抱罪終身苟貪視息無復睎幸不悟聖恩爵以非望枯木生葉白骨更肉非臣罪戾所當宜蒙俯仰慚惶五內戰悸奉詔之日悲喜參至雖因拜章陳答聖恩下情未展求習業表雖免大誅得歸本國文選曹子建責躬詩李注自試表臣聞士之羡永生者非徒以甘食麗服宰割萬物而已將有以補益群生尊主惠民使功存於竹帛名光於後嗣今臣文不昭於俎豆武不習於干戈而竊位藩王施祿東夏消損天日無益聖朝淮南尚有山竄之賊吳會猶有潛江之虜使戰士未獲歸於農畝五兵未得收於武庫蓋善論者不恥謝善戰者不羞去夫凌雲者泥蟠者也後申者先屈者也是以神龍以為德尺蠖以求申昔湯事葛文王事犬夷固仁者能以大事小若陛下遣明哲之使繼能陸賈之蹤者使之江南發愷悌之詔張日月之信開以降路權必奉承聖化斯不疑也上責躬詩表臣植言臣自抱釁歸蕃刻肌刻骨追思罪戾晝分而食夜分而寢誠以天網不可重罹聖恩難可再恃切感相鼠之篇無禮遄死之義形影相弔五情愧赧以罪棄生則違古賢夕改之勸忍垢苟全則犯詩人胡顏之譏伏惟陛下德象天地恩隆父母施暢春風澤如時雨是以不別荊棘者慶雲之惠也七子均養者鳲鳩之仁也舍罪責功者明君之舉也矜愚愛能者慈父之恩也是以愚臣徘徊於恩澤而不敢自棄者也前奉詔書臣等絶朝心離志絶自分黃耇永無執圭之望不圖聖詔猥垂齒召至止之日馳心輦轂僻處西館未奉闕庭踊躍之懷瞻望反側不勝犬馬戀主之情謹拜表並獻詩二首詞旨淺末不足採覽貴露下情冒顏以聞乞田表乞城內及城邊好田盡所賜百年力者臣雖生自至尊然心甘田野性樂稼穡請赴元正表欣豫百官之美想見朝覲之禮耳存九成目想率舞謝入覲表不世之命非所致思有若披浮雲而覩白日出幽谷而登喬木目希庭燎心存泰極罷朝表覲玉容而慶薦奉歡宴而慈潤文選陸士龍大將軍宴會詩李注謝周觀表詔使周觀初玩雲盤北觀疏圃遂步九華神明特處譎詭天然誠可謂帝室皇居者矣雖崑侖閬風之麗文昌之居不是過也求出獵表臣自招罪釁徙居京師待罪南宮同上謝鼓吹表許以簫管之樂榮以田遊之嬉陛下仁重有虞恩過周旦濟世安宗實在聖德獻文帝馬表臣於先武皇帝世得大宛紫騂馬一匹形法應圖善持頭尾教令習拜今輒已能又能行與鼓節相應謹以表奉獻上銀鞍表於先武皇帝世勑此銀鞍一具初不敢乘謹奉上上牛表臣聞物以洪珍細亦或貴故不見僬僥之微不知泱漭之泰不見果下之乘不別龍馬之大高下相懸所以致觀也謹奉牛一頭不足追遵大小之制形少有殊敢不獻上上先帝賜鎧表先帝賜臣鎧黑光明光各一領兩當鎧一領環鎖鎧一領馬鎧一領今代以升平兵革無事乞悉以付鎧曹自理求自試表二首二首求自試表二首臣植言臣聞士之生世入則事父出則事君事父尚於榮親事君貴於興國故慈父不能愛無益之子仁君不能畜無用之臣夫論德而授官者成功之君也量能而受爵者畢命之臣也故君無虛授臣無虛受虛授謂之謬舉虛受謂之尸祿詩之素餐所由作也昔二虢不辭兩國之任其德厚也旦奭不讓燕魯之封其功大也今臣蒙國重恩三世于今矣正值陛下升平之際沐浴聖澤潛潤德教可謂厚幸矣而位竊東藩爵在上列身被輕暖口厭百味目極華靡耳倦絲竹者爵重祿厚之所致也退念古之受爵祿者有異于此皆以功勤濟國輔主惠民今臣無德可述無功可紀若此終年無益國朝將挂風人彼己之譏是以上慚玄冕俯愧朱紱方今天下一統九州晏如顧西尚有違命之蜀東有不臣之吳使邊境未得稅甲謀士未得高枕者誠欲混同宇內以致太和也故啓滅有扈而夏功昭成克商奄而周德著今陛下以聖明統世將欲卒文武之功繼成康之隆簡良授能以方叔邵虎之臣鎮衛四境為國爪牙者可謂當矣然而高鳥未挂於輕繳淵魚未懸於鉤餌者恐釣射之術或未盡也昔耿弇不俟光武亟擊張步言不以賊遺於君父也故車右伏劍於明轂雍門刎首於齊境若此二子豈惡生而尚死哉誠忿其慢主而凌君也夫君之寵臣欲以除患興利臣之事君必以殺身靜亂以功報主也昔賈誼弱冠求試屬國請係單于之頸而制其命終軍以妙年使越欲得長纓占其王羈致北闕此二臣者豈好為夸主而曜世俗哉志或鬱結欲逞其才力輸能於明君也昔漢武為霍去病治第辭曰胸奴未滅臣無以家為夫憂國忘家損軀濟難忠臣之志也今臣居外非不厚也而寢不安席食不遑味者伏以二方未剋為念伏見先帝武臣宿兵年耆即世者有聞矣雖賢不乏世宿將舊卒由習戰也竊不自量志在授命庶立毛髮之功以報所受之恩若使陛下出不世之詔效臣錐刀之用使得西屬大將軍當一校之隊若東屬大司馬統偏師之任必乘危蹈險騁舟奮驪突刃觸鋒為士卒先雖未能擒權馘亮庶將虜其雄率殲其醜類必效須臾之捷以滅終身之愧使名挂史筆事列朝策雖身分蜀境首懸吳闕猶生之年也如微才弗試沒世無聞徒榮其軀而豐其體生無益於事死無損於數虛荷上位而忝重祿禽息鳥視終於白首此徒圈牢之養物非臣之所志也流聞東軍失備師徒小衄輟食忘餐奮袂攘衽撫劍東顧而心已馳於吳會矣臣昔從先武皇帝南極赤岸東臨滄海西望玉門北出玄塞伏見所以行師用兵之勢可謂神妙也故兵者不可豫言臨難而制變者也志欲自效於明時立功於聖世每覽史籍觀古忠臣義士出一朝之命以徇國家之難身雖屠裂而功名著於景鍾名績垂於竹帛未嘗不撫心而歎息也臣聞明主使臣不廢有罪故奔北敗軍之將用而秦魯以成其功絶纓盜馬之臣赦而楚趙以濟其難臣竊感先帝早崩威王棄世臣獨何人以堪長久常恐先朝露填溝壑墳土未乾而身名並滅臣聞騏驥長鳴則伯樂昭其能盧狗悲號則韓國知其才是以效之齊楚之路以逞千里之任試之狡兔之捷以驗搏噬之用今臣志狗馬之微功竊自惟度終無伯樂韓國之舉是以於悒而竊自痛者也夫臨博而企竦聞樂而竊抃者或有賞音而識道也昔毛遂趙之陪隸猶假錐囊之喻以寤主立功何況巍巍大魏多士之朝而無慷慨死難之臣乎夫自衒自媒者士女之醜行也干時求進者道家之明忌也而臣敢陳聞於陛下者誠與國分形同氣憂患共之者也冀以塵霧之微補益山海熒燭末光增輝日月是以敢冒其醜而獻其忠必知為朝士所笑聖主不以人廢言伏惟陛下少垂神聽臣則幸矣又五帝之世非皆智三季之末非皆愚用與不用知與不知也夫相者文德昭者也將者武功烈者也文德昭則可以匡國朝敘百揆稷契夔龍是矣武功烈則可以征不庭廣邦境南仲方叔是也昔伊尹之為媵臣至賤也呂尚之處漁釣至陋也及其見舉湯文誠合志同豈復假近習之薦因左右之介哉發騏驥於吳可謂困矣及其伯樂相之孫子遇之形體不勞而坐取千里伯樂善御馬明君善御臣誠任賢使能之明效也昔假干木修德於閭閻師秦為之輟攻而文侯以安穰苴授節於邦境燕晉為之退師而景公無患皆簡德尊賢之所致也願陛下垂高宗傅嵓之明以顯中興之功諫伐遼東表臣伏以遼東負阻之國勢便形固帶以遼海今輕車遠攻師疲力屈彼有其備所謂以逸待勞以飽待飢者也以臣觀之誠未易攻也若國家攻之而必克屠襄平之城懸公孫之首得其地不足以償中國之費虜其民不足以補三軍之失是我所獲不如所喪也若其不拔曠日持久暴師於野然天時不測水濕無常彼我之兵連於城下進則有高城深池無所施其功退則有歸途不通道路瀸洳東有待釁之吳西有伺隙之蜀吳起東南則荊楊騷動蜀應西境則雍涼三分兵不解於外民罷困于內促耕不解其飢疾蠶不救其寒夫渴而後穿井飢而後殖種可以圖遠難以應卒也臣以為當今之務在於省徭役薄賦斂勤農桑三者既備然後令伊管之臣得施其術孫吳之將得奮其力若此則太平之基可立而待康哉之歌可坐而聞曾何憂於二敵何懼於公孫乎今不息邦畿之內而勞神於蠻貊之域竊為陛下不取也轉封東阿王謝表奉詔太皇太后念雍丘下溼少桑欲轉東阿當合王意可遣人按行知可居不奉詔之日伏增悲喜臣以無功虛荷國恩爵尊祿厚用無益於時脂車秣馬志在黜放不圖陛下天父之恩猥宣皇太后慈母之念遷之陛下幸為久長計聖旨惻隱恩過天地臣在雍丘劬勞五年左右罷怠居業向定園果萬株枝條始茂私情區區實所重棄然桑田無業左右貧窮食裁糊口形有裸露臣聞古之仁君必有棄國以為百姓況乃轉居沃土人從蒙福江海所流無地不潤雲雨所加無物不茂若陛下念臣入從五年之勤少見佐助此枯木生華白骨更肉非臣之敢望也飢者易食寒者易衣臣之謂矣上卞太后誄表大行太皇后資坤元之性體載物之仁齊美薑嫄等德任姒佐政內朝惠加四海草木荷恩含氣受潤庶鍾元吉承育萬祚何圖一旦早棄明朝背絶臣庶悲痛靡告臣聞名以述德誄尚及哀是以冒越諒暗之禮作誄一篇知不足讚揚名貴以展臣蓼莪之思憂荒情散不足觀采晉左九嬪上元皇后誄表曰伏惟聖善宣慈仁洽六宮含弘光大德潤四海竊聞之前志卑不誄尊少不誄長楊雄臣也而誄漢后班固子也而誄其父皆以述楊景行顯之竹帛豈所謂三代不同禮隨時而作者乎謝妻改封表璽書今以東阿王妃為陳王妃并下印綬因故上前所假印以其拜授書以即日到臣輒奉詔拜其才質底下謬同受私遇寵素餐臣為其首陛下體乾坤育物之德東海含容之大乃復隨例顯封大國光揚章灼非臣負薪之才所宜克當非臣穢釁所宜蒙獲夙夜憂歎念報罔極洪施遂隆既榮枝幹猥復正臣妃為陳妃光耀宣朗非妾婦蠢愚所當蒙被葵藿草物猶感恩養況臣含氣銜珮弘惠歿而後已誠非翰墨屢辭所能報答謝入覲表臣得出幽屏之城獲覲百官之美此一喜也背茅茨之陋登閶闔之闥此二喜也必以有靦之容瞻見穆穆之顏此三喜也將以檮杌之質稟受崇聖之訓此四喜也謝明帝賜食表近得賜御食拜表謝恩尋奉手詔愍臣瘦弱奉詔之日涕泣橫流雖武文二帝所以愍憐於臣不復過於明詔謝賜奈表即夕殿中虎賁宣詔賜臣等冬奈一奩詔使溫啖夜非食時而賜見及奈以夏熟今則冬生物以非時為珍恩以絶口為厚實非臣等所宜荷之冬至獻襪頌表伏見舊儀國家冬至獻履貢襪所以迎福踐長先臣或為之頌臣既玩其嘉藻願述朝慶千載昌期一陽嘉節四方交泰萬物昭蘇亞歲迎祥履長納慶不勝感節情繫帷幄拜表奉賀并獻紋履七量襪若干副茅茨之陋不足以入金門登玉臺也上獻以聞謹獻獻璧表臣聞玉不隱瑕臣不隱情伏知所進非和氏之璞萬國之幣璧為充貢伏知車駕或出可祈以建榮曰主路臣每馳心豹尾書鈔一百三十引獻璧表龍見表臣聞鳳凰復見於鄴南黃龍雙出於清泉聖德至理以致嘉瑞將棲鳳於林囿豢龍於陂池為百姓旦夕之所觀謝賜穀表詔書念臣經用不足以船河邸閣穀五千斛賜臣失題諸公熙朝之輔每作粥食之候肴惟蔬薤書鈔一百四十四賜邁越紐縠書鈔十九即日奉油囊之賜書鈔一百三十六爵重才輕文選張茂先答何劭詩李注
