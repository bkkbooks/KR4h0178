body:
  text: 廢帝即位詔朕以眇身繼承鴻業煢煢在疚靡所控告大將軍太尉奉受末命夾輔朕躬司徒司空冢宰元輔總率百僚以寍社稷其與群卿大夫勉勖乃心稱朕意焉魏志齊王芳紀案齊王芳紀二月有以太尉司馬懿為太傅詔據曹爽傳是孫資所作今編入孫資文復用夏正詔烈祖明皇帝以正月棄背天下臣子永為忌日之哀其復用夏正雖違先帝通三統之義斯亦禮制所由變改也又夏正于數為得天正其以建寅之月為正始元年正月以建丑月為後十二月魏志齊王芳紀又見冊府元龜四省奏事五內斷絕柰何柰何烈祖明帝以正日棄天下每與皇太后念此日至心有剝裂不可以此日朝群辟受慶賀也月二日會又非故也聽當還夏正月雖違先帝通三統之義斯亦子孫哀慘永懷又夏正朔得天數者其以建寅之月為歲首宋書禮志一案此與魏志詳略不同當兩載之出黃金銀物供軍用詔易稱損上益下節以制度不傷財不害民方今百姓不足而御府多作金銀雜物將奚以為今出黃金銀物百五十種千八百餘斤銷冶以供軍用魏志齊王芳紀尊禮司馬懿詔明日大會群臣其令太傅乘輿上殿魏志齊王芳紀免官奴婢為良民詔屬到市觀見所斥賣宮奴婢年皆七十或癃疾殘病所謂天民之窮者也且官以其力竭而復鬻之進退無謂其悉遣為良民若有不能自存者郡縣振給之魏志齊王芳紀申敕治道詔吾乃當以十九日親祠而昨出已見治道得雨當復更治徒棄功夫每念百姓力少役多夙夜存心道路但當期于通利聞乃撾捶老小務崇修飾疲困流離以至哀歎吾豈安乘此而行致馨德于宗廟耶自今已後明申敕之魏志齊王芳紀衛臻乞遜位詔昔干木偃息義壓彊秦留侯頤神不忘楚事讜言嘉謀望不吝焉賜宅一區位特進秩如三司魏志衛臻傳受胡金以狀聞襃田豫詔昔魏絳開懷以納戎今卿舉袖以受狄金朕甚嘉焉魏志田豫傳注引魏略賜孫資詔君掌機密三十餘年經營庶事勳著前朝暨朕統位動賴良謀是以曩者增崇寵章同之三事外帥群官內望讜言屬以年耆疾篤上還印綬前後鄭重辭旨懇切天地以大順成德君子以善恕成仁重以職事違奪君志今聽所執賜錢百萬使兼光祿勳少府親策詔君養疾于第君其勉進醫藥頤神和氣以永無疆之祚置舍人官騎加以日秩肴酒之膳焉魏志劉放傳注引資別傳賜徐邈等家穀錢詔夫顯賢表德聖王所重舉善而教仲尼所美故司空徐邈征東將軍胡質衛尉田豫皆服職前朝歷事四世出統戎馬入贊庶政忠清在公憂國忘私不營產業身沒之後家無餘財朕甚嘉之其賜邈等家穀二千斛錢三十萬布告天下魏志徐邈傳襃封郭淮詔昔漢川之役幾至傾覆淮臨危濟難功書王府在關右三十餘年外征寇虜內綏民夷比歲以來摧破廖化禽虜句安功績顯著朕甚嘉之今以淮為車騎將軍儀同三司持節都督如故進封陽曲侯邑凡二千七百八十戶分三百戶封一子亭侯魏志郭淮傳追襃郭修詔故中郎西平郭修砥節厲行秉心不回乃者蜀將軍姜維寇鈔修郡為所執略往歲偽大將軍費禕驅率群眾陰圖闚𨵦道經漢壽請會眾賓修于廣坐之中手刃擊禕勇過聶政功逾介子可謂殺身成仁釋生取義者矣夫追加襃寵所以表揚忠義祚及後胤所以獎勸將來其追封脩為長樂鄉侯食邑千戶諡曰威侯子襲爵加拜奉車都尉賜銀千鉼絹千匹以光寵存亡永垂來世焉魏志齊王芳紀追賜劉整鄭像爵關中侯詔夫顯爵所以襃元功重賞所以寵烈士整像召募通使越蹈重圍冒突白刃輕身守信不幸見獲抗節彌厲揚六軍之大勢安城守之懼心臨難不顧畢志傳命昔解楊執楚有隕無貳齊路中大夫以死成命方之整像所不能加今追賜整像爵關中侯各除士名使子襲爵如部曲將死事科魏志齊王芳紀原李韜三子詔齊長公主先帝遺愛原其三子死命魏志夏侯玄傳增司馬師邑詔奸臣李豐等僭譖庸回陰搆凶慝大將軍糾虔天刑致之誅辟周勃之克呂氏霍光之摛上官曷以過之其增邑九千戶并前四萬晉書景帝紀璽書切責楚王彪夫先王行賞不遺仇讎用戮不違親戚至公之義也故周公流涕而決二叔之罪孝武傷懷而斷昭平之獄古今常典也惟王國之至親作藩于外不能祇奉王度表率宗室而謀于奸邪乃與太尉王淩兗州刺史令狐愚搆通逆謀圖危社稷有悖忒之心無忠孝之意宗廟有靈王其何面目以見先帝朕深痛王自陷罪辜既得王情深用憮然有司奏王當就大理朕惟公族甸師之義不忍肆王市朝故遣使者賜書王自作孽匪由于他燕刺之事宜足以觀王其自圖之魏志楚王彪傳注引孔衍漢魏春秋傷魂賦王師東征宗正曹竝以宗室材能兼侍中從行到項得疾數日亡意甚傷之為作此賦宗臣充于常伯體材蓺而中良何旻天之不怙遘暴疾而隕亡惟厥疾之初發若常疾之輕微未經日而沈篤氣惙惙而耗衰岐鵲騁技而弗救豈藥石之能追精魂忽已消散神眇眇而長違蓺文類聚三十四改元大赦詔制詔昔三祖神武聖德應天受祚齊王嗣位肆行非度顛覆厥德皇太后深惟社稷之重延納宰輔之謀用替厥位集大命于余一人以眇眇之身託于王公之上夙夜祗畏懼不能嗣守祖宗之大訓恢中興之弘業戰戰兢兢如臨于谷今群公卿士股肱之輔四方征鎮宣力之佐皆積德累功忠勤帝室庶憑先祖失父有德之臣左右小子用保乂皇家俾朕蒙闇垂拱而治蓋聞人君之道德厚侔天地潤澤施四海先之以慈愛示之以好惡然後教化行于上兆民聽于下朕雖不德昧于大道思與宇內共臻茲路書不云乎安民則惠黎民懷之其大赦改元減乘輿服御後宮用度及罷尚方御府百工技巧靡麗無益之物魏志高貴卿公紀文館詞林六百六十八以司馬師為相國進號大都督詔朕聞創業之君必須股肱之臣守文之主亦賴匡佐之輔是故文武以呂召彰受命之功宣王倚山甫享中興之業大將軍世載明德應期作輔遭天降險帝室多難齊王涖政不迪率典公履義執忠以寍區夏式是百辟總齊庶事內摧寇虐外靜奸宄日昃憂勤劬勞夙夜德聲光于上下勳烈施于四方深惟大議首建明策權定社稷援立朕躬宗廟獲安億兆慶賴伊摯之保乂殷邦公旦之綏寍周室蔑以尚焉朕甚嘉之夫德茂者位尊庸大者祿厚古今之通義也其登位相國增邑九千并前四萬戶進號大都督假黃鉞入朝不趨奏事不名劍履上殿賜錢五百萬帛五千匹以彰元勳晉書景帝傳封楚王彪世子詔故楚王彪背國附奸身死嗣替雖自取之猶哀矜焉夫含垢藏疾親親之道也其封彪世子嘉為常山真定王魏志楚王彪傳令公卿議司馬師喪制詔公有濟世寍國之勳剋定祻亂之功重之以死王事宜加殊禮其令公卿議制晉書景帝紀詔䘏洮西死事者朕以寡德不能式遏寇虐乃令蜀賊陸梁邊陲洮西之戰至取負敗將士死亡計以千數或沒命戰場冤魂不反或牽掣虜手流離異域吾深痛愍為之悼心其令所在郡典農及安撫夷二護軍各部大吏慰䘏其門戶無差賦役一年其力戰死事者皆如舊科勿有所漏魏志高貴鄉公紀斂埋洮西死事吏民詔往者洮西之戰將吏士民或臨陳戰亡或沈溺洮水骸骨不收棄于原野吾常痛之其告征西將軍安西將軍各令部人于戰處及水次鉤求屍喪收斂藏埋以慰存亡魏志高貴鄉公紀犒賜破蜀將士詔兵未極武醜虜摧破斬首獲生動以萬計自頃戰克無如此者今遣使者犒賜將士大會臨饗飲食宴終日稱朕意焉魏志高貴鄉公紀進封鄧艾詔逆賊姜維連年狡黠民夷騷動西土不寍艾籌畫有方忠勇奮發斬將十數馘首千計國威震于巴蜀武聲揚于江岷今以艾為鎮西將軍都督隴右諸軍事進封鄧侯分五百戶封子忠為亭侯魏志鄧艾傳旌王𥳑詔玄菟郡高顯縣吏民反叛長鄭熙為賊所殺民王𥳑負擔熙喪晨夜星行遠致本州忠節可嘉其特拜𥳑為忠義都尉以旌殊行魏志高貴鄉公紀原和逌等作詩稽留詔吾以暗昧愛好文雅廣延詩賦以知得失而乃爾紛紜良用反仄其原逌等主者宜敕自今以後群臣皆當玩習古義修明經典稱朕意焉魏志高貴鄉公紀又見御覽六百臨戎詔諸葛誕造為凶亂盪覆揚州昔黥布逆叛漢祖親戎隗囂違戾光武西伐及烈祖明皇帝躬征吳蜀皆所以奮揚赫斯震耀威武也今宜皇太后與朕暫共臨戎速定醜虜時寍冬夏魏志高貴鄉公紀襃封龐會路蕃詔諸葛誕造搆逆亂迫脅忠義平寇將軍臨渭亭侯龐會騎督偏將軍路蕃各將左右斬門突出忠壯勇烈所宜加異其晉會爵鄉侯蕃封亭侯魏志高貴鄉公紀孫壹歸命封吳侯詔吳使特節都夏口諸軍事鎮軍將軍沙羨侯孫壹賊之枝屬位為上將畏天知命深鑒禍福翻然舉眾遠歸大國雖微子去殷樂毅遁燕無以加之其以壹為侍中車騎將軍假節交州牧吳侯開府辟召儀同三司依古侯伯八命之禮袞冕赤舄事從豐厚魏志高貴鄉公紀大將軍與尚書俱行詔今車駕駐項大將軍恭行天罰前臨淮浦昔相國大司馬征討皆與尚書俱行今宜如舊魏志高貴鄉公紀入賈逵祠下詔逵沒有遺愛歷世見祀追聞風烈朕甚嘉之昔先帝東征亦幸于此親發德音襃揚逵美徘徊之心益有慨然夫禮賢之義或埽其墳墓或修其門閭所以崇敬也其埽除祠堂有穿漏者補治之魏志賈逵傳注引魏略甘露二年贈賜宣隆秦絜詔昔燕刺王謀反韓誼等諫而死漢朝顯登其子諸葛誕創造凶亂主簿宣隆部曲督秦絜秉節守義臨事固爭為誕所殺所謂無比干之親而受其戮者其以隆絜子為騎都尉加以贈賜光示遠近以殊忠義魏志高貴鄉公紀改丘頭為武丘詔古者克敵收其屍以為京觀所以懲昏逆而章武功也漢孝武元鼎中改桐鄉為聞喜新鄉為獲嘉以著南越之亡大將軍親總六戎營據丘頭內夷群凶外殄寇虜功濟兆民聲振四海克敵之地宜有令名其改丘頭為武丘明以武平亂後世不忘亦京觀二邑之義也魏志高貴鄉公紀王昶增邑遷官詔昔孫臏佐趙直湊大梁西兵驟進亦所以成東征之勢也增邑千戶并前四千七百戶遷司空持節都督如故魏志王昶傳錄用應余孫倫詔昔南陽郡山賊擾攘欲劫質故太守東里袞功曹應余獨身捍袞遂免于難余顛沛殞斃殺身濟君其下司徒署余孫倫吏使蒙仗節之報魏志高貴鄉公紀聽鍾會讓侯詔會典綜軍事參同計策料敵制勝有謀謨之勳而推寵固讓辭指款實前後累重志不可奪夫成功不處古人所重其聽會執以成其美魏志鍾會傳以王祥鄭小同為三老五更詔夫養老興教三代所以樹風化垂不朽也必有三老五更以崇至敬乞言訥誨著在惇史然後六合承流下觀而化宜妙簡德行以充其選關內侯王祥履仁秉義雅志淳固關內侯鄭小同溫恭孝友帥禮不忒其以祥為三老小同為五更車駕親率群司躬行古禮焉魏志高貴鄉公紀顏子論心不違仁行無貳過用行舍藏與聖合契聽承聖言罔有不喻敘之于易以彰殊異死則悲慟謂天喪已所以殷勤至于此者聖人嘉美賢哲之效也設使天假之年後孔子沒焉知其不光明聖道闡揚師業有卓爾之美乎百慮之所得愚者有焉願後之君子詳覽之焉爾蓺文類聚二十初學記十七自敘始生禎祥自敘始生禎祥昔帝之生或有禎祥蓋所以彰顯神異也惟予小子支胤末流謬為靈祇之所相祐也豈敢自比于前哲聊記錄以示後世焉其辭曰惟正始三年九月辛未朔二十五日乙未直成予生于時也天氣清明日月暉光爰有黃氣烟熅于堂照曜室宅其色煌煌相而論之曰未者為土魏之行也厥日直成應嘉名也烟熅之氣神之精也無災無害蒙神靈也齊王不弔顛覆厥度群公受予紹繼皇祚以眇眇之身質性頑固未能涉道而遵大路臨深履冰涕泗憂懼古人有云懼則不亡伊予小子曷敢怠荒庶不忝辱永奉烝嘗魏志高貴鄉公紀注引帝集
