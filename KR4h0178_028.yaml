body:
  text: 衛覬為漢帝禪位魏王詔朕在位三十有二載遭天下蕩覆幸賴宗廟之靈危而復存然仰瞻天文俯察民心炎精之數既終行運在乎曹氏是以前王既樹神武之績今王又光裕明德以應其期是曆數昭明亦可知矣大人之行天下為公選賢與能故唐堯不私于厥子而名播于無窮朕羡而慕之今其追踵堯典禪位于魏王袁宏後漢紀三十又見魏志文紀注案魏志衛覬傳云頃之還漢朝勸贊禪代之義為文誥之詔是獻帝諸禪詔皆衛覬作也乙卯冊詔魏王惟延康元年十月乙卯皇帝曰咨爾魏王夫命運否泰依德升降三代卜年著于春秋是以天命不于常帝王不一姓由來尚矣漢道陵遲為日已久安順已降世失其序沖質短祚三世無嗣皇綱肇虧帝典頽沮暨于朕躬天降之災遭無妄厄運之會值炎精幽昧之期變興輦轂禍由閹宦董卓乘釁惡甚澆豷劫遷省御太僕宮廟遂使九州幅裂彊敵虎爭華夏鼎沸蝮蛇塞路當斯之時尺土非復漢有一夫豈復朕民幸賴武王德膺符運奮揚神武芟夷凶暴清定區夏保乂皇家今王纘承前緒至德光昭御衡不迷布德優遠聲教被四海仁風扇鬼區是以四方效珍人神響應天之曆數實在爾躬昔虞舜有大功二十而放勛禪以天下大禹有疏導之績而重華禪以帝位漢承堯運有傳聖之義加順靈祗紹天明命釐降二女以嬪于魏使使持節行御史大夫事太常音奉皇帝璽綬王其永君萬國敬御天威允執其中天祿永終敬之哉魏志文帝紀注引獻帝傳壬戌冊詔魏王皇帝問魏王言遺宗奉庚申書到所稱引聞之朕惟漢家世踰二十年過四百運周數終行祚已訖天心已移兆民望絶天之所廢有自來矣今大命有所底止神器當歸聖德違天不順逆衆不祥王其體有虞之盛德應曆數之嘉會是以禎祥告符圖讖表録神人同應受命咸宜朕畏上帝致位于王天不可違衆不可拒且重華不逆堯命大禹不辭舜位若夫由卷匹夫不載聖籍固非皇材帝器所當稱慕今使音奉皇帝璽綬王其陟帝位無逆朕命以祗奉天心焉魏志文帝紀注引獻帝傳丁卯冊詔魏王天訖漢祚辰象著明朕祗天命致位于王仍陳曆數于詔冊喻符運于翰墨神器不可以辭拒皇位不可以謙讓稽于天命至于再三且四海不可以一日曠主萬幾不可以斯須無統故建大業者不拘小節知天命者不繫細物是以舜受大業之命而無遜讓之辭聖人達節不亦遠乎今使音奉皇帝璽書王其欽承以答天下響應之望焉魏志文帝紀注引獻帝傳庚午冊詔魏王昔堯以配天之德秉六合之重猶覩曆運之數移于有虞委讓帝位忽如遺跡今天既訖我漢命乃眷北顧帝皇之業實有大魏朕守空名臣竊古義顧視前事猶有慚德而王遜位至于三四朕用懼焉夫不辭萬乘之位者知命達節之數也虞夏之君處之不疑故勳烈垂于萬載美名傳于無窮今遣守尚書令侍中覬喻王其速陟帝位以順天人之心副朕之大願魏志文帝紀注引獻帝傳禪位冊咨爾魏王昔者帝堯禪位于虞舜舜亦以命禹天命不于常惟歸有德漢道陵遲世失其序降及朕躬大亂茲昏群凶肆逆宇內顛覆賴武王神武拯茲難于四方惟清區夏以保綏我宗廟豈豫一人獲乂俾九服實受其賜今王欽承前緒光于乃德恢文武之大業昭爾考之弘烈皇靈降瑞人神告徵誕惟亮采師錫朕命僉曰爾度克協于虞舜用率我唐典敬遜爾位於戲天之曆數在爾躬允執其中天祿永終君其祗順大禮饗茲萬國以肅承天命魏志文帝紀又見袁宏後漢紀三十受禪表維黃初元年冬十月辛未皇帝受禪于漢氏上稽儀極下考前訓書契所録帝王遺事義莫顯于禪德美莫盛于受終故書陳納于大鹿傳稱曆數是以降世且二百年幾三千堯舜之事復存于今允皇代之上儀帝者之高致也故立斯表以昭德義焉皇帝體乾剛之懿姿紹有虞之黃裔九德既該欽明文塞齊光日月材兼三極及嗣位先皇龍興饗國撫柔蒸民化以醇德崇在寬之政邁愷悌之教宣重光以照下擬陽春以播惠開禁倉散滯積冢臣之錫衆兆陪臺蒙賙餼之養興遺勳繼絶世廢忘之勞獲金爵之賞繈褓之孤食舊德之祿善無微而不旌功無細而不戎士哀矜庶獄罷戍役焚丹書囹圄虛靜外無曠夫玄澤雲行岡不沾渥若夫覆載𥳑易剛柔允宜乾之德陰陽類育物奮庸造化之道四時之功也寬容淵嚜恩洽群黎皇戲之質堯舜之姿也孜孜業業邁德濟民伯禹之勞睿智神武料敵用兵殷湯之略周發之明也廣大配天地茂德苞衆聖鴻恩洽于區夏仁聲播于八荒雖象胥所和而來王是以休徵屢集和氣烟熅上降乾祉下發珍天關啓闈四靈具臻涌醴橫流山見黃人所以顯受命之之期運也其餘甘露零于豐草野蠶繭于茂樹嘉禾神芝奇禽靈獸窮祥極瑞者朞月之閒蓋七百餘見自金天以嘉祥之降未有若今之盛者也是以漢氏覩曆數之去已知神器之有歸稽唐禪虞紹天明命釐嬪二女欽授天位皇帝謙退讓德不嗣至于再至于三于是群公卿士僉曰陛下聖德懿侔兩儀皇符昭晰受命咸宜且有熊之興地出大螻夏后承統木榮冬敷殷湯革命白狼銜鉤周武觀方之今日未足以喻而猶以一至之慶寵神當時紹天即祚負依而治況于大魏靈瑞若茲者乎蓋天命不可以辭以意距大統不可以久曠萬國不可以乏主宜順民神速承天序于是皇帝乃回思遷慮旁觀庶徵上在璿璣筮之周易卜以守龜龜筮襲吉五反靡違乃覽公卿之議順皇天之命練吉日唐典之明憲遵大鹿之遺訓遂于繁昌築靈壇設壝宮跱圭璧儲犧牲延公侯卿士常伯常任納言諸節嶽牧邦君虎胸奴南單于東夷南蠻西戎北狄王侯君長之群入自旗門咸旅于位皇帝乃受天子之籍冠通天襲袞龍穆穆皇皇物有其容上公策祝燔燎棫朴告類上帝望秩五嶽煙于六宗遍于群神晏祥風來臻乃詔有司大赦天下改元正始開皇綱闡帝載殊徽幟革器械修廢官班瑞節同律量衡更姓改物勒崇垂鴻創口作則永保天祿傳之岡極碑本隸釋十九請恤凋匱罷役務疏夫變情厲性彊所不能人臣言之既不易人主受之又艱難且人之所樂者富貴顯榮也所惡者貧賤死亡也然此四者君上之所制也君愛之則富貴顯榮君惡之則貧賤死亡順指者愛所由來逆意者惡所從至也故人臣皆爭順指而避逆意非破家為國殺身成君者誰能犯顏色觸忌諱建一言開一說哉陛下留意察之則臣下之情可見矣今議者多好悅耳其言政治則比陛下于堯舜其言征伐則比二虜于貍鼠臣以為不然昔漢文之時諸侯彊大賈誼纍息以為至危況今四海之內分而為三群士陳力各為其主其來降者未肯言舍邪就正咸稱迫于困急是與六國分治無以為異也當今千里無烟遺民困苦陛下不善留意將遂凋斃難可復振禮天子之器必有金玉之飾飲食之肴必有八珍之味至于凶荒則徹膳降服然則奢儉之節必視世之豐約也武皇帝之時後宮食不過一肉衣不用錦繡茵縟不緣飾器物無丹漆用能平定天下遺福子孫此皆陛下之所親覽也當今之務宜君臣上下竝用籌策計校府庫量入為出深思句踐滋民之術由恐不及而尚方所造金銀之物漸更增廣工役不輟侈靡日崇帑藏日竭昔漢武信求神仙之道謂當得雲表之露以餐玉屑故立仙掌以承高露陛下通明每所非笑漢武有求于露而由尚見非陛下無求于露而空設之不益于好而糜費功夫誠皆聖慮所宜裁制也魏志衛覬傳公卿將軍奏上尊號相國安樂鄉侯臣歆太尉都亭侯臣詡御史大夫安陵亭侯臣朗使持節行都督督軍車騎軍臣仁輔國將軍清苑鄉侯臣若虎牙將軍南昌亭侯臣輔輕車將軍都亭侯臣忠冠軍將軍好畤鄉侯臣秋渡遼將軍都亭侯臣柔衛將軍國明亭侯臣洪使持節行都督督軍鎮西將軍東鄉侯臣真使持節行都督督軍領楊州刺史征東將軍安陽鄉侯臣休使持節行都督督軍征南將軍平陵亭侯臣尚使持節行都督督軍徐州刺史鎮東將軍武安鄉侯臣霸使持節左將軍中鄉侯臣郃使持節右將軍建鄉侯臣晃使持節前將軍都鄉侯臣遼使持節後將軍華鄉侯臣靈胸奴南單于臣泉奉常臣貞郎中令臣洽衛尉安國亭侯臣昱太僕臣夔大理東武亭侯臣繇大農臣霸少府臣林督軍御史將作大匠千秋亭侯臣照中領軍中陽鄉侯臣楙中護軍臣陟屯騎校尉都亭侯臣祖長水校尉關內侯臣淩步兵校尉關內侯臣福射聲校尉關內侯臣質振威將軍涅鄉亭侯臣題征虜將軍都亭侯臣觸振武將軍尉猛亭侯臣當忠義將軍樂鄉亭侯臣生建節將軍平樂亭侯臣圃安衆將軍元就亭侯臣神翼衛將軍都亭侯臣衢討夷將軍成遷亭侯臣慎懷遠將軍關內侯臣巽綏邊將軍常樂亭侯臣俊安夷將軍高梁亭侯臣昺奮武將軍長安亭侯臣豐武衛將軍安昌亭侯臣褚等稽首言臣等前上言漢帝奉天命以固禪群臣因天命以固請陛下違天命以固辭臣等頑愚猶知其不可況神祗之心乎宜蒙納許以福海內欣戴之望而丁卯制書詔臣等曰以德則孤不足以時則虜未滅若以群賢之靈得保首領終君魏國于孤足矣若孤者胡足以辱四海至乎天瑞人事皆先王聖德遺慶孤何有焉是以未敢聞命臣等伏讀詔書於邑益甚臣等聞易稱聖人奉天時而論曰君子畏天命天命有去就然後帝者有禪代是以唐之禪虞命以在爾虞之順唐謂之受終堯知天命去已故不得不禪舜知曆數在躬故不敢不受不得不禪奉天時也不敢不受畏天命也漢朝雖承季末陵遲之餘猶務奉天命以則堯道是以願禪帝位而歸二女陛下正于大魏受命之初抑虞夏之達節尚延陵之讓體所枉者大所直者小所詳者輕所略者重中人凡士猶為陛下陋之歿者有靈則重華必忿憤于蒼梧之神墓大夏必鬱邑于會稽之山陰武王必不悅于高陵之玄宮矣是以臣等敢以死請且漢政在奄宦祿去帝室七世矣遂集矢石于甚宮殿而二京為之丘虛當此之時四海蕩覆天下分崩武王親衣甲而冠胄沐雨而櫛風為民請命則活萬國為世撥亂則致升平鳩民而立長築官而置吏元元無過罔于前葉而始有造于華裔陛下即位光昭文德以翊武功勤恤民隱視之如傷懼者寧之勞者休之寒者以暖飢者以充遠人以德服寇敵以恩降邁恩種德光祿四表稽古篤睦茂于放勳岡漏吞舟裕于周文是以布政未朞人神竝和皇天則降甘露而臻四靈后土則挺芝草而吐醴泉虎豹鹿菟咸素其色雉鳩燕爵亦白其羽連理之木同心之瓜五采之魚珍祥瑞物雜遝于其閒者無不畢備古人有言微禹吾其魚乎微大魏則臣等之白骨既交橫于曠野矣伏省群臣內外前後章奏所以陳敘陛下之符命者莫不條河洛之圖書授天地之瑞應因漢朝之款誠宣萬方景附可謂信矣著矣口矣裕矣高矣丘矣三王無以及五帝無以加民命之懸于魏邦民心之繫于魏政卅有餘年矣此乃千世時至之會萬載一遇之秋達節廣度宜昭于斯際拘攣狹行不施于此時久稽天命罪在臣等輒營壇場具禮儀擇吉日口昭告昊天上帝秩群神之禮須禋祭畢會群寮于朝堂議年號正朔服色當所以施行臣謹拜表朝堂臣歆臣詡臣朗臣仁臣若臣輔臣忠臣秋臣柔臣洪臣真臣休臣尚臣霸臣郃臣晃臣遼臣靈臣泉臣貞臣洽臣昱臣夔臣繇臣霸臣林臣照臣楙臣陟臣祖臣淩臣福臣質臣題臣觸臣當臣生臣圃臣神臣衢臣慎臣巽臣俊臣昺臣豐臣褚誠惶誠懼頓首頓首死罪死罪碑本隸釋十九魏志文帝紀引獻帝傳案古文苑聞人牟準魏敬侯碑陰言群臣上尊號奏衛覬撰鍾繇書奏請置律博士九章之律自古所傳斷定刑罪其意微妙百里長吏皆宜知律刑法者國家之所貴重而私議之所輕賤獄吏者百姓之所縣命而選用者之所卑下王政之斃未必不由此也請置律博士轉相教授魏志衛覬傳又見晉書刑法志通典一百六十三奏論賜諡舊制諸王及列侯薨無少長皆賜諡古之有諡隨行美惡非所以優之又次以明識昭穆使不錯亂也臣以為諸侯王及王子諸公侯薨可隨行跡賜諡其列侯始有功勞可一切賜諡至于襲封者則不賜諡通典一百四關西議西方諸將皆豎夫崛起無雄天下意苟安樂目前而已今國家厚加爵號得其所志非有大故不憂為變也宜為後圖若以兵入關中當討張魯魯在深山道徑不通彼必疑之一相驚動地險衆彊殆難為慮魏志衛覬傳注引魏書司隸校尉鍾繇求以三千兵入關外託討張魯內以脅取質任太祖使荀彧問覬覬以為云云或以覬呈太祖太祖初善之而以繇自典其任遂從繇議與荀彧書關中膏腴之地頃遭荒亂人民流入荊州者十萬餘家聞本土安寧皆企望思歸而歸者無以自業諸將各競招懷以為部曲郡縣貧弱不能與爭兵家遂彊一旦變動必有後憂夫鹽國之大寶也自喪亂已來放散今宜如舊置使者監賣以其直益市犁牛若有歸民以供給之勤耕積粟以豐殖關中遠民聞之必日夜競還又使司隸校尉留治關中以為之主則諸將日削官民日盛此彊本弱敵之利也魏志衛覬傳又見晉書食貨志西嶽華山亭碑惟光和元年歲在戊午名曰咸池季冬已巳弘農太守河南河南樊君諱毅字仲德下車之初恭肅神祀西嶽至尊詔書奉祠躬親自往省從勞謙即事有漸散齊華亭齊室逼窄郡縣官屬法齊無處尊卑錯總精誠不固畏天之威逢斯疸怒時雨不興甘澍弗布念存黔首懼闕曠素于是與令巴郡朐忍先讜公謀圖議繕故斷度撏廓立室異處左右趣之莫不競慕二年正月己卯興就既成有亢休嘉啓寤各得竭情福祿是顧刻茲碑號吏卒俠路其辭曰巖巖西嶽五鎮次宗緒德之尊大華優隆皇帝永思祀典孔明高神肯宴圭璧贄通赫赫在上以畜萬邦惟嶽降神實生群公卿士百辟纘業攸蒙帝命不違歲事報功后辟命卿散齊外亭敬恭明祀以奉皇靈處所逼窄屑窣有聲神樂其靜翛翬無形尊卑有序潔心致誠因繕舊室整頓端平在其板屋孰不加精天人同道萬祚是迎既受帝祉延于後生為龍為光顯人王庭為公為侯福祿來成刻石紀號永亨利貞府丞勃海劉固叔長功曹史楊儒尋先主簿湖楊馗伯馮工曹掾楊基伯載史陝許禮文化縣丞隴西彭和伯怡左尉隴西甄璆叔尋臨典者門下掾瑗伯先主記史柏覽文進戶曹掾魏嘗威長史田胳文祖將作掾曹鑒孔明任就幼成史吳武丙昌隸釋古文苑以為衛覬作復華下民租田口算狀碑光和二年十二月庚午朔十三日壬午弘農太守臣毅頓首死罪上尚書臣毅頓首頓首死罪死罪謹案文書臣以去元年十一月到官其十二月奉祠西嶽華山省視廟舍及齊衣祭器率皆久遠有垢故魯不修大室春秋作譏臣以神嶽至尊宜加恭肅輒遣行事荀斑與華陰令先讜以漸繕治成就之後仍雨甘雪瀸潤宿麥惠滋黎庶臣即日以詔書齊祠雪未消澤時日清和神歡民喜誠聖朝勞神日昊廣被四表覆育之德神人被施遐邇大小莫不幸甚臣毅頓首頓首死罪死罪讜又書言縣當孔道加奉尊嶽一歲四祠養牲百日常當充肥用穀稿三千餘斛或月請雨齊禱役費兼倍每被詔書調發無差山高聽下恐近廟小民不堪役賦有飢寒之窘違宗神之敬乞差諸賦復華下十里以內民租田口算以寵神靈廣祈多福隆中興之祚臣輒聽行盡力奉宣詔書思惟惠利增異復上臣毅誠惶誠恐頓首頓首死罪死罪上尚書掾臣條屬臣淮書佐臣謀弘農太守上祠西嶽乞縣賦發差復華下十里以內民租田口算狀隸釋二案聞人牟準衛敬侯碑陰文以此為衛覬作漢金城太守殷華碑君諱華字叔時上郡定陽人大匠君之子也其先出自有殷因國定氏不改其號聖哲玄流至君而懿幼膺瓊蘭之美長有沖邈之志敦詩閲禮䪛韣竹賁誕循前業守以恪恭仕歷州郡忠諤有閒其大操也耽耽虎視龍變不羈故能雄傑于并域聲班于上京察何孝廉貢除郎中左馮翊丞協宣文物公事知州譽茂才宛丘令崇行寬猛示之禮禁褒延庠校政以惠和三載陟隕邪臨金城郡鄣羌虜避難遷移役兼民匱室如懸罄乃敷權略獎厲信獫狁率服不敢窺踰兵戢而時動因省獵以習義興利弭患順其所樂開通狹道造作傳館吏士咸悅不勞而勸是以搢紳之徒談講雅誦釋軍旅之犀革陳俎豆于泮宮其艾檐軨旌顯才良咨量三壽賞刑不僭邦場寧靜歲時豐登耆叟擊壤童齔謳譟功庸顯列當升寵祚旻不耆德景命失靈以光和元年九月乙酉卒官生有嘉休終則鼎銘于是故吏邊笁江英韓遂等追送遐丘刊石勒勛其辭曰於惟明后懷德握醇昆台之耀秀出不群文昭有毅武烈能仁含舒憲墨以育生民乘紀東壤西國著勛身沒名流載世常存古之遺老非此孰云于爾臣恩續其臭芬古文苑以此碑屬酈炎注云一作衛覬章樵云作衛覬是案酈元以熹平六年死碑言光和元年乃次年也大饗碑惟延康元年八月旬有八日辛未魏王龍興踐阼規恢鴻業構亮皇基萬邦統世忿吳夷之凶暴滅蜀虜之僭逆於赫斯怒順天致罰奮虓虎之校𥳑猛鋭之卒爰整六軍率胸奴暨單于烏桓鮮卑引弓之類持戟百萬控弦千隊玄甲曜野華旗蔽日天動雷震星流電發戎備素辨役不更藉農夫安疇商不變肆是以士有拊譟之歡民懷惠康之德皇恩所漸無遠不至武師所加無彊不服故寬令西飛則蜀將東馳六旆南徂則吳黨委質二虜震驚魚爛渚潰將泛自三江之流方軌卭來之阪斬吳夷以染鉞血蜀虜以釁鼓曜天威于遐裔復九圻之疆寓除生民之災孽去聖皇之宿憤次于舊邑觀釁而動築壇壝之宮置表著之位大饗六軍爰及譙縣父老男女臨饗之日陳兵清涂慶雲重覆乃備蹕禦整法駕設天宮之列衛乘金華之鸞路達升龍于大常張天狼之威弧千乘風舉萬騎龍驤威靈之飾震曜康衢既登高壇蔭九增之華蓋處流蘇之幄坐陳旅酬之高會行無算之酣飲旨酒波流肴蒸陵積瞽師設縣金奏讚樂六變既畢乃陳祕戲巴俞丸劍奇舞麗倒衝來踰鋒上索踏高䚗鼎緣橦舞輪擲鏡騁狗逐兔戲馬立騎之妙技白虎青鹿辟非辟邪魚龍靈龜國鎮之怪獸瓌變屈出異巧神化自卿校將守以下下及陪臺隸圄莫不歆淫宴喜咸懷醉飽雖夏啓均臺之饗周成岐陽之獀高祖邑中之會光武舊里之宴何以尚茲是以刊石立銘光示來葉其辭曰赫王師征南裔奮靈威震天外吳夷讋蜀虜竄區夏清八荒艾幸舊邦設高會皇德洽洪恩邁刊金石光萬世隸釋十九案聞人牟準魏敬侯碑陰云大饗碑衛覬文竝書天下碑録引圖經云曹子建文鍾繇書疑圖經之言非也隸釋四又有大饗殘碑云繇文為書則大饗非一碑當以碑陰為實魏敬侯衛覬碑陰文敬侯所葬之先域城惟解梁地即郀首山對靈足谷當猗口勢高而趣幽形垣而背阜鑿室而可以蔽藏不墳而所冀速朽珍琦素白而靡尚衣服隨時而則有故吏述德于隧前門生紀言于碑後白季居亭而已治詹嘉在主而可友處高攄之厚地將秭億而永久所著述注解故訓及文筆等甚多皆已失墜所著孝經固而倉頡冢碑大篆書在左馮翊利陽亭南道旁及華山下亭碑增算狀殷叔時碑魏大饗碑群臣上尊號奏及受禪石表文竝在許繁昌尊號奏鍾元常書受禪表覬竝金針八分書也太祖文帝等臨詔令雜駮議上封事一百餘條誡子等散在人閒及碑石可見樹碑人郡國縣道姓名具如于後古文苑
