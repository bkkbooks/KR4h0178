body:
  text: 吳卷六十六黃蓋署兩掾分主諸曹教令長不德徒以武功為官不以文吏為稱今賊寇未平有軍旅之務一以文書委付兩掾當檢攝諸曹糾擲繆誤兩掾所署事人諾出若有姦欺終不加以鞭杖宜各盡心無為衆先吳志黃蓋傳與曹公書蓋受孫氏厚恩常為將帥見遇不薄然顧天下事有大勢用江東六郡山越之人以當中國百萬之衆衆寡不敵海內所共見也東方將吏無有愚智皆知其不可惟周瑜魯肅偏懷淺戇意未解耳今日歸命是其實計瑜所督領自易摧破交鋒之日蓋為前部當因事變化效命在近吳志周瑜傳注引江表傳表言塞江北降人王潛等説北相部伍圖以東向多作布囊欲以盛沙塞江以大向荊州夫備不豫設難以應卒宜為之防吳志步騭傳注引吳録上疏請備蜀自蜀還者咸言欲背盟與魏交通多作舟船繕治城郭又蔣琬守漢中聞司馬懿南向不出兵乘虛以掎角之反委漢中還近成都事已彰灼無所復疑宜為之備吳志大帝傳赤烏七年步騭朱然等各上疏上疏論典校伏聞諸典校擲抉細微吹毛求瑕重案深誣趣欲陷人以成威福無罪無辜橫受大刑是以使民局天蹐地誰不戰栗昔之獄官惟賢是任故皋陶作士呂侯贖刑張于廷尉民無冤枉休泰之祚實由此興今之小臣動與古異獄以賄成輕忽人命歸咎于上為國速怨夫一人吁嗟王道為虧甚可仇疾明德慎罰哲人惟刑書傳所美自今蔽獄都下則宜咨顧雍武昌則陸遜潘濬平心專意務在得情騭黨神明受罪何恨吳志步騭傳中書呂一典校文書多所糾舉騭上疏云云又見宋書五行志五天子父天母地故宮室百官動法列宿若施政令欽順時節官得其人則陰陽和平七曜循度至於今日官僚多闕雖有大臣復不信任如此天地焉得無變故頻年枯旱亢陽之應也又嘉禾六年五月十四日赤烏二年正月一日及二十七日地皆震動地陰類臣之象陰氣盛故動臣下專政之故也夫天地見異所以警悟人主可不深思其意哉同上又晉書五行志下宋書五行志五御覽八百八十載此兩段有刪節也丞相顧雍上大將軍陸遜太常潘濬憂深責重志在竭誠夙夜兢兢寢食不寧念欲安國利民建久長之計可謂心膂股肱社稷之臣矣宜各委任不使他官監其所司責其成效課其負殿此三臣者思慮不到則已豈敢專擅威福欺負所天乎吳志步騭傳縣賞以顯善設刑以威姦任賢而使能審明於法術則何功而不成何事而不辨何聽而不聞何視而不覩哉若今郡守百里皆各得其人共相經緯如是庶政豈不康哉竊聞諸縣並有備吏吏多民煩俗以之弊但小人因緣銜命不務奉公而作威福無益視聽更為民害愚以為可一切罷省同上上疏獎勸太子登臣聞人君不親小事百官有司各任其職故舜命九賢則無所用心彈五絃之琴詠南風之詩不下堂廟而天下治也齊桓用管仲被髮載車齊國既治又致匡合近漢高祖攬三傑以興帝業西楚失雄俊以喪成功汲黯在朝淮南寢謀郅都守邊胸奴竄迹故賢人所在折衝萬里信國家之利器崇替之所由也方今王化未被於漢北河洛之濱尚有僭逆之醜誠攬英雄拔俊任賢之時也願明太子重以經意則天下幸甚吳志步騭傳九章粟飯五十糲飯七十稗飯五十𥽿飯四十八御飯四十二初學記二十六讓選曹尚書表薦顧談談心精體密貫道達微才照人物德允衆望誠非愚臣所可越先吳志顧談傳又見書鈔六十讓太子少傅表先王之建立太子必擇九德之師六行之傅書鈔六十五太子太師篇上疏請選交州刺史昔帝舜南巡卒於蒼梧秦置桂林南海象郡然則四國之內屬也有自來矣趙他起番禺懷服百越之君珠官之南是也漢武帝誅呂嘉開九郡設交趾刺史以鎮監之山川長遠習俗不齊言語同異重譯乃通民如禽獸長幼無別椎結徒跣貫頭左衽長吏之設雖有若無自斯以來頗徙中國罪人雜居其間稍使學書粗知言語使驛往來觀見禮化及後錫光為交址任延為九真太守乃教其耕犁使之冠履為設媒官始知聘娶建立學校導之經義由此已降四百餘年頗有似類自臣昔客始至之時珠崖除州縣嫁聚皆須八月引戶人民集會之時男女自相可適乃為夫妻父母不能止交址糜泠九真都龐二縣皆兄死弟妻其嫂世以此為俗長吏恣聽不能禁制日南郡男女倮體不以為羞由此言之可謂蟲豸有靦面目耳然而土廣人衆阻險毒害易以為亂難使從治縣官羈縻示令威服田戶之租賦裁取供辨貴致遠珍名珠香藥象牙犀角玳瑁珊瑚琉璃鸚鵡翡翠孔雀奇物充備寶玩不必仰其賦入以益中國也然在九甸之外長吏之選類不精核漢時法寬多自放恣故數反違法珠崖之廢起於長吏覩其好髮髡以為髲及臣所見南海黃蓋為日南太守下車以供設不豐撾殺主簿仍見驅逐九真太守儋萌為妻父周京作主人并請大吏酒酣作樂功曹番歆起舞屬京京不肯起歆猶迫強萌忿杖歆亡於郡內歆弟苗帥衆攻府毒矢射萌萌至物故交址太守士燮遣兵致討卒不能克又故刺史會稽朱符多以鄉人虞褒劉彥之徒分作長吏侵虐百姓強賦於民黃魚一枚收稻一斛百姓怨叛山賊並出攻州突郡符走入海流離喪亡次得南陽張津與荊州牧劉表為隙兵弱敵強歲歲興軍諸將厭患去留自在津小檢攝威武不足為所陵侮遂至殺沒後得零陵賴恭先輩仁謹不曉時事表又遣長沙吳巨為蒼梧太守巨武夫輕悍不為恭服所取相怨恨逐出恭求步騭是時津故將夷廖錢博之徒尚多騭以次鉏治綱紀適定會仍召出呂岱既至有士氏之變越軍南征平討之日改置長吏章明王綱威加萬里大小承風由此言之綏邊撫裔實有其人牧伯之任既宜清能荒流之表禍福尤甚今日交州雖名粗定尚有高涼宿賊其南海蒼梧鬱林珠官四郡界未綏依作寇盜專為亡叛逋逃之藪若岱不復南新刺史宜得精密檢攝八郡方略智計能稍稍以漸能治高涼者假其威寵借之形勢責其成效庶幾可補復如但中人近守常法無奇數異術者則群惡日滋久遠成害故國之安危在於所任不可不察也竊懼朝廷忽輕其選故敢竭愚情以廣聖思吳志薛綜傳呂岱從交州召出綜懼繼岱者非其人上疏上疏諫親征公孫淵夫帝王者萬國之元首天下之所繫命也是以居則重門擊析以戒不虞行則清道案節以養威嚴蓋所以存萬安之福鎮四海之心昔孔子疾時託乘桴浮海之語季由斯喜拒以無所取才漢元帝欲御樓船薛廣德請刎頸以血染車何則水火之險至危非常王所宜涉也諺曰千金之子坐不垂堂況萬乘之尊乎今遼東戎貊小國無城池之固備禦之術器械銖鈍犬羊無政往必禽克誠如明詔然其方土寒埆穀稼不殖民習鞍馬轉徙無常卒聞大軍之至自度不敵鳥驚獸駭長驅奔竄一人匹馬不可得見雖獲空地守之無益此不可一也加又洪流滉漾有成山之難海行無常風波難免倏忽之間人船異勢雖有堯舜之德智無所施賁育之勇力不得設此不可二也加以鬱霧冥其上鹹水蒸其下善生流腫轉相汙染凡行海者稀無斯患此不可三也天生神聖顯以符瑞當乘平喪亂康此民物嘉祥日集海內垂定逆虜凶虐滅亡在近中國一平遼東自斃但當拱手以待耳今乃違必然之圖尋至危之阻忽九州之固肆一朝之忿既非社稷之重計又開闢以來所未嘗有斯誠群僚所以傾身側息食不甘味寢不安席者也惟陛下抑雷霆之威忍赫斯之怒遵乘橋之安遠履冰之險則臣子賴社天下幸甚吳志薛綜傳移諸葛恪等勞軍山越恃阻不賓歷世緩則首鼠急則狼顧皇帝赫然命將西征神策內授武師外震兵不染鍔甲不沾汗元惡既梟種黨歸義蕩滌出藪獻戎十萬野無遺寇邑罔殘姦既掃凶慝又充軍用藜蓧稂莠化為善草魑魅魍魎更成虎士雖實國家威靈之所加亦信元帥臨履之所致也雖詩美執訊易嘉折首周之方召漢之衛霍豈足以談功軼古人勳超前世主上歡然遙用歎息感四牡之遺典思飲至之舊章故遣中臺近官迎致犒賜以旌茂功以慰劬勞吳志諸葛恪傳麟頌懿哉麒麟惟獸之伯世平覿景否則戢足德以衛身不布牙角屏營唐日帝堯保祿委體大吳以昭遐福天祚聖帝永享萬國藝文類聚九十八初學記二十九鳳頌猗歟石磬金聲玉振先王摶拊以正五音百獸翔感儀鳳舞麟在昔堯舜斯磬乃臻宗廟致敬乃肯來顧贊揚聖德上下受祚藝文類聚九十九騶虞頌婉婉白虎優仁是崇飢不侵暴困不改容斂威揚德愷悌之風聖德極盛騶虞乃彰藝文類聚九十九白鹿頌皎皎白鹿體質馴良其質皓曜如鴻如霜初學記二十九赤烏頌赫赫赤烏惟日之精朱羽丹質希代而生初學記三十御覽九百二十白烏頌粲焉白烏皓體如素宗廟致敬乃胥來顧初學記三十御覽九百二十述鄭氏禮五宗圖天子之子稱王子王子封諸侯若魯衛是也諸侯之子稱公子公子還自仕食采於其國為卿大夫若魯公子季友者是也則子孫自立此公子之廟謂之別子為祖則嫡嫡相承作大宗百代不絶大宗之庶子則皆為小宗小宗有四五代而遷己身庶也宗禰宗己父庶也宗祖宗己祖庶也宗曾祖宗己曾祖庶也宗高祖宗己高祖庶也則遷而唯宗大宗耳通典七十三至蜀詣闕拜章昔高宗以諒暗昌殷祚於再興成王以幼沖隆周德於太平功冒溥天聲貫罔極今陛下以聰明之姿等契往古總百揆於良佐參列精之炳耀遐邇望風莫不欣賴吳國勤任旅力清澄江滸願與有道平一宇內委心協規有如河水軍事興煩使役乏少是以忍鄙倍之羞使下臣溫通致情好陛下敦崇禮義未便恥忽臣自入遠境及即近郊頻蒙勞來恩詔輒加以榮自懼悚怛若驚謹奉所齎函書一封吳志張溫傳溫至蜀詣闕拜章表劉禪送臣溫熟錦五端御覽八百十五自理昔百里奚賢秦穆公欲干之穆之好牛奚因賃官以養牛蹄上乘肉三寸公使禽息行牛息入言之公不信怒息後言之公又怒吏曰再怒其主罪當使守門公出遊登車禽息跪而請之曰夫養牛者願君勿忘也公乃問百里奚曰臣之所長非養牛者也乃養民也公視牛察之乃知賢人也遂與同車而出謝禽息息曰所以不死者君未知客也今己知之矣乃觸門而死藝文類聚九十四御覽八百九十九雜移角弩既調射者又工多獲鶉鳥能無懇傷御覽三百四十八引暨豔集賀靈龜表伏覩靈龜出於會稽章安臣聞靈龜告符五色粲彰則金則玉背陰向陽藝文類聚九十九上丹砂表新宮成出丹砂五百斤上億萬歲之壽與步子山書但日講攻戰進取之方教進退疾除之節耳易詩禮樂春秋不復開篋御覽二百九十七所在近北無他異物裁奉織成虎頭綬囊可以服之御覽六百九十一三夫人針降及三代創業之君亦賴賢妃用佐厥勳塗山翼夏有莘贊殷初學記十密表呈誘曹休箋草方北有逋寇固阻河洛久稽王誅自擅朔土臣曾不能吐奇舉善上以光贊洪化下以輸展萬一憂心如搗假寐忘寢聖朝天覆舍臣無效猥發優命敕臣以前誘致賊休恨不如計令于郡界求山谷魁帥為北賊所聞知者令與北通臣伏思惟喜怖交集竊恐此人不可卒得假使得之懼不可信不如令臣譎休於計為便此臣得以經年之冀願逢值千載之一會輒自資竭竭盡頑蔽撰立箋草以誑誘休者如別紙臣知無古人單復之術加卒奉大略伀矇狼狽懼以輕愚忝負特施豫懷憂灼臣聞唐堯先天而天弗違博詢芻蕘以成盛勳朝廷神謨欲必致休於步度之中靈贊聖規休必自送使六軍囊括虜無孑遺威風電邁天下幸甚謹拜表以聞并呈箋草懼於淺局追用悚息被報施行吳志周魴傳誘曹休箋七條其一曰魴以千載徼幸得備州民遠隔江川敬恪未顯瞻望雲景天實為之精誠微薄名位不昭雖懷焦渴曷緣見明狐死首丘人情戀本而逼所制奉覿禮違每獨矯首西顧未嘗不寤寐勞歎展轉反側也今因隙穴之際得陳宿昔之志非神啓之豈能致此不勝翹企萬里託命謹遣親人董岑邵南等託叛奉箋時事變故列於別紙惟明公君侯垂日月之光照遠民之趣永令歸命者有所戴賴其二曰魴遠在邊隅江泛分絶恩澤教化未蒙撫及而於山谷之間遙陳所懷懼以大義未見信納夫物有感激計因變生古今同揆魴仕東典郡始願已獲銘心立報永矣無二豈圖頃者中被橫譴禍在漏刻危於投卵進有離合去就之宜退有誣罔枉死之咎雖志行輕微存沒一節顧非其所能不悵然敢緣古人因知所歸拳拳輸情陳露肝膈乞降春天之潤哀拯其急不復猜疑絶其委命事之宣泄受罪不測一則傷慈損計二則杜絶向化者心惟明使君遠覽前世矜而愍之留神所質速賜祕報魴當候望舉動俟須嚮應其三曰魴所代故太守廣陵王靖往者亦以郡民為變以見譴責靖勤自陳釋而終不解因立密計欲北歸命不幸事露誅及嬰孩魴既目見靖事且觀東主一所非薄嫿不復厚雖或暫舍終見翦除今又令魴領郡者是欲責後效必殺魴之趣也雖尚視息憂惕焦灼未知軀命竟在何時人居世間猶白駒過隙而常抱危怖其可言乎惟當陳愚重自披盡懼以卑賤未能采納願明使君小垂詳察忖度其言今此郡民雖外名降首而故在山草看伺空隙欲復為亂為亂之日魴命訖矣東主頃者潛部分諸將圖欲北進呂範孫韶等入淮全琮朱桓趨合肥諸葛瑾步騭朱然到襄陽陸議潘璋等討梅敷東主中營自掩石陽別遣從弟孫奐治安陸城修立邸閣輦資運糧以為軍儲又命諸葛亮進指關西江邊諸將無復在者才留三千所兵守武昌耳若明使君以萬兵從皖南首江渚魴便從此率厲吏民以為內應此方諸郡前後舉事垂成而敗者由無外援使其然耳若北軍臨境傳檄屬城思詠之民誰不企踵願明使君上觀天時下察人事中參蓍龜則足昭往言之不虛也其四曰所遣董岑邵南少長家門親之信之有如兒子是以特令齎箋託叛為辭目語心計不宣脣齒骨肉至親無有知者又已敕之到州當言往降欲北叛來者得傳之也魴建此計任之於天若其濟也則有生全之福邂逅泄漏則受夷滅之禍常中夜仰天告誓星辰精誠之微豈能上感然事急孤窮惟天是訴耳遣使之日載生載死形存氣亡魄爽恍惚私恐使君未深保明岑南二人可留其一以為後信一齎教還教還故當言悔叛還首東主有常科悔叛還者皆自原罪如是彼此俱塞永無端原縣命西望涕筆俱下其五曰鄱陽之民實多愚徑帥之赴役未即應人倡之為變聞聲響抃今雖降首盤節未解山棲草藏亂心猶存而今東主圖興大衆舉國悉出江邊空曠屯塢虛損惟有諸刺姦耳若因是際而騷動此民一旦可得便會然要恃外援表裏機牙不爾以往無所成也今使君若從皖道進住江上魴當從南對岸歷口為應若未徑到江岸可住百里上令此間民知北軍在彼即自善也此間民非苦飢寒而甘兵寇苦於征討樂得北屬但窮困舉事不時見應尋受其禍耳如使石陽及青徐諸軍首尾相銜牽綴往兵使不得速退者則善之善也魴生在江淮長於時事見其便利百舉百捷時不再來敢布腹心其六曰東主致恨前者不拔石陽今此後舉大合新兵并使潘濬發夷民人數甚多聞豫設科條當以新羸兵置前好兵在後攻城之日云欲以羸兵填塹使即時破雖未能然是事大趣也私恐石陽城小不能久留住兵明使君速垂救濟誠宜疾密王靖之變其鑒不遠今魴歸命非復在天正在明使君耳若見救以往則功可必成如見救不時則與靖等同禍前彭綺時聞旌麾在逢龍此郡民大小歡喜並思立效若留一月日間事當大成恨去電速東得增衆專力討綺綺始敗耳願使君深察此言其七曰今舉大事自非爵號無以勸之乞請將軍侯印各五十紐郎將印百紐校尉都尉印各二百紐得以假授諸魁帥獎厲其志并乞請幢麾數十以為表幟使山兵吏民目瞻見之知去就之分已決承引所救畫定又彼此降叛日月有人闊狹之間輒得聞知今之大事事宜神密若省魴箋乞加隱祕伏知智度有常防慮必深魴懷憂震灼啓事蒸仍仡未罪怪吳志周魴傳
