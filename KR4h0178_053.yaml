body:
  text: 伏義與阮嗣宗書義白蓋聞建功立勳者必以聖賢為本樂真養性者必以榮名為主若棄聖背賢則不離乎狂狷淩榮起名則不免乎窮辱故自生民以來同此圖例雖歷百代業不易綱譬如大道徒以奔趨遲疾定其駑良舉足向路總趨一也然流名震響非實不著而抱實之奇非人不寶貴德保身非禮不成伏禮之矩非勤不辨是使薄于實而爭名者或因飾虛以自矜慎于禮而莫持者或因倨怠以自外其自矜也必關闔晻曖以示之不測之量其自外也必排摧禮俗以見其不羈之達又有滑稽之士糅于其閒浮沈不一際畔相亂或使時人莫能早分推其大歸綜之行事徒可力極一噱觀盡崇朝遭清世邪則將吹其噓以露其實值其闇邪則將矜其貌以疑其樸從此觀之治大而見遺不如資小而必集出俗而見削不如入檢而必令驟聽論者洋溢之聲雖未傾蓋其情如舊然重牆難極管短幽密觀容相額所執各異或謂吾子英才秀發邈與世玄而經緯之氣有蹇缺矣或謂吾子智不出凡器無隈奧而陶變以眩流俗善子者欲斤斲以拒口樸惡子者欲抽鍵以騖空虛每承此聲未嘗不開精斥運放思天淵欲為吾子廣推奧異端求所安也蓋自生民之性受氣之源好惡大歸不得相遠君子徇名而不顧亦有慕名以為顯夫名利者總人之綱集衢之門也出此有為于義未聞吾子若欲逆取順守及時行志則當矜而莫疑以速民望若欲娛情養神不厚于俗則當浩然恣意惟樂是治今觀其規時則行己無立德之身報門無慕業之客察其樂則食無方丈之肴室無傾城之色徒泄泄以疑世為奇縱體為逸執此不回既以怪矣且人非金石不可剖練設使至寶咸在子身疑于國寶為不得行天官雖博無偏駮之任王道雖寬無縱逸之流苟無其分則為身害教賊怨布天下以此備之殆恐攻害其至無日安坐難保而聞吾子乃長嘯慷慨悲涕潺湲又或拊腹大笑騰目高視形性張動與世乖抗風立侯蔑若無人儻獨奇變逸運漸在于此將以神接虛交異物所亂使之然也夫智之清者貴其知運而不憂德之懿者善其持沖以守滿就其懷憂必發于見孤孤不自孤而怨時也就其持滿必起于見崇崇不自崇而驕世也行來之議又傳吾子雅性博古篤意文學積書盈房無不燭覽目厭義藻口飽道潤俯詠仰歎術可純儒然開闔之節不制于禮動靜之度不羈于俗凡諮詠善之則教慈于父兄惡之則言醜于讎敵未有慈其教而不脩其事醜其言而樂其業者也古人稱竊𥳑寫律踞廁讀書誦之可悼深怪達者之行其象若莊周淮南東方之徒皆投迹教外放思太玄其大言異旨殆自謂能迴天維舉地絡觀持世之極總得物之宗仰天獨唱與世爭黨乃謂生為勞役而不能煞身以當論謂財為穢累而不能割賄以見譏由是觀之其鬱怨于不得故假無欲以自通怠惰于人檢故殊聖人以自大凡此數者尚皆奇才異略命世崛起徒以時昏俗亂寶沈幽夜而性放蕩不一萎致國寶之責庶其不然而況吾子志非遁世世無所適麟驥苟修天雲可據動則不能龍攄虎超同機伊霍靜則不能珠潛璧匿連迹巢光言無定端行不純軌虛盡年時以自疑外豈異乎韓子所謂無施之馬骨體雖美懿牽縮不隨者哉且桀士之志也遇世險巇則憂在將命值世太清則憤于匿穎欲其世平而有騁足之場時安而有役智之局方今大魏興隆皇衢清敞台府之門割石索寶以吳蜀二虜巢窟未破長籌之士所當奮力可謂器與運會不卜而行今其時矣向使吾子才足蓋世思能橫出何能不因大師韜敵之變陳孫子廟勝之策使烽燧不起于四垂羽檄不施于中夏定勳立事撫國寍民而飽食安臥囊懸室罄力牽于役財彫于賦養生之具亂于細民為壯士者豈能然乎若居其勞而不知病其事則經緯之氣乏矣若病其事而不能為其醫則鍼石之巧淺矣今吾子擢才達德則無毛遂穎脫之勢翦迹滅光則無四皓岳立之高豐家富屋則無陶朱貨殖之利延年益壽則無松喬蟬蛻之變總論吾子所歸義無所出然眾論雲擾僉稱大異疑夫鬱氣之下必有祕伏重奧之內必有積寶雖無顏氏之妙思覩恍惚之迹雖無鍾子之達樂聞山林之音想亦不隱才穎于肝膈而不揚之于清觀任賢智于骨氣而不播之于高聽且明智之為物猶泉流之吐潤固不于挹酌而為損舍佇而增益也張儀之志激于見劫季路晚悟滯在持滿是以不嫌盡言究其良苦想必勃然承聲響發若乃群能獨踊無以應唱懸機待時不能觸物則不達于談者所謂挾祖奕以守要際閉虛門以示不測者也昔輪扁不能言微于其弟伯樂不能語妙于其子此蓋智術之曲撓非道理之正例自古有不可及之人未有不可聞之業有不可料之微未有不可稱之略幸以竭示所志若變通卓逸行得天符言發恍然邈在世表則將為吾子謝物輸力因風自釋染筆附紳諮所未悟庶足存弟子之一隅伏義白阮嗣宗集魏散騎常侍步兵校尉東平相阮嗣宗碑先生諱籍字嗣宗陳留尉氏人也厥遠祖陶化于上世而先生弘美于後代詩所載阮國則是族之木也先生承命世之美希達節之度得意忘言尋妙于萬物之始窮理盡性研幾于幽明之極和光同略群生莫能屬也確不可拔當塗莫能貴也或出或處與時升降或默或語與世推移望其形者猶登嶽涉海蕩然無以究其高測其深覽其神者猶旁璞親珪肅然無不欽其寶而偉其奇也不屑夷齊之潔故其清不可尚也不履惠連之汙故其道不可屈也蘧瑗昇降于卷舒甯武去就于愚智顧盼二子不亦泰如危宗廟之犧安不靈之龜故無孤憤之逼而有塗中之廣觀屈穀鳴雁是以處才不才之閒察巨瓠緯帶是以遊有用之際夸大辨而御之以訥資大白而洿之以辱為無為而名不能累也事無事而世不能役也訪垂天之翼于寂寞之域投芒刀之穎于有解之會固恢恢必餘地豈若接輿被張以養生於陵觀園以求實齷齪近步修軌轍而已哉尼父議老氏于遊龍衛賜譬重仞于日月揆之先生其殆庶幾乎方將攀逸駕于洪涯邈遐軌于巢州跨宇宙以高挹陵雲霄以憂游享年如干遘病而卒于是遠鑒之士有識之徒先生之沒夫豈不慨然臨豪傑而存惠子之閒運斧斲而思郢人之工乃探賾索隱以敘雅操使將來君子知莊生之迹略舉其志埤之曰峨峨先生天挻無欲玄虛恬淡混齊榮辱盪滌穢累婆娑山足胎胞造化韜韞光燭鼓棹滄浪彈冠嶠岳頤神大素𥳑邁世局澄之不清溷之不濁翱翔區外遺物庶俗隱處巨室反真歸漠汪汪淵源邁迹圖錄廣文選作稽叔夜誤楊慎丹鉛總錄以為東平太守稽叔良撰未詳何據文不他見姑列此俟攷髑髏賦躊躇增愁言遊舊鄉惟遇髑髏在彼路傍余乃俯仰咤歎告于昊蒼此獨何人命不永長身銷原野骨曝大荒余將殯子時服與子嚴裝殮以棺椁遷彼幽堂于是髑髏蠢如精靈感應若在若無斐然見形溫色素膚昔以無良行逢皇乾來遊此土天奪我年令我全膚消滅白骨連翩四支摧藏于草莽孤魂悲悼乎黃泉生則歸化明則反昏格于上下何物不然余迺感其苦酸哂其所說念爾荼毒形神斷絕今宅子后土以為永列相與異路于是便別蓺文類聚十七初學記十四上奏元神下告皇祇文選顏延之宋郊祀歌注日蝕考負對厤候所掌推步遲速可以知加時早晚度交緩急可以知薄蝕淺深合朔之時或有月掩日則蔽障日體使光景有虧故謂之日蝕或日掩月則日從月上過謂之陰不侵陽雖交無變至于日月相掩必蝕之理無術以推是以古者諸侯旅見天子日蝕則廢禮嘗禘郊社日蝕則接祭是以前代史官不能審日蝕之數故有不得終禮自漢故事以為日蝕必當于交每至其時申警百官以備日變甲寅詔書有備蝕之制無考負之法通典七十八又對古來黃帝顓頊夏殷周魯六厤皆無推日蝕法但有考課疏密而已負坐之條本由無術可課非司事之罪通典七十八表德論祗畏王典不得為銘乃撰錄行事就刊于墓之陰云爾宋書禮志二甘露二年大將軍參軍大原王倫卒倫兄俊作表德論以述倫遺美云賦三重五品商溪𣘤里梁書劉杳傳云元鳳是魏代人此書仍載其賦云云率六郡將守上表臣聞人生于三事之如一惟難所在則致其命今臣國敗主附守死無所是以委質不敢有二蜀志霍峻傳注引漢晉春秋遣戍交阯誓若賊圍城未百日而降者家屬誅若過百日而城沒者刺史受其罪吳志孫皓傳注引漢晉春秋初霍弋遣楊稷毛炅等戍與之誓劉徽九章算術注序昔在包犧氏始畫八卦以通神明之德以類萬物之情作九九之術以合六爻之變暨于黃帝神而化之引而伸之于是建厤紀協律呂用稽道原然後兩儀四象精微之氣可得而效焉記稱隸首作數其詳未之聞也案周公制禮而有九數九數之流則九章是矣往者暴秦焚書經術散壞自時厥後漢北平侯張蒼大司農中丞耿壽昌皆以善算命世蒼等因舊文之遺殘各稱刪補故校其目則與古或異而所論者多近語也徽幼習九章長再詳覽觀陰陽之割裂總算術之根源探賾之暇遂悟其意是以敢竭頑魯采其所見為之作注事類相推故枝條雖分而同本幹者知發其一端而已又所析理以辭解體用圖庶亦約而能周通而不黷覽之者思過半矣且算在六蓺古者以賓興賢能教習國子雖曰九數其能窮纖入微探測無方至于以法相傳亦猶規矩度量可得而共非特難為也當今好之者寡故世雖多通才達學而未必能綜于此耳周官大司徒職夏至日中立八尺之表其景尺有五寸謂之地中說云南戴日下萬五千里夫云爾者以術推之案九章立四表望遠及因木望山之術皆端旁互見無有超邈若斯之類然則蒼等為術猶未足以博盡群數也徽尋九數有重差之名原其指趣乃所以施于此也凡望極高測絕深而兼知其遠者必用重差句股則必以重差為率故曰重差也立兩表于洛陽之城令高八尺南北各盡平地同日度其正中之時以景差為法表高乘表閒為實實如法而一所得加表高即日去地也以南表之景乘表閒為實實如法而一即為從南表至南戴日下也以南戴日下及日去地為句股為之求弦即日去人也以徑寸之筩南望日日滿筩空則定筩之長短以為股率以筩徑為句率日去人之數為大股大股之句即日徑也雖天圓穹之象猶曰可度又況泰山之高與江海之廣哉徽以為今史籍且略舉天地之物考論厥數載之于志以闡世術之美輒造重差并為注解以究古人之意綴于句股之下度高者重表測深者累矩孤離者三望離而又旁求者四望觸類而長之則雖幽遐詭伏靡所不入博物君子詳而覽焉九章算術曲阜孔氏刊本大狗賦余生處大魏之祚政遭王路之未闢進不得補過之功退不得御國之冊帝曰疇咨迸在朔易越彼西旅大犬是獲其頭顱也不可論以盡其骨法也不可辨而釋傞蹴蹌雄資猛相兀然高八九尺形體如翦削象貌如刻畫毛翰紫豔光雙肩如白璧時頻伸而振迅若應龍之騰擲爪類刀戈牙如交戟聞林獸之群爭欻斷鎖而齕石逆風長厲野禽是覓鼻嗅微香眼裁輕迹眄而奮怒揮霍而振鬩譬若天梁折地柱劈倒曳白象挫其腰齧掣六駮折其脊拓𢱢熊羆破其匈𢬵抄獸頭斷其脈爪處如劍犛牙創似鈹刺視其未死之閒血泉涌如箭射于是驅麋鹿之大群入窮谷之峻厄走者先死往者被擊前無孑遺後無一隻然其所折伏敬主識人晝則無窺窬之客夜則無奸淫之賓通聽百里夜吠狺狺若乃蠻夷猾夏列士異操輕襯單集人馬銜枚猛火先覺音聲正摧竦耳側聽則恆山動南向啀喍則霍山頹眈精直視則會丘䃬虓嚇奔突則重闉開非吾畋獵之有益乃可安國家衛四鄰者也昔宋人有鵲子之譽韓國珍其大盧彌明振之于巨獒槃瓠受之于蠻都論百代之名狗敢餘犬之能俱絕四鐵之猲獢云何盧令之足書初學記二十九又見蓺文類聚九十四有刪節
